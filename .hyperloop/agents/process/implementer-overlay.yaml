apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - Error-path first: For every spec THEN block that mentions failure, rollback, retry, "not called", or "rolled back", write the failure-path test BEFORE the implementation â€” not after. If you cannot find a failure-path test for a rollback/atomicity requirement, you have not finished.
  - Enumerate THEN blocks: Before writing any code, list every THEN condition in the scenario being implemented. Mark each one as needing a test. Do not mark the task complete until every THEN condition has a corresponding test â€” including failure branches.
  - No "Coming Soon" submissions: Placeholder stubs, "coming soon" markers, or stubbed API calls that emit a toast instead of calling the real API are NOT acceptable implementations of a spec scenario. If a scenario cannot be fully implemented in this task's scope, raise a blocker rather than submit a stub.
  - Frontend TDD is mandatory: Vue/UI work is not exempt from TDD. For each UI scenario, write at least one component or unit test (vitest + @vue/test-utils or playwright component test) that exercises the scenario's behavior before writing the component code.
  - Frontend test infrastructure comes first: If `src/dev-ui/package.json` does not already contain `vitest`, add it (plus `@vue/test-utils`) as the very first commit of any UI task â€” before writing any `.vue` files. You cannot satisfy TDD without a test runner in place.
  - No placeholder comments for missing spec scenarios: HTML comments like `<!-- Future: ... -->` or code comments like `// Future:` or `# Future:` are NOT acceptable substitutes for implementing a spec scenario. If a scenario is genuinely out of scope for this task, create `.hyperloop/blockers/task-NNN-blocker.md` describing the dependency and raise it with the orchestrator before submitting.
  - Rollback tests must use mocks that raise: A test for "rolls back on failure" must mock the failing dependency to actually raise/reject mid-operation and then assert that subsequent operations were NOT called and that the aggregate/database state is unchanged. A test that only checks happy-path ordering does not satisfy a rollback THEN condition.
  - Idempotency has TWO required test sub-cases: When a spec mentions "idempotent", "duplicate delivery", or "retry" in a THEN block, you MUST write (a) a filtering test asserting already-processed entries are excluded from re-delivery, AND (b) a re-execution test that invokes the handler/worker TWICE with the same event and asserts the final state is identical to a single successful run with no duplicate side effects. Testing only (a) is PARTIAL â€” the scenario is not COVERED until (b) exists.
  - Integration test status codes must match the spec AND the unit test: Before writing an integration test for any authorization or error scenario, look up (a) the exact HTTP status code stated in the spec's THEN block and (b) the unit test for the same route handler. If the spec says 404 (e.g., "no distinction between unauthorized and missing"), the integration test MUST assert 404 â€” not the intuitive 403. Mismatches between unit and integration test assertions for the same route are a defect.
  - Verify npm package versions exist before committing: When writing or updating a version constraint in `package.json`, run `pnpm view <pkg>@<version> version` (or `npm info`) to confirm the version exists in the registry. A constraint that resolves to nothing (e.g. `vitest@^2.2.5` when 2.x topped at 2.1.9) makes `pnpm install` fail silently â€” the tests have never run.
  - onMounted is mandatory for data-loading pages: Any Vue component that displays a list of entities fetched from an API must wire its load function to an `onMounted` hook. A `loadXxx()` function that is only reachable via user-action handlers means the page is perpetually empty on initial load â€” that is a stub, not an implementation.
  - Never leave stub function bodies when the required API already exists: A function that returns `[]`, `{}`, or `null` with a comment like "when routes are available, this will be fetched" is a stub. Before writing such a body, verify whether the API endpoint already exists in the codebase. If it does, implement the call; if it does not, raise a formal blocker instead.
  - Strict equality for categorized error types: Assertions on `error_type`, `status`, or any other enumerated categorical field must use `==` (exact equality), never `in [list]`. The assertion `error_type in ["timeout", "execution_error"]` allows a misclassified timeout to pass undetected â€” the entire point of error categorization tests is to enforce the exact category.
  - Negative behavioral contracts require explicit negative tests: When a spec THEN block says "shall NOT log the raw query", "redacted (not the raw value)", or "must not expose X", write an assertion that the prohibited value is absent from all observable outputs (e.g., assert the raw string does not appear in any logger call args). Absence of a negative assertion means the contract is only enforced by convention.
  - Cascade deletes must clean up ALL external resources: When a spec requires cascade deletion of child entities, enumerate every external resource held by those children (Vault secrets via `credentials_path`, object-store files, queue messages). Each external resource must be explicitly deleted before the DB record is removed, and a test must assert the cleanup call was made. Deleting only the DB row while leaving Vault secrets is an incomplete implementation.
  - Cross-task deferral comments are stubs â€” never ship them: A comment saying "will be wired to the API in task-NNN" or "will be populated once [X] API exists" paired with a no-op handler or empty `ref([])` is a stub. Before deferring, verify whether the required API endpoint already exists in the codebase. If it does, implement the call in this task. If it genuinely does not exist yet, raise a formal blocker at `.hyperloop/blockers/task-NNN-blocker.md` and remove the placeholder code entirely â€” do not ship a fake-working UI.
  - Success notifications require a preceding API call: Never emit `toast.success(...)`, `$notify({ type: 'success' })`, or any equivalent success notification from a handler that makes no outbound API call. A "Created!" toast without a real API write is a lie to the user. If the endpoint is missing, remove the notification and raise a formal blocker instead.
  - Confirmation dialogs are required when the spec says "must confirm": When a spec THEN block says "the user must confirm before the change is applied", implement an explicit confirmation modal or dialog with a user-triggered confirm action. An informational `<Alert>`, `<Banner>`, or `<Badge>` element is not a confirmation gate â€” it does not block the action. The confirmation dialog must be present before any destructive operation is performed.
  - TypeScript entity interfaces must include every spec-visible field: Before finalizing a TypeScript interface for an entity (e.g., `SyncRun`, `KnowledgeGraph`), enumerate every field referenced in THEN blocks across all spec scenarios for that entity. A missing field (e.g., no `logs` on `SyncRun` when the spec has a "detailed logs" scenario) means the scenario cannot be implemented without an interface change â€” discover this before writing component code, not after.
  - Integration tests must mirror the spec's exact GIVENâ†’WHENâ†’THEN sequence: Establish all pre-conditions stated in GIVEN, then perform the single trigger action in WHEN, then assert the THEN outcomes. Never reverse the order even when the end state is reachable via a different sequence â€” a reversed test validates end-state equality, not the causal chain the spec requires. Write the GIVEN state, commit it to the system (e.g., call the real API or service), then perform the WHEN action, then assert. If the spec says "GIVEN a group assigned to a workspace WHEN a new member is added THEN the member has workspace access", the group must be in the workspace BEFORE the member is added â€” not after.
  - Trace all callers before adding validation to an existing domain method: When adding a new constraint to an existing method on a domain object (e.g., `validate_operation()`, `validate()`, `apply_batch()`), use `grep -r` to find every call site in the codebase. For each caller, verify it already provides the newly required data. A caller that cannot satisfy the new constraint is a regression you must fix in the same commit â€” do not leave broken callers behind.
  - Remove legacy routes when the spec mandates all-operations enforcement: When a spec contains "SHALL require X for all [operation]" (e.g., "all mutations require a KnowledgeGraph"), search for any existing route, handler, or entry point that processes that operation without enforcing X. Remove or update every such bypass in the same task. Leaving a spec-violating legacy route is not acceptable even if it was "already there."
  - At least one non-mocked path per domain validation change: When adding or modifying validation logic in a domain value object or aggregate, write at least one test that exercises the real domain object (not a mock of it) through a real caller. A test suite where every call to `validate_*` is intercepted by a `Mock()` or `AsyncMock()` cannot catch validation regressions on existing call paths.
  - Prefer `Mock(spec=Class)` over bare `Mock()` for application-layer collaborators: When a test must mock a service, applier, or repository, use `Mock(spec=RealClass)` rather than bare `Mock()`. Spec-d mocks enforce the real interface and will raise `AttributeError` on invented methods, surfacing regressions that bare mocks silently swallow. Bare `Mock()` is only acceptable for infrastructure boundaries with no domain logic (e.g., HTTP clients).
  - Selector state must be forwarded all the way to the composable call: After implementing any UI selector that loads entities from an API and binds to a `selectedXxx` ref, open every action handler that is scoped by that selector and confirm `selectedXxx.value` (or `|| undefined`) is passed as an explicit argument to the composable or API function â€” a selector whose value is present in the template binding or a computed display label but absent from the `await composableFn(...)` call line does nothing.
  - Tests for argument forwarding must mock the real composable, not re-implement it locally: When a spec scenario requires that a selected-state value be forwarded to a composable call, `vi.mock()` the composable module, trigger the component action in the test, and assert `expect(mockFn).toHaveBeenCalledWith(expect.objectContaining({ field: expectedValue }))` â€” a local standalone function defined inside the test that mimics the composable's logic and is called directly proves the algorithm is correct but cannot detect that the real component never passes the argument.
  - Assert every spec-named component of a structured output individually: When a THEN block specifies multiple required parts of an output (e.g., "error is reported WITH the line number AND a content preview"), write one assertion per required component â€” never a single OR-chained assertion that passes when only one component is present. An `assert "X" in msg or "Y" in msg.lower()` test passes even if the implementation emits neither X nor Y as the spec intended; each component must have its own `assert` that fails independently.
  - Ordering/sequencing methods require a dedicated mixed-input unit test: When you implement a method that sorts or partitions operations by type (e.g., DEFINEâ†’DELETEâ†’CREATEâ†’UPDATE), write at least one unit test that constructs a list with ALL operation types in scrambled order and asserts the exact resulting sequence. Relying on integration tests that use homogeneous batches (all DELETEs, all CREATEs) does not verify the sort contract â€” a bug that swaps DELETE and CREATE priorities will pass every homogeneous test undetected.
  - Assert ALL saved-object fields named in the THEN block: When a THEN block says "the system stores X with fields A, B, and C", every named field (A, B, AND C) must appear in an assertion. Asserting only a subset (A and B) leaves field C untested; if the implementation later drops C, no test fails. After writing the happy-path test, re-read the THEN block and confirm there is one `assert` for each property the spec names.
  - Default-value specs require forwarding tests, not just status-code tests: When a spec states "the default value of X is Y if unspecified", write a test that (a) omits the field from the request/call body and (b) asserts the downstream service or function was called with the default value (e.g., `mock_service.create.assert_called_once_with(..., x=Y)`). A correct `Field(default, ...)` in Pydantic plus a 201 status-code assertion does NOT satisfy this requirement â€” you must verify the default was forwarded through every layer the spec describes.
  - AND-clause THEN blocks require a single chained test: When a spec THEN block contains multiple outcomes connected by "AND" (e.g., "the key is revoked AND remains visible in listings with `is_revoked=True`"), write one test that performs the full sequence (e.g., revoke â†’ list â†’ assert `is_revoked=True`) rather than two isolated tests that each verify one half. Separate tests prove each outcome is reachable in isolation; they cannot verify the system produces both outcomes together from the same starting state.
  - Integration test coverage must be symmetric across all sub-cases in a scenario: When a spec scenario lists multiple sub-cases (e.g., valid key â†’ 200, expired key â†’ 401, revoked key â†’ 401) and an integration test already exists for any one sub-case, write an integration test for every other sub-case. Unit tests at individual layers (service, middleware) are supplementary â€” they do not substitute for an end-to-end test when the happy-path sub-case already has one.
  - Domain aggregates must be real instances â€” never MagicMock: When a test in a service-layer test file needs a domain aggregate (e.g., DataSource, KnowledgeGraph, SyncRun, ApiKey), instantiate it using the real constructor or a factory helper (e.g., `_make_ds()`, `_make_kg()`). Before writing a new factory, search sibling test files in the same bounded context for an existing one and import it. MagicMock() for a domain aggregate hides validation logic; `MagicMock(spec=DomainClass)` is acceptable only when the test needs the interface but not the invariants. Infrastructure collaborators (session, probe, client) remain exempt.
  - Never delete passing tests: Do not delete test files or remove test functions/methods from existing test files. If a test is failing because the spec changed, update the test to match the new spec â€” never delete it. If a test covers a scenario that is now genuinely out of scope, create a formal blocker file at `.hyperloop/blockers/task-NNN-blocker.md` and restore the test intact. Run `check-no-test-regressions.sh` before submitting.
  - Never delete or disable check scripts: Files in `.hyperloop/checks/` are process enforcement infrastructure shared across every task. Never delete, rename, or disable them. Never remove `--exclude-dir=.venv` from `grep` commands inside check scripts â€” removing it causes virtual-environment hits that produce false positives and silently mask real failures.
  - Audit for source regressions before submitting: Run `git diff --name-only --diff-filter=D $(git merge-base HEAD alpha)` to confirm no application source files have been deleted and `check-no-source-regressions.sh` to confirm no public methods have been removed. Every deletion must map to an explicit spec requirement â€” if you cannot find the requirement, restore the code.
  - Never remove test infrastructure: Do not remove `vitest`, `vitest.config.ts`, `@vue/test-utils`, or any test runner configuration from `package.json` or the project. If a config file needs to be updated, update it â€” do not delete it. Deleting test infrastructure makes it impossible to run tests and is treated the same as deleting the tests themselves.
  - Verify commits exist before reporting done: Before marking a task complete, run `git log --oneline <base>..HEAD` and confirm at least one commit appears. A branch with zero commits vs the base means nothing was implemented â€” do not submit.
  - Empty test stubs are not implementations: A test function whose body is only a docstring and/or `pass` passes trivially and tests nothing. Run `check-empty-test-stubs.sh` before submitting; any flagged function must have a real body with at least one `assert`, mock assertion call, or `pytest.raises` block before you may report the task done.
  - Graceful shutdown means draining, not cancelling: When a spec THEN block says "in-progress [work] completes before shutdown" or describes a "graceful" stop for a background worker, the `stop()` method MUST set a stop flag (e.g., `_running = False`) and then `await` the running task WITHOUT calling `task.cancel()`. `task.cancel()` raises `CancelledError` at the next `await` point and interrupts mid-batch; it does not allow the current work unit to finish naturally. Only after setting the flag should you `await task` so the loop exits on its own after completing the in-flight unit.
  - Shutdown tests must have real work in-flight: When writing a test for a "graceful shutdown" or "in-progress work completes before shutdown" THEN block, the test MUST (a) start the background task with a handler that takes a measurable amount of time (e.g., an `asyncio.Event`-gated coroutine), (b) trigger shutdown while the handler is still running, and (c) assert the handler completed AND the result was committed before `stop()` returned. A test that only mocks the worker, calls `stop()`, and checks `_running == False` does NOT verify graceful draining and is PARTIAL for this THEN condition.
  - Every Vue page file requires a test file before the page is committed: When creating any new file under `pages/` (e.g., `pages/graph/schema.vue`), create a corresponding test file in `tests/` whose name includes the page domain (e.g., `tests/schema.test.ts`) BEFORE writing the page component. A page with no test file is a TDD violation regardless of how complete the component looks. Run `check-pages-have-tests.sh` to verify before committing.
  - Enumerate ALL spec scenarios for each page before writing the component: When implementing a spec requirement section (e.g., "Schema Browser", "Graph Explorer"), open the spec file and list every GIVEN/WHEN/THEN scenario it describes. Write a failing `describe`/`it` block for EACH scenario in the test file before writing any component code. A test file that covers 2 of 5 spec scenarios for a page is not TDD â€” it is cherry-picking. Every scenario must have a test, even if it is initially a failing placeholder.
  - Spec SHALL requirements mandate test-first coverage for every sub-scenario: When a spec section begins with "SHALL provide" or "SHALL support", enumerate all distinct user scenarios in that section and write a failing test for each before any implementation code. A page that implements all scenarios but only tests one or two is incomplete. Do not submit until `check-pages-have-tests.sh` passes AND every sub-scenario from the spec section has a corresponding `it(...)` block.
  - Property-preserving merge tests must use asymmetric data: When a spec says "existing properties are preserved" (or describes idempotent CREATE/update semantics), the test MUST use a DIFFERENT set of properties in the second operation â€” at least one property present in the first call must be absent from the second. Identical data in both calls cannot distinguish merge from replace, making the bug invisible.
  - SQL JSON property updates that preserve existing data must use the jsonb merge operator: When writing SQL that updates an existing JSON/AGTYPE column with "preserve existing" semantics, use `(existing_col::text)::jsonb || (new_col::text)::jsonb` â€” never direct assignment (`SET col = new_value`), which silently replaces all existing properties. Run `check-property-merge-semantics.sh` before submitting.
  - Rebase onto current `alpha` before submitting: Run `git rebase alpha` as the final step before reporting done. A branch that diverged from `alpha` more than a few commits ago inherits stale assertions in files your task never touched â€” these produce false-positive check failures (e.g., a 403 already corrected to 404 in `alpha` still appears wrong on a stale branch). Run `check-branch-rebased-on-alpha.sh` and resolve any staleness before submitting.
  - Rebase against LOCAL `alpha`, never `origin/alpha`: The check script `check-branch-rebased-on-alpha.sh` compares against the LOCAL `alpha` ref. The orchestrator advances local `alpha` independently and may not push it to `origin/alpha` â€” meaning local `alpha` can be dozens of commits ahead of `origin/alpha`. Running `git rebase origin/alpha` when local `alpha` is ahead leaves the branch stale against the check. Before any rebase, run `check-alpha-local-vs-remote.sh` â€” if it exits non-zero, local `alpha` is ahead of `origin/alpha` and you MUST run `git rebase alpha` (the local ref), never `git rebase origin/alpha`.
  - Run the frontend test suite before submitting: After completing all frontend work, run `cd src/dev-ui && CI=true pnpm run test` and confirm every test passes. A test that imports a named export which does not exist in the source module will produce a `TypeError` at runtime â€” this is a failing test, not a type error caught at build time, and it will not be caught by check-frontend-tests-exist.sh. Do not submit with any failing frontend tests.
  - Commit package.json and pnpm-lock.yaml together: Whenever you add, remove, or change a version constraint in `src/dev-ui/package.json`, run `cd src/dev-ui && pnpm install` immediately and commit the updated `pnpm-lock.yaml` in the SAME commit as the `package.json` change. Never commit a package.json modification without the corresponding lockfile update â€” a stale lockfile causes `pnpm install --frozen-lockfile` to fail even when the package name appears in the lockfile as a transitive dependency.
  - Branch reset must start from current alpha HEAD: When a rebase or merge operation fails repeatedly, the ONLY safe reset procedure is `git checkout alpha && git checkout -b <new-branch-name>`. Never start a reset branch from a local snapshot, a stale tag, an older feature branch, or any commit that predates the current `alpha` HEAD. Starting from a stale base silently drops every task merged into alpha since that base, erasing previously-shipped work without any deletion commit to detect.
  - Run all three regression checks immediately after any branch reset: After executing a branch reset (or after resolving merge conflicts that required force-resetting), run `check-no-source-regressions.sh`, `check-no-test-regressions.sh`, and `check-no-check-script-deletions.sh` against alpha BEFORE writing the first line of task implementation code. If any check fails at this point, you have started from a wrong base â€” fix the base before proceeding.
  - Never delete `.hyperloop/agents/process/` files: The overlay YAML files and `kustomization.yaml` in `.hyperloop/agents/process/` are process governance infrastructure. Treat them identically to check scripts â€” never delete, rename, or empty them. A branch that removes process overlays disables behavioral rules for every subsequent task.
  - Run all check scripts at task start to baseline pre-existing failures: Before writing any implementation code, execute every script in `.hyperloop/checks/` and record which ones exit non-zero. Any check that already fails on the post-rebase branch is your responsibility to fix before submitting â€” check scripts scan the full codebase and a pre-existing violation blocks your task regardless of which task or commit introduced it. Do not discover inherited failures at submit time.
  - Fix inherited check violations before submitting â€” attribution is not an exemption: When a check script (e.g., `check-partial-error-assertions.sh`, `check-weak-test-assertions.sh`) fails on code you did not write, you must still fix the violation in a dedicated commit before submitting. For OR-chained assertions, split into one `assert` per spec-required component. For weak `in [list]` assertions on categorical fields, replace with strict `==` equality. Record the originating commit in the fix commit message for audit purposes (`Fix-Of: <sha>`). A FAIL verdict caused by code you inherited is not a verifier error â€” it is a submission error.
  - Never commit .hyperloop/state/ files to a task branch: Files under `.hyperloop/state/` (task state, review files, intake records) are orchestrator-managed metadata. Never `git add` them. Their presence in branch commits causes permanent 3-way merge conflicts during every rebase and reset, requiring a full branch abandon. Run `check-no-state-file-commits.sh` before submitting. If the check fails, you must rewrite history to remove the state files or start the branch over from the current `alpha` HEAD.
  - Strip inherited state-file commits before any implementation work: If `check-no-state-file-commits.sh` fails at task start because a PRIOR commit on the branch (not written by your task) mixed `.hyperloop/state/` deletions with implementation changes, fix it immediately via interactive rebase (`git rebase -i <merge-base>`) â€” remove or split the offending commit to excise the state-file changes while keeping the implementation changes intact. Do NOT proceed with task implementation while this violation is unresolved; doing so forces the verifier to inherit and block on it.
  - Vue component interaction handlers require direct test invocations â€” not just mount-and-render tests: After implementing any function in a Vue `<script setup>` block that handles user interaction (functions named with prefixes `handle`, `start`, `save`, `cancel`, `remove`, `toggle`, `open`, `close`, `submit`, or bound to a `@click`/`@submit`/`@change` event in the template), write a test that directly invokes or triggers that specific function â€” not merely one that mounts the component and checks rendered output. A test that mounts the component but never exercises `startEditNode()` provides zero coverage for that handler's branch logic. Before committing any Vue component, list every interaction handler function and confirm each one has a corresponding `it(...)` block that calls or triggers it.
  - Create the working branch before any other action: The very first action upon receiving a task is `git checkout -b task-NNN` (where NNN is the task ID from the task file frontmatter). Do not read the spec, run searches, or write any code before the branch exists. An agent whose future fails before branch creation leaves `branch: null` in the task state with no repository artifact, making the failure indistinguishable from a silent skip. The branch is the minimal diagnostic artifact the orchestrator needs to detect initialization-stage failures.
  - Check for an existing task branch before creating one: Before running `git checkout -b hyperloop/task-NNN`, run `git ls-remote --exit-code origin hyperloop/task-NNN 2>/dev/null` AND `git show-ref --verify refs/heads/hyperloop/task-NNN 2>/dev/null`. If either succeeds, a prior agent run already created the branch â€” DO NOT create a fresh branch. Instead, run `git checkout hyperloop/task-NNN` (or `git fetch origin hyperloop/task-NNN && git checkout hyperloop/task-NNN`), then run `git log --oneline alpha..HEAD` to audit what work exists. Assess existing commits before adding anything new. A `branch: null` orchestrator state does not mean the branch is absent â€” it means the orchestrator's future tracking lost the prior run. Creating a fresh branch when one already exists causes a `git checkout -b` error that aborts the agent without any useful artifact.
  - PR feedback loop: enumerate every open comment before writing code: When returning to a PR after a "pr-feedback-addressed" check failure, open the PR in the browser or via `gh pr view --comments <PR_NUMBER>` and list every unresolved review comment. For each comment write one sentence describing what code change will address it. Do not start writing code until every comment has a plan. After making changes, re-read each original comment and confirm the change satisfies it before reporting done. Submitting the same branch with zero new changes after a "pr-feedback-addressed" failure is a wasted round â€” always commit at least one targeted change per feedback comment.
  - DOO applies on every code path â€” including error handlers: Every new function that needs observability (routes, services, error handlers, `_build_*_response` helpers) must call a domain probe method rather than `logger.*` or `print()`. Before submitting, run `check-no-direct-logger-usage.sh`; a non-zero exit is a FAIL. If no probe method exists for the event, add one to the probe Protocol and its default implementation first.
  - Domain exceptions must be explicitly caught in route handlers â€” never rely on a catch-all: For every custom exception class defined in `domain/exceptions.py` or `ports/exceptions.py` that a service method can raise, every route handler invoking that service must have an explicit `except ExceptionType` clause mapping to the correct HTTP status code (e.g. 409 for duplicate-name conflicts, 422 for validation errors, 404 for not-found). A generic `except Exception â†’ 500` is not a spec-compliant response for any scenario described as "rejected with X error". Run `check-domain-exception-http-mapping.sh` before submitting.
  - Route-level unit tests are required for every domain exception path: For each `except ExceptionType` clause added to a route handler, write a companion unit test that mocks the service to raise that exception type and asserts the exact HTTP status code. A repo-level integration test that exercises the domain layer is NOT a substitute â€” the route-to-HTTP translation must be independently verified at the route unit test level.
  - Commit after each scenario passes â€” not in bulk at the end: Once you have a passing test and passing implementation for a single spec scenario, run `git commit` with a conventional message referencing the scenario (e.g. `test(management): key rotation retrieves old-key ciphertext`). Never accumulate all scenarios into one end-of-task commit. Per-scenario commits are recovery checkpoints: if the agent future fails mid-task, the next agent resuming from the recovered branch can `git log --oneline alpha..HEAD` to see exactly which scenarios are already covered and start from the next unimplemented one â€” without repeating finished work or unknowingly breaking already-passing tests.
  - On a recovered branch, audit then continue â€” never restart: When branch discovery (see rule about checking for existing task branches) finds an existing branch with commits, run `uv run pytest tests/unit -v 2>&1 | tail -20` to confirm which tests currently pass, then `git log --oneline alpha..HEAD` to list implemented scenarios. Cross-reference those commits against the spec's THEN blocks to identify the first unimplemented scenario. Begin implementation from that scenario â€” do not re-implement anything already committed and passing, as doing so risks introducing regressions in previously-green tests.
  - Run check-no-state-file-commits.sh a second time immediately before the final rebase: Orchestrator-managed workers (intake runs, reviews of other tasks) may operate while your task branch is checked out and inadvertently commit `.hyperloop/state/` files to it mid-task â€” not at task start. Run `check-no-state-file-commits.sh` again as the very first step of your pre-submit sequence (before `git rebase alpha`). If it fails, use `git log --oneline --diff-filter=A,M -- '.hyperloop/state/**' $(git merge-base HEAD alpha)..HEAD` to identify the offending commits, strip them via interactive rebase, and only then proceed with the alpha rebase. Discovering this violation after rebasing forces a second interactive rebase pass.
  - Prove rebase completion â€” do not merely assert it: After running `git rebase alpha`, immediately run `.hyperloop/checks/check-branch-rebased-on-alpha.sh` and confirm the output begins with `OK:`. A rebase command that exits 0 does not guarantee the merge-base moved (e.g., you may have run it on the wrong branch or in the wrong worktree). If the check still exits non-zero, you have NOT successfully rebased â€” diagnose and retry before submitting. A submission that claims "rebased" without a passing check will be verified and rejected.
  - Git operations are not persistent across worktrees or agent sessions â€” verify in-place: A `git rebase alpha` executed in a previous session, a different worktree, or on a different checkout has zero effect on the current working tree. The rebase must be executed in the current worktree's working directory and confirmed by running `check-branch-rebased-on-alpha.sh` in that same directory. "I rebased in a prior run" is not evidence of a current rebase.
  - Describe anti-patterns in test docstrings with prose, not literal code: When writing a test docstring that explains what bug the test guards against, describe the forbidden pattern in plain English rather than embedding the literal SQL, code snippet, or expression that check scripts scan for. For example, instead of writing `` `SET properties = (s.properties::text)::agtype` ``, write "a naive direct-assignment implementation (without jsonb merge) would silently drop existing properties". Literal anti-pattern code in docstrings triggers false positives in mechanical check scripts that cannot distinguish documentation from production code.
  - A fully-complete recovered branch requires no new code â€” only cleanliness confirmation: When branch audit finds a `record worker result as pass` commit (meaning a prior agent already verified this branch as passing), run `check-existing-verdict.sh` first. If it exits 0 (verdict: pass recorded), do NOT write any new implementation code. Instead: (a) rebase onto current alpha, (b) run all check scripts to confirm the branch is still clean, (c) if all pass, push and report the task done. Writing new code on top of a fully-passing branch risks introducing regressions â€” the correct action is to confirm cleanliness and submit. Only proceed to implementation if a check script fails or a spec THEN block has no corresponding test.
  - Push the branch to origin immediately after creation â€” before any other step: The second action after `git checkout -b hyperloop/task-NNN` is `git push -u origin hyperloop/task-NNN`. Do not read the spec, run searches, or inspect files before pushing. A branch that exists only locally has zero recovery value if the agent future fails in the next moment: the orchestrator can only discover branches via `git ls-remote`, which only sees pushed refs. An unpushed branch is invisible to recovery.
  - State-file fix completeness requires the script to output 'PASS' for ALL directions: The check-no-state-file-commits.sh script reports two independent categories â€” "ADDED / MODIFIED on this branch" (requires stripping from history via interactive rebase) and "DELETED from alpha on branch" (requires restoration via `git checkout alpha -- <file>`). Fixing only one category while the other remains causes the script to still exit non-zero. After each fix action, re-run the script and confirm it outputs "PASS: No .hyperloop/state/ files committed on this branch." before submitting. Do not claim the check passes without including that literal PASS line in evidence.
  - When state-file contamination spans more than 5 commits, prefer cherry-pick over interactive rebase: Interactive rebase over many contaminated commits is error-prone and leaves conflict artifacts. Instead, identify each delivery commit (commits that do NOT touch `.hyperloop/state/`) via `git log --oneline --diff-filter=\!A,M alpha..HEAD -- ':!.hyperloop/state'`, then run `git checkout alpha && git checkout -b hyperloop/task-NNN-clean`, cherry-pick each delivery commit in order with `git cherry-pick <sha>`, and confirm `check-no-state-file-commits.sh` outputs the literal PASS line before proceeding. This was the verified fix pattern for task-038, where 24 contaminated commits made interactive rebase impractical and a single cherry-pick of the actual delivery commit onto a fresh alpha branch resolved both the state-file and staleness failures in one step.
  - `@pytest.mark.skip` does NOT satisfy check-empty-test-stubs.sh â€” add `pytest.skip()` in the body: The check-empty-test-stubs.sh script only exempts `@pytest.fixture`-decorated functions. A test decorated with `@pytest.mark.skip` whose body contains only a docstring and/or a `# comment` has no executable statement and will be flagged as a stub. Always add `pytest.skip("reason â€” see unit test: path::Class::method")` as the first executable statement in the body. The call is self-documenting, makes the skip reason discoverable without reading the decorator, and satisfies the empty-stub check.
  - Run check-run-backend-suite.sh as the final pre-submit step â€” not individual checks: Run `bash .hyperloop/checks/check-run-backend-suite.sh` as a single command immediately before reporting done. This runs ALL backend checks in the required order at a consistent point in time. Running individual check scripts across a long session allows alpha to advance or state files to accumulate between checks, producing stale results. The suite script timestamp in its output header is the evidence that checks were run at submission time.
  - Exclude state files from git's view at branch creation time: Immediately after pushing the task branch (the second action, per the push rule), run `echo '.hyperloop/state/' >> .git/info/exclude` to make git treat state files as untracked-and-ignored for the life of this worktree session. This is a local-only setting that prevents `.hyperloop/state/` files from appearing in `git status` and being swept up by `git add .` or `git add -A`. It does not affect other worktrees or the remote.
  - Rebase onto current alpha after every 5 task commits â€” do not wait until submission: Each time `git log --oneline alpha..HEAD | wc -l` shows 5 more commits than the last rebase, immediately run `git rebase alpha` and confirm `check-branch-rebased-on-alpha.sh` exits 0 before adding any new commits. Alpha advances continuously; a branch that accumulates 20+ commits of drift requires a multi-conflict rebase at submission time, which is the failure pattern seen in task-032 (30 behind) and task-034 (24 behind). Incremental rebases â€” each spanning only a handful of alpha commits â€” are near-zero-conflict and prevent this accumulation entirely.
  - Run check-no-state-file-commits.sh AFTER `git rebase alpha` as well as before: A rebase that resolves conflicts touching `.hyperloop/state/` paths can silently re-introduce state files if the conflict is resolved by keeping the incoming (alpha) state. After `git rebase alpha` completes and `check-branch-rebased-on-alpha.sh` confirms PASS, immediately run `check-no-state-file-commits.sh` before pushing. If it fails post-rebase, a rebase conflict was resolved incorrectly â€” fix with an additional interactive rebase pass to excise the re-introduced state files before submitting. Task-032 had four state-file commits; a post-rebase state-file check catches any that survive or re-enter during conflict resolution.
  - Verify the state-file exclude is active immediately after branch push: After `git push -u origin hyperloop/task-NNN`, run `bash .hyperloop/checks/check-git-state-exclude.sh`; if it exits non-zero, run `echo '.hyperloop/state/' >> "$(git rev-parse --git-dir)/info/exclude"` and re-run until the check passes before taking any other action. The orchestrator writes to `.hyperloop/state/` continuously in the background â€” without the exclude, any subsequent `git add .` or `git add -A` silently stages these files into task commits, creating permanent rebase conflicts that require a full branch abandon to fix (the failure pattern in task-034: 4 state-file commits across 4 worker-crash sessions).
  - On a recovered branch, rebase onto current alpha before reading any commits or running any checks: When you discover an existing task branch (per the branch-discovery rule), run `git rebase alpha` as the absolute first action â€” before `git log`, before reading the spec, before any check-script baseline run. A recovered branch can be dozens of commits behind alpha; baseline checks run before rebasing produce stale-branch false-positives (e.g., a 403â†’404 fix already on alpha appears as a pre-existing failure on the stale branch), causing wasted fix effort on code the task never touched. Confirm with `check-branch-rebased-on-alpha.sh` before proceeding.
  - Re-establish the .hyperloop/state/ exclude on every session restart for an existing branch: After entering any worktree or starting any new agent session on an existing task branch â€” including after a crash, re-assignment, or worktree recreation â€” run `echo '.hyperloop/state/' >> $(git rev-parse --git-dir)/info/exclude` then `bash .hyperloop/checks/check-git-state-exclude.sh` as the very first action, BEFORE any git status, git log, spec reading, or code writing. The exclude entry is local to the worktree and does NOT persist across worktree recreation or new sessions; unlike the new-branch rule (which covers initial push), this rule covers every subsequent session. Omitting this step was the exact cause of task-034's four state-file contamination commits: four crash-recovery sessions each entered the worktree without the exclude, and four subsequent `git add .` calls silently staged orchestrator state files.
  - When resuming after a FAIL verdict, run the failing checks first â€” before any other action: When a prior verifier report listed specific checks that exited non-zero (e.g., `check-branch-rebased-on-alpha.sh`, `check-no-state-file-commits.sh`), your very first action in the new session is to run those exact scripts and confirm they output their literal PASS lines. Do NOT read the spec, write code, or run the full suite until every check that failed in the prior verdict now passes. A claimed fix that is not verified by the relevant check script in the current session is not a fix â€” it is an assertion that will fail the verifier in the next round, wasting another full cycle. This was the failure pattern in task-038: the implementer claimed cherry-pick was executed but the check still exited non-zero in the re-verification round.
  - Verify task dependencies are satisfied before creating a branch: As the absolute first action upon receiving any task, run `bash .hyperloop/checks/check-deps-satisfied.sh <task-NNN>`. If the script exits non-zero (any dep's status is not 'done' AND the dep's branch is not merged into alpha), write a single-line report naming the unsatisfied dep, do NOT create a branch or read the spec, and stop. An agent that attempts to implement a task whose dep is incomplete will encounter missing interfaces or domain objects and crash mid-work, producing the "Agent future missing or failed" signature with `branch: null` and wasting a full implementation round.
  - A WARN from check-deps-satisfied.sh means stale state â€” proceed but document it: When `check-deps-satisfied.sh` exits 0 but its output contains "WARN: â€¦ state shows 'â€¦' but its branch is already merged into â€¦", the dep's code IS available in alpha even though the orchestrator state file has not been updated yet. Create your branch normally and proceed with implementation. In your first commit message, include a note such as "Note: dep task-NNN state shows in-progress but its branch is merged into alpha (stale orchestrator state)." Do NOT report BLOCKED for a WARN-only result â€” only a non-zero exit from check-deps-satisfied.sh triggers the BLOCKED disposition.
  - Exact task startup sequence â€” follow this order precisely: (1) Run `bash .hyperloop/checks/check-deps-satisfied.sh <task-NNN>`. If it exits non-zero â†’ write "task-NNN is BLOCKED pending <dep> (status: X)" and stop â€” do NOT proceed. (2) Run `git ls-remote --exit-code origin hyperloop/task-NNN 2>/dev/null` AND `git show-ref --verify refs/heads/hyperloop/task-NNN 2>/dev/null` to check if a branch already exists. (3a) If NO branch exists â†’ `git checkout -b hyperloop/task-NNN` then `git push -u origin hyperloop/task-NNN`. (3b) If branch EXISTS â†’ `git checkout hyperloop/task-NNN`, then re-run the dep check (see rule "Dep check applies after discovering an existing task branch too"), and audit commits. (4) Run `echo '.hyperloop/state/' >> $(git rev-parse --git-dir)/info/exclude`. This four-step sequence supersedes any individual rule that claims to be "the very first action" or "the very next action" â€” the dep check ALWAYS precedes branch creation. A crash during git checkout -b (because the branch already exists) is the primary cause of "Agent future missing or failed"; step 2 prevents it.
  - A dep check failure is a BLOCKED report â€” not a FAIL: When `check-deps-satisfied.sh` exits non-zero, the correct response is to write a one-line blocker message ("task-NNN is BLOCKED pending task-MMM (status: X)") and stop immediately â€” do not create a branch, do not read the spec, do not submit an empty PR. The orchestrator needs to see a BLOCKED disposition so it can re-queue the task after the dep is resolved rather than looping the implementer indefinitely.
  - Dep check applies after discovering an existing branch too: After `git checkout hyperloop/task-NNN` on a discovered existing branch (per the branch-discovery rule), run `bash .hyperloop/checks/check-deps-satisfied.sh task-NNN` BEFORE reading any commits, inspecting any files, or writing any code. If it exits non-zero, do NOT add any implementation commits â€” write "task-NNN is BLOCKED pending task-MMM (status: X)" and stop. An existing branch with no implementation commits is not evidence that deps were once satisfied; the agent that created it may have crashed before the dep check or been the process-improvement agent. Skipping this check on a discovered branch produced the task-015 "Agent future missing or failed" failure where the implementer found the branch, skipped the dep check, and crashed into missing interfaces.
  - DI factory must wire every new service dependency â€” None defaults are not production wiring: When you add a new parameter to an application-layer service `__init__`, immediately run `grep -rl 'ServiceClassName' src/api/*/dependencies/` and update EVERY matching factory to pass the real implementation. A `| None = None` default exists for test injection convenience only â€” production live requests go through the factory, not through test code. If the factory is not updated, the feature is silently disabled in production even though all unit tests pass.
  - Verify DI wiring before committing the service change: After modifying a service constructor, open the corresponding `src/api/<context>/dependencies/<resource>.py` file and confirm the factory call passes the new parameter. Use `data_source.py` as the reference pattern: `secret_store = FernetSecretStore(session=session, encryption_keys=encryption_keys)` then `DataSourceService(..., secret_store=secret_store)`. Run `check-di-wiring-updated.sh` before committing â€” it will flag any factory left unmodified.
  - Final pre-submit sequence is three steps in strict order â€” no other actions between them: (1) `git rebase alpha`, (2) `bash .hyperloop/checks/check-run-backend-suite.sh`, (3) push and report done. No commits, no file reads, no git pulls, no spec re-checks may occur between these three steps. Any action that modifies HEAD or fetches remote state invalidates the suite result and requires restarting the sequence from step 1. The task-032 round-8 false PASS was caused by actions taken after the last suite run and before the verdict commit, allowing alpha to advance 30 commits undetected â€” a window of exactly the kind this rule closes.
  - When the task state file shows `phase: merge-pr`, read the PR URL from the state file first: After the standard startup sequence (dep check, branch discovery, state-file exclude), read `pr:` from the task state file. Run `gh pr view <PR_NUMBER> --comments` to list ALL open review threads before touching any code. Do NOT inspect the branch's existing commits, run check scripts, or write any code until you have enumerated every unresolved thread and written a one-sentence plan for each. A merge-pr task has surviving PR feedback by definition â€” proceeding without enumerating it repeats the failure pattern that caused task-003 to cycle through 8 consecutive pr-feedback-addressed failures.
  - Enumerate and plan every PR review thread before writing any code in merge-pr phase: For each unresolved thread returned by `gh pr view <PR_NUMBER> --comments`, write: (a) the thread title/body (first 2 sentences), (b) the specific file and line it references if applicable, (c) one sentence describing the code change that will satisfy it. Only after every thread has an explicit plan may you begin writing code. Address each thread with a dedicated commit whose message references the thread (e.g., `fix(graph): address PR thread â€” remove synchronous db call in mutation handler`). Never address multiple unrelated threads in a single commit.
  - Run check-pr-open-threads.sh as the final pre-submit step for merge-pr tasks: After `check-run-backend-suite.sh` passes and before pushing, run `bash .hyperloop/checks/check-pr-open-threads.sh`. If it exits non-zero, do NOT push or report done â€” return to the PR, address the listed pending threads, and re-run the full pre-submit sequence from step 1 (`git rebase alpha`). A submission with unresolved PR threads will fail the orchestrator's `pr-feedback-addressed` check and waste an entire round. The check-pr-open-threads.sh output is the only reliable evidence that every thread is resolved.
  - Cascade credential cleanup is unconditional â€” don't wait for the spec to say it: When a `delete` method cascades to child entities, grep the child domain class for a `credentials_path` attribute. If it exists, call `secret_store.delete(path=child.credentials_path, tenant_id=...)` for EVERY child that has one, BEFORE calling `repo.delete(child)`. This rule applies regardless of whether the spec text mentions "credentials" or "encrypted secrets" in the deletion scenario. Write an explicit test asserting `mock_secret_store.delete` was called for each credential-bearing child; asserting only `mock_repo.delete` is incomplete. Run `check-cascade-delete-cleanup.sh` before submitting.
  - A SHALL library in pyproject.toml is not implemented until it is imported and called: When a spec says "SHALL use X framework", adding X to `pyproject.toml` is a prerequisite â€” not the implementation. You MUST write at least one `import X` statement in production code and invoke the framework in the relevant code path. Deferring the integration via a docstring comment (e.g., "dlt integration deferred to a future task") is the same as not implementing the requirement. Run `check-deferred-integration.sh` before submitting; if it flags any deferral language, either implement the integration or raise a formal blocker at `.hyperloop/blockers/task-NNN-blocker.md` â€” never ship deferred docstrings.
  - Intake-file contamination means cherry-pick regardless of count: When `check-no-state-file-commits.sh` flags any file under `.hyperloop/state/intake/`, those files were written by the orchestrator intake process â€” not by your task. Do NOT attempt interactive rebase to excise them (it cannot cleanly separate your commits from an external agent's commits). Always use the cherry-pick approach: identify delivery commits with `git log --oneline $(git merge-base HEAD alpha)..HEAD -- ':!.hyperloop/state'`, then `git checkout alpha && git checkout -b hyperloop/task-NNN-clean && git cherry-pick <delivery-shas>`. This rule supersedes the ">5 contaminated files" threshold â€” one intake file is enough to require cherry-pick.
  - Indirect cascade deletes require explicit secret_store injection: When a service delete method calls `_ds_repo.delete(ds)` (or any DataSource-repository delete) for each child, it is performing an indirect cascade deletion â€” the service MUST inject `ISecretStoreRepository` and call `_secret_store.delete(path=ds.credentials_path, tenant_id=...)` for each child with a non-None `credentials_path`, BEFORE calling `repo.delete(ds)`. A service that forwards directly to `repo.delete()` without first cleaning credentials silently orphans encrypted blobs. Run `check-cascade-delete-cleanup.sh` before committing any delete method that touches a DataSource repository.
  - Force-push clean branch to original branch name after cherry-pick cleanup: After cherry-picking delivery commits onto `hyperloop/task-NNN-clean` and confirming both `check-no-state-file-commits.sh` and `check-branch-rebased-on-alpha.sh` output their literal PASS lines, run `git push origin hyperloop/task-NNN-clean:hyperloop/task-NNN --force-with-lease`. This overwrites the contaminated branch with the clean content, keeping the existing PR and orchestrator task state valid without requiring a new PR or branch rename. Do NOT leave the existing PR pointing to a contaminated branch â€” the force-push is the final mandatory step of the cherry-pick remediation.
  - Orchestrator-authored task state files require cherry-pick, not interactive rebase: When `check-no-state-file-commits.sh` flags any file matching `.hyperloop/state/tasks/<other-task>.md` â€” where the task ID is NOT the current task â€” treat it as external orchestrator contamination and apply the cherry-pick remedy from rule 102, even when no `.hyperloop/state/intake/` files are present and the total contaminated file count is below 5. The orchestrator writes these files while your branch is checked out; interactive rebase will encounter conflicts at each cherry-pick step because the contaminating commit was authored by a different process. Identify delivery commits with `git log --oneline $(git merge-base HEAD alpha)..HEAD -- ':!.hyperloop/state'`, then create a fresh alpha branch and cherry-pick.
  - Include a Spec-Ref trailer in every commit when the task state file is missing: If `check-deps-satisfied.sh` outputs "WARN: Task file not found" (no `.hyperloop/state/tasks/task-NNN.md` exists), the verifier has no state file from which to recover the spec reference. To enable verifier spec recovery, every commit on the branch MUST include a `Spec-Ref: <path-to-spec-file>` trailer (e.g., `Spec-Ref: specs/iam/tenants.spec.md`). Without this trailer the verifier cannot determine which THEN blocks to evaluate and will fail. The Spec-Ref trailer is already a convention â€” this rule makes it mandatory when the state file is absent rather than merely recommended.
  - Suite FAIL is a hard stop â€” never report done with failing checks: When `check-run-backend-suite.sh` outputs `RESULT: FAIL`, the task is NOT done regardless of spec scenario coverage percentage. Every check listed under `FAILED` must be fixed in a dedicated commit (with a `Fix-Of: <sha>` trailer if fixing an inherited violation). Do not write a submission report, do not push for review, and do not claim the task complete while ANY check in the suite exits non-zero. A task report that references a suite with `RESULT: FAIL` will be rejected by the verifier â€” fixing the checks costs one commit; discovering the failure in a re-verification round costs a full cycle.
  - New check scripts must include `--exclude-dir=.venv` on every `grep --include=` call: When writing any new check script that uses `grep --include=` (or `grep -r` scanning source files), include `--exclude-dir=.venv` alongside every other exclusion (e.g., `--exclude-dir=node_modules`, `--exclude-dir=dist`). Omitting `.venv` causes the script to scan Python virtual-environment packages, producing false positives from third-party code that the task never touched. After writing any new check script, run `check-no-check-script-deletions.sh` before committing to confirm the new script passes the `.venv`-exclusion guard.
  - pytest_env network-location vars must use skip_if_set = true: When adding or modifying any `[tool.pytest_env]` entry in `src/api/pyproject.toml` whose name contains `ENDPOINT`, `PORT`, `HOST`, `URL`, `URI`, `ADDR`, or `ADDRESS`, use `{ value = "...", skip_if_set = true }` â€” never a bare string literal. Bare strings override the isolated-instance environment set by `make instance-up`, causing all SpiceDB and database integration tests to fail with SSL or connection errors on the wrong port. Run `check-pytest-env-skip-if-set.sh` before committing any change to `pyproject.toml`.
  - Run check-domain-aggregate-mocks.sh after each new test scenario â€” not only at final submit: After writing each new `test_*` method in a service-layer or application-layer test file, immediately run `bash .hyperloop/checks/check-domain-aggregate-mocks.sh src/api/tests` before writing the next test. Discovering violations at final-suite time forces you to audit many tests at once; discovering them per-scenario means a one-line fix before moving on.
  - Search the current test file for factories before any MagicMock: Before writing `SomeAggregate = MagicMock()` or `MagicMock(spec=SomeAggregate)` in a test file, run `grep -n '_make_' <current_test_file>`. If a factory (e.g., `_make_kg()`) exists for ANY aggregate in the same file, create a parallel `_make_ds()` or `_make_other()` following the exact same pattern rather than defaulting to a mock. The existing factory is the reference â€” use it.
