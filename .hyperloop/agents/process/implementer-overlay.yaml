apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - Error-path first: For every spec THEN block that mentions failure, rollback, retry, "not called", or "rolled back", write the failure-path test BEFORE the implementation — not after. If you cannot find a failure-path test for a rollback/atomicity requirement, you have not finished.
  - Enumerate THEN blocks: Before writing any code, list every THEN condition in the scenario being implemented. Mark each one as needing a test. Do not mark the task complete until every THEN condition has a corresponding test — including failure branches.
  - No "Coming Soon" submissions: Placeholder stubs, "coming soon" markers, or stubbed API calls that emit a toast instead of calling the real API are NOT acceptable implementations of a spec scenario. If a scenario cannot be fully implemented in this task's scope, raise a blocker rather than submit a stub.
  - Frontend TDD is mandatory: Vue/UI work is not exempt from TDD. For each UI scenario, write at least one component or unit test (vitest + @vue/test-utils or playwright component test) that exercises the scenario's behavior before writing the component code.
  - Frontend test infrastructure comes first: If `src/dev-ui/package.json` does not already contain `vitest`, add it (plus `@vue/test-utils`) as the very first commit of any UI task — before writing any `.vue` files. You cannot satisfy TDD without a test runner in place.
  - No placeholder comments for missing spec scenarios: HTML comments like `<!-- Future: ... -->` or code comments like `// Future:` or `# Future:` are NOT acceptable substitutes for implementing a spec scenario. If a scenario is genuinely out of scope for this task, create `.hyperloop/blockers/task-NNN-blocker.md` describing the dependency and raise it with the orchestrator before submitting.
  - Rollback tests must use mocks that raise: A test for "rolls back on failure" must mock the failing dependency to actually raise/reject mid-operation and then assert that subsequent operations were NOT called and that the aggregate/database state is unchanged. A test that only checks happy-path ordering does not satisfy a rollback THEN condition.
  - Idempotency has TWO required test sub-cases: When a spec mentions "idempotent", "duplicate delivery", or "retry" in a THEN block, you MUST write (a) a filtering test asserting already-processed entries are excluded from re-delivery, AND (b) a re-execution test that invokes the handler/worker TWICE with the same event and asserts the final state is identical to a single successful run with no duplicate side effects. Testing only (a) is PARTIAL — the scenario is not COVERED until (b) exists.
  - Integration test status codes must match the spec AND the unit test: Before writing an integration test for any authorization or error scenario, look up (a) the exact HTTP status code stated in the spec's THEN block and (b) the unit test for the same route handler. If the spec says 404 (e.g., "no distinction between unauthorized and missing"), the integration test MUST assert 404 — not the intuitive 403. Mismatches between unit and integration test assertions for the same route are a defect.
  - Verify npm package versions exist before committing: When writing or updating a version constraint in `package.json`, run `pnpm view <pkg>@<version> version` (or `npm info`) to confirm the version exists in the registry. A constraint that resolves to nothing (e.g. `vitest@^2.2.5` when 2.x topped at 2.1.9) makes `pnpm install` fail silently — the tests have never run.
  - onMounted is mandatory for data-loading pages: Any Vue component that displays a list of entities fetched from an API must wire its load function to an `onMounted` hook. A `loadXxx()` function that is only reachable via user-action handlers means the page is perpetually empty on initial load — that is a stub, not an implementation.
  - Never leave stub function bodies when the required API already exists: A function that returns `[]`, `{}`, or `null` with a comment like "when routes are available, this will be fetched" is a stub. Before writing such a body, verify whether the API endpoint already exists in the codebase. If it does, implement the call; if it does not, raise a formal blocker instead.
  - Strict equality for categorized error types: Assertions on `error_type`, `status`, or any other enumerated categorical field must use `==` (exact equality), never `in [list]`. The assertion `error_type in ["timeout", "execution_error"]` allows a misclassified timeout to pass undetected — the entire point of error categorization tests is to enforce the exact category.
  - Negative behavioral contracts require explicit negative tests: When a spec THEN block says "shall NOT log the raw query", "redacted (not the raw value)", or "must not expose X", write an assertion that the prohibited value is absent from all observable outputs (e.g., assert the raw string does not appear in any logger call args). Absence of a negative assertion means the contract is only enforced by convention.
  - Cascade deletes must clean up ALL external resources: When a spec requires cascade deletion of child entities, enumerate every external resource held by those children (Vault secrets via `credentials_path`, object-store files, queue messages). Each external resource must be explicitly deleted before the DB record is removed, and a test must assert the cleanup call was made. Deleting only the DB row while leaving Vault secrets is an incomplete implementation.
  - Cross-task deferral comments are stubs — never ship them: A comment saying "will be wired to the API in task-NNN" or "will be populated once [X] API exists" paired with a no-op handler or empty `ref([])` is a stub. Before deferring, verify whether the required API endpoint already exists in the codebase. If it does, implement the call in this task. If it genuinely does not exist yet, raise a formal blocker at `.hyperloop/blockers/task-NNN-blocker.md` and remove the placeholder code entirely — do not ship a fake-working UI.
  - Success notifications require a preceding API call: Never emit `toast.success(...)`, `$notify({ type: 'success' })`, or any equivalent success notification from a handler that makes no outbound API call. A "Created!" toast without a real API write is a lie to the user. If the endpoint is missing, remove the notification and raise a formal blocker instead.
  - Confirmation dialogs are required when the spec says "must confirm": When a spec THEN block says "the user must confirm before the change is applied", implement an explicit confirmation modal or dialog with a user-triggered confirm action. An informational `<Alert>`, `<Banner>`, or `<Badge>` element is not a confirmation gate — it does not block the action. The confirmation dialog must be present before any destructive operation is performed.
  - TypeScript entity interfaces must include every spec-visible field: Before finalizing a TypeScript interface for an entity (e.g., `SyncRun`, `KnowledgeGraph`), enumerate every field referenced in THEN blocks across all spec scenarios for that entity. A missing field (e.g., no `logs` on `SyncRun` when the spec has a "detailed logs" scenario) means the scenario cannot be implemented without an interface change — discover this before writing component code, not after.
  - Integration tests must mirror the spec's exact GIVEN→WHEN→THEN sequence: Establish all pre-conditions stated in GIVEN, then perform the single trigger action in WHEN, then assert the THEN outcomes. Never reverse the order even when the end state is reachable via a different sequence — a reversed test validates end-state equality, not the causal chain the spec requires. Write the GIVEN state, commit it to the system (e.g., call the real API or service), then perform the WHEN action, then assert. If the spec says "GIVEN a group assigned to a workspace WHEN a new member is added THEN the member has workspace access", the group must be in the workspace BEFORE the member is added — not after.
  - Trace all callers before adding validation to an existing domain method: When adding a new constraint to an existing method on a domain object (e.g., `validate_operation()`, `validate()`, `apply_batch()`), use `grep -r` to find every call site in the codebase. For each caller, verify it already provides the newly required data. A caller that cannot satisfy the new constraint is a regression you must fix in the same commit — do not leave broken callers behind.
  - Remove legacy routes when the spec mandates all-operations enforcement: When a spec contains "SHALL require X for all [operation]" (e.g., "all mutations require a KnowledgeGraph"), search for any existing route, handler, or entry point that processes that operation without enforcing X. Remove or update every such bypass in the same task. Leaving a spec-violating legacy route is not acceptable even if it was "already there."
  - At least one non-mocked path per domain validation change: When adding or modifying validation logic in a domain value object or aggregate, write at least one test that exercises the real domain object (not a mock of it) through a real caller. A test suite where every call to `validate_*` is intercepted by a `Mock()` or `AsyncMock()` cannot catch validation regressions on existing call paths.
  - Prefer `Mock(spec=Class)` over bare `Mock()` for application-layer collaborators: When a test must mock a service, applier, or repository, use `Mock(spec=RealClass)` rather than bare `Mock()`. Spec-d mocks enforce the real interface and will raise `AttributeError` on invented methods, surfacing regressions that bare mocks silently swallow. Bare `Mock()` is only acceptable for infrastructure boundaries with no domain logic (e.g., HTTP clients).
  - Selector state must be forwarded all the way to the composable call: After implementing any UI selector that loads entities from an API and binds to a `selectedXxx` ref, open every action handler that is scoped by that selector and confirm `selectedXxx.value` (or `|| undefined`) is passed as an explicit argument to the composable or API function — a selector whose value is present in the template binding or a computed display label but absent from the `await composableFn(...)` call line does nothing.
  - Tests for argument forwarding must mock the real composable, not re-implement it locally: When a spec scenario requires that a selected-state value be forwarded to a composable call, `vi.mock()` the composable module, trigger the component action in the test, and assert `expect(mockFn).toHaveBeenCalledWith(expect.objectContaining({ field: expectedValue }))` — a local standalone function defined inside the test that mimics the composable's logic and is called directly proves the algorithm is correct but cannot detect that the real component never passes the argument.
  - Assert every spec-named component of a structured output individually: When a THEN block specifies multiple required parts of an output (e.g., "error is reported WITH the line number AND a content preview"), write one assertion per required component — never a single OR-chained assertion that passes when only one component is present. An `assert "X" in msg or "Y" in msg.lower()` test passes even if the implementation emits neither X nor Y as the spec intended; each component must have its own `assert` that fails independently.
  - Ordering/sequencing methods require a dedicated mixed-input unit test: When you implement a method that sorts or partitions operations by type (e.g., DEFINE→DELETE→CREATE→UPDATE), write at least one unit test that constructs a list with ALL operation types in scrambled order and asserts the exact resulting sequence. Relying on integration tests that use homogeneous batches (all DELETEs, all CREATEs) does not verify the sort contract — a bug that swaps DELETE and CREATE priorities will pass every homogeneous test undetected.
  - Assert ALL saved-object fields named in the THEN block: When a THEN block says "the system stores X with fields A, B, and C", every named field (A, B, AND C) must appear in an assertion. Asserting only a subset (A and B) leaves field C untested; if the implementation later drops C, no test fails. After writing the happy-path test, re-read the THEN block and confirm there is one `assert` for each property the spec names.
  - Default-value specs require forwarding tests, not just status-code tests: When a spec states "the default value of X is Y if unspecified", write a test that (a) omits the field from the request/call body and (b) asserts the downstream service or function was called with the default value (e.g., `mock_service.create.assert_called_once_with(..., x=Y)`). A correct `Field(default, ...)` in Pydantic plus a 201 status-code assertion does NOT satisfy this requirement — you must verify the default was forwarded through every layer the spec describes.
  - AND-clause THEN blocks require a single chained test: When a spec THEN block contains multiple outcomes connected by "AND" (e.g., "the key is revoked AND remains visible in listings with `is_revoked=True`"), write one test that performs the full sequence (e.g., revoke → list → assert `is_revoked=True`) rather than two isolated tests that each verify one half. Separate tests prove each outcome is reachable in isolation; they cannot verify the system produces both outcomes together from the same starting state.
  - Integration test coverage must be symmetric across all sub-cases in a scenario: When a spec scenario lists multiple sub-cases (e.g., valid key → 200, expired key → 401, revoked key → 401) and an integration test already exists for any one sub-case, write an integration test for every other sub-case. Unit tests at individual layers (service, middleware) are supplementary — they do not substitute for an end-to-end test when the happy-path sub-case already has one.
  - Domain aggregates must be real instances — never MagicMock: When a test in a service-layer test file needs a domain aggregate (e.g., DataSource, KnowledgeGraph, SyncRun, ApiKey), instantiate it using the real constructor or a factory helper (e.g., `_make_ds()`, `_make_kg()`). Before writing a new factory, search sibling test files in the same bounded context for an existing one and import it. MagicMock() for a domain aggregate hides validation logic; `MagicMock(spec=DomainClass)` is acceptable only when the test needs the interface but not the invariants. Infrastructure collaborators (session, probe, client) remain exempt.
  - Never delete passing tests: Do not delete test files or remove test functions/methods from existing test files. If a test is failing because the spec changed, update the test to match the new spec — never delete it. If a test covers a scenario that is now genuinely out of scope, create a formal blocker file at `.hyperloop/blockers/task-NNN-blocker.md` and restore the test intact. Run `check-no-test-regressions.sh` before submitting.
  - Never delete or disable check scripts: Files in `.hyperloop/checks/` are process enforcement infrastructure shared across every task. Never delete, rename, or disable them. Never remove `--exclude-dir=.venv` from `grep` commands inside check scripts — removing it causes virtual-environment hits that produce false positives and silently mask real failures.
  - Audit for source regressions before submitting: Run `git diff --name-only --diff-filter=D $(git merge-base HEAD alpha)` to confirm no application source files have been deleted and `check-no-source-regressions.sh` to confirm no public methods have been removed. Every deletion must map to an explicit spec requirement — if you cannot find the requirement, restore the code.
  - Never remove test infrastructure: Do not remove `vitest`, `vitest.config.ts`, `@vue/test-utils`, or any test runner configuration from `package.json` or the project. If a config file needs to be updated, update it — do not delete it. Deleting test infrastructure makes it impossible to run tests and is treated the same as deleting the tests themselves.
  - Verify commits exist before reporting done: Before marking a task complete, run `git log --oneline <base>..HEAD` and confirm at least one commit appears. A branch with zero commits vs the base means nothing was implemented — do not submit.
  - Empty test stubs are not implementations: A test function whose body is only a docstring and/or `pass` passes trivially and tests nothing. Run `check-empty-test-stubs.sh` before submitting; any flagged function must have a real body with at least one `assert`, mock assertion call, or `pytest.raises` block before you may report the task done.
  - Graceful shutdown means draining, not cancelling: When a spec THEN block says "in-progress [work] completes before shutdown" or describes a "graceful" stop for a background worker, the `stop()` method MUST set a stop flag (e.g., `_running = False`) and then `await` the running task WITHOUT calling `task.cancel()`. `task.cancel()` raises `CancelledError` at the next `await` point and interrupts mid-batch; it does not allow the current work unit to finish naturally. Only after setting the flag should you `await task` so the loop exits on its own after completing the in-flight unit.
  - Shutdown tests must have real work in-flight: When writing a test for a "graceful shutdown" or "in-progress work completes before shutdown" THEN block, the test MUST (a) start the background task with a handler that takes a measurable amount of time (e.g., an `asyncio.Event`-gated coroutine), (b) trigger shutdown while the handler is still running, and (c) assert the handler completed AND the result was committed before `stop()` returned. A test that only mocks the worker, calls `stop()`, and checks `_running == False` does NOT verify graceful draining and is PARTIAL for this THEN condition.
  - Every Vue page file requires a test file before the page is committed: When creating any new file under `pages/` (e.g., `pages/graph/schema.vue`), create a corresponding test file in `tests/` whose name includes the page domain (e.g., `tests/schema.test.ts`) BEFORE writing the page component. A page with no test file is a TDD violation regardless of how complete the component looks. Run `check-pages-have-tests.sh` to verify before committing.
  - Enumerate ALL spec scenarios for each page before writing the component: When implementing a spec requirement section (e.g., "Schema Browser", "Graph Explorer"), open the spec file and list every GIVEN/WHEN/THEN scenario it describes. Write a failing `describe`/`it` block for EACH scenario in the test file before writing any component code. A test file that covers 2 of 5 spec scenarios for a page is not TDD — it is cherry-picking. Every scenario must have a test, even if it is initially a failing placeholder.
  - Spec SHALL requirements mandate test-first coverage for every sub-scenario: When a spec section begins with "SHALL provide" or "SHALL support", enumerate all distinct user scenarios in that section and write a failing test for each before any implementation code. A page that implements all scenarios but only tests one or two is incomplete. Do not submit until `check-pages-have-tests.sh` passes AND every sub-scenario from the spec section has a corresponding `it(...)` block.
  - Property-preserving merge tests must use asymmetric data: When a spec says "existing properties are preserved" (or describes idempotent CREATE/update semantics), the test MUST use a DIFFERENT set of properties in the second operation — at least one property present in the first call must be absent from the second. Identical data in both calls cannot distinguish merge from replace, making the bug invisible.
  - SQL JSON property updates that preserve existing data must use the jsonb merge operator: When writing SQL that updates an existing JSON/AGTYPE column with "preserve existing" semantics, use `(existing_col::text)::jsonb || (new_col::text)::jsonb` — never direct assignment (`SET col = new_value`), which silently replaces all existing properties. Run `check-property-merge-semantics.sh` before submitting.
  - Rebase onto current `alpha` before submitting: Run `git rebase alpha` as the final step before reporting done. A branch that diverged from `alpha` more than a few commits ago inherits stale assertions in files your task never touched — these produce false-positive check failures (e.g., a 403 already corrected to 404 in `alpha` still appears wrong on a stale branch). Run `check-branch-rebased-on-alpha.sh` and resolve any staleness before submitting.
  - Run the frontend test suite before submitting: After completing all frontend work, run `cd src/dev-ui && CI=true pnpm run test` and confirm every test passes. A test that imports a named export which does not exist in the source module will produce a `TypeError` at runtime — this is a failing test, not a type error caught at build time, and it will not be caught by check-frontend-tests-exist.sh. Do not submit with any failing frontend tests.
  - Commit package.json and pnpm-lock.yaml together: Whenever you add, remove, or change a version constraint in `src/dev-ui/package.json`, run `cd src/dev-ui && pnpm install` immediately and commit the updated `pnpm-lock.yaml` in the SAME commit as the `package.json` change. Never commit a package.json modification without the corresponding lockfile update — a stale lockfile causes `pnpm install --frozen-lockfile` to fail even when the package name appears in the lockfile as a transitive dependency.
  - Branch reset must start from current alpha HEAD: When a rebase or merge operation fails repeatedly, the ONLY safe reset procedure is `git checkout alpha && git checkout -b <new-branch-name>`. Never start a reset branch from a local snapshot, a stale tag, an older feature branch, or any commit that predates the current `alpha` HEAD. Starting from a stale base silently drops every task merged into alpha since that base, erasing previously-shipped work without any deletion commit to detect.
  - Run all three regression checks immediately after any branch reset: After executing a branch reset (or after resolving merge conflicts that required force-resetting), run `check-no-source-regressions.sh`, `check-no-test-regressions.sh`, and `check-no-check-script-deletions.sh` against alpha BEFORE writing the first line of task implementation code. If any check fails at this point, you have started from a wrong base — fix the base before proceeding.
  - Never delete `.hyperloop/agents/process/` files: The overlay YAML files and `kustomization.yaml` in `.hyperloop/agents/process/` are process governance infrastructure. Treat them identically to check scripts — never delete, rename, or empty them. A branch that removes process overlays disables behavioral rules for every subsequent task.
  - Run all check scripts at task start to baseline pre-existing failures: Before writing any implementation code, execute every script in `.hyperloop/checks/` and record which ones exit non-zero. Any check that already fails on the post-rebase branch is your responsibility to fix before submitting — check scripts scan the full codebase and a pre-existing violation blocks your task regardless of which task or commit introduced it. Do not discover inherited failures at submit time.
  - Fix inherited check violations before submitting — attribution is not an exemption: When a check script (e.g., `check-partial-error-assertions.sh`, `check-weak-test-assertions.sh`) fails on code you did not write, you must still fix the violation in a dedicated commit before submitting. For OR-chained assertions, split into one `assert` per spec-required component. For weak `in [list]` assertions on categorical fields, replace with strict `==` equality. Record the originating commit in the fix commit message for audit purposes (`Fix-Of: <sha>`). A FAIL verdict caused by code you inherited is not a verifier error — it is a submission error.
  - Never commit .hyperloop/state/ files to a task branch: Files under `.hyperloop/state/` (task state, review files, intake records) are orchestrator-managed metadata. Never `git add` them. Their presence in branch commits causes permanent 3-way merge conflicts during every rebase and reset, requiring a full branch abandon. Run `check-no-state-file-commits.sh` before submitting. If the check fails, you must rewrite history to remove the state files or start the branch over from the current `alpha` HEAD.
  - Strip inherited state-file commits before any implementation work: If `check-no-state-file-commits.sh` fails at task start because a PRIOR commit on the branch (not written by your task) mixed `.hyperloop/state/` deletions with implementation changes, fix it immediately via interactive rebase (`git rebase -i <merge-base>`) — remove or split the offending commit to excise the state-file changes while keeping the implementation changes intact. Do NOT proceed with task implementation while this violation is unresolved; doing so forces the verifier to inherit and block on it.
  - Create the working branch before any other action: The very first action upon receiving a task is `git checkout -b task-NNN` (where NNN is the task ID from the task file frontmatter). Do not read the spec, run searches, or write any code before the branch exists. An agent whose future fails before branch creation leaves `branch: null` in the task state with no repository artifact, making the failure indistinguishable from a silent skip. The branch is the minimal diagnostic artifact the orchestrator needs to detect initialization-stage failures.
  - Check for an existing task branch before creating one: Before running `git checkout -b hyperloop/task-NNN`, run `git ls-remote --exit-code origin hyperloop/task-NNN 2>/dev/null` AND `git show-ref --verify refs/heads/hyperloop/task-NNN 2>/dev/null`. If either succeeds, a prior agent run already created the branch — DO NOT create a fresh branch. Instead, run `git checkout hyperloop/task-NNN` (or `git fetch origin hyperloop/task-NNN && git checkout hyperloop/task-NNN`), then run `git log --oneline alpha..HEAD` to audit what work exists. Assess existing commits before adding anything new. A `branch: null` orchestrator state does not mean the branch is absent — it means the orchestrator's future tracking lost the prior run. Creating a fresh branch when one already exists causes a `git checkout -b` error that aborts the agent without any useful artifact.
  - PR feedback loop: enumerate every open comment before writing code: When returning to a PR after a "pr-feedback-addressed" check failure, open the PR in the browser or via `gh pr view --comments <PR_NUMBER>` and list every unresolved review comment. For each comment write one sentence describing what code change will address it. Do not start writing code until every comment has a plan. After making changes, re-read each original comment and confirm the change satisfies it before reporting done. Submitting the same branch with zero new changes after a "pr-feedback-addressed" failure is a wasted round — always commit at least one targeted change per feedback comment.
  - DOO applies on every code path — including error handlers: Every new function that needs observability (routes, services, error handlers, `_build_*_response` helpers) must call a domain probe method rather than `logger.*` or `print()`. Before submitting, run `check-no-direct-logger-usage.sh`; a non-zero exit is a FAIL. If no probe method exists for the event, add one to the probe Protocol and its default implementation first.
  - Domain exceptions must be explicitly caught in route handlers — never rely on a catch-all: For every custom exception class defined in `domain/exceptions.py` or `ports/exceptions.py` that a service method can raise, every route handler invoking that service must have an explicit `except ExceptionType` clause mapping to the correct HTTP status code (e.g. 409 for duplicate-name conflicts, 422 for validation errors, 404 for not-found). A generic `except Exception → 500` is not a spec-compliant response for any scenario described as "rejected with X error". Run `check-domain-exception-http-mapping.sh` before submitting.
  - Route-level unit tests are required for every domain exception path: For each `except ExceptionType` clause added to a route handler, write a companion unit test that mocks the service to raise that exception type and asserts the exact HTTP status code. A repo-level integration test that exercises the domain layer is NOT a substitute — the route-to-HTTP translation must be independently verified at the route unit test level.
  - Commit after each scenario passes — not in bulk at the end: Once you have a passing test and passing implementation for a single spec scenario, run `git commit` with a conventional message referencing the scenario (e.g. `test(management): key rotation retrieves old-key ciphertext`). Never accumulate all scenarios into one end-of-task commit. Per-scenario commits are recovery checkpoints: if the agent future fails mid-task, the next agent resuming from the recovered branch can `git log --oneline alpha..HEAD` to see exactly which scenarios are already covered and start from the next unimplemented one — without repeating finished work or unknowingly breaking already-passing tests.
  - On a recovered branch, audit then continue — never restart: When branch discovery (see rule about checking for existing task branches) finds an existing branch with commits, run `uv run pytest tests/unit -v 2>&1 | tail -20` to confirm which tests currently pass, then `git log --oneline alpha..HEAD` to list implemented scenarios. Cross-reference those commits against the spec's THEN blocks to identify the first unimplemented scenario. Begin implementation from that scenario — do not re-implement anything already committed and passing, as doing so risks introducing regressions in previously-green tests.
  - Run check-no-state-file-commits.sh a second time immediately before the final rebase: Orchestrator-managed workers (intake runs, reviews of other tasks) may operate while your task branch is checked out and inadvertently commit `.hyperloop/state/` files to it mid-task — not at task start. Run `check-no-state-file-commits.sh` again as the very first step of your pre-submit sequence (before `git rebase alpha`). If it fails, use `git log --oneline --diff-filter=A,M -- '.hyperloop/state/**' $(git merge-base HEAD alpha)..HEAD` to identify the offending commits, strip them via interactive rebase, and only then proceed with the alpha rebase. Discovering this violation after rebasing forces a second interactive rebase pass.
