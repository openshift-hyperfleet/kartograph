apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - Full vertical slice is required for every HTTP-exposed service method: When the spec requires an HTTP endpoint, the feature is NOT done until the following four exist together: (a) service method, (b) `@router.verb` route in `presentation/<resource>/routes.py`, (c) Pydantic request model, and (d) route-level unit tests. A service method with no HTTP route is unreachable by API consumers and does NOT satisfy the spec requirement.
  - After any service CRUD method, immediately check the route exists: After writing `create`, `get`, `list*`, `update`, or `delete` in a service class, open the matching `presentation/<resource>/routes.py` and confirm the corresponding `@router.post`, `@router.get`, `@router.patch`/`put`, or `@router.delete` exists. If it does not, add the route in the same task before committing.
  - Run check-service-route-coverage.sh before committing any service file: Execute `bash .hyperloop/checks/check-service-route-coverage.sh` after editing any `*_service.py` file. A non-zero exit means at least one CRUD method lacks a corresponding HTTP route — resolve it before committing.
  - Transactional service methods require a rollback test: Any service method that wraps operations in `async with session.begin()` MUST have a test that injects a failing dependency mid-transaction (mock raises an exception) and asserts the upstream record was NOT persisted. An implementation with `session.begin()` and no failure-path test leaves atomicity as a convention, not a verified contract.
  - Route tests must cover every exception the route handler catches: For each `except ExceptionType → HTTPException(status_code=N)` clause in a route handler, write a companion unit test that mocks the service to raise that exception and asserts the exact HTTP status code. A service-layer test that exercises the exception is not a substitute — the route-to-HTTP translation is a separate contract that must be independently verified.
  - Add .hyperloop/state/ to .git/info/exclude immediately after branch creation — before any other action: Run `echo '.hyperloop/state/' >> "$(git rev-parse --git-dir)/info/exclude"` then confirm with `bash .hyperloop/checks/check-git-state-exclude.sh`. Without this, any `git add .` or `git add -A` silently stages orchestrator-managed metadata into task commits; once committed, the branch cannot be rebased without a full cherry-pick onto a fresh branch. This was the root cause of contamination in task-017 and task-019.
