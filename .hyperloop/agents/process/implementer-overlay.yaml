apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - Full vertical slice is required for every HTTP-exposed service method: When the spec requires an HTTP endpoint, the feature is NOT done until the following four exist together: (a) service method, (b) `@router.verb` route in `presentation/<resource>/routes.py`, (c) Pydantic request model, and (d) route-level unit tests.
  - After any service CRUD method, immediately check the route exists: After writing `create`, `get`, `list*`, `update`, or `delete` in a service class, open the matching `presentation/<resource>/routes.py` and confirm the corresponding `@router.post`, `@router.get`, `@router.patch`/`put`, or `@router.delete` exists.
  - Run check-service-route-coverage.sh before committing any service file: Execute `bash .hyperloop/checks/check-service-route-coverage.sh` after editing any `*_service.py` file.
  - Transactional service methods require a rollback test: Any service method that wraps operations in `async with session.begin()` MUST have a test that injects a failing dependency mid-transaction and asserts the upstream record was NOT persisted.
  - Route tests must cover every exception the route handler catches: For each `except ExceptionType → HTTPException(status_code=N)` clause in a route handler, write a companion unit test that mocks the service to raise that exception and asserts the exact HTTP status code.
  - Add .hyperloop/state/ to .git/info/exclude immediately after branch creation: Run `echo '.hyperloop/state/' >> "$(git rev-parse --git-dir)/info/exclude"`.
  - Run check-cascade-delete-cleanup.sh unconditionally before any verdict: Execute `bash .hyperloop/checks/check-cascade-delete-cleanup.sh` and confirm exit 0.
  - Run the full backend suite as the definitive PASS gate: Execute `bash .hyperloop/checks/check-run-backend-suite.sh` and confirm it outputs "RESULT: ALL PASS" before recording any PASS verdict.
  - Never delete a failing test, route handler, domain exception class, or service parameter to make a check pass: This is always detected by the regression checks and constitutes a worse blocking failure than the original bug.
  - Run check-no-source-regressions.sh and check-no-domain-exception-deletions.sh before every commit.
  - When a spec mandates replacing or renaming a symbol, add a `Removes: SymbolName` trailer to the commit; check-no-source-regressions.sh will then treat that removal as informational rather than a FAIL: `git commit -m "..." -m "Removes: OldClassName"` (comma-separate multiple symbols).
  - After restoring any deleted code, run check-no-test-regressions.sh, check-no-source-regressions.sh, and check-no-domain-exception-deletions.sh in sequence and confirm ALL THREE exit 0.
  - When re-submitting after a FAIL verdict, produce an evidence table mapping each prior finding to the specific fix applied and the check script that now passes.
  - Run check-no-route-handler-removals.sh before committing any change to presentation/routes.py.
  - Register every new EventHandler in main.py before committing: After implementing any class with a `supported_event_types()` method, import it in `main.py` and call `handler.register(<instance>)`. Run `bash .hyperloop/checks/check-event-handlers-registered.sh` to confirm.
  - Before publishing a new event type to the outbox, verify a consuming handler exists and is registered: Run `bash .hyperloop/checks/check-domain-events-have-consumers.sh` before committing.
  - All spec scenarios must be COVERED or have a formal blocker before submitting.
  - Every @pytest.mark.skip test must have at least one real assertion.
  - When the spec mentions idempotency, duplicate delivery, or retry, run check-idempotency-tests.sh against the spec before submitting.
  - Before EVERY `git commit` (regular commits AND rebase sessions), unconditionally run `git restore --staged --worktree -- .hyperloop/worker-result.yaml 2>/dev/null || true` — do NOT rely on noticing it is staged; run the command every time without condition.
  - Never commit .hyperloop/worker-result.yaml to the task branch: the unconditional restore above is the enforcement mechanism; never skip it even for trivial typo-fix commits.
  - When any protocol artifact file (.hyperloop/worker-result.yaml, .hyperloop/state/**) is accidentally committed, the ONLY correct fix is `git rebase -i $(git merge-base HEAD alpha)` to excise the commit from history; adding a deletion commit does NOT fix the violation because check-worker-result-not-committed.sh flags deletions in branch history as well as additions.
  - If .hyperloop/worker-result.yaml exists in your working tree because it was already on the base branch, its presence is expected and harmless — do NOT delete it via `git rm` or a deletion commit; check-worker-result-not-committed.sh only flags task-branch commits that touch the file, not the inherited file itself.
  - Run check-no-foreign-task-commits.sh before every commit: all commits on this branch must carry Task-Ref matching this task's identifier (e.g. task-019); any foreign Task-Ref is a hard block.
  - Run check-all-commits-have-task-ref.sh before submitting AND after every interactive rebase: every non-merge commit must include a Task-Ref trailer — missing trailers prevent foreign-commit detection downstream; this applies to ALL commits without exception, including documentation updates, README edits, and any other change that might feel "trivial".
  - Never start work from a dirty branch: always `git checkout -b hyperloop/task-NNN origin/alpha` so the branch contains only commits for this task from the very first commit.
  - Immediately after `git checkout -b hyperloop/task-NNN origin/alpha`, run BOTH `bash .hyperloop/checks/install-git-pre-commit-hook.sh` AND `bash .hyperloop/checks/install-git-commit-msg-hook.sh` before any other action: the pre-commit hook blocks staging of .hyperloop/worker-result.yaml; the commit-msg hook blocks any commit whose message lacks a `Task-Ref: task-NNN` trailer — both hooks fire automatically at every `git commit` with no per-commit manual step and are the ONLY mechanisms proven reliable; manual pre-commit checks are routinely skipped during quick fix-up and documentation commits.
  - A MISSING check in the backend suite means the branch predates that script's addition to alpha: run `git fetch origin && git branch -f alpha origin/alpha && git rebase alpha` to incorporate it, then re-run the suite before proceeding.
  - Before your first commit, run `bash .hyperloop/checks/check-alpha-local-vs-remote.sh` to confirm local alpha matches origin/alpha; a stale local alpha means new check scripts added after branch creation are absent from your worktree.
  - Never cherry-pick commits from alpha, process-improvement branches, or any other branch onto your task branch: The only valid way to incorporate new upstream commits is `git fetch origin && git branch -f alpha origin/alpha && git rebase alpha`; cherry-picking creates duplicate commits with different hashes that (a) carry a foreign Task-Ref and immediately fail check-no-foreign-task-commits.sh, and (b) produce rebase conflicts when alpha later absorbs the same changes.
  - Re-run `bash .hyperloop/checks/check-alpha-local-vs-remote.sh` before every resubmission after a FAIL verdict, not only before the first commit: alpha advances between rounds and a single missed fetch causes all content checks to diff against a stale baseline.
  - When worker-result.yaml is in the MOST RECENT commit only, `git reset --soft HEAD~1` followed by `git restore --staged -- .hyperloop/worker-result.yaml` and recommitting is an acceptable alternative to interactive rebase — both achieve the same history excision; use whichever is simpler for the specific situation.
  - When `check-no-foreign-task-commits.sh` reports commits carrying `Task-Ref: process-improvement` that you did NOT cherry-pick yourself, this is orchestrator contamination — do not attempt to excise those commits; instead, stop work and escalate to the orchestrator to rebuild the branch cleanly from current alpha with only this task's delivery commits.
  - Never run `git rm .hyperloop/worker-result.yaml` under any circumstances — not as a fix, not as cleanup, and not as part of any commit; `git rm` creates a deletion commit that check-worker-result-not-committed.sh flags as a hard FAIL; the only permitted operations on this file are (a) `git restore --staged --worktree -- .hyperloop/worker-result.yaml` to unstage it before committing and (b) `git rebase -i $(git merge-base HEAD alpha)` to excise any commit that touches it from branch history.
  - Passing `check-branch-rebased-on-alpha.sh` does NOT guarantee `check-no-test-regressions.sh` will pass: alpha commits within the 5-commit tolerance may still introduce test classes and test files absent from your branch; when `check-no-test-regressions.sh` fails due to missing test classes or files that exist on alpha, run `git rebase alpha` and re-run the full suite — never add the missing tests manually.
  - "SUITE HALTED: branch is stale" is an absolute submission block: when check-run-backend-suite.sh prints that message, writing worker-result.yaml with any verdict is a protocol violation; the ONLY valid next action is the three-step sequence (git fetch origin → git branch -f alpha origin/alpha → git rebase alpha) followed by a fresh full suite run that outputs "RESULT: ALL PASS".
  - When check-no-foreign-task-commits.sh reports Task-Ref: process-improvement commits AND check-branch-rebased-on-alpha.sh is also failing, the commits are stale artifacts from before those process-improvement changes were merged to alpha — run git rebase alpha and git will automatically drop them as empty commits; do not use interactive rebase, cherry-pick, or escalate to the orchestrator for this specific scenario.
  - When adding a new parameter to any method that participates in a multi-layer call chain (e.g. route → enclave service → query service → repository), write a propagation test at EVERY layer: each layer's test must mock its immediate collaborator (not the final layer) and assert the new parameter arrives with the expected value; do not assume a service-level test covers the enclave layer or that a repository-level test covers the service layer.
  - Before running the backend suite for any submission or resubmission, perform the complete three-step sequence in order: (1) `git fetch origin`, (2) `git branch -f alpha origin/alpha`, (3) `git rebase alpha`; updating local alpha without rebasing the task branch causes check-alpha-local-vs-remote.sh to pass while check-branch-rebased-on-alpha.sh still fails — all three steps are required as an atomic unit; a stale task branch will accumulate process-improvement commits from alpha that appear as foreign-task violations even though the implementer never cherry-picked them.
  - Before every `git commit`, run `cd src/api && uv run ruff check .` and confirm zero output: an F811 error means two classes or functions share the same name in the same module — Python silently uses the second definition, which may contain different fields than the first (e.g. a spurious `count` field on an update-request model), causing a functional bug that all unit tests miss because they always import the winning definition.
  - Run `bash .hyperloop/checks/check-no-worker-result-staged.sh` before every `git commit` as a dedicated pre-commit gate: if the file is staged as a deletion (e.g. because you ran `git rm` or deleted it manually as "cleanup"), the script fails and tells you to run `git restore --staged --worktree -- .hyperloop/worker-result.yaml`; a staged deletion that is committed will fail check-worker-result-not-committed.sh and require interactive rebase to fix — catching it pre-commit is always cheaper.
  - Writing worker-result.yaml while check-run-backend-suite.sh reports any FAIL is a protocol violation: a partial score (e.g. "25/26 PASS") is not a PASS; writing worker-result.yaml in that state is a false verdict regardless of intent; the ONLY permitted action when the suite fails is to fix each failing check and re-run until the output is "RESULT: ALL PASS".
  - The first action when starting any resubmission round is to run `bash .hyperloop/checks/check-run-backend-suite.sh` BEFORE touching any file: confirm the prior round's specific blocking check(s) now exit 0; if the suite still reports FAIL on those checks, apply the fix (e.g. interactive rebase for worker-result.yaml) and re-run the suite before writing any new code; do not proceed to implementation until the suite passes on the existing commits.
  - check-commit-msg-hook-has-guard.sh is a hard suite block when the commit-msg hook is absent or missing the trailer guard: if this check fails, run `bash .hyperloop/checks/install-git-commit-msg-hook.sh` immediately and confirm exit 0 before making any further commits; the hook is the ONLY mechanism that catches blank lines between trailers AT COMMIT TIME, preventing the broken-trailer-block failure that caused both task-133 and task-150 to FAIL (root cause: hook not installed → blank line between Task-Ref: and Co-Authored-By: → git discards Task-Ref as a trailer → check-all-commits-have-task-ref.sh and check-task-owns-branch-commits.sh both FAIL).
  - When `check-no-foreign-task-commits.sh` reports process-improvement commits that also ADD new files (confirm with `git show <sha> --name-only | grep -v '^$'`), do NOT attempt `git rebase alpha` — foreign commits that add check scripts or overlay files will produce CONFLICTS during rebase, not silent empty-commit drops; the only safe remediation is the clean cherry-pick path: `git checkout -b hyperloop/task-NNN-clean alpha && git cherry-pick <delivery-sha-1> [<delivery-sha-2> ...]` followed by `bash .hyperloop/checks/check-run-backend-suite.sh`; this rule supersedes the rebase-to-drop guidance in prior rules specifically when the foreign commits have file additions.
  - After the three-step sequence (`git fetch origin && git branch -f alpha origin/alpha && git rebase alpha`), run `bash .hyperloop/checks/check-no-test-regressions.sh` as a standalone check BEFORE running the full backend suite: if pass 2 fails, alpha advanced again during or after the fetch — repeat the three-step sequence immediately; iterating here is cheaper than discovering the failure after the full suite.
  - When `check-no-test-regressions.sh` pass 2 fails but pass 1 passes, the ONLY valid fix is `git rebase alpha` — never manually copy or add test files from alpha; the rebase will incorporate them atomically and correctly.
  - Content equivalence is NOT merge-base equivalence: manually incorporating alpha changes by writing a new fix commit (even one that contains identical content) does NOT update the merge-base that check-branch-rebased-on-alpha.sh measures; if you believe upstream changes are "already present" on your branch, the three-step sequence (`git fetch origin && git branch -f alpha origin/alpha && git rebase alpha`) is still required unconditionally — the rebase will fast-forward the merge-base, drop content-equivalent commits as empty, and bring the branch within the staleness threshold.
  - Run check-no-foreign-task-commits.sh immediately after every git rebase (including the mandatory three-step pre-submission sequence): a rebase carries ALL existing branch commits forward verbatim — any foreign commit present before the rebase will still be present after it; this check must fire right after the rebase, before running any other check or writing any verdict.
  - After every `git commit` that modifies application source files, immediately run `bash .hyperloop/checks/check-last-commit-removes-trailers.sh` and confirm exit 0 before making any additional commits: this script inspects only the most recent commit, detecting removed classes or functions that lack a `Removes: SymbolName` trailer; check-no-source-regressions.sh cannot catch this at post-commit time because it compares merge-base..HEAD and the commit is already in history.
  - When check-last-commit-removes-trailers.sh exits 1, the ONLY correct fix is `git commit --amend` to add `Removes: SymbolA, SymbolB` to the same commit that introduced the removal — never create a separate follow-up commit that only adds the trailer; check-no-source-regressions.sh matches Removes: trailers to the commit that performed each removal, so a trailer on a different commit does not satisfy the check.
  - Rollback tests for transactional cascade deletes MUST be integration tests, not unit tests: a mock session cannot roll back a real database transaction; only a test that uses a real database (marked `@pytest.mark.integration` or under `tests/integration/`) can verify that `async with session.begin()` actually rolls back partial state on failure.
  - check-cascade-delete-rollback-test.sh is part of the backend suite and will block submission automatically: write the rollback integration test before committing the service delete method, not after the suite fails — the suite is the enforcement gate, so every transactional cascade delete must have an integration rollback test on the same commit that introduces the delete.
  - Service-layer cascade delete rollback tests MUST call `Service.delete()` directly — NOT just repo methods: the spec's "entire deletion rolls back" requirement applies to the full service operation; a repo-layer rollback test (which bypasses the service) does NOT satisfy this requirement; the test must instantiate the Service with a real AsyncSession and call `.delete()` with a dependency that raises mid-cascade.
  - Place service-level rollback integration tests in a file whose path contains "service" (e.g., `tests/integration/management/test_knowledge_graph_service.py`): check-cascade-delete-rollback-test.sh uses "service" in the file path as the primary discriminator for service-level tests.
  - Application-layer service tests must NOT use `AsyncMock()`, `MagicMock()`, or `create_autospec()` for repository ports (`IXxxRepository`, `IXxxStore`) or probe protocols: `create_autospec(IXxxRepository, instance=True)` is equally prohibited — `spec=` does not replace a real implementation, it merely constrains attribute access on a mock; create in-memory fake classes implementing the port interface instead; the check-no-repo-port-mocks.sh script enforces all three forms and is part of the backend suite.
  - Before writing a new in-memory fake for a port, check `tests/fakes/` for an existing implementation: `InMemoryAuthorizationProvider` already exists in `tests/fakes/authorization.py` — use it instead of `AsyncMock()` for `AuthorizationProvider` in service tests.
  - Probe protocols (e.g., `KnowledgeGraphServiceProbe`) must be tested with a concrete recording class, not `MagicMock()` or `AsyncMock()`: create a `RecordingXxxProbe` class in the test file that implements the Protocol and records calls in a list for assertion.
  - Run `bash .hyperloop/checks/check-no-repo-port-mocks.sh` before committing any application-layer test file: it catches the inline-assignment form (`mock_kg_repo = AsyncMock()`), the pytest-fixture form (`def mock_kg_repo(): return AsyncMock()`), and the `create_autospec()` form (`return create_autospec(IXxxRepository, instance=True)`); it also scans `test_application_services.py` files placed directly under `tests/unit/<context>/` in addition to the standard `tests/unit/<context>/application/` location.
  - Run `bash .hyperloop/checks/check-no-multiple-alembic-heads.sh` before every `git push` when the branch adds a migration file: multiple heads cause `alembic upgrade head` to abort at startup; if the check fails, run `cd src/api && uv run alembic merge heads -m "merge migration branches"` and commit the resulting merge revision before pushing.
  - A task with zero commits is NEVER complete, even when all tests already pass: if the spec requires only verification (all tests pass, no new code needed), produce a `test: verify <scope> spec scenarios covered` commit that records which spec scenarios the existing tests cover — this satisfies check-implementation-commits-exist.sh and gives the verifier evidence that the task was actually executed, not skipped.
  - Before every `git commit`, run `git diff --cached` and verify the commit message direction matches the staged diff: if the message says "remove" or "delete X", the diff must show `-` lines for X; if the message says "add" or "implement X", the diff must show `+` lines for X — a message that describes the opposite of what the diff does (e.g. "remove stale pin" when the diff ADDS a pin) is a protocol violation that must be corrected before committing.
  - Before modifying any file, verify it is referenced in the task spec or is a direct dependency of a spec-required change: writing changes to files outside the task's scope — even when those files appear to need similar work — creates commits that duplicate content already on alpha and produce unresolvable rebase conflicts.
  - Never commit modifications to files in `.hyperloop/checks/` on a task branch: check-script edits are process-improvement work regardless of which Task-Ref the commit carries; if a check script produces a false positive that blocks the backend suite, apply the fix locally WITHOUT committing it (so the suite passes for this run), then document the issue for the orchestrator — check-no-check-script-modifications.sh detects any modified pre-existing scripts and is a hard suite block.
  - Before editing a file not explicitly named in the spec, run `git log --oneline alpha -- <path>` to check whether alpha already contains changes to that file: if alpha has recent commits touching it, do NOT write equivalent changes — duplicate commits cause hard rebase conflicts at merge time.
  - Run `bash .hyperloop/checks/install-git-commit-msg-hook.sh && bash .hyperloop/checks/install-git-pre-commit-hook.sh` as the ABSOLUTE FIRST action of every agent session — before reading any file, before any git command, before anything else; these scripts are idempotent (print PASS immediately if the hooks are already current); this is a SESSION-START ritual that must fire even on re-submission rounds, even when the branch already has commits, and even when you believe the hooks are already installed; check-commit-msg-hook-has-guard.sh failures in task-109 and task-141 both traced to the hook never being installed in the worktree despite commits having correct trailer text — the rule "install after checkout" was insufficient because agents start directly inside a pre-placed worktree without performing a checkout.
  - Run `bash .hyperloop/checks/check-branch-rebases-cleanly.sh` before every submission: a branch that cannot rebase onto alpha cannot merge regardless of whether all other checks pass; a conflict indicates an out-of-scope commit that must be dropped via `git rebase -i $(git merge-base HEAD alpha)`.
  - Run `bash .hyperloop/checks/check-frontend-tests-pass.sh` as the definitive PASS gate for ANY task that modifies `.vue` or `.ts` files under `src/dev-ui/`: the backend suite does not run frontend tests; passing all backend checks while frontend tests fail is NOT a PASS; confirm exit 0 before writing worker-result.yaml.
  - Before writing a new Vue component or page, read EVERY existing test file that references that component and extract the exact ref initializations, sentinel values, and conditional expressions the tests expect: tests that pre-exist the component (TDD) are contractual specifications of internal implementation patterns — using `'__all__'` where tests require `''`, or `x === '__all__' ? undefined : x` where tests require `x || undefined`, is a test mismatch that blocks submission regardless of functional equivalence.
  - Never use `await new Promise(resolve => setTimeout(resolve, N))` in production pages or composables as a substitute for a real backend API call: this pattern fakes async latency without actually calling the backend and passes existing stub checks — run `bash .hyperloop/checks/check-no-api-simulation.sh` before committing any `.vue` or `.ts` file under `pages/` or `composables/`; if the required backend endpoint does not exist yet, raise a formal blocker at `.hyperloop/blockers/task-NNN-blocker.md` instead of shipping simulation code.
  - After writing a wizard's final approve/submit/confirm handler, audit every previous step's reactive state for completeness: read back through every `ref()` / `reactive()` field collected across all wizard steps and verify each appears in the final API payload; any field collected from the user but absent from the API call body is a silent data-loss bug (root cause of task-045 FAIL 2: edited ontology nodes/edges were collected across four steps but `approveOntology()` submitted only `connection_config`).
  - Security invariant constraints must have a dedicated regression test: any rule of the form "X is never written to localStorage / sessionStorage / the URL" must be guarded by a test that reads those stores after triggering the relevant flow and asserts the value is null or absent — an implementation that merely avoids the write is insufficient without a test that would catch a future regression.
  - Before writing frontend tests, enumerate every `#### Scenario:` line under the relevant spec requirement; count them explicitly and write a test group for EACH one; the commit message must state "Covers N/N spec scenarios" where N matches the actual count — never count from memory or from the test file itself (root cause of task-060 FAIL-1: 9 scenarios existed, commit claimed 6, 3 were untested).
  - Run `bash .hyperloop/checks/check-frontend-scenario-labels.sh <spec-file> <test-file>` after writing frontend tests and confirm exit 0 before committing; for a single requirement section pipe the spec through awk: `awk '/### Requirement: <Name>/{found=1} found{print} /^### [A-Z]/ && !/<Name>/{found=0}' <spec> | bash .hyperloop/checks/check-frontend-scenario-labels.sh /dev/stdin <test-file>`.
  - Frontend tests must not re-declare business logic from the component as inline functions: if a test file defines a `const` arrow function with the same name and shape as a function in the component under test, it tests a private copy of the logic — a bug in the actual component will not be caught; extract the function to a composable or utility module and import it in both the component and the test instead.
  - When a rebase or merge produces a conflict in any test file (`*.test.ts`, `test_*.py`, `*.spec.ts`), resolve it by preserving ALL `describe`/`it`/`def test_` blocks from BOTH sides; picking only one side or accepting a truncated version is test deletion; run `bash .hyperloop/checks/check-no-test-regressions.sh` immediately after resolving any conflict — before writing any other code — to catch accidental test loss at the earliest moment; if the conflict cannot be resolved without losing tests, stop and escalate to the orchestrator rather than simplifying the test file.
  - When a watch handler, lifecycle hook, or event callback performs N sequential actions (e.g. `clearState(); fetchData();`), write test assertions for EVERY action in the handler body, not just the first; a test block that asserts only the clearing half of a "clear then reload" watch handler leaves the reload path untested and will be flagged as PARTIAL by the verifier.
  - Before committing a frontend test group, run `bash .hyperloop/checks/check-scenario-test-body-alignment.sh <spec-file> <test-file>` and confirm exit 0: this detects the pattern where a describe block is labeled with a scenario name (passing check-frontend-scenario-labels.sh) but its assertions only test guard conditions from OTHER scenarios — the exact failure mode of task-045 where "Knowledge graph selection" was labeled but only `toContain('No tenant selected')` was asserted.
  - A test group for scenario X must include at least one assertion that directly exercises a THEN clause of scenario X: if the spec says "a knowledge graph selector is displayed", assert the selector component is rendered; if it says "no submission is possible until a KG is selected", assert the submit button is disabled; if it says "the selected KG is used as the API target", assert the API call receives the knowledge_graph_id — asserting a guard from a different scenario (e.g. hasTenant) is not coverage for scenario X.
  - For `pages/<domain>/index.vue` components the companion test file is `tests/<domain>.test.ts` (named after the parent directory, not `index.test.ts`): check-watch-handler-reload-tests.sh and check-pages-have-tests.sh both derive the test path from the parent directory when the component is `index.vue`; a test written in `index.test.ts` satisfies neither check for sub-page `index.vue` components.
  - Before adding any `import { ... } from '<module>'` statement to an existing .vue or .ts file, search the file for existing imports from the same module: run `grep "from ['\"]<module>['\"]" <file>` and if a match exists, add the new symbols to the EXISTING import line rather than creating a second import block; a duplicate import from the same module is a TypeScript build error caught by vue-tsc but invisible to unit tests (root cause of task-045 blocking defect).
  - Run `bash .hyperloop/checks/check-no-duplicate-vue-imports.sh` before committing any .vue or .ts file: the script checks all modified Vue/TypeScript files for duplicate `from '<module>'` import blocks and exits non-zero if any are found.
  - Run `bash .hyperloop/checks/check-frontend-type-check.sh` before committing any .vue or .ts file when node_modules is present: vue-tsc catches import-level errors (duplicate blocks, missing exports, type mismatches) that unit tests cannot detect because vitest mocks the component graph at the module boundary.
  - The describe()/it() label must include the spec scenario name as a verbatim substring — do NOT paraphrase or synonym-ize: `check-frontend-scenario-labels.sh` does a case-insensitive substring search, so "Post-Extraction Confirmation Gate" does NOT match "Ontology change after initial extraction"; when renaming or writing a test group, copy the scenario name from the spec directly into the label.
  - When check-frontend-scenario-labels.sh reports a MISSING scenario for which tests already exist under a differently-named describe block, the fix is a label rename only — wrap or rename the existing describe to include the exact scenario name as a substring; no new test code is required.
  - Pass ALL test files that contain relevant tests to check-frontend-scenario-labels.sh, not just the primary file: the check accepts multiple file arguments (`bash .hyperloop/checks/check-frontend-scenario-labels.sh <spec-file> file1.test.ts file2.test.ts ...`); a scenario whose label lives in a secondary test file is still MISSING when only the primary file is checked.
  - When adding any method to a Python Protocol class in `*/ports/repositories.py`, `*/ports/stores.py`, or any other ports module, immediately grep the entire test suite for every fake/stub implementing that protocol (`grep -rn "class _Fake<ProtocolName>\|class Fake<ProtocolName>\|class InMemory" src/api/tests`) and update EVERY match to implement the new method; run `bash .hyperloop/checks/check-no-mypy-violations.sh` before committing — a protocol extension with unfixed fakes produces `[arg-type]` mypy errors that block the suite (root cause of task-078 FAIL).
  - When CREATING a new .vue or .ts file (not just modifying an existing one), audit every import block before the first commit: if two separate lines import from the same module (one `import type { X }` and one `import { Y }`), merge them into a single line using inline `type` modifiers (`import { type X, Y } from 'module'`); run `bash .hyperloop/checks/check-no-duplicate-vue-imports.sh` after every new file creation — the existing rule 82 covers additions to existing files but this rule covers new files created from scratch (root cause of task-079 FAIL: seven new alert-dialog components each had two `from 'reka-ui'` import lines).
  - Adding a `fake_`, `mock_`, or `stub_` prefix to a domain aggregate variable name does NOT exempt it from the domain-aggregate mock prohibition: `fake_kg_1 = MagicMock()` is the same violation as `kg_1 = MagicMock()`; check-domain-aggregate-mocks.sh catches all prefixed forms; use a concrete fake dataclass (e.g., `@dataclass class _FakeKG`) regardless of the variable name prefix.
  - After defining a new Protocol class under any `*/ports/` module, verify it is imported and used in at least one non-test production file before submitting: run `bash .hyperloop/checks/check-no-dead-ports.sh` and confirm exit 0; a protocol only referenced in test fakes is a dead abstraction — either inject it into the production code path (e.g., as a FastAPI Depends() parameter) or remove it.
  - When writing a new `test_application_services.py` file for a bounded context that lacks an `application/` subdirectory (e.g. `query`, `graph`), the check-no-repo-port-mocks.sh script now scans those flat files — ensure every fixture and inline variable follows the fake-class pattern, not `AsyncMock()`, `MagicMock()`, or `create_autospec()` for repository ports or probe protocols.
  - When accessing a method or attribute that belongs to a specific subtype of a declared union type (e.g., accessing `.fn` on `Resource | ResourceTemplate`), always narrow the type first using `isinstance(obj, SubType)` before the access, or `cast(SubType, obj)` if an isinstance guard is undesirable — never access the attribute directly on the union; mypy's `[union-attr]` check enforces this in both production and test code and will block the backend suite.
  - Before writing any file, run `git rev-parse --abbrev-ref HEAD` and confirm the output is `hyperloop/task-NNN` where NNN matches this task's identifier: submitting from `alpha`, a prior task's branch, or any other ref causes a zero-commit branch to appear to the verifier even when real work was done locally — the verifier cannot see uncommitted or misbranched work.
  - After your FIRST commit on the task branch, immediately push with `git push -u origin HEAD`: this creates the remote tracking branch so all subsequent work is visible to the verifier even if the agent session terminates unexpectedly; a branch that exists only locally is invisible to the verifier and will be reported as a zero-commit branch regardless of local history.
  - Never add `# type: ignore[return-value]` to suppress a function's return-type mismatch — fix the return type annotation instead: suppressing the error at the definition site causes mypy to infer the wrong return type for the function, which silently propagates `[arg-type]` errors at EVERY call site; the call-site errors only appear when mypy is re-run after the call sites are written, so the `# type: ignore` appears to fix mypy locally but fails the suite later (root cause of task-112 FAIL: `_make_asgi_httpx_factory` annotated `-> httpx.AsyncClient` with a `# type: ignore[return-value]` on the return, causing two `[arg-type]` errors at lines 221 and 289 in the test); always correct the annotation (e.g. `-> Callable[..., httpx.AsyncClient]`) rather than silencing the error.
  - After adding ANY `# type: ignore` comment to a file, immediately re-run `cd src/api && uv run mypy . --config-file pyproject.toml --ignore-missing-imports` and confirm zero errors before writing the next line of code: a `# type: ignore` that appears to fix mypy at the suppression site may cause downstream errors at call sites that are only caught when the next file is written.
  - Never use `git merge` to incorporate any upstream changes into a task branch: `git merge origin/main`, `git merge alpha`, or any other merge is absolutely prohibited even when the branch is far behind; a merge introduces upstream commits as non-first-parent parents — those commits have no Task-Ref trailer and are not exempted by the GitHub-PR pattern, so check-all-commits-have-task-ref.sh will FAIL; the ONLY permitted integration mechanism is the three-step sequence (`git fetch origin && git branch -f alpha origin/alpha && git rebase alpha`).
  - When checking out an EXISTING task branch (e.g. to resolve a merge conflict, continue interrupted work, or take over from another worker), install both hooks before making ANY commit: run `bash .hyperloop/checks/install-git-pre-commit-hook.sh && bash .hyperloop/checks/install-git-commit-msg-hook.sh` immediately after `git checkout hyperloop/task-NNN`; the hooks are stored in `.git/hooks/` and are not shared across worktrees or sessions — a fresh checkout of an existing branch has no hooks by default regardless of whether a previous worker installed them (root cause of task-100 FAIL: worker resolved merge conflict and committed without installing the commit-msg hook, causing check-commit-msg-hook-has-guard.sh to FAIL even though the commit trailers were structurally correct).
  - `refactor:` is ONLY valid when restructuring EXISTING code with zero new behavior and zero new tests: if the commit adds any new function, class, or method to production code use `feat:` (or `fix:` for a bug-fix extraction); if the primary deliverable is new tests use `test:`; a commit labelled `refactor:` that also contains new symbols or new test cases will fail check-implementation-commits-exist.sh because that check does not recognise `refactor:` as evidence of real implementation work (root cause of task-115 FAIL: a new `_clamp_query_params` helper and 18 unit tests were committed as `refactor:` and the branch was rejected as having no implementation commits).
  - Never use the stub-marker terms `coming-soon`, `coming_soon`, or `Coming Soon` in ANY source file context — including JSDoc `/** */` doc-comments and inline `//` comments — because check-no-coming-soon-stubs.sh scans all occurrences; describe unavailable features with `unavailable`, `future`, or `planned` instead (root cause of task-117 FAIL: two JSDoc lines containing `coming-soon` in `dataSourceWizard.ts` triggered the check even though the implementation was correct).
  - Every frontend test's control flow and assertion values must be driven by a real mock boundary — never by hardcoded boolean literals inside the test body: a `let` variable declared to `true` or `false` inside an `it()` body and used as the sole source of the assertion or conditional logic is a non-falsifiable stub; run `bash .hyperloop/checks/check-tautological-frontend-tests.sh` before committing any `.test.ts` file and confirm exit 0 (root cause of task-122 FAIL: two tests used `let hasActiveSyncs = true` / `let triggerFailed = true` hardcoded in-body — no production code path could ever make them fail).
  - When a spec scenario says "X starts Y when condition C is true", the condition C must be driven by a mock API return value or composable state change — never by writing `c = true` hardcoded inside the test body: the test must be able to FAIL when the production polling code is absent or broken; if `c` is always `true` regardless of what the production code does, the test proves nothing.
  - Run `bash .hyperloop/checks/check-task-owns-branch-commits.sh` before writing worker-result.yaml: this script verifies that at least one commit with `Task-Ref: <current-task>` exists above `origin/alpha` HEAD; if it exits 1, you have zero task-specific commits and MUST NOT submit — a stale local alpha causes check-branch-has-commits.sh and check-implementation-commits-exist.sh to produce false PASSes by counting upstream commits as task commits, giving an all-green suite with zero real implementation work (root cause of task-134 FAIL).
  - Git trailers (`Task-Ref:`, `Spec-Ref:`, `Co-Authored-By:`) must form a single contiguous block at the very end of the commit message — no blank lines between any of them; a blank line within the block causes git's `%(trailers:key=Task-Ref,valueonly)` parser to treat only the final segment as trailers, silently discarding `Task-Ref:` and failing `check-task-owns-branch-commits.sh` even when `Task-Ref:` is visually present in the message (root cause of task-133 FAIL).
  - The three-step rebase sequence is a pre-submission ritual, not a pre-work ritual: run `git fetch origin && git branch -f alpha origin/alpha && git rebase alpha` as the LAST git action before executing `bash .hyperloop/checks/check-run-backend-suite.sh`; write worker-result.yaml ONLY after the suite outputs "RESULT: ALL PASS"; a branch that was current at the start of the session may be stale by submission time if other tasks merged to alpha during implementation — this is the sole root cause for both task-099 and task-100 FAILs where quality checks passed but submission was rejected due to a 7–8 commit gap with alpha.
  - When `check-no-test-regressions.sh` fails in pass 1 (vs merge-base) due to net line removal in test files where the removed lines FIXED incorrect assertions (e.g. changing a sentinel from `__all__` to `''` and removing an outdated explanatory comment), do NOT restore the broken assertions; instead restore line neutrality by adding compensating documentation comments that explain WHY the prior assertion was incorrect — e.g. "# Previously asserted '__all__' but source now uses '' as the unscoped sentinel" — so the net line count vs merge-base is zero or positive; this is the pass 1 analogue of the alpha-drift false positive: the test was already failing at merge-base, so no passing coverage was lost (root cause of task-141 FAIL: five frontend test files had net negative line count after fixing __all__ → '' assertions, triggering a false positive; the verifier confirmed the removed lines were from already-failing tests).
  - When `check-no-foreign-task-commits.sh` reports a foreign `Task-Ref: task-NNN` commit (not `process-improvement`) and `git show <sha>` produces no source diff against the affected files (content already incorporated into the merge base), remediate with `git rebase -i $(git merge-base HEAD alpha)` and explicitly mark the foreign commit SHA as `drop`; do NOT use the three-step `git rebase alpha` sequence for this case — `git rebase alpha` cannot auto-drop task-NNN commits the way it drops process-improvement commits already on alpha's lineage; after the rebase, run `check-no-foreign-task-commits.sh`, `check-task-owns-branch-commits.sh`, and `check-all-commits-have-task-ref.sh` in sequence before re-running the backend suite (root cause of task-150 FAIL 2: no-op task-146 commit present on branch; interactive rebase drop was the required fix, not `git rebase alpha`).
