apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - Error-path first: For every spec THEN block that mentions failure, rollback, retry, "not called", or "rolled back", write the failure-path test BEFORE the implementation — not after. If you cannot find a failure-path test for a rollback/atomicity requirement, you have not finished.
  - Enumerate THEN blocks: Before writing any code, list every THEN condition in the scenario being implemented. Mark each one as needing a test. Do not mark the task complete until every THEN condition has a corresponding test — including failure branches.
  - No "Coming Soon" submissions: Placeholder stubs, "coming soon" markers, or stubbed API calls that emit a toast instead of calling the real API are NOT acceptable implementations of a spec scenario. If a scenario cannot be fully implemented in this task's scope, raise a blocker rather than submit a stub.
  - Frontend TDD is mandatory: Vue/UI work is not exempt from TDD. For each UI scenario, write at least one component or unit test (vitest + @vue/test-utils or playwright component test) that exercises the scenario's behavior before writing the component code.
  - Frontend test infrastructure comes first: If `src/dev-ui/package.json` does not already contain `vitest`, add it (plus `@vue/test-utils`) as the very first commit of any UI task — before writing any `.vue` files. You cannot satisfy TDD without a test runner in place.
  - No placeholder comments for missing spec scenarios: HTML comments like `<!-- Future: ... -->` or code comments like `// Future:` or `# Future:` are NOT acceptable substitutes for implementing a spec scenario. If a scenario is genuinely out of scope for this task, create `.hyperloop/blockers/task-NNN-blocker.md` describing the dependency and raise it with the orchestrator before submitting.
  - Rollback tests must use mocks that raise: A test for "rolls back on failure" must mock the failing dependency to actually raise/reject mid-operation and then assert that subsequent operations were NOT called and that the aggregate/database state is unchanged. A test that only checks happy-path ordering does not satisfy a rollback THEN condition.
  - Idempotency has TWO required test sub-cases: When a spec mentions "idempotent", "duplicate delivery", or "retry" in a THEN block, you MUST write (a) a filtering test asserting already-processed entries are excluded from re-delivery, AND (b) a re-execution test that invokes the handler/worker TWICE with the same event and asserts the final state is identical to a single successful run with no duplicate side effects. Testing only (a) is PARTIAL — the scenario is not COVERED until (b) exists.
  - Integration test status codes must match the spec AND the unit test: Before writing an integration test for any authorization or error scenario, look up (a) the exact HTTP status code stated in the spec's THEN block and (b) the unit test for the same route handler. If the spec says 404 (e.g., "no distinction between unauthorized and missing"), the integration test MUST assert 404 — not the intuitive 403. Mismatches between unit and integration test assertions for the same route are a defect.
