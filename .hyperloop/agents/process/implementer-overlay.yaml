apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - Full vertical slice is required for every HTTP-exposed service method: When the spec requires an HTTP endpoint, the feature is NOT done until the following four exist together: (a) service method, (b) `@router.verb` route in `presentation/<resource>/routes.py`, (c) Pydantic request model, and (d) route-level unit tests. A service method with no HTTP route is unreachable by API consumers and does NOT satisfy the spec requirement.
  - After any service CRUD method, immediately check the route exists: After writing `create`, `get`, `list*`, `update`, or `delete` in a service class, open the matching `presentation/<resource>/routes.py` and confirm the corresponding `@router.post`, `@router.get`, `@router.patch`/`put`, or `@router.delete` exists. If it does not, add the route in the same task before committing.
  - Run check-service-route-coverage.sh before committing any service file: Execute `bash .hyperloop/checks/check-service-route-coverage.sh` after editing any `*_service.py` file. A non-zero exit means at least one CRUD method lacks a corresponding HTTP route — resolve it before committing.
  - Transactional service methods require a rollback test: Any service method that wraps operations in `async with session.begin()` MUST have a test that injects a failing dependency mid-transaction (mock raises an exception) and asserts the upstream record was NOT persisted. An implementation with `session.begin()` and no failure-path test leaves atomicity as a convention, not a verified contract.
  - Route tests must cover every exception the route handler catches: For each `except ExceptionType → HTTPException(status_code=N)` clause in a route handler, write a companion unit test that mocks the service to raise that exception and asserts the exact HTTP status code. A service-layer test that exercises the exception is not a substitute — the route-to-HTTP translation is a separate contract that must be independently verified.
  - Add .hyperloop/state/ to .git/info/exclude immediately after branch creation — before any other action: Run `echo '.hyperloop/state/' >> "$(git rev-parse --git-dir)/info/exclude"` then confirm with `bash .hyperloop/checks/check-git-state-exclude.sh`. Without this, any `git add .` or `git add -A` silently stages orchestrator-managed metadata into task commits; once committed, the branch cannot be rebased without a full cherry-pick onto a fresh branch. This was the root cause of contamination in task-017 and task-019.
  - After the exclude step, audit the branch for pre-existing intake commit contamination before writing any code: Run `git log --oneline $(git merge-base HEAD alpha)..HEAD | grep 'chore(intake):'`. If ANY intake commits appear, STOP and report to the orchestrator — do NOT attempt to rebase or delete them yourself. Pre-existing contamination (deleted source files, deleted test files, unwanted state files) from intake commits cannot be cleaned up while working on the branch; the orchestrator must cherry-pick delivery commits onto a fresh branch from alpha.
  - Never use 'git rebase origin/alpha' — always rebase against local 'alpha': The orchestrator advances local alpha independently; origin/alpha may be many commits stale. Rebasing against origin/alpha picks up task commits from other branches that are on local alpha but not yet pushed, producing foreign-task contamination (deleted files, removed methods) that cascades into multiple check failures. Before any rebase, run `bash .hyperloop/checks/check-alpha-local-vs-remote.sh` to see the divergence, then run `git rebase alpha` (never `git rebase origin/alpha`). This was the direct root cause of task-038's contamination by task-012's commit.
  - After any rebase, immediately run check-no-foreign-task-commits.sh before committing: Run `bash .hyperloop/checks/check-no-foreign-task-commits.sh`. If any commit with a different Task-Ref is detected, STOP — do not commit, do not proceed. The fix is always to cherry-pick your delivery commits onto a fresh branch from local alpha; document the delivery SHAs and report to the orchestrator.
  - Run check-cascade-delete-cleanup.sh unconditionally before submitting — not only when you modify delete methods: Execute `bash .hyperloop/checks/check-cascade-delete-cleanup.sh` and `bash .hyperloop/checks/check-cascade-delete-empty-collection-mocks.sh` from the project root before committing. A non-zero exit is a blocking failure even if the defect was pre-existing — all check failures on a branch must be resolved before submission regardless of which task introduced them.
  - Run the full backend suite as the definitive PASS gate — never report results based on individual check outputs alone: Execute `bash .hyperloop/checks/check-run-backend-suite.sh` (from the worktree root, not `src/api/`) and confirm it outputs "RESULT: ALL PASS" before recording any PASS verdict. Individual checks may appear to pass while the suite halts or fails on earlier checks — only the full suite exit code of 0 is authoritative. If the suite halts on `check-branch-rebased-on-alpha.sh`, rebase on local `alpha` (not `origin/alpha`) and re-run the entire suite from scratch.
  - Never delete a failing test, route handler, domain exception class, or service parameter to make a check pass — this is always detected by check-no-test-regressions.sh, check-no-source-regressions.sh, and check-no-domain-exception-deletions.sh and constitutes a worse blocking failure than the original bug; the correct fix is to restore the deleted code and then fix the underlying implementation defect.
  - Run check-no-source-regressions.sh and check-no-domain-exception-deletions.sh before every commit — a non-zero exit means application code was removed without a spec mandate, and the fix is always to restore the deleted definition, never to delete the tests that exercise it.
  - After restoring any deleted code (tests, routes, domain exceptions, service parameters), run check-no-test-regressions.sh, check-no-source-regressions.sh, and check-no-domain-exception-deletions.sh in sequence and confirm ALL THREE exit 0 — a clean run from one check does not certify the others; all three must pass before proceeding to the full suite.
  - Before submitting, verify that the remote task branch matches your locally verified clean HEAD — never leave a passing local branch un-pushed: Run `git diff HEAD origin/hyperloop/$(git branch --show-current | sed 's|hyperloop/||')` and confirm it produces no output. If a local clean branch (e.g. `task-NNN-clean`) passes all checks but the remote task branch still carries contaminating commits, force-push immediately: `git push --force-with-lease origin <local-clean-branch>:hyperloop/<task>`. Reporting DONE while a local clean branch diverges from the remote task branch is the direct cause of task-038 receiving a FAIL verdict on a technically complete delivery.
  - When re-submitting after a FAIL verdict, produce an evidence table listing every prior finding number alongside the specific commit SHA and file path that resolves it — do not submit without this table; any finding without a corresponding commit is treated as unresolved regardless of check-suite output.
  - When check-no-test-regressions.sh reports files with net line removal, restore by running `git show $(git merge-base HEAD alpha):<relative/path/to/file> > <path>` — byte-for-byte restoration from the merge base is the only valid fix; rewriting, condensing, or paraphrasing removed tests is NOT restoration and will still fail the check; after restoring each file, re-run check-no-test-regressions.sh and confirm it exits 0 before moving to the next file.
  - Run check-no-route-handler-removals.sh before committing any change to presentation/routes.py — this script catches async def removals that check-no-source-regressions.sh may miss (observed false-PASS in task-035); a non-zero exit means a route handler was removed without spec mandate and must be restored from the merge base.
  - Register every new EventHandler in main.py before committing — unit tests for a handler are not sufficient: after implementing any class with a `supported_event_types()` method, import it in `main.py` and call `handler.register(<instance>, handler_name="<name>")` before writing any tests. Run `bash .hyperloop/checks/check-event-handlers-registered.sh` to confirm; a non-zero exit means at least one handler is absent from the outbox worker and its events will silently go unprocessed at runtime regardless of unit test coverage (root cause of task-013's wire-up gap where SyncLifecycleHandler and IngestionEventHandler were fully tested but never dispatched).
  - Before publishing a new event type to the outbox from a handler, verify a consuming handler exists and is registered — when a handler publishes a downstream event (e.g., IngestionEventHandler publishes JobPackageProduced), a second handler must exist in the target bounded context that lists that event type in `supported_event_types()` and is registered in main.py; publishing without a consumer causes `ValueError: No handler registered for event type` at runtime; if the consuming context is not yet built in this task's scope, file `.hyperloop/blockers/task-NNN-blocker.md` naming the event type and the missing consumer context; run `bash .hyperloop/checks/check-domain-events-have-consumers.sh` before committing (root cause of task-013's JobPackageProduced being published with no extraction-context consumer).
  - All spec scenarios must be COVERED or have a formal blocker before submitting — do not submit with MISSING scenarios: scan every `Scenario:` entry in the spec and confirm each is COVERED with specific code and test citations; if a scenario genuinely cannot be implemented in this task's scope (e.g., it spans a bounded context not yet scaffolded), create `.hyperloop/blockers/task-NNN-blocker.md` naming the missing scenario and its blocking dependency, then notify the orchestrator; submitting partial coverage without a blocker causes verifier FAIL and wastes a full review round (observed in task-013 where 5 scenarios were MISSING with no blocker filed).
  - Rebase onto local alpha at the start of every work session, not only before final submission — a branch that drifts more than 5 commits behind alpha fails check-branch-rebased-on-alpha.sh and forces an otherwise-unnecessary FAIL verdict; run `git rebase alpha` (never `git rebase origin/alpha`) each time you resume work on a branch; both task-038 and task-013 were 22 commits stale at submission, causing cascading false-positive failures in mypy, print-detection, and source-regression checks.
  - Every @pytest.mark.skip (or @pytest.mark.xfail) test must have at least one real assertion — never leave a skipped test body as only a docstring: check-empty-test-stubs.sh does not exempt skip-decorated functions, so a body consisting solely of a docstring, `pass`, or ellipsis FAILS the check even if the skip decorator is present; add `assert True, "<reason — e.g. covered by unit test X>"` as the minimum body; this was the root cause of task-038 FAIL 3 where `test_503_when_auth_backend_unreachable` had a docstring-only body beneath `@pytest.mark.skip`.
  - Rebase onto local alpha as the LAST action before every push for re-review: After completing any fix required by a verifier FAIL, run `git rebase alpha` (never `git rebase origin/alpha`) and immediately confirm `bash .hyperloop/checks/check-branch-rebased-on-alpha.sh` exits 0 before `git push`; alpha accumulates housekeeping commits throughout the review cycle so a branch within the 5-commit threshold at first submission may exceed it by re-submission; check-run-backend-suite.sh halts immediately on a stale branch and prevents confirmation of all other CI checks (direct cause of task-017 needing a second FAIL verdict despite having a clean implementation).
