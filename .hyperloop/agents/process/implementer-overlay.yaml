apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - Full vertical slice is required for every HTTP-exposed service method: When the spec requires an HTTP endpoint, the feature is NOT done until the following four exist together: (a) service method, (b) `@router.verb` route in `presentation/<resource>/routes.py`, (c) Pydantic request model, and (d) route-level unit tests. A service method with no HTTP route is unreachable by API consumers and does NOT satisfy the spec requirement.
  - After any service CRUD method, immediately check the route exists: After writing `create`, `get`, `list*`, `update`, or `delete` in a service class, open the matching `presentation/<resource>/routes.py` and confirm the corresponding `@router.post`, `@router.get`, `@router.patch`/`put`, or `@router.delete` exists. If it does not, add the route in the same task before committing.
  - Run check-service-route-coverage.sh before committing any service file: Execute `bash .hyperloop/checks/check-service-route-coverage.sh` after editing any `*_service.py` file. A non-zero exit means at least one CRUD method lacks a corresponding HTTP route — resolve it before committing.
  - Transactional service methods require a rollback test: Any service method that wraps operations in `async with session.begin()` MUST have a test that injects a failing dependency mid-transaction (mock raises an exception) and asserts the upstream record was NOT persisted. An implementation with `session.begin()` and no failure-path test leaves atomicity as a convention, not a verified contract.
  - Route tests must cover every exception the route handler catches: For each `except ExceptionType → HTTPException(status_code=N)` clause in a route handler, write a companion unit test that mocks the service to raise that exception and asserts the exact HTTP status code. A service-layer test that exercises the exception is not a substitute — the route-to-HTTP translation is a separate contract that must be independently verified.
  - Add .hyperloop/state/ to .git/info/exclude immediately after branch creation — before any other action: Run `echo '.hyperloop/state/' >> "$(git rev-parse --git-dir)/info/exclude"` then confirm with `bash .hyperloop/checks/check-git-state-exclude.sh`. Without this, any `git add .` or `git add -A` silently stages orchestrator-managed metadata into task commits; once committed, the branch cannot be rebased without a full cherry-pick onto a fresh branch. This was the root cause of contamination in task-017 and task-019.
  - After the exclude step, audit the branch for pre-existing intake commit contamination before writing any code: Run `git log --oneline $(git merge-base HEAD alpha)..HEAD | grep 'chore(intake):'`. If ANY intake commits appear, STOP and report to the orchestrator — do NOT attempt to rebase or delete them yourself. Pre-existing contamination (deleted source files, deleted test files, unwanted state files) from intake commits cannot be cleaned up while working on the branch; the orchestrator must cherry-pick delivery commits onto a fresh branch from alpha.
  - Never use 'git rebase origin/alpha' — always rebase against local 'alpha': The orchestrator advances local alpha independently; origin/alpha may be many commits stale. Rebasing against origin/alpha picks up task commits from other branches that are on local alpha but not yet pushed, producing foreign-task contamination (deleted files, removed methods) that cascades into multiple check failures. Before any rebase, run `bash .hyperloop/checks/check-alpha-local-vs-remote.sh` to see the divergence, then run `git rebase alpha` (never `git rebase origin/alpha`). This was the direct root cause of task-038's contamination by task-012's commit.
  - After any rebase, immediately run check-no-foreign-task-commits.sh before committing: Run `bash .hyperloop/checks/check-no-foreign-task-commits.sh`. If any commit with a different Task-Ref is detected, STOP — do not commit, do not proceed. The fix is always to cherry-pick your delivery commits onto a fresh branch from local alpha; document the delivery SHAs and report to the orchestrator.
  - Run check-cascade-delete-cleanup.sh unconditionally before submitting — not only when you modify delete methods: Execute `bash .hyperloop/checks/check-cascade-delete-cleanup.sh` and `bash .hyperloop/checks/check-cascade-delete-empty-collection-mocks.sh` from the project root before committing. A non-zero exit is a blocking failure even if the defect was pre-existing — all check failures on a branch must be resolved before submission regardless of which task introduced them.
  - Run the full backend suite as the definitive PASS gate — never report results based on individual check outputs alone: Execute `bash .hyperloop/checks/check-run-backend-suite.sh` (from the worktree root, not `src/api/`) and confirm it outputs "RESULT: ALL PASS" before recording any PASS verdict. Individual checks may appear to pass while the suite halts or fails on earlier checks — only the full suite exit code of 0 is authoritative. If the suite halts on `check-branch-rebased-on-alpha.sh`, rebase on local `alpha` (not `origin/alpha`) and re-run the entire suite from scratch.
  - Never delete a failing test, route handler, domain exception class, or service parameter to make a check pass — this is always detected by check-no-test-regressions.sh, check-no-source-regressions.sh, and check-no-domain-exception-deletions.sh and constitutes a worse blocking failure than the original bug; the correct fix is to restore the deleted code and then fix the underlying implementation defect.
  - Run check-no-source-regressions.sh and check-no-domain-exception-deletions.sh before every commit — a non-zero exit means application code was removed without a spec mandate, and the fix is always to restore the deleted definition, never to delete the tests that exercise it.
