apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  - Full vertical slice is required for every HTTP-exposed service method: When the spec requires an HTTP endpoint, the feature is NOT done until the following four exist together: (a) service method, (b) `@router.verb` route in `presentation/<resource>/routes.py`, (c) Pydantic request model, and (d) route-level unit tests.
  - After any service CRUD method, immediately check the route exists: After writing `create`, `get`, `list*`, `update`, or `delete` in a service class, open the matching `presentation/<resource>/routes.py` and confirm the corresponding `@router.post`, `@router.get`, `@router.patch`/`put`, or `@router.delete` exists.
  - Run check-service-route-coverage.sh before committing any service file: Execute `bash .hyperloop/checks/check-service-route-coverage.sh` after editing any `*_service.py` file.
  - Transactional service methods require a rollback test: Any service method that wraps operations in `async with session.begin()` MUST have a test that injects a failing dependency mid-transaction and asserts the upstream record was NOT persisted.
  - Route tests must cover every exception the route handler catches: For each `except ExceptionType → HTTPException(status_code=N)` clause in a route handler, write a companion unit test that mocks the service to raise that exception and asserts the exact HTTP status code.
  - Add .hyperloop/state/ to .git/info/exclude immediately after branch creation: Run `echo '.hyperloop/state/' >> "$(git rev-parse --git-dir)/info/exclude"`.
  - Run check-cascade-delete-cleanup.sh unconditionally before any verdict: Execute `bash .hyperloop/checks/check-cascade-delete-cleanup.sh` and confirm exit 0.
  - Run the full backend suite as the definitive PASS gate: Execute `bash .hyperloop/checks/check-run-backend-suite.sh` and confirm it outputs "RESULT: ALL PASS" before recording any PASS verdict.
  - Never delete a failing test, route handler, domain exception class, or service parameter to make a check pass: This is always detected by the regression checks and constitutes a worse blocking failure than the original bug.
  - Run check-no-source-regressions.sh and check-no-domain-exception-deletions.sh before every commit.
  - When a spec mandates replacing or renaming a symbol, add a `Removes: SymbolName` trailer to the commit; check-no-source-regressions.sh will then treat that removal as informational rather than a FAIL: `git commit -m "..." -m "Removes: OldClassName"` (comma-separate multiple symbols).
  - After restoring any deleted code, run check-no-test-regressions.sh, check-no-source-regressions.sh, and check-no-domain-exception-deletions.sh in sequence and confirm ALL THREE exit 0.
  - When re-submitting after a FAIL verdict, produce an evidence table mapping each prior finding to the specific fix applied and the check script that now passes.
  - Run check-no-route-handler-removals.sh before committing any change to presentation/routes.py.
  - Register every new EventHandler in main.py before committing: After implementing any class with a `supported_event_types()` method, import it in `main.py` and call `handler.register(<instance>)`. Run `bash .hyperloop/checks/check-event-handlers-registered.sh` to confirm.
  - Before publishing a new event type to the outbox, verify a consuming handler exists and is registered: Run `bash .hyperloop/checks/check-domain-events-have-consumers.sh` before committing.
  - All spec scenarios must be COVERED or have a formal blocker before submitting.
  - Every @pytest.mark.skip test must have at least one real assertion.
  - When the spec mentions idempotency, duplicate delivery, or retry, run check-idempotency-tests.sh against the spec before submitting.
  - Before EVERY `git commit` (regular commits AND rebase sessions), unconditionally run `git restore --staged --worktree -- .hyperloop/worker-result.yaml 2>/dev/null || true` — do NOT rely on noticing it is staged; run the command every time without condition.
  - Never commit .hyperloop/worker-result.yaml to the task branch: the unconditional restore above is the enforcement mechanism; never skip it even for trivial typo-fix commits.
  - When any protocol artifact file (.hyperloop/worker-result.yaml, .hyperloop/state/**) is accidentally committed, the ONLY correct fix is `git rebase -i $(git merge-base HEAD alpha)` to excise the commit from history; adding a deletion commit does NOT fix the violation because check-worker-result-not-committed.sh flags deletions in branch history as well as additions.
  - If .hyperloop/worker-result.yaml exists in your working tree because it was already on the base branch, its presence is expected and harmless — do NOT delete it via `git rm` or a deletion commit; check-worker-result-not-committed.sh only flags task-branch commits that touch the file, not the inherited file itself.
  - Run check-no-foreign-task-commits.sh before every commit: all commits on this branch must carry Task-Ref matching this task's identifier (e.g. task-019); any foreign Task-Ref is a hard block.
  - Run check-all-commits-have-task-ref.sh before submitting: every non-merge commit must include a Task-Ref trailer — missing trailers prevent foreign-commit detection downstream.
  - Never start work from a dirty branch: always `git checkout -b hyperloop/task-NNN origin/alpha` so the branch contains only commits for this task from the very first commit.
  - Immediately after `git checkout -b hyperloop/task-NNN origin/alpha`, run `bash .hyperloop/checks/install-git-pre-commit-hook.sh` before any other action: this installs a git pre-commit hook that fires automatically at every `git commit` (including fix-up commits during resubmission rounds) and blocks staging of .hyperloop/worker-result.yaml without requiring a manual check; the hook is the ONLY mechanism that has proven reliable because manual pre-commit steps are routinely skipped during quick fix-up commits.
  - A MISSING check in the backend suite means the branch predates that script's addition to alpha: run `git fetch origin && git branch -f alpha origin/alpha && git rebase alpha` to incorporate it, then re-run the suite before proceeding.
  - Before your first commit, run `bash .hyperloop/checks/check-alpha-local-vs-remote.sh` to confirm local alpha matches origin/alpha; a stale local alpha means new check scripts added after branch creation are absent from your worktree.
  - Never cherry-pick commits from alpha, process-improvement branches, or any other branch onto your task branch: The only valid way to incorporate new upstream commits is `git fetch origin && git branch -f alpha origin/alpha && git rebase alpha`; cherry-picking creates duplicate commits with different hashes that (a) carry a foreign Task-Ref and immediately fail check-no-foreign-task-commits.sh, and (b) produce rebase conflicts when alpha later absorbs the same changes.
  - Re-run `bash .hyperloop/checks/check-alpha-local-vs-remote.sh` before every resubmission after a FAIL verdict, not only before the first commit: alpha advances between rounds and a single missed fetch causes all content checks to diff against a stale baseline.
  - When worker-result.yaml is in the MOST RECENT commit only, `git reset --soft HEAD~1` followed by `git restore --staged -- .hyperloop/worker-result.yaml` and recommitting is an acceptable alternative to interactive rebase — both achieve the same history excision; use whichever is simpler for the specific situation.
  - When `check-no-foreign-task-commits.sh` reports commits carrying `Task-Ref: process-improvement` that you did NOT cherry-pick yourself, this is orchestrator contamination — do not attempt to excise those commits; instead, stop work and escalate to the orchestrator to rebuild the branch cleanly from current alpha with only this task's delivery commits.
  - Never run `git rm .hyperloop/worker-result.yaml` under any circumstances — not as a fix, not as cleanup, and not as part of any commit; `git rm` creates a deletion commit that check-worker-result-not-committed.sh flags as a hard FAIL; the only permitted operations on this file are (a) `git restore --staged --worktree -- .hyperloop/worker-result.yaml` to unstage it before committing and (b) `git rebase -i $(git merge-base HEAD alpha)` to excise any commit that touches it from branch history.
  - Passing `check-branch-rebased-on-alpha.sh` does NOT guarantee `check-no-test-regressions.sh` will pass: alpha commits within the 5-commit tolerance may still introduce test classes and test files absent from your branch; when `check-no-test-regressions.sh` fails due to missing test classes or files that exist on alpha, run `git rebase alpha` and re-run the full suite — never add the missing tests manually.
  - "SUITE HALTED: branch is stale" is an absolute submission block: when check-run-backend-suite.sh prints that message, writing worker-result.yaml with any verdict is a protocol violation; the ONLY valid next action is the three-step sequence (git fetch origin → git branch -f alpha origin/alpha → git rebase alpha) followed by a fresh full suite run that outputs "RESULT: ALL PASS".
  - When check-no-foreign-task-commits.sh reports Task-Ref: process-improvement commits AND check-branch-rebased-on-alpha.sh is also failing, the commits are stale artifacts from before those process-improvement changes were merged to alpha — run git rebase alpha and git will automatically drop them as empty commits; do not use interactive rebase, cherry-pick, or escalate to the orchestrator for this specific scenario.
  - When adding a new parameter to any method that participates in a multi-layer call chain (e.g. route → enclave service → query service → repository), write a propagation test at EVERY layer: each layer's test must mock its immediate collaborator (not the final layer) and assert the new parameter arrives with the expected value; do not assume a service-level test covers the enclave layer or that a repository-level test covers the service layer.
  - Before running the backend suite for any submission or resubmission, perform the complete three-step sequence in order: (1) `git fetch origin`, (2) `git branch -f alpha origin/alpha`, (3) `git rebase alpha`; updating local alpha without rebasing the task branch causes check-alpha-local-vs-remote.sh to pass while check-branch-rebased-on-alpha.sh still fails — all three steps are required as an atomic unit; a stale task branch will accumulate process-improvement commits from alpha that appear as foreign-task violations even though the implementer never cherry-picked them.
  - Before every `git commit`, run `cd src/api && uv run ruff check .` and confirm zero output: an F811 error means two classes or functions share the same name in the same module — Python silently uses the second definition, which may contain different fields than the first (e.g. a spurious `count` field on an update-request model), causing a functional bug that all unit tests miss because they always import the winning definition.
  - Run `bash .hyperloop/checks/check-no-worker-result-staged.sh` before every `git commit` as a dedicated pre-commit gate: if the file is staged as a deletion (e.g. because you ran `git rm` or deleted it manually as "cleanup"), the script fails and tells you to run `git restore --staged --worktree -- .hyperloop/worker-result.yaml`; a staged deletion that is committed will fail check-worker-result-not-committed.sh and require interactive rebase to fix — catching it pre-commit is always cheaper.
  - Writing worker-result.yaml while check-run-backend-suite.sh reports any FAIL is a protocol violation: a partial score (e.g. "25/26 PASS") is not a PASS; writing worker-result.yaml in that state is a false verdict regardless of intent; the ONLY permitted action when the suite fails is to fix each failing check and re-run until the output is "RESULT: ALL PASS".
  - The first action when starting any resubmission round is to run `bash .hyperloop/checks/check-run-backend-suite.sh` BEFORE touching any file: confirm the prior round's specific blocking check(s) now exit 0; if the suite still reports FAIL on those checks, apply the fix (e.g. interactive rebase for worker-result.yaml) and re-run the suite before writing any new code; do not proceed to implementation until the suite passes on the existing commits.
  - When `check-no-foreign-task-commits.sh` reports process-improvement commits that also ADD new files (confirm with `git show <sha> --name-only | grep -v '^$'`), do NOT attempt `git rebase alpha` — foreign commits that add check scripts or overlay files will produce CONFLICTS during rebase, not silent empty-commit drops; the only safe remediation is the clean cherry-pick path: `git checkout -b hyperloop/task-NNN-clean alpha && git cherry-pick <delivery-sha-1> [<delivery-sha-2> ...]` followed by `bash .hyperloop/checks/check-run-backend-suite.sh`; this rule supersedes the rebase-to-drop guidance in prior rules specifically when the foreign commits have file additions.
  - After the three-step sequence (`git fetch origin && git branch -f alpha origin/alpha && git rebase alpha`), run `bash .hyperloop/checks/check-no-test-regressions.sh` as a standalone check BEFORE running the full backend suite: if pass 2 fails, alpha advanced again during or after the fetch — repeat the three-step sequence immediately; iterating here is cheaper than discovering the failure after the full suite.
  - When `check-no-test-regressions.sh` pass 2 fails but pass 1 passes, the ONLY valid fix is `git rebase alpha` — never manually copy or add test files from alpha; the rebase will incorporate them atomically and correctly.
  - Content equivalence is NOT merge-base equivalence: manually incorporating alpha changes by writing a new fix commit (even one that contains identical content) does NOT update the merge-base that check-branch-rebased-on-alpha.sh measures; if you believe upstream changes are "already present" on your branch, the three-step sequence (`git fetch origin && git branch -f alpha origin/alpha && git rebase alpha`) is still required unconditionally — the rebase will fast-forward the merge-base, drop content-equivalent commits as empty, and bring the branch within the staleness threshold.
  - Run check-no-foreign-task-commits.sh immediately after every git rebase (including the mandatory three-step pre-submission sequence): a rebase carries ALL existing branch commits forward verbatim — any foreign commit present before the rebase will still be present after it; this check must fire right after the rebase, before running any other check or writing any verdict.
  - After every `git commit` that modifies application source files, immediately run `bash .hyperloop/checks/check-last-commit-removes-trailers.sh` and confirm exit 0 before making any additional commits: this script inspects only the most recent commit, detecting removed classes or functions that lack a `Removes: SymbolName` trailer; check-no-source-regressions.sh cannot catch this at post-commit time because it compares merge-base..HEAD and the commit is already in history.
  - When check-last-commit-removes-trailers.sh exits 1, the ONLY correct fix is `git commit --amend` to add `Removes: SymbolA, SymbolB` to the same commit that introduced the removal — never create a separate follow-up commit that only adds the trailer; check-no-source-regressions.sh matches Removes: trailers to the commit that performed each removal, so a trailer on a different commit does not satisfy the check.
  - Rollback tests for transactional cascade deletes MUST be integration tests, not unit tests: a mock session cannot roll back a real database transaction; only a test that uses a real database (marked `@pytest.mark.integration` or under `tests/integration/`) can verify that `async with session.begin()` actually rolls back partial state on failure.
  - check-cascade-delete-rollback-test.sh is part of the backend suite and will block submission automatically: write the rollback integration test before committing the service delete method, not after the suite fails — the suite is the enforcement gate, so every transactional cascade delete must have an integration rollback test on the same commit that introduces the delete.
  - Service-layer cascade delete rollback tests MUST call `Service.delete()` directly — NOT just repo methods: the spec's "entire deletion rolls back" requirement applies to the full service operation; a repo-layer rollback test (which bypasses the service) does NOT satisfy this requirement; the test must instantiate the Service with a real AsyncSession and call `.delete()` with a dependency that raises mid-cascade.
  - Place service-level rollback integration tests in a file whose path contains "service" (e.g., `tests/integration/management/test_knowledge_graph_service.py`): check-cascade-delete-rollback-test.sh uses "service" in the file path as the primary discriminator for service-level tests.
  - Application-layer service tests must NOT use `AsyncMock()` or `MagicMock()` for repository ports (`IXxxRepository`, `IXxxStore`) or probe protocols: create in-memory fake classes implementing the port interface instead; the check-no-repo-port-mocks.sh script enforces this and is part of the backend suite.
  - Before writing a new in-memory fake for a port, check `tests/fakes/` for an existing implementation: `InMemoryAuthorizationProvider` already exists in `tests/fakes/authorization.py` — use it instead of `AsyncMock()` for `AuthorizationProvider` in service tests.
  - Probe protocols (e.g., `KnowledgeGraphServiceProbe`) must be tested with a concrete recording class, not `MagicMock()` or `AsyncMock()`: create a `RecordingXxxProbe` class in the test file that implements the Protocol and records calls in a list for assertion.
  - Run `bash .hyperloop/checks/check-no-repo-port-mocks.sh` before committing any application-layer test file: it catches both the inline-assignment form (`mock_kg_repo = AsyncMock()`) and the pytest-fixture form (`def mock_kg_repo(): return AsyncMock()`).
  - Run `bash .hyperloop/checks/check-no-multiple-alembic-heads.sh` before every `git push` when the branch adds a migration file: multiple heads cause `alembic upgrade head` to abort at startup; if the check fails, run `cd src/api && uv run alembic merge heads -m "merge migration branches"` and commit the resulting merge revision before pushing.
  - A task with zero commits is NEVER complete, even when all tests already pass: if the spec requires only verification (all tests pass, no new code needed), produce a `test: verify <scope> spec scenarios covered` commit that records which spec scenarios the existing tests cover — this satisfies check-implementation-commits-exist.sh and gives the verifier evidence that the task was actually executed, not skipped.
  - Before every `git commit`, run `git diff --cached` and verify the commit message direction matches the staged diff: if the message says "remove" or "delete X", the diff must show `-` lines for X; if the message says "add" or "implement X", the diff must show `+` lines for X — a message that describes the opposite of what the diff does (e.g. "remove stale pin" when the diff ADDS a pin) is a protocol violation that must be corrected before committing.
  - Before modifying any file, verify it is referenced in the task spec or is a direct dependency of a spec-required change: writing changes to files outside the task's scope — even when those files appear to need similar work — creates commits that duplicate content already on alpha and produce unresolvable rebase conflicts.
  - Before editing a file not explicitly named in the spec, run `git log --oneline alpha -- <path>` to check whether alpha already contains changes to that file: if alpha has recent commits touching it, do NOT write equivalent changes — duplicate commits cause hard rebase conflicts at merge time.
  - Run `bash .hyperloop/checks/check-branch-rebases-cleanly.sh` before every submission: a branch that cannot rebase onto alpha cannot merge regardless of whether all other checks pass; a conflict indicates an out-of-scope commit that must be dropped via `git rebase -i $(git merge-base HEAD alpha)`.
  - Never use `await new Promise(resolve => setTimeout(resolve, N))` in production pages or composables as a substitute for a real backend API call: this pattern fakes async latency without actually calling the backend and passes existing stub checks — run `bash .hyperloop/checks/check-no-api-simulation.sh` before committing any `.vue` or `.ts` file under `pages/` or `composables/`; if the required backend endpoint does not exist yet, raise a formal blocker at `.hyperloop/blockers/task-NNN-blocker.md` instead of shipping simulation code.
  - After writing a wizard's final approve/submit/confirm handler, audit every previous step's reactive state for completeness: read back through every `ref()` / `reactive()` field collected across all wizard steps and verify each appears in the final API payload; any field collected from the user but absent from the API call body is a silent data-loss bug (root cause of task-045 FAIL 2: edited ontology nodes/edges were collected across four steps but `approveOntology()` submitted only `connection_config`).
  - Security invariant constraints must have a dedicated regression test: any rule of the form "X is never written to localStorage / sessionStorage / the URL" must be guarded by a test that reads those stores after triggering the relevant flow and asserts the value is null or absent — an implementation that merely avoids the write is insufficient without a test that would catch a future regression.
  - Before submitting any task scoped to a scenario within a `*.spec.md` file, perform an explicit full-spec SHALL-gap audit: open the entire spec file, enumerate every `Scenario:` block and every `SHALL`/`MUST` requirement, and for each one identify the specific test file AND test function(s) that cover it by name — any scenario you cannot trace to a real, non-empty test function is a submission blocker even when it lies outside your primary task scenario; either write the missing test or raise a formal blocker at `.hyperloop/blockers/task-NNN-blocker.md` before writing your worker-result.yaml.
  - When a SHALL scenario is fulfilled by a library-provided feature (e.g., Monaco/CodeMirror syntax highlighting, autocomplete, linting), write a test that asserts your code configures the library correctly — not that the library functions internally, but that the integration point is wired (e.g., the editor is instantiated with the correct language, extensions, or keybinding config); "the library handles it" is never sufficient SHALL coverage and will be rated PARTIAL by the verifier.
