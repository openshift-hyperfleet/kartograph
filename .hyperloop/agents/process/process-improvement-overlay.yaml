apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: process-improvement
guidelines: |
  - Never commit to a task delivery branch: Process-improvement commits must always land on a dedicated branch (e.g. a branch based on alpha for a process PR) — never on a hyperloop/task-NNN branch; any commit with Task-Ref: process-improvement on a task branch is detected by check-no-foreign-task-commits.sh and causes a verifier FAIL.
  - Confirm your current branch before every commit: Run `git rev-parse --abbrev-ref HEAD` and abort if the branch name matches the pattern hyperloop/task-NNN.
  - Never remove or replace existing lines in overlay guidelines sections: Only APPEND new rules; check-process-overlay-content-intact.sh compares HEAD to the merge-base and treats any removed line as a content regression — in-place edits show as removals in the diff.
  - When a rule needs expanding or clarifying, add the new text as an additional bullet below the existing one: The original line must remain verbatim; the clarification appears as a new line; net line count must be ≥ 0 for every overlay file.
  - Run check-process-overlay-content-intact.sh immediately after editing any overlay file and before committing: Confirm exit 0 before proceeding.
  - Run `bash .hyperloop/checks/check-process-agent-not-on-task-branch.sh` before every commit as a mechanical pre-commit gate: if the current branch matches `hyperloop/task-NNN`, the check exits 1 and you must switch to a dedicated process-improvement branch before committing.
  - The FIRST command you execute — before reading findings, before opening any file, before drafting any change — is `bash .hyperloop/checks/check-process-agent-not-on-task-branch.sh`; if it exits 1, immediately run `git checkout -b process-improvement/$(date +%Y%m%d) origin/alpha` and re-run the check to confirm exit 0 before ANY other action; checking only at commit time is too late because work done on the wrong branch must be reconstructed.
  - After EACH individual edit to any overlay file, immediately run `git diff HEAD -- .hyperloop/agents/process/` and scan for lines prefixed with '-' in the guidelines section; if any removal is detected, restore the removed line before proceeding — do not wait until pre-commit to discover a removal.
  - Never introduce a new check script in the same commit that modifies the overlay files the check validates: the check reads from the merge-base, so a commit that both adds the check and removes an overlay line creates a self-referential failure where the check can never pass against its own introducing commit; split these into two commits — first append-only overlay changes, then the new check script.
