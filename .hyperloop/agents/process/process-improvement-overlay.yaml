apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: process-improvement
guidelines: |
  - Never commit to a task delivery branch: Process-improvement commits must always land on a dedicated branch (e.g. a branch based on alpha for a process PR) — never on a hyperloop/task-NNN branch; any commit with Task-Ref: process-improvement on a task branch is detected by check-no-foreign-task-commits.sh and causes a verifier FAIL.
  - Confirm your current branch before every commit: Run `git rev-parse --abbrev-ref HEAD` and abort if the branch name matches the pattern hyperloop/task-NNN.
  - Never remove or replace existing lines in overlay guidelines sections: Only APPEND new rules; check-process-overlay-content-intact.sh compares HEAD to the merge-base and treats any removed line as a content regression — in-place edits show as removals in the diff.
  - When a rule needs expanding or clarifying, add the new text as an additional bullet below the existing one: The original line must remain verbatim; the clarification appears as a new line; net line count must be ≥ 0 for every overlay file.
  - Run check-process-overlay-content-intact.sh immediately after editing any overlay file and before committing: Confirm exit 0 before proceeding.
  - Run `bash .hyperloop/checks/check-process-agent-not-on-task-branch.sh` before every commit as a mechanical pre-commit gate: if the current branch matches `hyperloop/task-NNN`, the check exits 1 and you must switch to a dedicated process-improvement branch before committing.
  - The FIRST command you execute — before reading findings, before opening any file, before drafting any change — is `bash .hyperloop/checks/check-process-agent-not-on-task-branch.sh`; if it exits 1, immediately run `git checkout -b process-improvement/$(date +%Y%m%d) origin/alpha` and re-run the check to confirm exit 0 before ANY other action; checking only at commit time is too late because work done on the wrong branch must be reconstructed.
  - After EACH individual edit to any overlay file, immediately run `git diff HEAD -- .hyperloop/agents/process/` and scan for lines prefixed with '-' in the guidelines section; if any removal is detected, restore the removed line before proceeding — do not wait until pre-commit to discover a removal.
  - Never introduce a new check script in the same commit that modifies the overlay files the check validates: the check reads from the merge-base, so a commit that both adds the check and removes an overlay line creates a self-referential failure where the check can never pass against its own introducing commit; split these into two commits — first append-only overlay changes, then the new check script.
  - Create the dedicated process-improvement branch UNCONDITIONALLY as your ABSOLUTE FIRST git action — do NOT check your current branch first, just run: `git fetch origin && git checkout -b process-improvement/$(date +%Y%m%d-%H%M%S) origin/alpha`; unconditional creation is safer than conditional check-and-switch because an unexpected git state (detached HEAD, leftover task branch) can cause the check to pass incorrectly; if checkout fails because you are already on a valid non-task branch, the error is recoverable — committing to the wrong branch requires orchestrator intervention and blocks the task for multiple rounds.
  - Run `bash .hyperloop/checks/check-process-improvement-commit-is-clean.sh` before every `git commit`: this script enforces all three pre-commit invariants atomically — (a) branch is not a task branch, (b) all staged files are within `.hyperloop/`, (c) no overlay lines are removed in staged diff; it is the single pre-commit gate that replaces checking each invariant manually.
  - Run `bash .hyperloop/checks/install-process-agent-pre-commit-hook.sh` as the ABSOLUTE FIRST action in every session — BEFORE branch creation and BEFORE any other command: this installs a git pre-commit hook that mechanically runs check-process-improvement-commit-is-clean.sh for every subsequent `git commit` without any per-commit manual step; the hook is idempotent and safe to re-run; installing it BEFORE branch creation ensures the gate is active even if the checkout fails or the orchestrator has already placed you on the wrong branch — the task-035 recurrence (four process-improvement commits landing directly on the task branch despite overlay rules) was caused by missing this mechanical backstop.
  - Never include a task-specific identifier (e.g. `(task-035)`, `for task-019`) in a process-improvement commit subject: process rules are broadly applicable and a task-scoped subject is a diagnostic signal that the commit was authored while the process agent was running on the wrong branch (a task branch) — any commit whose subject references a specific task number should be treated as contaminated and must not be pushed to alpha.
  - After installing the pre-commit hook, verify it is active by running `cat "$(git rev-parse --git-dir)/hooks/pre-commit" 2>/dev/null | grep -q check-process-improvement-commit-is-clean && echo "hook active" || echo "HOOK MISSING — re-run install-process-agent-pre-commit-hook.sh"`: if the hook is missing despite the install step, the git directory may have changed (e.g., due to a worktree switch) — re-run the install script from the current working directory before proceeding.
  - When writing any check script that uses `grep -r`, `grep -rn`, or `grep --include=`, always include `--exclude-dir=.venv` in the same grep invocation: recursive grep without this exclusion scans third-party packages in the virtual environment and produces false positives on pattern matches inside installed libraries; run `bash .hyperloop/checks/check-no-check-script-deletions.sh` after writing every new `.sh` file and confirm exit 0 before committing — the sabotage-detection section of that script will FAIL if the new check omits the exclusion (root cause of task-099 FAIL: `string-constants-match-spec.sh` used `grep -r` without `--exclude-dir=.venv` and was flagged as a sabotaged script).
  - Never commit source code files (any file outside `.hyperloop/`) even when a code defect is discovered during analysis: if you identify a bug while reviewing findings, document it as an observation and stop — creating a `fix(...)` commit touching source files with `Task-Ref: process-improvement` produces the most severe contamination pattern (source-code change + wrong Task-Ref on a task branch) and requires orchestrator-level branch reconstruction to remediate; instead, include the bug description in your process-improvement commit message body so the orchestrator can open a dedicated task for it (root cause of task-145 contamination: commit `457680c9e` changed `services.py` with `Task-Ref: process-improvement`, which check-process-improvement-commit-is-clean.sh invariant (b) should have blocked — the pre-commit hook was not active).
  - After running `install-process-agent-pre-commit-hook.sh`, immediately verify the hook is actually present and active by running `cat "$(git rev-parse --git-dir)/hooks/pre-commit" 2>/dev/null | grep -c "check-process-improvement-commit-is-clean" | grep -q "^[1-9]" && echo "HOOK ACTIVE" || echo "HOOK MISSING — abort and diagnose"`: if the output is not "HOOK ACTIVE", do NOT proceed — the git directory may have changed due to a worktree switch or session restart; re-run the install script from the current working directory and re-verify; committing without a confirmed-active hook means invariant [2] (no staged files outside .hyperloop/) has NO mechanical enforcement and source-code changes can bypass the check silently (root cause of task-145: hook not verified as active → source code commit slipped through).
  - Before every `git add` or `git commit`, run `git diff --cached --name-only | grep -v "^\.hyperloop/" | head -5` and confirm empty output: if any path is printed, that file is staged outside .hyperloop/ — unstage it immediately with `git restore --staged <file>` and do NOT commit; this is a manual backstop for the pre-commit hook and catches the case where the hook fails to fire due to a misconfigured git directory; the hook is primary but this manual check is the fallback that the hook cannot provide if it isn't running.
  - Process-improvement commits MUST begin with one of these conventional commit type prefixes: `chore(process):`, `chore(checks):`, `docs(process):`, or `refactor(process):`; any `fix(<scope>):`, `feat(<scope>):`, or `refactor(<non-process-scope>):` prefix is PROHIBITED because code-domain conventional commit types signal source-code changes — before running `git commit`, verify the subject with `echo "<subject>" | grep -qE "^(chore\(process\)|chore\(checks\)|docs\(process\)|refactor\(process\)):" && echo "OK" || echo "BLOCKED: invalid prefix"` and abort if the output is not "OK"; the specific fingerprint of task-145's contaminating commit was `fix(query): correct error_type` (commit `457680c9e`), which would have been caught by this rule before any staged-file check ran.
  - After running `install-process-agent-pre-commit-hook.sh`, verify the commit-msg hook is ALSO active with `cat "$(git rev-parse --git-dir)/hooks/commit-msg" 2>/dev/null | grep -q process-subject-guard && echo "commit-msg ACTIVE" || echo "commit-msg MISSING — re-run install-process-agent-pre-commit-hook.sh"`; the install script now installs BOTH a pre-commit hook (blocks staged files outside `.hyperloop/`) AND a commit-msg hook (blocks disallowed subject-type prefixes); having both active means a failed hook installation of one guard still leaves the other running — the task-145 root cause was a single-point-of-failure where the pre-commit hook alone was absent and no second gate existed.
