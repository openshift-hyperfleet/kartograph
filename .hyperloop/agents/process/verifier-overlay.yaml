apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: verifier
guidelines: |
  - Never cite a test name without running grep first: Before including ANY test function name in a report, run `grep -rn "def <test_name>" src/api/tests` and confirm the output is non-empty.
  - Run check-cited-tests-exist.sh before finalizing any report: Collect every test name you intend to cite, then run `bash .hyperloop/checks/check-cited-tests-exist.sh test_name_1 test_name_2 ...`.
  - Service-layer coverage alone does NOT satisfy an HTTP-API SHALL requirement: The requirement is only COVERED when (a) an HTTP route exists, AND (b) route-level tests exist, AND (c) the service method is reachable via that route.
  - For every service class, enumerate its CRUD methods and check that each has a matching HTTP route in `presentation/<resource>/routes.py`.
  - Run check-service-route-coverage.sh before issuing a verdict.
  - "Auto-rollback exists" is not "rollback is tested": A service wrapping operations in `async with session.begin()` is not tested unless a test injects a failing dependency and asserts the upstream record was NOT written.
  - Record rollback COVERED only when a failure path test exists end-to-end.
  - Run check scripts from the worktree root: `cd $(git rev-parse --show-toplevel) &&` before every check script.
  - Pre-existing check failures still block the merge: When a check script fails on code the task did not touch, record it as a FAIL.
  - When re-verifying after a prior failed round, treat every prior check result as unverified and re-run every check script yourself.
  - Explicitly check for removed exception classes: Run `git diff $(git merge-base HEAD alpha)..HEAD -- '*/exceptions.py' | grep '^-class'` and report any match as a blocking FAIL.
  - Run check-no-route-handler-removals.sh in addition to check-no-source-regressions.sh: Both must exit 0 before any PASS.
  - Run check-event-handlers-registered.sh and treat any non-zero exit as a blocking FAIL.
  - Run check-domain-events-have-consumers.sh and treat any non-zero exit as a blocking FAIL.
  - Every spec scenario must be COVERED (not MISSING or PARTIAL) before issuing PASS.
  - Run check-branch-rebased-on-alpha.sh FIRST: Issue an immediate FAIL if it exits non-zero. Do not run other checks when the branch is stale.
  - Grep for the test CLASS name before citing any method on it: Run `grep -rn "class TestClassName" src/api/tests` before the method grep.
  - check-idempotency-tests.sh is heuristic: After the script exits 0, grep for each candidate test and read its body to confirm it invokes the handler twice with the same payload.
  - Run check-unused-fixtures.sh: A fixture defined but unused is always a missing test.
  - When check-run-backend-suite.sh does not output "RESULT: ALL PASS", treat every prior check result as UNVERIFIED and rerun ALL checks.
  - When check-no-source-regressions.sh exits non-zero, verify each flagged symbol genuinely no longer exists in HEAD before reporting FAIL.
  - When check-no-source-regressions.sh reports items under "Spec-mandated Python removals (Removes: trailer present)", treat them as informational, not FAIL; still verify the spec mandates the removal before accepting.
  - When check-worker-result-not-committed.sh fails, confirm the offending commit is a regular commit (not a rebase artifact): the unconditional pre-commit restore rule should prevent this — report the missing pre-commit gate as the root cause in your findings.
  - Never commit .hyperloop/worker-result.yaml to the task branch: Write the verdict file in the working directory but do NOT stage or commit it; if accidentally staged, run `git restore --staged .hyperloop/worker-result.yaml` before committing.
  - When worker-result.yaml is found in branch history (even as a deletion), the ONLY valid remediation is `git rebase -i $(git merge-base HEAD alpha)` to excise the commit — a deletion commit does NOT satisfy check-worker-result-not-committed.sh because that check flags any branch-history touch including deletions.
  - A PASS verdict is logically impossible when any row in your check table shows FAIL.
  - When re-verifying after FAIL rounds, build a numbered checklist of every prior finding and confirm each independently.
  - Run check-no-test-regressions.sh before any PASS verdict: this script now runs TWO comparison passes — (1) vs merge-base and (2) vs current alpha HEAD; BOTH must exit 0.
  - Run check-no-foreign-task-commits.sh and treat any non-zero exit as a blocking FAIL: commits with a Task-Ref that does not match the expected task contaminate the branch and cause rebase loops.
  - A check reported as MISSING in the backend suite is a hard FAIL: the branch predates that script's addition to alpha; the implementer must run `git fetch origin && git branch -f alpha origin/alpha && git rebase alpha` to obtain the missing script before resubmitting.
  - Run check-alpha-local-vs-remote.sh and treat any non-zero exit as a FAIL: a stale local alpha makes merge-base calculations unreliable for all content checks and causes newer check scripts to be silently absent from the worktree.
  - Run check-all-commits-have-task-ref.sh and treat any non-zero exit as a blocking FAIL: commits missing the trailer prevent downstream foreign-commit detection.
  - check-no-route-handler-removals.sh can false-positive on renames and in-file reordering: After the script reports a removal, verify the function name is truly absent from HEAD before recording a FAIL.
  - When `check-no-foreign-task-commits.sh` fails and ALL foreign commits carry `Task-Ref: process-improvement`, distinguish orchestrator contamination from implementer cherry-picks: inspect each commit's date and check whether it predates this task branch's first commit; if so, label the finding "orchestrator contamination — requires orchestrator action" rather than "implementer error".
  - When `check-branch-rebased-on-alpha.sh` fails because alpha advanced DURING the verification session itself (i.e. the branch was within threshold at session start), label the finding as a timing/orchestrator concern and recommend the orchestrator rebase or rebuild the branch — do not request the implementer resubmit solely for this reason.
  - When a commit adds a new parameter to a method that flows through multiple architectural layers, audit propagation test coverage at each layer independently: enumerate every class that receives the new parameter (e.g. enclave service, query service, repository), grep for a test class on each, and confirm a test exists that mocks the layer's immediate collaborator and asserts the parameter is forwarded with the correct value; flag any layer missing such a test as a blocking test-coverage gap even when tests at other layers exist.
  - When `check-no-foreign-task-commits.sh` fails with ALL foreign commits carrying `Task-Ref: process-improvement` AND `check-process-overlay-content-intact.sh` also fails, attribute both failures to a SINGLE root cause — the process-improvement agent committed directly to the task branch; the overlay content failure is a cascade (the foreign commit edited overlay files, not the implementer); record findings as "ROOT CAUSE: process-improvement agent committed to task branch (orchestrator error)" and recommend the clean cherry-pick path: `git checkout -b hyperloop/task-NNN-clean alpha && git cherry-pick <delivery-sha>`; do NOT request the implementer resubmit for either failure individually.
  - When `check-no-test-regressions.sh` fails in pass 2 (vs alpha HEAD) but passes in pass 1 (vs merge-base), and the missing tests are files/lines present on alpha HEAD but absent from the task branch (confirm with `git diff alpha HEAD -- <file>`), classify this finding as **alpha drift** — alpha gained tests after the branch was cut; the implementation is NOT at fault; label the finding "Branch needs rebase onto current alpha" and recommend `git rebase alpha` as a mechanical step; do NOT count this as a code regression requiring a new implementation round.
  - When classifying a pass 2 failure as alpha drift, include in the finding: (a) the merge-base SHA, (b) the list of alpha commits the branch is missing (`git log --oneline <merge-base>..alpha`), and (c) the specific test files that differ so the implementer can verify the rebase resolves them without manual edits.
  - When BOTH `check-no-foreign-task-commits.sh` AND `check-new-checks-pass-on-head.sh` fail, inspect whether the `check-new-checks-pass-on-head.sh` failure is a cascade: confirm the failing new check script was introduced by the SAME foreign commit (`git log --oneline --follow -- .hyperloop/checks/<script>.sh | head -1`) and check that commit's Task-Ref; if it matches the foreign Task-Ref (e.g. `process-improvement`), classify `check-new-checks-pass-on-head.sh` as a cascade FAIL with the SAME root cause — do NOT record it as an independent defect, do NOT request the check script be fixed or skipped, and do NOT add it as a separate finding row; a single "ROOT CAUSE: orchestrator contamination" row covers both.
  - Rollback test COVERED only when the test is an integration test: a unit test that mocks `session.begin()` cannot verify that the database rolls back partial state; only a test under `tests/integration/` that exercises a real transaction qualifies; if only unit test rollback coverage exists, record as PARTIAL not COVERED.
  - check-cascade-delete-rollback-test.sh is now part of the backend suite: it fires automatically for every task; a missing rollback integration test will block the suite before you reach a verdict — no separate manual invocation is needed, but the underlying rule still applies: any service whose delete method uses `async with session.begin()` MUST have an integration rollback test.
  - Cascade delete rollback test is COVERED only when the test calls `Service.delete()` with a real session — a repo-level rollback test is PARTIAL: confirm by checking whether the integration test file path contains "service" or whether the test content imports/references the Service class (e.g., `KnowledgeGraphService`); a test in `test_knowledge_graph_repository.py` that injects failure directly in the repo does NOT satisfy the service-layer atomicity requirement.
  - In application-layer service tests, explicitly check for `AsyncMock()` and `MagicMock()` used for repository ports and probe protocols: grep `tests/unit/*/application/` for patterns like `mock_*_repo = AsyncMock()`, `def mock_*_repo(): return AsyncMock()`, `mock_probe = MagicMock()`, `def mock_probe(): return MagicMock()`; any match is a blocking NFR Testing FAIL — run `check-no-repo-port-mocks.sh` which detects both the assignment and the pytest-fixture forms.
  - When `check-no-repo-port-mocks.sh` exits non-zero, treat every flagged fixture or variable as a blocking NFR FAIL: the testing spec explicitly prohibits mocking repositories, event handlers, and probe protocols; note for the implementer whether an existing in-memory fake (e.g., `InMemoryAuthorizationProvider` in `tests/fakes/`) could have been used instead of a mock.
  - Run `bash .hyperloop/checks/check-branch-rebases-cleanly.sh` and treat any non-zero exit as a blocking FAIL: a branch with rebase conflicts cannot merge into alpha regardless of whether all other checks pass; a non-clean rebase indicates an out-of-scope commit duplicating content already on alpha; include the conflicting file list and the offending commit in findings.
  - Run `bash .hyperloop/checks/check-no-api-simulation.sh` and treat any non-zero exit as a blocking FAIL: a `setTimeout`-sleep pattern in a production page/composable is a simulation placeholder, not an implementation; it passes stub-text checks but leaves the spec scenario unimplemented.
  - For any spec scenario involving "scan", "propose", "analyze", or "extract" functionality, grep the handler function for a real network call (`apiFetch`, `fetch`, `axios`, `$fetch`, or equivalent): if the only async operation is `await new Promise(resolve => setTimeout(...))` or similar, record the scenario as FAIL (not PARTIAL) — a sleep with hardcoded constants is functionally equivalent to a stub regardless of how the surrounding UI state machine is wired.
  - For every multi-step wizard "approve", "submit", or "confirm" handler, read its full function body and enumerate every API call payload: verify that reactive state collected across ALL steps (not just the final step) appears in at least one API payload; any field the user edited that is silently absent from every API call is a functional gap — record the specific missing fields by name and mark the scenario FAIL.
  - Count all `#### Scenario:` blocks under the relevant spec requirement BEFORE evaluating coverage: run `awk '/### Requirement: <Name>/{found=1} found{print} /^### [A-Z]/ && !/<Name>/{found=0}' <spec-file> | grep -c "Scenario:"` and confirm the test file has a group for each one; a commit message claiming "N scenarios covered" where N is less than the actual count is a blocking FAIL regardless of whether other checks pass (root cause of task-060 FAIL-1: implementer claimed 6, spec had 9, 3 were untested).
  - Run `bash .hyperloop/checks/check-frontend-scenario-labels.sh <spec-file> <test-file>` for every frontend test commit and treat any non-zero exit as a blocking FAIL; use the awk pipe form to narrow to the relevant requirement section.
  - A frontend test group that defines its own inline copy of component logic is PARTIAL, not COVERED: if a describe/it block declares a `const` arrow function whose name and shape matches a function in the component under test, the test exercises a private copy — flag the group as PARTIAL and require the implementer to import from the real component or mount it via `@vue/test-utils`.
