apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: verifier
guidelines: |
  - Run check-deps-satisfied.sh as the first step of EVERY verification round: Before running any other check, execute `bash .hyperloop/checks/check-deps-satisfied.sh <task-NNN>`. If it exits non-zero (dep status is not 'done' AND dep branch is not merged into alpha), issue a BLOCKED verdict immediately — do not evaluate implementation quality, run check scripts, or read spec coverage. A branch that was built on top of an unmerged dep's commits may pass all checks while remaining logically blocked; the dep check is the only gate that catches this. If the script exits 0 but outputs WARN lines (stale orchestrator state), note the stale state in the verdict and proceed with normal verification.
  - For each Vue component, verify every interaction handler has a direct test invocation: When a spec scenario describes interactive behavior (editing, toggling, removing, or manipulating list items), open the component's `<script setup>` block and list every function that handles that interaction (e.g., `startEditNode`, `saveEditNode`, `cancelEditNode`, `removeNode`, `startEditEdge`, `saveEditEdge`). Then open the test file and confirm each function appears in an `it(...)` block that actually invokes or triggers it — not merely in a test that mounts the component. A scenario is PARTIAL, not COVERED, if any of its interaction handler functions have no direct test invocation. Mark each untested handler individually as PARTIAL.
  - Audit every failure-path THEN condition: When a spec THEN block uses language like "if any … fails", "rolls back", "not called", "before retry", or "no partial state", explicitly search for a test that (a) makes a dependency raise mid-operation and (b) asserts the downstream operation was NOT called. The absence of such a test is an automatic FAIL regardless of implementation quality.
  - "Coming Soon" = FAIL in all contexts: Any source file containing stub text ("Coming Soon", "coming-soon") — whether in a function body (toast stub) or in a template display string (disabled-feature label) — is a FAIL. Disabled-adapter UX labels must use neutral language ("not yet available") or be removed entirely; they may never use "Coming Soon". Mark the corresponding spec scenario MISSING and issue a FAIL verdict.
  - Zero frontend tests = FAIL: If a task covers Vue/UI scenarios and the test suite contains zero component or unit tests for those scenarios, the verdict is FAIL. The TDD mandate applies equally to frontend work.
  - No vitest in package.json = FAIL: If the task touches `src/dev-ui` and `vitest` does not appear in `src/dev-ui/package.json`, the verdict is FAIL — test infrastructure must precede component code.
  - Future-placeholder comments = FAIL: Scan for `<!-- Future:`, `// Future:`, `# Future:`, and `<!-- TODO:` patterns in Vue/TS source files. Any such comment that corresponds to a spec scenario the task was supposed to implement is a silently dropped requirement and must be marked MISSING. If a formal blocker file exists at `.hyperloop/blockers/task-NNN-blocker.md` for the scenario, it is acceptable; a code comment alone is not.
  - Distinguish "auto-rollback exists" from "rollback is tested": SQLAlchemy `async with session.begin()` or a try/except with rollback() is an implementation detail, not a tested behaviour. A THEN condition requiring rollback is only COVERED when a test exercises the failure path end-to-end at the service or repository level.
  - Run the process check scripts before issuing a verdict: Execute every script in `.hyperloop/checks/` and include the exit status in your review. A non-zero exit from any check script is a FAIL.
  - Idempotency requires TWO distinct tests — not one: When a spec THEN block says "duplicate delivery produces the same result" or "retry is safe", mark the requirement COVERED only if BOTH of the following tests exist: (a) a filtering test asserting already-processed entries are excluded, AND (b) a re-execution test that invokes the handler or worker twice with the same event and asserts the final state (database rows, external side effects) is identical to a single successful run. A filtering test alone is PARTIAL, not COVERED.
  - Cross-check integration vs unit test status codes: For each authorization or error-path scenario, verify that the status code asserted in the integration test matches both the spec's THEN block and the corresponding unit test for the same route handler. A 403 in an integration test where the spec mandates 404 (e.g., "no distinction between unauthorized and not-found") is a FAIL — run `.hyperloop/checks/check-auth-status-codes.sh` and treat any flagged assertion as requiring spec verification before approving.
  - Verify frontend packages actually resolve — not just appear in package.json: Run `check-frontend-deps-resolve.sh` (or manually confirm `pnpm-lock.yaml` contains each `devDependency`). A `package.json` that lists `vitest@^2.2.5` while the lockfile has no vitest entry means `pnpm install` fails and the tests have never executed — this is a FAIL even though the string "vitest" appears in the file.
  - Data-loading functions must be wired to onMounted: For any Vue page that displays a list fetched from an API, confirm the load function is called from an `onMounted` hook (or equivalent lifecycle entry point). A `loadXxx()` that is only reachable via user-action handlers means the page is always empty at first render — that is a stub, and the corresponding spec scenario is NOT COVERED.
  - Cascade delete must clean up ALL external resources: When a spec says cascade delete includes "encrypted credentials" or any external resource, confirm (a) the service calls the secret store / file store / queue delete for each child entity with such a resource, AND (b) a test asserts that cleanup call was made. A service that only calls `repo.delete(entity)` without touching Vault secrets is PARTIAL — mark the cascade scenario as PARTIAL and issue a FAIL.
  - Reject loose error-type assertions: Any integration or unit test that asserts `result.error_type in ["timeout", "execution_error"]` or any multi-value membership check for a categorical field is a FAIL. The spec assigns exact categories; the test must enforce them with strict equality (`== "timeout"`). Run `check-weak-test-assertions.sh` and treat any flagged assertion as FAIL unless the spec explicitly lists the values as interchangeable alternatives.
  - Negative behavioral contracts must have negative tests: When a spec THEN block says "shall not log the raw query", "redacted reference (not the raw value)", or "must not expose X", confirm a test exists that asserts the prohibited value is absent from observable output. A passing implementation and a code comment together are not a test — mark the requirement PARTIAL and issue a FAIL if no such negative assertion exists.
  - Run check-cross-task-deferral.sh before issuing verdict: Execute `.hyperloop/checks/check-cross-task-deferral.sh src` and include its output in the review. Any file containing phrases like "will be wired to the API in task-NNN", "will be populated once … API exists", or similar forward references is a stub regardless of how the UI renders. If no formal blocker file exists at `.hyperloop/blockers/task-NNN-blocker.md` for the deferred scenario, mark it MISSING and issue a FAIL.
  - Run check-fake-success-notifications.sh before issuing verdict: Execute `.hyperloop/checks/check-fake-success-notifications.sh src/dev-ui` and include its output. Any Vue/TS file that emits a success notification without an outbound API call is a fake-success stub — mark the corresponding spec scenario MISSING and issue a FAIL.
  - Informational alerts are not confirmation gates: When a spec THEN block says "must confirm", "requires confirmation", or "user must confirm before the change is applied", explicitly search the implementation for a confirmation dialog or modal with a user-triggered confirm button. An `<Alert>`, `<Banner>`, or informational badge present without a blocking confirmation action does NOT satisfy the requirement — mark the scenario MISSING.
  - Verify all spec entity fields are present in TypeScript interfaces: For each entity type mentioned in the spec (e.g., `SyncRun`, `KnowledgeGraph`, `DataSource`), confirm the TypeScript interface includes every field referenced in THEN blocks. A missing field that is required to implement a spec scenario (e.g., no `logs` on `SyncRun` when a scenario says "detailed logs are displayed") makes the scenario structurally impossible — mark it MISSING.
  - Check all callers of modified domain methods: When a task changes validation logic in a domain object method (e.g., adds a required field check to `validate_operation()`), grep the codebase for every call site of that method. Verify each caller provides data that satisfies the new constraint. A caller that cannot satisfy the constraint is a regression — mark it FAIL even if all unit tests pass (mocks hide this).
  - Enforce spec-wide SHALL requirements across ALL routes: When a spec contains "SHALL require X for all [operation]", search the codebase for every route handler or entry point that processes that operation. If any handler processes the operation without enforcing X, mark that requirement FAIL — the spec is only satisfied when every path enforces it, not just the new one.
  - Run check-route-handler-mock-coverage.sh before issuing verdict: Execute `.hyperloop/checks/check-route-handler-mock-coverage.sh src/api/tests` and include the output. Any route test that uses a bare `Mock()` for an application-layer service (rather than `Mock(spec=...)` or a real fake) is a coverage gap that hides domain validation regressions — flag it in the review and require the implementer to upgrade to spec'd mocks or fakes.
  - Integration test scenario ordering must match spec GIVEN→WHEN→THEN: For each integration test that maps to a spec scenario, verify that pre-conditions (GIVEN) are established before the trigger action (WHEN) is performed. A test that reaches the correct end state via a reversed sequence (e.g., member added before group is assigned to workspace, when the spec says the group is already in the workspace when the member is added) is PARTIAL, not COVERED. The spec documents a specific causal chain; reversed-order tests validate end-state equality only and cannot catch event-propagation bugs specific to that causal sequence. Flag any reversed-order scenario as PARTIAL.
  - Verify domain validation is exercised by at least one real (non-mocked) test: When a task adds or modifies a `validate_*` or similar constraint method on a domain object, confirm at least one test instantiates and calls the real domain class without mocking it. If the only tests for that method mock all collaborators above it, the validation change is untested in context — mark the corresponding invariant as PARTIAL.
  - Run check-selector-forwarding.sh before issuing verdict: Execute `.hyperloop/checks/check-selector-forwarding.sh src/dev-ui` and include its output; any flagged `selected*` ref that does not appear inside an async action function body containing an `await` call is a selector-not-wired stub — mark the scoped-query scenario PARTIAL.
  - Reject local test stubs as proof of composable argument forwarding: When a test file defines a local async function that mirrors a composable's expected behavior (e.g., a local `executeQuery` with the correct 4-argument signature) but never `vi.mock`s the composable and asserts `toHaveBeenCalledWith`, the argument-forwarding contract is UNTESTED — mark the scenario PARTIAL regardless of whether the local stub's logic is correct and whether all test assertions pass.
  - Reject OR-chained error-message assertions as complete coverage: An assertion of the form `assert "X" in err or "Y" in err.lower()` does NOT verify that all spec-required components are present — it passes when only one component exists. For each component named in the THEN block (e.g., "line number", "content preview"), confirm a separate assertion exists that ONLY passes when that specific component is present. A test that passes when the error says "JSON error occurred" (no line number, no preview) is PARTIAL even if the implementation currently emits both. Run `check-partial-error-assertions.sh` and treat any flagged OR-chained assertion on a result field as requiring decomposition.
  - Verify ordering/sequencing methods have a direct mixed-input unit test: When a spec contains a SHALL ordering contract (e.g., "DEFINE runs first, DELETE next, CREATE then UPDATE") and the implementation has a dedicated sort or partition method, confirm a unit test exists that (a) constructs a list with ALL operation types in scrambled order and (b) asserts the exact output sequence. Integration tests that use homogeneous batches (all DELETEs, all CREATEs in isolation) do NOT satisfy this requirement — mark the ordering scenario PARTIAL if no mixed-input unit test exists for the sort method.
  - Check all THEN-block object fields are individually asserted: For each test that corresponds to a THEN block describing a stored or returned object, verify that every field named in the THEN block has an explicit assertion. A test that asserts `label` and `description` when the THEN block also names `required_properties` is PARTIAL — re-read the THEN block and flag any property with no corresponding `assert` statement.
  - Default-value specs require forwarding assertions, not just status-code assertions: When a spec states "the default value of X is Y if unspecified", confirm a test exists that (a) omits the field from the request/call body AND (b) explicitly asserts the downstream service/function was invoked with the default value (e.g., `mock_service.create.assert_called_once_with(..., x=Y)`). A `Field(default, ...)` in the model plus a 201 status-code assertion is PARTIAL — mark the default-value requirement PARTIAL and issue a FAIL.
  - AND-clause THEN blocks require a chained test: When a spec THEN block connects multiple outcomes with "AND" (e.g., "the key is revoked AND remains visible in listings with `is_revoked=True`"), confirm a single test exercises all outcomes in one sequential chain (e.g., revoke → list → assert). Two separate tests each covering one half of the AND clause are PARTIAL, not COVERED — mark the scenario PARTIAL and issue a FAIL.
  - Integration test coverage must be symmetric across scenario sub-cases: When a spec scenario has multiple sub-cases (e.g., valid key, expired key, revoked key) and an integration test exists for any of them, verify an integration test exists for each remaining sub-case. A sub-case covered only by split unit tests at individual layers (e.g., service unit + middleware unit independently) while the happy-path sub-case has an integration test is PARTIAL — mark it PARTIAL and issue a FAIL.
  - Run check-domain-aggregate-mocks.sh before issuing verdict: Execute `.hyperloop/checks/check-domain-aggregate-mocks.sh src/api/tests` and include its output. Any service-layer test file that uses bare `MagicMock()` or `AsyncMock()` (without `spec=`) for a domain aggregate variable (ds*, kg*, knowledge_graph*, data_source*, sync_run*, api_key*, tenant*) is a FAIL — domain aggregates must be real instances or factory-helper objects so validation logic is exercised. Check whether an existing factory (e.g., `_make_ds()`) already exists in a sibling test file that the implementer failed to reuse.
  - Run check-no-test-regressions.sh before issuing verdict: Execute `.hyperloop/checks/check-no-test-regressions.sh` and include its output. Any test file deleted or any test file that has a net line-count reduction compared to the base branch is an automatic FAIL — deleting passing tests is a TDD violation regardless of implementation quality.
  - Run check-no-check-script-deletions.sh before issuing verdict: Execute `.hyperloop/checks/check-no-check-script-deletions.sh` and include its output. Any check script in `.hyperloop/checks/` that has been deleted is an automatic FAIL. Any check script using `grep --include=` that is missing `--exclude-dir=.venv` is a FAIL — this is the sabotage pattern that causes virtual-environment hits to mask real failures.
  - Run check-no-source-regressions.sh before issuing verdict: Execute `.hyperloop/checks/check-no-source-regressions.sh` and include its output. Any application source file deletion or public method removal that cannot be directly traced to a spec requirement is a FAIL.
  - Test infrastructure removal = FAIL: If `src/dev-ui/package.json`, `src/dev-ui/vitest.config.ts`, or any equivalent test runner configuration file existed in the base branch and is absent in the implementation branch, the verdict is FAIL. Removing test infrastructure is the same category of violation as deleting test files.
  - `task.cancel()` in stop() is FAIL for graceful-shutdown scenarios: When a spec THEN block says "in-progress [work] completes before shutdown", inspect the `stop()` implementation. If it calls `task.cancel()` before awaiting the task, mark the scenario PARTIAL — `task.cancel()` raises `CancelledError` at the next `await` point and does not allow the current work unit (e.g., `_process_batch()`) to complete. The correct pattern is: set `_running = False`, then `await task` without cancellation so the poll loop exits naturally after finishing the in-flight unit.
  - Shutdown tests must exercise concurrent in-flight work to be COVERED: A test for "in-progress event processing completes before shutdown" is PARTIAL unless it (a) starts a background task with a handler that is actually running when `stop()` is triggered (e.g., use an `asyncio.Event` to gate the handler mid-execution), (b) calls `stop()` while that handler is still in-flight, and (c) asserts the handler completed and its result was persisted before `stop()` returned. A test that only mocks the worker and verifies `stop()` was called (or `_running == False`) does NOT cover this THEN condition — mark it PARTIAL and issue a FAIL.
  - Run check-pages-have-tests.sh before issuing verdict: Execute `.hyperloop/checks/check-pages-have-tests.sh src/dev-ui` and include its output. Any Vue page file under `pages/` whose domain key does not appear in any test file name or content is a TDD violation — mark every spec scenario for that page as MISSING and issue a FAIL verdict.
  - A page with partial scenario coverage is PARTIAL, not COVERED: When a page has a test file but that test file covers only a subset of the spec scenarios for that page, each uncovered scenario is individually PARTIAL. Do not mark a requirement COVERED simply because the page has SOME tests — re-read every GIVEN/WHEN/THEN in the spec section for that page and confirm each has a corresponding `it(...)` block. A page implementing 5 scenarios with 2 tested is PARTIAL for 3 scenarios.
  - Zero tests for a SHALL requirement section = automatic FAIL: If a spec section begins with "SHALL provide" or "SHALL support" and zero tests exist for any scenario in that section, the verdict for that entire requirement is MISSING (not PARTIAL) and the task result is FAIL. PARTIAL means some scenarios are tested; MISSING means none are.
  - Property-preservation tests must use asymmetric data: For any "existing properties are preserved" THEN block, verify the idempotency test uses DIFFERENT properties in the second operation — at least one property present in the first call must be absent from the second. A test that submits identical data in both calls is PARTIAL: merge and replace produce the same result, making the implementation bug invisible.
  - Run check-property-merge-semantics.sh before issuing verdict: Execute `.hyperloop/checks/check-property-merge-semantics.sh` and include its output. Any SQL property update that uses direct assignment instead of the `||` merge operator is an automatic FAIL — direct assignment silently drops all existing properties not present in the new batch, violating any "properties are preserved" THEN condition.
  - Run check-branch-rebased-on-alpha.sh before issuing verdict: Execute `.hyperloop/checks/check-branch-rebased-on-alpha.sh` and include its output. If the branch is stale (more than 5 commits behind `alpha`), require a rebase before evaluating any check-script failures — a failing check on a file the task never modified is a staleness false-positive, not an implementer defect. To confirm a failure is staleness-driven, run `git diff $(git merge-base HEAD alpha)..HEAD --name-only` and verify the flagged file is absent; if so, the fix is `git rebase alpha`, not a code change.
  - Run check-branch-has-commits.sh before issuing verdict: Execute `.hyperloop/checks/check-branch-has-commits.sh` and include its output. A branch with zero commits vs the base branch is an automatic FAIL — no implementation was performed regardless of what the PR description says.
  - Run check-frontend-tests-pass.sh before issuing verdict: Execute `.hyperloop/checks/check-frontend-tests-pass.sh src/dev-ui` and include its output. Any frontend test failure is an automatic FAIL — including `TypeError: X is not a function` caused by a test importing a named export that does not exist in the source module. check-frontend-tests-exist.sh passing is NOT sufficient; the tests must actually execute and pass.
  - Run check-frontend-lockfile-frozen.sh before issuing verdict: Execute `.hyperloop/checks/check-frontend-lockfile-frozen.sh src/dev-ui` and include its output. A stale lockfile (where `pnpm install --frozen-lockfile` fails) is a FAIL even when check-frontend-deps-resolve.sh passes — the grep-based dep check produces false negatives when a newly-added direct dependency already appears in the lockfile as a transitive dependency but its specifier entry is absent.
  - Run check-empty-test-stubs.sh before issuing verdict: Execute `.hyperloop/checks/check-empty-test-stubs.sh` and include its output. Any test function whose body consists only of docstrings and/or `pass` is an automatic FAIL — empty stubs pass trivially and provide zero coverage, and they are invisible in the test count because pytest reports them as PASSING.
  - Check for missing check-script infrastructure BEFORE running any other check: As the very first verification step, count the scripts in `.hyperloop/checks/` on the branch and compare to alpha with `git diff --name-only --diff-filter=D $(git merge-base HEAD alpha) HEAD -- '.hyperloop/checks/*.sh'`. If ANY check script is absent, issue an immediate FAIL verdict of "critical process infrastructure missing" and stop — do not evaluate any other criterion. A branch that deleted its own guard scripts cannot be trusted even if it passes unit tests, because the deleted scripts were the ones designed to catch its specific failure mode.
  - Treat a branch-reset annotation as a source-regression red flag: When branch notes, commit messages, or the task state file mention "branch reset", "fresh branch", or "rebase conflict", explicitly diff the full source file list against alpha with `git diff --name-only --diff-filter=D $(git merge-base HEAD alpha) HEAD -- 'src/'` and confirm zero deletions outside the stated task scope. A reset that started from a stale base will show deleted files with no corresponding deletion commits — this is the highest-severity regression pattern.
  - Run check-process-overlays-intact.sh before issuing verdict: Execute `.hyperloop/checks/check-process-overlays-intact.sh` and include its output. Any overlay YAML or kustomization file deleted from `.hyperloop/agents/process/` is an automatic FAIL — process governance infrastructure must never be removed.
  - Run check-no-state-file-commits.sh before issuing verdict: Execute `.hyperloop/checks/check-no-state-file-commits.sh` and include its output. Any `.hyperloop/state/` file committed to the task branch is an automatic FAIL — state files are orchestrator metadata and must never appear in task branch commits. They cause permanent rebase conflicts that eventually require a full branch abandon.
  - Attribution to another task does not excuse a failing check: A check script that exits non-zero because of code written by a different task (or present in the alpha baseline) is still a FAIL for the current task. The staleness exemption in `check-branch-rebased-on-alpha.sh` applies ONLY when the branch is more than 5 commits behind alpha (i.e., stale); a fully-rebased branch that inherits a pre-existing violation owns that violation. When reporting a FAIL in this situation, identify the originating commit via `git log --oneline --follow -S <pattern>` and instruct the implementer to fix the violation with a dedicated fix commit before resubmitting.
  - Run check-no-direct-logger-usage.sh before issuing verdict: Execute `.hyperloop/checks/check-no-direct-logger-usage.sh` and include its output. Any `logger.*` or `print()` call in a non-probe, non-observability-implementation source file is an automatic FAIL — the DOO mandate applies to ALL code paths, including error-path functions like `_build_mutation_error_response`. The fix is to add a probe method to the relevant Protocol and default implementation, then inject and call it.
  - Locate the task branch even when orchestrator state shows branch=null: When the task state file shows `branch: null`, do not assume no work was done. Run `git ls-remote origin "hyperloop/task-NNN"` to check for a remote branch. If it exists, fetch and checkout it (`git fetch origin hyperloop/task-NNN && git checkout hyperloop/task-NNN`) and inspect `git log alpha..HEAD` before issuing any verdict. A `branch: null` state with an existing remote branch is the signature of an "Agent future missing or failed" orchestrator failure — the implementation may be complete and should be evaluated on its merits rather than treated as a missing submission.
  - "Agent future missing or failed" requires branch discovery before any verdict: When the only available finding is the bare string "Agent future missing or failed", do NOT issue a verdict immediately. First run both `git ls-remote origin "hyperloop/task-NNN"` and `git branch -a | grep task-NNN` to check every branch location. If a branch exists, evaluate it fully. Only if no branch artifact exists anywhere should you report the task as not started and recommend re-assignment — never treat an orchestrator-tracking failure as proof that no implementation occurred.
  - Run check-domain-exception-http-mapping.sh before issuing verdict: Execute `.hyperloop/checks/check-domain-exception-http-mapping.sh` and include its output. For every custom exception class in `domain/exceptions.py` or `ports/exceptions.py` that a service can raise, verify every relevant route handler has an explicit `except ExceptionType` clause mapping to the correct HTTP status code — NOT just a generic `except Exception → 500`. Additionally, confirm a route-level unit test exists that mocks the service to raise each exception type and asserts the exact HTTP status code. A repo-layer integration test alone is PARTIAL for any scenario the spec describes as "rejected with X error".
  - A repo-layer exception test does not cover the route-layer error response: When a spec THEN block says "rejected with a duplicate name error" or "rejected with a validation error", the requirement is only COVERED if (a) the route handler has an explicit `except ExceptionType → HTTPException(status_code=NNN)` clause AND (b) a route-level unit test asserts that exact status code. An integration test that verifies the repo raises the exception is PARTIAL — the HTTP status translation is a separate contract at the presentation layer.
  - Partial-progress branches must be evaluated scenario-by-scenario: When a recovered branch (found via discovery after "Agent future missing or failed") has commits but does not appear complete, do NOT issue a blanket FAIL. Instead, list every commit via `git log --oneline alpha..HEAD`, cross-reference each commit against the spec's THEN blocks to mark which scenarios are COVERED by existing commits, then evaluate only the remaining scenarios as potentially MISSING or PARTIAL. A branch that covers 3 of 5 scenarios with passing tests should receive a PARTIAL verdict with explicit per-scenario status — the next implementer agent can resume from scenario 4 rather than starting over.
  - A repeated stale-branch failure means the prior rebase claim was false — do not repeat the prior verdict: If a prior round's verifier report stated "branch was rebased" or "rebase complete" but `check-branch-rebased-on-alpha.sh` still exits non-zero in the current round, the rebase was never actually executed. Do not assume the prior verifier was right and look for an alternate explanation. The correct diagnosis is that the implementer claimed an action they did not take. Issue a FAIL and require the implementer to run `git rebase alpha` in the correct worktree and supply the passing `check-branch-rebased-on-alpha.sh` output before resubmitting.
  - Diagnose local vs remote alpha divergence when rebase check fails despite claimed success: If an implementer reports "0 commits behind origin/alpha" but `check-branch-rebased-on-alpha.sh` still exits non-zero, run `git rev-parse alpha` and `git rev-parse origin/alpha` and compare the two SHAs. If they differ, local `alpha` is ahead of `origin/alpha` — the orchestrator advances local `alpha` independently without pushing. The implementer rebased against `origin/alpha` (the wrong ref) instead of local `alpha` (the check's ref). Require `git rebase alpha` (the local ref) and re-verification. Include both SHAs verbatim in the verdict so the next verifier can confirm the fix.
  - Quote check-branch-rebased-on-alpha.sh output verbatim in every verdict: Include the literal output line (e.g., `OK: Branch is 2 commit(s) behind 'alpha' — within acceptable range.` or the STALE BRANCH block) in your verdict report. A verdict that paraphrases ("check passed") without the actual output cannot be audited by the next verifier round and provides no evidence that the check was actually executed.
  - Run check-existing-verdict.sh before full re-verification on a recovered branch: When a branch is recovered after "Agent future missing or failed", run `.hyperloop/checks/check-existing-verdict.sh` first. If it exits 0 (a prior passing verdict is recorded), your job is CONFIRMATION, not discovery: (a) confirm the branch is rebased on current alpha, (b) run all check scripts, (c) spot-check that the key implementation commits still satisfy their spec THEN blocks. Do NOT re-read every implementation line as if the branch has never been verified — a branch with a recorded `verdict: pass` has already passed a full verification round. Issue PASS if all checks pass and the branch is clean.
  - A branch with multiple `record worker result as pass` commits is a multi-round survivor — treat as likely complete: When `git log --oneline alpha..HEAD` shows two or more `chore: record worker result as pass` commits, the implementation has survived repeated verification rounds. Do not assume incompleteness or regression without evidence — run check scripts and read the most recent worker-result.yaml (`git show HEAD:.hyperloop/worker-result.yaml`) to understand the prior verdict before doing any new analysis. Issuing FAIL on a branch that already has multiple passing rounds requires explicit evidence of a new failure, not just "I noticed the orchestrator state shows not-started."
  - A repeated state-file failure means the prior fix claim was false — do not repeat the prior verdict: If a prior round's worker-result.yaml claimed state-file violations were fixed but check-no-state-file-commits.sh still exits non-zero in the current round, the fix was partial or never executed. Identify which of the two independent directions remain unresolved — "ADDED / MODIFIED on this branch" (requires history strip) and/or "DELETED from alpha on branch" (requires restoration) — quote the script output verbatim in your verdict, and require the implementer to address every remaining direction before resubmitting. Do not accept a "fixed" claim without the literal "PASS: No .hyperloop/state/ files committed on this branch." line as evidence.
  - Run check-run-backend-suite.sh as the final pre-verdict action — not individual checks over a long session: Execute `bash .hyperloop/checks/check-run-backend-suite.sh` as a single command immediately before writing the verdict. Running individual checks across a multi-step verification session creates a window during which alpha advances and state files accumulate, making earlier check results stale by verdict time. The suite script's timestamp header in its output is the evidence that all checks were run at a consistent point in time. A verdict that paraphrases individual check results from different moments in the session is NOT equivalent to a suite run — require the literal suite output.
  - A PASS verdict is invalid if check-run-backend-suite.sh output is absent from the verdict: Every PASS verdict must include the verbatim output of `check-run-backend-suite.sh`, including its `RESULT: ALL PASS` final line and the timestamp header. A verdict that describes individual checks passing without this consolidated output cannot be audited and must be treated as if the checks were not run. When reviewing a prior PASS verdict for a recovered branch, if the suite output is absent, treat it as an unverified verdict and run the suite fresh before confirming.
  - Staleness discovered at any point in the session is an immediate FAIL — stop evaluating: If `check-branch-rebased-on-alpha.sh` exits non-zero at ANY moment during verification (not just in the initial pass), write a FAIL verdict immediately and stop all further evaluation. Continuing to assess spec coverage on a known-stale branch produces check results that will differ in the next round when alpha has advanced further. The task-032 round-8 false PASS was caused by the verifier completing spec evaluation before discovering that alpha had advanced 30 commits; no spec analysis outcome is reliable when the branch is stale.
  - Treat suite-run → verdict-commit as a zero-gap atomic sequence: After `check-run-backend-suite.sh` outputs `RESULT: ALL PASS`, the only permitted next action is writing `worker-result.yaml` and committing it. No git pulls, no code reads, no spec re-checks, no log reviews may occur between the suite run and the verdict commit. Any intervening action creates a window in which alpha can advance, rendering the suite result stale. The suite timestamp in the output must be within 2 minutes of the verdict commit timestamp — if more time has elapsed, re-run the suite before committing. This is the exact failure pattern of task-032 round 8: the suite was run earlier in the session, additional steps were taken, alpha advanced, and the verdict was committed with stale suite results.
  - Verify the alpha SHA from the suite output matches current alpha before writing the verdict: The `check-run-backend-suite.sh` output header contains a line `alpha: <sha>` recording the alpha SHA at suite-run time. Immediately before writing `worker-result.yaml`, run `git rev-parse alpha` and compare the result to that recorded SHA. If they differ, alpha has advanced since the suite ran — discard all suite results and re-run `check-run-backend-suite.sh` immediately before writing the verdict. This SHA comparison is the cryptographic enforcement of the atomic-sequence rule: timestamps can be approximate, SHAs cannot. A suite result paired with a different alpha SHA is a stale result regardless of how recent the timestamp appears.
  - Run check-deps-satisfied.sh during branch discovery for "Agent future missing or failed": After branch discovery finds no branch for a "Agent future missing or failed" task, run `bash .hyperloop/checks/check-deps-satisfied.sh <task-NNN>`. If it exits non-zero (dep not done AND not merged into alpha), do NOT issue a FAIL verdict — issue a BLOCKED verdict explaining which dep is unsatisfied, and recommend the orchestrator re-queue the task after the dep is resolved. A FAIL verdict on a dep-blocked task causes the orchestrator to re-assign the implementer, who will again crash on the missing dep, looping indefinitely.
  - A WARN from check-deps-satisfied.sh is not BLOCKED: When `check-deps-satisfied.sh` exits 0 but its output contains "WARN: … state shows '…' but its branch is already merged into …", the dep's code is available in alpha — the orchestrator state file is stale. Do NOT issue a BLOCKED verdict for a WARN-only result. Instead: (a) note the stale dep state in your verdict, (b) recommend the orchestrator marks the dep as done, and (c) proceed with normal task branch evaluation. Only a non-zero exit from check-deps-satisfied.sh triggers the BLOCKED disposition.
  - Run check-implementation-commits-exist.sh during branch discovery: After checking out a discovered task branch, run `bash .hyperloop/checks/check-implementation-commits-exist.sh`. If it exits non-zero (no `feat:`, `fix:`, or `test:` commits exist on the branch), the branch contains only process or chore work — this is the signature of an implementer that crashed before writing any task code. Combine with `check-deps-satisfied.sh`: if BOTH exit non-zero, immediately issue a BLOCKED verdict without running any other checks. Do not run `check-run-backend-suite.sh` on a branch with zero implementation commits — it cannot produce meaningful results and wastes time.
  - Issue BLOCKED (not FAIL) when no branch exists and deps are unsatisfied: When branch discovery confirms no branch, no commits, and `check-deps-satisfied.sh` exits non-zero, write a verdict of "BLOCKED" in `worker-result.yaml` with a `verdict: blocked` field, the dep task ID(s) and their current statuses, and the recommendation "re-queue after <dep-task-ID> is marked done." This is distinct from FAIL (implementer error) and PASS (success) — it signals to the orchestrator that this is a scheduling issue requiring dep resolution, not an implementation defect requiring a retry.
  - BLOCKED applies even when a branch exists if it contains no task implementation commits and deps are unsatisfied: After branch discovery finds a branch for an "Agent future missing or failed" task, run `bash .hyperloop/checks/check-deps-satisfied.sh task-NNN`. If it exits non-zero, also run `git log --oneline $(git merge-base HEAD alpha)..HEAD` and inspect the commits. If every commit is a non-implementation commit (subject prefixes: `chore(process)`, `chore(intake)`, `chore(process-improvement)`) with no `feat`, `fix`, or `test` commits for the task's spec, the branch has zero implementation — the prior agent used this branch for process work or crashed before any spec-scenario commit. Issue a BLOCKED verdict (not FAIL or PARTIAL), name the unsatisfied dep(s), and recommend re-queueing after the dep is resolved. This was the failure pattern for task-015: branch existed with only process commits, deps task-008 and task-009 were not done, the correct verdict was BLOCKED.
  - Run check-di-wiring-updated.sh before issuing verdict: Execute `.hyperloop/checks/check-di-wiring-updated.sh` and include its output. When a service `__init__` gains a new parameter on this branch, the FastAPI dependency factory in `src/api/*/dependencies/` must also be modified to pass the real implementation. Unit tests that inject mocks directly cannot detect a production wiring gap — only the factory determines what runs in live requests. If the check exits non-zero, mark the spec scenario as PARTIAL (the logic is correct but production never executes it) and issue a FAIL.
  - A stale branch makes check-no-state-file-commits.sh blind to post-branch-cut state files: Both `check-branch-rebased-on-alpha.sh` and `check-no-state-file-commits.sh` compute their diffs from the same merge-base. When a branch is 30 commits behind alpha, the merge-base is 30 commits old — state files committed after that old merge-base are invisible to the state-file check. This is why a PASS from `check-no-state-file-commits.sh` on a stale branch is meaningless: it examined an old merge-base that predates the contaminating commits. The only reliable sequence is: (1) confirm `check-branch-rebased-on-alpha.sh` exits 0, then (2) run `check-no-state-file-commits.sh`. If the rebase check fails, stop immediately — do not evaluate the state-file check result, as it is computed against a stale base and cannot be trusted.
  - A "SUITE HALTED" output is a hard FAIL — do not credit any pre-halt PASSED results: When `check-run-backend-suite.sh` outputs the "SUITE HALTED: branch is stale" block, all checks listed as PASSED before the halt ran against an old merge-base and are unreliable. Do not count them toward any COVERED status. The only valid response is FAIL. Require the implementer to run `git rebase alpha`, confirm `check-branch-rebased-on-alpha.sh` exits 0, then re-run the full suite before you evaluate any other criterion.
  - A prior round's PASS without verbatim suite output is a verifier process failure — invalidate it explicitly: When a task's prior round carries a PASS verdict but the verdict file lacks verbatim `check-run-backend-suite.sh` output (i.e., no `alpha: <sha>` header and no `RESULT: ALL PASS` final line), that PASS is a verifier process failure, not a legitimate green round. Explicitly label it as such in your verdict (e.g., "round-8 PASS is INVALID: no suite output present in verdict file"). Do NOT treat it as a valid baseline — treat the task as if it has never been verified. This is the exact task-032 round-8 pattern: the suite was not run at submission time, masking 30 commits of staleness and 4 state-file contaminations that round-9 then had to remediate.
  - Run check-pr-open-threads.sh for any task in merge-pr phase: When the task state file shows `phase: merge-pr` and a `pr:` URL is present, run `bash .hyperloop/checks/check-pr-open-threads.sh` before issuing any verdict. If it exits non-zero, issue a FAIL verdict listing the pending thread summaries verbatim — do not evaluate spec coverage or check-suite results until this passes. A task that loops through pr-feedback-addressed failures without this check cannot diagnose which threads remain open; check-pr-open-threads.sh is the mechanical gate that ends the loop.
  - A repeated pr-feedback-addressed failure means no thread was addressed — require evidence of specific commits: When a prior verifier round recorded a "pr-feedback-addressed" check failure AND the current round also fails `check-pr-open-threads.sh`, the implementer did not address any thread between rounds. Require the implementer to (a) run `gh pr view <PR_NUMBER> --comments`, (b) list each pending thread with a plan, and (c) supply at least one `fix:` or `refactor:` commit per thread before resubmitting. Accepting a resubmission with zero new commits after a pr-feedback-addressed failure is a wasted round that will loop indefinitely — task-003 demonstrated 8 consecutive such loops.
  - Cascade credential cleanup requires proactive child-entity inspection — do not rely on the spec text: When a delete/cascade scenario exists, grep the child entity class for `credentials_path`. If the attribute exists, verify BOTH (a) the service calls `secret_store.delete(path=child.credentials_path, ...)` before each `repo.delete(child)`, AND (b) a unit test asserts `mock_secret_store.delete` was called for every credential-bearing child. A service that calls only `repo.delete()` in the loop while the child type has `credentials_path` is PARTIAL — mark the scenario PARTIAL and issue FAIL even if the spec text does not explicitly say "encrypted credentials must be removed." Run `check-cascade-delete-cleanup.sh` and treat a non-zero exit as FAIL.
  - Declared dependency ≠ implemented integration — check the import: When a spec names a library as a SHALL requirement (e.g., "SHALL use dlt"), run `grep -r "import <lib>\|from <lib>" src/api/` and confirm the import exists in production code. If the library appears only in `pyproject.toml` (and not in any `import` statement in `src/api/`), the requirement is NOT satisfied — mark it PARTIAL and issue FAIL. A docstring that says "integration deferred to a future task" combined with a pyproject.toml entry is a PARTIAL, not COVERED. Run `check-deferred-integration.sh` before issuing a verdict; a non-zero exit is FAIL.
  - When all spec scenarios are COVERED and only hygiene checks fail, label the verdict "HYGIENE-ONLY FAIL": When every spec THEN block maps to a COVERED test AND the sole failing checks are `check-branch-rebased-on-alpha.sh` and/or `check-no-state-file-commits.sh`, write "HYGIENE-ONLY FAIL" at the top of `worker-result.yaml`. Include the verbatim output of each failing check. Explicitly state "No re-implementation required — all N scenarios are COVERED. Execute remediation only." followed by the exact remediation commands from the failing check's output. This prevents the next implementer from re-reading the spec and re-implementing already-complete scenarios, and prevents the next verifier from re-evaluating spec coverage for a branch whose implementation was already verified as complete.
  - A bare "Agent future missing or failed" finding requires a completely fresh evaluation — carry over zero assumptions: When the only available finding for a task is the bare string "Agent future missing or failed" with no accompanying verifier analysis, the current verifier round must begin its startup sequence independently as if no prior verification occurred. Run: (1) `bash .hyperloop/checks/check-deps-satisfied.sh task-NNN`, (2) `git ls-remote origin 'hyperloop/task-NNN'` AND `git branch -a | grep task-NNN`, (3) if a branch is found run `bash .hyperloop/checks/check-implementation-commits-exist.sh`. A prior verifier round that produced only this bare string either itself crashed or ran no branch discovery — neither outcome is reliable as a baseline for the current round. Do NOT infer "the prior verifier did branch discovery and found nothing" from a bare finding; always perform discovery independently.
  - Run check-pytest-env-skip-if-set.sh before issuing verdict: Execute `.hyperloop/checks/check-pytest-env-skip-if-set.sh` and include its output. Any `[tool.pytest_env]` variable whose name contains `ENDPOINT`, `PORT`, `HOST`, `URL`, `URI`, `ADDR`, or `ADDRESS` that uses a bare string literal (not `{ value = "...", skip_if_set = true }`) is an automatic FAIL — it overrides the isolated-instance port set by `make instance-up`, silently routing all SpiceDB and database integration tests to wrong ports and masking connectivity failures as SSL errors.
  - Missing task state file is not a blocking condition for evaluation: When `.hyperloop/state/tasks/task-NNN.md` does not exist, `check-deps-satisfied.sh` will output "WARN: Task file not found" and exit 0 — treat deps as satisfied and proceed. To find the spec reference, run `git log --format='%(trailers:key=Spec-Ref)' $(git merge-base HEAD alpha)..HEAD | grep -v '^$' | head -1` and read the identified spec file directly. If no Spec-Ref trailer is present, read every spec file referenced in the commit messages. Do not halt evaluation because the orchestrator state file is absent — the branch commits and spec files are authoritative for coverage assessment.
  - A branch with only test: commits may be a complete coverage-only task — do not assume PARTIAL: When a discovered task branch has `test:` commits but no `feat:` commits, read each commit message before issuing a verdict. A message containing phrases like "add missing spec coverage", "add missing test coverage", or "add missing scenarios" indicates the task scope was coverage-only (no new production code required). For such branches, evaluate whether the added tests cover the THEN blocks in the referenced spec — if they do, mark the scenarios COVERED. Only issue PARTIAL if specific THEN blocks lack test coverage. Never issue a blanket PARTIAL solely because `feat:` commits are absent.
