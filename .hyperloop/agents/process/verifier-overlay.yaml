apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: verifier
guidelines: |
  - Audit every failure-path THEN condition: When a spec THEN block uses language like "if any … fails", "rolls back", "not called", "before retry", or "no partial state", explicitly search for a test that (a) makes a dependency raise mid-operation and (b) asserts the downstream operation was NOT called. The absence of such a test is an automatic FAIL regardless of implementation quality.
  - "Coming Soon" = FAIL in all contexts: Any source file containing stub text ("Coming Soon", "coming-soon") — whether in a function body (toast stub) or in a template display string (disabled-feature label) — is a FAIL. Disabled-adapter UX labels must use neutral language ("not yet available") or be removed entirely; they may never use "Coming Soon". Mark the corresponding spec scenario MISSING and issue a FAIL verdict.
  - Zero frontend tests = FAIL: If a task covers Vue/UI scenarios and the test suite contains zero component or unit tests for those scenarios, the verdict is FAIL. The TDD mandate applies equally to frontend work.
  - No vitest in package.json = FAIL: If the task touches `src/dev-ui` and `vitest` does not appear in `src/dev-ui/package.json`, the verdict is FAIL — test infrastructure must precede component code.
  - Future-placeholder comments = FAIL: Scan for `<!-- Future:`, `// Future:`, `# Future:`, and `<!-- TODO:` patterns in Vue/TS source files. Any such comment that corresponds to a spec scenario the task was supposed to implement is a silently dropped requirement and must be marked MISSING. If a formal blocker file exists at `.hyperloop/blockers/task-NNN-blocker.md` for the scenario, it is acceptable; a code comment alone is not.
  - Distinguish "auto-rollback exists" from "rollback is tested": SQLAlchemy `async with session.begin()` or a try/except with rollback() is an implementation detail, not a tested behaviour. A THEN condition requiring rollback is only COVERED when a test exercises the failure path end-to-end at the service or repository level.
  - Run the process check scripts before issuing a verdict: Execute every script in `.hyperloop/checks/` and include the exit status in your review. A non-zero exit from any check script is a FAIL.
  - Idempotency requires TWO distinct tests — not one: When a spec THEN block says "duplicate delivery produces the same result" or "retry is safe", mark the requirement COVERED only if BOTH of the following tests exist: (a) a filtering test asserting already-processed entries are excluded, AND (b) a re-execution test that invokes the handler or worker twice with the same event and asserts the final state (database rows, external side effects) is identical to a single successful run. A filtering test alone is PARTIAL, not COVERED.
  - Cross-check integration vs unit test status codes: For each authorization or error-path scenario, verify that the status code asserted in the integration test matches both the spec's THEN block and the corresponding unit test for the same route handler. A 403 in an integration test where the spec mandates 404 (e.g., "no distinction between unauthorized and not-found") is a FAIL — run `.hyperloop/checks/check-auth-status-codes.sh` and treat any flagged assertion as requiring spec verification before approving.
  - Verify frontend packages actually resolve — not just appear in package.json: Run `check-frontend-deps-resolve.sh` (or manually confirm `pnpm-lock.yaml` contains each `devDependency`). A `package.json` that lists `vitest@^2.2.5` while the lockfile has no vitest entry means `pnpm install` fails and the tests have never executed — this is a FAIL even though the string "vitest" appears in the file.
  - Data-loading functions must be wired to onMounted: For any Vue page that displays a list fetched from an API, confirm the load function is called from an `onMounted` hook (or equivalent lifecycle entry point). A `loadXxx()` that is only reachable via user-action handlers means the page is always empty at first render — that is a stub, and the corresponding spec scenario is NOT COVERED.
  - Cascade delete must clean up ALL external resources: When a spec says cascade delete includes "encrypted credentials" or any external resource, confirm (a) the service calls the secret store / file store / queue delete for each child entity with such a resource, AND (b) a test asserts that cleanup call was made. A service that only calls `repo.delete(entity)` without touching Vault secrets is PARTIAL — mark the cascade scenario as PARTIAL and issue a FAIL.
  - Reject loose error-type assertions: Any integration or unit test that asserts `result.error_type in ["timeout", "execution_error"]` or any multi-value membership check for a categorical field is a FAIL. The spec assigns exact categories; the test must enforce them with strict equality (`== "timeout"`). Run `check-weak-test-assertions.sh` and treat any flagged assertion as FAIL unless the spec explicitly lists the values as interchangeable alternatives.
  - Negative behavioral contracts must have negative tests: When a spec THEN block says "shall not log the raw query", "redacted reference (not the raw value)", or "must not expose X", confirm a test exists that asserts the prohibited value is absent from observable output. A passing implementation and a code comment together are not a test — mark the requirement PARTIAL and issue a FAIL if no such negative assertion exists.
