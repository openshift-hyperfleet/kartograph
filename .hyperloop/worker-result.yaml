## Spec Coverage

All four SHALL requirements and all ten scenarios are verified:

**Read-Only Enforcement:**
- Database-level `SET TRANSACTION READ ONLY` issued before Cypher execution
  (primary defense). Call-order asserted in test.
- Keyword blacklist (secondary): CREATE, DELETE, SET, REMOVE, MERGE, EXPLAIN,
  LOAD rejected case-insensitively with unique UUID correlation IDs. Raw query
  text is never logged ‚Äî only the correlation ID is passed to the probe.

**Timeout Enforcement:**
- `SET LOCAL statement_timeout = {ms}` set per-transaction.
- DB cancellation exceptions (`"timeout"` / `"canceling statement"`) are
  caught and re-raised as `QueryTimeoutError` with a unique correlation ID.

**Result Limiting:**
- `_ensure_limit()` now uses regex with word boundaries (`\bLIMIT\s+(\d+)`)
  for correct detection. Missing LIMIT ‚Üí append `LIMIT 1000`. Explicit LIMIT
  ‚â§ 10000 ‚Üí kept. Explicit LIMIT > 10000 ‚Üí capped to 10000.

**Error Categorization:**
