## Requirement: Credential Lifecycle — COVERED

### Scenario: Data source deletion
**Implementation:** `src/api/management/application/services/data_source_service.py:384-392`
— checks `ds.credentials_path` and calls `self._secret_store.delete(path=..., tenant_id=...)`
before removing the data source record.

**Tests:**
- Unit: `test_data_source_service.py::test_delete_removes_credentials_if_path_exists`
  — asserts `mock_secret_store.delete` is called with correct path and tenant.

### Scenario: Knowledge graph cascade
**Implementation:** `src/api/management/application/services/knowledge_graph_service.py:403-415`
— `KnowledgeGraphService.delete()` iterates child data sources; for each DS where
`ds.credentials_path` is set and `self._secret_store is not None`, calls
`await self._secret_store.delete(path=ds.credentials_path, tenant_id=self._scope_to_tenant)`
before invoking `self._ds_repo.delete(ds)`.

DI wiring: `src/api/management/dependencies/knowledge_graph.py:50-58` — correctly instantiates
`FernetSecretStore` and passes it as `secret_store=secret_store` to `KnowledgeGraphService`.

**Tests:**
- Unit: `test_knowledge_graph_service.py::test_delete_removes_credentials_for_data_sources_with_credentials_path`
  — Given a KG with one DS with credentials and one without, asserts `secret_store.delete`
  called exactly once (correct DS, correct path, correct tenant); both DS rows and KG removed.
- Unit: `test_delete_skips_credential_cleanup_when_no_secret_store` — defensive nil-guard
  test; verifies no error when `secret_store=None`.

