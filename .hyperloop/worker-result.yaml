#### Requirement: Knowledge Graph Deletion — COVERED

**Scenario: Successful deletion with cascade**

- `KnowledgeGraphService.delete()` checks MANAGE on the KG, then inside `async with self._session.begin()`:
  1. Finds and deletes all data sources (including secret store cleanup for credentialed sources) ✓
  2. Marks KG for deletion → records `KnowledgeGraphDeleted` event ✓
  3. `self._kg_repo.delete(kg)` physically removes the DB record AND writes the outbox entry in the same DB transaction ✓

  SpiceDB cleanup (workspace, tenant, admin, editor, viewer relations) is performed via the transactional outbox → `ManagementEventTranslator._translate_knowledge_graph_deleted()` producing five delete operations.
  Tests: `test_delete_checks_manage_permission_on_kg`, `test_delete_cascades_data_sources`, `test_delete_cascades_encrypted_credentials` (service); `test_delete_knowledge_graph_returns_204` (route); translator tests for `KnowledgeGraphDeleted` ✓

**Scenario: Rollback on failure**

- `async with self._session.begin()` wraps the full cascade; if any step raises, the transaction is rolled back and the KG record is not deleted.
  Test: `test_delete_rolls_back_on_ds_deletion_failure` verifies `mock_kg_repo.delete.assert_not_called()` on mid-cascade exception ✓

**Scenario: Mutation after deletion**

- `KnowledgeGraph.update()` raises `AggregateDeletedError` after `mark_for_deletion()`.
  Test: `test_update_raises_after_deletion` ✓
  At the service/API level, a deleted KG is physically removed from the DB; a subsequent mutation attempt returns 404 via the "not found" path — effectively rejecting the mutation.
  Tests: `test_update_raises_value_error_when_not_found` (service), `test_update_knowledge_graph_returns_404_when_not_found` (route) ✓

