## Architecture

Implementation follows DDD layering enforced by pytest-archon:

- **Domain** (`management/domain/aggregates/knowledge_graph.py`): Pure Python aggregate,
  no infrastructure imports. Name validation (1–100 chars), tenant/workspace ID validation,
  event emission for Created/Updated/Deleted.
- **Ports** (`management/ports/repositories.py`, `management/ports/exceptions.py`):
  `IKnowledgeGraphRepository` protocol; `DuplicateKnowledgeGraphNameError`,
  `UnauthorizedError` exception types.
- **Application** (`management/application/services/knowledge_graph_service.py`):
  Orchestrates CRUD with authorization checks, cascade deletion of data sources
  (including encrypted credentials), transaction management, and domain probe calls.
- **Infrastructure** (`management/infrastructure/repositories/`):
  SQLAlchemy ORM repository with outbox pattern; unique constraint on (tenant_id, name)
  surfaces as `IntegrityError` → `DuplicateKnowledgeGraphNameError`.
- **Presentation** (`management/presentation/knowledge_graphs/routes.py`):
  REST API following api-conventions.spec.md — nested creation/listing, flat
  retrieval/update/delete, correct status codes (201, 204, 403, 404, 409, 422).

## Observability

Domain-Oriented Observability implemented:
- `KnowledgeGraphProbe` protocol (domain layer) with `DefaultKnowledgeGraphProbe`
- `KnowledgeGraphServiceProbe` protocol (application layer) with default implementation
- All service paths emit probe events; no direct `logger.*` calls in domain/application.

## Authorization

SpiceDB relationships established via outbox event translator:
- `KnowledgeGraphCreated` → writes `knowledge_graph:{id}#workspace@workspace:{ws_id}` and
  `knowledge_graph:{id}#tenant@tenant:{t_id}` tuples.
- `KnowledgeGraphDeleted` → deletes all tuples for the KG resource.
- Permission checks use `AuthorizationProvider` protocol (EDIT on workspace for create,
  VIEW for get/list, EDIT for update, MANAGE for delete).

