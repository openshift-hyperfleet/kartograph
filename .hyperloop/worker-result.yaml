## Spec Alignment Review: Workspaces (specs/iam/workspaces.spec.md)

All 2025 unit tests pass. The CI failure ("Test Python 3.12 fail", "Test Python 3.13 fail") is caused by a
mismatch between the spec, the implementation, and ONE integration test.

---

### Requirement: Root Workspace — COVERED

**Scenario: Root workspace properties**
- Code: `Workspace.create_root()` in `iam/domain/aggregates/workspace.py` sets `is_root=True`,
  `parent_workspace_id=None`, and emits `WorkspaceCreatorTenantSet` (processed by outbox to write
  SpiceDB `creator_tenant` relation granting all tenant members `create_child`).
- Unit test: `test_workspace_aggregate.py::TestRootWorkspaceFactory::test_create_root_emits_workspace_creator_tenant_set`
- Integration test: `test_workspace_creation_authorization.py::TestRootWorkspaceCreatorTenantRelation::test_root_workspace_has_creator_tenant_relation`

**Scenario: Root workspace cannot be deleted**
- Code: `workspace_service.py::delete_workspace()` checks `workspace.is_root` and raises `CannotDeleteRootWorkspaceError`.
- Unit test: `test_workspace_service.py::TestDeleteWorkspace::test_cannot_delete_root_workspace`
- Integration test: `test_workspace_api.py::TestWorkspaceDeletion::test_cannot_delete_root_workspace`

