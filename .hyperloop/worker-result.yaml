## Requirement-by-Requirement Findings

### Requirement: API Key Creation — COVERED

**Scenario: Successful creation**
- Implementation: `APIKey.create()` in `iam/domain/aggregates/api_key.py` generates a
  ULID, stores a bcrypt hash (`hash_api_key_secret()`), stores a 12-char prefix
  (`extract_prefix()`), and returns the plaintext secret only at creation time.
  Secret is formatted with `karto_` prefix via `generate_api_key_secret()`.
- Tests:
  - `test_secret_has_karto_prefix` (service unit)
  - `test_returns_plaintext_secret_only_at_creation` (service unit)
  - `test_stores_prefix_from_secret` (service unit)
  - `test_creates_api_key_returns_201` + `test_returns_secret_in_response` (route unit)

**Scenario: Duplicate name per user**
- Implementation: composite UNIQUE constraint `(tenant_id, created_by_user_id, name)` in
  `APIKeyModel`; repository raises `DuplicateAPIKeyNameError`; route returns 409.
- Tests:
  - `test_raises_on_duplicate_name` (repo unit)
  - `test_raises_on_duplicate_name` (service unit)
  - `test_returns_409_on_duplicate_name` (route unit)

**Scenario: Expiration bounds**
- Implementation: `expires_in_days: int = Field(30, ge=1, le=3650)` in
  `CreateAPIKeyRequest`; service calculates `datetime.now(UTC) + timedelta(days=...)`.
- Tests:
  - `test_uses_default_expires_in_days_of_30` (route unit — verifies 30-day default
    passed to service when field omitted)
  - `test_validates_expires_in_days_minimum` (route unit — 422 for < 1)
  - `test_validates_expires_in_days_maximum` (route unit — 422 for > 3650)

