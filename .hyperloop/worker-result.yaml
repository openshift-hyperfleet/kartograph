## Outbox Pattern Implementation — Fresh Attempt Verification

All 2187 unit tests pass (`uv run pytest tests/unit -v`). The outbox pattern
implementation is complete and fully covers all six SHALL requirements from the spec.

### Requirement Coverage

**1. Transactional Event Storage** — COVERED
- `OutboxRepository.append()` adds to the session without committing; the calling
  service owns the transaction boundary.
- Tests: `test_repository_append_does_not_commit`, `test_failed_service_call_leaves_no_outbox_entries`

**2. Event Processing** — COVERED
- `OutboxWorker._process_batch()` fetches with `FOR UPDATE SKIP LOCKED`, delegates to
  handler, marks processed.
- `SpiceDBEventHandler` translates domain events to SpiceDB relationship writes.
- Retry count incremented on transient failure; `failed_at` set on max retries exceeded.
- Tests: `test_processes_unprocessed_entries`, `test_transient_failure_increments_retry_count`,
  `test_max_retries_moves_entry_to_dlq`

**3. Idempotent Event Handlers** — COVERED
- `fetch_unprocessed()` filters `processed_at IS NULL AND failed_at IS NULL`.
- SpiceDB upsert semantics ensure duplicate writes produce identical state.
- Tests: `test_already_processed_entry_excluded_from_fetch`,
  `test_duplicate_invocation_produces_identical_final_state`

**4. Concurrent Worker Safety** — COVERED
- `fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`
  (PostgreSQL `FOR UPDATE SKIP LOCKED`).
- Test: `test_fetch_unprocessed_uses_for_update_skip_locked`

**5. Dual Delivery Mechanism** — COVERED
- `PostgresNotifyEventSource` listens on `outbox_events` channel via asyncpg-listen.
- Migration `d32ecc44581a` creates trigger firing `pg_notify` on INSERT.
- `_poll_loop()` provides fallback polling every `poll_interval_seconds` (default 30s).
- Tests: `test_notify_triggers_callback_with_uuid`,
  `test_invalid_uuid_payload_is_ignored_gracefully`

**6. Event Fan-Out** — COVERED
- `CompositeEventHandler` dispatches to ALL registered handlers for an event type.
- `UnknownEventTypeError` triggers immediate DLQ routing (no retry budget consumed).
- Tests: `test_handle_fans_out_to_multiple_handlers`,
  `test_unknown_event_type_immediately_moves_to_dlq`,
  `test_retry_not_called_for_unknown_event_type`

