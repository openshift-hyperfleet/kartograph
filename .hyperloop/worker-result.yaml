### Implementation Evidence

**Per-Tenant Graph Isolation**
- `graph/dependencies.py::get_tenant_graph_name()` returns `f"tenant_{tenant_id}"`
- Tests: `test_routes.py::TestTenantGraphRouting`

**KnowledgeGraph Scoping — Authorization**
- `graph/presentation/routes.py::apply_kg_mutations()` calls `authz.check_permission(..., Permission.EDIT, ...)`, raises 403 on deny
- Tests: `test_routes.py::TestKnowledgeGraphScopedMutationsRoute`

**KnowledgeGraph Scoping — kg_id stamping**
- `graph/application/services/graph_mutation_service.py::_stamp_knowledge_graph_id()` overwrites caller-provided value before validation
- Tests: `test_mutation_service.py::TestKnowledgeGraphIdStamping`

**Mutation Log Format**
- `graph_mutation_service.py::apply_mutations_from_jsonl()` parses lines, skips blanks, reports parse errors with line number + content preview
- Tests: `test_mutation_service.py::TestGraphMutationServiceApplyFromJSONL`

**DEFINE Operation**
- Service calls `get_system_properties_for_entity(op.type)` to add system props to `required_properties`
- Node: `data_source_id`, `source_path`, `slug` auto-added
- Edge: `data_source_id`, `source_path` auto-added (no slug)
- Tests: `test_mutation_service.py::test_apply_mutations_stores_define_operations`, `test_apply_define_edge_type_adds_edge_system_properties`

**CREATE/UPDATE/DELETE Operations**
- `graph/infrastructure/age_bulk_loading/` handles all operation types
- Idempotent merge via MERGE + jsonb `||` operator for CREATE
- Cascading detach delete for nodes (edges removed first)
- Tests: `tests/unit/graph/infrastructure/`, `tests/unit/graph/application/`

**Mandatory System Properties**
- `graph/domain/value_objects.py::MutationOperation.validate_operation()` enforces `data_source_id`, `source_path`, `slug` (node), `knowledge_graph_id` on CREATE
- `COMMON_SYSTEM_PROPERTIES`, `NODE_SYSTEM_PROPERTIES` define the required sets

**Deterministic Entity IDs**
- `shared_kernel/graph_primitives/entity_id_generator.py::EntityIdGenerator.generate()` → sha256[:16] hex
- Pydantic regex `^[0-9a-z_]+:[0-9a-f]{16}$` on `MutationOperation.id`

**Referential Integrity Ordering**
- `graph/infrastructure/mutation_applier.py::_sort_operations()` enforces DEFINE=0, DELETE=1 (edge<node), CREATE=2 (node<edge), UPDATE=3
- Tests: `tests/unit/graph/infrastructure/test_mutation_applier_sort.py`

**Schema Learning**
- `graph_mutation_service.py::_discover_optional_properties()` adds new props to optional_properties for both CREATE and UPDATE
- Platform-stamped props (`knowledge_graph_id`) excluded from schema learning
- Tests: `tests/unit/graph/application/test_schema_learning.py`

### Test Results

All 2018 unit tests pass with `uv run pytest tests/unit -v`.

### Verdict: PASS
