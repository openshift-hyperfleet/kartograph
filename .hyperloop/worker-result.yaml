### Requirement: Knowledge Graph Listing — COVERED

**Code:** `service.list_for_workspace()` checks VIEW on workspace, reads SpiceDB relationships to discover KG IDs, fetches each from the repository, and filters by tenant. Since workspace VIEW implies KG VIEW per the SpiceDB schema (`knowledge_graph.view = … + workspace->view`), this correctly returns only KGs the caller can view.

**Tests:**
- Scenario "List for workspace": `test_list_checks_view_permission_on_workspace`, `test_list_uses_read_relationships_to_discover_kgs`, `test_list_filters_by_tenant`, `test_list_raises_unauthorized_when_permission_denied` (service unit); `test_list_knowledge_graphs_returns_200_with_list`, `test_list_knowledge_graphs_returns_403_when_unauthorized` (route unit).

