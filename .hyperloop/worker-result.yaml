### Requirement: Dual Delivery Mechanism â€” COVERED

**Scenario: Real-time notification**
- Code: Migration `d32ecc44581a_create_outbox_notify_trigger.py` installs a
  PostgreSQL trigger `outbox_after_insert` that calls `pg_notify('outbox_events', NEW.id::text)`
  on every INSERT. `PostgresNotifyEventSource` (via `asyncpg-listen`) listens on
  that channel and invokes `worker._process_single(entry_id)` for each notification.
- Unit tests: `test_notify_triggers_callback_with_uuid` (verifies UUID parsed and
  callback fired), `test_multiple_notify_events_trigger_multiple_callbacks`.
- Integration test: `test_worker_processes_via_notify_not_polling` â€” starts worker
  with `poll_interval_seconds=999`, inserts a group, waits 500 ms, asserts entry
  is marked processed via NOTIFY path.

**Scenario: Polling fallback**
- Code: `OutboxWorker._poll_loop()` runs unconditionally every `poll_interval_seconds`
  (default 30) regardless of whether an event source is present. If NOTIFY misses
  an entry, the next poll picks it up.
- Test coverage: the polling path is exercised by `test_worker_processes_group_created_and_writes_to_spicedb`
  (integration â€” no event source, calls `_process_batch()` directly) and by the
  unit validation tests (`test_rejects_zero_poll_interval`). No test explicitly asserts
  the default is exactly 30 seconds, but this is a configuration-layer detail; the
  behavioral contract (missed entries are recovered by polling) is integration-tested.

