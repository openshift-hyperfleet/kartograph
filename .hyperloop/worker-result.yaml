### REQ-7: Permission Inheritance (SHALL)

#### Scenario A: Workspace-inherited access
- COVERED
- Implementation: SpiceDB schema defines `permission edit = admin + editor + workspace->edit`, `permission view = admin + editor + viewer + workspace->view`, `permission manage = admin + workspace->manage`, establishing the inheritance chain from workspace roles to knowledge graph permissions.
- Tests: `tests/integration/management/test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_editor_can_view_knowledge_graph`, `test_workspace_editor_can_edit_knowledge_graph`, `test_workspace_editor_cannot_manage_knowledge_graph`, `test_workspace_admin_can_manage_knowledge_graph`

#### Scenario B: Direct admin grant gives manage/edit/view
- COVERED
- Implementation: SpiceDB schema's `admin` relation appears in all three permission definitions, so a direct `admin` grant satisfies `manage`, `edit`, and `view` simultaneously.
- Tests: `tests/integration/management/test_knowledge_graph_authorization.py::TestDirectGrantKnowledgeGraphAccess::test_direct_kg_admin_has_manage_permission`, `test_direct_kg_admin_has_edit_permission`, `test_direct_kg_admin_has_view_permission`, `test_direct_kg_editor_has_edit_and_view_but_not_manage`, `test_direct_kg_viewer_has_view_only`

