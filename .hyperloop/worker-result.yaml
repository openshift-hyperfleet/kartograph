#### Requirement: CREATE Operation — COVERED

- **Scenario: Create a new node:**
  - Implementation: `AgeBulkLoadingStrategy._execute_creates()` uses PostgreSQL COPY +
    staging tables + upsert to write nodes.
  - Test (integration): `test_bulk_loading.py::TestBulkLoadingIdempotency::
    test_repeated_batch_is_idempotent` — first run creates 2 nodes; verified via Cypher.

- **Scenario: Create an existing node (idempotent merge):**
  - Implementation: `execute_label_upsert()` merges via jsonb `||` operator — new properties
    are added while existing properties not in the second batch are preserved.
  - Test (integration): `test_create_merges_properties_on_existing_node` — first batch
    creates node with `age=30`; second batch (without `age`, with `email`) results in
    `age=30` preserved AND `email` added. Exactly 1 node total.

- **Scenario: Create an edge:**
  - Implementation: `_execute_creates()` with `EntityType.EDGE`; resolves graphids for
    start/end nodes.
  - Test (integration): `test_creates_edge_label_tables_on_empty_database` — edge created,
    verified via Cypher.

- **Scenario: Missing type definition:**
  - Implementation: `apply_mutations()` checks `defines_in_batch` and
    `type_definition_repository.get()`; returns failure if neither has a definition.
  - Test: `test_rejects_create_without_define_in_batch` — returns failure with "not defined"
    message; applier not called.

- **Scenario: Missing required properties:**
  - Implementation: `apply_mutations()` computes `missing_props = required_props -
    provided_props`; returns failure if non-empty.
  - Test: `test_rejects_create_missing_required_properties` — missing "email" produces
    failure with "email" and "required" in error.

- **Scenario: Schema learning:**
  - Implementation: `_discover_optional_properties()` adds extra props (beyond required +
    system) to `optional_properties`.
  - Test: `test_extra_properties_added_to_optional` — "email" and "age" added to
    optional_properties after CREATE.

