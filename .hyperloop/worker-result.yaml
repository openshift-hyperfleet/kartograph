## Code Review Findings

### ✅ No logger/print usage
No direct `logger.*` or `print()` calls in new code. Domain probes used throughout.

### ✅ No MagicMock for domain/application collaborators
- Application-layer service tests use `AsyncMock` only for infrastructure ports (repositories, secret store) — consistent with pre-existing patterns.
- Presentation-layer tests use `AsyncMock(spec=KnowledgeGraphService)` — the same pattern used in existing IAM presentation tests (`test_group_routes.py`, `test_api_key_routes.py`).
- Prior MagicMock use for DataSource aggregates was correctly replaced with real `_make_ds()` factory instances.

### ✅ DDD architectural boundaries respected
- `management.presentation` legitimately imports `iam` (CurrentUser for authentication) — correctly excluded from the management-no-iam archon rule with clear comment.
- All 56 architecture boundary tests pass.

### ✅ Spec requirements fully covered
- **Creation**: `POST /management/workspaces/{ws_id}/knowledge-graphs` with EDIT permission check, ULID, duplicate name 409.
- **Name validation**: `min_length=1, max_length=100` enforced at Pydantic request model and domain layer.
- **Retrieval**: `GET /management/knowledge-graphs/{kg_id}` — 404 for unauthorized or missing (no existence leakage).
- **Listing**: `GET /management/workspaces/{ws_id}/knowledge-graphs` (scoped) and `GET /management/knowledge-graphs` (tenant-wide, filter by VIEW).
- **Update**: `PATCH /management/knowledge-graphs/{kg_id}` with EDIT permission.
- **Deletion**: `DELETE /management/knowledge-graphs/{kg_id}` with MANAGE permission, atomic cascade (data sources + encrypted credentials within `session.begin()`), SpiceDB cleanup via outbox.
- **Permission inheritance**: Tested via 12 integration auth scenarios covering workspace-inherited access and direct grants.

### ✅ Conventional commits with correct trailers
Commit `f809a299` contains `Spec-Ref: specs/management/knowledge-graphs.spec.md@85d49a...` and `Task-Ref: task-008`.

### Minor observation (non-blocking)
In `list_all()`, the probe is called as `knowledge_graphs_listed(workspace_id=self._scope_to_tenant, ...)` — semantically the `scope_to_tenant` is a tenant ID, not a workspace ID. The probe interface uses `workspace_id` for both `list_for_workspace` and `list_all` scenarios, which is a minor naming inconsistency in the probe signature. This is pre-existing probe interface design and does not affect correctness.
