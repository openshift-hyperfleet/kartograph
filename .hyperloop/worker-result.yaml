## Fix 1 Verified — vitest version constraint (FAIL → PASS)

`src/dev-ui/package.json` `devDependencies.vitest` changed from
`"^2.2.5"` (non-existent in npm registry) to `"^2.1.9"`.
`pnpm install` now resolves and installs vitest 2.1.9 successfully.
All 16 frontend tests execute and pass (`vitest run`).

## Fix 2 Verified — loadDataSources() stub replaced with real API calls (FAIL → PASS)

`src/dev-ui/app/pages/data-sources/index.vue` now:

1. Calls `GET /management/knowledge-graphs` to enumerate all KGs in the tenant.
2. Calls `GET /management/knowledge-graphs/{id}/data-sources` for each KG
   (per-KG errors swallowed to prevent one bad KG from breaking the whole list).
3. Calls `GET /management/data-sources/{id}/sync-runs` to attach sync history
   to each data source so cards render status badges and history rows.
4. Calls `loadDataSources()` from `onMounted` for initial page load.
5. Watches `tenantVersion` so the list refreshes on tenant switch.

All four Sync Monitoring spec scenarios are now functionally reachable.

