## Spec Coverage

All requirements from `specs/management/knowledge-graphs.spec.md` are covered:

- **KG Creation:** `KnowledgeGraph.create()` factory with ULID ID; `KnowledgeGraphService.create()` checks EDIT on workspace; duplicate name → 409 via `IntegrityError` → `DuplicateKnowledgeGraphNameError`.
- **Name Validation:** `_validate_name()` enforces 1–100 chars; raises `InvalidKnowledgeGraphNameError`; FastAPI validates via Pydantic model.
- **Retrieval:** `service.get()` returns `None` for both unauthorized and not-found; route maps `None` → 404. No distinction exposed to caller.
- **Listing:** Workspace-scoped list (reads SpiceDB relationships) and tenant-wide `list_all()` (fetches all, filters by per-KG VIEW check). Both tested.
- **Update:** `service.update()` checks EDIT on KG; `KnowledgeGraph.update()` guards `_deleted` flag with `AggregateDeletedError`.
- **Deletion (cascade + atomic):** `service.delete()` wraps entire cascade in `session.begin()` — data sources deleted (with encrypted credential cleanup), KG deleted, all within one transaction. Rollback-on-failure tested.
- **Mutation after deletion:** `KnowledgeGraph._deleted` flag set by `mark_for_deletion()`; `update()` raises `AggregateDeletedError` if already deleted.
- **Permission inheritance:** SpiceDB schema `knowledge_graph` definition: `view = admin + editor + viewer + workspace->view`; `edit = admin + editor + workspace->edit`; `manage = admin + workspace->manage`. Direct admin grants also confer all lower permissions via `view` and `edit` including admin.

