### What Changed (diff vs `alpha`)

Three implementation commits since `alpha`:

1. **`cf70ecb8`** `test(outbox)`: Missing spec scenario unit tests for retry, DLQ, unknown
   event type (`TestOutboxWorkerRetryBehavior`, `TestOutboxWorkerConcurrentSafety`,
