### REQ-3: Knowledge Graph Retrieval (SHALL)

#### Scenario A: Authorized retrieval
- COVERED
- Implementation: `knowledge_graph_service.py::get()` fetches by ID then checks VIEW permission; returns aggregate on success. Routes return 200.
- Tests: `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceGet::test_get_checks_view_permission`, `test_get_returns_aggregate_on_success`; `tests/unit/management/presentation/test_knowledge_graph_routes.py::TestGetKnowledgeGraph::test_get_knowledge_graph_returns_200`

#### Scenario B: Unauthorized or non-existent — no distinction
- COVERED
- Implementation: `get()` returns `None` for not-found, wrong tenant, AND permission denied — all three paths collapse to `None`. Routes return 404 uniformly.
- Tests: `tests/unit/management/application/test_knowledge_graph_service.py::test_get_returns_none_when_not_found`, `test_get_returns_none_for_different_tenant`, `test_get_returns_none_when_permission_denied`; `tests/unit/management/presentation/test_knowledge_graph_routes.py::test_get_knowledge_graph_returns_404_when_not_found`, `test_get_knowledge_graph_returns_404_when_unauthorized`

