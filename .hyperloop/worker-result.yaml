### Requirement-by-Requirement Findings

#### REQ-1: API Key Creation — COVERED

**Code:** `iam/application/services/api_key_service.py::create_api_key()`,
`iam/domain/aggregates/api_key.py::APIKey.create()`,
`iam/presentation/api_keys/models.py::CreateAPIKeyRequest`

**Scenario: Successful creation** — COVERED
- `karto_` prefix: `test_secret_has_karto_prefix` (service unit)
- Plaintext returned once: `test_returns_plaintext_secret_only_at_creation` (service unit)
- bcrypt hash stored: `test_creates_api_key_with_hashed_secret` (service unit)
- 12-char prefix: `test_stores_prefix_from_secret` asserts `api_key.prefix == plaintext_secret[:12]` (service unit)

**Scenario: Duplicate name per user** — COVERED
- `test_raises_on_duplicate_name` (repository unit), `test_returns_409_on_duplicate_name` (route unit)
- Repository `DuplicateAPIKeyNameError` raises on same (name, user, tenant); mapped to HTTP 409.

**Scenario: Expiration bounds** — COVERED
- `CreateAPIKeyRequest` uses `ge=1, le=3650` Pydantic constraint; default=30
- `test_validates_expires_in_days_minimum` / `test_validates_expires_in_days_maximum` (route unit)
- `test_uses_default_expires_in_days_of_30` (route unit)
- `test_creates_with_expiration` (aggregate unit)

