## Requirement Coverage

### Requirement: API Key Creation — COVERED

**Scenario: Successful creation**
- `karto_` prefix generated: `generate_api_key_secret()` in `application/security.py`
  → tested: `test_secret_has_karto_prefix` (`test_api_key_service.py`)
- Plaintext returned exactly once: `create_api_key()` returns `(api_key, plaintext_secret)` tuple
  → tested: `test_returns_plaintext_secret_only_at_creation`
- Stored as bcrypt hash: `hash_api_key_secret()` called before persistence
  → tested: `test_creates_api_key_with_hashed_secret`
- 12-char prefix stored: `extract_prefix(plaintext_secret)` = `plaintext_secret[:12]`
  → tested: `test_stores_prefix_from_secret` (asserts `api_key.prefix == plaintext_secret[:12]`)

**Scenario: Duplicate name per user**
- `DuplicateAPIKeyNameError` raised by repo duplicate-name check in `save()`
  → tested: `test_raises_on_duplicate_name` (service), `test_returns_409_on_duplicate_name` (route)

**Scenario: Expiration bounds**
- `CreateAPIKeyRequest.expires_in_days = Field(30, ge=1, le=3650)`
  → min bound tested: `test_validates_expires_in_days_minimum` (route returns 422 for 0)
  → max bound tested: `test_validates_expires_in_days_maximum` (route returns 422 for 3651)
  → default 30 days: Pydantic Field default; `test_creates_api_key_returns_201` omits the
    field (uses default) and the call succeeds. No explicit assertion that the service
    receives `expires_in_days=30` when omitted — minor gap, not a fail (model enforces it).

### Requirement: API Key Authentication — COVERED

**Scenario: Valid key**
- `validate_and_get_key()` → `get_verified_key()` (prefix lookup + bcrypt verify) → `record_usage()`
  → tested: `test_validates_correct_secret`, `test_updates_last_used_at` (service)
  → integration: `test_authenticates_with_valid_api_key`, `test_updates_last_used_at_on_success`

**Scenario: Expired key**
- `APIKey.is_valid()` checks `datetime.now(UTC) >= self.expires_at`; returns `None` if invalid
  → tested: `test_returns_none_for_expired_key` (service), `test_expired_key_returns_false` (domain)

**Scenario: Revoked key**
- `APIKey.is_valid()` checks `self.is_revoked`; returns `None` if revoked
  → tested: `test_returns_none_for_revoked_key` (service), `test_returns_401_for_revoked_api_key` (integration)

**Scenario: JWT takes precedence**
- `_authenticate()` in `dependencies/user.py`: tries JWT first; API key branch only reached if
  `token is None`
  → tested: `test_jwt_takes_priority_over_api_key` (authenticate dependency test);
    `mock_api_key_service.validate_and_get_key.assert_not_awaited()` confirms key ignored
  → integration: `test_prefers_jwt_when_both_provided`

**Scenario: Prefix collision**
- `get_verified_key()`: if `len(models) > 1`, calls `self._probe.api_key_prefix_collision()`
- `DefaultAPIKeyRepositoryProbe.api_key_prefix_collision()` uses `self._logger.error(...)` — error level ✓
  → tested: `test_logs_error_on_prefix_collision` (repository); verifies probe called with
    prefix and count=2

### Requirement: API Key Listing — COVERED

**Scenario: List keys (metadata, no secrets)**
- `APIKeyResponse` exposes: `id, name, prefix, created_by_user_id, created_at, expires_at,
  last_used_at, is_revoked` — no `secret` or `key_hash` fields
  → tested: `test_lists_api_keys_for_user` (route), `test_never_returns_secret_or_hash` (route)

**Scenario: Filter by creator**
- Route parses `?user_id=` → `UserId.from_string()` → passes as `created_by_user_id` to service
- Service passes filter to repo `list()` which adds `created_by_user_id` WHERE clause
  → tested: `test_filters_by_created_by_user_id` (service) — exercises the full GIVEN/WHEN/THEN
  → PARTIAL NOTE: No route-level test passes a *valid* `?user_id=xyz` and asserts the service
    receives it. There IS `test_returns_400_for_empty_user_id`. The service-level test covers
    the logic; the route code is straightforward. Not a fail.

### Requirement: API Key Revocation — COVERED

**Scenario: Owner revokes own key**
- `revoke_api_key()` → SpiceDB `REVOKE` check → `api_key.revoke()` → repo save
  → tested: `test_revokes_existing_key` (service), `test_owner_can_revoke_own_key` (integration)
- Key remains visible with `is_revoked=true`: `list()` query has no `is_revoked` filter (code verified);
  `APIKeyResponse.is_revoked` field included in response
  → PARTIAL NOTE: No test explicitly verifies a revoked key (is_revoked=True) still appears in
    the listing. Implementation is correct — no filter excludes revoked keys. Not a fail.

**Scenario: Tenant admin revokes any key**
- SpiceDB schema: `permission revoke = owner + tenant->administrate`
  → tested: `test_tenant_admin_can_revoke_other_users_key` (integration) — admin revokes
    a different user's key successfully

**Scenario: Already revoked**
- `APIKey.revoke()` raises `APIKeyAlreadyRevokedError` if `self.is_revoked`; route returns 409
  → tested: `test_raises_when_already_revoked` (service), `test_returns_409_when_already_revoked` (route)

**Scenario: Unauthorized revocation**
- SpiceDB `check_permission(REVOKE)` returns False → `UnauthorizedError` → route returns 403
  → tested: `test_revoke_raises_unauthorized_when_denied` (service),
    `test_revoke_api_key_returns_403_when_unauthorized` (route),
    `test_non_admin_cannot_revoke_other_users_key` (integration)

### Requirement: API Key Cascade Deletion — COVERED

**Scenario: Tenant deletion**
- `TenantService.delete_tenant()`: lists API keys by tenant, calls `mark_for_deletion()` on each,
  calls `api_key_repository.delete()`, then deletes the tenant
  → tested (all in `test_tenant_service.py`):
    - `test_deletes_api_keys_on_tenant_deletion` — single key deleted
    - `test_deletes_multiple_api_keys_on_tenant_deletion` — all 3 keys deleted
    - `test_api_key_mark_for_deletion_emits_deleted_event` — APIKeyDeleted event recorded,
      confirming SpiceDB relationship cleanup via outbox
    - `test_api_key_repo_queried_by_tenant_on_deletion` — correct tenant scoping
    - `test_cascade_deletion_probe_reports_api_key_count` — DOO probe fires with correct count
    - `test_api_keys_deleted_before_tenant_on_cascade` — ordering enforced via call_order tracking

### Requirement: API Key Name Validation — COVERED

**Scenario: Valid name (1–255 chars)**
- `CreateAPIKeyRequest.name = Field(..., min_length=1, max_length=255)`
  → implicitly tested by all successful creation tests

**Scenario: Empty name**
- `min_length=1` causes Pydantic validation failure → 422
  → tested: `test_validates_name_min_length` (route returns 422 for `""`)
  → also: `test_requires_name_field` (route returns 422 when name absent)

