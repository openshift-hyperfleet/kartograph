## Requirement Coverage

### Requirement: Knowledge Graph Creation — COVERED

**Scenario: Successful creation**
- `KnowledgeGraphService.create()` checks EDIT permission on workspace, creates aggregate via
  `KnowledgeGraph.create()` with ULID from `KnowledgeGraphId.generate()`, sets tenant_id and
  workspace_id, saves via repo. `KnowledgeGraphCreated` event via outbox writes workspace and
  tenant relationships in SpiceDB.
- Tests: `test_create_saves_aggregate_via_repo`, `test_create_checks_edit_permission_on_workspace`,
  `test_create_knowledge_graph_returns_201`, translator tests for workspace/tenant relationships.

**Scenario: Duplicate name within tenant**
- `IntegrityError` caught and re-raised as `DuplicateKnowledgeGraphNameError`; route returns 409.
- Tests: `test_create_raises_duplicate_on_integrity_error`, `test_create_knowledge_graph_returns_409_for_duplicate_name`.

### Requirement: Knowledge Graph Name Validation — COVERED

**Scenario: Valid name (1-100 chars)** — `_validate_name()` enforces 1-100 chars; Pydantic at HTTP boundary.
**Scenario: Empty or oversized** — Domain raises `InvalidKnowledgeGraphNameError`; HTTP 422.
- Tests: domain tests for empty/oversized/boundary names; route tests for 422 responses.

### Requirement: Knowledge Graph Retrieval — COVERED

**Scenario: Authorized retrieval** — `get()` fetches by ID, checks VIEW permission, returns aggregate.
**Scenario: Unauthorized/non-existent** — Both return `None`; route maps to 404 (no leakage).
- Tests: `test_get_returns_aggregate_on_success`, `test_get_returns_none_when_permission_denied`,
  route tests for 200/404 responses.

### Requirement: Knowledge Graph Listing — COVERED

**Scenario: List for workspace** — `list_for_workspace()` checks VIEW on workspace, discovers KG IDs
  via SpiceDB relationships, fetches from repo, filters by tenant.
- Tests: `test_list_uses_read_relationships_to_discover_kgs`, `test_list_filters_by_tenant`,
  route tests for 200/403 responses.

### Requirement: Knowledge Graph Update — COVERED

**Scenario: Update name and description** — `update()` checks EDIT on KG, fetches aggregate, calls
  `kg.update()`, saves in transaction.
- Tests: `test_update_calls_aggregate_update_and_saves`, `test_update_checks_edit_permission_on_kg`,
  route tests for 200/403 responses.

### Requirement: Knowledge Graph Deletion — COVERED

**Scenario: Successful deletion with atomic cascade** — `delete()` checks MANAGE on KG. Inside
  `session.begin()`: finds all data sources, deletes encrypted credentials, deletes each DS, then
  deletes the KG. `KnowledgeGraphDeleted` event produces 5 SpiceDB cleanup ops (workspace rel,
  tenant rel, filter-delete admin/editor/viewer grants).
- Tests: `test_delete_cascades_data_sources`, `test_delete_cascades_encrypted_credentials`,
  `test_delete_rolls_back_on_ds_deletion_failure`, translator tests for all 5 operations.

**Scenario: Mutation after deletion** — `KnowledgeGraph.update()` checks `self._deleted` flag,
  raises `AggregateDeletedError`.
- Tests: `test_update_raises_after_deletion`.

### Requirement: Permission Inheritance — COVERED

**Scenario: Workspace-inherited access** — SpiceDB schema:
  `permission view = admin + editor + viewer + workspace->view`
  `permission edit = admin + editor + workspace->edit`
  `permission manage = admin + workspace->manage`
- Integration tests in `tests/integration/management/test_knowledge_graph_authorization.py`
  cover workspace editor/admin/member access scenarios.

**Scenario: Direct admin grant** — Schema's `relation admin: user | group#member` feeds into
  all three permissions (manage, edit, view).
- Integration tests: `test_direct_kg_admin_has_manage_permission`, etc.

