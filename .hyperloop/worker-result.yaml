### Requirement: KnowledgeGraph Scoping — COVERED

#### Scenario: Mutation authorization
**Implementation:** `graph/presentation/routes.py::apply_kg_mutations` calls
`authz.check_permission(resource, Permission.EDIT, subject)` before delegating.
Returns 403 if denied.

**Tests:**
- `TestKnowledgeGraphScopedMutationsRoute::test_kg_mutations_route_forbidden_without_edit_permission`
- `TestKnowledgeGraphScopedMutationsRoute::test_kg_mutations_route_checks_correct_resource`
- `TestKnowledgeGraphScopedMutationsRoute::test_kg_mutations_route_accessible_with_edit_permission`

#### Scenario: KnowledgeGraph ID stamping
**Implementation:** `GraphMutationService._stamp_knowledge_graph_id` overwrites
`knowledge_graph_id` on all CREATE/UPDATE `set_properties` before validation.
Callers cannot supply a different value — it is always overwritten.

**Tests:**
- `TestKnowledgeGraphIdStamping::test_stamps_knowledge_graph_id_on_create_operation`
- `TestKnowledgeGraphIdStamping::test_overwrites_caller_provided_knowledge_graph_id`
- `TestKnowledgeGraphIdStamping::test_stamps_knowledge_graph_id_on_update_operation`
- `TestKnowledgeGraphIdStamping::test_does_not_stamp_when_knowledge_graph_id_not_provided`
- `TestKnowledgeGraphIdStamping::test_stamps_knowledge_graph_id_in_jsonl_parse`

