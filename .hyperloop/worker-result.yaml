## Failing Check Scripts — Root Cause Analysis

Four check scripts fail. **None of the failures are caused by this task's code.**

### check-no-direct-logger-usage.sh — FAIL (pre-existing)
Violation: `src/api/query/presentation/mcp.py:197: print(source["content"])`

`git diff alpha...HEAD -- src/api/query/presentation/mcp.py` shows **zero diff** — this
file was not touched by any task-013 commit. The `print()` call was present in alpha
before this branch was cut.

**Not a task-013 regression.**

### check-no-check-script-deletions.sh — FAIL (pre-existing + script bug)
Reports 5 scripts "missing `--exclude-dir=.venv`". In reality all scripts have
`--exclude-dir=".venv"` (quoted form). The check script uses:
```
grep -q -- '--exclude-dir=.venv'
```
which as a regex matches `.` as a wildcard but then fails because `.venv` starts
with `.` not `v` after the `"`. Alpha fixed this in commit `8f377074` by changing
to `grep -qE -- '--exclude-dir=.?.venv'`. This task branch was cut from a merge-base
(`8f13210e`) that predates that fix.

**Not a task-013 regression — alpha has since corrected the script.**

### check-no-state-file-commits.sh — FAIL (rebase contamination)
State files under `.hyperloop/state/intake/` are present in branch history.
These were written by the orchestrator's intake workers and picked up during
rebase (the classic contamination pattern documented in `0094212d`).

**None of the 5 task-013 implementation commits** (b4e1bdc8, 25935a07, e733f4ec,
9865a1dd, 08905505) touch `.hyperloop/state/`. Confirmed with:
```
git show <sha> --stat | grep "state/"  → no output for all 5
```

### check-no-foreign-task-commits.sh — FAIL (rebase contamination)
Foreign commits (`Task-Ref: intake`, `Task-Ref: process-improvement`) are present.
These are `docs(intake)` and `chore(process)` commits that touch only
`.hyperloop/intake/` and `.hyperloop/checks/` — zero `src/api/` changes.
The contamination is described in the branch history itself (commit `0094212d`).

**Not a task-013 regression.**

### check-empty-test-stubs.sh — FAIL (pre-existing)
Stub: `tests/integration/test_api_key_auth.py:691: test_create_api_key_requires_tenant_membership`

`git log alpha...HEAD -- src/api/tests/integration/test_api_key_auth.py` shows this
file was **not modified** on this task branch. The stub exists in alpha.

**Not a task-013 regression.**

