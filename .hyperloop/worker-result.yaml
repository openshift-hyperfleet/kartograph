  ## CodeRabbit dlq_at Claim — False Positive (Verified)

  CodeRabbit claimed the worker sets dlq_at but repository filters on
  failed_at. Verified false positive by reading the actual source:

  - worker.py _move_to_dlq() sets failed_at=datetime.now(UTC)
  - worker.py _process_batch() filters with .where(OutboxModel.failed_at.is_(None))
  - test_failed_entries_excluded_from_fetch asserts "failed_at IS NULL"

  No dlq_at column exists in this codebase. Implementation is internally
  consistent: worker, repository, and tests all use failed_at as the
  dead-letter marker.

  ## CodeRabbit .js Consistency — False Positive (Documented)

  CodeRabbit repeatedly claimed ui_source_count only counted *.vue and *.ts.
  In fact, the *.js pattern has been present since round 3:

    ui_source_count=$(find "$UI_DIR" \
      \( -name "*.vue" -o -name "*.ts" -o -name "*.js" \) 2>/dev/null \

  Round 11 added an explicit comment on that block and fixed the unescaped
  dot bug (grep -v ".nuxt" → grep -v "\.nuxt") to provide a clear diff
  that is unambiguously correct.

