### Requirement: Staging-Based Ingestion — PASS

**Node bulk create:** `staging.py:create_node_staging_table` uses
`CREATE TEMP TABLE ... ON COMMIT DROP`; `copy_nodes_to_staging` uses
`cursor.copy_from()` (COPY protocol); upsert uses direct SQL INSERT.

**Edge bulk create with ID resolution:** Nodes are always created before edges
in `apply_batch`. `create_graphid_lookup_table` queries `_ag_label_vertex`
(includes same-transaction inserts via PostgreSQL read-your-own-writes).

**Tests:** `test_staging_table_manager.py`:
