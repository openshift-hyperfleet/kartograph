### Requirement: Idempotent Event Handlers — COVERED

**Scenario: Duplicate delivery**
- Code: `SpiceDBEventHandler.handle()` calls `authz.write_relationship()`, which is an upsert
  in SpiceDB (same tuple written twice remains once). The `fetch_unprocessed` query filters
  `processed_at IS NULL`, so processed entries are never redelivered.
- Test: `test_handler_invoked_twice_produces_same_spicedb_state` (integration) — directly
  simulates the "handler ran but mark_processed crashed" scenario: calls `handle()` once
  manually, verifies entry still unprocessed, runs `_process_batch()`, verifies processed_at
  is set and SpiceDB relationship is identical (not duplicated or removed).

---

### Requirement: Concurrent Worker Safety — COVERED

**Scenario: Concurrent workers**
- Code: Both `OutboxRepository.fetch_unprocessed()` and `OutboxWorker._process_batch()`
  use `.with_for_update(skip_locked=True)` on the SQLAlchemy query.
- Test: `test_fetch_unprocessed_uses_for_update_skip_locked` — compiles the query with
  the PostgreSQL dialect and asserts `"SKIP LOCKED"` appears in the rendered SQL.

---

### Requirement: Dual Delivery Mechanism — COVERED (with minor note)

**Scenario: Real-time notification**
- Code: `PostgresNotifyEventSource` listens on the `outbox_events` channel via
  `asyncpg_listen.NotificationListener`. A PostgreSQL trigger (`d32ecc44581a` migration)
  fires `pg_notify('outbox_events', NEW.id::text)` on each outbox INSERT.
  `OutboxWorker.start()` starts both `_poll_loop` and the event source concurrently.
- Tests:
  - Unit: `test_postgres_notify_event_source.py` — 20+ tests covering NOTIFY dispatch,
    invalid payloads, Timeout objects, graceful stop, and probe integration.
  - Integration: `test_worker_processes_via_notify_not_polling` — starts a real worker with
    `poll_interval_seconds=999` to prove the entry is processed sub-second via NOTIFY before
    the poll interval could fire.

**Scenario: Polling fallback**
- Code: `OutboxWorker._poll_loop()` runs unconditionally in `start()` alongside the event
  source, executing `_process_batch()` every `poll_interval_seconds` (default 30 s). Any
  entry missed by NOTIFY is picked up on the next poll cycle.
- Tests: Directly exercised via `test_in_progress_batch_completes_before_shutdown` (starts
  worker, poll loop runs) and `test_worker_processes_group_created_and_writes_to_spicedb`
  (calls `_process_batch()` — the exact call made by the poll loop).
- **Note**: There is no dedicated integration test that explicitly simulates a missed NOTIFY
  (e.g., starts a worker with event_source, inserts a row, proves polling catches it after the
  interval). The polling path is clearly implemented and implicitly tested; this is a minor
  gap worth addressing in a future iteration but does not constitute a SHALL failure because
  the polling behaviour is demonstrably implemented and its core path (`_process_batch`) is
  integration-tested.

