### Requirement: Event Fan-Out — COVERED

**Scenario: Multiple handlers registered**
- Code: `CompositeEventHandler.register()` appends to `_handlers_by_type[event_type]`
  list. `handle()` iterates all handlers for the type. Multiple handlers for the same
  type are all invoked sequentially.
- Unit test: `TestCompositeEventHandler.test_handle_fans_out_to_multiple_handlers`
  (`test_composite.py`) — registers two handlers for `SharedEvent`, invokes `handle()`,
  asserts both are called.

**Scenario: Unknown event type**
- Code: `CompositeEventHandler.handle()` raises `UnknownEventTypeError` (not
  `ValueError`) when no handlers are registered. `OutboxWorker._process_entries()`
  catches `UnknownEventTypeError` *before* the generic `except Exception` clause,
  calling `_move_to_dlq()` directly without incrementing `retry_count`.
- Unit tests:
  - `test_handle_raises_for_unknown_event_type` — CompositeEventHandler raises
    `UnknownEventTypeError` with correct `event_type` and `registered_types`.
  - `test_unknown_event_type_error_is_not_value_error` — confirms not a `ValueError`.
  - `test_unknown_event_type_immediately_moves_to_dlq` — worker DLQs on first encounter.
  - `test_unknown_event_type_dlq_even_at_zero_retries` — DLQ regardless of retry count.
  - `test_retry_not_called_for_unknown_event_type` — `_increment_retry` never called.
  - `TestUnknownEventTypeError` (`test_exceptions.py`) — exception attributes, not
    a ValueError, can be raised and caught.

