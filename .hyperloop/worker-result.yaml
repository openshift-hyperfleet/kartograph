#### REQ-3: API Key Listing — COVERED

**Code:** `iam/application/services/api_key_service.py::list_api_keys()`,
`iam/presentation/api_keys/routes.py` (GET `/iam/api-keys`),
`iam/presentation/api_keys/models.py::APIKeyResponse`

**Scenario: List keys (metadata, no secrets)** — COVERED
- `APIKeyResponse` model defines all spec-required fields: `name`, `prefix`, `created_at`,
  `expires_at`, `last_used_at`, `is_revoked` — no `key_hash` or `secret` field exists.
- `test_never_returns_secret_or_hash` (route unit): asserts `secret`, `key_hash`, `hash` absent
- `test_revoked_key_remains_visible_in_listing` (integration): confirms `is_revoked` field present

**Scenario: Filter by creator** — COVERED (service level)
- `test_filters_by_created_by_user_id` (service unit): verifies repository receives
  `created_by_user_id` filter when `?user_id=<id>` is passed
- Route test for this path (`GET /iam/api-keys?user_id=<valid_id>`) is absent at the
  presentation layer; service-level test covers the logic path.

