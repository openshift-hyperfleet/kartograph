## Prior Spec Alignment Review — shared-kernel/outbox.spec.md

### Requirement: Transactional Event Storage — COVERED

**Successful write scenario:**
- `OutboxRepository.append()` calls `session.add()` only — never `session.commit()`. The session is shared with the calling aggregate repository, so both the aggregate mutation and outbox entry commit or roll back atomically.
- Implementation: `src/api/infrastructure/outbox/repository.py:76`
- Unit test: `test_worker.py::TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit` verifies `commit` is never called.
- Integration test: `test_outbox_consistency.py::TestAtomicityGuarantees::test_outbox_entry_created_in_same_transaction_as_group` verifies both rows exist after commit.

**Transaction rollback scenario:**
- Integration test: `test_outbox_consistency.py::TestAtomicityGuarantees::test_rollback_removes_both_group_and_outbox_entry` forces a rollback mid-transaction and asserts neither group nor outbox entry persists.
- Unit test: `test_worker.py::TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries` asserts commit was never called.

### Requirement: Event Processing — COVERED

**Normal processing scenario:**
- Worker fetches entries, calls `handler.handle(event_type, payload)`, applies SpiceDB operations, then calls `_mark_processed()` which sets `processed_at` timestamp.
- Implementation: `src/api/infrastructure/outbox/worker.py:238–251`
- Tests: `test_worker.py::TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries`, `test_marks_entry_as_processed`
- Integration test: `test_outbox_consistency.py::TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb` verifies `processed_at` is set and SpiceDB relationship exists.

**Transient failure scenario:**
- `_handle_processing_failure` increments `retry_count` and sets `last_error` via `_increment_retry()`.
- Implementation: `src/api/infrastructure/outbox/worker.py:271–294`
- Test: `test_worker.py::TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count` verifies probe.event_processing_failed called (not DLQ) and `test_transient_failure_does_not_dlq_immediately`.

**Permanent failure (dead letter) scenario:**
- When `new_retry_count >= max_retries`, `_move_to_dlq()` sets `failed_at` timestamp. Fetch query filters `failed_at IS NULL` so the entry is never retried.
- Implementation: `src/api/infrastructure/outbox/worker.py:296–323`
- Tests: `test_worker.py::TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq`, `test_worker.py::TestOutboxWorkerIdempotency::test_failed_entries_excluded_from_fetch`

### Requirement: Idempotent Event Handlers — COVERED

**Duplicate delivery scenario:**
- SpiceDB `write_relationship` uses upsert semantics — writing the same tuple twice leaves it once. The `FakeAuthorizationProvider` in tests uses Python `set` to mirror this.
- Unit test: `test_spicedb_handler.py::TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state` invokes handler twice and asserts `state_after_second == state_after_first`.
- Integration test: `test_outbox_consistency.py::TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state` — calls handler once (simulating crash before mark_processed), then runs the worker again, asserts `processed_at` is set and SpiceDB state is unchanged.

### Requirement: Concurrent Worker Safety — COVERED

**Concurrent workers scenario:**
- Both `_process_batch` and `_process_single` use `.with_for_update(skip_locked=True)`, ensuring each row is claimed by exactly one worker.
- Implementation: `src/api/infrastructure/outbox/worker.py:206`, `src/api/infrastructure/outbox/worker.py:227`
- Unit test: `test_worker.py::TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked` compiles the SQL with PostgreSQL dialect and asserts "SKIP LOCKED" is present.

### Requirement: Dual Delivery Mechanism — COVERED

**Real-time notification scenario:**
- `PostgresNotifyEventSource` listens on `outbox_events` channel via asyncpg-listen. A PostgreSQL trigger (`d32ecc44581a_create_outbox_notify_trigger.py`) emits `pg_notify('outbox_events', NEW.id::text)` on INSERT. The worker calls `_process_single` immediately.
- Implementation: `src/api/infrastructure/outbox/event_sources/postgres_notify.py`, `src/api/infrastructure/migrations/versions/d32ecc44581a_create_outbox_notify_trigger.py`
- Unit tests: `test_postgres_notify_event_source.py` — 20+ tests covering callback invocation, UUID parsing, invalid payloads, stop/start lifecycle.
- Integration test: `test_outbox_consistency.py::TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling` uses `poll_interval_seconds=999` to force NOTIFY path and asserts `processed_at` is set within 500ms.

**Polling fallback scenario:**
- `_poll_loop` always runs alongside the event source as a fallback; default `poll_interval_seconds=30` matches the spec.
- Implementation: `src/api/infrastructure/outbox/worker.py:51,169`
- Note: There is no dedicated unit/integration test for the specific scenario "NOTIFY misses an event, then polling catches it after 30s." The structural guarantee (poll loop always runs independently of the event source) is exercised by `test_in_progress_batch_completes_before_shutdown` and the general batch-processing tests, but the missed-NOTIFY-caught-by-poll scenario is not explicitly tested. This is a minor gap but the implementation is correct by construction and the default interval is correctly set to 30 seconds.

### Requirement: Event Fan-Out — COVERED

**Multiple handlers registered scenario:**
- `CompositeEventHandler.register()` appends handlers to a list per event type. `handle()` iterates all handlers for the type.
- Implementation: `src/api/infrastructure/outbox/composite.py:38–91`
- Test: `test_composite.py::TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers` registers two handlers for `SharedEvent` and asserts both `handle` calls are made.

**Unknown event type scenario:**
- `CompositeEventHandler.handle()` raises `UnknownEventTypeError` when no handler is registered. The worker catches this before the generic `except Exception` and immediately calls `_move_to_dlq()` without incrementing retry count.
- Implementation: `src/api/infrastructure/outbox/composite.py:83–88`, `src/api/infrastructure/outbox/worker.py:253–257`
- Tests: `test_worker.py::TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`, `test_retry_not_called_for_unknown_event_type`; `test_composite.py::test_handle_raises_for_unknown_event_type`, `test_unknown_event_type_error_is_not_value_error`

