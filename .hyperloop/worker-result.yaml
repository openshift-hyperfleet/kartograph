## Groups Implementation Summary

All 10 SHALL requirements from `specs/iam/groups.spec.md` are implemented and
covered by tests. Every scenario has at least one unit or integration test
exercising the exact Given/When/Then conditions.

### Covered Requirements

1. **Group Creation** — `Group.create()` generates ULID; creator auto-assigned admin role.
   - Duplicate name → HTTP 409 via `DuplicateGroupNameError`.

2. **Group Name Validation** — 1–255 chars after trim enforced in `Group.create()` and `Group.rename()`.
   - Empty/whitespace → `ValueError` → HTTP 422.

3. **Group Retrieval** — VIEW permission checked via SpiceDB before returning group.
   - Unauthorized/not-found → HTTP 404.

4. **Group Listing** — `lookup_resources` filters to groups user has VIEW on.
   - Tenant membership implies VIEW via `tenant->view` in SpiceDB schema.

5. **Group Rename** — MANAGE permission required; duplicate name check before rename.
   - Duplicate → HTTP 409.

6. **Group Deletion** — MANAGE permission required; member snapshot captured in `GroupDeleted` event.

7. **Group Member Management** — `add_member`, `remove_member`, `update_member_role`.
   - Last-admin protection in aggregate; raises `ValueError` → HTTP 400.

8. **Group Member Listing** — VIEW permission required; SpiceDB `read_relationships` used.

9. **Workspace Access Inheritance** — SpiceDB schema chains group members to workspace roles.
   - Add/remove member propagates to workspace permissions via outbox.

10. **Group Roles** — ADMIN: manage + view + workspace inheritance. MEMBER: view + workspace inheritance.

**VERDICT: PASS**
