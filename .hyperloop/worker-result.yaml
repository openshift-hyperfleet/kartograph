### Requirements Coverage

#### Requirement: Adapter Port
- COVERED
- `IDatasourceAdapter` protocol defined at `src/api/ingestion/ports/adapters.py`
- `ExtractionResult` frozen dataclass defined in same file
- `extract()` method accepts `connection_config`, `credentials`, `checkpoint`, `sync_mode`; returns `ExtractionResult` with `changeset_entries`, `content_blobs`, `new_checkpoint`
- Port lives in `ingestion/ports/` (Ingestion domain layer) with no dlt, httpx, or framework imports — enforced by architecture tests
- Tests: `src/api/tests/unit/ingestion/ports/test_adapter_port.py` (protocol structural checks, domain isolation), `src/api/tests/unit/ingestion/test_architecture.py` (archrule enforcement)

#### Requirement: GitHub Adapter
- COVERED
- `GitHubAdapter` at `src/api/ingestion/infrastructure/adapters/github.py` implements `IDatasourceAdapter`
- Repository tree extraction: uses `GET /repos/{owner}/{repo}/git/trees/{sha}?recursive=1` for full refresh (`_get_all_tree_blobs`)
- Content fetching: uses `GET /repos/{owner}/{repo}/git/blobs/{sha}` via `_fetch_blob`; only changed files fetched in incremental mode
- Incremental sync: uses `GET /repos/{owner}/{repo}/compare/{base}...{head}` (`_get_changed_files`); checkpoint carries `commit_sha`; new checkpoint returned with HEAD SHA
- Full refresh: triggered when `checkpoint=None` or `sync_mode=FULL_REFRESH`; fetches entire tree
- Credential handling: `credentials["token"]` used as Bearer token in `Authorization` header
- Tests: `src/api/tests/unit/ingestion/infrastructure/adapters/test_github_adapter.py` covers all five scenarios (TestFullRefresh, TestIncrementalSync, TestCredentialHandling, TestGitHubAdapterProtocolCompliance, TestContentFetching)

#### Requirement: Pluggable Credential Backend
- COVERED
- `ICredentialReader` protocol defined at `src/api/shared_kernel/credential_reader.py`
- `retrieve(path, tenant_id)` returns `dict[str, str]`; port is `@runtime_checkable`
- Ingestion context imports `ICredentialReader` from `shared_kernel` (not from `management`) — enforced by architecture test `test_ingestion_does_not_import_management`
- Tests: `src/api/tests/unit/shared_kernel/test_credential_reader.py` (8 protocol tests), `src/api/tests/unit/ingestion/ports/test_adapter_port.py::TestCredentialReaderPort` (4 tests)

#### Requirement: dlt Framework Integration
- COVERED
- `DltAdapterRunner` at `src/api/ingestion/infrastructure/dlt_runner.py`
- In-process execution: uses `dlt.pipeline()` + `pipeline.run()` in a `ThreadPoolExecutor` thread; no Docker, no subprocess
- State persistence: dlt resource state (`dlt.current.resource_state()`) stores `adapter_checkpoint` key; with PostgreSQL destination this lands in `dlt_internal` schema; filesystem destination used in unit tests for state round-trip verification
- Extracted data on disk: `changeset.jsonl` (one JSON line per entry) and `blobs/{hex_digest}` files written to `{working_dir}/output/` by `_write_output_files()`
- Tests: `src/api/tests/unit/ingestion/infrastructure/test_dlt_runner.py` covers all three scenarios (TestDltInProcessExecution, TestExtractedDataOnDisk, TestDltStatePersistence) including pod-restart state survival

