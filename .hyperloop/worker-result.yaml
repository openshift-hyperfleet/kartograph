#### REQ-4 — Concurrent Worker Safety

**Implementation:**
Both `OutboxRepository.fetch_unprocessed()` (repository.py line 93) and
`OutboxWorker._process_batch()` (worker.py line 181) append `.with_for_update(skip_locked=True)`
to the SELECT. Rows being processed by one worker are skipped by others.

**Scenario: Concurrent workers** — COVERED
- Unit: `TestOutboxWorkerConcurrentSafety.test_fetch_unprocessed_uses_for_update_skip_locked` —
  captures the compiled SQL via `query.compile(dialect=postgresql.dialect())` and asserts
  `"SKIP LOCKED" in compiled.upper()`.
- Unit: `TestOutboxWorkerIdempotency.test_already_processed_entry_excluded_from_fetch` and
  `test_failed_entries_excluded_from_fetch` — verify the compiled query contains
  `processed_at IS NULL` and `failed_at IS NULL`.

