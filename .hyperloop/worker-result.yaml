## Spec Coverage

All SHALL/MUST requirements from `bulk-loading.spec.md` are implemented:

- **Operation Partitioning:** DELETEs (edges→nodes) → CREATEs (nodes→edges) → UPDATEs.
  Covered by `TestOperationPartitioning`, `TestDeleteOrderingEdgesBeforeNodes`,
  `TestCreateOrderingNodesBeforeEdges`.

- **Label and Index Pre-Creation:** Pre-existing implementation in `_pre_create_labels_and_indexes`.
  Covered by `TestCreateLabelIndexesForNodes/Edges`, `TestSkipsExistingIndexes`.

- **Staging-Based Ingestion:** `CREATE TEMP TABLE ... ON COMMIT DROP`, COPY protocol,
  `_ag_label_vertex` lookup for same-batch node visibility.
  Covered by `TestNodeStagingTableCreation`, `TestEdgeStagingTableCreation`,
  `TestGraphidLookupTableCreation`.

- **Duplicate and Orphan Detection:** `check_for_duplicate_ids` raises `ValueError`
  and notifies probe; `check_for_orphaned_edges` detects NULL start/end graphids.
  Covered by `TestDuplicateIdDetection` (5 tests), `TestOrphanedEdgeDetection` (7 tests).

- **Concurrency Safety — Advisory Locks:** `pg_advisory_xact_lock` (transaction-scoped).
  Covered by `TestAdvisoryLockOrdering` (6 tests).

- **Concurrency Safety — Deterministic Lock Ordering:** `sorted(all_labels)` guarantees
  alphabetical acquisition order preventing deadlocks.
  Covered by `test_labels_acquired_in_alphabetical_order`,
  `test_lock_order_is_deterministic_regardless_of_operation_input_order`.

- **Concurrency Safety — Rollback on Lock Failure:** Bounded retry loop with
  `conn.rollback()` before each retry releases all `pg_advisory_xact_lock` locks.
  Covered by `TestAdvisoryLockRetry` (5 tests).
