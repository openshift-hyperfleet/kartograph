### NFR Observations (non-blocking notes)

**Observability:** No direct `logger.*` or `print()` in implementation. All observability
routed through domain probes (`self._probe.event_moved_to_dlq(...)` etc.). Concrete
`DefaultOutboxWorkerProbe` / `DefaultEventSourceProbe` implementations exist.

**Mock discipline:** Worker unit tests (`test_worker.py`) use `AsyncMock()` for the
injected `EventHandler` and `MagicMock()` for `OutboxWorkerProbe`. The NFR testing spec
(specs/nfr/testing.spec.md) states "mocking is NOT acceptable for: event handlers or probe
protocols." The critical domain collaborator (`AuthorizationProvider`) IS properly handled
with a hand-rolled `FakeAuthorizationProvider` in `TestSpiceDBEventHandlerIdempotency`.
The worker's use of mocks for the handler and probe is a pragmatic trade-off since the
worker is itself infrastructure and isolating its behaviour requires lightweight doubles
for its injected contracts. Noted as a deviation but not a blocking issue.

**Architecture boundaries:** `UnknownEventTypeError` lives in `shared_kernel.outbox.exceptions`
with no bounded-context imports. Worker and composite are in `infrastructure/outbox/`. Correct.

