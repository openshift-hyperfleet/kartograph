### Requirement: Knowledge Graph Deletion — COVERED

**Implementation:**
- `KnowledgeGraphService.delete()` checks MANAGE on KG
- Single `async with self._session.begin()` transaction cascade:
  1. `secret_store.delete()` for each DS with credentials_path
  2. `ds_repo.delete()` for each DS
  3. `kg_repo.delete()` for the KG
- `KnowledgeGraphDeleted` event via transactional outbox cleans up:
  workspace, tenant, admin, editor, viewer relationships in SpiceDB

**Scenario: Successful deletion — COVERED**
- `TestKnowledgeGraphServiceDelete::test_delete_cascades_data_sources`
- `TestKnowledgeGraphServiceDelete::test_delete_cascades_encrypted_credentials`
- `TestManagementEventTranslatorKnowledgeGraphDeleted::test_produces_five_operations`
  (5 SpiceDB cleanup ops: workspace, tenant, admin, editor, viewer)
- `TestDeleteKnowledgeGraph::test_delete_knowledge_graph_returns_204`

**Atomicity (if any step fails, rolls back) — COVERED**
- `TestKnowledgeGraphServiceDelete::test_delete_rolls_back_on_ds_deletion_failure`

**Scenario: Mutation after deletion — COVERED**
- `KnowledgeGraph.update()` raises `AggregateDeletedError` when `_deleted=True`
- `TestKnowledgeGraphUpdate::test_update_raises_after_deletion`

