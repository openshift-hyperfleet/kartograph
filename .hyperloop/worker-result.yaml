#### Requirement: Permission Inheritance — COVERED

**SpiceDB schema**
```
permission view   = admin + editor + viewer + workspace->view
permission edit   = admin + editor + workspace->edit
permission manage = admin + workspace->manage
```

**Scenario: Workspace-inherited access**

- Schema tests: `test_knowledge_graph_edit_includes_workspace_edit`, `test_knowledge_graph_view_includes_workspace_view`, `test_knowledge_graph_manage_includes_workspace_manage` in `TestKnowledgeGraphSchemaDesign` ✓
- Integration tests: `test_workspace_editor_can_view_knowledge_graph`, `test_workspace_editor_can_edit_knowledge_graph`, `test_workspace_admin_can_manage_knowledge_graph` in `TestWorkspaceInheritedKnowledgeGraphAccess` ✓

**Scenario: Direct admin grant (manage + edit + view regardless of workspace role)**

- Integration tests: `test_direct_kg_admin_has_manage_permission`, `test_direct_kg_admin_has_edit_permission`, `test_direct_kg_admin_has_view_permission` in `TestDirectGrantKnowledgeGraphAccess` ✓

