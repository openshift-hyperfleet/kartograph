### Requirement Coverage

#### REQ-1: Transactional Event Storage — COVERED

**Scenario: Successful write**
- Code: `OutboxRepository.append()` calls `session.add()` only — never `session.commit()`. Caller owns the transaction.
- Unit test: `test_repository_append_does_not_commit` — asserts `session.commit` not called; `session.add` called once.
- Integration test: `TestAtomicityGuarantees.test_outbox_entry_created_in_same_transaction_as_group` — both records exist after commit.

**Scenario: Transaction rollback**
- Code: Same shared-session design; `session.add()` without commit means a rollback by the caller discards the pending row.
- Unit test: `test_failed_service_call_leaves_no_outbox_entries` — confirms commit never called.
- Integration test: `TestAtomicityGuarantees.test_rollback_removes_both_group_and_outbox_entry` — neither record exists after forced rollback.

---

#### REQ-2: Event Processing — COVERED

**Scenario: Normal processing**
- Code: `_process_entries()` dispatches to handler → `_mark_processed()` → `probe.event_processed()`.
- Unit tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`, `test_calls_event_processed_on_success`.
- Integration test: `test_worker_processes_group_created_and_writes_to_spicedb` — `processed_at` is set; SpiceDB relationship exists.

**Scenario: Transient failure**
- Code: `_handle_processing_failure()` → `_increment_retry()` when `new_retry_count < max_retries`; `probe.event_processing_failed()` called.
- Unit tests: `test_transient_failure_increments_retry_count` — `event_processing_failed` called, `event_moved_to_dlq` NOT called. `test_transient_failure_does_not_dlq_immediately`.

**Scenario: Permanent failure (dead letter)**
- Code: `_handle_processing_failure()` → `_move_to_dlq()` when `new_retry_count >= max_retries`; sets `failed_at`.
- Unit test: `test_max_retries_moves_entry_to_dlq` — `event_moved_to_dlq` called; `event_processing_failed` NOT called.

---

#### REQ-3: Idempotent Event Handlers — COVERED

**Scenario: Duplicate delivery**
- Code: `OutboxRepository.fetch_unprocessed()` filters `processed_at IS NULL` and `failed_at IS NULL`. SpiceDB `write_relationship` is upsert (set semantics — writing same tuple twice is a no-op).
- Unit test: `TestSpiceDBEventHandlerIdempotency.test_duplicate_invocation_produces_identical_final_state` — `FakeAuthorizationProvider` backed by a Python `set`; invoking handler twice yields the same set contents.
- Unit tests: `test_already_processed_entry_excluded_from_fetch`, `test_failed_entries_excluded_from_fetch` — SQL compiled with PostgreSQL dialect confirms `processed_at IS NULL` and `failed_at IS NULL` filters.
- Integration test: `TestIdempotentEventHandlers.test_handler_invoked_twice_produces_same_spicedb_state` — handler called manually (no `mark_processed`), then worker retries the entry; SpiceDB state unchanged; `processed_at` is set after retry.

---

#### REQ-4: Concurrent Worker Safety — COVERED

**Scenario: Concurrent workers**
- Code: `_process_batch()` and `_process_single()` both use `.with_for_update(skip_locked=True)`.
- Unit test: `TestOutboxWorkerConcurrentSafety.test_fetch_unprocessed_uses_for_update_skip_locked` — SQLAlchemy query compiled with the PostgreSQL dialect; `SKIP LOCKED` confirmed in rendered SQL.

---

#### REQ-5: Dual Delivery Mechanism — COVERED

**Scenario: Real-time notification**
- Code: Migration `d32ecc44581a` installs trigger `outbox_after_insert` → `pg_notify('outbox_events', NEW.id::text)`. `PostgresNotifyEventSource` listens on the channel via `asyncpg-listen` and calls `_process_single(UUID)`. `OutboxWorker.start()` starts the event-source task in parallel with the poll loop.
- Unit tests: `test_postgres_notify_event_source.py` — `test_notify_triggers_callback_with_uuid`, `test_callback_receives_correct_uuid_type`, timeout/invalid-payload handling, probe integration (15 tests).
- Integration test: `test_worker_processes_via_notify_not_polling` — `poll_interval_seconds=999`; entry processed in ≤500 ms via NOTIFY; SpiceDB relationship confirmed.

**Scenario: Polling fallback**
- Code: `_poll_loop()` calls `_process_batch()` every `poll_interval_seconds` (default 30). Uses `asyncio.wait_for(_shutdown_event.wait(), timeout=poll_interval)` so `stop()` interrupts the sleep immediately.
- Unit test: `TestOutboxWorkerLifecycle.test_in_progress_batch_completes_before_shutdown` — exercises the full poll-loop + batch execution path under controlled shutdown.
- Integration tests: `TestOutboxWorkerProcessing.*` — calls `_process_batch()` directly (the polling mechanism, no NOTIFY) and verifies entries are processed.

---

#### REQ-6: Event Fan-Out — COVERED

**Scenario: Multiple handlers registered**
- Code: `CompositeEventHandler` stores `dict[str, list[EventHandler]]`; `handle()` iterates all handlers for the type.
- Unit test: `test_handle_fans_out_to_multiple_handlers` — two handlers registered for `SharedEvent`; both called once with correct payload.

**Scenario: Unknown event type**
- Code: `CompositeEventHandler.handle()` raises `UnknownEventTypeError` (not `ValueError`) when no handler is registered. `OutboxWorker._process_entries()` catches `UnknownEventTypeError` before the generic `except Exception` and calls `_move_to_dlq()` directly — `_increment_retry()` is never invoked.
- Unit tests (five):
  - `test_handle_raises_for_unknown_event_type` — correct exception type with `event_type` and `registered_types` attributes.
  - `test_unknown_event_type_error_is_not_value_error` — not a `ValueError`; worker can distinguish it.
  - `test_unknown_event_type_immediately_moves_to_dlq` — `event_moved_to_dlq` called; `event_processing_failed` and `event_processed` NOT called.
  - `test_unknown_event_type_dlq_even_at_zero_retries` — same path at `retry_count=0`, well below `max_retries=10`.
  - `test_retry_not_called_for_unknown_event_type` — patches `_increment_retry`; asserts never awaited.
- `TestUnknownEventTypeError.*` (6 tests) — exception attributes, string representation, raise/catch semantics.

