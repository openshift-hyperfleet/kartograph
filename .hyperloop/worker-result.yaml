  ## UNADDRESSED — Blocking

  ### `src/dev-ui/app/tests/index.test.ts` (Major — flagged repeatedly as Duplicate/unresolved)

  **Validity:** Valid.
  **Applicability:** Yes — file is in the PR diff.
  **Addressed:** NO.

  Two distinct sub-issues remain:

  #### 1. Tests exercise primitives, not production code
  The test suite in `index.test.ts` (all 5 tests) operates entirely on
  local variables and JavaScript built-ins (sessionStorage, Math.round).
  None of the tests import from `~/pages/index.vue` or any composable.
  Crucially, the production `index.vue` page does not use sessionStorage
  or a "visited" marker at all — these tests verify behaviour that does
  not exist in production. A complete regression in the home page would
  leave all five tests green.

  CodeRabbit flagged this as Major in the first review and again as a
  "Duplicate comment" (unresolved) in the final review round.

  **Required fix:** Extract the real page logic (e.g., `checklistItems`,
  `completedCount`, `isFirstVisit`) into testable composables or helpers
  and import them in the test. Remove the detached sessionStorage /
  arithmetic stubs.

  #### 2. Property name mismatch: `completed` vs `done`
  `index.test.ts` lines 28–34 build test data with a `completed` property
  and filter via `s.completed`. The production `index.vue` uses `item.done`
  exclusively — confirmed at lines 62, 91–92, and 300–311 of index.vue.
  The test is asserting the wrong shape and will pass even when the real
  `done` property is absent.

  CodeRabbit raised this as a new inline comment in the most recent review
  round (Run `b2470267`).

  **Required fix:** Either (a) import the real checklist logic and test
  `done` properties, or (b) at minimum change the test data and filter
  to use `done` so the test shape matches production.

