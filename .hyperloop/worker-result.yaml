### Requirement: Idempotent Event Handlers â€” COVERED

**Scenario: Duplicate delivery**
- Code: `SpiceDBEventHandler.handle()` calls `authz.write_relationship()`, which in
  SpiceDB is an upsert (set semantics). `fetch_unprocessed` filters `processed_at IS NULL`,
  so a successfully marked entry will never be re-fetched.
- Unit test (filtering): `test_already_processed_entry_excluded_from_fetch` â€” compiles
  the SQL and asserts `processed_at IS NULL` is present.
- Unit test (handler re-execution): `test_duplicate_invocation_produces_identical_final_state`
  in `test_spicedb_handler.py` â€” uses `FakeAuthorizationProvider` with a Python `set`
  (mirroring SpiceDB upsert semantics); calls `handler.handle()` twice with the same
  payload and asserts `state_after_second == state_after_first`.
- Integration test: `test_handler_invoked_twice_produces_same_spicedb_state` in
  `test_outbox_consistency.py` â€” calls `spicedb_event_handler.handle()` directly (first
  invocation, no `mark_processed`), then runs `worker._process_batch()` (second
  invocation), asserts `processed_at` is set and the SpiceDB relationship count is
  unchanged.

