  Tests: `test_update_checks_edit_permission_on_kg`, `test_update_calls_aggregate_update_and_saves` (service); `test_update_knowledge_graph_returns_200`, `test_update_knowledge_graph_returns_403_when_unauthorized` (route) ✓

