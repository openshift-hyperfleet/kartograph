### Requirement: Concurrent Worker Safety — COVERED

**Scenario: Concurrent workers**
- Implementation: `OutboxWorker._process_batch()` builds a SELECT query with
  `.with_for_update(skip_locked=True)` which renders `FOR UPDATE SKIP LOCKED` in PostgreSQL.
- Unit test: `TestOutboxWorkerConcurrentSafety.test_fetch_unprocessed_uses_for_update_skip_locked`
  in `test_worker.py` — captures the executed query, compiles it with the PostgreSQL dialect,
  and asserts `"SKIP LOCKED"` appears in the rendered SQL.

