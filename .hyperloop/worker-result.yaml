### Summary

All 6 SHALL requirements and all 15 scenarios from `specs/iam/api-keys.spec.md` are covered
by at least one unit or integration test exercising the correct Given/When/Then conditions.

Two minor documentation gaps noted (not failures):
1. List-route test does not explicitly assert all metadata fields (`created_at`, `expires_at`, `last_used_at`) by value — the model guarantees serialization.
2. No route-level positive test for `GET /iam/api-keys?user_id=<valid>` — covered at service layer.

These gaps do not constitute spec failures because the underlying behaviors are correctly implemented and tested at the appropriate DDD layer.
