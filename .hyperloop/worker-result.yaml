### Requirement: Dual Delivery Mechanism — COVERED

**Scenario: Real-time notification** — COVERED
- **Code:** `PostgresNotifyEventSource` (event_sources/postgres_notify.py) listens on
  `outbox_events` channel via `asyncpg-listen::NotificationListener`, invokes
  `_process_single` callback with UUID from the notification payload.
- **Unit tests:** `test_postgres_notify_event_source.py` — notification receipt, UUID
  parsing, invalid payload handling, timeout handling, stop/start lifecycle.
- **Integration test:** `TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling`
  — sets `poll_interval_seconds=999` so only NOTIFY can process the entry;
  asserts `processed_at is not None` within 500ms.

**Scenario: Polling fallback** — COVERED
- **Code:** `OutboxWorker._poll_loop()` runs every `poll_interval_seconds` (default 30s)
  using `asyncio.wait_for(_shutdown_event.wait(), timeout=self._poll_interval)` for clean
  shutdown without skipping the current batch.
- **Unit test:** `TestOutboxWorkerLifecycle::test_in_progress_batch_completes_before_shutdown`
  — injects a slow `_process_batch` mock, starts the worker, calls `stop()` mid-batch,
  asserts the batch completed before shutdown.

