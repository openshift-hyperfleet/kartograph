### Spec Requirement Coverage

#### Requirement: Knowledge Graph Creation

- Scenario: Successful creation — COVERED
  - Service checks EDIT permission on workspace (`check_permission` with `Permission.EDIT`)
  - `KnowledgeGraph.create()` generates ULID, associates tenant + workspace
  - `test_create_saves_aggregate_via_repo`, `test_create_checks_edit_permission_on_workspace`
- Scenario: Duplicate name within tenant — COVERED
  - `IntegrityError` caught and re-raised as `DuplicateKnowledgeGraphNameError`
  - Route returns HTTP 409
  - `test_create_raises_duplicate_on_integrity_error`, `test_create_knowledge_graph_returns_409_for_duplicate_name`

#### Requirement: Knowledge Graph Name Validation

- Scenario: Valid name (1-100 chars) — COVERED via Pydantic `min_length=1, max_length=100`
- Scenario: Empty or oversized name → 422 — COVERED
  - `test_create_knowledge_graph_returns_422_for_empty_name`
  - `test_create_knowledge_graph_returns_422_for_oversized_name`
  - Same for update: `test_update_knowledge_graph_returns_422_for_empty_name`, `test_update_knowledge_graph_returns_422_for_oversized_name`

#### Requirement: Knowledge Graph Retrieval

- Scenario: Authorized retrieval → KG details returned — COVERED
  - Service checks VIEW on KG, returns aggregate
  - Route returns 200 with full details
  - `test_get_returns_aggregate_on_success`, `test_get_knowledge_graph_returns_200`
- Scenario: Unauthorized or non-existent → no result (no distinction) — COVERED
  - Service returns `None` for missing and for denied — both produce HTTP 404
  - `test_get_returns_none_when_not_found`, `test_get_returns_none_when_permission_denied`
  - `test_get_knowledge_graph_returns_404_when_not_found`, `test_get_knowledge_graph_returns_404_when_unauthorized`

#### Requirement: Knowledge Graph Listing

- Scenario: List for workspace (VIEW permission, filtered by authz) — COVERED
  - Service checks workspace VIEW, reads relationships to discover KG IDs, filters by tenant
  - `test_list_checks_view_permission_on_workspace`, `test_list_uses_read_relationships_to_discover_kgs`, `test_list_filters_by_tenant`
  - `test_list_knowledge_graphs_returns_200_with_list`

#### Requirement: Knowledge Graph Update

- Scenario: Update name and description (EDIT permission) — COVERED
  - Service checks EDIT on KG, calls `kg.update()`, saves
  - Route returns 200 with updated KG
  - `test_update_calls_aggregate_update_and_saves`, `test_update_knowledge_graph_returns_200`

#### Requirement: Knowledge Graph Deletion

- Scenario: Successful deletion with cascade — COVERED
  - Service checks MANAGE on KG
  - Cascade: DS credentials deleted (secret_store.delete for each DS with credentials_path), DS records deleted, KG deleted — all within single transaction
  - `test_delete_cascades_data_sources`, `test_delete_cascades_encrypted_credentials`
  - Route returns HTTP 204
  - `test_delete_knowledge_graph_returns_204`
- Scenario: Atomicity (rollback on failure) — COVERED
  - `test_delete_rolls_back_on_ds_deletion_failure` confirms KG not deleted when DS deletion fails mid-cascade

#### Requirement: Permission Inheritance

- Scenario: Workspace-inherited access — COVERED (integration tests)
  - `TestWorkspaceInheritedKnowledgeGraphAccess` in `test_knowledge_graph_authorization.py`
  - Editor: can VIEW and EDIT, cannot MANAGE
  - Admin: can MANAGE
  - Member: can VIEW, cannot EDIT
  - No-role: cannot VIEW, EDIT, or MANAGE
- Scenario: Direct grant — COVERED (integration tests)
  - `TestDirectGrantKnowledgeGraphAccess`
  - Direct admin: MANAGE + EDIT + VIEW
  - Direct editor: EDIT + VIEW (no MANAGE)
  - Direct viewer: VIEW only

