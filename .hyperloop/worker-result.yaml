## Notes

The `check-auth-status-codes.sh` script exits 1 because it finds pre-existing 403
assertions in IAM integration tests (group/workspace authorization, API key auth).
These were present on `origin/alpha` before this branch and represent legitimate
403s for write operations requiring explicit manage permission — not "no distinction"
read scenarios. No 403 assertions were introduced by task-008.

The `mypy` errors in `src/api/query/presentation/mcp.py` (2 errors) pre-exist on
`origin/alpha` and are not part of this task's scope.
