### Requirement: API Key Listing тАФ COVERED

**Scenario: List keys** тАФ COVERED
- `test_lists_api_keys_for_user` (route unit) тАФ 200 OK, keys returned with `id` and `name`
- `test_never_returns_secret_or_hash` (route unit) тАФ `secret`, `key_hash`, `hash` absent from response
- `APIKeyResponse` model defines all required fields (`name`, `prefix`, `created_at`, `expires_at`, `last_used_at`, `is_revoked`) as required (or Optional for `last_used_at`)
- Note: the route unit test does not explicitly assert `created_at`, `expires_at`, or `last_used_at` field values in the list response. The model guarantees their serialization; this is a minor documentation gap but not a behavioral failure.

**Scenario: Filter by creator** тАФ COVERED
- `test_filters_by_created_by_user_id` (service unit) тАФ `list_api_keys(created_by_user_id=filter_user_id)` тЖТ repository called with `created_by_user_id=filter_user_id`
- `test_returns_400_for_empty_user_id` (route unit) тАФ blank `user_id` query param тЖТ 400
- Note: no route-level positive test for `GET /iam/api-keys?user_id=<valid-id>` returning filtered results. Coverage is at the service layer only. This is a minor gap; the behavior is correctly tested at the service boundary.

