### REQ-2: Knowledge Graph Name Validation (SHALL)

#### Scenario A: Valid name (1-100 chars)
- COVERED
- Implementation: `knowledge_graph.py::_validate_name()` enforces `1 <= len(name) <= 100`. Pydantic request model uses `Field(min_length=1, max_length=100)`.
- Tests: `tests/unit/management/test_knowledge_graph.py::test_create_accepts_single_char_name`, `test_create_accepts_name_exactly_100_chars`

#### Scenario B: Empty or >100 chars rejected
- COVERED
- Implementation: `_validate_name()` raises `InvalidKnowledgeGraphNameError`. Pydantic returns 422.
- Tests: `tests/unit/management/test_knowledge_graph.py::test_create_rejects_empty_name`, `test_create_rejects_name_over_100_chars`; `tests/unit/management/presentation/test_knowledge_graph_routes.py::test_create_knowledge_graph_returns_422_for_empty_name`, `test_create_knowledge_graph_returns_422_for_oversized_name`, `test_update_knowledge_graph_returns_422_for_empty_name`, `test_update_knowledge_graph_returns_422_for_oversized_name`

