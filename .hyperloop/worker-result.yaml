# API Keys Implementation — Task-021 Worker Result

## Summary

All spec requirements from `specs/iam/api-keys.spec.md` are fully implemented and
verified by passing unit tests. The implementation follows DDD, TDD, and DOO
(Domain-Oriented Observability) patterns as required by AGENTS.md.

**Test results:** 2030 unit tests pass, 0 failures.

---

## Requirements Coverage

### API Key Creation

- `generate_api_key_secret()` in `iam/application/security.py` produces `karto_`-prefixed
  URL-safe secrets using `secrets.token_urlsafe(32)`.
- `hash_api_key_secret()` uses bcrypt with work factor 12 (secure, never stores plaintext).
- `extract_prefix()` returns the first 12 characters for fast lookup.
- `APIKey.create()` factory method emits `APIKeyCreated` domain event via outbox.
- Duplicate name per (tenant_id, created_by_user_id, name) raises `DuplicateAPIKeyNameError`
  → HTTP 409.
- `CreateAPIKeyRequest.expires_in_days` has `ge=1, le=3650, default=30` enforced by Pydantic.

### API Key Authentication

- `iam/dependencies/user.py` checks JWT first; falls back to `X-API-Key` header only if no
  bearer token is present (JWT takes precedence).
- `APIKeyService.validate_and_get_key()` looks up candidates by prefix, verifies each via
  bcrypt, calls `record_usage()`, and persists the updated `last_used_at`.
- `APIKey.is_valid()` returns False if `is_revoked` or `datetime.now(UTC) >= expires_at`.
- Prefix collision (>1 candidate) logs an ERROR-level event via `api_key_prefix_collision()`
  probe and iterates all candidates for bcrypt comparison.

### API Key Listing

- `GET /iam/tenants/{tenant_id}/api-keys` returns `list[APIKeyResponse]` — no `secret` or
  `key_hash` fields ever exposed.
- Optional `user_id` query parameter filters by `created_by_user_id`.
- `APIKeyResponse` includes: `id, name, prefix, created_by_user_id, created_at, expires_at,
  last_used_at, is_revoked`.

### API Key Revocation

- `DELETE /iam/tenants/{tenant_id}/api-keys/{id}` → 204 on success.
- `APIKey.revoke()` raises `APIKeyAlreadyRevokedError` if already revoked → HTTP 409.
- SpiceDB `api_key#revoke = owner + tenant->administrate` grants revocation to owners and
  tenant admins. Non-owners without admin get `UnauthorizedError` → HTTP 403.
- Revoked keys remain visible in listings with `is_revoked: true`.

### API Key Cascade Deletion

- `TenantService.delete_tenant()` lists all API keys for the tenant, calls
  `api_key.mark_for_deletion()` (emits `APIKeyDeleted` event for SpiceDB cleanup via outbox),
  then deletes via `api_key_repository.delete()`.
- DB FK `tenant_id → tenants.id ONDELETE=RESTRICT` enforces application-level cascade ordering.

### Name Validation

- `CreateAPIKeyRequest.name` has `min_length=1, max_length=255` (Pydantic).
- Empty string → HTTP 422.

