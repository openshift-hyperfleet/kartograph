- **Anti-spoofing:** `validate_operation()` requires `knowledge_graph_id` in
  `set_properties`; service stamps it before validation, callers cannot omit or
  spoof it. ✅
- **Schema learning exclusion:** `PLATFORM_STAMPED_PROPERTIES` excludes
  `knowledge_graph_id` from being added to type definition optional properties. ✅
