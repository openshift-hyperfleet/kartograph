#### REQ-4: Concurrent Worker Safety — COVERED

**Implementation:**
- `repository.py::fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`.
- `worker.py::_process_batch()` independently uses the same locking hint.

**Scenario verified (concurrent workers):**
- Unit: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  — compiles the SQLAlchemy query with the PostgreSQL dialect and asserts
  `SKIP LOCKED` appears in the rendered SQL. Row-level locking guarantees each
  entry is claimed by exactly one worker.

---

#### REQ-5: Dual Delivery Mechanism — COVERED

**Implementation:**
- **NOTIFY path:** Migration `d32ecc44581a` installs a PostgreSQL trigger
  `outbox_after_insert` that calls `pg_notify('outbox_events', NEW.id::text)`
  on every INSERT. `PostgresNotifyEventSource` (via `asyncpg-listen`) listens on
  that channel, parses the UUID payload, and calls the worker's `_process_single()`
  callback.
- **Polling fallback:** `OutboxWorker._poll_loop()` always runs alongside the
  event source, calling `_process_batch()` every `poll_interval_seconds`
  (default: 30 seconds).

**Scenarios verified:**

*Real-time notification:*
- Unit: `TestPostgresNotifyEventSourceNotify::test_notify_triggers_callback_with_uuid`
  — simulates a NOTIFY and verifies callback receives the correct UUID.
- Integration: `TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling`
  — worker started with `poll_interval_seconds=999`; after group creation the
  outbox entry is processed within 500 ms via NOTIFY, not polling.

*Polling fallback:*
- Integration: `TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb`
  calls `worker._process_batch()` directly (the exact function `_poll_loop` calls
  on each interval). The polling fallback is structurally identical to this call.

