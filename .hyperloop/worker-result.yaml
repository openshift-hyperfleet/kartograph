## Outbox Pattern Implementation — task-017 Fresh Verification

All spec requirements from `specs/shared-kernel/outbox.spec.md` are implemented
and tested. 2413 unit tests pass (`uv run pytest tests/unit -v`).

---

### REQ-1: Transactional Event Storage — COVERED

**Scenarios: Successful write; Transaction rollback.**

- `infrastructure/outbox/repository.py` — `OutboxRepository.append()` calls
  `session.add(OutboxModel(...))` without calling `session.commit()`. The calling
  service owns the transaction boundary via `async with session.begin()`. If the
  outer transaction rolls back, the outbox append is discarded with the aggregate.

**Tests:**
- `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit` —
  asserts `session.add` called once, `session.commit` never called.
- `test_failed_service_call_leaves_no_outbox_entries` — rollback path verified.

---

### REQ-2: Event Processing — COVERED

**Scenarios: Normal processing; Transient failure; Permanent failure (dead letter).**

- `infrastructure/outbox/worker.py` — `_process_entries()` dispatches each entry to
  `handler.handle()`. On success calls `_mark_processed()` (sets `processed_at`).
  On generic `Exception`: increments `retry_count`, records `last_error`; if
  `new_retry_count >= max_retries` calls `_move_to_dlq()` (sets `failed_at`).
  `fetch_unprocessed` filters `WHERE processed_at IS NULL AND failed_at IS NULL`,
  so DLQ entries are permanently excluded.

**Tests:**
- `TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries` — handler called,
  probes fire.
- `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count` —
  retry path verified.
- `TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq` — DLQ path.
- `TestOutboxWorkerIdempotency::test_failed_entries_excluded_from_fetch` — WHERE
  clause verified via compiled SQL.

---

### REQ-3: Idempotent Event Handlers — COVERED

**Scenario: Duplicate delivery.**

- SpiceDB `WriteRelationship` has upsert semantics — writing the same tuple twice
  is a no-op.
- `fetch_unprocessed` filters `processed_at IS NULL`, so successfully processed
  entries are never returned again.

**Tests:**
- `TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state`
  — handler called twice; result state identical, no duplicate or deletion.

---

### REQ-4: Concurrent Worker Safety — COVERED

**Scenario: Concurrent workers — each entry claimed by exactly one worker.**

- `OutboxWorker._process_batch()` queries with `.with_for_update(skip_locked=True)`.
  Rows locked by one session are skipped by concurrent sessions.

**Tests:**
- `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  — compiled query asserts `"SKIP LOCKED"` in rendered SQL.

---

### REQ-5: Dual Delivery Mechanism — COVERED

**Scenarios: Real-time notification; Polling fallback.**

- Real-time: DB migration `d32ecc44581a_create_outbox_notify_trigger.py` installs an
  AFTER INSERT trigger calling `pg_notify('outbox_events', NEW.id::text)`.
  `PostgresNotifyEventSource` (in `infrastructure/outbox/event_sources/postgres_notify.py`)
  uses `asyncpg-listen` to listen on `outbox_events` and invokes
  `worker._process_single(entry_id)`.
- Polling fallback: `OutboxWorker._poll_loop()` wakes every `poll_interval_seconds`
  (default 30 s) calling `_process_batch()`, catching any entries missed by NOTIFY.

**Tests:**
- `TestPostgresNotifyEventSource*` — lifecycle, invalid payload handling,
  graceful shutdown.
- `TestOutboxWorkerIdempotency::test_already_processed_entry_excluded_from_fetch` —
  poll loop skips already-processed entries.

---

### REQ-6: Event Fan-Out — COVERED

**Scenarios: Multiple handlers for same event type; Unknown event type → DLQ immediately.**

- `infrastructure/outbox/composite.py` — `CompositeEventHandler._handlers_by_type`
  is `dict[str, list[EventHandler]]`. `register()` appends to each type's list;
  `handle()` iterates all handlers. Empty list raises `UnknownEventTypeError`.
- `infrastructure/outbox/worker.py` — `_process_entries()` catches
  `UnknownEventTypeError` before generic `Exception` branch; calls `_move_to_dlq()`
  immediately without touching `retry_count`.

**Tests:**
- `TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers` — two
  handlers both invoked for same event type.
- `test_handle_raises_for_unknown_event_type` — `UnknownEventTypeError` raised.
- `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`
  — DLQ on first attempt, no retry.
- `test_unknown_event_type_dlq_even_at_zero_retries` — retry count irrelevant.
- `test_retry_not_called_for_unknown_event_type` — `_increment_retry` never invoked.

