  ### CodeRabbit PR Comment Analysis

  **Finding 1 and 2 — check-frontend-*.sh BASE_BRANCH fallback (FIXED)**
  Updated both scripts to fail loudly (exit non-zero with error message) when
  neither origin/alpha nor origin/main exists, and restricted the git diff
  pathspec to the UI directory so task_ui_changes only reflects changes under
  the UI directory.

  **Finding 3 — worker-result.yaml YAML formatting (FIXED)**
  Restructured worker-result.yaml to use a proper YAML block scalar under the
  detail key, eliminating raw Markdown tokens at the top level.

  **Finding 4 — dlq_at vs failed_at mismatch (FALSE POSITIVE)**
  CodeRabbit claimed the repository filters on failed_at while the worker sets
  dlq_at. This is incorrect. The codebase consistently uses failed_at as the
  DLQ marker throughout — verified by direct code inspection:

  - infrastructure/outbox/models.py defines failed_at: Mapped[datetime | None]
  - infrastructure/outbox/worker.py sets failed_at=datetime.now(UTC) in _move_to_dlq()
  - infrastructure/outbox/worker.py filters .where(OutboxModel.failed_at.is_(None))
  - infrastructure/outbox/repository.py filters .where(OutboxModel.failed_at.is_(None))
  - tests/unit/infrastructure/outbox/test_worker.py asserts "failed_at IS NULL" in compiled query

  No file in the codebase uses dlq_at. CodeRabbit hallucinated a field name
  that does not exist. No code change is warranted.
