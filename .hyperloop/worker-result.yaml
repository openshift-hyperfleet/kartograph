### 4. Group Listing (SHALL) — COVERED

**Tenant member lists groups scenario**
- Code: SpiceDB schema defines `permission view = admin + member_relation + tenant->view`, so all tenant members have VIEW on all groups. `GroupService.list_groups()` uses `lookup_resources` to filter by VIEW.
- Tests: `test_returns_view_filtered_groups` (service), `test_group_listing_only_shows_accessible_groups` (integration: Bob as tenant member sees Alice's group).

