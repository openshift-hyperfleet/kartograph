  - `TestKnowledgeGraphServiceGet::test_get_returns_none_when_permission_denied`
  - `TestGetKnowledgeGraph::test_get_knowledge_graph_returns_404_when_not_found`
  - `TestGetKnowledgeGraph::test_get_knowledge_graph_returns_404_when_unauthorized`

