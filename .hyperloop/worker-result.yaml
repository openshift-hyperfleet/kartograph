### Requirement 2: Event Processing — COVERED

**Implementation:** `OutboxWorker._process_entries()` / `_process_batch()` / `_handle_processing_failure()` / `_move_to_dlq()` / `_increment_retry()` (worker.py).

**Scenario: Normal processing**
- Unit tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`,
  `test_calls_event_processed_on_success` (test_worker.py).
- Integration test: `test_worker_processes_group_created_and_writes_to_spicedb`
  (test_outbox_consistency.py:222) — entry marked processed, SpiceDB relationship written.

**Scenario: Transient failure**
- Unit test: `test_transient_failure_increments_retry_count` (test_worker.py:393) —
  verifies `event_processing_failed` probe called; `event_moved_to_dlq` NOT called;
  session.execute called for `_increment_retry`.
- Code path: `_handle_processing_failure()` → `_increment_retry()` updates
  `retry_count` + `last_error` columns via UPDATE statement.

**Scenario: Permanent failure (dead letter)**
- Unit test: `test_max_retries_moves_entry_to_dlq` (test_worker.py:425) —
  verifies `event_moved_to_dlq` probe called; `event_processing_failed` NOT called.
- Code path: `_move_to_dlq()` sets `failed_at` timestamp (migration
  `a1b2c3d4e5f6_add_outbox_retry_columns.py` adds `failed_at`, `retry_count`,
  `last_error` columns).

