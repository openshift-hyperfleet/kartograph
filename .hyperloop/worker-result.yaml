### REQ-5: Cascade Deletion — COVERED

**Scenario 5.1 — Tenant deletion cascades to API keys; auth relationships cleaned up**
- `iam/application/services/tenant_service.py::delete_tenant()`: lists all keys by tenant_id,
  calls `api_key.mark_for_deletion()` + `api_key_repository.delete(api_key)` for each.
- `iam/domain/aggregates/api_key.py::mark_for_deletion()`: emits `APIKeyDeleted` event →
  SpiceDB relationship cleanup via outbox.
- Tests: `test_tenant_service.py::TestDeleteTenant` — 5 distinct tests covering single/multiple
  key deletion, event emission, tenant-scoped query, probe reporting.

