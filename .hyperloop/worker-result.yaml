#### REQ 9: Deterministic Entity IDs (SHALL)

**Implementation:** `ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` enforced as Pydantic field
pattern on `MutationOperation.id`. `GraphExtractionReadOnlyRepository.generate_id()` uses
SHA-256 for deterministic IDs.

**Scenario: ID format**
- Tests: `test_id_pattern_validation()` — invalid format raises `ValidationError`;
  `test_id_accepts_valid_pattern()` — valid format accepted.
  Integration `test_generates_deterministic_ids()` — same inputs produce same ID;
  `test_different_data_sources_produce_different_ids()` verifies hash uniqueness.
- **Status: COVERED**

---

#### REQ 10: Referential Integrity Ordering (SHALL)

**Implementation:** `MutationApplier._sort_operations()` uses `sort_key` tuple:
DEFINE(0)→DELETE_edge(1,0)→DELETE_node(1,1)→CREATE_node(2,0)→CREATE_edge(2,1)→UPDATE(3).
`AgeBulkLoadingStrategy.apply_batch()` also processes in this order (deletes, then creates,
then updates).

**Scenario: Operation ordering**
- Tests: `test_mutation_applier_sort.py::test_sort_order_define_delete_create_update` —
  6-operation mixed batch verified position-by-position;
  `test_sort_preserves_all_operations` — no ops dropped or duplicated;
  `test_sort_homogeneous_list_unchanged_length` — same-type batch unchanged
- **Status: COVERED**

