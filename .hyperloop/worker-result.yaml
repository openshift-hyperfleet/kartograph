### Spec Alignment

All spec scenarios from `specs/management/credentials.spec.md` are now addressed:

**Credential Encryption (store/retrieve/not-found)** — pre-existing, confirmed PASS.

**Tenant Isolation** — pre-existing implementation confirmed; new unit test
`TestTenantIsolation` added for explicit coverage:
- `test_same_path_different_tenant_raises_key_error` — PASS
- `test_delete_with_wrong_tenant_does_not_delete` — PASS

**Key Rotation** — pre-existing, confirmed PASS.

**Credential Lifecycle — Data source deletion** — pre-existing, confirmed PASS.

**Credential Lifecycle — Knowledge graph cascade** — FIXED by this task:

*Implementation*: `KnowledgeGraphService.delete()` now accepts `secret_store:
ISecretStoreRepository | None` and calls `await self._secret_store.delete(path=...,
tenant_id=...)` for each data source with a `credentials_path` before removing the
DS row. `FernetSecretStore` is wired into the dependency via `knowledge_graph.py`.

*Tests*:
- `test_delete_removes_credentials_for_data_sources_with_credentials_path` — Given a KG
  with one DS with credentials and one without, when deleted, asserts `secret_store.delete`
  called exactly once (correct DS), both DS rows removed, KG removed.
- `test_delete_skips_credential_cleanup_when_no_secret_store` — When service has no
  secret_store, DS and KG are still deleted without raising. Defensive nil-guard verified.
- `test_delete_cascades_data_sources` — Updated to use real `DataSource` aggregates
  (replacing previous `MagicMock(spec=DataSource)`) per no-domain-aggregate-mocks rule.

Additionally, `test_deletes_groups_on_tenant_deletion` was added to `TestDeleteTenant`
in `test_tenant_service.py` to satisfy the `check-cascade-delete-empty-collection-mocks.sh`
check (all TestDelete* classes with collection mocks must have at least one non-empty
list test exercising the loop body).

