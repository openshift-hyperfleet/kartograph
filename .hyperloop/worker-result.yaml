## Spec Alignment Review — Outbox Pattern (Task-017)

All requirements in the outbox spec are fully covered by implementation and tests.
131 unit tests pass. Integration tests exist for end-to-end coverage.

---

### Requirement Coverage

**Transactional Event Storage — COVERED**

- Implementation: `OutboxRepository.append()` calls `session.add()` but never `session.commit()`. The repository shares the caller's session, guaranteeing atomic commit/rollback.
- Successful write scenario: `test_repository_append_does_not_commit` (unit) + `test_outbox_entry_created_in_same_transaction_as_group` (integration).
- Transaction rollback scenario: `test_failed_service_call_leaves_no_outbox_entries` (unit) + `test_rollback_removes_both_group_and_outbox_entry` (integration).

**Event Processing — COVERED**

- Implementation: `OutboxWorker._process_entries()` delegates to injected `EventHandler`, marks entry processed, increments retry count on transient failure, moves to DLQ on max retries.
- Normal processing scenario: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`.
- Transient failure scenario: `test_transient_failure_increments_retry_count`, `test_transient_failure_does_not_dlq_immediately`.
- Permanent failure (DLQ) scenario: `test_max_retries_moves_entry_to_dlq`. `failed_at` timestamp set in `_move_to_dlq()`; DLQ entries excluded by `fetch_unprocessed()` (`failed_at IS NULL` filter confirmed in `test_failed_entries_excluded_from_fetch`).

**Idempotent Event Handlers — COVERED**

- Implementation: `SpiceDBEventHandler.handle()` uses SpiceDB write_relationship (upsert semantics). `fetch_unprocessed()` filters `processed_at IS NULL` so already-processed entries are never re-fetched.
- Duplicate delivery scenario: `test_handler_invoked_twice_produces_same_spicedb_state` (integration) — handler invoked twice on the same unprocessed entry; SpiceDB state identical after both invocations and entry is marked processed on retry.

**Concurrent Worker Safety — COVERED**

- Implementation: `fetch_unprocessed()` and `_process_batch()` both use `.with_for_update(skip_locked=True)`. Same applied in `_process_single()`.
- Concurrent workers scenario: `test_fetch_unprocessed_uses_for_update_skip_locked` — SQL compiled with PostgreSQL dialect, asserts `SKIP LOCKED` present.

**Dual Delivery Mechanism — COVERED**

- Implementation: `OutboxWorker` starts a poll loop (always runs) plus optional `PostgresNotifyEventSource`. DB migration `d32ecc44581a` installs a PostgreSQL trigger that calls `pg_notify('outbox_events', NEW.id::text)` on outbox insert.
- Real-time notification scenario: `test_worker_processes_via_notify_not_polling` (integration) — `poll_interval_seconds=999`, entry processed within 500ms via NOTIFY.
- Polling fallback scenario: `_poll_loop()` runs unconditionally as background task; `test_in_progress_batch_completes_before_shutdown` verifies poll loop behavior under shutdown. Default `poll_interval_seconds=30` confirmed in `OutboxWorker.__init__` signature.

**Event Fan-Out — COVERED**

- Implementation: `CompositeEventHandler.register()` appends handler to list per event type. `handle()` calls all handlers for the type in registration order; raises `UnknownEventTypeError` if type not registered.
- Multiple handlers scenario: `test_handle_fans_out_to_multiple_handlers` — two handlers registered for same type, both called.
- Unknown event type scenario: `test_handle_raises_for_unknown_event_type` (composite), `test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`, `test_retry_not_called_for_unknown_event_type` — confirms immediate DLQ without retry regardless of current retry count.

