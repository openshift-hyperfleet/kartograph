### REQ-4: API Key Revocation (SHALL)

#### Scenario: Owner revokes own key — COVERED
- Code: `api_key.py::revoke()` sets `is_revoked=True`; `api_key_service.py::revoke_api_key()` checks SpiceDB REVOKE permission
- Tests:
  - `test_api_key_service.py::test_revokes_existing_key`
  - `test_api_key_routes.py::test_revokes_api_key_returns_204`
  - `tests/integration/test_api_key_auth.py::test_owner_can_revoke_own_key`

#### Scenario: Tenant admin revokes any key — COVERED
- Code: SpiceDB schema grants tenant admins REVOKE permission on all keys in the tenant
- Test: `tests/integration/test_api_key_auth.py::test_tenant_admin_can_revoke_other_users_key`

#### Scenario: Already revoked — COVERED
- Code: `api_key.py::revoke()` raises `APIKeyAlreadyRevokedError` if already revoked; route returns 409
- Tests:
  - `test_api_key_aggregate.py::test_revoke_already_revoked_raises_error`
  - `test_api_key_service.py::test_raises_when_already_revoked`
  - `test_api_key_routes.py::test_returns_409_when_already_revoked`

#### Scenario: Unauthorized revocation — COVERED
- Code: `api_key_service.py` raises `UnauthorizedError` when SpiceDB denies; route returns 403
- Tests:
  - `test_api_key_service.py::test_revoke_raises_unauthorized_when_denied`
  - `test_api_key_routes.py::test_revoke_api_key_returns_403_when_unauthorized`
  - `tests/integration/test_api_key_auth.py::test_non_admin_cannot_revoke_other_users_key`

