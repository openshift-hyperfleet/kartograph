Spec alignment review for `specs/iam/users.spec.md` on branch `hyperloop/task-018`.

## Requirement Coverage

### Requirement: Just-In-Time Provisioning (SHALL) — COVERED

All four scenarios are implemented and tested.

**Scenario: First login**
- Implementation: `src/api/iam/application/services/user_service.py` — `ensure_user()` creates `User(id=user_id, username=username)` and calls `await self._user_repository.save(user)` when `get_by_id()` returns None.
- Unit test: `tests/unit/iam/application/test_user_service.py::TestEnsureUser::test_creates_new_user_when_not_found` — asserts `result.id == user_id`, `result.username == "bob"`, `save.assert_called_once()`, and probe called with `was_created=True, was_updated=False`.
- Dependency test: `tests/unit/iam/test_authenticated_user_dependency.py::test_jit_provisions_user_for_jwt_auth` — asserts `mock_user_repo.save.assert_awaited_once()` and probe params with `was_created=True`.

**Scenario: Subsequent login (no changes)**
- Implementation: `user_service.py` returns existing user without calling `save()` when username is unchanged.
- Unit test: `test_user_service.py::test_returns_existing_user` — asserts `result == existing_user`, `save.assert_not_called()`, probe with `was_created=False, was_updated=False`.
- Dependency test: `test_authenticated_user_dependency.py::test_jit_skips_creation_for_existing_user` — asserts `save.assert_not_awaited()`.

**Scenario: Subsequent login (username changed)**
- Implementation: `user_service.py` detects `existing.username != username`, creates new `User` with updated username, calls `save()`.
- Unit test: `test_user_service.py::test_syncs_username_when_changed` — asserts `result.username == "alice_new"`, `save.assert_called_once()`, probe with `was_updated=True`.
- Integration test: `tests/integration/iam/test_user_repository.py::test_updates_existing_user` — persists update to PostgreSQL and retrieves `"alice_smith"`.
- Dependency test: `test_authenticated_user_dependency.py::test_jit_syncs_username_when_changed_in_sso` — asserts `save.assert_awaited_once()`, probe with `was_updated=True`.

**Scenario: Username fallback**
- Implementation: `src/api/iam/dependencies/user.py` line 104 — `username = claims.preferred_username or claims.sub`.
- Dependency test: `test_authenticated_user_dependency.py::test_uses_sub_as_username_fallback_when_preferred_username_absent` — constructs `_AuthResult` with `username == sub`, asserts `result.username == "some-uuid-format-sub-123"` and `was_created=True`.

