**Scenario: Authorized retrieval — COVERED**
- Tests: `test_get_returns_aggregate_on_success`, `test_get_knowledge_graph_returns_200`.

**Scenario: Unauthorized or non-existent — COVERED**
- Tests: `test_get_returns_none_when_not_found`, `test_get_returns_none_when_permission_denied`,
  `test_get_returns_none_for_different_tenant`, `test_get_knowledge_graph_returns_404_when_not_found`,
  `test_get_knowledge_graph_returns_404_when_unauthorized`.

