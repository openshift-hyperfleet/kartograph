## Backend Implementation (unchanged, previously verified)

- **Domain:** `KnowledgeGraph` aggregate with ULID ID, name validation (1–100 chars),
  `create()`, `update()`, `mark_for_deletion()`, event emission, mutation guard.
- **Events:** `KnowledgeGraphCreated`, `KnowledgeGraphUpdated`, `KnowledgeGraphDeleted`.
- **Application Service:** `KnowledgeGraphService` with authorization checks (edit/view/manage),
  CRUD operations, cascade delete (data sources → credentials → KG).
- **SpiceDB schema:** `knowledge_graph` definition with workspace/tenant/admin/editor/viewer
  relations; `edit` and `manage` inherit from workspace; `view` from workspace.
- **Outbox translator:** Maps KG events to SpiceDB write/delete operations.
- **Presentation:** FastAPI routes for create, get, list (workspace-scoped and tenant-wide),
  update, delete with correct status codes and error handling.
- **Observability:** Domain probes on aggregate and service layers (DOO pattern).
