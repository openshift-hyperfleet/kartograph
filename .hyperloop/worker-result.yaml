**Requirement: Deterministic Entity IDs**
- ✅ `ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` enforced by Pydantic pattern validation
- ✅ Covered by ID pattern tests in domain value object tests

