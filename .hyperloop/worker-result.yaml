### Spec Requirements Verification

All requirements from `specs/management/knowledge-graphs.spec.md` verified:

**Knowledge Graph Creation**
- `KnowledgeGraph.create()` generates a ULID identifier
- Associates with workspace and tenant; authorization relationships established via outbox
- `edit` permission on workspace checked before creating
- Duplicate name within tenant → HTTP 409

**Knowledge Graph Name Validation**
- `_validate_name()` enforces 1–100 character constraint → HTTP 422 on violation

**Knowledge Graph Retrieval**
- `get()` checks `view` permission; unauthorized/non-existent both return None → HTTP 404

**Knowledge Graph Listing**
- `list_for_workspace()` filters by `view` permission; `list_all()` tenant-scoped with auth filter

**Knowledge Graph Update**
- `update()` checks `edit` permission; emits `KnowledgeGraphUpdated`

**Knowledge Graph Deletion**
- `delete()` checks `manage` permission
- Single-transaction cascade: credential secrets → data sources → knowledge graph → SpiceDB cleanup
- Rollback on failure tested (`test_delete_rolls_back_on_ds_deletion_failure`)
- Mutation-after-deletion guard via `mark_for_deletion()` / `AggregateDeletedError`

**Permission Inheritance**
- SpiceDB schema: `edit = admin + editor + workspace->edit`; `manage = admin + workspace->manage`
- Direct `admin` grant provides `manage`, `edit`, and `view`
