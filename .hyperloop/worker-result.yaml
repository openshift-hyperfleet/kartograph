### Requirement: Event Fan-Out

#### Scenario: Multiple handlers registered
- Status: COVERED
- Code: `src/api/infrastructure/outbox/composite.py:51-55` — `register()` appends each handler to the list for its event types; `handle()` at line 89-91 iterates all handlers for the event type.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_composite.py::TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers` — registers two handlers for `SharedEvent`, calls `handle()`, and asserts both `handle` methods were called once with the same payload.

#### Scenario: Unknown event type
- Status: COVERED
- Code: `src/api/infrastructure/outbox/composite.py:83-88` — raises `UnknownEventTypeError` (not `ValueError`) when no handler is registered. `src/api/infrastructure/outbox/worker.py:227-231` — `except UnknownEventTypeError` clause fires before the generic `except Exception`, calling `_move_to_dlq()` directly (bypassing retry increment logic).
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_composite.py::TestCompositeEventHandler::test_handle_raises_for_unknown_event_type` — asserts `UnknownEventTypeError` is raised with correct `event_type` and `registered_types` attributes.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq` — asserts DLQ probe called, retry probe NOT called.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerRetryBehavior::test_unknown_event_type_dlq_even_at_zero_retries` — verifies immediate DLQ even when retry_count=0.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerRetryBehavior::test_retry_not_called_for_unknown_event_type` — patches `_increment_retry` and asserts it is never called.

