### Summary

Full implementation of the API Keys feature (specs/iam/api-keys.spec.md) is present and
verified. All 2031 unit tests pass.

### Implementation

All six requirements from the spec are implemented:

**REQ-1: API Key Creation**
- `iam/application/security.py`: `generate_api_key_secret()` produces `karto_`-prefixed secret
- `iam/application/security.py`: `extract_prefix()` extracts 12-character prefix; `hash_api_key_secret()` uses bcrypt
- `iam/domain/aggregates/api_key.py`: `APIKey.create()` factory records `APIKeyCreated` event
- `iam/application/services/api_key_service.py`: `create_api_key()` checks `CREATE_API_KEY`
  permission, calls secret generation, persists, returns plaintext once
- `iam/infrastructure/api_key_repository.py`: `save()` enforces unique (tenant, user, name) via
  `DuplicateAPIKeyNameError`
- `iam/presentation/api_keys/models.py`: `CreateAPIKeyRequest` enforces `ge=1, le=3650` on
  `expires_in_days`; default 30; `min_length=1, max_length=255` on `name`

**REQ-2: API Key Authentication**
- `iam/dependencies/user.py`: `_authenticate()` tries JWT first, then X-API-Key (JWT takes precedence)
- `iam/application/services/api_key_service.py`: `validate_and_get_key()` delegates to repo,
  checks `is_valid()`, updates `last_used_at`
- `iam/infrastructure/api_key_repository.py`: `get_verified_key()` extracts prefix, queries
  candidates, bcrypt-verifies each; calls `api_key_prefix_collision` probe when >1 candidate found
- `iam/domain/aggregates/api_key.py`: `is_valid()` returns False for revoked or expired keys

**REQ-3: API Key Listing**
- `iam/application/services/api_key_service.py`: `list_api_keys()` calls SpiceDB
  `lookup_resources` for VIEW permission then filters by tenant/creator
- `iam/presentation/api_keys/routes.py`: GET `/iam/api-keys` with optional `?user_id=` filter
- `iam/presentation/api_keys/models.py`: `APIKeyResponse` exposes name, prefix, created_at,
  expires_at, last_used_at, is_revoked; no secret or key_hash

**REQ-4: API Key Revocation**
- `iam/domain/aggregates/api_key.py`: `revoke()` sets `is_revoked=True`, raises
  `APIKeyAlreadyRevokedError` if already revoked, records `APIKeyRevoked` event
- `iam/application/services/api_key_service.py`: `revoke_api_key()` checks REVOKE permission via
  SpiceDB (owner + tenant admin both have it per schema.zed)
- `iam/presentation/api_keys/routes.py`: DELETE `/iam/api-keys/{id}` maps errors to 404/409/403

**REQ-5: API Key Cascade Deletion**
- `iam/application/services/tenant_service.py`: deletes all tenant API keys before tenant,
  calls `mark_for_deletion()` on each to emit `APIKeyDeleted` event for SpiceDB cleanup
- `iam/domain/aggregates/api_key.py`: `mark_for_deletion()` records `APIKeyDeleted` event
- `iam/infrastructure/outbox/translator.py`: `_translate_api_key_deleted()` removes owner and
  tenant relationships from SpiceDB

**REQ-6: API Key Name Validation**
- Pydantic `Field(..., min_length=1, max_length=255)` on `CreateAPIKeyRequest.name`

