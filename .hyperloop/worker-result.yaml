## Requirement Coverage

All requirements COVERED as documented in the spec-alignment review committed at
`bbe4f8504` (chore(review): spec-alignment review task-017 — PASS).

### Transactional Event Storage — COVERED
- `OutboxRepository.append()` calls `session.add()` only; never commits independently.
- Integration test confirms group + outbox entry commit/rollback atomically.

### Event Processing — COVERED
- `OutboxWorker._process_entries()` dispatches to handler, marks processed.
- Retry/DLQ logic via `_handle_processing_failure()`, `_increment_retry()`, `_move_to_dlq()`.

### Idempotent Event Handlers — COVERED
- `fetch_unprocessed()` filters `processed_at IS NULL AND failed_at IS NULL`.
- SpiceDB handler uses `OPERATION_TOUCH` (upsert) — duplicate delivery is safe.

### Concurrent Worker Safety — COVERED
- `fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`.
- Unit test compiles query against PostgreSQL dialect and asserts `SKIP LOCKED`.

### Dual Delivery Mechanism — COVERED
- `PostgresNotifyEventSource` via `asyncpg-listen` for sub-second processing.
- `_poll_loop()` with configurable interval (default 30s) as fallback.

### Event Fan-Out — COVERED
- `CompositeEventHandler.handle()` dispatches to all registered handlers.
- `UnknownEventTypeError` immediately moves entry to DLQ without retry.
