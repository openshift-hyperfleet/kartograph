#### REQ-3 — Idempotent Event Handlers

**Implementation:**
`infrastructure/outbox/spicedb_handler.py` — `SpiceDBEventHandler.handle()` delegates to the
translator then applies each operation via `AuthorizationProvider`. SpiceDB's `write_relationship`
is an upsert: writing the same tuple twice leaves it once (set semantics).

**Scenario: Duplicate delivery** — COVERED
- Unit: `TestSpiceDBEventHandlerIdempotency.test_duplicate_invocation_produces_identical_final_state`
  — uses a `FakeAuthorizationProvider` backed by a Python `set`; calls `handle()` twice with
  identical payload; asserts `state_after_second == state_after_first` and the expected relationship
  is present exactly once.
- Integration: `TestIdempotentEventHandlers.test_handler_invoked_twice_produces_same_spicedb_state`
  — creates a group, calls `spicedb_event_handler.handle()` manually (first invocation, no
  mark_processed), then runs `_process_batch()` (second invocation); asserts `processed_at is not
  None` and the SpiceDB relationship still exists (not duplicated or deleted).

