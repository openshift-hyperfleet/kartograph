### Spec Requirement Coverage

**REQ: Transactional Event Storage**
- `OutboxRepository.append()` calls `session.add()`, never `session.commit()` ‚Äî caller owns the transaction boundary.
- `test_repository_append_does_not_commit` + `test_failed_service_call_leaves_no_outbox_entries` verify atomicity.

**REQ: Event Processing**
- Normal path: `_mark_processed()` sets `processed_at` timestamp.
- Transient failure: `_increment_retry()` increments `retry_count`, records `last_error`.
- Permanent failure (DLQ): `_move_to_dlq()` sets `failed_at` after `max_retries` exceeded.
- Tests: `test_transient_failure_increments_retry_count`, `test_max_retries_moves_entry_to_dlq`.

**REQ: Idempotent Event Handlers**
- Processed entries excluded via `OutboxModel.processed_at.is_(None)` filter in `fetch_unprocessed()`.
- `test_already_processed_entry_excluded_from_fetch` and `test_failed_entries_excluded_from_fetch` verify.
- SpiceDB handler idempotency: duplicate invocation produces same final state (no duplicate relationships).

**REQ: Concurrent Worker Safety**
- `SELECT ... FOR UPDATE SKIP LOCKED` used in `fetch_unprocessed()`.
- `test_fetch_unprocessed_uses_for_update_skip_locked` compiles query with PostgreSQL dialect and asserts `SKIP LOCKED` present.

**REQ: Dual Delivery Mechanism**
- `OutboxWorker` accepts optional `OutboxEventSource` for real-time NOTIFY.
- `PostgresNotifyEventSource` listens on `outbox_events` channel, triggers `_process_single()`.
- Polling fallback runs every `poll_interval_seconds` (default 30s).
- `_shutdown_event` provides immediate wakeup for graceful stop without cancelling in-progress batch.

**REQ: Event Fan-Out**
- `CompositeEventHandler.register()` allows multiple handlers per event type (idempotent registration).
- `handle()` dispatches to all registered handlers for a type.
- Unknown types now raise `UnknownEventTypeError` (the core change in this task).
- Worker catches `UnknownEventTypeError` before the generic `Exception` handler ‚Üí immediately DLQ, never retried.
- Tests: `test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`, `test_retry_not_called_for_unknown_event_type`.

