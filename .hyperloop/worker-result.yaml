### Requirement: Knowledge Graph Name Validation — COVERED

**Scenario: Valid name (1–100 chars)**
- Code: `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`. Pydantic model also validates at HTTP boundary.
- Tests:
  - `test_knowledge_graph.py::TestKnowledgeGraphCreate::test_create_accepts_name_exactly_100_chars`
