### Code Review Findings

**Per-Tenant Graph Isolation:** `get_tenant_graph_name()` in `graph/dependencies.py`
returns `f"tenant_{current_user.tenant_id.value}"`. `get_age_graph_client()` passes this
to `AgeGraphClient` via new `graph_name` override parameter (added to `age_client.py`).
Isolation is architecturally enforced per request.

**KnowledgeGraph Scoping — Authorization:** New `POST /graph/knowledge-graphs/{id}/mutations`
endpoint in `routes.py` calls `authz.check_permission(resource, Permission.EDIT, subject)`
before delegating to the service. Returns HTTP 403 on denial. Legacy `/graph/mutations`
route correctly removed.

**KnowledgeGraph Scoping — ID Stamping:** `GraphMutationService._stamp_knowledge_graph_id()`
overwrites any caller-supplied `knowledge_graph_id` on all CREATE/UPDATE `set_properties`
before validation runs. `PLATFORM_STAMPED_PROPERTIES` frozenset excludes `knowledge_graph_id`
from schema learning so it never leaks into optional properties.

**Mutation Log Format:** JSONL parsing unchanged and correct. Empty line skipping, parse
error line number reporting, and valid parsing all verified by existing tests.

**DEFINE Operation:** System properties correctly split by entity type: nodes get
`{data_source_id, source_path, slug}`, edges get `{data_source_id, source_path}` only.
New explicit test `test_apply_define_edge_type_adds_edge_system_properties` closes a
previously-noted coverage gap.

**CREATE Operation — Idempotent Merge:** Fixed `queries.py` to use jsonb `||` merge
operator (`(t.properties::text)::jsonb || (s.properties::text)::jsonb`) so existing
properties are preserved when re-applying a CREATE. Integration tests verify this.

**MagicMock usage in `test_mutation_applier_sort.py`:** MagicMock is used to satisfy
`MutationApplier.__init__` constructor parameters (`client`, `bulk_loading_strategy`)
in sort-only tests where those collaborators are never called. This is acceptable —
the test exercises a pure sorting function, not application/domain logic.

**Referential Integrity Ordering:** `MutationApplier._sort_operations()` correctly
implements DEFINE=0 → DELETE (edge=0, node=1) → CREATE (node=0, edge=1) → UPDATE=3.
Verified by comprehensive sort test with exact position assertions.

