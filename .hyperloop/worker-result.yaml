## Requirement Coverage

### Requirement: Transactional Event Storage — COVERED

**Scenario: Successful write** — COVERED
- **Code:** `src/api/infrastructure/outbox/repository.py::OutboxRepository.append()`
  calls `session.add()` only; never calls `session.commit()`. Class docstring explicitly
  documents that the caller owns the transaction boundary.
- **Unit test:** `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`
  — asserts `mock_session.commit.assert_not_called()` and `session.add.assert_called_once()`.
- **Integration test:** `TestAtomicityGuarantees::test_outbox_entry_created_in_same_transaction_as_group`
  — commits within `async_session.begin()` then asserts both GroupModel and OutboxModel
  are queryable afterward.

**Scenario: Transaction rollback** — COVERED
- **Code:** Same shared-session design — no independent commit means a caller-level rollback
  discards both the aggregate change and the outbox entry atomically.
- **Unit test:** `TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries`
  — verifies `session.commit` is never called, proving rollback discards the pending add.
- **Integration test:** `TestAtomicityGuarantees::test_rollback_removes_both_group_and_outbox_entry`
  — forces an exception inside `async_session.begin()` and asserts neither GroupModel
  nor OutboxModel persists.

