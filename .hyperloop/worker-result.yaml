## Task-017: Outbox Pattern ‚Äî Fresh Worker Verification

### Implementation Status

The outbox pattern implementation is complete. All 2413 unit tests pass.

### Spec Coverage ‚Äî Numbered Checks

**1. Transactional Event Storage (REQ-1)**
- Aggregate `_pending_events` collected by repository and appended to `OutboxModel` within the same `AsyncSession` ‚Äî no intermediate commit.
- `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit` ‚Äî verifies the append does NOT commit on its own.
- `TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries` ‚Äî verifies rollback leaves no entries.

**2. Event Processing (REQ-2)**
- `OutboxWorker._process_batch()` fetches unprocessed entries and delegates to `EventHandler.handle()`.
- Success path: `_mark_processed()` sets `processed_at` timestamp.
- Transient failure: `_increment_retry()` increments `retry_count` and records `last_error`.
- Permanent failure (DLQ): `_move_to_dlq()` sets `failed_at` after `max_retries` exceeded.
- Tests: `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count`, `test_max_retries_moves_entry_to_dlq`.

**3. Idempotent Event Handlers (REQ-3)**
- Processed entries excluded via `OutboxModel.processed_at.is_(None)` filter.
- `TestOutboxWorkerIdempotency::test_already_processed_entry_excluded_from_fetch` ‚Äî verifies processed entries are skipped.
- SpiceDB handler idempotency: `TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state`.

**4. Concurrent Worker Safety (REQ-4)**
- `SELECT ... FOR UPDATE SKIP LOCKED` prevents double-processing.
- `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked` ‚Äî verifies the locking clause is used.

**5. Dual Delivery Mechanism (REQ-5)**
- `OutboxWorker` accepts optional `OutboxEventSource` for real-time NOTIFY.
- `PostgresNotifyEventSource` listens on `outbox_events` channel and triggers `_process_single()`.
- Polling fallback runs every `poll_interval_seconds` (default 30s).
- `_shutdown_event` enables immediate stop without cancelling in-progress batches.
- Tests: `TestOutboxWorkerLifecycle`, `TestPostgresNotifyEventSource` suite.

**6. Event Fan-Out (REQ-6)**
- `CompositeEventHandler.register()` allows multiple handlers per event type.
- `handle()` dispatches to all registered handlers for a type.
- Unknown types raise `UnknownEventTypeError` ‚Üí immediately sent to DLQ, not retried.
- Tests: `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`.

