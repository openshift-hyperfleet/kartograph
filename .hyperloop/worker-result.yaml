## Spec Requirement Coverage

### Req: Per-Tenant Graph Isolation — COVERED
- `get_tenant_graph_name()` derives `tenant_{tenant_id}` from `CurrentUser`
- `AgeGraphClient` receives the tenant-scoped graph name at construction
- `TestTenantGraphRouting` (2 tests) verifies the naming contract
- Zero cross-tenant data leakage possible

### Req: KnowledgeGraph Scoping — COVERED
- Route `POST /graph/knowledge-graphs/{id}/mutations` checks SpiceDB `edit`
  permission before any write; returns 403 if denied
- `GraphMutationService._stamp_knowledge_graph_id()` overwrites any
  caller-supplied `knowledge_graph_id` on CREATE/UPDATE operations
- `PLATFORM_STAMPED_PROPERTIES` constant excludes `knowledge_graph_id`
  from schema learning to prevent caller spoofing via optional properties
- `TestKnowledgeGraphScopedMutationsRoute` (5 tests): permission allowed,
  denied (403), correct resource checked, kg_id forwarded to service,
  service not called on deny
- `TestKnowledgeGraphIdStamping` (6 tests): stamp on CREATE, stamp on
  UPDATE, overwrite spoofed value, no stamp on DELETE, no stamp when
  param absent, stamp in JSONL path

### Req: Mutation Log Format (JSONL) — COVERED
- `apply_mutations_from_jsonl` parses line-by-line; skips blank lines
- Reports parse errors with line number and content preview
- `TestGraphMutationServiceApplyFromJSONL` (5+ tests)

### Req: DEFINE Operation — COVERED
- System properties auto-added: nodes get `data_source_id`, `source_path`,
  `slug`; edges get `data_source_id`, `source_path`
- `TestCreateDefineValidationInBatch` and `test_apply_mutations_stores_define_operations`

### Req: CREATE Operation — COVERED
- Type definition required (current batch or repository)
- Required property validation enforced
- Idempotent via MERGE semantics in `AgeBulkLoadingStrategy`
- Schema learning on extra properties
- `TestMutationOperation` covers missing-type, missing-required-prop scenarios

### Req: UPDATE Operation — COVERED
- `set_properties` and `remove_properties` both supported
- Schema learning on unknown properties
- Unlisted properties preserved

### Req: DELETE Operation — COVERED
- DETACH DELETE for nodes (cascades edges)
- DELETE for edges only
- `TestDeleteNodeWithDetach`, `TestDeleteEdge`

### Req: Mandatory System Properties — COVERED
- `validate_operation()` enforces `data_source_id`, `source_path`, `slug`
  (nodes), `knowledge_graph_id`, `start_id`/`end_id` (edges) on CREATE
- `TestMutationOperation` covers each missing-property error path

### Req: Deterministic Entity IDs — COVERED
- `generate_id()` uses SHA-256; format `{type}:{16_hex_chars}`
- `TestGenerateId` (5 tests: determinism, format, type prefix, slug diff)

### Req: Referential Integrity Ordering — COVERED
- `_sort_operations()`: DEFINE → DELETE-edges → DELETE-nodes →
  CREATE-nodes → CREATE-edges → UPDATE
- `TestSortOperationsReferentialIntegrity` (3 tests with maximally mixed
  batches asserting exact positional ordering)

