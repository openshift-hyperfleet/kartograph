### 7. Group Member Management (SHALL) — COVERED

**Add member scenario**
- Code: `GroupService.add_member()` checks MANAGE, loads group, calls `group.add_member(user_id, role)`.
- Tests: `test_adds_member_with_manage_permission` (service), `test_admin_can_add_member_to_group` (integration: verifies VIEW=True, MANAGE=False for member role).

**Change member role scenario (previous role revoked, new role granted)**
- Code: `GroupService.update_member_role()` calls aggregate's `update_member_role()` which emits `MemberRoleChanged`. Outbox applies the change. The `add_member()` role-replacement path also emits `MemberRemoved` + `MemberAdded`.
- Tests: `test_replaces_role_when_current_role_differs` (domain: verifies MemberRemoved+MemberAdded events), `test_updates_role_with_manage_permission` (service), `test_admin_can_update_member_role` (integration: verifies MANAGE granted after role update to admin).

**Remove member scenario**
- Code: `GroupService.remove_member()` checks MANAGE, loads group, calls `group.remove_member()`.
- Tests: `test_removes_member_with_manage_permission` (service), `test_admin_can_remove_member` (integration: verifies MANAGE=False after removal).

**Demote or remove last admin scenario**
- Code: `Group.remove_member()` and `Group.update_member_role()` both guard against removing/demoting the last admin, raising `ValueError("Cannot remove/demote the last admin")`. Route propagates this as HTTP 400. `Group.add_member()` with `current_role=ADMIN, role=MEMBER` also guards.
- Tests: `test_prevents_removing_last_admin`, `test_prevents_demoting_last_admin`, `test_prevents_demoting_last_admin_via_role_replacement` (all domain-level unit tests covering Given/When/Then exactly).
- **Note:** No explicit route-level test verifying the HTTP 400 response for this scenario. The domain coverage fully exercises the Given/When/Then conditions, and the route correctly propagates the ValueError as 400. This is a minor test pyramid gap but does not represent a missing business rule test.

