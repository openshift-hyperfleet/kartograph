### Requirement 7: Permission Inheritance — COVERED

**Scenario 7.1: Workspace-inherited access**

- Implementation: SpiceDB schema (`src/api/shared_kernel/authorization/spicedb/schema.zed`):
  ```
  permission view   = admin + editor + viewer + workspace->view
  permission edit   = admin + editor + workspace->edit
  permission manage = admin + workspace->manage
  ```
- Tests (integration, require live SpiceDB):
  - `tests/integration/management/test_knowledge_graph_authorization.py::test_workspace_editor_can_view_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::test_workspace_editor_can_edit_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::test_workspace_admin_can_manage_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::test_workspace_member_can_view_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::test_user_without_workspace_role_cannot_access_knowledge_graph`

**Scenario 7.2: Direct grant**

- Implementation: SpiceDB schema direct `admin`/`editor`/`viewer` relations on `knowledge_graph` satisfy `manage`/`edit`/`view` regardless of workspace role
