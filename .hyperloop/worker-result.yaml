  **Scenario: Empty lines**
  - Code: `if not line: continue` skips blank/whitespace-only lines.
  - Tests: `test_handles_whitespace_only_lines`, `test_handles_empty_jsonl`.

  #### Requirement: DEFINE Operation тАФ COVERED
  **Scenario: Define a node type**
  - Code: `apply_mutations()` calls `get_system_properties_for_entity(EntityType.NODE)`
