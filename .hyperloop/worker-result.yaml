## Requirement-by-Requirement Findings

### 1. Group Creation (SHALL) — COVERED

**Successful creation scenario**
- Code: `Group.create()` generates ULID via `GroupId.generate()`; `GroupService.create_group()` calls `group.add_member(creator_id, GroupRole.ADMIN)`.
- Tests: `test_factory_creates_group_with_generated_id` (ULID), `test_creates_group_with_creator_as_admin` (admin role), `test_create_group_returns_201_with_group_details` (route 201).

**Duplicate name within tenant scenario**
- Code: `GroupRepository.save()` raises `DuplicateGroupNameError`; route returns HTTP 409.
- Tests: `test_records_failure_probe_event` (service raises on duplicate), `test_create_group_returns_409_on_duplicate_name` (route returns 409).

---

### 2. Group Name Validation (SHALL) — COVERED

**Valid name scenario (1–255 chars after trim)**
- Code: `Group.create()` and `Group.rename()` both call `.strip()` and check `1 <= len(trimmed) <= 255`.
- Tests: `test_create_accepts_single_character_name`, `test_create_accepts_exactly_255_character_name`, `test_create_accepts_255_characters_after_trimming`.

**Empty or whitespace-only name scenario**
- Code: Both `create()` and `rename()` raise `ValueError("Group name must be between 1 and 255 characters")` for empty/whitespace strings.
- Tests: `test_create_rejects_empty_name`, `test_create_rejects_whitespace_only_name`, `test_create_rejects_single_space_name` (domain); `test_raises_value_error_for_empty_name`, `test_raises_value_error_for_whitespace_only_name` (rename domain); `test_create_group_returns_422_for_empty_name` (route).

