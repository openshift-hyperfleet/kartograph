#### REQ-6: Event Fan-Out — COVERED

**Implementation:** `infrastructure/outbox/composite.py::CompositeEventHandler` maintains
`_handlers_by_type: dict[str, list[EventHandler]]`. `handle()` dispatches to ALL handlers
registered for a type. Raises `UnknownEventTypeError` for unregistered types.

**Scenario: Multiple handlers registered — COVERED**
- Code: `register()` appends to `_handlers_by_type[event_type]`; `handle()` iterates all.
- Unit test: `test_composite.py::test_handle_fans_out_to_multiple_handlers` registers two
  handlers for `"SharedEvent"` and asserts both `handle` methods are awaited.

**Scenario: Unknown event type — COVERED**
- Code: `CompositeEventHandler.handle()` raises `UnknownEventTypeError` when type has no
  handlers. `OutboxWorker._process_entries()` catches `UnknownEventTypeError` BEFORE the
  generic `Exception` handler and immediately calls `_move_to_dlq()`, bypassing all retry logic.
- Unit tests:
  - `test_composite.py::test_handle_raises_for_unknown_event_type` (correct exception type,
    `event_type` and `registered_types` attributes accessible).
  - `test_worker.py::test_unknown_event_type_immediately_moves_to_dlq` (DLQ called,
    `event_processing_failed` NOT called, even with `max_retries=5`).
  - `test_worker.py::test_retry_not_called_for_unknown_event_type` (patches `_increment_retry`
    and asserts it is never invoked).
  - `test_worker.py::test_unknown_event_type_dlq_even_at_zero_retries` (DLQ at retry_count=0).

