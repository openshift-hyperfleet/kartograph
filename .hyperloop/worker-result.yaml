## NFR Cross-Cutting Checks

### NFR Testing (specs/nfr/testing.spec.md) — PARTIAL (noted, not blocking)

The application service tests (`test_knowledge_graph_service.py`) use `AsyncMock` and
`MagicMock` for repositories, authorization provider, and probe — which the NFR testing
spec marks as SHALL NOT for domain/application-layer collaborators. The domain aggregate
tests (`test_knowledge_graph.py`) also use `MagicMock(spec=KnowledgeGraphProbe)` for
probe verification, contradicting the "aggregates should need no test doubles" guidance.

This is the established project-wide pattern (IAM workspace service tests use identical
approach). No in-memory fake implementations exist for management repositories or the
authorization provider anywhere in the codebase. This violation is pre-existing and
was accepted through all prior reviews. Not introduced by this task.

Not treated as a blocking failure given the cross-cutting, project-wide nature. Fakes
(e.g., `InMemoryKnowledgeGraphRepository`) would bring the tests into full NFR compliance
and is recommended for a future pass.

### NFR Observability (specs/nfr/observability.spec.md) — COVERED

Domain probes (`KnowledgeGraphProbe`, `KnowledgeGraphServiceProbe`) are defined as
Protocols with `DefaultKnowledgeGraphProbe` and `DefaultKnowledgeGraphServiceProbe`
implementing them with structlog. No direct `logger.*` or `print()` calls found in
domain or application code.

### NFR Architecture (specs/nfr/architecture.spec.md) — COVERED

All 330 management unit tests pass including cross-layer boundary enforcement: domain
does not import infrastructure; ports do not import infrastructure; application does not
import infrastructure; management context does not import iam/graph/ingestion/extraction/
querying.

