### Requirement: Knowledge Graph Deletion — COVERED

**Scenario: Successful deletion (atomic cascade)**
- Code: `KnowledgeGraphService.delete()` checks MANAGE, then within `async with self._session.begin()`: deletes encrypted credentials via secret store, deletes each DS via repo, marks KG for deletion, deletes KG via repo. `KnowledgeGraphDeleted` event is appended to outbox in the same transaction; `ManagementEventTranslator._translate_knowledge_graph_deleted()` produces 5 SpiceDB operations: delete workspace rel, delete tenant rel, filter-delete admin grants, filter-delete editor grants, filter-delete viewer grants.
- Tests:
  - `test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_checks_manage_permission_on_kg`
  - `test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_cascades_data_sources`
  - `test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_cascades_encrypted_credentials`
  - `test_translator.py::TestManagementEventTranslatorKnowledgeGraphDeleted::test_produces_five_operations`
  - `test_translator.py::TestManagementEventTranslatorKnowledgeGraphDeleted::test_first_operation_deletes_workspace_relationship`
  - `test_translator.py::TestManagementEventTranslatorKnowledgeGraphDeleted::test_second_operation_deletes_tenant_relationship`
  - `test_translator.py::TestManagementEventTranslatorKnowledgeGraphDeleted::test_third_operation_filters_admin_grants`
  - `test_translator.py::TestManagementEventTranslatorKnowledgeGraphDeleted::test_fourth_operation_filters_editor_grants`
  - `test_translator.py::TestManagementEventTranslatorKnowledgeGraphDeleted::test_fifth_operation_filters_viewer_grants`

**Scenario: Rollback on failure**
- Code: Exception within `session.begin()` rolls back the entire transaction; KG is never deleted if a DS deletion fails.
- Tests:
  - `test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_rolls_back_on_ds_deletion_failure`

**Scenario: Mutation after deletion**
- Code: `KnowledgeGraph.update()` raises `AggregateDeletedError` when `_deleted=True`. At service level, deleted KGs are absent from DB so `get_by_id()` returns `None` → `ValueError` → HTTP 404.
- Tests:
  - `test_knowledge_graph.py::TestKnowledgeGraphUpdate::test_update_raises_after_deletion`
  - `test_knowledge_graph_service.py::TestKnowledgeGraphServiceUpdate::test_update_raises_value_error_when_not_found`
  - `test_knowledge_graph_routes.py::TestUpdateKnowledgeGraph::test_update_knowledge_graph_returns_404_when_not_found`

