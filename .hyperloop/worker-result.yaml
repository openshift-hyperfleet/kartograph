#### R6 — UPDATE Operation
**SHALL**: Modify or remove specific properties; preserve unlisted.

- **Code**: `_execute_updates()` calls `update_properties()` for SET and
  `remove_properties()` for REMOVE; unlisted properties preserved via jsonb merge.

Scenarios:
- **Set properties** —
  `TestUpdateOperations::test_update_node_adds_properties` (integration): `email` added, `name` preserved. COVERED.
- **Remove properties** —
  `test_update_node_removes_properties` (integration): `temp_field`/`another_temp` become NULL; `name` preserved. COVERED.
- **Schema learning on update** —
  `TestSchemaLearning::test_update_discovers_optional_properties`: new props from UPDATE's
  `set_properties` added to type definition's `optional_properties`. COVERED.

---

#### R7 — DELETE Operation
**SHALL**: Delete nodes (cascading) and edges (edge only).

- **Code**: `_execute_deletes()` → `delete_node_with_detach()` for nodes,
  `delete_edge()` for edges.

Scenarios:
- **Delete a node** —
  `TestDeleteOperations::test_delete_node_detaches_edges` (integration): node deleted;
  connected `knows` edge also removed. COVERED.
- **Delete an edge** —
  `TestDeleteOperations::test_delete_edge` (integration): edge removed; both endpoint
  nodes still exist. COVERED.

