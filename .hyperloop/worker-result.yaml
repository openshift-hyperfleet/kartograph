## SpiceDB Schema

Knowledge graph permissions are defined in `schema.zed`:

```
permission view   = admin + editor + viewer + workspace->view
permission edit   = admin + editor + workspace->edit
permission manage = admin + workspace->manage
```

The `KnowledgeGraphCreated` event produces two `WriteRelationship` outbox ops
(`knowledge_graph#workspace` and `knowledge_graph#tenant`).

The `KnowledgeGraphDeleted` event produces 5 `DeleteRelationship*` outbox ops
(workspace rel, tenant rel, and all three direct-grant filters).
