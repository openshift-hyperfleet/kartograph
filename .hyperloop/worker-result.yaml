  ## Requirement: Knowledge Graph Deletion

  ### Scenario: Successful deletion with atomic cascade — COVERED
  - Service: delete() runs inside single DB transaction:
    (1) fetches all data sources for the KG,
    (2) for each DS with credentials_path: calls secret_store.delete(),
    (3) calls ds_repo.delete() for each DS,
    (4) calls kg_repo.delete() for the KG record,
    (5) calls spicedb_client.delete_relationships() for workspace, tenant, and direct grants.
  - Tests: test_knowledge_graph_service.py test_delete_cascades_data_sources,
    test_delete_cascades_encrypted_credentials, test_delete_cleans_up_auth_relationships.

  ### Scenario: Mutation after deletion — COVERED
  - Service: operations check deleted_at sentinel; raise KnowledgeGraphDeletedError
    if KG is already marked for deletion.
  - Tests: test_knowledge_graph_service.py test_update_raises_on_deleted_kg,
    test_create_data_source_raises_on_deleted_kg.

