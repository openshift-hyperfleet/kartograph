### REQ-4: API Key Revocation — COVERED

**Scenario 4.1 — Owner revokes own key; remains visible with is_revoked=true**
- `iam/domain/aggregates/api_key.py::revoke()`: sets `is_revoked = True` (soft delete).
- Tests: `test_api_key_service.py` (saved key has `is_revoked=True`).

**Scenario 4.2 — Tenant admin revokes any key**
- `iam/application/services/api_key_service.py`: SpiceDB `REVOKE` permission check covers
  both owner and tenant admin via SpiceDB relationships.
- Tests: `test_api_key_service.py::TestAPIKeyServiceRevokeAuthorization`.

**Scenario 4.3 — Already revoked → 409**
- `iam/domain/aggregates/api_key.py::revoke()`: raises `APIKeyAlreadyRevokedError`.
- Routes catch → 409.
- Tests: `test_api_key_aggregate.py::test_revoke_already_revoked_raises_error`,
  `test_api_key_routes.py::test_returns_409_when_already_revoked`.

**Scenario 4.4 — Unauthorized revocation → 403**
- `iam/application/services/api_key_service.py`: SpiceDB check raises `UnauthorizedError`; routes → 403.
- Tests: `test_api_key_routes.py::test_revoke_api_key_returns_403_when_unauthorized`.

