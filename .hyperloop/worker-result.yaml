### Code Review Findings

- **Domain probes (DOO)**: `logger.*` appears only inside probe *implementations*
  (`knowledge_graph_probe.py`, `knowledge_graph_service_probe.py`, etc.) — the
  correct DOO pattern. No direct `logger.*` or `print()` in domain/application code.

- **No MagicMock for domain aggregates**: Commit `fd7dc1d0` replaced `MagicMock()`
  DataSource instances with real `DataSource` aggregates via `_make_ds()` helper.
  Remaining `AsyncMock` usage is for ports (repositories, authz provider) and
  `MagicMock` is for infrastructure sessions and probe observability objects — acceptable.

- **Commit trailers**: All 8 implementation commits carry `Spec-Ref` and `Task-Ref`.
  Conventional commit messages throughout.

- **No hardcoded secrets or environment-specific values**.

