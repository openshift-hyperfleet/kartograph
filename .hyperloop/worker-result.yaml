## Task 017: Outbox Pattern ‚Äî Fresh Attempt (2026-04-23)

Branch: `hyperloop/task-017`
Spec: `specs/shared-kernel/outbox.spec.md`

All 130 outbox-specific unit tests pass. All 2187 total unit tests pass.

---

### Implementation Summary

All six SHALL requirements from the spec are implemented:

**REQ-1: Transactional Event Storage**
- `infrastructure/outbox/repository.py::OutboxRepository.append()` uses `session.add()`
  only, never `session.commit()`. Session is shared with the calling service, guaranteeing
  atomic commit/rollback of aggregate change + outbox entry together.
- Tests: `TestOutboxWorkerTransactionAtomicity` (unit),
  `TestAtomicityGuarantees` (integration)

**REQ-2: Event Processing**
- `OutboxWorker` processes entries via `_process_batch()` / `_process_single()`.
- `_mark_processed()` sets `processed_at`. `_increment_retry()` records `last_error`.
  `_move_to_dlq()` sets `failed_at` to permanently exclude from polling.
- Tests: `TestOutboxWorkerProcessBatch`, `TestOutboxWorkerRetryBehavior` (unit)

**REQ-3: Idempotent Event Handlers**
- `SpiceDBEventHandler` delegates to `authz.write_relationship()`, which is a SpiceDB
  upsert ‚Äî identical calls produce identical state, no duplicates.
- Tests: `TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state`

**REQ-4: Concurrent Worker Safety**
- Both `OutboxRepository.fetch_unprocessed()` and `OutboxWorker._process_batch()` use
  `.with_for_update(skip_locked=True)` for PostgreSQL-level exclusive row locks.
- Tests: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`

**REQ-5: Dual Delivery Mechanism**
- Real-time: `PostgresNotifyEventSource` (asyncpg-listen) invokes `_process_single()`
  on NOTIFY.
- Polling fallback: `_poll_loop()` runs every `poll_interval_seconds` (default 30s).
- Tests: `test_postgres_notify_event_source.py` (20+ unit tests), integration tests
  for both NOTIFY and polling paths.

**REQ-6: Event Fan-Out**
- `CompositeEventHandler` maintains `_handlers_by_type: dict[str, list[EventHandler]]`,
  dispatching each event to ALL registered handlers.
- Unknown event types raise `UnknownEventTypeError` ‚Üí immediately dead-lettered
  (bypasses retry logic in the worker).
- Tests: `test_composite.py`, `TestOutboxWorkerRetryBehavior::test_unknown_event_type_*`
