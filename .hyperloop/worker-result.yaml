### Requirement 6: Event Fan-Out — COVERED

**Implementation:**
- `infrastructure/outbox/composite.py` — `CompositeEventHandler`:
  - `register()` — appends handler to per-event-type list.
  - `handle()` — dispatches to **all** registered handlers for the event type.
  - Raises `UnknownEventTypeError` if no handlers found.
- `infrastructure/outbox/worker.py` `_process_entries()` (lines 253–257):
  catches `UnknownEventTypeError` and calls `_move_to_dlq()` immediately,
  bypassing `_increment_retry()`.

**Scenarios:**

| Scenario | Test | File |
|---|---|---|
| Multiple handlers invoked | `TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers` | `tests/unit/infrastructure/outbox/test_composite.py` |
| Unknown event type → immediate DLQ | `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq` | `tests/unit/infrastructure/outbox/test_worker.py` |
| | `TestOutboxWorkerRetryBehavior::test_unknown_event_type_dlq_even_at_zero_retries` | same |
| | `TestOutboxWorkerRetryBehavior::test_retry_not_called_for_unknown_event_type` | same |
| | `TestCompositeEventHandler::test_handle_raises_for_unknown_event_type` | `tests/unit/infrastructure/outbox/test_composite.py` |

