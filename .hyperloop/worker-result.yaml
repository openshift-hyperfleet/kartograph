### REQ-3: Idempotent Event Handlers — COVERED

**Implementation:**
`infrastructure/outbox/spicedb_handler.py` — `SpiceDBEventHandler._apply_operation()`
delegates to `authz.write_relationship()`, which uses SpiceDB's set-membership
(upsert) semantics: writing an identical tuple twice is a no-op.

**Scenario: Duplicate delivery** — COVERED
- Test: `TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state`
  (`tests/unit/infrastructure/outbox/test_spicedb_handler.py`)
  Uses a proper `FakeAuthorizationProvider` (inline class backed by a Python `set`)
  — not an `AsyncMock` — to verify upsert semantics. Two invocations with
  identical payload produce identical `frozenset` relationship state.
- Integration test: `TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state`
  covers the same invariant against a real SpiceDB instance.

