### REQ-3: API Key Listing — COVERED

**Implementation:**
- `api_key_service.py::list_api_keys()`: uses SpiceDB `lookup_resources(VIEW)` to scope
  what the user can see, passes optional `created_by_user_id` filter to repository.
- `APIKeyResponse` model: includes name, prefix, created_at, expires_at, last_used_at,
  is_revoked — no `secret` or `key_hash` field.
- Route: accepts optional `?user_id=` query param, validates it, passes to service.

**Scenario: List keys (metadata without secret)** — COVERED
- `test_api_key_routes.py::test_never_returns_secret_or_hash` — `secret`, `key_hash`,
  `hash` absent from response
- `test_api_key_routes.py::test_lists_api_keys_for_user` — 200 with key metadata

**Scenario: Filter by creator via `?user_id=`** — COVERED
- `test_api_key_service.py::test_filters_by_created_by_user_id` — repository called with
  the provided `created_by_user_id`
- `test_api_key_routes.py::test_returns_400_for_empty_user_id` — blank user_id rejected

