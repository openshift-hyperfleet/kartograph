### Spec Coverage

All 6 SHALL requirements and 11 scenarios from the spec are implemented:

**REQ-1: Transactional Event Storage**
- `OutboxRepository.append()` only calls `session.add()`, never `session.commit()`.
- Tests: `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`
  and `test_failed_service_call_leaves_no_outbox_entries`.

**REQ-2: Event Processing (normal, retry, DLQ)**
- Normal: `_process_batch()` → `_mark_processed()` path.
- Transient failure: `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count`
  verifies `event_processing_failed` probe called, not DLQ.
- Permanent (DLQ): `test_max_retries_moves_entry_to_dlq` verifies `failed_at` set.

**REQ-3: Idempotent Event Handlers**
- `TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state`
  (unit, with `FakeAuthorizationProvider`) verifies upsert semantics.
- `TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state`
  (integration).
- `TestOutboxWorkerIdempotency` verifies `processed_at IS NULL` and `failed_at IS NULL`
  filters in the fetch query.

**REQ-4: Concurrent Worker Safety**
- `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  compiles the SQLAlchemy statement with the PostgreSQL dialect and asserts
  `"SKIP LOCKED"` is present. Both `_process_batch()` and `_process_single()`
  use `.with_for_update(skip_locked=True)`.

**REQ-5: Dual Delivery Mechanism**
- Pre-existing: PostgreSQL trigger installs `pg_notify` on INSERT; `PostgresNotifyEventSource`
  handles real-time delivery; polling loop runs every 30s as fallback.

**REQ-6: Event Fan-Out**
- `CompositeEventHandler` dispatches to all handlers registered for an event type.
- `UnknownEventTypeError` (new in this task) replaces the former `ValueError` so
  the worker can distinguish permanent failures from transient ones.
- `test_unknown_event_type_immediately_moves_to_dlq` and
  `test_unknown_event_type_dlq_even_at_zero_retries` verify immediate DLQ bypass
  of retry logic. `test_retry_not_called_for_unknown_event_type` uses `patch.object`
  to assert `_increment_retry` is never invoked.

### Summary

The task diff is focused and correct: it adds `UnknownEventTypeError`, wires it
