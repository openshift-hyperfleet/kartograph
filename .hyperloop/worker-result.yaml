## Fix Correctness

`KnowledgeGraphService.delete()` (commit `72ccbd16`) now:
1. Accepts `secret_store: ISecretStoreRepository | None = None` in `__init__`.
2. Iterates data sources and calls `await self._secret_store.delete(path=ds.credentials_path, tenant_id=...)` for each DS with a `credentials_path` before calling `ds_repo.delete(ds)`.
3. Is wired via `FernetSecretStore` in `management/dependencies/knowledge_graph.py`.

This matches `DataSourceService.delete()` exactly and satisfies the spec's SHALL requirement for full cascade including encrypted credentials.

The new test `test_delete_cascades_encrypted_credentials` uses `assert_awaited_once_with` to verify the secret store is called exactly once for the DS with a `credentials_path` and not called for DSes without one — providing precise behavioral coverage.

