### REQ-2: API Key Authentication — COVERED

**Scenario 2.1 — Valid key / last_used_at updated**
- `iam/dependencies/user.py`: reads `X-API-Key` header, delegates to `api_key_service.validate_and_get_key()`.
- `iam/application/services/api_key_service.py`: calls `aggregate.record_usage()` then saves.
- Tests: `test_api_key_service.py::test_updates_last_used_at`, `test_api_key_aggregate.py::test_record_usage_updates_last_used_at`.

**Scenario 2.2 — Expired key → 401**
- `iam/domain/aggregates/api_key.py::is_valid()`: checks `expires_at >= now`.
- Tests: `test_api_key_aggregate.py::test_expired_key_returns_false`, `test_api_key_service.py::test_returns_none_for_expired_key`.

**Scenario 2.3 — Revoked key → 401**
- `iam/domain/aggregates/api_key.py::is_valid()`: checks `is_revoked`.
- Tests: `test_api_key_service.py::test_returns_none_for_revoked_key`.

**Scenario 2.4 — JWT takes precedence**
- `iam/dependencies/user.py`: Bearer token checked first; `X-API-Key` only tried when no Bearer token present.
- Tests: integration `test_api_key_auth.py::test_jwt_takes_precedence_over_api_key`.

**Scenario 2.5 — Prefix collision → error-level event**
- `iam/infrastructure/api_key_repository.py::get_verified_key()`: iterates all prefix candidates;
  fires `probe.api_key_prefix_collision(prefix, count)` when >1 candidate.
- Tests: `test_api_key_repository.py::TestPrefixCollision::test_logs_error_on_prefix_collision`.

