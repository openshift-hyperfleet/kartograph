### Requirement: Knowledge Graph Deletion — COVERED

**SHALL allow users with `manage` permission to delete a knowledge graph, cascading to data sources.**

**Scenario: Successful deletion (atomic cascade)**
- Code: `KnowledgeGraphService.delete()` checks `Permission.MANAGE`. Inside `async with self._session.begin()`:
  1. `ds_repo.find_by_knowledge_graph()` → enumerate all child data sources
  2. For each DS with `credentials_path` → `secret_store.delete()` (encrypted credential cleanup)
  3. `ds.mark_for_deletion()` + `ds_repo.delete(ds)` for each DS
  4. `kg.mark_for_deletion()` + `kg_repo.delete(kg)` for the KG
  Authorization cleanup: outbox translator converts `KnowledgeGraphDeleted` to 5 SpiceDB ops (delete workspace rel, delete tenant rel, filter-delete admin/editor/viewer grants).
- Tests:
  - `TestKnowledgeGraphServiceDelete.test_delete_checks_manage_permission_on_kg` (unit, service)
  - `TestKnowledgeGraphServiceDelete.test_delete_cascades_data_sources` (unit, service — verifies DS records deleted)
  - `TestKnowledgeGraphServiceDelete.test_delete_cascades_encrypted_credentials` (unit, service — verifies secret_store.delete called per DS with credentials_path)
  - `TestManagementEventTranslatorKnowledgeGraphDeleted.test_produces_five_operations` (unit, translator)
  - `TestManagementEventTranslatorKnowledgeGraphDeleted.test_third_operation_filters_admin_grants` (unit, translator)
  - `TestManagementEventTranslatorKnowledgeGraphDeleted.test_fourth_operation_filters_editor_grants` (unit, translator)
  - `TestManagementEventTranslatorKnowledgeGraphDeleted.test_fifth_operation_filters_viewer_grants` (unit, translator)
  - `TestKnowledgeGraphDeletion.test_deletes_knowledge_graph` (integration, repository)

**Scenario: Rollback on failure**
- Code: All cascade steps run inside a single `async with self._session.begin()` block. An exception in any step propagates before `kg_repo.delete()` is reached, rolling back the entire transaction.
- Tests:
  - `TestKnowledgeGraphServiceDelete.test_delete_rolls_back_on_ds_deletion_failure` (unit, service — verifies `kg_repo.delete` NOT called when DS deletion raises)

**Scenario: Mutation after deletion**
- Code: Aggregate `_deleted` flag set in `mark_for_deletion()`. Checked in `update()` → raises `AggregateDeletedError`.
- Tests:
  - `TestKnowledgeGraphUpdate.test_update_raises_after_deletion` (unit, aggregate)
  - `TestKnowledgeGraphMarkForDeletion.test_mark_for_deletion_is_idempotent` (unit, aggregate)

