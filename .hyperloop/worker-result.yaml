### Requirement Coverage

**REQ-1: Transactional Event Storage**
`OutboxRepository.append()` calls `session.add()` only, never commits.
Session is shared with aggregate repository → atomic commit/rollback.
Tests: `TestOutboxWorkerTransactionAtomicity`.

**REQ-2: Event Processing**
`OutboxWorker._process_batch()` dispatches to handler, marks processed.
Transient failures: `retry_count++`, `last_error` recorded.
Permanent failure (max retries): `failed_at` set → DLQ.
Tests: `TestOutboxWorkerRetryBehavior`, `TestOutboxWorkerProcessBatch`.

**REQ-3: Idempotent Event Handlers**
`fetch_unprocessed()` filters `WHERE processed_at IS NULL AND failed_at IS NULL`.
SpiceDB writes use upsert semantics (set membership → no duplicates).
Tests: `TestOutboxWorkerIdempotency`, `TestSpiceDBEventHandlerIdempotency`.

**REQ-4: Concurrent Worker Safety**
`_process_batch()` uses `.with_for_update(skip_locked=True)`.
Test: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
asserts SKIP LOCKED present in compiled SQL (PostgreSQL dialect).

**REQ-5: Dual Delivery Mechanism**
Real-time: `PostgresNotifyEventSource` listens on `outbox_events` NOTIFY channel.
Polling fallback: `_poll_loop()` runs every 30 s (configurable).
Tests: `test_postgres_notify_event_source.py`, `TestOutboxWorkerLifecycle`.

**REQ-6: Event Fan-Out**
`CompositeEventHandler` dispatches to all handlers registered for an event type.
Unknown event types raise `UnknownEventTypeError` → worker immediately DLQs
without incrementing retry count.
Tests: `test_composite.py`, `TestOutboxWorkerRetryBehavior::test_unknown_event_type_*`.

