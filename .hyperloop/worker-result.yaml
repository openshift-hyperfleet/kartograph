  - `TestKnowledgeGraphServiceUpdate::test_update_calls_aggregate_update_and_saves`
  - `TestKnowledgeGraphUpdate::test_update_changes_name_and_description`
  - `TestKnowledgeGraphUpdate::test_update_advances_updated_at`
  - `TestUpdateKnowledgeGraph::test_update_knowledge_graph_returns_200`

### Requirement: Knowledge Graph Deletion — COVERED

**Scenario: Successful deletion (atomic cascade)**
- Code: `KnowledgeGraphService.delete()` checks MANAGE permission, then executes
  inside `async with self._session.begin()`:
  1. `ds_repo.find_by_knowledge_graph(kg_id)` — get all child data sources
  2. For each DS: delete encrypted credentials from secret store (if `credentials_path`
     set), call `ds.mark_for_deletion()`, call `ds_repo.delete(ds)`
  3. Call `kg.mark_for_deletion()`, call `kg_repo.delete(kg)`
  SpiceDB cleanup via outbox: `KnowledgeGraphDeleted` event → translator produces 5
  operations (delete workspace rel, delete tenant rel, filter-delete admin/editor/viewer
  grants covering "all direct grants").
- Tests:
  - `TestKnowledgeGraphServiceDelete::test_delete_cascades_data_sources`
  - `TestKnowledgeGraphServiceDelete::test_delete_cascades_encrypted_credentials`
  - `TestKnowledgeGraphServiceDelete::test_delete_rolls_back_on_ds_deletion_failure`
    (verifies `kg_repo.delete` NOT called when DS deletion raises — atomicity)
  - `TestManagementEventTranslatorKnowledgeGraphDeleted` — 6 tests covering all 5
    SpiceDB cleanup operations including filter deletes for direct grants
  - `TestKnowledgeGraphDeletion::test_deletes_knowledge_graph` (integration)
  - `TestKnowledgeGraphDeletion::test_delete_records_outbox_event` (integration)
  - `TestDeleteKnowledgeGraph::test_delete_knowledge_graph_returns_204`

**Scenario: Mutation after deletion**
- Code: `KnowledgeGraph.update()` checks `if self._deleted: raise AggregateDeletedError`.
  At service level, once a KG is deleted from DB, `update()` finds `None` from
  `get_by_id` and raises `ValueError("not found")`.
- Tests:
  - `TestKnowledgeGraphUpdate::test_update_raises_after_deletion` (domain level — direct
    test of the AggregateDeletedError guard)
  - `TestKnowledgeGraphServiceUpdate::test_update_raises_value_error_when_not_found`
    (service level — covers the post-DB-deletion mutation rejection path)

### Requirement: Permission Inheritance — COVERED

**Scenario: Workspace-inherited access**
- Code: SpiceDB schema defines `knowledge_graph.view = admin + editor + viewer + workspace->view`
  and `knowledge_graph.edit = admin + editor + workspace->edit`.
- Tests (all integration, against real SpiceDB):
  - `TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_editor_can_view_knowledge_graph`
  - `TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_editor_can_edit_knowledge_graph`
  - `TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_admin_can_manage_knowledge_graph`
  - `TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_member_can_view_knowledge_graph`
  - Plus negative tests: member cannot edit, editor cannot manage

**Scenario: Direct grant**
- Code: SpiceDB schema allows direct `admin`, `editor`, `viewer` relations on
  `knowledge_graph`. Direct admin satisfies `manage`, `edit`, and `view`.
- Tests (all integration, against real SpiceDB):
  - `TestDirectGrantKnowledgeGraphAccess::test_direct_kg_admin_has_manage_permission`
  - `TestDirectGrantKnowledgeGraphAccess::test_direct_kg_admin_has_edit_permission`
  - `TestDirectGrantKnowledgeGraphAccess::test_direct_kg_admin_has_view_permission`

