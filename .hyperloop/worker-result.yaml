### REQ-2: API Key Authentication (SHALL)

#### Scenario: Valid key — COVERED
- Code: `iam/application/services/api_key_service.py::validate_and_get_key()` verifies hash, checks `is_valid()`, calls `record_usage()`; `iam/dependencies/user.py` wires `X-API-Key` header
- Tests:
  - `test_api_key_service.py::test_validates_correct_secret`
  - `test_api_key_service.py::test_updates_last_used_at`
  - `tests/integration/test_api_key_auth.py::test_authenticates_with_valid_api_key`
  - `tests/integration/test_api_key_auth.py::test_updates_last_used_at_on_success`

#### Scenario: Expired key — COVERED
- Code: `iam/domain/aggregates/api_key.py::is_valid()` checks `datetime.now(UTC) >= expires_at`
- Tests:
  - `test_api_key_aggregate.py::test_expired_key_returns_false`
  - `test_api_key_service.py::test_returns_none_for_expired_key`
  - `tests/integration/test_api_key_auth.py::test_returns_401_for_expired_api_key`

#### Scenario: Revoked key — COVERED
- Code: `api_key.py::is_valid()` checks `self.is_revoked`
- Tests:
  - `test_api_key_aggregate.py::test_revoked_key_returns_false`
  - `test_api_key_service.py::test_returns_none_for_revoked_key`
  - `tests/integration/test_api_key_auth.py::test_returns_401_for_revoked_api_key`

#### Scenario: JWT takes precedence — COVERED
- Code: `iam/dependencies/user.py::_authenticate()` tries Bearer token first; falls back to API key only when token is absent
- Tests:
  - `tests/integration/test_api_key_auth.py::test_prefers_jwt_when_both_provided`
  - `tests/integration/test_api_key_auth.py::test_invalid_jwt_with_valid_api_key_uses_api_key`

#### Scenario: Prefix collision — COVERED
- Code: `iam/infrastructure/api_key_repository.py::get_verified_key()` queries all keys matching the prefix, iterates with bcrypt check; calls `self._probe.api_key_prefix_collision()` when `len(models) > 1`
- Probe: `iam/infrastructure/observability/api_key_repository_probe.py::api_key_prefix_collision()` logs at `self._logger.error(...)` — satisfies "error-level event"
- Test: `tests/unit/iam/infrastructure/test_api_key_repository.py::test_logs_error_on_prefix_collision` — verifies `mock_probe.api_key_prefix_collision.assert_called_once()` with correct prefix and count=2

