### REQ-6: Event Fan-Out — COVERED

**Spec scenarios:** Multiple handlers registered for same event type; Unknown
event type → immediate dead-letter, no retry.

**Implementation:**
- `infrastructure/outbox/composite.py` — `CompositeEventHandler._handlers_by_type`
  is `dict[str, list[EventHandler]]`. `register()` appends to each event type's
  list; `handle()` iterates all handlers for the type. Empty list raises
  `UnknownEventTypeError`.
- `infrastructure/outbox/worker.py` — `_process_entries()` catches
  `UnknownEventTypeError` before the generic `Exception` branch; calls
  `_move_to_dlq()` immediately without touching `retry_count`.
- `main.py` — `TenantCreated` is registered to both `iam` handler and
  `tenant_graph` handler, exercising fan-out in production wiring.

**Tests (multiple handlers):**
- Unit `TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers` —
  two handlers share `"SharedEvent"`; both `handle` calls verified after one
  dispatch.

**Tests (unknown event type):**
- Unit `test_handle_raises_for_unknown_event_type` — composite raises
  `UnknownEventTypeError` with correct `event_type` and `registered_types`.
- Unit `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`
  — worker moves entry to DLQ on first attempt; `event_processing_failed` NOT
  called; `event_moved_to_dlq` called.
- Unit `test_unknown_event_type_dlq_even_at_zero_retries` — same at
  `retry_count=0`, `max_retries=10` (proving retry count is irrelevant).
- Unit `test_retry_not_called_for_unknown_event_type` — patches `_increment_retry`
  and verifies it is never invoked.

