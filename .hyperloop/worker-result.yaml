## Architectural Note

Authorization relationship writes (on create) and deletions (on delete) are implemented via the
transactional outbox pattern rather than inline SpiceDB calls. The DB record + outbox event are
written in a single DB transaction, ensuring the SpiceDB operations will be applied reliably by
the outbox worker. This is architecturally sound and fully tested at both the outbox-persistence
level (integration) and the translation layer (unit). All spec requirements are met.

