| Requirement | Scenario | Status | Code | Test |
|---|---|---|---|---|
| **1. Transactional Event Storage** | Successful write | COVERED | `infrastructure/outbox/repository.py:append()` — adds to session, never commits; shared session owned by caller | `tests/unit/infrastructure/outbox/test_repository.py::test_append_creates_outbox_model`; `tests/integration/iam/test_outbox_consistency.py::test_outbox_entry_created_in_same_transaction_as_group` |
| | Transaction rollback | COVERED | Repository docstring + design: no independent commit | `tests/unit/infrastructure/outbox/test_worker.py::test_repository_append_does_not_commit`, `test_failed_service_call_leaves_no_outbox_entries`; `tests/integration/iam/test_outbox_consistency.py::test_rollback_removes_both_group_and_outbox_entry` |
