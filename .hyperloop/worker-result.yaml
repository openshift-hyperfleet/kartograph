#### Requirement: Mutation Log Format — COVERED

- **Scenario: Valid JSONL:**
  - Implementation: `apply_mutations_from_jsonl()` splits on `\n`, parses each line.
  - Test: `test_parses_jsonl_and_applies_mutations` — two-line JSONL parsed; both ops applied.

- **Scenario: Parse error on a line:**
  - Implementation: `JSONDecodeError` caught; error includes `line_num` and `line_preview`.
  - Test: `test_returns_error_on_invalid_json` — asserts first error contains "JSON" and
    line number "1"; asserts second error contains "Line content:" preview.

- **Scenario: Empty lines:**
  - Implementation: `if not line: continue` skips blank/whitespace-only lines.
  - Test: `test_handles_whitespace_only_lines` — JSONL with surrounding blank lines
    produces one parsed operation.

