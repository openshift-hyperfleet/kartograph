#### Requirement: Secure Enclave — Per-Entity Graph Authorization — COVERED

All five scenarios have comprehensive unit test coverage in
`test_graph_secure_enclave.py` backed by `graph_secure_enclave.py`:

**Scenario: Authorized entity — full properties**
- `TestAuthorizedNodeReturnsFullProperties`, `TestAuthorizedEdgeReturnsFullProperties` ✓

**Scenario: Unauthorized node — ID-only redaction**
- `TestUnauthorizedNodeReturnsIdOnly` (4 tests: returns RedactedNodeRecord, preserves ID,
  strips all properties, not removed from result set) ✓

**Scenario: Unauthorized edge — endpoint-preserving redaction**
- `TestUnauthorizedEdgeEndpointPreservingRedaction` (6 tests: RedactedEdgeRecord,
  preserves ID/start_id/end_id, strips properties, not removed from set) ✓

**Scenario: Permission derivation for graph entities**
- `TestPermissionDerivation` (3 tests: uses knowledge_graph resource, uses VIEW permission,
  uses current user as subject) ✓

**Scenario: Missing or unresolvable knowledge_graph_id**
- `TestMissingKnowledgeGraphIdDenied` (5 tests: absent property, null value, non-string,
  empty string — all redacted without making SpiceDB call) ✓
- For "cannot be resolved to valid KG" (valid-looking string, no SpiceDB record): the service's
  `_check_kg_view` calls `check_permission` which SpiceDB evaluates to False for unknown resources
  (no relationships = no permission). The fail-safe at line 198–199 also catches exceptions and
  denies. Effectively handled, though not explicitly tested with a mock returning False for a
  valid-format ID. This is an acceptable gap given the implementation's correctness.

