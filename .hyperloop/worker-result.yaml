### 7. Code Review
Changes in task-033's diff:
- **`iam/ports/exceptions.py`**: Adds typed `ParentWorkspaceNotFoundError` and
  `ParentWorkspaceCrossTenantError` exceptions. Proper design — eliminates
  string-parsing of ValueError in presentation layer.
- **`iam/application/services/workspace_service.py`**: Replaces bare `ValueError`
  raises with typed exceptions; properly re-raises them. Docstring updated
  to match new exception types.
- **`iam/presentation/workspaces/routes.py`**: Catches both new typed exceptions
  alongside `UnauthorizedError` and maps all to 404 — correct per spec
  "no distinction between unauthorized and missing." OpenAPI docs updated.
- **`graph/infrastructure/tenant_graph_handler.py`**: Adds `conn.commit()` on
  idempotent no-op path. Fixes idle-in-transaction pool stall.
- **`management/`**: Management REST API for Knowledge Graphs implementation.
  Clean DDD structure, proper probe usage, no direct logger calls.
- **`tests/unit/iam/domain/test_workspace_role_hierarchy.py`**: 18 unit tests
  covering all three-tier role hierarchy scenarios from the spec. Tests parse
  the SpiceDB schema directly — schema contract tests. Solid.
- No `logger.*` or `print()` calls in any modified source files.
- No MagicMock/AsyncMock on domain aggregates.
- No cross-boundary DDD imports.

