#### Requirement: Knowledge Graph Deletion — COVERED

**Scenario: Successful deletion (atomic cascade) — COVERED**
- Implementation: `knowledge_graph_service.py` `delete()` operates inside a single `async with self._session.begin()` transaction:
  1. Checks MANAGE permission on KG
  2. Fetches and cascade-deletes all data sources (including encrypted credentials via `secret_store`)
  3. Calls `kg.mark_for_deletion()` which emits `KnowledgeGraphDeleted` event
  4. SpiceDB outbox translator cleans workspace link, tenant link, and all direct grants (admin/editor/viewer)
  - If any step fails, the transaction rolls back — no partial state.
- Tests:
  - `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_checks_manage_permission_on_kg`
  - `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_cascades_data_sources`
  - `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_cascades_encrypted_credentials`
  - `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_rolls_back_on_ds_deletion_failure`
  - `tests/integration/management/test_knowledge_graph_repository.py::TestKnowledgeGraphDeletion::test_deletes_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_repository.py::TestKnowledgeGraphFKRestrict::test_delete_kg_with_data_sources_raises_integrity_error`

**Scenario: Mutation after deletion — COVERED**
- Implementation: `knowledge_graph.py` `update()` checks `_deleted` flag and raises `AggregateDeletedError`; `mark_for_deletion()` is idempotent.
- Tests:
  - `tests/unit/management/test_knowledge_graph.py::TestKnowledgeGraphUpdate::test_update_raises_after_deletion`
  - `tests/unit/management/test_knowledge_graph.py::TestKnowledgeGraphMarkForDeletion::test_mark_for_deletion_is_idempotent`

