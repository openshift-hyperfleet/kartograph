detail: |
  task-017 Outbox Pattern — spec alignment re-review PASS (round 4).

  All 6 SHALL requirements covered. All CodeRabbit feedback from rounds 1–3
  verified addressed in current branch code.

  ## Spec Requirements

  1. Transactional Event Storage: COVERED
     - Successful write: test_repository_append_does_not_commit verifies
       session.add() called, session.commit() never called by repository.
     - Transaction rollback: test_failed_service_call_leaves_no_outbox_entries
       verifies rollback discards outbox entries (caller owns transaction).

  2. Event Processing: COVERED
     - Normal path: test_processes_unprocessed_entries, test_marks_entry_as_processed,
       test_calls_event_processed_on_success.
     - Transient failure: test_transient_failure_increments_retry_count,
       test_transient_failure_does_not_dlq_immediately.
     - Permanent failure (dead letter): test_max_retries_moves_entry_to_dlq.

  3. Idempotent Event Handlers: COVERED
     - test_already_processed_entry_excluded_from_fetch verifies processed_at IS NULL filter.
     - test_failed_entries_excluded_from_fetch verifies failed_at IS NULL filter.
     - EventHandler protocol documented as idempotent contract.

  4. Concurrent Worker Safety: COVERED
     - test_fetch_unprocessed_uses_for_update_skip_locked compiles SQL with
       PostgreSQL dialect and asserts "SKIP LOCKED" in rendered query.

  5. Dual Delivery Mechanism: COVERED
     - NOTIFY: PostgresNotifyEventSource in event_sources/postgres_notify.py;
       tested in test_postgres_notify_event_source.py.
     - Polling: _poll_loop in worker.py, tested via TestOutboxWorkerLifecycle;
       polling always runs as fallback regardless of event_source presence.

  6. Event Fan-Out: COVERED
     - Multiple handlers: test_handle_fans_out_to_multiple_handlers (test_composite.py).
     - Unknown event type → immediate DLQ (no retry):
       test_unknown_event_type_immediately_moves_to_dlq,
       test_unknown_event_type_dlq_even_at_zero_retries,
       test_retry_not_called_for_unknown_event_type (test_worker.py).
     - 6 unit tests in test_composite.py + 3 in test_worker.py.

