## Summary

Fixed the last remaining PARTIAL from the prior review: Requirement 8 — Query Console KG Context Selector Not Wired to Execution.

### Changes made

**`src/dev-ui/app/composables/api/useQueryApi.ts`**
- Added `knowledgeGraphId?: string` as a fourth parameter to `queryGraph()`.
- When provided, the value is forwarded to the MCP tool `arguments` object as `knowledge_graph_id`.
- Extracted the args-building logic into a new exported pure function `buildQueryGraphArgs()` — no Vue composable dependencies, importable directly in vitest.

**`src/dev-ui/app/pages/query/index.vue`**
- `executeQuery()` now passes `selectedKgId.value || undefined` as the fourth argument to `queryGraph()`.
- An empty string (unscoped / "all KGs") becomes `undefined`, so no `knowledge_graph_id` field is sent in the MCP call.
- A selected KG ID is forwarded, scoping the query to that graph.

**`src/dev-ui/app/tests/knowledge-graphs.test.ts`**
- Added `import { buildQueryGraphArgs } from '~/composables/api/useQueryApi'` — the tests now exercise real production code rather than a standalone copy of the logic.
- Replaced the two standalone-stub tests (lines 446–468) with three tests that call `buildQueryGraphArgs` directly:
  1. Verifies `knowledge_graph_id` is included in the args when a KG ID is provided.
  2. Verifies `knowledge_graph_id` is absent from the args when `undefined` is passed.
  3. Verifies the `|| undefined` gate used in the component correctly converts an empty string to `undefined`.

### Test results

43 tests pass (3 test files) — one net new test added over the previous 42.
All 16 requirements from specs/ui/experience.spec.md are now COVERED.
