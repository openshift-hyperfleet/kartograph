## Gap Resolution (from Findings)

The Findings identified that `KnowledgeGraphService.delete()` did not invoke
the secret store to delete encrypted credentials when cascading through child
data sources.

### Implementation Fix (commit bc986fca)
- `src/api/management/application/services/knowledge_graph_service.py:52`
  `secret_store: ISecretStoreRepository | None = None` parameter added to
  `KnowledgeGraphService.__init__`.
- `src/api/management/application/services/knowledge_graph_service.py:409-413`
  For each data source with a `credentials_path`, calls
  `await self._secret_store.delete(path=ds.credentials_path, tenant_id=self._scope_to_tenant)`
  before deleting the DS row — only when `self._secret_store is not None`.

### Unit Tests Added (commit bc986fca)
- `test_delete_removes_credentials_for_data_sources_with_credentials_path`:
  Given a KG with one DS with credentials and one without, asserts
  `secret_store.delete` is called exactly once for the correct DS, with the
  correct path and tenant. Both DS rows and KG still deleted from DB.
- `test_delete_skips_credential_cleanup_when_no_secret_store`:
  Defensive nil-guard — verifies no error when `secret_store=None` but DS
  has a `credentials_path`.

