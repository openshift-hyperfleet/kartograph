  `_stamp_knowledge_graph_id()` overwrites caller-supplied values.
  `validate_operation()` requires `knowledge_graph_id` in `set_properties` for CREATE.
- Tests: `test_kg_mutations_route_forbidden_without_edit_permission` (403 + no service call);
  `test_kg_mutations_route_accessible_with_edit_permission` (200);
  `TestKnowledgeGraphIdStamping` (5 tests covering stamp, overwrite, UPDATE stamp,
  DELETE no-stamp, JSONL path)
- **PASS**

