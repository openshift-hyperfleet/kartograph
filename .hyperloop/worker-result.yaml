## FAIL 4 — Query Console KG Context Selector Always Empty (Requirement 8 — SHALL)

**Spec:** "THEN the user can optionally select a specific knowledge graph to scope queries
AND when unscoped, queries span all knowledge graphs the user can access in the tenant"

**Code:** `src/dev-ui/app/pages/query/index.vue`, lines 75–77:

```typescript
// Placeholder list — will be populated once KG management API exists (task-015).
// We expose the structure now so the UI selector works end-to-end.
const knowledgeGraphs = ref<Array<{ id: string; name: string }>>([])
```

The `knowledgeGraphs` ref is never populated — no API call exists. The selector
renders an empty dropdown. Because `GET /management/knowledge-graphs` is already
implemented on the backend (confirmed: `loadDataSources()` in the same UI calls it),
this is a wiring omission, not a missing endpoint.

**Test:** None.

**Required fix:**
1. On `onMounted` (and on `tenantVersion` change), call `GET /management/knowledge-graphs`
   and populate `knowledgeGraphs`.
2. Pass the selected KG ID as a query parameter to the graph query API.
3. Add a test for the KG filter population and scope label computation.

