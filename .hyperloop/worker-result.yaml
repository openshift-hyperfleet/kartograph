## Outbox Pattern Spec Alignment Review — task-017

Independent read of every spec requirement against code and tests on branch
`hyperloop/task-017`. All 6 requirements carry both implementation and test
coverage.

---

### REQ-1: Transactional Event Storage — COVERED

**Spec scenarios:** Successful write; Transaction rollback.

**Implementation:**
- `infrastructure/outbox/repository.py` — `OutboxRepository.append()` calls
  `session.add(OutboxModel(...))` and never calls `session.commit()`. The
  caller (service layer) owns the transaction boundary via `async with
  session.begin()`. If the outer transaction rolls back, the pending `add()` is
  discarded along with the aggregate change.

**Tests:**
- Unit `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`
  — mocks `session`, asserts `session.add` called once, `session.commit` never
  called.
- Unit `test_failed_service_call_leaves_no_outbox_entries` — same contract,
  rollback path.
- Integration `TestAtomicityGuarantees::test_outbox_entry_created_in_same_transaction_as_group`
  — real DB; verifies both group row and outbox entry exist after commit.
- Integration `test_rollback_removes_both_group_and_outbox_entry` — raises inside
  `async with session.begin()`, verifies neither row persists.

---

### REQ-2: Event Processing — COVERED

**Spec scenarios:** Normal processing; Transient failure; Permanent failure (dead
letter).

**Implementation:**
- `infrastructure/outbox/worker.py` — `_process_entries()` dispatches each entry
  to `handler.handle()`. On success calls `_mark_processed()` which sets
  `processed_at`. On `Exception` calls `_handle_processing_failure()`: if
  `new_retry_count >= max_retries` calls `_move_to_dlq()` (sets `failed_at`,
  records `last_error`); otherwise calls `_increment_retry()` (increments
  `retry_count`, records `last_error`).
- `fetch_unprocessed` always filters `WHERE processed_at IS NULL AND failed_at IS
  NULL`, so DLQ entries are permanently excluded.

**Tests:**
- Unit `TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries` —
  handler called, probe fires `event_dispatching` + `event_processed`.
- Unit `test_marks_entry_as_processed` — `session.execute` called (mark-processed
  path).
- Integration `TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb`
  — real DB + SpiceDB; entry has `processed_at` set after `_process_batch()`;
  SpiceDB relationship verified.
- Unit `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count`
  — `event_processing_failed` probe called; `event_moved_to_dlq` NOT called.
- Unit `test_transient_failure_does_not_dlq_immediately` — same, with
  `retry_count=0`.
- Unit `test_max_retries_moves_entry_to_dlq` — entry at `retry_count=max-1` fails;
  `event_moved_to_dlq` called, `event_processing_failed` NOT called.
- Unit `TestOutboxWorkerIdempotency::test_failed_entries_excluded_from_fetch` —
  compiled SQL asserts `failed_at IS NULL` in WHERE clause.

