## task-003 Graph Mutations — Fresh Verification

### Summary

Implementation is complete. All 12 SHALL/MUST requirements from `specs/graph/mutations.spec.md` are implemented and tested. 217 graph-specific unit tests pass; 2018 total unit tests pass; mypy reports no type errors.

---

### Requirement Coverage

**1. Per-Tenant Graph Isolation**
- `graph/dependencies.py::get_tenant_graph_name` returns `f"tenant_{current_user.tenant_id.value}"`.
- `get_age_graph_client` uses this as the graph name per request.
- Tests: `tests/unit/graph/presentation/test_routes.py::TestTenantGraphRouting` (2 tests).

**2. KnowledgeGraph Scoping — Authorization**
- `graph/presentation/routes.py::apply_kg_mutations` checks SpiceDB `edit` permission before any mutation.
- Returns HTTP 403 if denied; service is never called.
- Tests: `TestKnowledgeGraphScopedMutationsRoute` (5 tests including forbidden check).

**3. KnowledgeGraph Scoping — ID Stamping**
- `GraphMutationService._stamp_knowledge_graph_id` overwrites any caller-supplied value on CREATE/UPDATE.
- Validated in `MutationOperation.validate_operation`: CREATE must include `knowledge_graph_id`.
- Tests: `TestKnowledgeGraphIdStamping` (6 tests).

**4. Mutation Log Format — JSONL**
- `GraphMutationService.apply_mutations_from_jsonl` parses JSONL, skips blank lines, reports parse errors with line number and content preview.
- Tests: `TestGraphMutationServiceApplyFromJSONL` (5 tests).

**5. DEFINE Operation**
- Node: `get_system_properties_for_entity(NODE)` returns `{data_source_id, source_path, slug}` — auto-merged into `required_properties`.
- Edge: `get_system_properties_for_entity(EDGE)` returns `{data_source_id, source_path}` — no slug.
- Tests: `test_apply_mutations_stores_define_operations`, `test_apply_define_edge_type_adds_edge_system_properties`.

**6. CREATE Operation**
- New node: applies via bulk loading strategy.
- Idempotent merge: JSONB `||` merge operator preserves existing + adds new properties.
- Missing type: rejected with error (`test_rejects_create_without_define_in_batch`).
- Missing required properties: rejected (`test_rejects_create_missing_required_properties`).
- Schema learning: extra properties added to `optional_properties` (`TestSchemaLearning`).

**7. UPDATE Operation**
- Set properties (unlisted preserved via JSONB merge), remove properties.
- Schema learning on update: new `set_properties` keys added to optional_properties.
- Tests: `test_update_discovers_optional_properties`, infrastructure bulk loading tests.

**8. DELETE Operation**
- Node: cascading DETACH DELETE removes node and all connected edges.
- Edge: only edge removed, nodes remain.
- Tests: `test_age_query_builder_deletes.py`, `test_age_strategy_deletes.py`.

**9. Mandatory System Properties**
- Node CREATE: `data_source_id`, `source_path`, `slug`, `knowledge_graph_id` validated in `MutationOperation.validate_operation`.
- Edge CREATE: same minus `slug`.
- Tests: `test_domain_value_objects.py::TestMutationOperation` (multiple tests).

**10. Deterministic Entity IDs**
- `shared_kernel/graph_primitives/entity_id_generator.py`: SHA-256, 16 hex chars, `{type}:{hex}` pattern.
- Enforced by `ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` in `MutationOperation`.
- Tests: `test_entity_id_generator.py`, `test_domain_value_objects.py::test_id_pattern_validation`.

**11. Referential Integrity Ordering**
- `MutationApplier._sort_operations`: DEFINE(0) → DELETE edges(1,0) → DELETE nodes(1,1) → CREATE nodes(2,0) → CREATE edges(2,1) → UPDATE(3,*).
- Tests: `test_mutation_applier_sort.py` (3 tests verifying exact position of each op type).

