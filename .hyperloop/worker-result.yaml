Spec alignment review for task-024 (Groups feature). All spec requirements are COVERED.

## Summary

Every requirement and scenario from `specs/iam/groups.spec.md` has been verified
against the implementation code and its tests.

## Spec Scenario Coverage

### Group Creation
- SHALL allow authenticated users to create groups within their tenant
  - **COVERED**: `TestCreateGroup` in `test_group_service.py` (service layer);
    `TestCreateGroupRoute` in `test_group_routes.py` (presentation layer).
- Scenario: Successful creation — ULID generated, creator gets admin role
  - **COVERED**: `test_creates_group_with_creator_as_admin` (unit); factory method
    `Group.create()` generates a ULID-based `GroupId`; `test_factory_creates_group_with_generated_id`
    in `test_group_aggregate.py`; `test_create_group_returns_201_with_group_details` in routes.
- Scenario: Duplicate name within tenant — rejected with conflict error
  - **COVERED**: `test_records_failure_probe_event` (unit service); `test_create_group_returns_409_on_duplicate_name`
    (routes); `test_duplicate_name_in_same_tenant_raises_error` (integration repository).

### Group Name Validation
- SHALL enforce constraints on group names
  - **COVERED**: `TestGroupNameValidation` class in `test_group_aggregate.py` (9 tests).
- Scenario: Valid name (1–255 chars after trimming) — accepted
  - **COVERED**: `test_create_accepts_single_character_name`, `test_create_accepts_exactly_255_character_name`,
    `test_create_accepts_255_characters_after_trimming`, `test_create_trims_whitespace_from_name`.
- Scenario: Empty or whitespace-only — rejected with validation error
  - **COVERED**: `test_create_rejects_empty_name`, `test_create_rejects_whitespace_only_name`,
    `test_create_rejects_single_space_name`; `test_create_group_returns_422_for_empty_name`,
