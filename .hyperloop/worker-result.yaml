  ### Requirement Coverage

  #### Requirement: Per-Tenant Graph Isolation тАФ COVERED
  - Code: `get_tenant_graph_name()` in `dependencies.py` derives `tenant_{tenant_id}`;
    `get_age_graph_client()` creates `AgeGraphClient` with this graph name.
  - Test: `TestTenantGraphRouting` in `test_routes.py` тАФ verifies
    `tenant_t1` for tenant `t1`, and full tenant IDs are used verbatim.

  #### Requirement: KnowledgeGraph Scoping тАФ COVERED
  **Scenario: Mutation authorization**
  - Code: `apply_kg_mutations()` in `routes.py` (lines 125-134) calls SpiceDB
    `check_permission` for `edit` on the target KnowledgeGraph; raises HTTP 403 on denial.
  - Tests: `test_kg_mutations_route_accessible_with_edit_permission`,
    `test_kg_mutations_route_forbidden_without_edit_permission`,
    `test_kg_mutations_route_checks_correct_resource` in `test_routes.py`.

  **Scenario: KnowledgeGraph ID stamping**
  - Code: `_stamp_knowledge_graph_id()` in `graph_mutation_service.py` overwrites any
    caller-provided value. `apply_mutations()` rejects batches with CREATE/UPDATE when
    `knowledge_graph_id` is `None` (lines 109-125). `PLATFORM_STAMPED_PROPERTIES.issubset()`
    check in `value_objects.py` line 267 enforces this at validation time.
  - Tests: `TestKnowledgeGraphIdStamping` class тАФ
    `test_stamps_knowledge_graph_id_on_create_operation`,
    `test_overwrites_caller_provided_knowledge_graph_id`,
    `test_stamps_knowledge_graph_id_on_update_operation`,
    `test_rejects_create_update_without_knowledge_graph_id`,
    `test_stamps_knowledge_graph_id_in_jsonl_parse`.

  #### Requirement: Mutation Log Format тАФ COVERED
  **Scenario: Valid JSONL**
  - Code: `apply_mutations_from_jsonl()` тАФ splits on newlines, parses each JSON line.
  - Test: `test_parses_jsonl_and_applies_mutations`.

  **Scenario: Parse error on a line**
