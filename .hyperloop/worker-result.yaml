## Requirement: API Key Revocation

### Scenario: Owner revokes own key
**Status: COVERED**

- Implementation: SpiceDB `owner` relationship grants `revoke` permission; `revoke_api_key()` checks SpiceDB, calls `api_key.revoke()`.
- Tests:
  - `tests/integration/test_api_key_auth.py::TestAPIKeyAuthorizationEnforcement::test_owner_can_revoke_own_key`

### Scenario: Tenant admin revokes any key
**Status: COVERED**

- Implementation: SpiceDB `api_key#revoke = owner + tenant->administrate`; tenant admins get revoke permission transitively.
- Tests:
  - `tests/integration/test_api_key_auth.py::TestAPIKeyAuthorizationEnforcement::test_tenant_admin_can_revoke_other_users_key`

### Scenario: Already revoked
**Status: COVERED**

- Implementation: `src/api/iam/domain/aggregates/api_key.py` — `revoke()` raises `APIKeyAlreadyRevokedError` if `self.is_revoked`.
- Route: catches `APIKeyAlreadyRevokedError`, returns HTTP 409.
- Tests:
  - `tests/unit/iam/domain/test_api_key_aggregate.py::TestAPIKeyRevocation::test_revoke_already_revoked_raises_error`
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceRevoke::test_raises_when_already_revoked`
  - `tests/unit/iam/presentation/test_api_key_routes.py::TestRevokeAPIKeyRoute::test_returns_409_when_already_revoked`

### Scenario: Unauthorized revocation
**Status: COVERED**

- Implementation: `src/api/iam/application/services/api_key_service.py` — `revoke_api_key()` checks SpiceDB REVOKE permission; raises `UnauthorizedError` if denied.
- Route: catches `UnauthorizedError`, returns HTTP 403.
- Tests:
  - `tests/integration/test_api_key_auth.py::TestAPIKeyAuthorizationEnforcement::test_non_admin_cannot_revoke_other_users_key`
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceRevokeAuthorization::test_revoke_raises_unauthorized_when_denied`
  - `tests/unit/iam/presentation/test_api_key_routes.py::TestRevokeAPIKeyRoute::test_revoke_api_key_returns_403_when_unauthorized`

