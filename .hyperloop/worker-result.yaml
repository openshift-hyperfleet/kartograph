### Requirement: CORS Defaults
> The system SHALL use permissive defaults for methods and headers when CORS is enabled.

**Status: COVERED**

**Implementation:**
- `allow_methods` defaults to `["*"]` (`settings.py:104-107`).
- `allow_headers` defaults to `["*"]` (`settings.py:108-111`).
- Both wildcards are passed directly to `CORSMiddleware` in `configure_cors()`.

#### Scenario: Default policy — **COVERED**
- GIVEN CORS enabled: `CORSSettings(origins=["https://app.example.com"])`.
- THEN all HTTP methods allowed:
  `TestCORSSettingsDefaults::test_allow_methods_uses_wildcard_for_all_methods` —
  asserts `settings.allow_methods == ["*"]`.
  `TestCORSDefaultPolicy::test_preflight_allows_requested_method` —
  sends OPTIONS with `Access-Control-Request-Method: DELETE`, confirms
  `access-control-allow-methods` contains "DELETE" or "*".
- AND all request headers allowed:
  `TestCORSSettingsDefaults::test_allow_headers_defaults_to_wildcard` —
  asserts `settings.allow_headers == ["*"]`.
  `TestCORSDefaultPolicy::test_preflight_allows_requested_headers` —
  sends OPTIONS with `Access-Control-Request-Headers: X-Custom-Header, Authorization`,
  confirms headers echoed or "*" returned.

