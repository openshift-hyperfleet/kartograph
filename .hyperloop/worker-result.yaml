### 5. API Key Cascade Deletion — COVERED

**Implementation:**
- `TenantService.delete_tenant()` calls `api_key_repository.list(tenant_id=...)` then `api_key.mark_for_deletion()` and `api_key_repository.delete(api_key)` for each key before deleting the tenant.
- `APIKey.mark_for_deletion()` emits `APIKeyDeleted` domain event → outbox → SpiceDB relationship cleanup.

**Scenario: Tenant deletion**
- `test_deletes_api_keys_on_tenant_deletion` — unit, `test_tenant_service.py`; single key ✓
- `test_deletes_multiple_api_keys_on_tenant_deletion` — unit; three keys, all deleted ✓
- `test_api_key_mark_for_deletion_emits_deleted_event` — unit; verifies `APIKeyDeleted` event on the deleted key (drives SpiceDB cleanup) ✓
- `test_api_key_repo_queried_by_tenant_on_deletion` — unit; verifies `list()` called with correct `tenant_id` ✓
- `test_api_keys_deleted_before_tenant_on_cascade` — unit; verifies call order: api_key_delete → tenant_delete ✓

