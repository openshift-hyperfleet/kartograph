# Spec Alignment Review: API Keys

All SHALL requirements are implemented and tested. Detailed findings below.

---

## Requirement: API Key Creation

### Scenario: Successful creation
**Status: COVERED**

- Implementation: `src/api/iam/application/security.py` — `generate_api_key_secret()` generates with `karto_` prefix; `hash_api_key_secret()` uses bcrypt; `extract_prefix()` returns first 12 characters.
- Service: `src/api/iam/application/services/api_key_service.py` — `create_api_key()` returns `(api_key, plaintext_secret)` tuple; plaintext secret is never stored.
- Model: `src/api/iam/infrastructure/models/api_key.py` — `prefix` column is `String(12)`, `key_hash` stored as unique bcrypt hash.
- Tests:
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceCreate::test_secret_has_karto_prefix` — verifies `karto_` prefix.
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceCreate::test_returns_plaintext_secret_only_at_creation` — plaintext returned once.
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceCreate::test_creates_api_key_with_hashed_secret` — hash stored, differs from plaintext.
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceCreate::test_stores_prefix_from_secret` — prefix is first 12 chars.

### Scenario: Duplicate name per user
**Status: COVERED**

- Implementation: `src/api/iam/infrastructure/api_key_repository.py` — `save()` checks for duplicate name per (tenant_id, created_by_user_id, name); raises `DuplicateAPIKeyNameError`.
- DB constraint: `APIKeyModel.__table_args__` has `UniqueConstraint("tenant_id", "created_by_user_id", "name", ...)`.
- Route: `src/api/iam/presentation/api_keys/routes.py` — catches `DuplicateAPIKeyNameError`, returns HTTP 409.
- Tests:
  - `tests/unit/iam/infrastructure/test_api_key_repository.py::TestAPIKeyRepositorySave::test_raises_on_duplicate_name`
  - `tests/unit/iam/presentation/test_api_key_routes.py::TestCreateAPIKeyRoute::test_returns_409_on_duplicate_name`
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceCreate::test_raises_on_duplicate_name`

### Scenario: Expiration bounds
**Status: COVERED**

- Implementation: `src/api/iam/presentation/api_keys/models.py` — `CreateAPIKeyRequest.expires_in_days` has `ge=1, le=3650, default=30`.
- Tests:
  - `tests/unit/iam/presentation/test_api_key_routes.py::TestCreateAPIKeyRoute::test_validates_expires_in_days_minimum` — rejects 0.
  - `tests/unit/iam/presentation/test_api_key_routes.py::TestCreateAPIKeyRoute::test_validates_expires_in_days_maximum` — rejects 3651.
  - `tests/unit/iam/presentation/test_api_key_routes.py::TestCreateAPIKeyRoute::test_accepts_optional_expires_in_days` — verifies default 30.
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceCreate::test_creates_with_expiration` — verifies expiration calculation.

