## Task 017: Outbox Pattern — Spec Alignment Review (2026-04-23)

Branch: `hyperloop/task-017`
Spec: `specs/shared-kernel/outbox.spec.md`

---

### Requirement Coverage

#### REQ-1: Transactional Event Storage — COVERED

**Code:** `OutboxRepository.append()` calls `session.add()` only; never `session.commit()`.
The docstring explicitly states "The transaction is not committed — that is the responsibility of the calling service."

**Scenario: Successful write**
- Code: `src/api/infrastructure/outbox/repository.py` — `append()` adds model to session without committing.
- Unit test: `TestOutboxWorkerTransactionAtomicity.test_repository_append_does_not_commit` verifies `session.commit` is never called and `session.add` is called once.
- Integration test: `TestAtomicityGuarantees.test_outbox_entry_created_in_same_transaction_as_group` verifies both group and outbox entry persist after a shared `async_session.begin()` commit.

**Scenario: Transaction rollback**
- Code: Implicit — repository never commits, so caller rollback discards both the aggregate and outbox entry.
- Unit test: `test_failed_service_call_leaves_no_outbox_entries` confirms `session.commit` is never called.
- Integration test: `TestAtomicityGuarantees.test_rollback_removes_both_group_and_outbox_entry` forces a rollback via `raise Exception("Forced rollback for test")` and verifies neither the group nor the outbox entry persists.

---

#### REQ-2: Event Processing — COVERED

**Code:** `OutboxWorker._process_entries()` dispatches to `handler.handle()`, marks entries processed, increments retry count on transient failure, and moves to DLQ when max retries exceeded.

**Scenario: Normal processing**
- Unit tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`, `test_calls_event_processed_on_success` in `test_worker.py`.
- Integration: `TestOutboxWorkerProcessing.test_worker_processes_group_created_and_writes_to_spicedb` — verifies entry `processed_at` is set and SpiceDB relationship exists after `_process_batch()`.

**Scenario: Transient failure**
- Code: `_handle_processing_failure()` calls `_increment_retry()` when `new_retry_count < max_retries`, recording `retry_count` and `last_error`.
- Unit tests: `test_transient_failure_increments_retry_count`, `test_calls_event_processing_failed_on_error`, `test_transient_failure_does_not_dlq_immediately`.

**Scenario: Permanent failure (dead letter)**
- Code: `_handle_processing_failure()` calls `_move_to_dlq()` (sets `failed_at`) when `new_retry_count >= max_retries`.
- Unit test: `test_max_retries_moves_entry_to_dlq` — verifies `event_moved_to_dlq` probe called and `event_processing_failed` not called.

---

#### REQ-3: Idempotent Event Handlers — COVERED

**Code:** `SpiceDBEventHandler.handle()` calls `authz.write_relationship()` which has SpiceDB upsert semantics — writing the same tuple twice is idempotent. The fetch query filters `processed_at IS NULL` and `failed_at IS NULL`, ensuring re-runs are clean.

**Scenario: Duplicate delivery**
- Unit test: `TestSpiceDBEventHandlerIdempotency.test_duplicate_invocation_produces_identical_final_state` — uses `FakeAuthorizationProvider` (set-based storage, mirrors SpiceDB upsert), invokes handler twice, asserts final relationship set is identical to post-first-invocation state.
- Unit test: `TestOutboxWorkerIdempotency.test_already_processed_entry_excluded_from_fetch` — verifies compiled SQL contains `processed_at IS NULL`.
- Unit test: `test_failed_entries_excluded_from_fetch` — verifies compiled SQL contains `failed_at IS NULL`.
- Integration test: `TestIdempotentEventHandlers.test_handler_invoked_twice_produces_same_spicedb_state` — simulates crash-before-mark_processed, retries via `_process_batch()`, confirms SpiceDB relationship is identical and entry is marked processed.

---

#### REQ-4: Concurrent Worker Safety — COVERED

**Code:** Both `OutboxRepository.fetch_unprocessed()` and `OutboxWorker._process_batch()` use `.with_for_update(skip_locked=True)`.

**Scenario: Concurrent workers**
- Unit test: `TestOutboxWorkerConcurrentSafety.test_fetch_unprocessed_uses_for_update_skip_locked` — compiles query with PostgreSQL dialect and asserts `SKIP LOCKED` appears in the rendered SQL.

---

#### REQ-5: Dual Delivery Mechanism — COVERED

**Code:** `PostgresNotifyEventSource` in `infrastructure/outbox/event_sources/postgres_notify.py` listens via `asyncpg-listen`. `OutboxWorker.start()` always starts the poll loop (`_poll_loop()`) and optionally starts the event source task. Default `poll_interval_seconds=30`.

**Scenario: Real-time notification**
- Unit tests: `test_notify_triggers_callback_with_uuid`, `test_callback_receives_correct_uuid_type`, `test_multiple_notify_events_trigger_multiple_callbacks` in `test_postgres_notify_event_source.py`.
- Integration: `TestOutboxWorkerNotifyProcessing.test_worker_processes_via_notify_not_polling` — uses `poll_interval_seconds=999` to ensure NOTIFY-driven processing, verifies `processed_at` is set within 500ms.

**Scenario: Polling fallback**
- Code: `_poll_loop()` runs every `poll_interval_seconds` unconditionally.
- Integration: `test_worker_processes_group_created_and_writes_to_spicedb` uses worker without `event_source` (polling-only mode) and verifies processing completes.

---

#### REQ-6: Event Fan-Out — COVERED

**Code:** `CompositeEventHandler.register()` appends handlers to a per-type list. `CompositeEventHandler.handle()` dispatches to all handlers in the list. Raises `UnknownEventTypeError` (not `ValueError`) for unregistered types.

**Scenario: Multiple handlers registered**
- Unit test: `test_handle_fans_out_to_multiple_handlers` — registers two handlers for `"SharedEvent"`, asserts both are invoked.

**Scenario: Unknown event type**
- Code: `CompositeEventHandler.handle()` raises `UnknownEventTypeError`. `OutboxWorker._process_entries()` catches `UnknownEventTypeError` before the general `Exception` handler and immediately calls `_move_to_dlq()` without incrementing retry count.
- Unit tests: `test_handle_raises_for_unknown_event_type`, `test_unknown_event_type_error_is_not_value_error` in `test_composite.py`; `test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`, `test_retry_not_called_for_unknown_event_type` in `test_worker.py`.

---

### Summary

All 6 SHALL requirements from the spec are implemented with corresponding unit and/or integration tests covering every specified scenario. Verdict: **PASS**.
