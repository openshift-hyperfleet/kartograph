### REQ-4: Concurrent Worker Safety — COVERED

**Implementation:**
- `OutboxRepository.fetch_unprocessed()` (line 97): `.with_for_update(skip_locked=True)`
- `OutboxWorker._process_batch()` (line 180): `.with_for_update(skip_locked=True)`
- `OutboxWorker._process_single()` (line 201): `.with_for_update(skip_locked=True)`

**Scenario: Concurrent workers** — COVERED
- Test: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  compiles the generated SQLAlchemy query using the PostgreSQL dialect and asserts
  `"SKIP LOCKED" in compiled.upper()` — directly verifying the locking strategy at
  the query level without requiring a live database.

