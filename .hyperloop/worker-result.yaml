### REQ-5: Dual Delivery Mechanism — COVERED

**Spec scenarios:** Real-time notification (sub-second); Polling fallback (missed
NOTIFY picked up by poll).

**Implementation:**
- Real-time: DB migration `create_outbox_notify_trigger` installs an AFTER INSERT
  trigger that calls `pg_notify('outbox_events', NEW.id::text)`.
  `PostgresNotifyEventSource` (backed by `asyncpg-listen`) listens on
  `outbox_events` and invokes `worker._process_single(entry_id)`.
- Polling fallback: `OutboxWorker._poll_loop()` wakes every
  `poll_interval_seconds` (default 30 s) and calls `_process_batch()`, covering
  entries missed by NOTIFY (worker restart, connection drop).

**Tests (real-time):**
- Integration `TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling`
  — starts worker with `poll_interval_seconds=999`, inserts group, waits 500 ms,
  verifies `processed_at` is set and SpiceDB relationship exists. Demonstrates
  sub-second processing via NOTIFY.

**Tests (polling fallback):**
- Integration `TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb`
  — calls `_process_batch()` directly (exactly what the poll loop does), on an
  entry that was never NOTIFY'd. Verifies the poll path discovers and processes
  the entry.
- Unit `TestPostgresNotifyEventSourceStart` and graceful-shutdown tests — verify
  NOTIFY source lifecycle, invalid payload handling, Timeout suppression.

