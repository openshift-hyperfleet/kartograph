Both reviewer-identified failures have been resolved.

## Fix 1 — vitest version constraint (FAIL → PASS)

`src/dev-ui/package.json` `devDependencies.vitest` changed from
`"^2.2.5"` (non-existent in npm) to `"^2.1.9"` (highest valid 2.x release).
`pnpm install` now resolves and installs vitest 2.1.9 successfully.
All 16 frontend tests execute and pass (`vitest run`).

## Fix 2 — loadDataSources() stub replaced with real API calls (FAIL → PASS)

`src/dev-ui/app/pages/data-sources/index.vue` — the stub body that always
set `dataSources.value = []` was replaced with a three-step fetch sequence:

1. `GET /management/knowledge-graphs` — enumerate all KGs in the tenant.
2. `GET /management/knowledge-graphs/{id}/data-sources` — collect data
   sources for each KG (errors per-KG are swallowed so one bad KG doesn't
   break the whole list).
3. `GET /management/data-sources/{id}/sync-runs` — attach sync history to
   each data source so the card can render status badges and history rows.

`onMounted` was added to trigger an initial load when the page renders.
A `watch(tenantVersion, ...)` was added so the list refreshes automatically
whenever the user switches tenants (using the `tenantVersion` counter that
`useTenant()` already exposes for this purpose).

