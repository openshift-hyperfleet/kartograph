### Requirement: Idempotent Event Handlers — PASS

**Duplicate delivery scenario:**
- `SpiceDBEventHandler` applies `write_relationship` which is an upsert in SpiceDB
  (set semantics). Writing the same relationship tuple twice produces the same result.
- Test: `test_duplicate_invocation_produces_identical_final_state` — uses
  `FakeAuthorizationProvider` with Python `set` (upsert semantics). Two invocations
  produce identical final relationship state.

---

### Requirement: Concurrent Worker Safety — PASS

**Concurrent workers scenario:**
- `OutboxRepository.fetch_unprocessed()` and `OutboxWorker._process_batch()` both
  use `.with_for_update(skip_locked=True)`. Entries locked by one worker are
  transparently skipped by concurrent workers.
- Test: `test_fetch_unprocessed_uses_for_update_skip_locked` — compiles the
  SQLAlchemy query with the PostgreSQL dialect and asserts `SKIP LOCKED` is rendered.

---

### Requirement: Dual Delivery Mechanism — PASS

**Real-time notification scenario:**
- `PostgresNotifyEventSource` listens on the `outbox_events` PostgreSQL channel via
  `asyncpg-listen`. A PostgreSQL AFTER INSERT trigger fires `pg_notify('outbox_events',
  NEW.id::text)` on every outbox row insertion.
- Tests: Full suite in `test_postgres_notify_event_source.py` — 27 tests covering
  callback invocation with UUID, invalid payload handling (empty, non-UUID, Timeout),
  stop/start lifecycle, probe integration.

**Polling fallback scenario:**
- `OutboxWorker._poll_loop()` runs every `poll_interval_seconds` (default 30s)
  calling `_process_batch()`. The poll loop always starts regardless of whether
  an event source is configured, ensuring entries missed by NOTIFY are eventually
  discovered.
- Tests: `test_processes_unprocessed_entries`, `test_handles_multiple_entries_in_batch`
  exercise `_process_batch()` directly; `test_stop_clears_running_flag` verifies
  the loop terminates on stop.

