## Requirement: Knowledge Graph Deletion
Status: COVERED

### Scenario: Successful deletion (atomic cascade)
Implementation:
- `src/api/management/application/services/knowledge_graph_service.py:362` — `delete()` checks MANAGE, fetches KG, opens `async with session.begin()`, iterates data sources, deletes encrypted credentials via `secret_store.delete()` for each DS with `credentials_path`, calls `ds_repo.delete()`, then `kg.mark_for_deletion()` and `kg_repo.delete()` — all in one transaction
- `src/api/management/infrastructure/outbox/translator.py:160` — `KnowledgeGraphDeleted` produces 5 SpiceDB ops: delete workspace link, delete tenant link, filter-delete all admin/editor/viewer grants

Tests:
- `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_cascades_data_sources` — verifies both DS records deleted
- `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_cascades_encrypted_credentials` — verifies `secret_store.delete()` called for DS with credentials_path, not called for DS without
- `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_rolls_back_on_ds_deletion_failure` — verifies KG not deleted when DS deletion raises; `kg_repo.delete` never called
- `tests/unit/management/infrastructure/outbox/test_translator.py::TestManagementEventTranslatorKnowledgeGraphDeleted` — 7 tests verifying all 5 SpiceDB ops (workspace, tenant, admin filter, editor filter, viewer filter)

### Scenario: Mutation after deletion
Implementation:
- `src/api/management/domain/aggregates/knowledge_graph.py:174` — `update()` raises `AggregateDeletedError` when `_deleted is True`
- Service-level: deleted KG removed from DB; subsequent `get_by_id` returns None → `ValueError("not found")` in `update()`

Tests:
- `tests/unit/management/test_knowledge_graph.py::TestKnowledgeGraphUpdate::test_update_raises_after_deletion` — COVERED at aggregate level

