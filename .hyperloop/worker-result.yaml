## Requirement-by-Requirement Findings

### Requirement: Knowledge Graph Creation — COVERED

**Scenario: Successful creation**
- Code: `management/application/services/knowledge_graph_service.py` — `KnowledgeGraphService.create()` checks EDIT permission on workspace via `AuthorizationProvider`, creates aggregate via `KnowledgeGraph.create()` which generates a ULID via `KnowledgeGraphId.generate()` (using `python-ulid`), sets `tenant_id` and `workspace_id`, saves via repo; `KnowledgeGraphCreated` event written to outbox → `ManagementEventTranslator._translate_knowledge_graph_created()` writes workspace and tenant relationships in SpiceDB.
- Tests: `test_create_saves_aggregate_via_repo`, `test_create_checks_edit_permission_on_workspace` (service unit tests); `test_create_knowledge_graph_returns_201` (route test); `test_first_operation_is_workspace_relationship`, `test_second_operation_is_tenant_relationship` (translator unit tests).

**Scenario: Duplicate name within tenant**
- Code: `IntegrityError` caught in `create()`, re-raised as `DuplicateKnowledgeGraphNameError`; route maps to HTTP 409.
- Tests: `test_create_raises_duplicate_on_integrity_error` (service); `test_create_knowledge_graph_returns_409_for_duplicate_name` (route).

### Requirement: Knowledge Graph Name Validation — COVERED

**Scenario: Valid name (1–100 chars)**
- Code: `_validate_name()` in domain aggregate enforces `1 <= len(name) <= 100`; Pydantic models also enforce at HTTP boundary.
- Tests: `test_create_accepts_name_exactly_100_chars`, `test_create_accepts_single_char_name`.

**Scenario: Empty or oversized name**
- Code: Domain raises `InvalidKnowledgeGraphNameError`; Pydantic models surface 422 at HTTP layer for both create and update.
- Tests: `test_create_rejects_empty_name`, `test_create_rejects_name_over_100_chars`, `test_update_rejects_empty_name`, `test_update_rejects_name_over_100_chars` (domain); `test_create_knowledge_graph_returns_422_for_empty_name`, `test_create_knowledge_graph_returns_422_for_oversized_name`, `test_update_knowledge_graph_returns_422_for_empty_name`, `test_update_knowledge_graph_returns_422_for_oversized_name` (routes).

### Requirement: Knowledge Graph Retrieval — COVERED

**Scenario: Authorized retrieval**
- Code: `KnowledgeGraphService.get()` fetches by ID, checks tenant, checks VIEW permission, returns aggregate.
- Tests: `test_get_returns_aggregate_on_success`, `test_get_knowledge_graph_returns_200`.

**Scenario: Unauthorized or non-existent (no leakage)**
- Code: Both missing KG and denied VIEW return `None`; route maps `None` to 404.
- Tests: `test_get_returns_none_when_not_found`, `test_get_returns_none_when_permission_denied`, `test_get_returns_none_for_different_tenant`, `test_get_knowledge_graph_returns_404_when_not_found`, `test_get_knowledge_graph_returns_404_when_unauthorized`.

### Requirement: Knowledge Graph Listing — COVERED

**Scenario: List for workspace (filtered by authorization)**
- Code: `list_for_workspace()` checks VIEW on workspace, reads SpiceDB relationships to discover KG IDs, fetches each from repo, filters by tenant.
- Tests: `test_list_uses_read_relationships_to_discover_kgs`, `test_list_filters_by_tenant`, `test_list_raises_unauthorized_when_permission_denied`; route tests `test_list_knowledge_graphs_returns_200_with_list`, `test_list_knowledge_graphs_returns_403_when_unauthorized`.

### Requirement: Knowledge Graph Update — COVERED

**Scenario: Update name and description with EDIT permission**
- Code: `update()` checks EDIT on KG, fetches aggregate, calls `kg.update()`, saves in transaction.
- Tests: `test_update_calls_aggregate_update_and_saves`, `test_update_checks_edit_permission_on_kg`, `test_update_raises_unauthorized_when_permission_denied`; route tests `test_update_knowledge_graph_returns_200`, `test_update_knowledge_graph_returns_403_when_unauthorized`.

### Requirement: Knowledge Graph Deletion — COVERED

**Scenario: Successful deletion with atomic cascade**
- Code: `delete()` checks MANAGE on KG, then inside `async with self._session.begin()`: iterates all data sources via `ds_repo.find_by_knowledge_graph()`, deletes encrypted credentials via `secret_store.delete()`, marks/deletes each DS, then marks/deletes the KG. `KnowledgeGraphDeleted` event → outbox produces 5 cleanup ops: delete workspace relation, delete tenant relation, filter-delete all admin/editor/viewer direct grants.
- Tests: `test_delete_cascades_data_sources`, `test_delete_cascades_encrypted_credentials` (service); translator tests: `test_produces_five_operations`, `test_first_operation_deletes_workspace_relationship`, `test_second_operation_deletes_tenant_relationship`, `test_third_operation_filters_admin_grants`, `test_fourth_operation_filters_editor_grants`, `test_fifth_operation_filters_viewer_grants`.

**Scenario: Rollback on partial failure**
- Code: All DS/KG deletes inside `session.begin()` context; exception before `kg_repo.delete()` means KG is not deleted, and SQLAlchemy rolls back the transaction.
- Tests: `test_delete_rolls_back_on_ds_deletion_failure` — verifies `kg_repo.delete` is never called when second DS deletion raises.

**Scenario: Mutation after deletion**
- Code: `KnowledgeGraph.update()` checks `self._deleted` flag and raises `AggregateDeletedError`.
- Tests: `test_update_raises_after_deletion`.

### Requirement: Permission Inheritance — COVERED

**Scenario: Workspace-inherited access**
- Code: SpiceDB schema (`schema.zed`): `permission view = admin + editor + viewer + workspace->view`, `permission edit = admin + editor + workspace->edit`, `permission manage = admin + workspace->manage`.
- Tests: Integration tests in `tests/integration/management/test_knowledge_graph_authorization.py`: `test_workspace_editor_can_view_knowledge_graph`, `test_workspace_editor_can_edit_knowledge_graph`, `test_workspace_admin_can_manage_knowledge_graph`, `test_workspace_member_can_view_knowledge_graph`, `test_workspace_member_cannot_edit_knowledge_graph`, `test_workspace_editor_cannot_manage_knowledge_graph`, `test_user_without_workspace_role_cannot_access_knowledge_graph`.

**Scenario: Direct admin grant → all permissions**
- Code: Schema has `relation admin: user | group#member` on `knowledge_graph`; `manage = admin + ...`, `edit = admin + ...`, `view = admin + ...`.
- Tests: `test_direct_kg_admin_has_manage_permission`, `test_direct_kg_admin_has_edit_permission`, `test_direct_kg_admin_has_view_permission`, `test_direct_kg_editor_has_edit_and_view_but_not_manage`, `test_direct_kg_viewer_has_view_only`.

