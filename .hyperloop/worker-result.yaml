### Requirement: Event Processing

#### Scenario: Normal processing
- Status: COVERED
- Code: `src/api/infrastructure/outbox/worker.py:170-191` — `_process_batch()` fetches unprocessed entries (excluding `processed_at IS NOT NULL` and `failed_at IS NOT NULL`), calls `_process_entries()`, then commits. `_process_entries()` at line 219 calls `handler.handle(event_type, payload)` and then `_mark_processed()` to set `processed_at` timestamp.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries` — verifies `handler.handle` and `probe.event_processed` are called.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerProcessBatch::test_marks_entry_as_processed` — verifies `session.execute` is called for the mark-processed update.
- Test (integration): `src/api/tests/integration/iam/test_outbox_consistency.py::TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb` — verifies `processed_at` is set and SpiceDB relationship exists after `_process_batch()`.

#### Scenario: Transient failure
- Status: COVERED
- Code: `src/api/infrastructure/outbox/worker.py:245-268` — `_handle_processing_failure()`: if `new_retry_count < max_retries`, calls `_increment_retry()` which updates `retry_count` and `last_error` columns (lines 299-324).
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count` — asserts `probe.event_processing_failed` is called and `probe.event_moved_to_dlq` is NOT called.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerRetryBehavior::test_transient_failure_does_not_dlq_immediately` — confirms non-UnknownEventTypeError failures increment retry, not DLQ.

#### Scenario: Permanent failure (dead letter)
- Status: COVERED
- Code: `src/api/infrastructure/outbox/worker.py:262-264` — when `new_retry_count >= max_retries`, calls `_move_to_dlq()` which sets `retry_count`, `last_error`, and `failed_at` timestamp (lines 270-297). The polling query at line 176 excludes entries with `failed_at IS NOT NULL`, so they are never re-processed.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq` — verifies `probe.event_moved_to_dlq` is called and `probe.event_processing_failed` is NOT called.

