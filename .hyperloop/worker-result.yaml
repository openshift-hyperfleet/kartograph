### Requirement: Event Fan-Out — PASS

**Multiple handlers registered scenario:**
- `CompositeEventHandler.register()` appends the handler to the dispatch list for
  each event type it declares. `handle()` invokes all registered handlers in order.
- Test: `test_handle_fans_out_to_multiple_handlers` — two handlers for `SharedEvent`,
  both invoked with the same payload.

**Unknown event type scenario:**
- `CompositeEventHandler.handle()` raises `UnknownEventTypeError` (not `ValueError`)
  when no handler is registered. `OutboxWorker._process_entries()` catches
  `UnknownEventTypeError` and immediately calls `_move_to_dlq()`, bypassing the
  retry counter entirely.
- Test: `test_handle_raises_for_unknown_event_type` — confirms `UnknownEventTypeError`
  raised with correct `event_type` and `registered_types` attributes.
- Test: `test_unknown_event_type_immediately_moves_to_dlq` — with `max_retries=5`
  and `retry_count=0`, unknown event still goes directly to DLQ.
- Test: `test_retry_not_called_for_unknown_event_type` — patches `_increment_retry`
  and asserts it is never called for unknown event types.

