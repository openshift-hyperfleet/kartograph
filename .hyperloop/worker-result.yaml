## Requirement: Credential Encryption — COVERED

### Scenario: Store credentials
**Implementation:** `src/api/management/infrastructure/repositories/fernet_secret_store.py:53-70`
`FernetSecretStore.store()` encodes credentials as JSON, encrypts with `MultiFernet.encrypt()`,
and upserts via `session.merge()` into a table with composite PK `(path, tenant_id)`.

**Tests:**
- Unit: `test_fernet_secret_store.py::TestFernetRoundTrip` — covers single key, multiple
  credentials, and empty-value dicts.
- Integration: `tests/integration/management/test_fernet_secret_store.py::TestRoundTrip::test_store_and_retrieve`

### Scenario: Retrieve credentials
**Implementation:** `fernet_secret_store.py:72-93` — queries by `(path, tenant_id)`,
decrypts with `MultiFernet.decrypt()`, returns parsed dict.

**Tests:** Same round-trip tests verify decrypted output matches original input.

### Scenario: Credentials not found
**Implementation:** `fernet_secret_store.py:87-89` — raises `KeyError("Credentials not found")`
when `scalar_one_or_none()` returns `None`.

**Tests:**
- Unit: `TestRetrieveNotFound::test_raises_key_error`
- Integration: `TestNotFound::test_nonexistent_path_raises_key_error`

