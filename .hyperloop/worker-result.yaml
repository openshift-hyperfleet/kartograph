  ## Task-008: Knowledge Graphs — CodeRabbit PR Feedback Resolution (2026-04-23)

  Addressed actionable CodeRabbit comments. All 2064 unit tests pass.

  ---

  ### Changes Made

  #### 1. Added Tests for `GET /management/knowledge-graphs` (tenant-visible list)

  The `list_all_knowledge_graphs` route existed but had no unit test coverage.
  Added `TestListAllKnowledgeGraphs` class with 4 tests:
  - `test_list_all_knowledge_graphs_returns_200_with_list` — 200 with populated list
  - `test_list_all_knowledge_graphs_returns_200_with_empty_list` — 200 with empty list
  - `test_list_all_knowledge_graphs_calls_service_with_user_id` — verifies user_id passed to service
  - `test_list_all_knowledge_graphs_returns_401_when_not_authenticated` — 401 for unauthenticated

  #### 2. Encryption Key CSV Normalization

  Both `management/dependencies/knowledge_graph.py` and
  `management/dependencies/data_source.py` now strip whitespace and filter
  empty strings from the encryption key CSV before constructing `FernetSecretStore`.
  This prevents silent failures from trailing commas or padded entries in
  the `ENCRYPTION_KEY` environment variable.

  #### 3. IAM Workspace Create Route OpenAPI Fix

  `iam/presentation/workspaces/routes.py` `create_workspace` route now
  advertises `404` in its `responses` map (parent workspace not found or
  inaccessible), consistent with the exception handler that maps
  `UnauthorizedError` → HTTP 404.

  #### 4. YAML Format Fix for worker-result.yaml

  Reformatted this file to use a proper `report:` key with a literal block
  scalar (`|`) so the detail text is valid YAML.

