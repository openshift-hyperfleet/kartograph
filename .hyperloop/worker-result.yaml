### Requirement Coverage

**Requirement: Transactional Event Storage** — COVERED
- Scenario: Successful write — `OutboxRepository.append()` calls `session.add()` only,
  never `session.commit()`. Caller owns transaction boundary.
  Tests: `test_repository_append_does_not_commit`, `test_appends_outbox_model_to_session`.
- Scenario: Transaction rollback — Shared-session design means rollback discards both
  aggregate and outbox entry atomically.
  Tests: `test_failed_service_call_leaves_no_outbox_entries`.
  Integration: `test_rollback_removes_both_group_and_outbox_entry`.

**Requirement: Event Processing** — COVERED
- Scenario: Normal processing — `_process_batch()` fetches with FOR UPDATE SKIP LOCKED,
  invokes handler, marks processed, commits.
  Tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`,
  `test_calls_event_processed_on_success`.
- Scenario: Transient failure — `_handle_processing_failure()` increments `retry_count`,
  records `last_error`.
  Tests: `test_transient_failure_increments_retry_count`,
  `test_transient_failure_does_not_dlq_immediately`.
- Scenario: Permanent failure (DLQ) — `_move_to_dlq()` sets `failed_at`; both
  `_process_batch()` and `_process_single()` exclude `failed_at IS NOT NULL` entries.
  Tests: `test_max_retries_moves_entry_to_dlq`, `test_failed_entries_excluded_from_fetch`.

**Requirement: Idempotent Event Handlers** — COVERED
- Scenario: Duplicate delivery — `SpiceDBEventHandler` is idempotent by design: SpiceDB
  write/delete are upsert/set operations. Tested with a `FakeAuthorizationProvider` that
  uses a set-based relationship store (adding the same tuple twice results in one entry).
  Tests: `test_duplicate_invocation_produces_identical_final_state` (unit, set-based fake).

**Requirement: Concurrent Worker Safety** — COVERED
- Scenario: Concurrent workers — Both `_process_batch()` and `_process_single()` use
  `.with_for_update(skip_locked=True)`, preventing two workers from claiming the same row.
  Test: `test_fetch_unprocessed_uses_for_update_skip_locked` (compiles query with
  PostgreSQL dialect, asserts "SKIP LOCKED" present in rendered SQL).

**Requirement: Dual Delivery Mechanism** — COVERED
- Scenario: Real-time notification — `PostgresNotifyEventSource` uses `asyncpg-listen`
  to subscribe to a PostgreSQL NOTIFY channel. A DB trigger fires `pg_notify` on INSERT
  into the outbox table. On notification, `_process_single(entry_id)` is invoked.
  Tests: 23 unit tests in `test_postgres_notify_event_source.py`.
- Scenario: Polling fallback — `_poll_loop()` runs every `poll_interval_seconds` (default
  30s) regardless of the event source, calling `_process_batch()` to catch any missed
  events.
  Tests: polling logic verified via direct `_process_batch()` tests.

**Requirement: Event Fan-Out** — COVERED
- Scenario: Multiple handlers registered — `CompositeEventHandler.register()` appends to
  `_handlers_by_type[event_type]`; `handle()` iterates all handlers for the type.
  Test: `test_handle_fans_out_to_multiple_handlers`.
- Scenario: Unknown event type — `CompositeEventHandler.handle()` raises
  `UnknownEventTypeError`. `OutboxWorker._process_entries()` catches it before the generic
  `except Exception` clause and calls `_move_to_dlq()` immediately, bypassing all retry
  logic.
  Tests: `test_unknown_event_type_immediately_moves_to_dlq`,
  `test_unknown_event_type_dlq_even_at_zero_retries`,
  `test_retry_not_called_for_unknown_event_type`,
  `test_handle_raises_for_unknown_event_type`.

