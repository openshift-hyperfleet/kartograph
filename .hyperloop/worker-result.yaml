## Spec Alignment Review — API Keys (task-021)

Independent spec alignment review. All 6 SHALL requirements and 17 scenarios from
`specs/iam/api-keys.spec.md` are fully implemented and tested.

Unit tests: **2031 passed, 0 failed**.

---

### REQ-1: API Key Creation — COVERED

**Implementation:**
- `security.py`: `generate_api_key_secret()` produces `karto_`-prefixed secrets,
  `extract_prefix()` takes first 12 chars, `hash_api_key_secret()` uses bcrypt (work factor 12).
- `api_key_service.py::create_api_key()`: generates secret, hashes it, stores 12-char prefix,
  checks `CREATE_API_KEY` permission via SpiceDB before creating.
- `presentation/api_keys/models.py::CreateAPIKeyRequest`: `name` field has `min_length=1,
  max_length=255`; `expires_in_days` has `ge=1, le=3650, default=30`.
- `APIKeyCreatedResponse` returns `secret` (plaintext) once; `APIKeyResponse` never includes it.

**Scenario: Successful creation** — COVERED
- `test_api_key_service.py::test_secret_has_karto_prefix` — `karto_` prefix verified
- `test_api_key_service.py::test_returns_plaintext_secret_only_at_creation` — returned once
- `test_api_key_service.py::test_creates_api_key_with_hashed_secret` — hash ≠ plaintext
- `test_api_key_service.py::test_stores_prefix_from_secret` — prefix == `secret[:12]`
- `test_api_key_routes.py::test_returns_secret_in_response` — route returns secret at creation

**Scenario: Duplicate name per user → 409** — COVERED
- `test_api_key_repository.py::test_raises_on_duplicate_name` — repository raises
- `test_api_key_service.py::test_raises_on_duplicate_name` — service propagates
- `test_api_key_routes.py::test_returns_409_on_duplicate_name` — route returns 409

**Scenario: Expiration bounds (1–3650, default 30)** — COVERED
- `test_api_key_routes.py::test_validates_expires_in_days_minimum` — 0 days → 422
- `test_api_key_routes.py::test_validates_expires_in_days_maximum` — 3651 days → 422
- `test_api_key_routes.py::test_uses_default_expires_in_days_of_30` — omitting param → 30 days
- `test_api_key_service.py::test_creates_with_expiration` — expiration date computed correctly

