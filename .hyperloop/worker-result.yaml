### Requirement: Knowledge Graph Name Validation — COVERED

**Code:** `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`. Pydantic request models (`CreateKnowledgeGraphRequest`, `UpdateKnowledgeGraphRequest`) apply the same constraint at the HTTP boundary.

**Tests:**
- Scenario "Valid name": `test_create_accepts_name_exactly_100_chars`, `test_create_accepts_single_char_name` (domain unit).
- Scenario "Empty or oversized name": `test_create_rejects_empty_name`, `test_create_rejects_name_over_100_chars`, `test_update_rejects_empty_name`, `test_update_rejects_name_over_100_chars` (domain unit); `test_create_knowledge_graph_returns_422_for_empty_name`, `test_create_knowledge_graph_returns_422_for_oversized_name`, `test_update_knowledge_graph_returns_422_for_empty_name`, `test_update_knowledge_graph_returns_422_for_oversized_name` (route unit — HTTP 422).

