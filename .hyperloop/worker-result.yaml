#### R8 — Mandatory System Properties
**SHALL**: `data_source_id`, `source_path`, `slug` (nodes), `knowledge_graph_id` required on CREATE.

- **Code**: `MutationOperation.validate_operation()` checks each property explicitly for CREATE ops.

Scenarios:
- **Node system properties** (test_domain_value_objects.py):
  - `test_create_requires_data_source_id`, `test_create_requires_source_path`,
    `test_create_node_requires_slug`, `test_create_node_requires_knowledge_graph_id`. COVERED.
- **Edge system properties**:
  - `test_create_edge_requires_knowledge_graph_id` — edge without `knowledge_graph_id` rejected.
  - `test_create_edge_valid` — edge with `data_source_id`, `source_path`, `knowledge_graph_id` passes. COVERED.

