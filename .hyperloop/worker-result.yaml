### Requirement: Event Processing — COVERED

**Scenario: Normal processing** — COVERED
- **Code:** `OutboxWorker._process_entries()` calls `handler.handle(event_type, payload)`,
  then `_mark_processed()` which executes `UPDATE outbox SET processed_at=now()`.
- **Unit tests:** `TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries`,
  `test_marks_entry_as_processed`,
  `TestOutboxWorkerProbeIntegration::test_calls_event_processed_on_success`.
- **Integration test:** `TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb`
  — asserts `outbox_entry.processed_at is not None` and SpiceDB relationship present.

**Scenario: Transient failure** — COVERED
- **Code:** `OutboxWorker._handle_processing_failure()` calls `_increment_retry()`
  (sets `retry_count` and `last_error`) when `new_retry_count < max_retries`.
- **Unit test:** `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count`
  — asserts `probe.event_processing_failed` called; `probe.event_moved_to_dlq` not called.

**Scenario: Permanent failure (dead letter)** — COVERED
- **Code:** `_handle_processing_failure()` calls `_move_to_dlq()` (sets `failed_at=now()`)
  when `new_retry_count >= max_retries`.
- **Unit test:** `TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq`
  — asserts `probe.event_moved_to_dlq` called; `probe.event_processing_failed` not called.

