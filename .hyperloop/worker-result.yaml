## Requirement: API Key Authentication

### Scenario: Valid key
**Status: COVERED**

- Implementation: `src/api/iam/dependencies/user.py` — `_authenticate()` tries JWT first, then `X-API-Key` header; calls `api_key_service.validate_and_get_key()`.
- Service: `src/api/iam/application/services/api_key_service.py` — `validate_and_get_key()` verifies hash, checks validity, calls `record_usage()`, saves updated key.
- Tests:
  - `tests/integration/test_api_key_auth.py::TestAPIKeyAuthentication::test_authenticates_with_valid_api_key`
  - `tests/integration/test_api_key_auth.py::TestAPIKeyAuthentication::test_updates_last_used_at_on_success`
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceValidate::test_validates_correct_secret`
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceValidate::test_updates_last_used_at`

### Scenario: Expired key
**Status: COVERED**

- Implementation: `src/api/iam/domain/aggregates/api_key.py` — `is_valid()` returns False if `datetime.now(UTC) >= self.expires_at`.
- Tests:
  - `tests/unit/iam/domain/test_api_key_aggregate.py::TestAPIKeyValidity::test_expired_key_returns_false`
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceValidate::test_returns_none_for_expired_key`
  - `tests/integration/test_api_key_auth.py::TestAPIKeyAuthentication::test_returns_401_for_invalid_api_key` (covers invalid/expired path)

### Scenario: Revoked key
**Status: COVERED**

- Implementation: `src/api/iam/domain/aggregates/api_key.py` — `is_valid()` returns False if `self.is_revoked`.
- Tests:
  - `tests/unit/iam/domain/test_api_key_aggregate.py::TestAPIKeyValidity::test_revoked_key_returns_false`
  - `tests/unit/iam/application/test_api_key_service.py::TestAPIKeyServiceValidate::test_returns_none_for_revoked_key`
  - `tests/integration/test_api_key_auth.py::TestAPIKeyAuthentication::test_returns_401_for_revoked_api_key`

### Scenario: JWT takes precedence
**Status: COVERED**

- Implementation: `src/api/iam/dependencies/user.py` — `_authenticate()` checks `token is not None` first; if JWT present and valid, returns without checking `x_api_key`.
- Tests:
  - `tests/integration/test_api_key_auth.py::TestDualAuthentication::test_prefers_jwt_when_both_provided`
  - `tests/integration/test_api_key_auth.py::TestDualAuthentication::test_invalid_jwt_with_valid_api_key_uses_api_key` — validates JWT-first behavior (JWT fails -> 401, not fallthrough to API key)

### Scenario: Prefix collision
**Status: COVERED**

- Implementation: `src/api/iam/infrastructure/api_key_repository.py` — `get_verified_key()` detects `len(models) > 1` and calls `self._probe.api_key_prefix_collision(prefix, len(models))`.
- Probe: `src/api/iam/infrastructure/observability/api_key_repository_probe.py` — `api_key_prefix_collision()` logs at ERROR level via `self._logger.error(...)`.
- All candidates iterated via bcrypt comparison.
- Tests:
  - `tests/unit/iam/infrastructure/test_api_key_repository.py::TestAPIKeyRepositoryGetVerifiedKey::test_logs_error_on_prefix_collision`

