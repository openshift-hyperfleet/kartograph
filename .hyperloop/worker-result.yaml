#### REQ-4: Concurrent Worker Safety — COVERED

**Implementation:** Both `OutboxRepository.fetch_unprocessed()` and
`OutboxWorker._process_batch()` / `_process_single()` use
`.with_for_update(skip_locked=True)`.

**Scenario: Concurrent workers — COVERED**
- Code: `select(OutboxModel)...with_for_update(skip_locked=True)` in both paths.
- Unit test: `test_worker.py::TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  compiles the query with the PostgreSQL dialect and asserts `"SKIP LOCKED"` appears in
  the rendered SQL. Entry claimed by first worker is invisible to the second.

---

#### REQ-5: Dual Delivery Mechanism — COVERED

**Implementation:**
- Real-time: `infrastructure/outbox/event_sources/postgres_notify.py::PostgresNotifyEventSource`
  uses `asyncpg-listen.NotificationListener` to receive NOTIFY events and invoke
  `_process_single(entry_id)` sub-second.
- Polling fallback: `OutboxWorker._poll_loop()` calls `_process_batch()` every
  `poll_interval_seconds` (default 30). Both tasks always started.

**Scenario: Real-time notification — COVERED**
- Code: `PostgresNotifyEventSource.start()` registers handler on `outbox_events` channel;
  on NOTIFY, parses UUID payload and awaits `on_event(entry_id)`.
- Unit tests: `test_postgres_notify_event_source.py` — 20+ tests (notification delivery,
  UUID parsing, invalid payload graceful skip, timeout skip, graceful stop).
- Integration test: `TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling`
  creates worker with `poll_interval_seconds=999`, inserts group, waits 500 ms, asserts
  `processed_at` is set — proving NOTIFY triggered processing, not the poll timer.

**Scenario: Polling fallback — COVERED**
- Code: `_poll_loop()` always runs regardless of event source presence.
- Integration test: `TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb`
  creates worker with NO event_source (polling-only) and directly calls `_process_batch()`.
  Asserts `processed_at` set and SpiceDB relationship written — demonstrating the polling
  path picks up entries independently of NOTIFY.

