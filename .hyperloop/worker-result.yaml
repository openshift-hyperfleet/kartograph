## task-008: Knowledge Graphs — Spec Alignment Review

Reviewed spec: `specs/management/knowledge-graphs.spec.md`
Branch: `hyperloop/task-008`

---

### Requirement: Knowledge Graph Creation — COVERED

**Code:** `management/application/services/knowledge_graph_service.py::create()`
- Checks EDIT permission on the workspace via `_check_permission()`.
- Creates the aggregate with `KnowledgeGraph.create()`, which calls `KnowledgeGraphId.generate()` using `ULID()` from the `ulid` package.
- Associates KG with workspace and tenant (fields set on aggregate).
- Authorization relationships established asynchronously via outbox: `ManagementEventTranslator._translate_knowledge_graph_created()` produces two `WriteRelationship` operations — `knowledge_graph#workspace@workspace` and `knowledge_graph#tenant@tenant`.

**Tests:**
- Scenario "Successful creation": `test_create_saves_aggregate_via_repo`, `test_create_generates_unique_id`, `test_create_emits_knowledge_graph_created_event` (domain); `test_first_operation_is_workspace_relationship`, `test_second_operation_is_tenant_relationship` (outbox translator unit); `test_saves_and_retrieves_knowledge_graph` (integration repository).
- Scenario "Duplicate name": `test_create_raises_duplicate_on_integrity_error` (service unit); `test_create_knowledge_graph_returns_409_for_duplicate_name` (route unit); `test_duplicate_name_in_same_tenant_raises_error` (integration repository).

