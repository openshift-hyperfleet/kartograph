### Spec Coverage

**Creation** — `POST /management/workspaces/{id}/knowledge-graphs` → 201;
ULID generated, workspace/tenant associated, SpiceDB relationships written;
duplicate name → 409.

**Name Validation** — Pydantic enforces 1–100 chars at boundary (422); domain
`KnowledgeGraph.__post_init__` enforces invariant internally.

**Retrieval** — `GET /management/knowledge-graphs/{id}` → 200 or 404;
VIEW permission checked; unauthorized and missing both return 404 (no leakage).

**Listing** — `GET /management/workspaces/{id}/knowledge-graphs` filters by
VIEW permission via SpiceDB; `GET /management/knowledge-graphs` lists all
tenant-scoped KGs visible to user.

**Update** — `PATCH /management/knowledge-graphs/{id}` → 200; EDIT permission
checked; `AggregateDeletedError` raised if KG is already deleted.

**Deletion** — `DELETE /management/knowledge-graphs/{id}` → 204; MANAGE
permission checked; data sources (+ encrypted credentials) deleted first inside
one SQLAlchemy transaction; KG record deleted last; rollback on DS failure
verified by `test_delete_rolls_back_on_ds_deletion_failure`.

**Permission Inheritance** — SpiceDB schema:
```
permission view   = admin + editor + viewer + workspace->view
permission edit   = admin + editor + workspace->edit
permission manage = admin + workspace->manage
```
Workspace-inherited access and direct-admin grant both covered.

