#### REQ 5: CREATE Operation (SHALL)

**Implementation:** Service validates against type definitions (in batch or repo).
`_execute_creates()` uses staging tables + `_build_update_existing_query()` (jsonb `||`
merge) for idempotent merge. New entities use NOT EXISTS INSERT. `_discover_optional_properties()`
handles schema learning after successful apply.

**Scenario: Create a new node**
- Tests: Integration `test_repeated_batch_is_idempotent` (creates 2 nodes, verifies count=2);
  `test_creates_edge_label_tables_on_empty_database`
- **Status: COVERED**

**Scenario: Create an existing node (idempotent merge)**
- Tests: Integration `test_create_merges_properties_on_existing_node` — second CREATE
  preserves `age=30` (absent in second batch) and adds `email`; count remains 1.
  Unit `TestUpdateExistingQueryMergeSemantics` — verifies jsonb `||` operator in SQL.
- **Status: COVERED**

**Scenario: Create an edge**
- Tests: Integration `test_creates_edge_label_tables_on_empty_database` — edge created
  between two nodes, count=1 verified via Cypher
- **Status: COVERED**

**Scenario: Missing type definition**
- Tests: `test_rejects_create_without_define_in_batch` — `result.success=False`,
  "person" and "not defined" in error message, applier not called
- **Status: COVERED**

**Scenario: Missing required properties**
- Tests: `test_rejects_create_missing_required_properties` (missing "email");
  `test_rejects_create_missing_system_properties` (missing "slug" from same-batch DEFINE)
- **Status: COVERED**

**Scenario: Schema learning**
- Tests: `test_schema_learning.py::test_extra_properties_added_to_optional` — extra props
  ("email", "age") added to optional_properties; `data_source_id`/`source_path` excluded;
  `test_optional_properties_accumulate` verifies accumulation across calls;
  `test_knowledge_graph_id_excluded_from_schema_learning`
- **Status: COVERED**

