### Requirement 6: Event Fan-Out — COVERED

**Implementation:** `CompositeEventHandler` (composite.py) maintains a
`dict[str, list[EventHandler]]`; dispatching calls all handlers for the event type;
unknown types raise `UnknownEventTypeError` (not `ValueError`, distinguishable by
the worker).

**Scenario: Multiple handlers registered**
- Unit test: `test_handle_fans_out_to_multiple_handlers` (test_composite.py:104) —
  two handlers registered for `SharedEvent`; both called exactly once.

**Scenario: Unknown event type**
- Unit test: `test_handle_raises_for_unknown_event_type` (test_composite.py:120) —
  raises `UnknownEventTypeError` with `event_type` and `registered_types` attributes.
- Unit test: `test_unknown_event_type_error_is_not_value_error` (test_composite.py:140) —
  asserts exception is NOT a `ValueError` (so worker's `isinstance` check works).
- Unit tests (worker): `test_unknown_event_type_immediately_moves_to_dlq` (test_worker.py:458),
  `test_unknown_event_type_dlq_even_at_zero_retries` (test_worker.py:495), and
  `test_retry_not_called_for_unknown_event_type` (test_worker.py:523) — confirm
  `_increment_retry` never called; `_move_to_dlq` always called for
  `UnknownEventTypeError`.

