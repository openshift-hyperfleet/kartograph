## Spec Compliance — Requirement 8 (Query Console KG Context)

The prior review identified FAIL 4 (PARTIAL): `selectedKgId` was populated in the UI but never forwarded to `queryGraph()`, and the test exercised a standalone stub rather than real production code.

The fix correctly addresses all three required changes:

1. **`useQueryApi.ts`** — `buildQueryGraphArgs()` extracted as a pure exported function; `queryGraph()` now accepts `knowledgeGraphId?: string` as a fourth parameter and passes it through as `knowledge_graph_id` in the MCP tool arguments.

2. **`query/index.vue`** — `executeQuery()` now passes `selectedKgId.value || undefined` as the fourth argument to `queryGraph()`. An empty string (unscoped) correctly becomes `undefined`, so no `knowledge_graph_id` field is emitted in the MCP call.

3. **`knowledge-graphs.test.ts`** — Tests now import `buildQueryGraphArgs` from the real production module. Three targeted tests verify: (a) KG ID included when scoped, (b) `knowledge_graph_id` absent when unscoped, (c) empty-string-to-`undefined` gate matches component behavior.

All 16 requirements from `specs/ui/experience.spec.md` are now COVERED.

