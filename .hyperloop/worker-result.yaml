| Permission Inheritance | Workspace-inherited access (workspace->edit, workspace->manage) | ✅ |
| Permission Inheritance | Direct admin grant → manage + edit + view | ✅ |

### Implementation

- **Domain** (`management/domain/aggregates/knowledge_graph.py`): KnowledgeGraph
  aggregate with `create()`, `update()`, `mark_for_deletion()`, validation,
  and event collection.
- **Application** (`management/application/services/knowledge_graph_service.py`):
  `KnowledgeGraphService` with create, get, list_for_workspace, update, delete
  (with cascade).
- **Ports** (`management/ports/repositories.py`, `management/ports/exceptions.py`):
  `IKnowledgeGraphRepository`, `UnauthorizedError`, `DuplicateKnowledgeGraphNameError`.
- **Infrastructure** (`management/infrastructure/`): SQLAlchemy repository, outbox
  serializer and translator.
- **Presentation** (`management/presentation/knowledge_graphs/`): FastAPI routes
  following API conventions spec.
- **SpiceDB schema**: `knowledge_graph` definition with workspace/tenant relations
  and `view`/`edit`/`manage` permissions with proper inheritance.

