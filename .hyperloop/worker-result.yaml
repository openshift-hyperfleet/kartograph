## Task 017: Outbox Pattern — Fresh Attempt (2026-04-23)

Branch: `hyperloop/task-017`
Spec: `specs/shared-kernel/outbox.spec.md@86d0f4fc5118312577593defb88be1d5005b72cf`

Unit test suite: **2187 tests passing** (130 outbox-specific)

---

### Requirement Coverage

#### REQ-1: Transactional Event Storage — COVERED

**Code:** `OutboxRepository.append()` calls `session.add()` only; never `session.commit()`.
The calling service owns the transaction boundary (documented in docstring and enforced by design).

**Scenario: Successful write**
- `src/api/infrastructure/outbox/repository.py` — `append()` adds model to session without committing.
- Unit test: `test_repository_append_does_not_commit` verifies `session.add` is called once and `session.commit` is never called.

**Scenario: Transaction rollback**
- Repository never commits; caller rollback discards both aggregate and outbox entry atomically.
- Unit test: `test_failed_service_call_leaves_no_outbox_entries` confirms no commit on failure path.

---

#### REQ-2: Event Processing — COVERED

**Code:** `OutboxWorker._process_entries()` dispatches to `handler.handle()`, marks entries processed,
increments retry count on transient failure, moves to DLQ when `new_retry_count >= max_retries`.

**Scenario: Normal processing** — `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`
**Scenario: Transient failure** — `test_transient_failure_increments_retry_count`, `test_calls_event_processing_failed_on_error`
**Scenario: Permanent failure (dead letter)** — `test_max_retries_moves_entry_to_dlq`

---

#### REQ-3: Idempotent Event Handlers — COVERED

**Code:** `SpiceDBEventHandler` uses SpiceDB upsert semantics (write_relationship is idempotent).
Fetch query filters `processed_at IS NULL AND failed_at IS NULL`.

**Scenario: Duplicate delivery**
- `TestSpiceDBEventHandlerIdempotency.test_duplicate_invocation_produces_identical_final_state`
- `TestOutboxWorkerIdempotency.test_already_processed_entry_excluded_from_fetch`

---

#### REQ-4: Concurrent Worker Safety — COVERED

**Code:** Both `OutboxRepository.fetch_unprocessed()` and `OutboxWorker._process_batch()` use
`.with_for_update(skip_locked=True)`.

**Scenario: Concurrent workers**
- `TestOutboxWorkerConcurrentSafety.test_fetch_unprocessed_uses_for_update_skip_locked`
  compiles query with PostgreSQL dialect and asserts `SKIP LOCKED` in rendered SQL.

---

#### REQ-5: Dual Delivery Mechanism — COVERED

**Code:** `PostgresNotifyEventSource` (asyncpg-listen) for real-time; `_poll_loop()` as fallback
every `poll_interval_seconds` (default: 30).

**Scenario: Real-time notification**
- `test_notify_triggers_callback_with_uuid`, `test_callback_receives_correct_uuid_type`

**Scenario: Polling fallback**
- `_poll_loop()` runs unconditionally regardless of event source presence.

---

#### REQ-6: Event Fan-Out — COVERED

**Code:** `CompositeEventHandler.register()` appends handlers to a per-type list;
`handle()` dispatches to ALL handlers for the event type.
Raises `UnknownEventTypeError` for unregistered types — caught by worker to immediately DLQ.

**Scenario: Multiple handlers registered** — `test_handle_fans_out_to_multiple_handlers`
**Scenario: Unknown event type** — `test_handle_raises_for_unknown_event_type`,
  `test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`

