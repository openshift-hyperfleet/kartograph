### Deliverables

#### 1. Domain Event: `SyncStarted`

Replaced `DataSourceSyncRequested` with `SyncStarted` in `management/domain/events/data_source.py`.
The new event carries all fields needed by the ingestion context (`sync_run_id`,
`adapter_type`, `connection_config`, `credentials_path`, `tenant_id`, `knowledge_graph_id`,
`requested_by`). The `DataSource.request_sync()` aggregate method now accepts `sync_run_id`
and emits `SyncStarted`. All downstream artifacts (serializer, translator, `DomainEvent` union)
updated accordingly.

#### 2. Sync Run Lifecycle Statuses (DB migration)

Migration `e1f2a3b4c5d6_expand_sync_run_lifecycle_statuses.py` expands the
`ck_sync_runs_status` CHECK constraint from `('pending', 'running', 'completed', 'failed')`
to the full 6-state set: `pending → ingesting → ai_extracting → applying → completed / failed`.

`DataSourceSyncRun` entity updated with `TERMINAL_STATUSES`, `VALID_STATUSES`, and
`is_terminal()` predicate. SQLAlchemy model CHECK constraint updated to match.

#### 3. `SyncLifecycleHandler` (management infrastructure)

`management/infrastructure/sync_lifecycle_handler.py` implements the full 7-event
state machine:

| Event | Status Transition |
|---|---|
| `SyncStarted` | → `ingesting` |
| `JobPackageProduced` | → `ai_extracting` |
| `IngestionFailed` | → `failed` (with error) |
| `MutationLogProduced` | → `applying` |
| `ExtractionFailed` | → `failed` (with error) |
| `MutationsApplied` | → `completed`, updates `DataSource.last_sync_at` |
| `MutationApplicationFailed` | → `failed` (with error) |

Terminal states (`completed`, `failed`) are idempotent — further events are silently
ignored. Missing sync runs are also handled gracefully (no-op).

#### 4. Ingestion Bounded Context

Complete `ingestion/` bounded context scaffolded:

- **`ingestion/ports/adapters.py`**: `RawItem` dataclass + `IDataSourceAdapter` Protocol
- **`ingestion/domain/events/sync.py`**: `JobPackageProduced` + `IngestionFailed` events
- **`ingestion/application/services/ingestion_service.py`**: `IngestionService.run()`
  orchestrates adapter extract → `JobPackageBuilder` → returns `JobPackageId`
- **`ingestion/infrastructure/event_handler.py`**: `IngestionEventHandler` subscribes to
  `SyncStarted`, calls `IngestionService.run()`, writes `JobPackageProduced` or
  `IngestionFailed` to the outbox
- **`ingestion/infrastructure/outbox/serializer.py`**: `IngestionEventSerializer`

#### 5. Stub Events for Extraction and Graph Contexts

- `extraction/domain/events/extraction.py`: `MutationLogProduced` + `ExtractionFailed`
- `graph/domain/events/graph.py`: `MutationsApplied` + `MutationApplicationFailed`

These stubs establish the bounded context event contracts consumed by `SyncLifecycleHandler`.

