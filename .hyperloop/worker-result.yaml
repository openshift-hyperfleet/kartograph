## task-017 Outbox Pattern — Implementation Complete

### Summary

All spec requirements are fully implemented and verified by 155 outbox-specific
unit tests (2413 total unit tests pass). No regressions.

### Spec Coverage

**Requirement: Transactional Event Storage**
- `OutboxRepository.append()` adds entries via `session.add()` (never commits).
- Repository shares the caller's `AsyncSession`, ensuring aggregate changes and
  outbox entries commit or roll back together.
- Tests: `test_repository_append_does_not_commit`,
  `test_failed_service_call_leaves_no_outbox_entries`.

**Requirement: Event Processing (normal, transient failure, permanent DLQ)**
- `OutboxWorker._process_batch()` fetches unprocessed entries, delegates to
  `EventHandler.handle()`, then marks entries processed.
- Transient failures: `_increment_retry()` increments `retry_count` and
  records `last_error`.
- Permanent failures (max retries exceeded): `_move_to_dlq()` sets `failed_at`.
- Tests: `test_transient_failure_increments_retry_count`,
  `test_max_retries_moves_entry_to_dlq`.

**Requirement: Idempotent Event Handlers**
- `fetch_unprocessed()` filters `processed_at IS NULL` and `failed_at IS NULL`.
- `FOR UPDATE SKIP LOCKED` prevents concurrent workers from processing the same
  entry twice.
- `SpiceDBEventHandler` delegates to SpiceDB which is idempotent for relationship
  writes.
- Tests: `test_already_processed_entry_excluded_from_fetch`,
  `test_fetch_unprocessed_uses_for_update_skip_locked`.

**Requirement: Concurrent Worker Safety**
- `fetch_unprocessed()` uses `.with_for_update(skip_locked=True)` so each entry
  is claimed by exactly one worker under concurrent load.
- Test: `test_fetch_unprocessed_uses_for_update_skip_locked`.

**Requirement: Dual Delivery Mechanism**
- `OutboxWorker` runs a polling loop (`_poll_loop`) every `poll_interval_seconds`
  (default 30s) as the reliable fallback.
- Optional `PostgresNotifyEventSource` injects real-time NOTIFY-based triggering
  for sub-second processing.
- Tests: `test_in_progress_batch_completes_before_shutdown`, full
  `TestPostgresNotifyEventSource*` suite (17 tests).

**Requirement: Event Fan-Out**
- `CompositeEventHandler` routes each event to all handlers registered for that
  type, enabling multiple handlers per event (fan-out).
- Tests: `test_handle_fans_out_to_multiple_handlers`,
  `test_supported_event_types_union`.

**Requirement: Unknown Event Type — Immediate DLQ**
- `CompositeEventHandler.handle()` raises `UnknownEventTypeError` (distinct from
  `ValueError`) when no handler is registered.
- `OutboxWorker._process_entries()` catches `UnknownEventTypeError` and
  immediately calls `_move_to_dlq()` without incrementing retry count.
- Tests: `test_unknown_event_type_immediately_moves_to_dlq`,
  `test_retry_not_called_for_unknown_event_type`.

