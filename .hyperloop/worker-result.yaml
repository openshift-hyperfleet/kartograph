### Requirements Coverage

All 6 SHALL requirements and all 11 scenarios fully implemented and tested:

- **Transactional Event Storage**: `OutboxRepository.append()` never commits;
  atomicity guaranteed by shared session. Tests: `test_repository_append_does_not_commit`,
  `test_failed_service_call_leaves_no_outbox_entries`.

- **Event Processing**: Normal flow, transient failure (retry_count increment +
  last_error), permanent failure (failed_at DLQ). All scenarios covered by
  dedicated unit tests.

- **Idempotent Event Handlers**: `fetch_unprocessed` filters `processed_at IS NULL`;
  SpiceDB handler uses upsert semantics. Tests: `test_already_processed_entry_excluded_from_fetch`,
  `test_duplicate_invocation_produces_identical_final_state`.

- **Concurrent Worker Safety**: `with_for_update(skip_locked=True)` enforced.
  Test: `test_fetch_unprocessed_uses_for_update_skip_locked` validates "SKIP LOCKED"
  in compiled PostgreSQL query.

- **Dual Delivery Mechanism**: `PostgresNotifyEventSource` + `asyncpg-listen`
  for real-time; `_poll_loop()` every `poll_interval_seconds` (default 30) for
  fallback. Both paths covered by unit tests.

- **Event Fan-Out**: `CompositeEventHandler` fans out to all registered handlers
  per event type; unknown event types immediately DLQ via `UnknownEventTypeError`
  (not retried). Multiple dedicated tests including
  `test_unknown_event_type_immediately_moves_to_dlq` and
  `test_retry_not_called_for_unknown_event_type`.
