All three FAIL items from the prior review have been addressed:

## FAIL-1 — REQ-1 Expiration Bounds: Default 30-day expiration now tested

Added `TestCreateAPIKeyRoute::test_uses_default_expires_in_days_of_30` in
`tests/unit/iam/presentation/test_api_key_routes.py`.

The test sends `POST /iam/api-keys` with only `{"name": "my-api-key"}` (no
`expires_in_days`) and asserts `mock_api_key_service.create_api_key` was called
with `expires_in_days=30`. This exercises the Pydantic `Field(30, ...)` default
end-to-end through the route layer.

## FAIL-2 — REQ-2 Expired Key: End-to-end expired-key → 401 now tested

Added `expired_api_key_secret` fixture and
`TestAPIKeyAuthentication::test_returns_401_for_expired_api_key` in
`tests/integration/test_api_key_auth.py`.

The fixture bypasses the route's 1-day minimum by inserting a key with
`expires_at = now() - 1 day` directly into PostgreSQL via `text()` SQL. It uses
bcrypt work factor 4 (rather than the production 12) so that hash verification
remains fast in tests while still exercising the `get_verified_key` →
`is_valid()` → 401 path end-to-end through the REST API.

## FAIL-3 — REQ-4 Owner Revocation AND clause: Revoked key visible in listing now tested

Added `TestAPIKeyAuthorizationEnforcement::test_revoked_key_remains_visible_in_listing`
in `tests/integration/test_api_key_auth.py`.

The test chains: create key → `process_outbox()` (ensures SpiceDB owner
relationship) → revoke key → list keys → assert the revoked entry is present
with `is_revoked=True`. This exercises the spec's "AND the key remains visible
in listings" clause through the full stack.

