**Implementation:** `app/components/ui/copyable-text/CopyableText.vue`, `vue-sonner` toast, inline dialogs/sheets throughout.

**Tests:** COVERED for: copy-to-clipboard (with toast), mutation feedback (success/error toasts, inline validation), progressive disclosure (collapse/expand/sheet), inline editing pattern, keyboard shortcut Ctrl/Cmd+Enter. (`interaction-principles.test.ts`, `query-history.test.ts`)

