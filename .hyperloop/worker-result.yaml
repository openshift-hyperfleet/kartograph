# Worker Result: task-034 Credentials — PASS

## Assignment Summary

This worker was assigned to fix the implementation gap identified in the prior
spec-alignment review: `KnowledgeGraphService.delete()` did not call
`secret_store.delete()` for each data source's credentials when cascading KG
deletion, and the corresponding unit tests were missing.

## Findings Resolution

### Knowledge graph cascade — FIXED

**Implementation** (`knowledge_graph_service.py`):
- `KnowledgeGraphService.__init__` accepts `secret_store: ISecretStoreRepository | None = None`
- `KnowledgeGraphService.delete()` invokes `self._secret_store.delete(path=ds.credentials_path, tenant_id=...)` for each data source with a credentials path before deleting the DS record

**Tests** (`test_knowledge_graph_service.py`):
- `test_delete_removes_credentials_for_data_sources_with_credentials_path`: asserts `mock_secret_store.delete` is called exactly once for the DS with credentials; both DSes and the KG are still deleted from the DB
- `test_delete_skips_credential_cleanup_when_no_secret_store`: asserts that when `secret_store=None`, the cascade still deletes the DS and KG rows without raising

Both tests use real `DataSource` instances via `_make_ds()` factory (not bare `MagicMock`).

