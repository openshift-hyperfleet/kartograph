### Requirement: Design Language — COVERED

**Implementation:** `app/assets/css/main.css` defines OKLCH custom properties for all colors, `--radius: 0.625rem` base, radius scale, `.dark {}` block, `outline-ring/50` focus style. `package.json` includes shadcn/vue (reka-ui), tailwindcss, class-variance-authority, lucide-vue-next.

**Tests:** COVERED (`design-system.test.ts`). Tests verify: primary OKLCH values (light/dark), neutral grays, destructive color, 5 chart colors, border radius base and scale, sidebar tokens, focus indicator (`outline-ring/50`), dark mode selector, and all component library dependencies.

**Gap (Typography and Elevation):** The spec requires body text uses `text-sm`, section headers use `text-[11px] tracking-wider`, and elevation uses `shadow-sm`/`shadow-xs`. The design-system test file comments mention these but no actual tests exist for typography or elevation rules. The CSS does not define these as custom properties (they are Tailwind utility classes applied in components), so the test gap is real.

