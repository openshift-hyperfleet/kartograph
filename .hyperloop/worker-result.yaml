## Requirement: Key Rotation — COVERED

### Scenario: Key rotation
**Implementation:** `fernet_secret_store.py:50` — `MultiFernet([Fernet(key) for key in encryption_keys])`.
First key encrypts new credentials; all keys are tried for decryption. Rotation is achieved by
prepending a new key to the list while retaining the old key as fallback.

**Tests:**
- Unit: `TestMultiFernetRotation::test_decrypt_with_rotated_keys` — encrypts with `key1`, creates
  a new store with `[key2, key1]`, verifies old ciphertext decrypts successfully.
- Integration: None (acceptable — the `MultiFernet` library behavior is deterministic and the unit
  test fully covers the scenario).

