- **Integration** (`test_single_role_enforcement.py`):
  `TestWorkspaceSingleRole::test_adding_user_with_different_role_replaces_old_role`
  verifies end-state permissions (EDIT=True, MANAGE=False) after role replacement ✓
- Pattern also covered for Group (`TestGroupSingleRole`) and Tenant (`TestTenantSingleRole`) ✓

