### Implementation Quality Notes

**`feat(shared-kernel)`: UnknownEventTypeError**
New `shared_kernel/outbox/exceptions.py` introduces `UnknownEventTypeError` — a domain
exception (not `ValueError`) for permanent outbox failures. Exposes `.event_type` and
`.registered_types`. 6-test unit suite plus 5 worker tests verify the contract including
`_increment_retry` is not called.

**`fix(management)`: cascade delete credential cleanup**
`KnowledgeGraphService.delete()` now injects optional `ISecretStoreRepository` and calls
`secret_store.delete(path, tenant_id)` for each `DataSource` with `credentials_path`
before deletion. Tests use real `DataSource` instances via `_make_ds()` helper.

**`fix(process)`: check scripts**
`check-cascade-delete-empty-collection-mocks.sh` and `check-no-foreign-task-commits.sh`
added to close pre-existing gaps in process infrastructure. Both new scripts pass.
