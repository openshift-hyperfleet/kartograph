## Task 017: Outbox Pattern — Fresh Attempt Verdict (2026-04-23)

Implementation of the transactional outbox pattern against
`specs/shared-kernel/outbox.spec.md@86d0f4fc5118312577593defb88be1d5005b72cf`.

All 255 outbox-specific unit tests pass; full suite: 2187 passed, 0 failed.

---

### Requirement: Transactional Event Storage — PASS

**Scenario: Successful write**
- `infrastructure/outbox/repository.py` — `OutboxRepository.append()` calls
  `session.add(model)` and never `session.commit()`. Session is shared with
  the calling service, ensuring atomicity.
- Unit test: `test_repository_append_does_not_commit` in
  `tests/unit/infrastructure/outbox/test_worker.py`.

**Scenario: Transaction rollback**
- Repository never commits; caller-initiated rollback discards the pending add.
- Unit test: `test_failed_service_call_leaves_no_outbox_entries`.

---

### Requirement: Event Processing — PASS

**Scenario: Normal processing**
- `OutboxWorker._process_entries()` calls `handler.handle()`, then
  `_mark_processed()` (UPDATE outbox SET processed_at = NOW()).
- Unit tests: `test_processes_unprocessed_entries`,
  `test_marks_entry_as_processed`, `test_calls_event_processed_on_success`.

**Scenario: Transient failure**
- `_handle_processing_failure()` increments retry_count and records last_error
  when below `max_retries`.
- Unit tests: `test_transient_failure_increments_retry_count`,
  `test_transient_failure_does_not_dlq_immediately`.

**Scenario: Permanent failure (dead letter)**
- `_move_to_dlq()` sets `failed_at = NOW()`; DLQ entries excluded from
  `fetch_unprocessed` via `failed_at IS NULL` filter.
- Unit test: `test_max_retries_moves_entry_to_dlq`.

---

### Requirement: Idempotent Event Handlers — PASS

**Scenario: Duplicate delivery**
- `fetch_unprocessed` filters `processed_at IS NULL`, preventing re-fetch.
- `SpiceDBEventHandler` uses upsert (set) semantics — writing the same tuple
  twice is a no-op.
- Unit tests: `test_already_processed_entry_excluded_from_fetch`,
  `test_duplicate_invocation_produces_identical_final_state`.

---

### Requirement: Concurrent Worker Safety — PASS

**Scenario: Concurrent workers**
- `OutboxRepository.fetch_unprocessed()` and `OutboxWorker._process_batch()`
  both use `.with_for_update(skip_locked=True)` — each entry is claimed by
  exactly one worker.
- Unit test: `test_fetch_unprocessed_uses_for_update_skip_locked` — compiles
  the query with the PostgreSQL dialect and asserts "SKIP LOCKED" is present.

---

### Requirement: Dual Delivery Mechanism — PASS

**Scenario: Real-time notification**
- `PostgresNotifyEventSource` listens on the `outbox_events` channel via
  `asyncpg-listen`; a PostgreSQL trigger fires `pg_notify` on every INSERT.
- Unit tests: `test_postgres_notify_event_source.py` covers UUID parsing and
  callback dispatch.

**Scenario: Polling fallback**
- `OutboxWorker._poll_loop()` runs unconditionally every `poll_interval_seconds`
  (default 30) regardless of event source presence.
- Unit tests: `test_rejects_zero_poll_interval` (config validation).

---

### Requirement: Event Fan-Out — PASS

**Scenario: Multiple handlers registered**
- `CompositeEventHandler` stores a list per event type; `handle()` iterates
  and calls each handler.
- Unit test: `test_handle_fans_out_to_multiple_handlers` — two handlers both
  called for the same event type.

**Scenario: Unknown event type**
- `CompositeEventHandler.handle()` raises `UnknownEventTypeError` (not
  `ValueError`) for unregistered types.
- `OutboxWorker._process_entries()` catches `UnknownEventTypeError` in a
  dedicated `except` block before generic `except Exception`, immediately
  calling `_move_to_dlq()` without retry.
- Unit tests: `test_unknown_event_type_immediately_moves_to_dlq`,
  `test_unknown_event_type_dlq_even_at_zero_retries`,
  `test_retry_not_called_for_unknown_event_type`,
  `test_handle_raises_for_unknown_event_type`,
  `test_unknown_event_type_error_is_not_value_error`.

