#### 1. check-partial-error-assertions (exit 1)

The script detected 4 OR-chained assertion patterns across the codebase:

**File: `src/api/tests/integration/test_query_mcp.py:213`** (committed by task-027/27ebfd12, zero diff from alpha)
```python
