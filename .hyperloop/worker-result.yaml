### Requirement: Multi-Tenant Access (SHALL) — COVERED

**Scenario: Cross-tenant membership**
- Implementation: `src/api/iam/domain/aggregates/user.py` — `User` dataclass has only `id: UserId` and `username: str`; no `tenant_id`. Tenant scoping is per-request via `CurrentUser` in the dependency layer (`src/api/iam/dependencies/user.py`).
- Domain test: `test_user_aggregate.py::TestMultiTenantAccess::test_user_aggregate_has_no_tenant_field` — `assert not hasattr(user, "tenant_id")`.
- Domain test: `test_user_aggregate.py::test_same_user_identity_is_reusable_across_tenants` — same `UserId` in two `User` instances (different tenant contexts) compares equal.
- Dependency test: `test_authenticated_user_dependency.py::test_does_not_have_tenant_id` — `AuthenticatedUser` returned from `get_authenticated_user()` has no `tenant_id` attribute.

