## Spec Scenario Coverage

### Credential Encryption — COVERED
- `FernetSecretStore.store()` encrypts with `MultiFernet`, upserts via
  composite key `(path, tenant_id)`.
- Unit: `TestFernetRoundTrip` covers single key, multiple creds, empty values.
- Integration: `TestRoundTrip::test_store_and_retrieve`.

### Retrieve credentials — COVERED
- `FernetSecretStore.retrieve()` queries by `(path, tenant_id)`, decrypts.
- Unit + integration round-trip tests verified.

### Credentials not found — COVERED
- Raises `KeyError("Credentials not found")` when no row found.
- Unit: `TestRetrieveNotFound::test_raises_key_error`.
- Integration: `TestNotFound::test_nonexistent_path_raises_key_error`.

### Tenant Isolation — COVERED
- WHERE clause and composite PK enforce isolation at DB level.
- Unit: `TestTenantIsolation` — two tests covering read and delete isolation.
- Integration: `TestTenantIsolation::test_tenant_a_cannot_read_tenant_b`.

### Key Rotation — COVERED (unit only)
- `MultiFernet([...])` — first key encrypts, all keys tried for decryption.
- Unit: `TestMultiFernetRotation::test_decrypt_with_rotated_keys` — full
  Given/When/Then. No integration test; unit coverage is sufficient per spec.

### Data source deletion — COVERED
- `DataSourceService.delete()` calls `_secret_store.delete()` before DB delete.
- Unit: `test_delete_removes_credentials_if_path_exists`.

### Knowledge graph cascade — COVERED (previously FAIL; now resolved)
- `KnowledgeGraphService.delete()` iterates child data sources and calls
  `_secret_store.delete(path=ds.credentials_path, tenant_id=...)` for each DS
  where `credentials_path` is set, BEFORE `_ds_repo.delete(ds)`.
- Unit: `test_delete_removes_credentials_for_data_sources_with_credentials_path`
  — two real DS objects (one with creds, one without), asserts `secret_store.delete`
  called exactly once for the credentialed DS, both DSes and KG removed.
- Unit: `test_delete_skips_credential_cleanup_when_no_secret_store` — graceful
  skip when `secret_store=None`.

