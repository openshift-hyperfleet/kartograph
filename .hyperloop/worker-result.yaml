## Cascade Deletion Coverage — VERIFIED

The following tests in `src/api/tests/unit/iam/application/test_tenant_service.py`
cover the cascade deletion requirement:

**Scenario: Tenant deletion (keys deleted)**
- `test_deletes_api_keys_on_tenant_deletion` — verifies a single API key is deleted
  when its tenant is deleted; calls `api_key_repo.delete(api_key)`.
- `test_deletes_multiple_api_keys_on_tenant_deletion` — verifies all API keys are
  deleted when a tenant has multiple keys.
- `test_api_keys_deleted_before_tenant_on_cascade` — uses call-order tracking to
  assert API keys are fully deleted before the tenant record is removed.

**Scenario: Authorization relationships cleaned up**
- `test_api_key_mark_for_deletion_emits_deleted_event` — verifies `mark_for_deletion()`
  is called on each API key during cascade, emitting `APIKeyDeleted` domain events that
  drive SpiceDB relationship cleanup via the outbox pattern.

**Additional cascade deletion tests:**
- `test_api_key_repo_queried_by_tenant_on_deletion` — verifies `api_key_repo.list()`
  is scoped to the correct `tenant_id` during cascade.
- `test_cascade_deletion_probe_reports_api_key_count` — verifies observability probe
  records the number of API keys deleted in cascade.

All 12 `TestDeleteTenant` test cases pass.

