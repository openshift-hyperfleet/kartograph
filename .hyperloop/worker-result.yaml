  ## CodeRabbit Round 5 (Latest) — Confirmed False Positive

  CodeRabbit's latest comment claims:
  "task_ui_changes includes .js files but ui_source_count only counts
  *.vue and *.ts, allowing .js-only UI edits to bypass vitest enforcement"

  This is a false positive. The actual code in
  check-frontend-test-infrastructure.sh (lines 63-68) reads:

    ui_source_count=$(find "$UI_DIR" \
      \( -name "*.vue" -o -name "*.ts" -o -name "*.js" \) 2>/dev/null \
      | grep -v node_modules \
      | grep -v "\.nuxt" \
      | grep -v dist \
      | wc -l || echo 0)

  The *.js pattern has been present since round 3. An explicit comment
  was added in round 11 (commit dae883c5) to document this fact and
  simultaneously fix the unescaped-dot bug. CodeRabbit is rechecking
  against stale assumptions.

  ## CodeRabbit dlq_at Claim — False Positive (Re-confirmed)

  CodeRabbit claimed the worker sets dlq_at but repository filters on
  failed_at. Grep of entire src/api directory confirms: zero occurrences
  of "dlq_at" anywhere in the codebase.

  The implementation is internally consistent:
  - worker.py _move_to_dlq() sets failed_at=datetime.now(UTC)
  - repository.py fetch_unprocessed filters .where(OutboxModel.failed_at.is_(None))
  - test_failed_entries_excluded_from_fetch asserts "failed_at IS NULL"
  - OutboxModel has no dlq_at column (models.py verified)

