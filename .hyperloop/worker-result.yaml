## Auth Status Codes Review

`check-auth-status-codes.sh` flagged 403 responses in integration tests
(REVIEW REQUIRED, not automatic FAIL). Manual review confirms these are
correct:

- `test_group_member_cannot_delete_group` (line 116): User has VIEW
  permission on the group (can see it) but lacks MANAGE. HTTP 403
  (Forbidden) is the correct response — the resource exists and is
  visible, but the operation is forbidden. Unit test (`test_group_routes.py`
  line 910) also asserts 403. Consistent with spec "SHALL allow users
  with manage permission to delete a group."

- `test_group_member_cannot_rename_group` (line 195): Same reasoning.
  VIEW-but-not-MANAGE scenario returns 403. Unit test (line 483) agrees.

The spec's "not-found response" for unauthorized access applies only
to GET operations where the user cannot VIEW the resource (hides
existence). For MANAGE operations on visible resources, 403 is
semantically correct.

