### Ontology Design — COVERED

**Code:** `app/pages/data-sources/index.vue` — intent description step, ontology review,
re-extraction confirmation dialog.
**Tests:** `data-sources.test.ts` + `knowledge-graphs.test.ts` — intent validation, ontology
