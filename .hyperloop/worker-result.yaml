### Requirement Coverage

#### REQ-1: Transactional Event Storage — COVERED
`OutboxRepository.append()` calls `session.add()` only, never `session.commit()`.
Tests: `test_repository_append_does_not_commit`, `test_failed_service_call_leaves_no_outbox_entries`.

#### REQ-2: Event Processing (normal / transient / dead-letter) — COVERED
Worker catches `UnknownEventTypeError` before the generic `Exception` handler;
immediately calls `_move_to_dlq` bypassing `_handle_processing_failure`.
Tests: `test_transient_failure_increments_retry_count`, `test_max_retries_moves_entry_to_dlq`,
`test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`.

#### REQ-3: Idempotent Event Handlers — COVERED
SpiceDB write_relationship is upsert; fetch_unprocessed filters `processed_at IS NULL AND failed_at IS NULL`.
Tests: `TestSpiceDBEventHandlerIdempotency`, `TestOutboxWorkerIdempotency`.

#### REQ-4: Concurrent Worker Safety — COVERED
`fetch_unprocessed` uses `with_for_update(skip_locked=True)`; verified by compiling with
PostgreSQL dialect and asserting `SKIP LOCKED` in rendered SQL.

#### REQ-5: Dual Delivery Mechanism — COVERED
`PostgresNotifyEventSource` for sub-second delivery + `_poll_loop()` (30s) as fallback.

#### REQ-6: Event Fan-Out + Unknown Event Type — COVERED
`CompositeEventHandler` raises `UnknownEventTypeError` (not `ValueError`) for unregistered
types; worker catches it for immediate DLQ (4 tests covering this path).

