## Tenant Context Implementation ‚Äî Task 038

All requirements from `specs/shared-kernel/tenant-context.spec.md` are fully implemented and tested.

### Requirement: Multi-Tenant Header Resolution

Implementation: `src/api/iam/dependencies/tenant_context.py` ‚Äî `get_tenant_context()`

- **Valid header**: `TenantContext` with `source="header"` returned for valid ULID + authorized user.
- **Missing header**: 400 returned with `"X-Tenant-ID header is required"` when not in single-tenant mode.
- **Invalid ULID format**: 400 returned with descriptive error for non-ULID values.
- **ULID case insensitivity**: `_validate_ulid()` normalizes to canonical uppercase via `ULID.from_str(raw.upper())`.
- **Unauthorized tenant access**: SpiceDB `check_permission(tenant, view, user)` returning False yields 403.

Unit tests: `tests/unit/iam/test_tenant_context_dependency.py` ‚Äî 56 tests covering all branches including probe emissions.

### Requirement: Single-Tenant Auto-Selection

Implementation: `_resolve_default_tenant()` in `src/api/iam/dependencies/tenant_context.py`

- **Auto-select default tenant**: Default tenant looked up by configured name; `source="default"` returned.
- **Auto-provision member access**: Users without `view` permission are added as `MEMBER` via `tenant.add_member()` + `session.commit()` to persist outbox events.
- **Bootstrap admin auto-provision**: Users in `bootstrap_admin_usernames` list are added as `ADMIN`.
- **Default tenant missing**: 500 returned with guidance to check startup completion.

Unit tests: `TestGetTenantContextMissingHeaderSingleTenant`, `TestAutoAddUserInSingleTenantMode`, `TestAutoAddTransactionCommit` in the same file.

### Requirement: MCP Authentication

Implementation: `src/api/shared_kernel/middleware/mcp_api_key_auth.py` ‚Äî `MCPApiKeyAuthMiddleware`

- **API key authentication**: `X-API-Key` header validated against database; `MCPAuthContext` set in ContextVar carrying `user_id`, `tenant_id`, and `api_key_id` from the key's own scope (no `X-Tenant-ID` required).
- **Bearer token fallback**: When no API key present, `Authorization: Bearer` JWT is validated via injected `validate_bearer_token` callable with `X-Tenant-ID` header.
- **Authentication failure**: No credentials or invalid credentials ‚Üí 401 with `WWW-Authenticate: ApiKey realm="kartograph"`.
- **Service unavailability**: Validation callable raises ‚Üí 503 with `"Authentication service temporarily unavailable"`.

Unit tests: `tests/unit/shared_kernel/middleware/test_mcp_auth_middleware.py` ‚Äî 18 tests.
Integration tests: `tests/integration/test_mcp_authentication.py` ‚Äî 6 tests covering API key, Bearer fallback, and 401 scenarios (503 documented and covered at unit level).

