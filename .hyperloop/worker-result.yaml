#### REQ-6: Event Fan-Out — COVERED

**Implementation:**
- `infrastructure/outbox/composite.py::CompositeEventHandler` stores handlers
  per event type in a `dict[str, list[EventHandler]]`; `handle()` iterates all
  handlers for the requested type.
- Unregistered types raise `UnknownEventTypeError` (a dedicated exception, not
  `ValueError`), allowing the worker to distinguish permanent from transient failures.
- `worker.py::_process_entries()` catches `UnknownEventTypeError` before the
  generic `Exception` handler and calls `_move_to_dlq()` immediately without
  incrementing `retry_count`.

**Scenarios verified:**

*Multiple handlers registered:*
- Unit: `TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers`
  — two handlers registered for `"SharedEvent"`; both are awaited with the same
  payload; neither is skipped.

*Unknown event type:*
- Unit: `TestCompositeEventHandler::test_handle_raises_for_unknown_event_type`
  — `UnknownEventTypeError` raised with correct `event_type` and `registered_types`.
- Unit: `TestCompositeEventHandler::test_unknown_event_type_error_is_not_value_error`
  — confirms it is NOT a `ValueError` (so worker retry logic correctly classifies
  it as permanent).
- Unit: `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`
  — `max_retries=5` but still goes straight to DLQ; `probe.event_moved_to_dlq`
  called, `probe.event_processing_failed` NOT called.
- Unit: `TestOutboxWorkerRetryBehavior::test_retry_not_called_for_unknown_event_type`
  — patches `_increment_retry` and asserts it is never called.

