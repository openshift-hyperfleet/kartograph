## Fix Applied

**Root cause:** `create_workspace` route returned HTTP 403 for `UnauthorizedError`,
but the spec requires "no distinction between unauthorized and missing" â€” a parent
workspace the user cannot access should be indistinguishable from one that doesn't
exist.

**Fix:** Changed `create_workspace` route to return HTTP 404 (not 403) for
`UnauthorizedError`, following the same pattern used by `get_workspace` and all other
routes that implement the no-distinction principle.

