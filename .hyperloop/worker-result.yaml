### Requirement: Knowledge Graph Name Validation — COVERED

**Code:**
- `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`; raises
  `InvalidKnowledgeGraphNameError` for violations.
- Pydantic `CreateKnowledgeGraphRequest` / `UpdateKnowledgeGraphRequest` models enforce the
  same constraint at the HTTP layer, producing HTTP 422.

**Scenario: Valid name — COVERED**
- Tests: `TestKnowledgeGraphCreate::test_create_accepts_name_exactly_100_chars`,
  `test_create_accepts_single_char_name`.

**Scenario: Empty or oversized name — COVERED**
