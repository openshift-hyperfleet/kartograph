### 7. Code Review — PASS

All spec requirements implemented and tested:

**REQ-1 (Creation):** ULID generated, EDIT permission on workspace checked,
  SpiceDB workspace+tenant relationships written via outbox on `KnowledgeGraphCreated`.

**REQ-2 (Name Validation):** Enforced at domain (`_validate_name`) and Pydantic layer
  (`Field(min_length=1, max_length=100)`). 422 returned for empty/oversized names.

**REQ-3 (Retrieval):** GET /management/knowledge-graphs/{id} collapses not-found,
  wrong-tenant, and permission-denied into None → 404. No existence leakage.

**REQ-4 (Listing):** GET /management/workspaces/{id}/knowledge-graphs checks VIEW on
  workspace, discovers KG IDs via SpiceDB `read_relationships`, filters by tenant.

**REQ-5 (Update):** PATCH /management/knowledge-graphs/{id} checks EDIT permission,
  rejects duplicate names (409), rejects mutation on deleted KGs.

**REQ-6 (Deletion):** DELETE /management/knowledge-graphs/{id} checks MANAGE permission.
  Cascade is atomic within `async with session.begin()`:
  → delete encrypted credentials → mark/delete each data source → mark/delete KG
  → SpiceDB cleanup via outbox `KnowledgeGraphDeleted` event.
  Rollback test: `test_delete_rolls_back_on_ds_deletion_failure` confirms KG is
  NOT deleted when a data source deletion raises mid-cascade.

**REQ-7 (Permission Inheritance):** SpiceDB schema correctly propagates workspace
  roles to KG permissions. Integration tests in `test_knowledge_graph_authorization.py`
  cover workspace-inherited access and direct admin grant scenarios.

**No logger/print usage** in new code — domain probes used throughout.

**No MagicMock for domain aggregates** — `DataSource` and `KnowledgeGraph` instances
  created via factory helpers using real domain constructors (commit `fd7dc1d0` fixed
  the previous MagicMock usage for data source aggregates).

**Commit trailers** — Spec-Ref and Task-Ref present on all implementation commits.

**Conventional commits** — feat/fix/test/chore prefixes used correctly.

