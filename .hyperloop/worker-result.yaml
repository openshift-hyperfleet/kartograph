### Requirement: Knowledge Graph Creation — COVERED

**Implementation:**
- `KnowledgeGraphService.create()` checks EDIT permission on workspace before creation
- `KnowledgeGraph.create()` generates ULID via `KnowledgeGraphId.generate()` (uses `ulid` library)
- KG is associated with tenant_id and workspace_id at construction
- `KnowledgeGraphCreated` event triggers outbox translator which writes workspace + tenant
  relationships to SpiceDB (`ManagementEventTranslator._translate_knowledge_graph_created`)

**Scenario: Successful creation — COVERED**
- `TestKnowledgeGraphServiceCreate::test_create_saves_aggregate_via_repo` — verifies name, description, tenant, workspace
- `TestKnowledgeGraphCreate::test_create_sets_all_fields` — verifies ULID id, all fields
- `TestKnowledgeGraphCreate::test_create_generates_unique_id` — unique ULID per call
- `TestManagementEventTranslatorKnowledgeGraphCreated::test_first_operation_is_workspace_relationship`
- `TestManagementEventTranslatorKnowledgeGraphCreated::test_second_operation_is_tenant_relationship`

**Scenario: Duplicate name within tenant — COVERED**
- `IntegrityError` from DB catches unique constraint violation -> `DuplicateKnowledgeGraphNameError`
- `TestKnowledgeGraphServiceCreate::test_create_raises_duplicate_on_integrity_error`
- `TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_409_for_duplicate_name` (HTTP 409)

