## Fix Applied

Addressed the FAIL and CONCERN from the review cycle.

### FAIL – Legacy `/graph/mutations` route regression: RESOLVED

Removed the `POST /graph/mutations` route entirely from
`graph/presentation/routes.py`. The spec mandates "The system SHALL require
a target KnowledgeGraph for all mutations" — the legacy route was
non-compliant and silently broken for CREATE operations after
`knowledge_graph_id` validation was added to `validate_operation()`.

- Deleted `apply_mutations` route handler and its inline error classification
  logic (the helper `_build_mutation_error_response` is retained for the KG-
  scoped route).
- Deleted the `TestApplyMutationsRoute` class (4 tests) whose mocks masked
  the regression.
- Updated `test_auth_enforcement.py` integration test to verify the
  KG-scoped route (`/graph/knowledge-graphs/kg-123/mutations`) returns 401
  without auth, preserving auth enforcement coverage.

### CONCERN – `AsyncMock` for `AuthorizationProvider`: RESOLVED

Replaced `AsyncMock` fixtures with a `FakeAuthorizationProvider` class
in `tests/unit/graph/presentation/test_routes.py`. The fake:
- Implements the full `AuthorizationProvider` protocol
- Stores all `check_permission` calls as `(resource, permission, subject)` tuples
- Returns a configurable `allow_all` boolean
- Allows precise assertions without `call_args` mock internals

Updated `test_kg_mutations_route_checks_correct_resource` to use
`mock_authz_allowed.check_permission_calls[0][0]` instead of Mock's
`call_args` API.

