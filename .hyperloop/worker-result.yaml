#### Requirement: DELETE Operation — COVERED

- **Scenario: Delete a node:**
  - Implementation: `_execute_deletes()` calls `delete_node_with_detach()` for nodes.
  - Tests (integration):
    - `test_delete_node` — node is gone after DELETE.
    - `test_delete_node_detaches_edges` — connected edge also removed (cascading detach).

- **Scenario: Delete an edge:**
  - Implementation: `_execute_deletes()` calls `delete_edge()` for edges.
  - Test (integration): `test_delete_edge` — edge removed; both nodes still exist.

