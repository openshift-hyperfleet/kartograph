### Requirement 4: Concurrent Worker Safety ‚Äî COVERED

**Implementation:**
- `OutboxRepository.fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`.
- `OutboxWorker._process_batch()` and `_process_single()` use `FOR UPDATE SKIP LOCKED`.

**Tests:**
- `test_repository.py` ‚Äî Compiles query with PostgreSQL dialect; asserts `SKIP LOCKED`
  appears in rendered SQL.

