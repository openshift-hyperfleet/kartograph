### Additional Observations (Non-blocking)

1. **Authz cleanup eventual consistency**: The spec says deletion "executes atomically within
   a single transaction" including "all authorization relationships." In practice, the DB
   operations (DS + KG deletion) are atomic, but SpiceDB cleanup happens asynchronously via
   the outbox worker. This is the transactional outbox pattern — an industry-standard
   approach for cross-system consistency. The `KnowledgeGraphDeleted` event is written in
   the same DB transaction as the KG deletion, guaranteeing eventual SpiceDB cleanup.
   The test `test_delete_rolls_back_on_ds_deletion_failure` confirms the DB-level atomicity.

2. **`list_all()` probe call**: Passes `workspace_id=self._scope_to_tenant`, which is
   semantically imprecise (tenant_id passed as workspace_id). Functionally harmless
   (observability-only); pre-existing quirk.

3. **Integration tests not run**: No dev instance available. Integration tests for the
   repository and SpiceDB authorization are present and well-structured; they require a
   running Postgres + SpiceDB.

