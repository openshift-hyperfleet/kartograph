### Requirement: Knowledge Graph Name Validation — COVERED

- `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`.
- Pydantic request models enforce same constraint at HTTP layer (HTTP 422).

**Scenario: Valid name (1–100 chars) — COVERED**
- Tests: `test_create_accepts_name_exactly_100_chars`, `test_create_accepts_single_char_name`.

**Scenario: Empty or oversized name — COVERED**
- Tests: `test_create_rejects_empty_name`, `test_create_rejects_name_over_100_chars`,
  `test_create_knowledge_graph_returns_422_for_empty_name`, `test_create_knowledge_graph_returns_422_for_oversized_name`,
  `test_update_knowledge_graph_returns_422_for_empty_name`, `test_update_knowledge_graph_returns_422_for_oversized_name`.

