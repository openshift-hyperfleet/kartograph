## Requirement Coverage

### REQ-1: API Key Creation — PASS
- `karto_` prefix enforced via `generate_api_key_secret()` in `security.py`
- Plaintext secret returned once only (tuple return from service, never stored)
- bcrypt hash stored in `key_hash` field, verified in `test_creates_api_key_with_hashed_secret`
- 12-char prefix stored for fast lookup (`test_stores_prefix_from_secret`)
- Duplicate name → `DuplicateAPIKeyNameError` → HTTP 409
- Expiration: `expires_in_days: int = Field(30, ge=1, le=3650)` in Pydantic model

### REQ-2: API Key Authentication — PASS
- `X-API-Key` header processed by authentication middleware
- Valid key: authenticates as creator, updates `last_used_at`
- Expired key: `is_valid()` returns False → 401
- Revoked key: `is_valid()` returns False → 401
- JWT takes precedence over API key (middleware ordering)
- Prefix collision: `len(models) > 1` triggers `probe.api_key_prefix_collision()` (error-level)

### REQ-3: API Key Listing — PASS
- SpiceDB `lookup_resources` determines viewable keys per current user
- Metadata returned: name, prefix, created_at, expires_at, last_used_at, is_revoked
- Plaintext secret NEVER returned in list response (no `secret` field in `APIKeyResponse`)
- `user_id` query param filters by creator

### REQ-4: API Key Revocation — PASS
- Owner revokes own key: SpiceDB REVOKE permission check passes
- Tenant admin revokes any key: SpiceDB REVOKE permission check passes
- Already revoked → `APIKeyAlreadyRevokedError` → HTTP 409
- Unauthorized → `UnauthorizedError` → HTTP 403
- Revoked key remains visible in listing with `is_revoked=True`

### REQ-5: API Key Cascade Deletion — PASS
6 dedicated tests in `test_tenant_service.py::TestDeleteTenant`:
- `test_deletes_api_keys_on_tenant_deletion`
- `test_deletes_multiple_api_keys_on_tenant_deletion`
- `test_api_key_mark_for_deletion_emits_deleted_event`
- `test_api_key_repo_queried_by_tenant_on_deletion`
- `test_cascade_deletion_probe_reports_api_key_count`
- `test_api_keys_deleted_before_tenant_on_cascade`

### REQ-6: API Key Name Validation — PASS
- Pydantic: `name: str = Field(..., min_length=1, max_length=255)`
- Empty name → HTTP 422; missing name → HTTP 422

