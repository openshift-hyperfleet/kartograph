## Requirement Coverage

### 1. API Key Creation — COVERED

- `karto_` prefix: `iam/application/security.py` → `generate_api_key_secret()`
- Bcrypt hash (work factor 12): `hash_api_key_secret()`
- 12-char prefix: `extract_prefix()`
- Plaintext returned once: `api_key_service.py` returns `(APIKey, plaintext)` tuple
- Duplicate name → 409: unique constraint `(tenant_id, created_by_user_id, name)`
- Expiration 1–3650 days, default 30: Pydantic `Field(default=30, ge=1, le=3650)`

Tests: `test_api_key_service.py`, `test_api_key_routes.py`, `test_security.py`

### 2. API Key Authentication — COVERED

- Valid key → authenticated + `last_used_at` updated: `validate_and_get_key()` in service
- Expired key → 401: `APIKey.is_valid()` checks expiration
- Revoked key → 401: `APIKey.is_valid()` checks `is_revoked`
- JWT takes precedence: `_authenticate()` checks Bearer first, never falls through
- Prefix collision → error-level log: `api_key_prefix_collision()` probe at error level

Tests: `test_api_key_service.py`, `test_authenticate_dependency.py`,
       `test_api_key_repository.py`

### 3. API Key Listing — COVERED

- Metadata returned (name, prefix, created_at, expires_at, last_used_at, is_revoked)
- No secrets in response: `APIKeyResponse` excludes `secret` and `key_hash`
- Filter by `user_id`: optional `created_by_user_id` param passed to repository

Tests: `test_api_key_routes.py`, `test_api_key_service.py`

### 4. API Key Revocation — COVERED

- Owner revokes own key: SpiceDB `owner` relation → `revoke` permission
- Tenant admin revokes any key: SpiceDB `tenant->administrate`
- Already revoked → 409: `APIKeyAlreadyRevokedError` mapped to 409
- Unauthorized → 403: `UnauthorizedError` mapped to 403
- Revoked key visible with `is_revoked=True`: soft revocation, row retained

Tests: `test_api_key_service.py`, `test_api_key_routes.py`,
       `test_api_key_aggregate.py`

### 5. API Key Cascade Deletion — COVERED

- Tenant deletion → keys deleted: `tenant_service.py` lists and marks all keys
- `mark_for_deletion()` emits `APIKeyDeleted` event
- Outbox translator converts `APIKeyDeleted` → SpiceDB `DeleteRelationship` ops

Tests: `test_tenant_service.py` (6 cascade-specific tests)

### 6. API Key Name Validation — COVERED

- Valid name (1–255 chars): Pydantic `Field(min_length=1, max_length=255)`
- Empty name → 422: `min_length=1` enforced by Pydantic

Tests: `test_api_key_routes.py`

