#### R4 — DEFINE Operation
**SHALL**: Store type definitions; auto-add entity-specific system properties to required_properties.

- **Code**: `apply_mutations()` calls `get_system_properties_for_entity(op.type)` and
  merges into `required_properties`; nodes get `{data_source_id, source_path, slug}`,
  edges get `{data_source_id, source_path}`.
- **Tests**:
  - `test_apply_mutations_stores_define_operations` — saved TypeDefinition includes
    `data_source_id`, `source_path`, `slug` for a NODE DEFINE.
  - `test_system_properties.py::test_returns_node_system_properties` and
    `test_returns_edge_system_properties` — verify the helper function returns the
    correct property sets per entity type.
  - `test_create_define_same_batch_validation.py::test_edge_does_not_require_slug`
    — DEFINE+CREATE for an edge succeeds without slug.
- **Status**: COVERED

---

#### R5 — CREATE Operation
**SHALL**: Idempotent entity creation with property accumulation.

- **Code**: `AgeBulkLoadingStrategy._execute_creates()` → `AgeQueryBuilder.execute_label_upsert()`
  uses jsonb `||` merge on existing entities, preserving unlisted properties.

Scenarios:
- **Create a new node** — `TestOperationCount::test_operation_count_correct_for_new_label`
  (integration): 3 brand-new nodes created, count verified == 3. COVERED.
- **Create an existing node (idempotent merge)** —
  `TestBulkLoadingIdempotency::test_create_merges_properties_on_existing_node` (integration):
  second CREATE on same ID preserves `age` from first batch AND adds `email` from second. COVERED.
- **Create an edge** —
  `TestEdgeLabelPreCreation::test_creates_edge_label_tables_on_empty_database` (integration):
  edge between two existing nodes created successfully. COVERED.
- **Missing type definition** —
  `test_rejects_create_without_define_in_batch`: `success=False`, error mentions "not defined". COVERED.
- **Missing required properties** —
  `test_rejects_create_missing_required_properties`: `success=False`, error mentions missing property. COVERED.
- **Schema learning** —
  `TestSchemaLearning::test_extra_properties_added_to_optional`: extra props in `set_properties`
  added to `optional_properties` of the type definition. COVERED.

