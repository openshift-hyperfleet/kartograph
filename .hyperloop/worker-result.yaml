### REQ-1: Transactional Event Storage

**Successful write scenario:**
- `OutboxRepository.append()` calls `session.add(model)` only — never `session.commit()`.
- Outbox entry is appended in same SQLAlchemy session as aggregate change.
- Test: `test_repository_append_does_not_commit` verifies `commit` never called.

**Transaction rollback scenario:**
- Shared-session design guarantees atomicity: upstream rollback discards pending `add()`.
- Test: `test_failed_service_call_leaves_no_outbox_entries` demonstrates the invariant.

---

### REQ-2: Event Processing

**Normal processing:** `OutboxWorker._process_entries()` dispatches to handler, then
calls `_mark_processed()` which sets `processed_at` timestamp.

**Transient failure:** `_handle_processing_failure()` increments `retry_count` and
records `last_error`. Entry stays in queue for next poll cycle.

**Permanent failure (DLQ):** When `new_retry_count >= max_retries`, `_move_to_dlq()`
sets `failed_at` timestamp. DLQ entries are excluded by `failed_at IS NULL` filter
in `fetch_unprocessed()`.

---

### REQ-3: Idempotent Event Handlers

`SpiceDBEventHandler` delegates to `authz.write_relationship()` / `authz.delete_relationship()`.
SpiceDB uses set-membership semantics (upsert) — writing the same relationship twice is a no-op.
Test: `test_duplicate_invocation_produces_identical_final_state` uses a proper
`FakeAuthorizationProvider` (backed by Python `set`) to verify upsert semantics.

---

### REQ-4: Concurrent Worker Safety

`OutboxRepository.fetch_unprocessed()` uses `.with_for_update(skip_locked=True)` — so
does `OutboxWorker._process_batch()` and `_process_single()`.
Test: `test_fetch_unprocessed_uses_for_update_skip_locked` compiles the SQLAlchemy query
with the PostgreSQL dialect and asserts `"SKIP LOCKED" in compiled.upper()`.

---

### REQ-5: Dual Delivery Mechanism

**Real-time (NOTIFY):** `PostgresNotifyEventSource` listens on `outbox_events` channel
via `asyncpg-listen`. On NOTIFY, parses UUID payload and invokes `_process_single()`.
PostgreSQL trigger `outbox_after_insert` (migration `d32ecc44581a`) fires `pg_notify`
on every outbox INSERT.

**Polling fallback:** `OutboxWorker._poll_loop()` runs every `poll_interval_seconds`
(default 30 s) regardless of whether an event source is configured.

---

### REQ-6: Event Fan-Out

`CompositeEventHandler.register()` maps each event type to a list of handlers.
`handle()` iterates the full list (fan-out). Duplicate registration is idempotent.

**Unknown event type:** `handle()` raises `UnknownEventTypeError(Exception)` — not
`ValueError`. Worker catches `UnknownEventTypeError` before the generic `Exception`
handler and immediately calls `_move_to_dlq()` without incrementing retry count.

