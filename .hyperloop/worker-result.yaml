### Requirement: Dual Delivery Mechanism

#### Scenario: Real-time notification
- Status: COVERED
- Code (DB trigger): `src/api/infrastructure/migrations/versions/d32ecc44581a_create_outbox_notify_trigger.py` — `AFTER INSERT ON outbox` trigger calls `pg_notify('outbox_events', NEW.id::text)`.
- Code (event source): `src/api/infrastructure/outbox/event_sources/postgres_notify.py` — `PostgresNotifyEventSource` uses `asyncpg-listen` to `LISTEN` on `outbox_events` and invokes the `on_event` callback with the UUID.
- Code (worker): `src/api/infrastructure/outbox/worker.py:108-113` — when `event_source` is provided, starts an `asyncio.create_task` for `event_source.start(self._process_single)`.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_postgres_notify_event_source.py::TestPostgresNotifyEventSourceNotify::test_notify_triggers_callback_with_uuid` — mocks the asyncpg listener to deliver a notification and verifies the callback receives the correct UUID type.
- Test (integration): `src/api/tests/integration/iam/test_outbox_consistency.py::TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling` — sets `poll_interval_seconds=999` to force NOTIFY-only delivery, inserts a group, waits 500ms, and asserts `processed_at` is set and SpiceDB relationship exists.

#### Scenario: Polling fallback
- Status: COVERED
- Code: `src/api/infrastructure/outbox/worker.py:155-168` — `_poll_loop()` runs `_process_batch()` then sleeps `poll_interval_seconds` (default 30, set at line 51).
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerValidation` — tests reject invalid poll intervals (0, negative); `test_accepts_valid_configuration` confirms the default of 30 is stored correctly.
- Notes: There is no dedicated unit test asserting the poll loop sleeps exactly 30 seconds between iterations, but the code clearly does so and the 30-second default is validated by the constructor tests. The integration NOTIFY test indirectly validates the polling mechanism exists and is separate from NOTIFY.

