### Requirement: Knowledge Graph Deletion — COVERED

- `KnowledgeGraphService.delete()` checks MANAGE permission on KG.
- Within a single `async with self._session.begin()` transaction:
  1. `ds_repo.find_by_knowledge_graph()` lists all data sources.
  2. For each DS with `credentials_path`, `secret_store.delete()` removes encrypted credentials.
  3. `ds.mark_for_deletion()` + `ds_repo.delete()` removes each data source record.
  4. `kg.mark_for_deletion()` + `kg_repo.delete()` removes the KG record.
- `ManagementEventTranslator._translate_knowledge_graph_deleted()` produces 5 SpiceDB operations:
  delete workspace rel, delete tenant rel, filter-delete admin/editor/viewer grants.

**Scenario: Successful deletion — COVERED**
- Tests: `test_delete_checks_manage_permission_on_kg`, `test_delete_cascades_data_sources`,
  `test_delete_cascades_encrypted_credentials`, 5 translator tests for each SpiceDB cleanup op,
  `test_delete_knowledge_graph_returns_204`.

**Scenario: Rollback on partial failure — COVERED**
- `test_delete_rolls_back_on_ds_deletion_failure`: when DS delete raises `RuntimeError`,
  `kg_repo.delete` is never called, confirming atomic transaction behaviour.

**Scenario: Mutation after deletion — COVERED**
- `KnowledgeGraph.update()` checks `self._deleted` and raises `AggregateDeletedError`.
- Test: `test_update_raises_after_deletion`.

