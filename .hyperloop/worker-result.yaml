### Requirement: Concurrent Worker Safety — COVERED

**Scenario: Concurrent workers** — COVERED
- **Code:** Both `OutboxRepository.fetch_unprocessed()` (repository.py:97) and
  `OutboxWorker._process_batch()` (worker.py:207) use `.with_for_update(skip_locked=True)`.
- **Unit test:** `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  — compiles the SQLAlchemy query against the PostgreSQL dialect and asserts
  `"SKIP LOCKED"` appears in the compiled SQL string.

