# Spec Alignment Review: task-034 Credentials — PASS

## Summary

All SHALL/MUST requirements in `specs/management/credentials.spec.md` are
implemented in code and covered by tests. The previously-failing scenario
(Knowledge graph cascade credential deletion) has been fully resolved.

---

## Requirement: Credential Encryption

### Scenario: Store credentials — COVERED

- **Implementation:** `management/infrastructure/repositories/fernet_secret_store.py`
  `FernetSecretStore.store()` serializes credentials to JSON, encrypts with
  `MultiFernet`, and upserts via `session.merge()`. Composite key `(path,
  tenant_id)` is enforced by `EncryptedCredentialModel`.
- **Test (unit):** `tests/unit/management/infrastructure/test_fernet_secret_store.py`
  `TestFernetRoundTrip` — single key, multiple credentials, empty values.
- **Test (integration):** `tests/integration/management/test_fernet_secret_store.py`
  `TestRoundTrip::test_store_and_retrieve` — exercises against real PostgreSQL.

### Scenario: Retrieve credentials — COVERED

- **Implementation:** `FernetSecretStore.retrieve()` queries by `(path, tenant_id)`,
  decrypts, returns the original dict.
- **Test (unit):** Same `TestFernetRoundTrip` round-trip tests.
- **Test (integration):** `TestRoundTrip::test_store_and_retrieve`.

### Scenario: Credentials not found — COVERED

- **Implementation:** `FernetSecretStore.retrieve()` raises `KeyError("Credentials
  not found")` when no row is found.
- **Test (unit):** `TestRetrieveNotFound::test_raises_key_error`
- **Test (integration):** `TestNotFound::test_nonexistent_path_raises_key_error`

---

## Requirement: Tenant Isolation

### Scenario: Same path, different tenants — COVERED

- **Implementation:** `retrieve()` WHERE clause filters on both `path` AND
  `tenant_id`. Composite PK `(path, tenant_id)` enforces DB-level isolation.
- **Test (unit):** `TestTenantIsolation::test_same_path_different_tenant_raises_key_error`
  and `test_delete_with_wrong_tenant_does_not_delete`.
- **Test (integration):** `TestTenantIsolation::test_tenant_a_cannot_read_tenant_b`

---

## Requirement: Key Rotation

### Scenario: Key rotation — COVERED

- **Implementation:** `MultiFernet([Fernet(key) for key in encryption_keys])` —
  first key encrypts, all keys tried for decryption.
- **Test (unit):** `TestMultiFernetRotation::test_decrypt_with_rotated_keys` —
  encrypts with `key1`, creates a new store with `[key2, key1]`, verifies old
  ciphertext decrypts. Full Given/When/Then covered.
- **Note:** No integration test for key rotation exists. This is a note only;
  the unit test fully satisfies the spec scenario.

---

## Requirement: Credential Lifecycle

### Scenario: Data source deletion — COVERED

- **Implementation:** `DataSourceService.delete()` checks `ds.credentials_path`
  and calls `self._secret_store.delete(path=..., tenant_id=...)` before deleting
  the data source record.
- **Test (unit):** `test_delete_removes_credentials_if_path_exists` asserts
  `mock_secret_store.delete` is called with the correct path and tenant.

### Scenario: Knowledge graph cascade — COVERED

Previously FAIL; now fully resolved.

- **Implementation:** `KnowledgeGraphService.__init__` accepts
  `secret_store: ISecretStoreRepository | None = None`. `delete()` iterates
  child data sources and calls `self._secret_store.delete(path=ds.credentials_path,
  tenant_id=self._scope_to_tenant)` for each DS where `ds.credentials_path` is
  set, before calling `self._ds_repo.delete(ds)`.
- **Test (unit):** `test_delete_removes_credentials_for_data_sources_with_credentials_path`
  — exercises the exact Given/When/Then: KG with two data sources (one with
  credentials, one without), KG deleted, asserts `secret_store.delete` called
  exactly once for the DS with credentials, both DSes and KG still removed.
- **Test (unit):** `test_delete_skips_credential_cleanup_when_no_secret_store`
  — covers graceful skip when `secret_store=None`.

All 326 management unit tests pass (verified by running the full management test suite).

