## Key Implementation Notes

**Authorization relationships at creation:** Established via outbox pattern.
`KnowledgeGraphCreated` domain event is translated by `ManagementEventTranslator`
to two `WriteRelationship` operations (workspace + tenant). This matches the spec's
"authorization relationships are established (workspace and tenant links)" requirement.

**Authorization cleanup at deletion:** `KnowledgeGraphDeleted` event translator
produces 5 operations: DeleteRelationship for workspace, DeleteRelationship for tenant,
plus DeleteRelationshipsByFilter for admin, editor, and viewer relations — covering
"workspace, tenant, and all direct grants" per spec.

**Encrypted credential cascade:** `KnowledgeGraphService.delete()` calls
`secret_store.delete(path, tenant_id)` for each data source with a `credentials_path`
before deleting the DS record. Verified by `test_delete_cascades_encrypted_credentials`.

**Previously-flagged gap RESOLVED:** Memory entry from 2026-04-22 noted that
`secret_store.delete()` was not called during KG cascade. This has been fixed —
the service now correctly handles credential cleanup.

