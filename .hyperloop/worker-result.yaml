### REQ-4: API Key Revocation — COVERED

**Implementation:**
- `api_key_service.py::revoke_api_key()`: loads key (tenant-scoped), checks SpiceDB
  `REVOKE` permission, calls `api_key.revoke()`, persists.
- SpiceDB schema: `api_key#revoke = owner + tenant->administrate` — owner OR tenant admin can revoke.
- `api_key.revoke()`: sets `is_revoked = True`, raises `APIKeyAlreadyRevokedError` if
  already revoked.

**Scenario: Owner revokes own key** — COVERED
- `test_api_key_auth.py::test_owner_can_revoke_own_key` — integration: alice (non-admin)
  revokes her own key via owner SpiceDB relationship → 204

**Scenario: Tenant admin revokes any key** — COVERED
- `test_api_key_auth.py::test_tenant_admin_can_revoke_other_users_key` — integration: alice
  (admin) revokes bob's key → 204

**Scenario: Already revoked → 409** — COVERED
- `test_api_key_aggregate.py::test_revoke_already_revoked_raises_error`
- `test_api_key_service.py::test_raises_when_already_revoked`
- `test_api_key_routes.py::test_returns_409_when_already_revoked`

**Scenario: Unauthorized → 403** — COVERED
- `test_api_key_auth.py::test_non_admin_cannot_revoke_other_users_key` — integration: bob
  (non-admin, non-owner) tries to revoke alice's key → 403
- `test_api_key_routes.py::test_revoke_api_key_returns_403_when_unauthorized`

**Scenario: Key remains visible with is_revoked=true** — COVERED
- `test_api_key_auth.py::test_revoked_key_remains_visible_in_listing` — integration:
  revoke then list; key present with `is_revoked=True`

