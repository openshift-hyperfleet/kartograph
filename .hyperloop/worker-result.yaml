## Per-Requirement Coverage

### 1. Tenant Creation — COVERED

**Code**: `TenantService.create_tenant()` in `iam/application/services/tenant_service.py`.
- Generates ULID via `Tenant.create(name=name)`.
- Grants creator admin via `tenant.add_member(user_id=creator_id, role=TenantRole.ADMIN)`.
- Creates root workspace via `Workspace.create_root(...)` and grants admin on it.

**Scenarios**:
- Successful creation: `test_creates_tenant`, `test_grants_creator_admin_access`,
  `test_creates_root_workspace_on_tenant_creation` (all in `test_tenant_service.py`).
- Duplicate name → 409: `test_returns_409_for_duplicate_name` (integration, `test_tenant_api.py`),
  `test_duplicate_name_raises_error` (integration, `test_tenant_repository.py`).
- Single-tenant mode → 403: `test_returns_403_in_single_tenant_mode` (POST path,
  `test_tenant_routes_single_tenant_gate.py`).

### 2. Tenant Graph Provisioning — COVERED

**Code**: `graph/infrastructure/tenant_graph_handler.py`.
- `AGEGraphProvisioner.ensure_graph_exists()` acquires `pg_advisory_xact_lock(hashtext(graph_name))`
  before the existence check — atomicity requirement met.
- Existence check queries `ag_catalog.ag_graph`; if row exists → `conn.rollback()` and return
  (no-op path commits/rolls back — transaction leak requirement met).
- Graph creation via `ag_catalog.create_graph(graph_name)` followed by `conn.commit()`.
- `except Exception: conn.rollback(); raise` covers error paths.

**Scenarios** (all in `test_tenant_graph_handler.py`):
- Graph name format `tenant_{tenant_id}`: `test_graph_name_format_is_tenant_underscore_id`.
- Create-if-not-exists: `test_creates_graph_when_not_exists`, `test_skips_create_when_graph_already_exists`.
- No-op path commits/rolls back: `test_rollback_or_commit_called_on_no_op_path`.
- Advisory lock before existence check: `test_advisory_lock_acquired_for_atomicity`.
- Idempotent replay: `test_handler_is_idempotent_when_provisioner_is_idempotent`.

### 3. Tenant Retrieval — COVERED

**Code**: `TenantService.get_tenant()` — checks VIEW permission via SpiceDB; returns `None`
(→ 404) for both missing tenant and unauthorized user (no distinction).

**Scenarios**:
- Authorized retrieval: `test_returns_tenant_when_user_has_view_permission`.
- Unauthorized or non-existent → same 404: `test_returns_none_when_tenant_not_found`,
  `test_returns_none_when_user_lacks_view_permission` (all in `test_tenant_service.py`).

