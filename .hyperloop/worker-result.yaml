### REQ-5: Knowledge Graph Update (SHALL)

#### Scenario: Update name and description with edit permission
- COVERED
- Implementation: `knowledge_graph_service.py::update()` checks EDIT on KG, calls `kg.update()` on the aggregate (which validates name and re-checks `_deleted`), then saves. Routes return 200.
- Tests: `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceUpdate::test_update_checks_edit_permission_on_kg`, `test_update_calls_aggregate_update_and_saves`; `tests/integration/management/test_knowledge_graph_repository.py::TestKnowledgeGraphUpdate::test_updates_knowledge_graph`; `tests/unit/management/presentation/test_knowledge_graph_routes.py::TestUpdateKnowledgeGraph::test_update_knowledge_graph_returns_200`

