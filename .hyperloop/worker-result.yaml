## Spec Alignment Review — Outbox Pattern (task-017)

Branch: `hyperloop/task-017`
Spec: `specs/shared-kernel/outbox.spec.md`
Reviewer: spec-alignment-reviewer
Date: 2026-04-23

### Requirement Coverage

#### REQ-1: Transactional Event Storage

**Scenario A — Successful write: COVERED**
- Implementation: `src/api/infrastructure/outbox/repository.py` — `OutboxRepository.append()` calls only `session.add()`, never `session.commit()`. Session is injected (shared with aggregate mutation). Transaction boundary owned by caller.
- Test: `tests/unit/infrastructure/outbox/test_worker.py` — `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`

**Scenario B — Transaction rollback: COVERED**
- Implementation: Same repository design — no commit means rollback discards both aggregate changes and outbox entries atomically.
- Test: `tests/unit/infrastructure/outbox/test_worker.py` — `TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries`

#### REQ-2: Event Processing

**Scenario A — Normal processing: COVERED**
- Implementation: `src/api/infrastructure/outbox/worker.py` — `_process_batch()` fetches unprocessed entries; `_process_entries()` dispatches to handler and calls `_mark_processed()` on success. SpiceDB writes happen in `src/api/infrastructure/outbox/spicedb_handler.py`.
- Test: `tests/unit/infrastructure/outbox/test_worker.py` — `TestOutboxWorkerProcessBatch` class; `tests/unit/infrastructure/outbox/test_spicedb_handler.py`

**Scenario B — Transient failure (retry + error recorded): COVERED**
- Implementation: `worker.py::_handle_processing_failure()` — increments `retry_count`, records `last_error` via `_increment_retry()`.
- Test: `tests/unit/infrastructure/outbox/test_worker.py` — `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count`; also `test_transient_failure_does_not_dlq_immediately`

**Scenario C — Permanent failure / dead letter: COVERED**
- Implementation: `worker.py::_handle_processing_failure()` — when `new_retry_count >= max_retries`, calls `_move_to_dlq()` which sets `failed_at` timestamp. Entries with `failed_at IS NOT NULL` excluded from `fetch_unprocessed`.
- Test: `tests/unit/infrastructure/outbox/test_worker.py` — `TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq`

#### REQ-3: Idempotent Event Handlers

**Scenario A — Duplicate delivery: COVERED**
- Implementation: `fetch_unprocessed()` queries `WHERE processed_at IS NULL AND failed_at IS NULL WITH FOR UPDATE SKIP LOCKED` — already-processed entries are never re-fetched. SpiceDB write path uses upsert semantics (set membership), so duplicate writes are no-ops.
- Test (unit): `tests/unit/infrastructure/outbox/test_spicedb_handler.py` — `TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state` uses a `FakeAuthorizationProvider` with set-based storage to prove two handler invocations produce identical final state.
- Test (infrastructure filter): `tests/unit/infrastructure/outbox/test_worker.py` — `TestOutboxWorkerIdempotency::test_already_processed_entry_excluded_from_fetch` verifies the SQL query contains `processed_at IS NULL`.

#### REQ-4: Concurrent Worker Safety

**Scenario A — Concurrent workers: COVERED**
- Implementation: `src/api/infrastructure/outbox/repository.py::fetch_unprocessed()` — `.with_for_update(skip_locked=True)` on the SELECT statement.
- Test: `tests/unit/infrastructure/outbox/test_worker.py` — `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked` compiles the query against the PostgreSQL dialect and asserts `SKIP LOCKED` is present.

#### REQ-5: Dual Delivery Mechanism

**Scenario A — Real-time notification: COVERED**
- Implementation: Migration `d32ecc44581a_create_outbox_notify_trigger.py` installs an `AFTER INSERT` trigger that calls `pg_notify('outbox_events', NEW.id::text)`. `src/api/infrastructure/outbox/event_sources/postgres_notify.py` — `PostgresNotifyEventSource` listens on that channel and triggers immediate processing.
- Test: `tests/unit/infrastructure/outbox/test_postgres_notify_event_source.py` — notification handling and sub-second dispatch tests.

**Scenario B — Polling fallback: COVERED**
- Implementation: `worker.py::_poll_loop()` runs on a configurable interval (default 30 seconds), independently of the NOTIFY path.
- Test: `tests/unit/infrastructure/outbox/test_worker.py` — lifecycle and polling interval tests in `TestOutboxWorkerLifecycle`.

#### REQ-6: Event Fan-Out

**Scenario A — Multiple handlers registered: COVERED**
- Implementation: `src/api/infrastructure/outbox/composite.py` — `CompositeEventHandler.register()` appends each handler to a list keyed by event type; `handle()` iterates and calls all registered handlers.
- Test: `tests/unit/infrastructure/outbox/test_composite.py` — `test_handle_fans_out_to_multiple_handlers`

**Scenario B — Unknown event type → immediate DLQ: COVERED**
- Implementation: `composite.py::handle()` raises `UnknownEventTypeError` when no handler is registered. In `worker.py::_process_entries()`, `UnknownEventTypeError` is caught before the general `Exception` handler and routes directly to `_move_to_dlq()`, bypassing `_handle_processing_failure()` entirely — so retry count is never incremented.
- Test: `tests/unit/infrastructure/outbox/test_worker.py` — `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq` (verifies DLQ call and no retry probe); `test_unknown_event_type_dlq_even_at_zero_retries` (retry_count=0, max_retries=10 → still DLQ).

