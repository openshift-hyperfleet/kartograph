## Task 017: Outbox Pattern — Spec Alignment Review (2026-04-23)

Branch: `hyperloop/task-017`
Spec: `specs/shared-kernel/outbox.spec.md`
Reviewer: spec-alignment-reviewer (independent)

---

## Requirement Coverage

### Requirement: Transactional Event Storage — COVERED

**Scenario: Successful write**
- Implementation: `OutboxRepository.append()` (`infrastructure/outbox/repository.py`) calls
  `session.add(model)` and never calls `session.commit()`, ensuring the outbox entry and
  aggregate change commit or roll back together in the caller's transaction.
- Unit test: `TestOutboxWorkerTransactionAtomicity.test_repository_append_does_not_commit`
  in `tests/unit/infrastructure/outbox/test_worker.py` — asserts `session.commit` never
  called, `session.add` called exactly once.
- Integration test: `TestAtomicityGuarantees.test_outbox_entry_created_in_same_transaction_as_group`
  in `tests/integration/iam/test_outbox_consistency.py` — verifies group row and outbox
  entry both exist after a committed transaction.

**Scenario: Transaction rollback**
- Unit test: `test_failed_service_call_leaves_no_outbox_entries` — shows repository never
  commits independently, so a caller rollback discards the `session.add()`.
- Integration test: `TestAtomicityGuarantees.test_rollback_removes_both_group_and_outbox_entry`
  — forces rollback via exception; asserts neither group nor outbox entry persists.

---

### Requirement: Event Processing — COVERED

**Scenario: Normal processing**
- Implementation: `OutboxWorker._process_entries()` (`infrastructure/outbox/worker.py`) calls
  `handler.handle(event_type, payload)`, then `_mark_processed()` which sets `processed_at`.
- Unit tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`,
  `test_calls_event_processed_on_success` in `test_worker.py`.
- Integration test: `TestOutboxWorkerProcessing.test_worker_processes_group_created_and_writes_to_spicedb`
  — calls `_process_batch()`, verifies `processed_at` set and SpiceDB relationship written.

**Scenario: Transient failure**
- Implementation: `_handle_processing_failure()` increments `retry_count` and sets `last_error`
  via `_increment_retry()` when `new_retry_count < max_retries`.
- Unit tests: `test_transient_failure_increments_retry_count` asserts `event_processing_failed`
  probe called and `event_moved_to_dlq` not called; `test_transient_failure_does_not_dlq_immediately`
  confirms retry path not DLQ.

**Scenario: Permanent failure (dead letter)**
- Implementation: `_handle_processing_failure()` calls `_move_to_dlq()` which sets `failed_at`
  when `new_retry_count >= max_retries`.
- Unit test: `test_max_retries_moves_entry_to_dlq` — entry at retry_count=2 with max_retries=3
  goes to DLQ on next failure; `event_moved_to_dlq` probe called, `event_processing_failed` not.

