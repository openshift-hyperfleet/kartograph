### Check Scripts

**check-auth-status-codes.sh — EXIT 1 (reviewed; pre-existing, not introduced by task-008)**

The script flagged two pre-existing files not modified by this task:

1. `test_api_key_auth.py:527: assert revoke_response.status_code == 403`
   — Tests Bob (tenant member, non-admin) revoking Alice's API key. This is a
   legitimate 403: the key exists and is known to Bob (same tenant), so the
   "no distinction between unauthorized and missing" rule does not apply. The
   route correctly distinguishes between "not found" (404) and "permission
   denied on a known resource" (403).

2. `test_auth_enforcement.py:129: assert response.status_code not in [401, 403]`
   — This test asserts the health endpoint does NOT return 401 or 403. It is
   asserting the ABSENCE of 403, not its presence. The script regexp matched it
   as a false positive.

Neither file was modified by task-008 (confirmed via `git diff alpha...HEAD`).
The new integration tests task-008 added have zero 403 assertions.

