### Requirement: API Key Revocation — COVERED

**Scenario: Owner revokes own key**
- Tests:
  - `test_owner_can_revoke_own_key` (integration) — Alice (member, not admin) revokes
    her own key via owner relationship path; 204 returned.

**Scenario: Key remains visible with is_revoked=True**
- Tests:
  - `test_revoked_key_remains_visible_in_listing` (integration) — revokes key then lists;
    asserts `is_revoked == True` in response and key still present.

**Scenario: Tenant admin revokes any key**
- Tests:
  - `test_tenant_admin_can_revoke_other_users_key` (integration) — Alice (admin) revokes
    Bob's key; 204 returned.

**Scenario: Already revoked**
- Tests:
  - `test_revoke_already_revoked_raises_error` (domain unit) — `APIKeyAlreadyRevokedError`
  - `test_raises_when_already_revoked` (service unit)
  - `test_returns_409_when_already_revoked` (route unit) — 409 Conflict

**Scenario: Unauthorized revocation**
- Tests:
  - `test_non_admin_cannot_revoke_other_users_key` (integration) — Bob cannot revoke
    Alice's key; 403 returned.
  - `test_revoke_api_key_returns_403_when_unauthorized` (route unit)

