#### Requirement: Knowledge Graph Retrieval — COVERED

**Scenario: Authorized retrieval**

- `KnowledgeGraphService.get()` fetches by ID, checks VIEW permission, returns aggregate.
  Tests: `test_get_returns_aggregate_on_success` (service), `test_get_knowledge_graph_returns_200` (route) ✓

**Scenario: Unauthorized or non-existent (no distinction)**

- Service returns `None` for both missing KG and failed VIEW check; route returns 404 in both cases.
  Tests: `test_get_returns_none_when_not_found`, `test_get_returns_none_when_permission_denied` (service); `test_get_knowledge_graph_returns_404_when_not_found`, `test_get_knowledge_graph_returns_404_when_unauthorized` (route) ✓

