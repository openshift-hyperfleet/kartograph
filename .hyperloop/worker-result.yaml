### Requirement: API Key Name Validation — COVERED

**Scenario: Valid name** — COVERED
- `test_creates_api_key_returns_201` (route unit) — name "my-api-key" (valid length) → 201
- `CreateAPIKeyRequest` model enforces `min_length=1`, `max_length=255`
- Note: no explicit test for a 255-character name specifically, but the validation constraint is in the model and the test demonstrates acceptance of a valid-length name.

**Scenario: Empty name** — COVERED
- `test_validates_name_min_length` (route unit) — empty string → 422
- `test_requires_name_field` (route unit) — missing name field → 422

