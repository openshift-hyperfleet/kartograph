### Pre-existing vs. Task-008-Introduced Failures

All currently-failing check scripts were verified against the merge-base
(`b15009f34ad8e5d7b56e71745658985dec1f960b`). Every failure was present in the
merge-base before task-008 made any changes. `git diff MERGE_BASE..HEAD` on each
failing file shows no task-008 changes to those locations.

The two checks that task-008's implementation cycle fixed (previously failing):
- `check-partial-error-assertions` — fixed by splitting OR-chained assertions
- `check-weak-test-assertions` — fixed by strict equality on `error_type`

Additionally, the `check-partial-error-assertions.sh` script itself had a TS
grep bug (BRE `\|` treated as alternation) that was fixed by adding `-E` flag.

