## Outbox Pattern Implementation — task-017

All requirements from `specs/shared-kernel/outbox.spec.md` are implemented and
covered by unit tests. 2413 unit tests pass (0 failures).

### Requirement Coverage

**REQ-1: Transactional Event Storage**
- `infrastructure/outbox/repository.py` — `OutboxRepository.append()` uses
  `session.add()` only; never commits. Session is shared with the aggregate
  repository so both writes commit or roll back atomically.
- Tests: `TestOutboxWorkerTransactionAtomicity` in `test_worker.py`

**REQ-2: Event Processing**
- `infrastructure/outbox/worker.py` — `OutboxWorker._process_batch()` fetches
  unprocessed entries, dispatches to the injected `EventHandler`, marks entries
  processed on success.
- Transient failures increment `retry_count` and record `last_error`.
- Entries exceeding `max_retries` are moved to DLQ (`failed_at` set).
- Tests: `TestOutboxWorkerRetryBehavior`, `TestOutboxWorkerProcessBatch`

**REQ-3: Idempotent Event Handlers**
- `fetch_unprocessed()` filters `WHERE processed_at IS NULL AND failed_at IS NULL`.
- SpiceDB write path uses relationship upsert semantics — duplicates are no-ops.
- Tests: `TestOutboxWorkerIdempotency`, `TestSpiceDBEventHandlerIdempotency`

**REQ-4: Concurrent Worker Safety**
- `repository.py::fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`.
- Test: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  (compiled with PostgreSQL dialect, asserts SKIP LOCKED present in SQL)

**REQ-5: Dual Delivery Mechanism**
- Real-time: `infrastructure/outbox/event_sources/postgres_notify.py` —
  `PostgresNotifyEventSource` listens on the `outbox_events` NOTIFY channel
  installed by migration `d32ecc44581a`.
- Polling fallback: `OutboxWorker._poll_loop()` runs every 30 s (configurable).
- Tests: `test_postgres_notify_event_source.py`, `TestOutboxWorkerLifecycle`

**REQ-6: Event Fan-Out**
- `infrastructure/outbox/composite.py` — `CompositeEventHandler` dispatches to
  all handlers registered for an event type.
- Unknown event types raise `UnknownEventTypeError` → worker immediately DLQs
  the entry without incrementing retry count.
- Tests: `test_composite.py`, `TestOutboxWorkerRetryBehavior::test_unknown_event_type_*`

