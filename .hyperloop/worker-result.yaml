### Requirement: Knowledge Graph Listing — COVERED

**Implementation:**
- `KnowledgeGraphService.list_for_workspace()` — checks `VIEW` on workspace, uses
  `authz.read_relationships()` to discover KGs linked to the workspace, filters by tenant.
  Per-KG VIEW check is not redundant: workspace VIEW transitively grants VIEW on all KGs
  per the SpiceDB schema (`knowledge_graph.view = ... + workspace->view`).

