### Requirement: Knowledge Graph Update — COVERED

**Code:** `service.update()` checks EDIT on the KG resource, fetches from repo, validates tenant match, calls `kg.update()` (validates name and guards against `_deleted` state), saves in a transaction. `IntegrityError` converts to `DuplicateKnowledgeGraphNameError`.

**Tests:**
- Scenario "Update name and description": `test_update_calls_aggregate_update_and_saves`, `test_update_raises_unauthorized_when_permission_denied`, `test_update_raises_duplicate_on_integrity_error` (service unit); `test_update_knowledge_graph_returns_200`, `test_update_knowledge_graph_returns_403_when_unauthorized` (route unit); `test_updates_knowledge_graph` (integration repository).

