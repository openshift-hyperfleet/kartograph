### Requirement: Knowledge Graph Creation — COVERED

**Scenario: Successful creation**
- `KnowledgeGraphService.create()` checks `Permission.EDIT` on workspace, calls
  `KnowledgeGraph.create()` (ULID via `KnowledgeGraphId.generate()`), sets `tenant_id`
  and `workspace_id`, saves via repo. Auth relationships established via outbox pattern
  (KnowledgeGraphCreated event → ManagementEventTranslator).
- Tests:
  - `TestKnowledgeGraphServiceCreate::test_create_saves_aggregate_via_repo`
  - `TestKnowledgeGraphCreate::test_create_generates_unique_id`
  - `TestKnowledgeGraphCreate::test_create_emits_knowledge_graph_created_event`

**Scenario: Duplicate name within tenant**
- `IntegrityError` from repo is caught and re-raised as `DuplicateKnowledgeGraphNameError`.
- Route: returns HTTP 409 Conflict.
- Tests:
  - `TestKnowledgeGraphServiceCreate::test_create_raises_duplicate_on_integrity_error`
  - `TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_409_for_duplicate_name`

