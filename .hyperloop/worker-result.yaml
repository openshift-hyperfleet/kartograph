### Requirement 4: API Key Revocation — COVERED

**Implementation:**
- `revoke_api_key()`: loads key by tenant (user_id=None for admin path), checks
  `REVOKE` permission via SpiceDB, calls `api_key.revoke()` which raises
  `APIKeyAlreadyRevokedError` if already revoked
- SpiceDB schema: `api_key#revoke = owner + tenant->administrate` (tenant admin path)
- Soft delete: `is_revoked = True`, row stays in database

**Scenario: Owner revokes own key** — COVERED
- Tests: `test_owner_can_revoke_own_key` (integration — alice as member/owner, not admin),
  `test_revokes_existing_key` (service unit)

**Scenario: Tenant admin revokes any key** — COVERED
- Tests: `test_tenant_admin_can_revoke_other_users_key` (integration — bob creates, alice
  admin revokes)

**Scenario: Already revoked** — COVERED
- Tests: `test_raises_when_already_revoked` (service unit), `test_returns_409_when_already_revoked`
  (route test)

**Scenario: Unauthorized revocation** — COVERED
- Tests: `test_non_admin_cannot_revoke_other_users_key` (integration — bob tries to revoke
  alice's key, gets 403), `test_revoke_raises_unauthorized_when_denied` (service unit),
  `test_revoke_api_key_returns_403_when_unauthorized` (route test)

**Bonus: Revoked key visible in listing** — COVERED
- Test: `test_revoked_key_remains_visible_in_listing` (integration — full chain: create →
  process outbox → revoke → list → assert `is_revoked=True`)

