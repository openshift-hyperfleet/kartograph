## Per-Requirement Findings

### Requirement: Knowledge Graph Creation — COVERED

**Code:**
- `KnowledgeGraphService.create()` (`management/application/services/knowledge_graph_service.py:99-166`)
  checks EDIT permission on workspace before proceeding.
- `KnowledgeGraph.create()` (`management/domain/aggregates/knowledge_graph.py:96-154`)
  generates a ULID via `KnowledgeGraphId.generate()`, sets `tenant_id`, `workspace_id`.
- On save, the `KnowledgeGraphCreated` domain event is written to the outbox in the same DB
  transaction. The `ManagementEventTranslator._translate_knowledge_graph_created()`
  (`management/infrastructure/outbox/translator.py:119-147`) produces two `WriteRelationship`
  operations — `knowledge_graph:#workspace@workspace:<ws_id>` and
  `knowledge_graph:#tenant@tenant:<tenant_id>` — satisfying the auth-relationship requirement.

**Scenario: Successful creation — COVERED**
- Tests: `TestKnowledgeGraphServiceCreate::test_create_checks_edit_permission_on_workspace`,
  `test_create_saves_aggregate_via_repo`, `TestKnowledgeGraphCreate::test_create_sets_all_fields`,
  `test_create_generates_unique_id`, `test_create_emits_knowledge_graph_created_event`,
  `TestManagementEventTranslatorKnowledgeGraphCreated::test_first_operation_is_workspace_relationship`,
  `test_second_operation_is_tenant_relationship`,
  `TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_201`.

**Scenario: Duplicate name within tenant — COVERED**
- `KnowledgeGraphService.create()` catches `IntegrityError` and raises
  `DuplicateKnowledgeGraphNameError`.
- `KnowledgeGraphRepository.save()` identifies `uq_knowledge_graphs_tenant_name` constraint
  and raises the same port exception.
- Tests: `TestKnowledgeGraphServiceCreate::test_create_raises_duplicate_on_integrity_error`,
  `TestKnowledgeGraphUniqueness::test_duplicate_name_in_same_tenant_raises_error` (integration),
  `TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_409_for_duplicate_name`.

