## Spec Requirement Coverage

### REQ-1: Transactional Event Storage — PASS
- `OutboxRepository.append()` calls `session.add()`, never `session.commit()`. Caller owns the transaction.
- Tests: `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`, `test_failed_service_call_leaves_no_outbox_entries`

### REQ-2: Event Processing — PASS
- Normal: handler called, `processed_at` timestamp set
- Transient failure: `retry_count` incremented, `last_error` recorded, `event_processing_failed` probe called
- Permanent failure (DLQ): `failed_at` set when `retry_count + 1 >= max_retries`
- Tests: full `TestOutboxWorkerRetryBehavior` suite (6 tests)

### REQ-3: Idempotent Event Handlers — PASS
- `fetch_unprocessed` filters `processed_at IS NULL AND failed_at IS NULL` — already-processed/DLQ entries excluded
- `SpiceDBEventHandler` uses SpiceDB's upsert semantics (set membership) — duplicate writes are idempotent
- `FakeAuthorizationProvider` in unit tests mirrors set-based upsert semantics
- Tests: `TestOutboxWorkerIdempotency`, `TestSpiceDBEventHandlerIdempotency`

### REQ-4: Concurrent Worker Safety — PASS
- `fetch_unprocessed()` uses `WITH FOR UPDATE SKIP LOCKED` (PostgreSQL row-level locking)
- `_process_single()` (NOTIFY path) also uses `WITH FOR UPDATE SKIP LOCKED`
- Tests: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked` (inspects compiled SQL dialect output)

### REQ-5: Dual Delivery Mechanism — PASS
- Real-time: `PostgresNotifyEventSource` uses `asyncpg-listen` on `outbox_events` channel; trigger migration `d32ecc44581a` fires `pg_notify` on INSERT
- Polling fallback: `_poll_loop()` runs every `poll_interval_seconds` (default 30s)
- Tests: `TestPostgresNotifyEventSource*` suite, `TestOutboxWorkerLifecycle`

### REQ-6: Event Fan-Out — PASS
- `CompositeEventHandler.register()` builds `dict[str, list[EventHandler]]`; `handle()` iterates all handlers for the type
- Unknown event type raises `UnknownEventTypeError` (not `ValueError`), causing the worker to immediately move the entry to DLQ bypassing retry logic
- Tests: `TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers`, `test_handle_raises_for_unknown_event_type`, `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`

