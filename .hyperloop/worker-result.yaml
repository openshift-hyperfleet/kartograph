### Implementation Summary

The transactional outbox pattern is implemented across the shared_kernel and
infrastructure bounded contexts:

**Domain Layer (`shared_kernel/outbox/`):**
- `value_objects.py` — `OutboxEntry` frozen dataclass (immutable value object)
- `ports.py` — `IOutboxRepository`, `EventHandler`, `EventTranslator`,
  `EventSerializer`, `OutboxEventSource` protocols
- `operations.py` — `WriteRelationship`, `DeleteRelationship`,
  `DeleteRelationshipsByFilter` SpiceDB operation value objects
- `exceptions.py` — `UnknownEventTypeError` for permanent failure signalling
- `observability.py` — `OutboxWorkerProbe` and `EventSourceProbe` protocols
  with `Default*` implementations (Domain Oriented Observability)

**Infrastructure Layer (`infrastructure/outbox/`):**
- `models.py` — `OutboxModel` SQLAlchemy ORM (uuid PK, retry_count, last_error,
  failed_at, processed_at columns)
- `repository.py` — `OutboxRepository` implementing `IOutboxRepository`;
  uses shared session, never commits (caller owns transaction boundary)
- `worker.py` — `OutboxWorker` with poll loop + pluggable event source;
  graceful shutdown (in-progress batch completes before stop)
- `composite.py` — `CompositeEventHandler` for event fan-out
- `spicedb_handler.py` — `SpiceDBEventHandler` for SpiceDB relationship writes
- `event_sources/postgres_notify.py` — `PostgresNotifyEventSource` using
  asyncpg-listen for real-time LISTEN/NOTIFY delivery

**Database Migrations:**
- `6d11eae0e76d_create_outbox_table.py` — base outbox table
- `a1b2c3d4e5f6_add_outbox_retry_columns.py` — retry_count, last_error, failed_at
- `d32ecc44581a_create_outbox_notify_trigger.py` — pg_notify trigger on INSERT

