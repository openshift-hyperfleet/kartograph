3. `check-property-merge-semantics.sh`: `queries.py:184` contains `SET properties = (s.properties::text)::ag_catalog.agtype` without `||`. This line exists identically on alpha ‚Äî `git diff alpha -- src/api/graph/infrastructure/age_bulk_loading/queries.py` produces zero output. Task-017 never touched this file.

