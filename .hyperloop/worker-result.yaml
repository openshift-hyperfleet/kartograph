## Groups Implementation Coverage (carried from round 20)

All 10 SHALL requirements from `specs/iam/groups.spec.md` are implemented
and covered by tests.

1. **Group Creation** — ULID generated; creator auto-assigned admin role.
2. **Group Name Validation** — 1–255 chars after trim; empty/whitespace → 422.
3. **Group Retrieval** — VIEW permission checked; unauthorized → 404.
4. **Group Listing** — `lookup_resources` filters by VIEW; tenant membership implies VIEW.
5. **Group Rename** — MANAGE required; duplicate name → 409.
6. **Group Deletion** — MANAGE required; member snapshot in `GroupDeleted` event.
7. **Group Member Management** — add/remove/update; last-admin protected → 400.
8. **Group Member Listing** — VIEW required; SpiceDB `read_relationships` used.
9. **Workspace Access Inheritance** — SpiceDB chains group members to workspace roles.
10. **Group Roles** — ADMIN: manage+view+workspace; MEMBER: view+workspace.

