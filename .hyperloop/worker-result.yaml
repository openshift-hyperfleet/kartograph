  Requirement 6 -- Event Fan-Out: COVERED

  Implementation:
    infrastructure/outbox/composite.py -- CompositeEventHandler.register() appends
    handlers by event type (deduplicates same handler), handle() fans out to all
    registered handlers for the type, raises UnknownEventTypeError if no handlers found.
    infrastructure/outbox/worker.py _process_entries() catches UnknownEventTypeError
    and immediately calls _move_to_dlq() bypassing the retry logic.

