Spec alignment review for specs/iam/tenants.spec.md against the implementation on
branch hyperloop/task-002.

All 2024 unit tests pass. All spec requirements for implemented features are covered.

## Requirement: Tenant Creation

### Scenario: Successful creation — COVERED
- Implementation: `src/api/iam/application/services/tenant_service.py` `create_tenant()`
  generates ULID via `TenantId.generate()`, grants creator `TenantRole.ADMIN`, creates
  root `Workspace` and grants creator `WorkspaceRole.ADMIN` on it.
- Tests: `tests/unit/iam/application/test_tenant_service.py::TestCreateTenant`
  (4 tests: creates tenant, grants admin, creates root workspace, workspace uses settings name)
- Integration: `tests/integration/iam/test_tenant_authorization.py::TestTenantCreationAutoGrant`

### Scenario: Duplicate name — COVERED
- Implementation: `DuplicateTenantNameError` caught in `tenant_service.create_tenant()`,
  route maps to HTTP 409 in `src/api/iam/presentation/tenants/routes.py`.
- Tests: `tests/integration/iam/test_tenant_api.py::TestCreateTenant::test_returns_409_for_duplicate_name`

### Scenario: Single-tenant mode — COVERED
- Implementation: `require_multi_tenant_mode` dependency on POST `/tenants` and
  DELETE `/tenants/{id}` in routes.py; returns 403 with "single-tenant" in detail.
- Tests: `tests/unit/iam/presentation/test_tenant_routes_single_tenant_gate.py::TestCreateTenantBlockedInSingleTenantMode`

### Scenario: Tenant graph provisioning — COVERED
- Implementation: `src/api/graph/infrastructure/tenant_graph_handler.py`
  `TenantAGEGraphHandler` handles `TenantCreated` event, provisions
  `tenant_{tenant_id}` AGE graph via `AGEGraphProvisioner.ensure_graph_exists()`
  with create-if-not-exists semantics (checks `ag_catalog.ag_graph` before creation).
  Registered in outbox worker in `main.py`.
- Tests: `tests/unit/graph/infrastructure/test_tenant_graph_handler.py`
  (13 tests covering graph name format, idempotency, provisioner behavior)

## Requirement: Tenant Retrieval

### Scenario: Authorized retrieval — COVERED
- Implementation: `get_tenant()` checks SpiceDB VIEW permission; returns `TenantResponse`
  with `id` and `name` fields only.
- Tests: `tests/unit/iam/application/test_tenant_service.py::TestGetTenant`

### Scenario: Unauthorized or non-existent — COVERED
- Implementation: Both missing tenant and no-VIEW-permission return `None`, which maps to
  HTTP 404 — no distinction between the two cases.
- Tests: `TestGetTenant::test_returns_none_when_tenant_not_found`,
  `test_returns_none_when_user_lacks_view_permission`

## Requirement: Tenant Listing

### Scenario: User belongs to multiple tenants — COVERED
- Implementation: `list_tenants()` uses SpiceDB `lookup_resources` to filter by VIEW
  permission. Only accessible tenants returned.
- Tests: `tests/unit/iam/application/test_tenant_service.py::TestListTenants::test_returns_only_tenants_user_can_view`
- Integration: `tests/integration/iam/test_tenant_authorization.py::TestTenantListingFiltered`

### Scenario: User belongs to no tenants — COVERED
- Tests: `TestListTenants::test_returns_empty_list_when_user_has_no_access`

## Requirement: Tenant Deletion

### Scenario: Successful deletion — COVERED
- Implementation: `delete_tenant()` cascades: workspaces sorted depth-first (deepest child
  first), then groups, then API keys, then captures member snapshot, then deletes tenant.
- Tests: `tests/unit/iam/application/test_tenant_service.py::TestDeleteTenant`
  (workspace cascade, multiple workspace cascade, member snapshot via `TenantDeleted.members`)

### Scenario: Unauthorized deletion — COVERED
- Implementation: ADMINISTRATE permission check before any DB operations; raises
  `UnauthorizedError` → HTTP 403.
- Tests: `TestDeleteTenant::test_delete_tenant_raises_unauthorized_if_no_permission`

### Scenario: Single-tenant mode — COVERED
- Tests: `test_tenant_routes_single_tenant_gate.py::TestDeleteTenantBlockedInSingleTenantMode`

## Requirement: Add Tenant Member

### Scenario: Add new member — COVERED
- Implementation: `add_member()` emits `TenantMemberAdded` event.
- Tests: `TestAddMember::test_adds_member_to_tenant`, `test_adds_admin_to_tenant`

### Scenario: Change member role — COVERED
- Implementation: Fetches current role from SpiceDB via `read_relationships`, emits
  `TenantMemberRemoved` (old role) then `TenantMemberAdded` (new role).
- Tests: `TestAddMember::test_replaces_role_when_user_has_different_role`

### Scenario: Promote to admin syncs root workspace — COVERED
- Implementation: `_sync_root_workspace_access()` grants `WorkspaceRole.ADMIN` on root
  workspace when `new_tenant_role == TenantRole.ADMIN`.
- Tests: `TestAddMember::test_add_admin_grants_root_workspace_admin`
- Integration: `TestAutoGrantRootWorkspaceAccess::test_adding_tenant_admin_grants_root_workspace_admin`

### Scenario: Demote from admin syncs root workspace — COVERED
- Implementation: `_sync_root_workspace_access()` revokes workspace admin when
  role changes from ADMIN to MEMBER.
- Tests: `TestAddMember::test_downgrade_admin_to_member_revokes_root_workspace_admin`
- Integration: `test_downgrading_tenant_admin_to_member_revokes_root_workspace_admin`

### Scenario: Demote last admin — COVERED
- Implementation: `is_last_admin` check in `tenant_repository.is_last_admin()`;
  `CannotRemoveLastAdminError` raised → HTTP 409 in route.
- Tests: `TestAddMember::test_cannot_demote_last_tenant_admin`;
  route test: `TestAddTenantMemberRoute::test_returns_409_when_demoting_last_admin`

## Requirement: Remove Tenant Member

### Scenario: Successful removal — COVERED
- Implementation: `remove_member()` emits `TenantMemberRemoved`; also calls
  `_revoke_root_workspace_access()` to remove any workspace membership.
- Tests: `TestRemoveMember::test_removes_member_from_tenant`

### Scenario: Removing an admin syncs root workspace — COVERED
- Tests: `TestRemoveMember::test_remove_admin_revokes_root_workspace_admin`
- Integration: `TestAutoGrantRootWorkspaceAccess::test_removing_tenant_member_revokes_root_workspace_access`

### Scenario: Remove last admin — COVERED
- Implementation: `is_last_admin` checked; `CannotRemoveLastAdminError` raised → HTTP 409.
- Tests: `TestRemoveMember::test_raises_error_if_last_admin`;
  route test: `TestRemoveTenantMemberRoute::test_returns_409_when_removing_last_admin`

## Requirement: List Tenant Members

### Scenario: Authorized listing — COVERED
- Implementation: `list_members()` queries SpiceDB `read_relationships` for all user
  role tuples on tenant; returns `list[tuple[user_id, role]]`.
- Tests: `TestListMembers::test_lists_members_from_spicedb`

### Scenario: Unauthorized listing — COVERED
- Implementation: ADMINISTRATE permission check; raises `UnauthorizedError` → HTTP 403.
- Tests: `TestListMembers::test_raises_unauthorized_if_no_permission`;
  route test: `TestListTenantMembersRoute::test_returns_403_when_not_admin`

## Requirement: Tenant Name Validation

### Scenario: Valid name (1–255 chars) — COVERED
- Implementation: Pydantic `CreateTenantRequest.name` field has `min_length=1, max_length=255`.

### Scenario: Empty name — COVERED
- Tests: `tests/integration/iam/test_tenant_api.py::TestCreateTenant::test_returns_422_for_empty_name`

### Scenario: Name too long (>255 chars) — COVERED
- Implementation: `max_length=255` on Pydantic field → automatic 422 response.
- Note: No explicit unit test for >255 char names; the Pydantic constraint makes this
  implicit. This is a SHOULD-level gap (Pydantic enforcement without an explicit test),
  not a SHALL failure.

## Requirement: Default Tenant Bootstrap

### Scenario: First startup — COVERED
- Implementation: `TenantBootstrapService.ensure_default_tenant_with_workspace()` creates
  tenant and root workspace when neither exist.
- Tests: `TestEnsureDefaultTenantWithWorkspace::test_creates_tenant_and_workspace_when_neither_exist`

### Scenario: Subsequent startup — COVERED
- Implementation: Method checks existence first; returns existing without creating.
- Tests: `test_does_nothing_when_tenant_and_workspace_exist`

### Scenario: Concurrent startup — COVERED
- Implementation: Uses SQLAlchemy `begin_nested()` (savepoints) to isolate creation;
  catches `DuplicateTenantNameError` and re-queries to get the concurrently created tenant.
- Tests: `test_handles_race_condition_on_tenant_creation`

## Summary

All SHALL requirements and all scenarios from the Tenants spec are implemented and tested.
The only minor gap is the absence of an explicit test for names exceeding 255 characters
(the Pydantic `max_length=255` constraint handles it implicitly). This is not a FAIL.
