## Requirement-by-Requirement Findings

### Requirement: Read-Only Enforcement

#### Scenario A – Database-level enforcement (primary)
**Status: PARTIAL**

- **Implementation**: `query_repository.py` issues `SET TRANSACTION READ ONLY`
  before executing Cypher (confirmed via `execute_sql` call).
- **Unit tests**: `test_sets_transaction_read_only` and
  `test_database_read_only_applied_before_query` verify the mechanism and
  call ordering via mocks.
- **Integration test gap**: No integration test bypasses the keyword blacklist
  to verify that the database engine itself rejects a write command on the
  read-only session. DB-level enforcement is only exercised through mocked
  collaborators.
- **Note**: Unit tests verify the mechanism. The DB-level contract is
  structurally enforced but not validated end-to-end. This alone is a note,
  not a FAIL, since unit tests do cover the mechanism.

#### Scenario B – Keyword blacklist, correlation ID, redacted log
**Status: PARTIAL → FAIL**

- **Implementation**: `_validate_read_only` rejects CREATE, DELETE, SET,
  REMOVE, MERGE, EXPLAIN, LOAD (case-insensitive). Generates a UUID
  correlation ID and raises `QueryForbiddenError`. The
  `DefaultQueryServiceProbe.cypher_query_rejected` method receives `query`
  as an argument but does not log it — only `reason` and `correlation_id`
  are logged.
- **Unit tests covering keyword rejection, correlation ID generation and
  propagation**: Thorough — 14 tests in `TestValidateReadOnly`, plus
  `test_forbidden_error_has_correlation_id`,
  `test_forbidden_error_correlation_id_is_unique`,
  `test_forbidden_error_includes_correlation_id_in_response`,
  `test_forbidden_error_correlation_id_included_in_probe_call`.
- **Missing test**: No unit or integration test asserts that the raw query
  text is **absent** from any logged output. The spec says the forbidden
  query SHALL produce "a redacted reference logged (not the raw query text)".
  This is an observable behavioral contract that requires an automated
  assertion, not just a code-convention comment.
- **What is needed**: A unit test that spies on the `DefaultQueryServiceProbe`
  log calls (or the probe's `cypher_query_rejected` invocation args) and
  asserts the raw query string does not appear in any logging output.

