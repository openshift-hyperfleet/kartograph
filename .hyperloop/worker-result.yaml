## Requirement Coverage

### Requirement: API Key Creation â€” COVERED

- **Successful creation scenario**: `test_secret_has_karto_prefix` in
  `test_api_key_service.py` verifies `karto_` prefix; `test_creates_api_key_with_hashed_secret`
  verifies bcrypt hash != plaintext; `test_stores_prefix_from_secret` verifies 12-char prefix;
  `test_returns_plaintext_secret_only_at_creation` verifies return semantics.
  `APIKeyCreatedResponse` model includes `secret`; `APIKeyResponse` does not.

- **Duplicate name scenario**: `test_raises_on_duplicate_name` in service tests;
  `test_returns_409_on_duplicate_name` in route tests; `test_raises_on_duplicate_name`
  in repository tests. Repository checks uniqueness by (name, user_id, tenant_id).

- **Expiration bounds scenario**: `CreateAPIKeyRequest` enforces `ge=1, le=3650` via
  Pydantic field; default `expires_in_days=30`. Tests:
  `test_validates_expires_in_days_minimum`, `test_validates_expires_in_days_maximum`,
  `test_uses_default_expires_in_days_of_30`.

### Requirement: API Key Authentication â€” COVERED

- **Valid key scenario**: `test_authenticates_with_valid_api_key` (integration) confirms
  authenticated response. `test_updates_last_used_at` in service tests verifies
  `last_used_at` updated; `test_updates_last_used_at_on_success` (integration) confirms
  end-to-end.

- **Expired key scenario**: `test_returns_none_for_expired_key` (unit service);
  `test_returns_401_for_expired_api_key` (integration, using direct DB insert to bypass
  min-expiry route validation).

- **Revoked key scenario**: `test_returns_none_for_revoked_key` (unit service);
  `test_returns_401_for_revoked_api_key` (integration).

- **JWT takes precedence scenario**: `_authenticate()` in `user.py` checks `token is not None`
  first, raises 401 immediately on invalid JWT without falling through to API key.
  Integration test `test_invalid_jwt_with_valid_api_key_uses_api_key` confirms 401 returned
  when JWT is invalid even with valid API key.

- **Prefix collision scenario**: `get_verified_key` in `api_key_repository.py` queries all
  keys with matching prefix, calls `self._probe.api_key_prefix_collision(prefix, len(models))`
  when `len(models) > 1`, which logs at `error` level. Test
  `test_logs_error_on_prefix_collision` in repository tests verifies probe call.

### Requirement: API Key Listing â€” COVERED

- **List keys scenario**: `APIKeyResponse.from_domain()` returns name, prefix, created_at,
  expires_at, last_used_at, is_revoked â€” no secret or hash. `test_never_returns_secret_or_hash`
  verifies this. Service uses SpiceDB `lookup_resources` with VIEW permission.

- **Filter by creator scenario**: `list_api_keys` accepts optional `created_by_user_id`;
  route accepts `user_id` query param. `test_filters_by_created_by_user_id` verifies.

### Requirement: API Key Revocation â€” COVERED

- **Owner revokes own key scenario**: `test_owner_can_revoke_own_key` (integration, uses
  SpiceDB owner relationship). Key remains with `is_revoked=True` per
  `test_revoked_key_remains_visible_in_listing` (integration).

- **Tenant admin revokes any key scenario**: `test_tenant_admin_can_revoke_other_users_key`
  (integration). Service uses SpiceDB REVOKE permission check which spans owner + tenant admin.

- **Already revoked scenario**: `APIKey.revoke()` raises `APIKeyAlreadyRevokedError` if
  `is_revoked is True`. `test_raises_when_already_revoked` (service unit test);
  `test_returns_409_when_already_revoked` (route unit test).

- **Unauthorized revocation scenario**: `test_non_admin_cannot_revoke_other_users_key`
  (integration, 403). `test_revoke_raises_unauthorized_when_denied` (service unit test);
  `test_revoke_api_key_returns_403_when_unauthorized` (route unit test).

### Requirement: API Key Cascade Deletion â€” COVERED

- **Tenant deletion scenario**: `TenantService.delete_tenant()` calls
  `self._api_key_repository.list(tenant_id=tenant_id)` and iterates each key calling
  `api_key.mark_for_deletion()` then `self._api_key_repository.delete(api_key)`. Tests:
  `test_deletes_api_keys_on_tenant_deletion`, `test_deletes_multiple_api_keys_on_tenant_deletion`,
  `test_api_key_mark_for_deletion_emits_deleted_event` in `test_tenant_service.py`.
  `mark_for_deletion()` emits `APIKeyDeleted` event processed by outbox worker for SpiceDB
  relationship cleanup.

### Requirement: API Key Name Validation â€” COVERED

- **Valid name scenario**: `CreateAPIKeyRequest` has `name: str = Field(..., min_length=1, max_length=255)`.
  Any 1â€“255 character name accepted.

- **Empty name scenario**: `test_validates_name_min_length` in route tests confirms 422 returned
  for empty string.

