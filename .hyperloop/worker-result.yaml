## Summary

The PR feedback fix is correct: `UserRepository.save()` now calls
`await self._session.flush()` inside the `try/except IntegrityError` block,
ensuring SQLAlchemy's deferred INSERT fires immediately within the try scope.
Without this, the `IntegrityError` would escape uncaught at transaction
commit time (outside `save()`). Pattern is consistent with TenantRepository
and other repositories in the codebase.

All mandatory checks pass. Implementation is correct, complete, and
well-tested per TDD requirements.
