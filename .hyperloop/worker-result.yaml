### 4. API Key Revocation — COVERED

**Owner revokes own key**
- Implementation:
  - SpiceDB grants `owner` relationship at creation → `revoke` permission satisfied.
  - `src/api/iam/application/services/api_key_service.py:215–229` — permission check
    then `api_key.revoke()`.
- Tests:
  - `tests/integration/test_api_key_auth.py`: `test_owner_can_revoke_own_key`
  - `tests/unit/iam/application/test_api_key_service.py`:
    `test_revoke_succeeds_for_authorized_user`

**Tenant admin revokes any key**
- Implementation: SpiceDB schema — `api_key#revoke` satisfied by
  `tenant->administrate` relation; `api_key#tenant@tenant` relationship written at
  key creation.
- Tests:
  - `tests/integration/test_api_key_auth.py`:
    `test_tenant_admin_can_revoke_other_users_key` — Bob creates key, Alice (tenant
    admin) revokes it → 204.

**Already revoked → 409 conflict**
- Implementation:
  - `src/api/iam/domain/aggregates/api_key.py:103–106` — `revoke()` raises
    `APIKeyAlreadyRevokedError` if `is_revoked is True`.
  - Route maps this exception to 409.
- Tests:
  - `tests/unit/iam/domain/test_api_key_aggregate.py`:
    `test_revoke_already_revoked_raises_error`
  - `tests/unit/iam/presentation/test_api_key_routes.py`:
    `test_returns_409_when_already_revoked`

**Unauthorized → 403 forbidden**
- Implementation:
  - `src/api/iam/application/services/api_key_service.py:220–225` — raises
    `UnauthorizedError` when SpiceDB denies permission.
  - Route maps to 403.
- Tests:
  - `tests/integration/test_api_key_auth.py`:
    `test_non_admin_cannot_revoke_other_users_key` — Bob (member) tries to revoke
    Alice's key → 403.
  - `tests/unit/iam/application/test_api_key_service.py`:
    `test_revoke_raises_unauthorized_when_denied`
  - `tests/unit/iam/presentation/test_api_key_routes.py`:
    `test_revoke_api_key_returns_403_when_unauthorized`

**Revoked key remains visible with is_revoked=True**
- Implementation: soft-revocation; key row not deleted, `is_revoked` flag set.
- Tests:
  - `tests/integration/test_api_key_auth.py`:
    `test_revoked_key_remains_visible_in_listing`

