### Requirement 3: Idempotent Event Handlers — COVERED

**Implementation:**
- `OutboxRepository.fetch_unprocessed()` filters `processed_at IS NULL` AND
  `failed_at IS NULL`, so already-processed entries are never re-fetched.
- `SpiceDBEventHandler._apply_operation()` calls `authz.write_relationship()` which
  uses upsert semantics in SpiceDB (set membership).

**Scenario: Duplicate delivery**
- Unit test: `test_already_processed_entry_excluded_from_fetch` (test_worker.py:690) —
  verifies compiled SQL contains `processed_at IS NULL`.
- Unit test: `test_duplicate_invocation_produces_identical_final_state`
  (test_spicedb_handler.py:263) — uses `FakeAuthorizationProvider` with a Python `set`
  (upsert semantics); calls handler twice; asserts final state identical to
  single invocation.
- Integration test: `test_handler_invoked_twice_produces_same_spicedb_state`
  (test_outbox_consistency.py:595) — first invocation writes to real SpiceDB, second
  invocation (via `_process_batch()`) produces identical SpiceDB state; `processed_at`
  set after retry.

