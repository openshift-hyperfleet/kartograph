  ## Requirement: Knowledge Graph Creation

  ### Scenario: Successful creation — COVERED
  - Service: management/application/knowledge_graph_service.py — create() generates ULID,
    associates workspace_id and tenant_id, calls kg_repo.save(), emits outbox event for
    SpiceDB relationship creation (workspace + tenant links).
  - Tests: test_knowledge_graph_service.py TestCreateKnowledgeGraph — covers ULID generation,
    workspace association, tenant association, auth relationship establishment via outbox.

  ### Scenario: Duplicate name within tenant — COVERED
  - Service: create() checks for existing KG with same name in tenant via kg_repo.find_by_name();
    raises DuplicateKnowledgeGraphNameError on collision.
  - Tests: test_knowledge_graph_service.py test_create_raises_on_duplicate_name.
  - Route: test_knowledge_graph_routes.py test_create_returns_409_on_duplicate_name.

