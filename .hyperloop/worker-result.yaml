### Spec Requirements Verification

All requirements from `specs/management/knowledge-graphs.spec.md` are implemented and tested:

**Requirement: Knowledge Graph Creation**
- ‚úÖ `KnowledgeGraph.create()` generates a ULID identifier via `KnowledgeGraphId.generate()`
- ‚úÖ Associates knowledge graph with workspace and tenant
- ‚úÖ Emits `KnowledgeGraphCreated` event ‚Üí outbox ‚Üí SpiceDB writes (workspace + tenant relationships)
- ‚úÖ `KnowledgeGraphService.create()` checks `edit` permission on workspace before creating
- ‚úÖ Duplicate name within tenant rejected via `(tenant_id, name)` unique DB constraint
  ‚Üí raises `DuplicateKnowledgeGraphNameError` ‚Üí HTTP 409

**Requirement: Knowledge Graph Name Validation**
- ‚úÖ `_validate_name()` enforces 1‚Äì100 character constraint
- ‚úÖ Empty or oversized names raise `InvalidKnowledgeGraphNameError` ‚Üí HTTP 422

**Requirement: Knowledge Graph Retrieval**
- ‚úÖ `KnowledgeGraphService.get()` checks `view` permission on the KG
- ‚úÖ Unauthorized or non-existent returns `None` (no 403 vs 404 distinction)

**Requirement: Knowledge Graph Listing**
- ‚úÖ `list_for_workspace()` looks up permitted KG IDs via SpiceDB `lookup_subjects`
- ‚úÖ Returns only knowledge graphs the user can view

**Requirement: Knowledge Graph Update**
- ‚úÖ `KnowledgeGraphService.update()` checks `edit` permission
- ‚úÖ Updates name and description, emits `KnowledgeGraphUpdated` event

**Requirement: Knowledge Graph Deletion**
- ‚úÖ `KnowledgeGraphService.delete()` checks `manage` permission
- ‚úÖ Within single transaction: deletes all data source credentials ‚Üí data sources ‚Üí knowledge graph
- ‚úÖ `KnowledgeGraphDeleted` event includes `workspace_id` so outbox translator cleans up
  all SpiceDB relationships (workspace link, tenant link, direct grants)
- ‚úÖ Transaction rollback on any failure (tested in unit tests)
- ‚úÖ `mark_for_deletion()` sets `_deleted=True`; subsequent mutations raise `AggregateDeletedError`

**Requirement: Permission Inheritance**
- ‚úÖ SpiceDB schema defines `edit = admin + editor + workspace->edit` and similar
- ‚úÖ Workspace-inherited access flows via ReBAC relations
- ‚úÖ Direct `admin` grant on a KG provides `manage`, `edit`, and `view` permissions

