### Requirement: Knowledge Graph Listing — COVERED

**SHALL list knowledge graphs within a workspace, filtered by authorization.**

**Scenario: List for workspace**
- Code: `KnowledgeGraphService.list_for_workspace()` checks workspace `VIEW` permission, then reads SpiceDB relationships to discover KG IDs linked to the workspace, fetches each from the repository, and filters by tenant. Workspace-level VIEW implies KG-level VIEW per the SpiceDB schema (`permission view = admin + editor + viewer + workspace->view`), so the result is correctly restricted to accessible KGs.
- Tests:
  - `TestKnowledgeGraphServiceListForWorkspace.test_list_checks_view_permission_on_workspace` (unit, service)
  - `TestKnowledgeGraphServiceListForWorkspace.test_list_uses_read_relationships_to_discover_kgs` (unit, service)
  - `TestKnowledgeGraphServiceListForWorkspace.test_list_filters_by_tenant` (unit, service)
  - `TestListKnowledgeGraphs.test_list_knowledge_graphs_returns_200_with_list` (unit, route)
  - `TestListKnowledgeGraphs.test_list_knowledge_graphs_returns_403_when_unauthorized` (unit, route)

