## Requirement 8 — Resolution of Prior PARTIAL

The prior review identified three gaps. All three are now addressed:

### 1. `buildQueryGraphArgs()` extracted and `knowledgeGraphId` parameter added

`src/dev-ui/app/composables/api/useQueryApi.ts` lines 17–28:
- `buildQueryGraphArgs(cypher, timeoutSeconds?, maxRows?, knowledgeGraphId?)` is now a
  pure, exported function.
- When `knowledgeGraphId !== undefined`, it sets `args.knowledge_graph_id = knowledgeGraphId`.
- `queryGraph()` (lines 57–62) now accepts `knowledgeGraphId?: string` as a fourth
  parameter and delegates argument construction to `buildQueryGraphArgs`.

### 2. `selectedKgId` forwarded to `queryGraph()` in `executeQuery()`

`src/dev-ui/app/pages/query/index.vue` lines 185–190:
```typescript
const res = await queryGraph(
  cypherQuery,
  Number(timeout.value),
  Number(maxRows.value),
  selectedKgId.value || undefined,
)
```
The `|| undefined` gate correctly converts an empty string (unscoped) to `undefined`,
ensuring no `knowledge_graph_id` field is emitted in the MCP tool call when the user
has not selected a specific graph.

### 3. Tests exercise real production code (not a standalone stub)

`src/dev-ui/app/tests/knowledge-graphs.test.ts` line 2:
```typescript
import { buildQueryGraphArgs } from '~/composables/api/useQueryApi'
```

Three targeted tests (lines 450–476) use the real helper:
- **Scoped**: `buildQueryGraphArgs(..., 'kg-1')` → `knowledge_graph_id === 'kg-1'` ✓
- **Unscoped**: `buildQueryGraphArgs(..., undefined)` → `knowledge_graph_id` absent ✓
- **Empty-string gate**: `'' || undefined` → `knowledge_graph_id` absent ✓

All 43 tests pass (`pnpm test`). All 16 SHALL requirements are COVERED.
