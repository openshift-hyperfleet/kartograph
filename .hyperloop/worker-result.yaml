### Summary

All 6 SHALL requirements and all 10 scenarios are **COVERED** — each has both a production implementation and one or more tests exercising the exact Given/When/Then conditions specified.

Additional quality observations (not blocking):
- Domain probes used throughout new production code (`observability.py`) — no direct `logger.*` or `print()` calls.
- `UnknownEventTypeError` correctly separated from `ValueError` so the worker's `isinstance` check cleanly distinguishes permanent from transient failures.
- `FakeAuthorizationProvider` (structural fake with set semantics) used in idempotency tests rather than mocks — compliant with NFR testing spec.
- `FOR UPDATE SKIP LOCKED` verified by compiling against the PostgreSQL dialect in a unit test (not just asserted by inspection).
