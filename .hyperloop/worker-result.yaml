## Task-008: Knowledge Graphs — Worker Verification

Branch: `hyperloop/task-008`

### Summary

Fresh verification pass on the existing implementation. All requirements from
`specs/management/knowledge-graphs.spec.md` are fully implemented and verified
against 2066 passing unit tests.

### Spec Coverage

**Requirement: Knowledge Graph Creation**
- PASS: Successful creation — `KnowledgeGraph.create()` generates a ULID,
  associates workspace and tenant, emits `KnowledgeGraphCreated` event which the
  outbox translator converts to SpiceDB `workspace` and `tenant` relationship writes.
- PASS: Duplicate name within tenant — `UniqueConstraint("tenant_id", "name")`
  on the ORM model; `IntegrityError` is caught and re-raised as
  `DuplicateKnowledgeGraphNameError` → HTTP 409.

**Requirement: Knowledge Graph Name Validation**
- PASS: Valid name — 1–100 characters accepted by `_validate_name()`.
- PASS: Empty or oversized name — `InvalidKnowledgeGraphNameError` raised,
  surfaced as HTTP 422 via Pydantic `max_length=100, min_length=1` on the request model.

**Requirement: Knowledge Graph Retrieval**
- PASS: Authorized retrieval — `get()` checks VIEW permission; returns aggregate.
- PASS: Unauthorized or non-existent — `get()` returns `None` (no existence
  leakage); route returns HTTP 404 in both cases.

**Requirement: Knowledge Graph Listing**
- PASS: List for workspace — `list_for_workspace()` reads SpiceDB relationships
  to discover KG IDs, fetches each from the repository, and filters by tenant.

**Requirement: Knowledge Graph Update**
- PASS: Update name and description — `update()` checks EDIT permission,
  calls `kg.update()`, saves via repository. `KnowledgeGraphUpdated` event emitted.

**Requirement: Knowledge Graph Deletion**
- PASS: Successful deletion — `delete()` checks MANAGE permission, cascades
  data source deletion (including encrypted credentials), then deletes the KG — all
  within a single `async with session.begin()` transaction. `KnowledgeGraphDeleted`
  event triggers outbox to remove workspace, tenant, admin, editor, and viewer
  relationships from SpiceDB.
- PASS: Atomicity — test `test_delete_rolls_back_on_ds_deletion_failure` verifies
  that if any DS deletion raises, `kg_repo.delete` is never called.
- PASS: Mutation after deletion — `AggregateDeletedError` raised by
  `kg.update()` when `_deleted=True`.

**Requirement: Permission Inheritance**
- PASS: Workspace-inherited access — SpiceDB schema defines
  `permission view = admin + editor + viewer + workspace->view` and
  `permission edit = admin + editor + workspace->edit`.
- PASS: Direct grant — SpiceDB `admin`, `editor`, `viewer` relations on
  `knowledge_graph` resource enable direct grants bypassing workspace role.

### Test Results

