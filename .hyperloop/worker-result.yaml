### REQ-4: Concurrent Worker Safety — COVERED

**Spec scenario:** Concurrent workers — each entry claimed by exactly one worker.

**Implementation:**
- `OutboxRepository.fetch_unprocessed()` compiles to
  `SELECT … FOR UPDATE SKIP LOCKED`. Multiple sessions racing for the same rows
  will each get a disjoint set; rows locked by one session are skipped by others.

**Tests:**
- Unit `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  — captures the SQLAlchemy query passed to `session.execute`, compiles it with
  the PostgreSQL dialect, and asserts `"SKIP LOCKED"` is present in the rendered
  SQL. Verifies the locking contract at the query level.

