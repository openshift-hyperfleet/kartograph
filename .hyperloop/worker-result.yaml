- Unit: `test_worker.py::TestOutboxWorkerIdempotency::test_failed_entries_excluded_from_fetch`
- Integration: `test_outbox_consistency.py::TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state`

