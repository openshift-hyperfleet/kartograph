### Requirement: Result Limiting

#### Scenario A – No LIMIT → LIMIT 1000 appended
**Status: COVERED**

- **Implementation**: `_ensure_limit` appends `LIMIT 1000` when no LIMIT found.
- **Unit tests**: `test_adds_limit_when_missing`, `test_ensures_limit_before_execution`.
- **Integration test**: `test_auto_adds_limit` confirms result count is bounded.

#### Scenario B – Explicit LIMIT ≤ 10000 → respected
**Status: COVERED**

- **Implementation**: `_ensure_limit` returns query unchanged when existing
  LIMIT ≤ MAX_LIMIT.
- **Unit tests**: `test_preserves_existing_limit`,
  `test_case_insensitive_limit_detection`, `test_respects_limit_at_absolute_maximum`,
  `test_respects_limit_within_absolute_maximum`.
- **Integration test**: `test_respects_explicit_limit`.

#### Scenario C – Explicit LIMIT > 10000 → capped to 10000
**Status: PARTIAL**

- **Implementation**: `_ensure_limit` uses `re.sub` to replace limits above
  `MAX_LIMIT = 10000`.
- **Unit tests**: `test_caps_limit_above_absolute_maximum` (15000 → 10000),
  `test_caps_limit_well_above_absolute_maximum` (999999 → 10000).
- **Integration test gap**: No integration test sends `LIMIT 20000` and
  verifies the actual results are capped to 10000 at the database level.
- **Note**: Unit tests are comprehensive. Missing integration test is a note,
  not a FAIL, since the capping logic is fully exercised at the unit level.

