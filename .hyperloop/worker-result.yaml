### Requirement 3: Mutation Log Format — COVERED

**Code:** `apply_mutations_from_jsonl()` in `GraphMutationService` iterates lines,
skips empty/whitespace-only lines, reports JSON parse errors with line number and a
content preview string.

**Scenario: Valid JSONL** — COVERED
- `test_parses_jsonl_and_applies_mutations`

**Scenario: Parse error on a line** — COVERED
- `test_returns_error_on_invalid_json` — asserts `"1"` in first error (line number),
  `"line content"` in second error (content preview). Matches spec exactly.

**Scenario: Empty lines** — COVERED
- `test_handles_whitespace_only_lines` — blank lines before/after operation are skipped

