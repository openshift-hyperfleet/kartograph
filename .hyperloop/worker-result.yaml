## Requirement-by-Requirement Coverage

### Knowledge Graph Creation — COVERED
- `KnowledgeGraphService.create()` enforces `edit` permission on workspace.
- `KnowledgeGraph.create()` generates ULID, associates tenant/workspace, emits `KnowledgeGraphCreated`.
- Outbox translator produces 2 SpiceDB `WriteRelationship` ops (workspace + tenant).
- Route: `POST /management/workspaces/{workspace_id}/knowledge-graphs` → 201, 403, 409, 422.
- Tests: `TestKnowledgeGraphServiceCreate` (5 tests), `TestKnowledgeGraphCreate` (9 tests), route tests.
- Duplicate name: `IntegrityError` caught → `DuplicateKnowledgeGraphNameError` → HTTP 409.

### Knowledge Graph Name Validation — COVERED
- Domain: `_validate_name()` enforces 1–100 chars, raises `InvalidKnowledgeGraphNameError`.
- Pydantic: `Field(min_length=1, max_length=100)` in `CreateKnowledgeGraphRequest` and `UpdateKnowledgeGraphRequest`.
- Tests: empty name, 101-char name, exactly 100-char name, single-char name.

### Knowledge Graph Retrieval — COVERED
- `KnowledgeGraphService.get()` returns `None` for both not-found and unauthorized (no info leakage).
- Route: `GET /management/knowledge-graphs/{kg_id}` → 200 or 404 (no 403).
- Tests: `TestKnowledgeGraphServiceGet` (5 tests including `test_get_returns_none_for_different_tenant`,
  `test_get_returns_none_when_permission_denied`).

### Knowledge Graph Listing — COVERED
- `list_for_workspace()` checks VIEW on workspace, uses SpiceDB `read_relationships()` to discover
  linked KG IDs, filters by tenant.
- Route: `GET /management/workspaces/{workspace_id}/knowledge-graphs` → 200 or 403.
- Tests: `TestKnowledgeGraphServiceListForWorkspace` (4 tests).

### Knowledge Graph Update — COVERED
- `KnowledgeGraphService.update()` enforces `edit` permission on KG.
- Delegates to `KnowledgeGraph.update()` which validates name and emits `KnowledgeGraphUpdated`.
- Route: `PATCH /management/knowledge-graphs/{kg_id}` → 200, 403, 404, 409, 422.
- Tests: `TestKnowledgeGraphServiceUpdate` (5 tests), `TestKnowledgeGraphUpdate` (8 tests).

### Knowledge Graph Deletion — COVERED
- `KnowledgeGraphService.delete()` enforces `manage` permission on KG.
- Atomic cascade inside `async with self._session.begin()`:
  encrypted credentials → DS records → KG record → SpiceDB cleanup via outbox.
- Route: `DELETE /management/knowledge-graphs/{kg_id}` → 204, 403, 404.
- `test_delete_rolls_back_on_ds_deletion_failure` verifies KG is NOT deleted when DS deletion raises.
- Mutation after deletion: `KnowledgeGraph.update()` raises `AggregateDeletedError` (tested).
- `test_delete_cascades_encrypted_credentials` verifies secret store cleanup during cascade.

### Permission Inheritance — COVERED
- SpiceDB schema: `view = admin + editor + viewer + workspace->view`,
  `edit = admin + editor + workspace->edit`, `manage = admin + workspace->manage`.
- `test_knowledge_graph_authorization.py` integration tests verify workspace-inherited
  and direct-grant scenarios against SpiceDB permission checks.

