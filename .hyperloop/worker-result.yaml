### Requirement 5: API Key Cascade Deletion — COVERED

**Implementation:**
- `iam/application/services/tenant_service.py` `delete_tenant()`: lists all API keys for
  the tenant, calls `mark_for_deletion()` on each, then `api_key_repository.delete()`
- DB FK is RESTRICT (not CASCADE) so application layer controls ordering
- `APIKey.mark_for_deletion()` emits `APIKeyDeleted` domain event → outbox →
  `SpiceDBEventHandler` cleans up relationships

**Scenario: Tenant deletion** — COVERED
- Tests: `test_deletes_api_keys_on_tenant_deletion`, `test_deletes_multiple_api_keys_on_tenant_deletion`,
  `test_api_key_mark_for_deletion_emits_deleted_event` (verifies `APIKeyDeleted` event
  reaches the repository for SpiceDB cleanup),
  `test_api_key_repo_queried_by_tenant_on_deletion`
  (all in `tests/unit/iam/application/test_tenant_service.py`)

