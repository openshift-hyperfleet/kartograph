#### Requirement: Single-Role Enforcement — COVERED

**Scenario: Role replacement** (member → editor; old role removed, new role granted)

- **Domain unit test** (`test_workspace_aggregate.py` line 596):
  "add_member emits MemberRemoved + MemberAdded when replacing role"
  verifies `WorkspaceMemberRemoved` is emitted as the first event ✓
- **Implementation** (`workspace.py` line 239–261):
  Old role is removed from in-memory list and `WorkspaceMemberRemoved` event emitted
