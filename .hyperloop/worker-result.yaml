### Requirement: Knowledge Graph Deletion — COVERED

**Code:** `service.delete()` checks MANAGE on KG, then executes atomically under `async with self._session.begin()`:
1. Fetches data sources via `ds_repo.find_by_knowledge_graph()`.
2. For each DS: deletes credentials from secret store (if `credentials_path` set), marks DS for deletion, calls `ds_repo.delete()`.
3. Marks KG for deletion, calls `kg_repo.delete()`.

SpiceDB relationship cleanup (workspace, tenant, and all direct admin/editor/viewer grants) is handled asynchronously via the outbox pattern. `ManagementEventTranslator._translate_knowledge_graph_deleted()` produces 5 operations: 2 direct `DeleteRelationship` (workspace, tenant) + 3 `DeleteRelationshipsByFilter` (admin, editor, viewer).

**Tests:**
- Scenario "Successful deletion — cascade": `test_delete_cascades_data_sources`, `test_delete_cascades_encrypted_credentials` (service unit); `test_produces_five_operations`, `test_first_operation_deletes_workspace_relationship`, `test_second_operation_deletes_tenant_relationship`, `test_third_operation_filters_admin_grants`, `test_fourth_operation_filters_editor_grants`, `test_fifth_operation_filters_viewer_grants` (outbox translator unit).
- Scenario "Successful deletion — atomicity/rollback": `test_delete_rolls_back_on_ds_deletion_failure` explicitly verifies that if a DS deletion raises, `kg_repo.delete` is never called and the exception propagates (SQLAlchemy rolls back the transaction on exception exit).
- Scenario "Mutation after deletion": `test_update_raises_after_deletion` (domain unit — `AggregateDeletedError` raised by `kg.update()` when `_deleted=True`). At the service level, after deletion the KG is absent from DB so any subsequent `service.update()` raises `ValueError("not found")` → HTTP 404.

