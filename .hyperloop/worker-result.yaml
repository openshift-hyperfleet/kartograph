### Requirement: Configurable CORS Origins
> The system SHALL enable CORS middleware only when allowed origins are configured.

**Status: COVERED**

**Implementation:**
- `CORSSettings.is_enabled` property (`src/api/infrastructure/settings.py:138-141`)
  returns `True` only when `len(self.origins) > 0`.
- `configure_cors()` (`src/api/main.py:51-67`) conditionally installs
  `CORSMiddleware` guarded by `cors_settings.is_enabled`.
- Called at module level (`main.py:233`): `configure_cors(app, get_cors_settings())`.

#### Scenario: Origins configured — **COVERED**
- GIVEN: `CORSSettings(origins=["https://app.example.com"])` constructs valid settings.
- WHEN/THEN CORS headers present:
  `TestCORSWithOriginsConfigured::test_cors_headers_present_for_allowed_origin` —
  asserts `access-control-allow-origin == ALLOWED_ORIGIN`.
- AND credentials allowed:
  `TestCORSWithOriginsConfigured::test_credentials_allowed_in_cors_response` —
  asserts `access-control-allow-credentials == "true"`.
- AND wildcard MUST NOT be used:
  `TestCORSWithOriginsConfigured::test_wildcard_not_used_in_origin_header` —
  asserts origin header != "*".
  `TestCORSWildcardOriginValidation::test_wildcard_origin_rejected_when_credentials_allowed` —
  asserts `ValidationError` raised when `origins=["*"]` and `allow_credentials=True`.
  `TestCORSWildcardOriginValidation::test_wildcard_among_other_origins_rejected_when_credentials_allowed` —
  also covers mixed wildcard case.
  `CORSSettings.validate_no_wildcard_origin_with_credentials` model validator
  (`settings.py:121-136`) enforces this at configuration time.

#### Scenario: No origins configured — **COVERED**
- GIVEN: `CORSSettings(origins=[])` → `is_enabled == False`.
- WHEN application starts: `TestConfigureCorsFunction::test_middleware_not_added_when_origins_empty`
  confirms `CORSMiddleware` not present in `app.user_middleware`.
- AND no CORS headers on cross-origin request:
  `TestCORSWithNoOriginsConfigured::test_no_cors_headers_when_origins_not_configured` —
  asserts `access-control-allow-origin` absent.
  `TestCORSWithNoOriginsConfigured::test_no_allow_credentials_header_when_cors_disabled` —
  asserts `access-control-allow-credentials` absent.

