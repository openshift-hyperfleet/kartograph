### Architecture

DDD boundaries are enforced by `tests/unit/management/test_architecture.py`:
- Domain layer: no imports from infrastructure, application, or FastAPI
- Ports layer: no imports from infrastructure or application
- Application layer: no imports from infrastructure (only ports)
- Cross-context: management does not import iam*, graph*, ingestion*, extraction*, query*
  (routing layer exclusion for IAM auth dependency injection is explicitly documented)

