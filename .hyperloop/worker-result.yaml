#### 6. Knowledge Graph Deletion ‚Äî COVERED

**Implementation:** `KnowledgeGraphService.delete()` (lines 362‚Äì421)
- Checks MANAGE permission on the knowledge graph
- Fetches KG; validates tenant
- Within `async with self._session.begin()`:
  - Calls `ds_repo.find_by_knowledge_graph(kg_id)` for all data sources
  - For each DS with `credentials_path`: calls `secret_store.delete()`
  - Calls `ds.mark_for_deletion()` + `ds_repo.delete()` for each DS
  - Calls `kg.mark_for_deletion()` + `kg_repo.delete()`
- SpiceDB cleanup via outbox: `ManagementEventTranslator._translate_knowledge_graph_deleted()`
  produces 5 operations: delete workspace relationship, delete tenant relationship,
  filter-delete all admin grants, filter-delete all editor grants, filter-delete all viewer grants

**Scenario: Successful deletion** ‚Äî COVERED
- Code path verified: all cleanup within single `async with session.begin()` block
- Tests:
  - `test_delete_cascades_data_sources` ‚Äî DS deletion cascade
  - `test_delete_cascades_encrypted_credentials` ‚Äî secret store cleanup
  - `test_delete_rolls_back_on_ds_deletion_failure` ‚Äî atomicity: RuntimeError mid-cascade
    prevents KG deletion (`mock_kg_repo.delete.assert_not_called()`)
  - `TestManagementEventTranslatorKnowledgeGraphDeleted.*` ‚Äî 7 tests covering all 5 SpiceDB
    cleanup operations (workspace delete, tenant delete, admin/editor/viewer filter deletes)

**Scenario: Mutation after deletion** ‚Äî COVERED
- Code: `KnowledgeGraph._deleted` flag; `update()` raises `AggregateDeletedError` when
  `_deleted=True`; `mark_for_deletion()` is idempotent (no-op on second call)
- After `delete()`, the record is removed from DB; any subsequent mutation attempt would
  find the KG via `get_by_id()` ‚Üí `None` ‚Üí service raises `ValueError("not found")`
- Tests: `test_update_raises_after_deletion`, `test_mark_for_deletion_is_idempotent`

