## Spec Alignment Review — Task-017 Outbox Pattern

Reviewed spec: `specs/shared-kernel/outbox.spec.md`
Branch: `hyperloop/task-017`

---

### Requirement: Transactional Event Storage — COVERED

**Scenario: Successful write**
- Code: `OutboxRepository.append()` calls `session.add()` only, never `session.commit()`.
  The caller owns the transaction boundary (see `GroupRepository.save()`).
- Tests:
  - Unit: `test_repository_append_does_not_commit` — asserts `session.commit` is never called.
  - Integration: `test_outbox_entry_created_in_same_transaction_as_group` — verifies both
    `GroupModel` and `OutboxModel` exist after a single `async_session.begin()` block.

**Scenario: Transaction rollback**
- Code: Because the repository never commits, a rollback on the shared session discards
  both the aggregate change and the outbox entry atomically.
- Test: `test_rollback_removes_both_group_and_outbox_entry` (integration) — raises inside
  `async_session.begin()` and asserts neither the group nor the outbox entry persists.

---

### Requirement: Event Processing — COVERED

**Scenario: Normal processing**
- Code: `OutboxWorker._process_entries()` calls `handler.handle()`, then `_mark_processed()`
  which sets `processed_at = datetime.now(UTC)`.
- Tests:
  - Unit: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`,
    `test_calls_event_processed_on_success`.
  - Integration: `test_worker_processes_group_created_and_writes_to_spicedb` — after
    `_process_batch()` the outbox entry has `processed_at is not None` and SpiceDB
    contains the expected relationship.

**Scenario: Transient failure**
- Code: `_handle_processing_failure()` increments `retry_count` and sets `last_error` via
  `_increment_retry()` when the failure is not `UnknownEventTypeError` and retry count is
  below `max_retries`.
- Tests: `test_transient_failure_increments_retry_count`, `test_transient_failure_does_not_dlq_immediately`,
  `test_calls_event_processing_failed_on_error`.

**Scenario: Permanent failure (dead letter)**
- Code: When `new_retry_count >= max_retries`, `_move_to_dlq()` sets `failed_at` timestamp.
  The batch query filters `failed_at IS NULL`, so DLQ entries are never retried.
- Tests: `test_max_retries_moves_entry_to_dlq` (asserts `event_moved_to_dlq` called, not
  `event_processing_failed`). `test_failed_entries_excluded_from_fetch` verifies the SQL
  filter.

