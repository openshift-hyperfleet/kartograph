### Code Review Findings

**Implementation quality — PASS**

The diff adds three things:
1. `shared_kernel/outbox/exceptions.py` — new `UnknownEventTypeError` with `event_type` and `registered_types` attributes.
2. `infrastructure/outbox/composite.py` — switches from generic `ValueError` to `UnknownEventTypeError` for unregistered event types.
3. `infrastructure/outbox/worker.py` — adds a `except UnknownEventTypeError` clause that immediately calls `_move_to_dlq()` without incrementing retry count, before the generic `except Exception` clause.

**No violations found:**
- No `logger.*` / `print()` in production code (domain probes used throughout).
- No bare `MagicMock()` / `AsyncMock()` on domain aggregates in new test files; these mocks are exclusively on infrastructure collaborators (sessions, handlers, probes) which is correct.
- No DDD layer violations — `UnknownEventTypeError` lives in `shared_kernel`, accessible to both composite and worker.
- No hardcoded secrets or environment-specific values.
- Conventional commit messages with correct scope.

**Spec coverage — COMPLETE**

All 6 SHALL requirements and all 10 scenarios are implemented and tested:

| Requirement | Scenario | Status |
|---|---|---|
| Transactional Event Storage | Successful write | COVERED |
| Transactional Event Storage | Transaction rollback | COVERED |
| Event Processing | Normal processing | COVERED |
| Event Processing | Transient failure | COVERED |
| Event Processing | Permanent failure (DLQ) | COVERED |
| Idempotent Event Handlers | Duplicate delivery | COVERED |
| Concurrent Worker Safety | Concurrent workers | COVERED |
| Dual Delivery Mechanism | Real-time notification | COVERED |
| Dual Delivery Mechanism | Polling fallback | COVERED |
| Event Fan-Out | Multiple handlers | COVERED |
| Event Fan-Out | Unknown event type | COVERED |

The unknown-event-type path is particularly well covered: five distinct tests verify it goes to DLQ immediately (at retry_count=0, before max_retries), that `_increment_retry` is never called, and that `event_processing_failed` probe is not emitted.
