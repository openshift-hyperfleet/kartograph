## Outbox Pattern Implementation — Task 017 (Fresh Attempt)

### Test Results

- **Total unit tests:** 2413 passed, 0 failed
- **Outbox-specific tests:** 256 passed in 0.57s
- **No regressions** against the full suite

### Requirements Coverage

**Transactional Event Storage** — COVERED
- `OutboxRepository.append()` uses `session.add()` only — never commits. The caller-owned
  session ensures aggregate mutation and outbox entry commit or roll back atomically.
- Tests: `TestOutboxWorkerTransactionAtomicity` (unit);
  `TestAtomicityGuarantees` (integration).

**Event Processing** — COVERED
- Worker fetches unprocessed entries, delegates to `EventHandler.handle()`, applies SpiceDB
  operations, sets `processed_at`. Transient failures increment `retry_count` and set
  `last_error`. After `max_retries`, `failed_at` is set (DLQ).
- Tests: `TestOutboxWorkerProcessBatch`, `TestOutboxWorkerRetryBehavior`.

**Idempotent Event Handlers** — COVERED
- SpiceDB `write_relationship` uses upsert semantics. `FakeAuthorizationProvider` mirrors
  this with a Python `set`.
- Tests: `TestSpiceDBEventHandlerIdempotency` (unit);
  `TestIdempotentEventHandlers` (integration).

**Concurrent Worker Safety** — COVERED
- `fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`.
- Test: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  compiles SQL with PostgreSQL dialect and asserts "SKIP LOCKED" is present.

**Dual Delivery Mechanism** — COVERED
- `PostgresNotifyEventSource` listens on `outbox_events` via asyncpg-listen. A trigger
  emits `pg_notify('outbox_events', NEW.id::text)` on INSERT. `_poll_loop` runs
  independently as a 30-second fallback.
- Tests: `test_postgres_notify_event_source.py` (20+ tests); integration test uses
  `poll_interval_seconds=999` to force the NOTIFY path.

**Event Fan-Out** — COVERED
- `CompositeEventHandler` dispatches to all registered handlers per event type.
  Unknown types raise `UnknownEventTypeError`, immediately moving the entry to DLQ.
- Tests: `test_handle_fans_out_to_multiple_handlers`;
  `test_unknown_event_type_immediately_moves_to_dlq`.

