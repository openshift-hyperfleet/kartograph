### Requirement Coverage

#### REQ-1: Transactional Event Storage — COVERED

**Implementation:**
- `infrastructure/outbox/repository.py::OutboxRepository.append()` calls
  `session.add()` only; never `session.commit()`. The caller owns the transaction
  boundary, guaranteeing atomicity with the aggregate write.

**Scenarios verified:**

*Successful write:*
- Unit: `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`
  confirms `session.commit` is never called and `session.add` is called once.
- Integration: `TestAtomicityGuarantees::test_outbox_entry_created_in_same_transaction_as_group`
  verifies both `groups` row and `outbox` row exist after a single `async_session.begin()` block.

*Transaction rollback:*
- Unit: `TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries`
  confirms no commit is issued, proving caller rollback discards the pending add.
- Integration: `TestAtomicityGuarantees::test_rollback_removes_both_group_and_outbox_entry`
  raises an exception inside `async_session.begin()` and asserts both group and
  outbox rows are absent after rollback.

---

#### REQ-2: Event Processing — COVERED

**Implementation:**
- `infrastructure/outbox/worker.py::OutboxWorker._process_entries()` — dispatches
  each entry to `handler.handle()`, then calls `_mark_processed()`.
- `_handle_processing_failure()` — increments retry count via `_increment_retry()`
  for transient errors; promotes to DLQ via `_move_to_dlq()` (sets `failed_at`)
  when `new_retry_count >= max_retries`.

**Scenarios verified:**

*Normal processing:*
- Unit: `TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries` —
  handler.handle called, probe.event_processed called.
- Unit: `TestOutboxWorkerProcessBatch::test_marks_entry_as_processed` —
  session.execute called (for mark_processed UPDATE).
- Integration: `TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb`
  — entry has `processed_at` set and SpiceDB relationship verified after `_process_batch()`.

*Transient failure:*
- Unit: `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count`
  — `probe.event_processing_failed` called; `probe.event_moved_to_dlq` NOT called.
- Unit: `TestOutboxWorkerRetryBehavior::test_transient_failure_does_not_dlq_immediately`
  — `ConnectionError` with `retry_count=0` → retry path, not DLQ.

*Permanent failure (dead letter):*
- Unit: `TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq`
  — entry at `retry_count=2` with `max_retries=3` triggers DLQ; `probe.event_moved_to_dlq`
  called; `probe.event_processing_failed` NOT called.
- `OutboxModel` has `failed_at` column; `_move_to_dlq()` sets it via UPDATE.
- `fetch_unprocessed()` filters `failed_at IS NULL`, confirmed in compiled query test.

---

#### REQ-3: Idempotent Event Handlers — COVERED

**Implementation:**
- SpiceDB `write_relationship` is inherently idempotent (upsert / set-membership
  semantics); a tuple written twice stays exactly once.
- `repository.py::fetch_unprocessed()` filters `processed_at IS NULL`, so
  successfully-processed entries are never re-fetched.

**Scenario verified (duplicate delivery):**
- Unit: `TestOutboxWorkerIdempotency::test_already_processed_entry_excluded_from_fetch`
  — compiles query and asserts `processed_at IS NULL` present.
- Unit: `TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state`
  — uses `FakeAuthorizationProvider` with Python `set` storage (no MagicMock);
  two `handle()` invocations produce identical final state.
- Integration: `TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state`
  — handler called directly (first pass, simulates crash before mark_processed),
  then `_process_batch()` retries; `processed_at` set after retry, SpiceDB
  relationship correct and unduplicated.

