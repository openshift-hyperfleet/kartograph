## Spec Alignment Review — Outbox (outbox.spec.md)

Reviewed branch: `hyperloop/task-017`
Spec file: `specs/shared-kernel/outbox.spec.md`

All SHALL/MUST requirements are implemented and tested.

---

## Requirement Status

### REQ-1: Transactional Event Storage — COVERED

**Scenario: Successful write**
- Implementation: `OutboxRepository.append()` calls `session.add()` only; never calls `session.commit()`. The calling service owns the transaction boundary.
- Unit test: `test_repository_append_does_not_commit`
- Integration test: `TestAtomicityGuarantees.test_outbox_entry_created_in_same_transaction_as_group`

**Scenario: Transaction rollback**
- Implementation: Repository never commits; rollback by the caller's context manager discards pending entries.
- Unit test: `test_failed_service_call_leaves_no_outbox_entries`
- Integration test: `TestAtomicityGuarantees.test_rollback_removes_both_group_and_outbox_entry`

---

### REQ-2: Event Processing — COVERED

**Scenario: Normal processing**
- Implementation: `OutboxWorker._process_entries()` → `handler.handle()` → `_mark_processed()` sets `processed_at`
- Unit tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`, `test_calls_event_processed_on_success`
- Integration tests: `test_worker_processes_group_created_and_writes_to_spicedb`, `test_worker_processes_member_added_and_writes_to_spicedb`

**Scenario: Transient failure**
- Implementation: `except Exception` in `_process_entries()` → `_handle_processing_failure()` → `_increment_retry()` updates `retry_count` and `last_error`
- Unit tests: `test_transient_failure_increments_retry_count`, `test_calls_event_processing_failed_on_error`, `test_transient_failure_does_not_dlq_immediately`

**Scenario: Permanent failure (dead letter)**
- Implementation: `_handle_processing_failure()` → when `new_retry_count >= max_retries` → `_move_to_dlq()` sets `failed_at`; `failed_at IS NULL` filter in `_process_batch()` excludes DLQ entries
- Unit tests: `test_max_retries_moves_entry_to_dlq`, `test_failed_entries_excluded_from_fetch`

---

### REQ-3: Idempotent Event Handlers — COVERED

**Scenario: Duplicate delivery**

Previously PARTIAL in Round 0. Gap now closed with two tests added in commit `d9056203`:

- **Unit test:** `tests/unit/infrastructure/outbox/test_spicedb_handler.py::TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state` — uses a `FakeAuthorizationProvider` storing relationships in a Python set; invokes the handler twice with the same payload; asserts relationship set is unchanged and no duplicate side effects occur.

- **Integration test:** `tests/integration/iam/test_outbox_consistency.py::TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state` — (1) creates a group, (2) directly invokes the SpiceDB handler (first execution — relationship written), (3) leaves outbox entry unprocessed (simulates partial failure before `_mark_processed`), (4) runs `worker._process_batch()` (second invocation + marks processed), (5) asserts `processed_at` is set and SpiceDB contains exactly the expected relationships with no duplicates.

This integration test exercises the precise Given/When/Then described in the spec.

Implementation correctness confirmed:
- `write_relationship()` uses `OPERATION_TOUCH` (SpiceDB upsert) — duplicate writes are no-ops.
- `_process_batch()` and `_process_single()` both filter `processed_at IS NULL AND failed_at IS NULL`, preventing re-delivery of already-processed entries.

