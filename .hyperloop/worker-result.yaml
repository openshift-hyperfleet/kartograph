### Implementation Summary

Full API key lifecycle is implemented across all DDD layers in the IAM bounded
context, covering every spec requirement and scenario. The implementation was
merged to `alpha` before the branch reset; this branch contributes additional
test coverage.

**Domain Layer** (`iam/domain/aggregates/api_key.py`)
- `APIKey` aggregate with `create()`, `revoke()`, `mark_for_deletion()`,
  `record_usage()`, `is_valid()`, and `collect_events()`.
- Emits `APIKeyCreated`, `APIKeyRevoked`, `APIKeyDeleted` domain events.
- `is_valid()` checks both `is_revoked` and `expires_at`.
- `revoke()` raises `APIKeyAlreadyRevokedError` if already revoked.
- No logger/print — pure domain logic only.

**Security** (`iam/application/security.py`)
- `generate_api_key_secret()`: cryptographically secure, `karto_` prefix.
- `hash_api_key_secret()`: bcrypt with work factor 12.
- `extract_prefix()`: first 12 characters for fast lookup.
- `verify_api_key_secret()`: bcrypt constant-time comparison.

**Application Layer** (`iam/application/services/api_key_service.py`)
- `create_api_key`: SpiceDB `CREATE_API_KEY` check, secret generation,
  bcrypt hash, 12-char prefix, expiration calculation. Returns
  `(APIKey, plaintext_secret)`.
- `list_api_keys`: SpiceDB `lookup_resources` for `VIEW` permission; optional
  `user_id` filter.
- `revoke_api_key`: 404 check → SpiceDB `REVOKE` check → revoke.
- `validate_and_get_key`: prefix-based lookup → bcrypt verify → `is_valid()`
  → `record_usage()` → commit.
- All observability via domain probes (no logger calls).

**Infrastructure** (`iam/infrastructure/api_key_repository.py`)
- `get_verified_key()`: prefix-based lookup with bcrypt comparison for each
  candidate; error-level probe event on prefix collision.
- `list()`: filters by `api_key_ids` from SpiceDB, optional tenant/creator.
- `save()`: persists to PostgreSQL, drains domain events to outbox.
- `delete()`: deletes model, drains domain events to outbox.

**Presentation** (`iam/presentation/api_keys/routes.py`)
- `POST /iam/api-keys`: name 1–255 chars, `expires_in_days` 1–3650 (default 30).
  Returns 201 with one-time `secret`. 409 on duplicate.
- `GET /iam/api-keys`: metadata list; `key_hash` and `secret` never exposed.
- `DELETE /iam/api-keys/{id}`: 204 success, 404 not found, 409 already revoked,
  403 unauthorized.

**Authentication** (`iam/dependencies/user.py`)
- JWT Bearer takes precedence over `X-API-Key` header.
- Returns 401 with `WWW-Authenticate: Bearer, API-Key` on any auth failure.

**Cascade Deletion** (`iam/application/services/tenant_service.py`)
- `delete_tenant()` calls `api_key_repository.list(tenant_id=...)` then
  `api_key.mark_for_deletion()` + `api_key_repository.delete(api_key)` for each,
  before deleting the tenant — ensuring `APIKeyDeleted` events fire for
  SpiceDB cleanup.

