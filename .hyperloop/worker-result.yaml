  Requirement 5 -- Dual Delivery Mechanism: COVERED

  Implementation:
    infrastructure/outbox/event_sources/postgres_notify.py -- PostgresNotifyEventSource
    listens on "outbox_events" channel via asyncpg-listen, invokes _process_single
    callback on UUID payload receipt.
    infrastructure/outbox/worker.py -- _poll_loop() always runs as fallback regardless
    of event source presence. Uses asyncio.wait_for + _shutdown_event to avoid
    blocking shutdown during the inter-batch sleep.

