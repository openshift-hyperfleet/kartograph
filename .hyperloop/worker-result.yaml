## Notes (Non-Blocking)

- **Test breadth:** Only two test files exist covering wizard logic and home-page session
  state. Scenarios for Schema Browser, Graph Explorer, API Key Management, Workspace
  Management, MCP Integration, Dark Mode, and Responsive Design have no corresponding
  tests. This is a systematic gap across the entire spec but is not the root cause of
  the four FAILs above; those are functional implementation gaps.

- **KG page empty state always shown:** Even after FAIL 1 is fixed, the knowledge-graphs
  page currently always renders the "No knowledge graphs yet" empty state because
  `loadKnowledgeGraphs()` does not exist. Fix FAIL 1 must include listing KGs on mount.
