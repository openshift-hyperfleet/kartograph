## What Changed

Two commits on top of alpha:

1. `test(iam): add missing group spec scenario tests and fix name validation`
   - `Group.create()` now trims whitespace and rejects empty/whitespace-only names and
     names exceeding 255 chars — consistent with the pre-existing `Group.rename()` behaviour.
   - `CreateGroupRequest` and `UpdateGroupRequest` gain a `field_validator` that strips
     whitespace and rejects whitespace-only names (HTTP 422 at the API boundary).
   - 9 domain unit tests for `Group.create()` name validation (`TestGroupNameValidation`).
   - 16 new presentation unit tests for three previously untested routes:
     - `POST /iam/groups` (`TestCreateGroupRoute`) — 7 tests covering 201, 409, 422
       for empty/whitespace/missing, whitespace trimming, and param forwarding.
     - `GET /iam/groups/{id}` (`TestGetGroupRoute`) — 4 tests covering 200, 404,
       400 for bad ULID, and param forwarding.
     - `DELETE /iam/groups/{id}` (`TestDeleteGroupRoute`) — 5 tests covering 204,
       403, 404, 400 for bad ULID, and param forwarding.

2. `chore: write worker result for task-024 groups feature` — cleaned up stale
   worker-result.yaml from a prior task (task-020).

