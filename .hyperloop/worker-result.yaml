  ### PR Feedback Resolution

  #### MAJOR: Typed exceptions for parent workspace errors (RESOLVED)

  Replaced fragile `ValueError` string parsing in `iam/presentation/workspaces/routes.py`
  with typed domain exceptions. The previous code parsed free-form message text
  (`msg.lower()` containing "parent workspace" + "does not exist") which coupled
  security-sensitive HTTP status code assignment to message wording.

  Changes made:
  - Added `ParentWorkspaceNotFoundError` and `ParentWorkspaceCrossTenantError`
    to `iam/ports/exceptions.py` with clear docstrings explaining 404 normalization
  - Updated `workspace_service.py` to raise typed exceptions instead of `ValueError`
    for missing/cross-tenant parent workspace cases
  - Updated `routes.py` `create_workspace` handler to catch typed exceptions by type
    (combined with `UnauthorizedError` in a single `except` clause); generic
    `except ValueError` fallback retained for other validation errors
  - Updated `test_workspace_service.py` to assert `ParentWorkspaceNotFoundError`
    and `ParentWorkspaceCrossTenantError` (not `ValueError`)
  - Updated `test_workspaces_routes.py` mocks to raise typed exceptions

  #### NITPICK: Architecture test exclusion narrowed (RESOLVED)

  Narrowed `.exclude("management.presentation*")` in `test_architecture.py` to
  explicitly list only the three modules that carry a transitive IAM import:
  - `management.presentation.knowledge_graphs.routes*` (direct IAM importer)
  - `management.presentation.knowledge_graphs` (re-exports router — transitive)
  - `management.presentation` (aggregates sub-routers — transitive)

  `management.presentation.knowledge_graphs.models` is NO LONGER excluded and
  is now subject to the isolation check (correctly — it has no IAM imports).

