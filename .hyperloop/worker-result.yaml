**Scenario: Tenant deletion**
- Implementation: `TenantService.delete_tenant()` lists all API keys for the tenant,
  calls `api_key.mark_for_deletion()` then `api_key_repo.delete(api_key)` for each,
  before deleting the tenant itself.
- Tests:
  - `test_deletes_api_keys_on_tenant_deletion` (service unit)
  - `test_deletes_multiple_api_keys_on_tenant_deletion` (service unit)
  - `test_api_keys_deleted_before_tenant_on_cascade` (service unit) — uses call-order
    tracking to assert API keys deleted before tenant record.

**Authorization relationships cleaned up**
- Tests:
  - `test_api_key_mark_for_deletion_emits_deleted_event` (service unit) — verifies
    `APIKeyDeleted` domain event is emitted (this event drives SpiceDB relationship
    cleanup via the outbox pattern).

