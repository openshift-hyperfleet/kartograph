### Implementation Summary

**Branch changes (vs alpha):**
- `shared_kernel/outbox/exceptions.py` *(new)* — `UnknownEventTypeError`, a
  typed permanent-failure exception distinct from generic `Exception`/`ValueError`,
  carrying `event_type` and `registered_types` attributes for diagnostics.
- `infrastructure/outbox/composite.py` — Raises `UnknownEventTypeError` instead
  of `ValueError` when no handler matches an event type.
- `infrastructure/outbox/worker.py` — Catches `UnknownEventTypeError` *before*
  the generic `except Exception` handler and immediately DLQs the entry without
  incrementing retry count.
- Test additions: 6 `UnknownEventTypeError` exception tests, 11 worker scenario
  tests (retry/DLQ/concurrent/idempotency), idempotent handler unit + integration
  tests, check script ERE-pattern fixes.

**Spec coverage:**
All 6 SHALL requirements and 11 scenarios verified:
- Transactional Event Storage (successful write + rollback)
- Event Processing (normal + transient failure + permanent DLQ)
- Idempotent Event Handlers (duplicate delivery — unit fake + integration)
- Concurrent Worker Safety (FOR UPDATE SKIP LOCKED)
- Dual Delivery Mechanism (NOTIFY real-time + polling fallback)
- Event Fan-Out (multiple handlers + unknown type → immediate DLQ)

