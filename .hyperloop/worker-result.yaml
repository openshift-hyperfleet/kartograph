### Requirement: Knowledge Graph Deletion — COVERED

**Implementation:**
- `KnowledgeGraphService.delete()` — checks `MANAGE` permission, then within a single
  `async with self._session.begin()` transaction:
  1. Finds all data sources via `ds_repo.find_by_knowledge_graph()`
  2. Deletes encrypted credentials via `secret_store.delete()` for each DS with `credentials_path`
  3. Marks each DS for deletion and calls `ds_repo.delete()`
  4. Marks the KG for deletion and calls `kg_repo.delete()`
- SpiceDB cleanup handled via outbox: `KnowledgeGraphDeleted` → 5 delete operations
  (workspace, tenant, admin filter, editor filter, viewer filter)
- Rollback: if any DS deletion raises, the exception propagates before `kg_repo.delete()` is
  reached; SQLAlchemy rolls back the full transaction

**Tests covering Scenario: Successful deletion:**
- `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_cascades_data_sources`
- `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_cascades_encrypted_credentials`
- `tests/unit/management/infrastructure/outbox/test_translator.py::TestManagementEventTranslatorKnowledgeGraphDeleted` — all 5 SpiceDB cleanup operations verified

**Tests covering atomicity/rollback:**
- `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_rolls_back_on_ds_deletion_failure`

**Tests covering Scenario: Mutation after deletion:**
