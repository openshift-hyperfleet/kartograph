### Requirement Coverage

| Requirement | Scenario | Status | Implementation | Tests |
|---|---|---|---|---|
| Transactional Event Storage | Successful write | **COVERED** | `OutboxRepository.append()` calls `session.add()` but never `session.commit()`; caller owns the transaction boundary | Unit: `test_repository_append_does_not_commit`; Integration: `test_outbox_entry_created_in_same_transaction_as_group` |
| Transactional Event Storage | Transaction rollback | **COVERED** | Shared-session design: caller rollback discards all pending `session.add()` calls atomically | Unit: `test_failed_service_call_leaves_no_outbox_entries`; Integration: `test_rollback_removes_both_group_and_outbox_entry` (directly exercises rollback, asserts neither group nor outbox entry persists) |
| Event Processing | Normal processing | **COVERED** | `_process_batch()` → `_process_entries()` → `handler.handle()` → `_mark_processed()` → `session.commit()`; probe called at each step | Unit: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`, `test_calls_event_processed_on_success`; Integration: `test_worker_processes_group_created_and_writes_to_spicedb` |
| Event Processing | Transient failure | **COVERED** | `_handle_processing_failure()` increments `retry_count` and records `last_error` when `new_retry_count < max_retries` | Unit: `test_transient_failure_increments_retry_count`, `test_transient_failure_does_not_dlq_immediately`, `test_calls_event_processing_failed_on_error` |
| Event Processing | Permanent failure (dead letter) | **COVERED** | When `new_retry_count >= max_retries`, `_move_to_dlq()` sets `failed_at` timestamp; entry excluded from future fetches (`failed_at IS NULL` filter confirmed in test) | Unit: `test_max_retries_moves_entry_to_dlq`, `test_failed_entries_excluded_from_fetch` |
| Idempotent Event Handlers | Duplicate delivery | **COVERED** | SpiceDB `write_relationship` is an upsert (set membership); calling handler twice with same payload leaves identical final state | Unit: `test_duplicate_invocation_produces_identical_final_state` (FakeAuthorizationProvider with Python `set` — not a mock, mirrors SpiceDB upsert); Integration: `test_handler_invoked_twice_produces_same_spicedb_state` |
| Concurrent Worker Safety | Concurrent workers | **COVERED** | `_process_batch()` and `_process_single()` both use `.with_for_update(skip_locked=True)` | Unit: `test_fetch_unprocessed_uses_for_update_skip_locked` (compiles SQL with PostgreSQL dialect, asserts "SKIP LOCKED" present) |
| Dual Delivery | Real-time notification | **COVERED** | `PostgresNotifyEventSource` subscribes to PostgreSQL NOTIFY channel, invokes `_process_single` callback sub-second | Unit: 27 tests in `test_postgres_notify_event_source.py`; Integration: `test_worker_processes_via_notify_not_polling` (poll_interval=999s, proves NOTIFY path used) |
| Dual Delivery | Polling fallback | **COVERED** | `_poll_loop()` calls `_process_batch()` every `poll_interval_seconds` (default 30); entries missed by NOTIFY are discovered on next poll cycle | Unit: `_process_batch()` path exercised via direct call tests; Integration: `test_unprocessed_events_stay_in_outbox` confirms entries remain for retry; `test_worker_processes_group_created_and_writes_to_spicedb` exercises full batch-poll path |
| Event Fan-Out | Multiple handlers registered | **COVERED** | `CompositeEventHandler.handle()` iterates all handlers registered for the event type in order; duplicate registration is idempotent | Unit: `test_handle_fans_out_to_multiple_handlers` (two handlers registered for same type, both invoked), `test_register_is_idempotent` |
| Event Fan-Out | Unknown event type | **COVERED** | `CompositeEventHandler.handle()` raises `UnknownEventTypeError`; `OutboxWorker._process_entries()` catches it as a permanent failure → immediate `_move_to_dlq()` with zero retry increments | Unit: `test_handle_raises_for_unknown_event_type`, `test_unknown_event_type_error_is_not_value_error`, `test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`, `test_retry_not_called_for_unknown_event_type` |

