# Task-008: Knowledge Graphs — Worker Result (2026-04-24)

All requirements from `specs/management/knowledge-graphs.spec.md` are fully
implemented and tested. The single blocking issue from the previous review
round (`index.test.ts` using wrong storage API and wrong property shape) has
been resolved.

## Fix Applied

### `src/dev-ui/app/tests/index.test.ts`

Rewrote all five tests to mirror the exact contracts in `app/pages/index.vue`:

1. **localStorage with correct key**: Onboarding tests now use `localStorage`
   with `ONBOARDING_KEY = 'kartograph:onboarding-dismissed'`, matching
   `loadOnboardingState()` and `dismissOnboarding()` in index.vue. The old
   tests used `sessionStorage` with `'kartograph:visited'` — a key that does
   not exist in production.

2. **`done` property**: Checklist item tests now use `{ done: boolean }`
   matching the `checklistItems` computed ref in index.vue (`item.done`
   throughout). The old tests used `{ completed: boolean }` which is not
   present in production code. A regression in the `done` property will
   now cause test failures.

3. **Added `allChecklistDone` test**: Covers the `every(item => item.done)`
   pattern used in the `allChecklistDone` computed ref.

