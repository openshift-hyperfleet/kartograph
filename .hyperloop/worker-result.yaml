### Implementation Quality Notes

The fix is minimal and surgical: 12 lines changed in `knowledge_graph_service.py`,
15 lines changed in `knowledge_graph.py` (DI wiring). Tests use real domain aggregates
and a plain `AsyncMock` for the port interface — consistent with existing patterns. The
`secret_store` parameter is optional (defaults to `None`) which maintains backward
compatibility for any test that constructs `KnowledgeGraphService` without it.
