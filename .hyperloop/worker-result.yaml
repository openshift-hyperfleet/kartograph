## FAIL 2A — approveOntology() Stub Toast → FIXED

Replaced the `toast.info('Data source connection coming soon', ...)` stub with a
real API call to `POST /management/knowledge-graphs/{kg_id}/data-sources`.

To support this, a full Management bounded context presentation layer was created:

**Backend (Python) — new routes registered at `/management`:**
- `GET /management/knowledge-graphs` — list all tenant KGs (with SpiceDB VIEW filter)
- `GET /management/knowledge-graphs/{kg_id}` — retrieve single KG
- `POST /management/workspaces/{ws_id}/knowledge-graphs` — create KG in workspace
- `GET /management/knowledge-graphs/{kg_id}/data-sources` — list DSes for KG
- `POST /management/knowledge-graphs/{kg_id}/data-sources` — create DS (with credentials)
- `POST /management/data-sources/{ds_id}/sync` — trigger sync, returns SyncRun
- `GET /management/data-sources/{ds_id}/sync-runs` — list sync run history

27 new backend unit tests cover all routes. 2051 total backend unit tests pass.
Ruff, mypy, and architecture boundary tests all pass.

`KnowledgeGraphService.list_all()` added for tenant-wide KG listing with
per-KG SpiceDB VIEW permission checks.

Management architecture test updated to exclude `management.presentation*` from
the IAM import check (legitimate cross-context boundary for auth DI wiring,
consistent with the existing `management.dependencies*` exclusion).

**Frontend:**
- Wizard step 1 now has a KG selector dropdown that loads from `GET /management/knowledge-graphs`
- `approveOntology()` calls `POST /management/knowledge-graphs/{kg_id}/data-sources`
  with adapter type, connection config, and encrypted credentials
- Success/failure toasts handle API responses correctly

