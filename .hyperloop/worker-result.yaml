## task-003 Graph Mutations — Spec Alignment Review (2026-04-23)

Spec: `specs/graph/mutations.spec.md`
Branch: `hyperloop/task-003`

### Requirement Coverage

---

#### REQ 1: Per-Tenant Graph Isolation (SHALL)

**Implementation:** `graph/dependencies.py::get_tenant_graph_name()` returns
`f"tenant_{current_user.tenant_id.value}"`. `get_age_graph_client()` creates the
`AgeGraphClient` with this name. All mutations pass through `MutationApplier` which
forwards `self._client.graph_name` to the strategy, so every write targets the
tenant-scoped AGE graph.

**Scenario: Tenant graph routing**
- Code: `dependencies.py::get_tenant_graph_name()` + `get_age_graph_client()`
- Tests: `test_routes.py::TestTenantGraphRouting::test_graph_client_uses_tenant_specific_graph_name`
  asserts `graph_name == "tenant_t1"`; `test_graph_name_uses_full_tenant_id` covers
  multi-segment tenant IDs.
- **Status: COVERED**

---

#### REQ 2: KnowledgeGraph Scoping (SHALL)

**Implementation:** Route `POST /graph/knowledge-graphs/{knowledge_graph_id}/mutations`
in `routes.py` calls `authz.check_permission(resource, Permission.EDIT, subject)` before
invoking the service. `GraphMutationService._stamp_knowledge_graph_id()` overwrites any
caller-supplied value. `validate_operation()` on `MutationOperation` requires
`knowledge_graph_id` in `set_properties` for CREATE, ensuring callers cannot omit it.
`PLATFORM_STAMPED_PROPERTIES` excludes `knowledge_graph_id` from schema learning.

**Scenario: Mutation authorization**
- Code: `routes.py::apply_kg_mutations()` SpiceDB check at lines 125–134
- Tests: `test_routes.py::TestKnowledgeGraphScopedMutationsRoute::test_kg_mutations_route_forbidden_without_edit_permission`
  (403 + service not called);
  `test_kg_mutations_route_accessible_with_edit_permission` (200);
  `test_kg_mutations_route_forbidden_returns_correct_status` (detail in body)
- **Status: COVERED**

**Scenario: KnowledgeGraph ID stamping**
- Code: `graph_mutation_service.py::_stamp_knowledge_graph_id()` overwrites on CREATE/UPDATE
- Tests: `TestKnowledgeGraphIdStamping::test_stamps_knowledge_graph_id_on_create_operation`;
  `test_overwrites_caller_provided_knowledge_graph_id` (spoofing rejected);
  `test_stamps_knowledge_graph_id_on_update_operation`;
  `test_does_not_stamp_on_delete_operation`;
  `test_stamps_knowledge_graph_id_in_jsonl_parse` (end-to-end JSONL path)
- **Status: COVERED**

