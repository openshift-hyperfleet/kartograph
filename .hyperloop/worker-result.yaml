## Graph Mutations — Spec Alignment Review (task-003)

Full read of `specs/graph/mutations.spec.md` against the branch on `hyperloop/task-003`.
Every SHA requirement and scenario checked against code **and** tests.

---

### Requirement 1: Per-Tenant Graph Isolation — COVERED

**Code:** `get_tenant_graph_name()` in `graph/dependencies.py` returns
`f"tenant_{current_user.tenant_id.value}"`. The `get_age_graph_client` dependency
uses this to create an `AgeGraphClient` scoped to the tenant-specific AGE graph.

**Tests:** `TestTenantGraphRouting` in `tests/unit/graph/presentation/test_routes.py`
- `test_graph_client_uses_tenant_specific_graph_name` — asserts `"tenant_t1"` for tenant `"t1"`
- `test_graph_name_uses_full_tenant_id` — asserts full tenant ID is used unchanged

**Scenario: Tenant graph routing** — COVERED. Naming pattern `tenant_{tenant_id}` is
verified. Cross-tenant isolation is guaranteed architecturally (each request gets its own
client for its own graph).

---

### Requirement 2: KnowledgeGraph Scoping — COVERED

**Code:** `apply_kg_mutations` in `graph/presentation/routes.py` checks SpiceDB `edit`
permission on `knowledge_graph:{id}` before calling the service. Returns 403 if denied.
`_stamp_knowledge_graph_id()` in `GraphMutationService` overwrites any caller-supplied
`knowledge_graph_id` in set_properties. `validate_operation()` in `MutationOperation`
rejects CREATE operations missing `knowledge_graph_id`.

**Tests (Mutation authorization scenario):**
- `test_kg_mutations_route_accessible_with_edit_permission` — 200 when authorized
- `test_kg_mutations_route_forbidden_without_edit_permission` — 403 + service not called
- `test_kg_mutations_route_checks_correct_resource` — asserts SpiceDB called with `knowledge_graph:my-graph-456`
- `test_kg_mutations_route_forbidden_returns_correct_status` — 403 with `detail` key

**Tests (KG ID stamping scenario):**
- `TestKnowledgeGraphIdStamping::test_stamps_knowledge_graph_id_on_create_operation`
- `TestKnowledgeGraphIdStamping::test_overwrites_caller_provided_knowledge_graph_id`
- `TestKnowledgeGraphIdStamping::test_stamps_knowledge_graph_id_on_update_operation`
- `TestKnowledgeGraphIdStamping::test_does_not_stamp_on_delete_operation`
- `TestKnowledgeGraphIdStamping::test_stamps_knowledge_graph_id_in_jsonl_parse`
- `test_kg_mutations_route_passes_knowledge_graph_id_to_service` — route passes KG ID to service

