## Code Review Findings

### Observability ‚Äî PASS
All logging is routed through domain probes (`APIKeyServiceProbe`,
`APIKeyRepositoryProbe`). No direct `logger.*` or `print()` calls appear
in service, repository, or domain code. The `DefaultXxxProbe` implementations
correctly encapsulate structlog calls.

### Mocking discipline ‚Äî PASS
Tests use `Mock(spec=IAPIKeyRepository)` and `create_autospec(...)` for
application-layer collaborators, enforcing correct interface contracts.
`MagicMock` is only used for the SQLAlchemy session `begin()` context
manager (infrastructure concern) and for the structlog logger inside probe
unit tests (testing the probe implementation itself). No bare `MagicMock`
for domain or application collaborators.

### Security ‚Äî PASS
- Bcrypt at work factor 12 (`BCRYPT_WORK_FACTOR = 12`).
- Plaintext secret returned exactly once; never stored or re-fetched.
- 12-character prefix for fast lookup without exposing hash.
- `karto_` prefix for secret scanning / detection.
- Constant-time comparison via `bcrypt.checkpw`.
- Prefix collision handled: multiple candidates are iterated; error-level
  probe event fired when `len(models) > 1`.

### DDD structure ‚Äî PASS
Implementation is cleanly layered:
- Domain: `APIKey` aggregate with `create()`, `revoke()`, `mark_for_deletion()`,
  `record_usage()`, `is_valid()`, `collect_events()`.
- Ports: `IAPIKeyRepository` protocol; `APIKeyAlreadyRevokedError`,
  `DuplicateAPIKeyNameError`, etc.
- Application: `APIKeyService` orchestrates authz + persistence + observability.
- Infrastructure: `APIKeyRepository` ‚Üí PostgreSQL via SQLAlchemy; outbox pattern
  for domain events (SpiceDB relationship cleanup via `APIKeyDeleted` event).
- Presentation: FastAPI routes with proper error mapping (409 duplicate, 403 authz,
  404 not found, 422 invalid ID).

