## Requirement Coverage

### Requirement: Knowledge Graph Creation — COVERED

**Scenario: Successful creation**
- Code: `KnowledgeGraph.create()` generates ULID via `KnowledgeGraphId.generate()`, sets `tenant_id`/`workspace_id`. `KnowledgeGraphService.create()` checks EDIT on workspace. `KnowledgeGraphCreated` event is written to the transactional outbox; `ManagementEventTranslator._translate_knowledge_graph_created()` produces two `WriteRelationship` ops (workspace + tenant SpiceDB links).
- Tests:
  - `test_knowledge_graph.py::TestKnowledgeGraphCreate::test_create_sets_all_fields`
  - `test_knowledge_graph.py::TestKnowledgeGraphCreate::test_create_generates_unique_id`
  - `test_knowledge_graph_service.py::TestKnowledgeGraphServiceCreate::test_create_checks_edit_permission_on_workspace`
  - `test_knowledge_graph_service.py::TestKnowledgeGraphServiceCreate::test_create_saves_aggregate_via_repo`
  - `test_translator.py::TestManagementEventTranslatorKnowledgeGraphCreated::test_first_operation_is_workspace_relationship`
  - `test_translator.py::TestManagementEventTranslatorKnowledgeGraphCreated::test_second_operation_is_tenant_relationship`

**Scenario: Duplicate name within tenant**
- Code: `KnowledgeGraphRepository.save()` catches `IntegrityError` on `uq_knowledge_graphs_tenant_name`; service re-raises as `DuplicateKnowledgeGraphNameError`; route maps to HTTP 409.
- Tests:
  - `test_knowledge_graph_service.py::TestKnowledgeGraphServiceCreate::test_create_raises_duplicate_on_integrity_error`
  - `test_knowledge_graph_routes.py::TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_409_for_duplicate_name`

