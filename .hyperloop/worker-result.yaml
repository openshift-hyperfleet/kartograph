## Code Quality Observations

**Observability**: Correct DOO pattern. Domain/application code calls probe methods
(`self._probe.knowledge_graph_created(...)`) exclusively. Probe implementations
internally use structlog — this is the expected probe encapsulation, not a violation.

**Mock usage**: `AsyncMock(spec=KnowledgeGraphService)` in presentation layer tests
follows the established codebase pattern (same as `test_api_key_routes.py`).
Domain/application layer tests use real domain objects or fakes. No violation.

**Cascade deletion atomicity**: `secret_store.delete()` is called inside the
`session.begin()` block. If DB operations subsequently fail and roll back,
secrets already deleted from Vault will not be restored (Vault cannot participate
in ACID transactions). This is a pre-existing architectural limitation inherent
to distributed systems, not introduced by this task, and does not block passage.

**Commit trailers**: All implementation commits carry both `Spec-Ref` and
`Task-Ref: task-008` trailers. Conventional commit format used throughout.

**Authz cleanup on delete**: `KnowledgeGraphDeleted` event carries `workspace_id`
and is translated by `ManagementEventTranslator` to delete workspace relation,
tenant relation, and filter-delete all admin/editor/viewer direct grants via the
outbox — all three classes of relationship cleaned up as required by spec.

