    saving to the type definition repository.
  - Test: `test_apply_mutations_stores_define_operations` тАФ verifies all three system
    properties are present (with `slug` deliberately absent from caller input so the
    injection is the only way it can appear).

  **Scenario: Define an edge type**
  - Code: Same path; `get_system_properties_for_entity(EntityType.EDGE)` returns
    `{data_source_id, source_path}` (no `slug`).
  - Test: `test_apply_define_edge_type_adds_edge_system_properties` тАФ verifies
    `data_source_id` and `source_path` present, `slug` absent.

