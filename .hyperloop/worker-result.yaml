### Architecture — PASS

The shared_kernel outbox layer defines pure Protocols (ports):
- `IOutboxRepository`, `EventTranslator`, `EventHandler`, `EventSerializer`,
  `OutboxEventSource` — all in `shared_kernel/outbox/ports.py`.

Infrastructure implements these:
- `OutboxRepository` — PostgreSQL implementation.
- `CompositeEventHandler` — fan-out dispatcher.
- `SpiceDBEventHandler` — translator+authz adapter.
- `PostgresNotifyEventSource` — NOTIFY listener.
- `OutboxWorker` — orchestrates polling + event source.

Domain events flow through bounded-context repositories that call
`aggregate.collect_events()` and `outbox_repo.append()` within the same session,
satisfying the atomicity guarantee.

