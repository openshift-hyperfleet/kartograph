### 9. Workspace Access Inheritance (SHALL) — COVERED

**Group added to workspace scenario (existing members get access)**
- Code: SpiceDB schema: `workspace#editor@group:{id}#member` chains to `group#member_relation@user:{id}` and `group#admin@user:{id}` (since `member = admin + member_relation`). Outbox worker applies group-to-workspace tuples.
- Tests: `test_group_member_gets_workspace_access_via_group` (integration: bob gets EDIT but not MANAGE).

**Member added to group with existing workspace assignment**
- Code: SpiceDB evaluates permissions lazily at check time; writing `group#member_relation@user:bob` after the `workspace#editor@group:{id}#member` tuple is already written gives bob EDIT access immediately.
- Tests: `test_member_added_after_group_assigned_to_workspace_gets_access` (integration: verifies EDIT granted after bob is added post-workspace-assignment).

**Member removed from group loses inherited workspace access**
- Code: Outbox processes `MemberRemoved` event, deletes SpiceDB `group#member_relation@user:{id}` tuple. SpiceDB re-evaluates workspace permissions.
- Tests: `test_removing_user_from_group_revokes_workspace_access` (integration: verifies EDIT revoked after bob removed from group).

---

### 10. Group Roles (SHALL) — COVERED

**Admin role (manage + view permissions, included in workspace inheritance)**
- Code: SpiceDB schema: `permission manage = admin`; `permission view = admin + member_relation + tenant->view`; workspace relations accept `group#member` which resolves to `admin + member_relation`.
- Tests: `test_group_admin_can_delete_group` (integration: MANAGE), `test_group_member_gets_workspace_access_via_group` and `test_group_admin_gets_workspace_access_via_group_member_permission` (integration: workspace inheritance for admins).

**Member role (view permission, included in workspace inheritance)**
- Code: SpiceDB schema: `permission view = admin + member_relation + tenant->view`; `member_relation` is included in `group#member` used in workspace relations.
- Tests: `test_admin_can_add_member_to_group` (integration: member has VIEW=True, MANAGE=False), `test_group_member_gets_workspace_access_via_group` (integration: member gets workspace EDIT).

---

## Overall Assessment

All 10 SHALL requirements from `specs/iam/groups.spec.md` are implemented in code and covered by tests. Every scenario has at least one unit or integration test that exercises the exact Given/When/Then conditions.

The one minor gap — no route-level HTTP test for the "demote/remove last admin" scenario — is noted but does not constitute a missing test for the business rule; the domain unit tests fully cover that scenario's Given/When/Then. The route correctly propagates the domain ValueError as HTTP 400.

**VERDICT: PASS**
