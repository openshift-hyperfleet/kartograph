### REQ-3: API Key Listing — COVERED

**Scenario 3.1 — List keys, no secrets**
- Code: `iam/presentation/api_keys/models.py::APIKeyResponse` — exposes name, prefix, created_at, expires_at, last_used_at, is_revoked; excludes `key_hash` / `secret`.
- Tests: `test_api_key_routes.py::test_never_returns_secret_or_hash`; `test_api_key_routes.py` (list returns metadata fields).

**Scenario 3.2 — Filter by creator (optional user_id)**
- Code: `iam/application/services/api_key_service.py` — accepts `created_by_user_id` param; `iam/infrastructure/api_key_repository.py` — applies filter to query; routes expose optional `user_id` query param.
- Tests: `test_api_key_service.py::test_filters_by_user_id`.

