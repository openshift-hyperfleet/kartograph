open_items:
  - id: A
    description: "test_does_not_stamp_when_knowledge_graph_id_not_provided uses DELETE op — cannot exercise stamping-suppression logic"
    status: open
    note: >
      File: src/api/tests/unit/graph/application/test_mutation_service.py, lines 793-821.
      The test constructs a MutationOperationType.DELETE operation. DELETE has no
      set_properties, so the service's _stamp_knowledge_graph_id code path is never
      reached. The sole assertion is mock_applier.apply_batch.assert_called_once(),
      which gives zero signal about whether the service would incorrectly stamp
      knowledge_graph_id onto a CREATE or UPDATE when the apply_mutations()
      knowledge_graph_id param is omitted.
      FIX: Replace the DELETE op with a CREATE or UPDATE that includes set_properties
      (e.g., data_source_id, source_path, slug, but NOT knowledge_graph_id). Call
      service.apply_mutations(operations) with no knowledge_graph_id argument. Assert
      that the operation passed to mock_applier.apply_batch does NOT contain
      knowledge_graph_id in its set_properties.
  - id: B
    description: "test_apply_mutations_stores_define_operations includes slug in caller-provided required_properties — injection cannot be detected"
    status: open
    note: >
      File: src/api/tests/unit/graph/application/test_mutation_service.py, lines 80-109.
      The MutationOperation is constructed with required_properties={"slug", "name"}.
      Because "slug" is already in the caller-provided set, the assertion
      assert "slug" in saved_type_def.required_properties would pass even if the
      service's system-property injection code were deleted entirely. The test cannot
      detect an injection regression.
      FIX: Remove "slug" from the caller-provided required_properties (pass only
      {"name"} or another non-system property). The assertion
      assert "slug" in saved_type_def.required_properties will then only pass if the
      service actually injects it automatically, which is the behavior the test is
      supposed to guard.

