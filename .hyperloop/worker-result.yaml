## Notes

- The `test_create_api_key_requires_tenant_membership` integration test is explicitly skipped with a clear documented reason (infrastructure limitation — only alice and bob provisioned). This is acceptable as the behavior is covered implicitly by the 401 authentication layer.
- The 12-character prefix is correctly implemented: `extract_prefix()` returns `secret[:12]` and the DB column is `String(12)`.
- The `is_revoked=true` visibility in listings is implemented: revoked keys are not physically deleted, only marked via the `is_revoked` flag in the `APIKeyResponse`.
