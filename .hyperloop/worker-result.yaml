## Task 017: Outbox Pattern — Spec Alignment Verdict

Branch: `hyperloop/task-017`

---

### Requirement: Transactional Event Storage — COVERED

**Code:** `infrastructure/outbox/repository.py` — `OutboxRepository.append()` calls only
`session.add()`, never `session.commit()`. The shared-session design guarantees atomic
commit/rollback with the aggregate change. `infrastructure/migrations/versions/6d11eae0e76d_create_outbox_table.py`
creates the outbox table.

**Scenario: Successful write**
- Unit: `tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit` — asserts `session.add()` called, `session.commit()` not called.
- Integration: `tests/integration/iam/test_outbox_consistency.py::TestAtomicityGuarantees::test_outbox_entry_created_in_same_transaction_as_group` — verifies both GroupModel and OutboxModel exist after commit.

**Scenario: Transaction rollback**
- Unit: `TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries` — confirms no independent commit.
- Integration: `TestAtomicityGuarantees::test_rollback_removes_both_group_and_outbox_entry` — forces rollback via exception, verifies neither group nor outbox entry persists.

---

### Requirement: Event Processing — COVERED

**Code:** `infrastructure/outbox/worker.py` — `_process_entries()` calls `handler.handle()`, then `_mark_processed()` on success; `_handle_processing_failure()` increments retry or moves to DLQ; `_move_to_dlq()` sets `failed_at`. `infrastructure/migrations/versions/a1b2c3d4e5f6_add_outbox_retry_columns.py` adds `retry_count`, `last_error`, `failed_at`.

**Scenario: Normal processing**
- Unit: `TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries` — handler called, `event_processed` probe called, session.execute called (for `_mark_processed`).
- Integration: `TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb` — verifies `processed_at` set and SpiceDB relationship written after `_process_batch()`.

**Scenario: Transient failure**
- Unit: `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count` — handler raises RuntimeError, `event_processing_failed` probe called, `event_moved_to_dlq` NOT called.
- Unit: `TestOutboxWorkerRetryBehavior::test_transient_failure_does_not_dlq_immediately` — ConnectionError at retry_count=0 stays in retry, not DLQ.

**Scenario: Permanent failure (dead letter)**
- Unit: `TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq` — entry at max_retries-1, one more failure moves to DLQ; `event_moved_to_dlq` probe called, `_move_to_dlq()` sets `failed_at`.

---

### Requirement: Idempotent Event Handlers — COVERED

**Code:** `infrastructure/outbox/spicedb_handler.py` delegates to `authz.write_relationship()` which is an upsert in SpiceDB (set semantics). `repository.py::fetch_unprocessed()` filters `processed_at IS NULL AND failed_at IS NULL`.

**Scenario: Duplicate delivery**
- Unit: `tests/unit/infrastructure/outbox/test_spicedb_handler.py::TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state` — FakeAuthorizationProvider with set-based storage; two invocations produce identical state (upsert semantics verified).
- Unit: `TestOutboxWorkerIdempotency::test_already_processed_entry_excluded_from_fetch` — compiled query contains `processed_at IS NULL`.
- Unit: `TestOutboxWorkerIdempotency::test_failed_entries_excluded_from_fetch` — compiled query contains `failed_at IS NULL`.
- Integration: `TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state` — handler invoked manually first, then `_process_batch()` retries; SpiceDB relationship still exactly one copy and `processed_at` is set.

---

### Requirement: Concurrent Worker Safety — COVERED

**Code:** `repository.py::fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`. Same guard in `worker.py::_process_batch()` and `_process_single()`.

**Scenario: Concurrent workers**
- Unit: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked` — SQLAlchemy statement compiled with the PostgreSQL dialect; asserts `"SKIP LOCKED"` present in rendered SQL.

---

### Requirement: Dual Delivery Mechanism — COVERED

**Code:**
- `infrastructure/outbox/event_sources/postgres_notify.py` — `PostgresNotifyEventSource` listens via `asyncpg-listen`, invokes callback with parsed UUID.
- `infrastructure/migrations/versions/d32ecc44581a_create_outbox_notify_trigger.py` — PostgreSQL trigger `outbox_after_insert` calls `pg_notify('outbox_events', NEW.id::text)` on INSERT.
- `worker.py::_poll_loop()` — runs every `poll_interval_seconds` (default 30) as fallback.
- `worker.py::start()` — starts both poll loop and (optionally) event source concurrently.

**Scenario: Real-time notification**
- Unit: `test_postgres_notify_event_source.py::TestPostgresNotifyEventSourceNotify::test_notify_triggers_callback_with_uuid` — mocked NotificationListener fires a notification; callback invoked with correct UUID.
- Integration: `TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling` — worker with `poll_interval_seconds=999`, group created, entry processed within 0.5 s via NOTIFY; SpiceDB relationship verified.

**Scenario: Polling fallback**
- Integration: `TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb` — group created (outbox entry inserted), `worker._process_batch()` called directly (equivalent to one polling cycle), entry discovered and processed; verifies the polling path independently of NOTIFY.

