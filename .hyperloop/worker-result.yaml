1. List-route test does not explicitly assert all metadata fields (`created_at`, `expires_at`, `last_used_at`) by value тАФ the model guarantees serialization.
2. No route-level positive test for `GET /iam/api-keys?user_id=<valid>` тАФ covered at service layer.

These gaps do not constitute spec failures because the underlying behaviors are correctly implemented and tested at the appropriate DDD layer.
