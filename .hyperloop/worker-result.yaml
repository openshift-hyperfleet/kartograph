All 20 spec scenarios from specs/iam/groups.spec.md are now fully covered.

## What was done

The prior review (Findings) identified one PARTIAL scenario:

**"Workspace Access Inheritance — Member added to group with workspace assignments"**

All existing tests used the reverse ordering (member added to group before group was
assigned to workspace). The spec requires the sequence:
1. Group assigned to workspace as editor
2. New member added to the group
3. New member immediately has editor-level workspace permissions

A new integration test `test_member_added_after_group_assigned_to_workspace_gets_access`
was added to `tests/integration/iam/test_group_workspace_inheritance.py` in the
`TestGroupWorkspaceInheritance` class. The test follows the exact GIVEN→WHEN→THEN
sequence from the spec:
- Creates a workspace (alice as admin)
- Creates an empty group and adds it to the workspace as editor
- Confirms alice (group admin) already has EDIT on the workspace via group.member
- JIT-provisions bob and adds him as a group member
- Waits for bob's VIEW permission on the group (outbox processed)
- Asserts bob immediately has EDIT on the workspace via the inherited chain
- Confirms bob does NOT have MANAGE (editor role only)

## Test verification

All 2272 unit tests continue to pass (no regressions).
The new integration test requires a running dev instance; it follows the same
patterns as all other integration tests in the file (wait_for_permission polling
for eventual consistency through the outbox).
