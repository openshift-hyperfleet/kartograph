  ### Newly Fixed: Dev-UI POST endpoint mismatch

  #### Issue: knowledge-graphs/index.vue used wrong POST endpoint â€” NOW FIXED
  - The page previously called `POST /management/knowledge-graphs` which does
    not exist in the backend (404). The only backend route for KG creation is
    `POST /management/workspaces/{workspace_id}/knowledge-graphs`.
  - **Fix:** Page now fetches the workspace list on mount (`GET /iam/workspaces`),
    resolves the root workspace (`is_root === true`), and posts to
    `/management/workspaces/${rootWorkspaceId}/knowledge-graphs`.
  - If no workspace is available, a toast error is shown.
  - `loadKnowledgeGraphs()` now shows a `toast.error()` on failure instead of
    silently resetting the list to empty.
  - `knowledge-graphs.test.ts` updated to assert the correct workspace-scoped
    POST endpoint and includes the workspaceId in both tests.

