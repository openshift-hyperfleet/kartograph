### Requirement 2: Event Processing ‚Äî COVERED

**Code:** `src/api/infrastructure/outbox/worker.py`
- `_process_entries()` calls `handler.handle()`, then `_mark_processed()` on success
- `_handle_processing_failure()` increments retry via `_increment_retry()` or calls `_move_to_dlq()` when `new_retry_count >= max_retries`
- `_move_to_dlq()` sets `failed_at=datetime.now(UTC)` so the entry is never re-fetched

**Tests (Normal processing):**
- Unit: `test_processes_unprocessed_entries` ‚Äî verifies handler.handle called and probe.event_processed called
- Unit: `test_marks_entry_as_processed` ‚Äî verifies `session.execute` called (UPDATE for mark_processed)
- Integration: `test_worker_processes_group_created_and_writes_to_spicedb` ‚Äî verifies `processed_at is not None` after `_process_batch()`

**Tests (Transient failure):**
- Unit: `test_transient_failure_increments_retry_count` ‚Äî `RuntimeError("SpiceDB unreachable")` ‚Üí `probe.event_processing_failed` called, `probe.event_moved_to_dlq` NOT called
- Unit: `test_transient_failure_does_not_dlq_immediately` ‚Äî `ConnectionError` at retry_count=0, max_retries=5 ‚Üí retry, not DLQ

**Tests (Permanent failure / dead letter):**
- Unit: `test_max_retries_moves_entry_to_dlq` ‚Äî `retry_count=2, max_retries=3` ‚Üí next failure triggers DLQ; `probe.event_moved_to_dlq` called, `probe.event_processing_failed` NOT called

