### Requirement: Permission Inheritance — COVERED

**Scenario: Workspace-inherited access**
- Code: SpiceDB schema (`shared_kernel/authorization/spicedb/schema.zed`):
  `permission view = admin + editor + viewer + workspace->view`
  `permission edit = admin + editor + workspace->edit`
  `permission manage = admin + workspace->manage`
- Integration tests (require live SpiceDB):
  - `test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_editor_can_view_knowledge_graph`
  - `test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_editor_can_edit_knowledge_graph`
  - `test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_admin_can_manage_knowledge_graph`

**Scenario: Direct grant (admin confers manage+edit+view)**
- Integration tests:
  - `test_knowledge_graph_authorization.py::TestDirectGrantKnowledgeGraphAccess::test_direct_kg_admin_has_manage_permission`
  - `test_knowledge_graph_authorization.py::TestDirectGrantKnowledgeGraphAccess::test_direct_kg_admin_has_edit_permission`
  - `test_knowledge_graph_authorization.py::TestDirectGrantKnowledgeGraphAccess::test_direct_kg_admin_has_view_permission`

