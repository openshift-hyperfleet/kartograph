## NFR Checks

**Domain Probes (no direct logger/print):** PASS — All observability flows through `UserServiceProbe` and `UserRepositoryProbe` (`user_ensured`, `user_provision_failed`, `user_saved`, `user_retrieved`, `user_not_found`). No direct `logger.*` or `print()` calls in production code.

**flush() inside try/except:** PASS — `await self._session.flush()` is at line 77, inside the `try` block that begins at line 56, ensuring `IntegrityError` from the deferred INSERT is caught within `save()`.

**No tenant_id in User aggregate:** PASS — Confirmed by reading `user.py` directly.

