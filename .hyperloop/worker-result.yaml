### Requirement: Idempotent Event Handlers — COVERED

**Scenario: Duplicate delivery**
- Code: `SpiceDBEventHandler.handle()` translates event to SpiceDB operations. SpiceDB
  `write_relationship` is an upsert (set membership) — writing the same tuple twice
  leaves it once. Handler can be invoked repeatedly without creating duplicates.
- Unit test: `TestSpiceDBEventHandlerIdempotency.test_duplicate_invocation_produces_identical_final_state`
  (`test_spicedb_handler.py`) — uses `FakeAuthorizationProvider` (set-based storage,
  not MagicMock) to verify two identical handle() calls produce identical state.
- Integration test: `TestIdempotentEventHandlers.test_handler_invoked_twice_produces_same_spicedb_state`
  (`test_outbox_consistency.py`) — simulates crash-before-mark-processed scenario;
  handler invoked twice against real SpiceDB; asserts `processed_at` is set on retry
  and SpiceDB state is identical after both invocations.

