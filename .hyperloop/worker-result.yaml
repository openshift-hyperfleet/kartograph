## Task-021: API Keys — Spec Alignment Review

### Date: 2026-04-23
### Reviewer: spec-alignment-reviewer

All 6 SHALL requirements from `specs/iam/api-keys.spec.md` are implemented and covered by tests.

---

## Requirement Coverage

### 1. API Key Creation — COVERED

**Code:**
- `iam/application/services/api_key_service.py` — `create_api_key()` checks `CREATE_API_KEY` permission via SpiceDB before creating
- `iam/application/security.py` — `generate_api_key_secret()` produces `karto_`-prefixed keys; `extract_prefix()` extracts first 12 chars; `hash_api_key_secret()` bcrypt-hashes with work factor 12
- `iam/presentation/api_keys/models.py` — `CreateAPIKeyRequest` enforces `min_length=1`, `max_length=255`, `expires_in_days` default=30, ge=1, le=3650
- `iam/presentation/api_keys/routes.py` — returns `APIKeyCreatedResponse` with `secret` field (one-time)
- `iam/infrastructure/api_key_repository.py` — `save()` checks for duplicate name per user+tenant, raises `DuplicateAPIKeyNameError`

**Tests:**

| Scenario | Test |
|---|---|
| Successful creation (karto_ prefix, plaintext returned once, bcrypt stored, 12-char prefix) | `test_api_key_service.py::test_secret_has_karto_prefix`, `test_returns_plaintext_secret_only_at_creation`, `test_creates_api_key_with_hashed_secret`, `test_stores_prefix_from_secret`; `test_api_key_routes.py::test_returns_secret_in_response` |
| Duplicate name per user → 409 | `test_api_key_repository.py::test_raises_on_duplicate_name`; `test_api_key_service.py::test_raises_on_duplicate_name`; `test_api_key_routes.py::test_returns_409_on_duplicate_name` |
| Expiration bounds 1–3650 days, default 30 | `test_api_key_routes.py::test_validates_expires_in_days_minimum`, `test_validates_expires_in_days_maximum`, `test_uses_default_expires_in_days_of_30` |

---

### 2. API Key Authentication — COVERED

**Code:**
- `iam/dependencies/user.py` — `_authenticate()` tries JWT first (if Bearer token present), then X-API-Key; JWT failure short-circuits with 401
- `iam/application/services/api_key_service.py` — `validate_and_get_key()` returns None for revoked/expired keys; calls `record_usage()` on success
- `iam/infrastructure/api_key_repository.py` — `get_verified_key()` queries by prefix, checks all candidates via bcrypt; calls probe on collision (len > 1)
- `iam/infrastructure/observability/api_key_repository_probe.py` — `api_key_prefix_collision()` uses `self._logger.error()` (error level confirmed)

**Tests:**

| Scenario | Test |
|---|---|
| Valid key authenticates, last_used_at updated | `test_api_key_auth.py::test_authenticates_with_valid_api_key`, `test_updates_last_used_at_on_success` |
| Expired key → 401 | `test_api_key_auth.py::test_returns_401_for_expired_api_key` (key inserted directly into DB to bypass route min-expiry) |
| Revoked key → 401 | `test_api_key_auth.py::test_returns_401_for_revoked_api_key` |
| JWT takes precedence when both provided | `test_api_key_auth.py::test_prefers_jwt_when_both_provided`; code order in `_authenticate()` proves JWT-first |
| Prefix collision → each candidate bcrypt-checked, error-level log | `test_api_key_repository.py::test_logs_error_on_prefix_collision` (verifies probe called with prefix + count); `api_key_repository_probe.py` uses `self._logger.error()` |

---

### 3. API Key Listing — COVERED

**Code:**
- `iam/application/services/api_key_service.py` — `list_api_keys()` calls `authz.lookup_resources(API_KEY, VIEW, user)` to get viewable IDs, then filters by tenant + optional `created_by_user_id`
- `iam/presentation/api_keys/models.py` — `APIKeyResponse` model has no `secret` or `key_hash` field

**Tests:**

| Scenario | Test |
|---|---|
| List returns metadata (name, prefix, created_at, expires_at, last_used_at, is_revoked); no secret | `test_api_key_routes.py::test_never_returns_secret_or_hash`, `test_lists_api_keys_for_user` |
| Filter by user_id | `test_api_key_service.py::test_filters_by_created_by_user_id` (verifies repo called with filter) |

---

### 4. API Key Revocation — COVERED

**Code:**
- `iam/application/services/api_key_service.py` — `revoke_api_key()` loads key first (tenant-scoped), checks `REVOKE` permission via SpiceDB, calls `api_key.revoke()`
- SpiceDB schema: `api_key#revoke = owner + tenant->administrate`
- `APIKey.revoke()` raises `APIKeyAlreadyRevokedError` if already revoked
- Revoked key remains in DB with `is_revoked=True`

**Tests:**

| Scenario | Test |
|---|---|
| Owner revokes own key → 204, visible in listing with is_revoked=True | `test_api_key_auth.py::test_owner_can_revoke_own_key`, `test_revoked_key_remains_visible_in_listing` |
| Tenant admin revokes any key | `test_api_key_auth.py::test_tenant_admin_can_revoke_other_users_key` |
| Already-revoked → 409 | `test_api_key_routes.py::test_returns_409_when_already_revoked`; `test_api_key_service.py::test_raises_when_already_revoked` |
| Unauthorized → 403 | `test_api_key_auth.py::test_non_admin_cannot_revoke_other_users_key`; `test_api_key_routes.py::test_revoke_api_key_returns_403_when_unauthorized` |

---

