### Minor Observations (Non-blocking)

- The `fix(iam)` commit (b2245d8e) modifies IAM workspace routes to return 404 instead of 403
  when the parent workspace is unauthorized, with the Spec-Ref pointing to the KG spec. This
  is a legitimate security improvement (no existence leakage) but is technically outside the
  KG spec scope. It does not harm correctness.
- The `list_all` route (`GET /management/knowledge-graphs`) is additive — not specified in the
  spec but does not violate any requirement.
- SpiceDB relationship cleanup on deletion is eventual (via outbox), not strictly within the same
  DB transaction. This is the established codebase-wide pattern and provides atomicity at the DB
  level with guaranteed-delivery for SpiceDB via the outbox.
