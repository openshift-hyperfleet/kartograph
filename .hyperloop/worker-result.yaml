## Spec Alignment Review — JobPackage Shared Kernel

All 103 unit tests pass. All spec requirements are covered by implementation
and tests. All three PR feedback items have been fully addressed.

### Requirement: Package Structure — COVERED

- Scenario: Package contents — builder writes exactly manifest.json,
  changeset.jsonl, content/{hex}, state.json. Tests:
  test_built_zip_contains_manifest, test_built_zip_contains_changeset,
  test_built_zip_contains_state, test_built_zip_contains_content_files.

- Scenario: Package naming — archive_name() returns "job-package-{ULID}.zip".
  Tests: test_archive_name_follows_convention, test_archive_is_a_zip_file.

- Scenario: ZIP entry path safety — validate_zip_entry_name enforces no
  leading slash, no drive letters, no backslash, no null bytes, no ".."
  segments. Builder validates before write; reader validates all names on
  construction. Tests: full TestValidateZipEntryName suite (15 tests),
  TestJobPackageBuilderZipPathSafety, TestJobPackageReaderPathSafety.

### Requirement: Manifest — COVERED

- Scenario: Manifest fields — Manifest dataclass has format_version,
  data_source_id, knowledge_graph_id, sync_mode, entry_count,
  content_checksum. Tests: test_manifest_contains_required_fields,
  test_manifest_data_source_id, test_manifest_entry_count_matches_changeset.

- Scenario: Content checksum computation — builder._compute_content_checksum()
  and compute_content_checksum() both follow the spec algorithm: sorted
  lexicographic walk, hex-only filenames, path+"\n"+bytes stream, SHA-256.
  Symlink resolution, cycle detection, out-of-tree skip all implemented.
  Tests: full TestComputeContentChecksum suite (11 tests).

### Requirement: Changeset Format — COVERED

- Scenario: Add operation — ChangeOperation.ADD, all fields present.
  Tests: test_add_entry_serialized_correctly, test_add_entry_fields.

- Scenario: Modify operation — ChangeOperation.MODIFY, same fields.
  Tests: test_modify_entry_fields.

- Scenario: Rename represented as modify — previous_path in metadata.
  Tests: test_rename_as_modify_with_previous_path.

- Scenario: No delete operation — ChangeOperation enum has only ADD and
  MODIFY. Tests: test_no_delete_operation, test_only_add_and_modify.

- Scenario: Entry type — reverse-DNS notation enforced by convention.
  Tests: test_type_uses_reverse_dns_notation.

- Scenario: Content reference — content_ref serialised as "sha256:{hex}".
  Tests: test_content_ref_in_changeset_uses_sha256_prefix,
  test_content_ref_format_in_entry.

### Requirement: Content-Addressable Storage — COVERED

- Scenario: Content file naming — filename is hex digest only, no prefix.
  Tests: test_content_file_named_by_hex_digest_only, test_filename_is_hex_only.

- Scenario: Deduplication — add_content() is idempotent on identical bytes.
  Tests: test_identical_content_stored_once.

- Scenario: Integrity verification — read_content() recomputes SHA-256 and
  raises ValueError on mismatch. Tests: test_read_content_verifies_integrity.

### Requirement: Adapter Checkpoint — COVERED

- Scenario: Checkpoint structure — schema_version required; from_dict raises
  ValueError if absent. Tests: test_state_json_contains_schema_version,
  test_requires_schema_version.

- Scenario: Opaque ownership — data field is opaque dict; no inspection by
  other components. Tests: test_state_json_opaque_data_preserved,
  test_opaque_data_is_dict.

- Scenario: Snapshot vs authoritative state — documented in docstring;
  no code enforcement needed (architectural convention).

- Scenario: Schema version mismatch — schema_version field allows adapter to
  detect and handle version differences. Tests:
  test_schema_version_mismatch_detectable.

### Requirement: Streaming-Friendly Design — COVERED

- Scenario: JSONL streaming — iter_changeset() opens ZIP entry with zf.open(),
  wraps in io.TextIOWrapper, yields lines lazily one at a time. No full-file
  buffering. Tests: test_iter_changeset_is_a_generator,
  test_iter_changeset_multiple_entries.

- Scenario: ZIP random access — read_manifest() uses ZipFile.read() on a
  named entry without extractall(). Tests:
  test_read_manifest_without_reading_full_archive.

### PR Feedback Items — ALL ADDRESSED

1. builder.py fail-fast consistency check (lines 140-152): Before writing the
   ZIP, build() collects all ChangesetEntry content_refs whose hex_digest is
   absent from self._content and raises ValueError listing all missing refs.
   Test: test_build_raises_when_content_ref_not_added uses
   pytest.raises(ValueError, match="[Cc]ontent").

2. reader.py streaming iter_changeset (lines 84-92): Uses
   zf.open("changeset.jsonl") + io.TextIOWrapper for lazy line iteration.
   No full-file read into memory.

3. test_reader.py tightened path-safety tests (lines 277-291):
   - test_reader_rejects_path_traversal_entry: pytest.raises(ValueError).
   - test_reader_rejects_absolute_path_entry: tampered entry is "/evil"
     (genuine absolute path, not traversal), pytest.raises(ValueError).
     Both are specific, not broad (ValueError, Exception).

