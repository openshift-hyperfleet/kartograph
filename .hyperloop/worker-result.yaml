### Requirement 3: Idempotent Event Handlers ‚Äî COVERED

**Code:**
- `fetch_unprocessed()` in `repository.py` filters `processed_at IS NULL AND failed_at IS NULL`; a processed entry is simply not fetched again
- SpiceDB writes use `write_relationship` (upsert semantics at the SpiceDB level ‚Äî writing the same tuple twice leaves it once)

**Tests:**
- Unit: `test_already_processed_entry_excluded_from_fetch` ‚Äî compiles query, asserts `"processed_at IS NULL"` in SQL
- Unit: `test_failed_entries_excluded_from_fetch` ‚Äî asserts `"failed_at IS NULL"` in SQL
- Unit: `TestSpiceDBEventHandlerIdempotency.test_duplicate_invocation_produces_identical_final_state` ‚Äî `FakeAuthorizationProvider` uses a Python `set` (upsert semantics); calling handler twice leaves exactly one relationship
- Integration: `TestIdempotentEventHandlers.test_handler_invoked_twice_produces_same_spicedb_state` ‚Äî invokes handler manually, then runs `_process_batch()` again on the still-unprocessed entry; asserts SpiceDB relationship unchanged and `processed_at` is set

---

### Requirement 4: Concurrent Worker Safety ‚Äî COVERED

**Code:** `repository.py` `fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`; `worker.py` `_process_batch()` builds the same query inline with `with_for_update(skip_locked=True)`

**Tests:**
- Unit: `test_fetch_unprocessed_uses_for_update_skip_locked` ‚Äî compiles query with PostgreSQL dialect, asserts `"SKIP LOCKED"` in rendered SQL
- Unit: `test_already_processed_entry_excluded_from_fetch` ‚Äî additionally demonstrates the `processed_at IS NULL` filter (entries once locked-and-processed are invisible to the next worker)

---

### Requirement 5: Dual Delivery Mechanism ‚Äî COVERED

**Code:**
- Real-time: `PostgresNotifyEventSource` (`event_sources/postgres_notify.py`) listens on `outbox_events` channel; migration `d32ecc44581a` creates a `NOTIFY` trigger on insert
- Polling fallback: `_poll_loop()` in `worker.py` calls `_process_batch()` on every `poll_interval_seconds` interval (default 30 s), using `asyncio.wait_for(_shutdown_event.wait(), timeout=poll_interval)` to avoid blocking shutdown
- Both loops run concurrently from `start()`

**Tests (Real-time NOTIFY):**
- Integration: `test_worker_processes_via_notify_not_polling` ‚Äî sets `poll_interval_seconds=999`, creates a group (triggers DB NOTIFY), asserts entry processed within 0.5 s (sub-second, not waiting for poll)

**Tests (Polling fallback):**
- Integration: `test_worker_processes_group_created_and_writes_to_spicedb` and `test_worker_processes_member_added_and_writes_to_spicedb` ‚Äî create outbox entries then directly call `_process_batch()` (the polling code path), verifying entries are found and processed; this is the exact scenario: NOTIFY not used, polling discovers and processes the entries

**Note on polling fallback scenario:** There is no test explicitly named "polling discovers missed NOTIFY event" but the integration tests in `TestOutboxWorkerProcessing` exercise `_process_batch()` (the polling engine) directly, fully covering the WHEN/THEN of the polling fallback scenario. The GIVEN (NOTIFY missed due to worker restart) is represented by not using `event_source` in those tests.

