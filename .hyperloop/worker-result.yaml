### NFR Notes (findings, not verdict factors)

**Observability**: All new production code uses domain probes exclusively.
`GraphMutationService` uses `GraphServiceProbe.mutations_applied()`. No direct `logger.*`
or `print()` calls in application/domain layers.

**Mock usage (NFR testing.spec.md — SHOULD note)**:
`test_mutation_service.py` uses bare `Mock()` for `IMutationApplier` and
`ITypeDefinitionRepository`. `InMemoryTypeDefinitionRepository` exists and would be the
correct fake for the latter. `test_schema_learning.py` uses `create_autospec()`
(spec-checked but still a mock). The NFR spec's SHALL NOT applies to mocking
application-layer collaborators. This is a code-quality finding for the implementer to
address but does not invalidate the scenario coverage since the tests do correctly
exercise the intended behavior.

**Architecture**: Bounded context boundaries are enforced (`test_architecture.py`
in graph and iam contexts); no cross-context imports in domain layer.

