### Requirement: API Key Cascade Deletion — COVERED

**Scenario: Tenant deletion** — COVERED
- `test_deletes_api_keys_on_tenant_deletion` (service unit) — repo.delete called once per key
- `test_deletes_multiple_api_keys_on_tenant_deletion` (service unit) — 3 keys, delete called 3 times
- `test_api_key_mark_for_deletion_emits_deleted_event` (service unit) — `APIKeyDeleted` event on aggregate after cascade; this is what drives SpiceDB relationship cleanup
- `test_api_key_repo_queried_by_tenant_on_deletion` (service unit) — list called with correct `tenant_id`
- `test_cascade_deletion_probe_reports_api_key_count` (service unit) — DOO probe with `api_keys_count`
- `test_api_keys_deleted_before_tenant_on_cascade` (service unit) — call order `["api_key_delete", "tenant_delete"]`

Authorization cleanup verified via `mark_for_deletion()` emitting `APIKeyDeleted`, which the outbox pattern routes to SpiceDB.

