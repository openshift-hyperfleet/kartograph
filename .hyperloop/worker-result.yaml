### Spec Requirement Coverage

**Knowledge Graph Creation** — COVERED
- `KnowledgeGraphService.create()` checks `Permission.EDIT` on workspace
- `KnowledgeGraph.create()` generates ULID, sets `tenant_id` and `workspace_id`
- SpiceDB relationships established via outbox pattern (KnowledgeGraphCreated event → ManagementEventTranslator writes workspace and tenant links)
- Duplicate name: `IntegrityError` → `DuplicateKnowledgeGraphNameError` → HTTP 409

**Knowledge Graph Name Validation** — COVERED
- Domain: `KnowledgeGraph._validate_name()` enforces 1-100 chars
- Route: Pydantic `min_length=1, max_length=100` on request model → HTTP 422

**Knowledge Graph Retrieval** — COVERED
- Service returns `None` for both missing and unauthorized (no distinction)
- Route returns HTTP 404 in both cases

**Knowledge Graph Listing** — COVERED
- `list_for_workspace()`: checks `Permission.VIEW` on workspace, uses `read_relationships` to discover KG IDs, fetches and filters by tenant
- `list_all()`: fetches all tenant KGs, parallel authorization via `asyncio.gather`

**Knowledge Graph Update** — COVERED
- Checks `Permission.EDIT` on KG
- Uses typed `KnowledgeGraphNotFoundError` exception (no string matching)
- Duplicate name: `IntegrityError` → `DuplicateKnowledgeGraphNameError` → HTTP 409

**Knowledge Graph Deletion (atomic cascade)** — COVERED
- Checks `Permission.MANAGE`
- Cascade executes inside single `async with self._session.begin()` block
- Deletes data source credentials via `secret_store.delete()`, then DS records, then KG record
- SpiceDB cleanup: removes workspace link, tenant link, and all direct grants (admin/editor/viewer) via filter-based deletion
- Rollback test confirms KG is not deleted when DS deletion fails

**Mutation after deletion** — COVERED
- `KnowledgeGraph.update()` raises `AggregateDeletedError` when `_deleted is True`

**Permission Inheritance** — COVERED
- SpiceDB schema: KG inherits edit/view/manage from parent workspace
- Direct grant: admin/editor/viewer roles can be assigned directly to a KG
- Covered by integration tests in `test_knowledge_graph_authorization.py`

