### Requirements Coverage

#### 1. Knowledge Graph Creation — FULLY IMPLEMENTED

- `KnowledgeGraph.create()` factory in `management/domain/aggregates/knowledge_graph.py`
  generates ULID via `KnowledgeGraphId.generate()`, sets tenant_id/workspace_id, emits
  `KnowledgeGraphCreated` event for outbox processing (establishes SpiceDB relationships).
- `KnowledgeGraphService.create()` in `management/application/services/knowledge_graph_service.py`
  checks EDIT permission on workspace before creation.
- DB unique constraint `uq_knowledge_graphs_tenant_name` enforces name uniqueness per tenant;
  repository catches `IntegrityError` -> `DuplicateKnowledgeGraphNameError`.
- Route returns 201 on success, 409 for duplicates.

**Tests:** `TestKnowledgeGraphCreate.*`, `TestKnowledgeGraphServiceCreate.*`,
`TestCreateKnowledgeGraph.*` (routes), `TestKnowledgeGraphUniqueness.*` (integration)

#### 2. Knowledge Graph Name Validation — FULLY IMPLEMENTED

- Domain aggregate `_validate_name()` enforces 1-100 chars at both `__post_init__` and `update()`.
- Pydantic `CreateKnowledgeGraphRequest` / `UpdateKnowledgeGraphRequest` models enforce
  identical constraint at presentation layer (FastAPI returns 422 automatically).

**Tests:** `TestKnowledgeGraphCreate.*name*`, `TestKnowledgeGraphValidation.*`

#### 3. Knowledge Graph Retrieval — FULLY IMPLEMENTED

- `KnowledgeGraphService.get()` returns `None` for: not found, wrong tenant, lacking VIEW.
  Route maps `None` -> 404 (no existence leakage - same response for missing and unauthorized).

**Tests:** `TestKnowledgeGraphServiceGet.*`, `TestGetKnowledgeGraph.*` (routes)

#### 4. Knowledge Graph Listing — FULLY IMPLEMENTED

- `KnowledgeGraphService.list_for_workspace()` checks VIEW on workspace, then reads SpiceDB
  relationships to discover KG IDs, fetches each, and filters by tenant.

**Tests:** `TestKnowledgeGraphServiceListForWorkspace.*`, `TestListKnowledgeGraphs.*`

#### 5. Knowledge Graph Update — FULLY IMPLEMENTED

- `KnowledgeGraphService.update()` checks EDIT on the KG itself (not workspace), fetches,
  validates tenant, calls `kg.update()`, persists within transaction.

**Tests:** `TestKnowledgeGraphServiceUpdate.*`, `TestUpdateKnowledgeGraph.*`

#### 6. Knowledge Graph Deletion with Cascade — FULLY IMPLEMENTED

- `KnowledgeGraphService.delete()` checks MANAGE permission, then within a single
  `async with session.begin()` block:
  1. Fetches all data sources via `ds_repo.find_by_knowledge_graph()`
  2. Deletes encrypted credentials from secret store for each DS with `credentials_path`
  3. Marks each DS for deletion and calls `ds_repo.delete()`
  4. Marks KG for deletion and calls `kg_repo.delete()`
- If any step raises, the transaction rolls back - no partial state.
- SpiceDB cleanup via outbox: `ManagementEventTranslator` produces 5 operations on
  `KnowledgeGraphDeleted`: delete workspace relationship, delete tenant relationship,
  filter-delete all admin/editor/viewer direct grants.
- `AggregateDeletedError` raised on mutation after deletion.

**Tests:** `TestKnowledgeGraphServiceDelete.*` (8 tests including rollback and credentials),
`TestManagementEventTranslatorKnowledgeGraphDeleted.*` (7 SpiceDB operation tests),
`TestKnowledgeGraphMarkForDeletion.test_update_raises_after_deletion`

#### 7. Permission Inheritance — FULLY IMPLEMENTED

SpiceDB schema defines:
```
definition knowledge_graph {
  relation workspace: workspace
  relation tenant: tenant
  relation admin: user | group#member
  relation editor: user | group#member
  relation viewer: user | group#member
  permission view = admin + editor + viewer + workspace->view
  permission edit = admin + editor + workspace->edit
  permission manage = admin + workspace->manage
}
```

- Workspace-inherited: workspace editor/member -> KG view, workspace editor -> KG edit,
  workspace admin -> KG manage.
- Direct grant: KG admin -> manage+edit+view, KG editor -> edit+view, KG viewer -> view only.

**Tests:** `TestWorkspaceInheritedKnowledgeGraphAccess.*` (7 integration tests against SpiceDB),
`TestDirectGrantKnowledgeGraphAccess.*` (5 integration tests)

