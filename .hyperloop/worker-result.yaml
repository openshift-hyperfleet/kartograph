### Knowledge Graph Spec Alignment

All spec requirements verified against implementation:

- **Creation with ULID, workspace/tenant association, auth relationships** — `KnowledgeGraphService.create()` ✓
- **Duplicate name rejection within tenant** — `DuplicateKnowledgeGraphNameError` raised and caught as 409 ✓
- **Name length validation (1-100 chars)** — domain aggregate validates in `_validate_name()` ✓
- **View-gated retrieval (404 for unauthorized/non-existent)** — `get()` returns None, routes return 404 ✓
- **Workspace-filtered listing with auth** — `list()` uses SpiceDB permission checks ✓
- **List all (tenant-scoped, auth-filtered)** — `list_all()` added in task-008 ✓
- **Metadata update via edit permission** — `update()` with `Permission.EDIT` check ✓
- **Cascading deletion in transaction with rollback** — `async with self._session.begin():` wraps DS + KG delete ✓
- **Mutation after deletion rejected** — `AggregateDeletedError` raised from `mark_for_deletion()` state ✓
- **Permission inheritance from workspace** — SpiceDB schema with workspace parent relations ✓
- **Direct grant support** — SpiceDB schema with direct KG-level grants ✓

