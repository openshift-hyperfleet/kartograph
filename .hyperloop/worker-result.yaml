### REQ-5: API Key Cascade Deletion — COVERED

**Implementation:**
- `tenant_service.py::delete_tenant()`: lists all API keys in tenant via
  `api_key_repository.list(tenant_id=...)`, calls `api_key.mark_for_deletion()` then
  `api_key_repository.delete(api_key)` for each.
- `api_key.mark_for_deletion()` records `APIKeyDeleted` event → outbox → SpiceDB cleanup.

**Scenario: Tenant deletion → all API keys deleted + SpiceDB cleanup** — COVERED
- `test_tenant_service.py::test_deletes_api_keys_on_tenant_deletion` — single key deleted
- `test_tenant_service.py::test_deletes_multiple_api_keys_on_tenant_deletion` — 3 keys all deleted
- `test_tenant_service.py::test_api_key_mark_for_deletion_emits_deleted_event` — `APIKeyDeleted`
  event recorded (drives SpiceDB cleanup via outbox)
- `test_tenant_service.py::test_api_key_repo_queried_by_tenant_on_deletion` — scoped to
  the correct tenant_id

