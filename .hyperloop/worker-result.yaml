### REQ-4: Concurrent Worker Safety — COVERED

**Scenario: Concurrent workers**
- Implementation: `OutboxRepository.fetch_unprocessed()` and `OutboxWorker._process_batch()` both use `.with_for_update(skip_locked=True)`.
- Unit test: `test_fetch_unprocessed_uses_for_update_skip_locked` — compiles query with PostgreSQL dialect and asserts `"SKIP LOCKED"` appears in the rendered SQL.

---

### REQ-5: Dual Delivery Mechanism — COVERED

**Scenario: Real-time notification**
- Implementation: Migration `d32ecc44581a` creates `notify_outbox_insert()` trigger firing `AFTER INSERT ON outbox` with `pg_notify('outbox_events', NEW.id::text)`; `PostgresNotifyEventSource.start()` listens via `asyncpg-listen` and invokes callback with parsed UUID; `OutboxWorker.start()` wires event source to `_process_single`.
- Unit tests: `test_notify_triggers_callback_with_uuid`, `test_callback_receives_correct_uuid_type`
- Integration test: `test_worker_processes_via_notify_not_polling` — uses `poll_interval_seconds=999`, inserts group, waits 500 ms, verifies `processed_at` set and SpiceDB relationship exists.

**Scenario: Polling fallback**
- Implementation: `OutboxWorker._poll_loop()` runs every `poll_interval_seconds` (default 30 s) calling `_process_batch()`.
- Integration test: `test_worker_processes_group_created_and_writes_to_spicedb` exercises the `_process_batch()` code path end-to-end (SpiceDB write + `processed_at` set).

---

### REQ-6: Event Fan-Out — COVERED

**Scenario: Multiple handlers registered**
- Implementation: `CompositeEventHandler.register()` appends to `_handlers_by_type[event_type]`; `handle()` iterates all handlers for the type.
- Unit test: `test_handle_fans_out_to_multiple_handlers` — registers two handlers for the same event type, asserts both are awaited.

**Scenario: Unknown event type**
- Implementation: `CompositeEventHandler.handle()` raises `UnknownEventTypeError`; `OutboxWorker._process_entries()` catches it before the generic `except Exception` clause and calls `_move_to_dlq()` immediately, bypassing all retry logic.
- Unit tests: `test_handle_raises_for_unknown_event_type`, `test_unknown_event_type_error_is_not_value_error`, `test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`, `test_retry_not_called_for_unknown_event_type`.

