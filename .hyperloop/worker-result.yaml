### 3. Referential Integrity Ordering — _sort_operations() unit test
**File:** `tests/unit/graph/infrastructure/test_mutation_applier_sort.py` (new)
**Class:** `TestSortOperationsReferentialIntegrity`

Three tests:
- `test_sort_order_define_delete_create_update`: Submits a maximally-mixed list
