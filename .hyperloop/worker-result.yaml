### Requirement 3: Idempotent Event Handlers ‚Äî COVERED

**Implementation:**
- `OutboxRepository.fetch_unprocessed()` filters `processed_at IS NULL AND failed_at IS NULL`,
  preventing re-fetch of already-processed entries.
- `SpiceDBEventHandler` uses `write_relationship()` with upsert semantics (set membership).

**Tests:**
- `test_repository.py` ‚Äî `test_already_processed_entry_excluded_from_fetch` verifies SQL
  contains `processed_at IS NULL`.
- `test_spicedb_handler.py` ‚Äî `test_duplicate_invocation_produces_identical_final_state`
  calls handler twice with FakeAuthorizationProvider (set-based); asserts identical result.
- Integration: `test_handler_invoked_twice_produces_same_spicedb_state`.

