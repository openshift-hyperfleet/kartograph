### Notes for Next Reviewer

- The `stop()` method in `worker.py` uses `task.cancel()` (non-graceful). This was present in the merge base before this task; it is NOT a regression introduced here. Alpha gained a `_shutdown_event`-based graceful stop via a different PR after the merge base was cut. The spec does not include a graceful-shutdown requirement.
- `test_worker.py` continues the pre-existing pattern of using `AsyncMock` for the `handler` and `MagicMock` for `probe`. This pre-dates this task (49 occurrences at merge base). The new `TestSpiceDBEventHandlerIdempotency` correctly uses a proper fake. If the mock pattern needs to be replaced globally, that is a separate refactor task.
