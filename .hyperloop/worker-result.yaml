### Requirement: Deterministic Entity IDs — COVERED

**Implementation:** `EntityIdGenerator.generate` uses SHA-256 of
`{tenant_id}:{normalized_type}:{slug}`, returns `{type}:{first_16_hex_chars}`.
`MutationOperation.id` field enforces `pattern=r"^[0-9a-z_]+:[0-9a-f]{16}$"`.

**Tests:**
- `TestEntityIdGenerator::test_is_deterministic`
- `TestEntityIdGenerator::test_hash_portion_length` — 16 chars
- `TestEntityIdGenerator::test_hash_portion_is_hex` — valid hex only
- `TestMutationOperation::test_id_pattern_validation` — Pydantic rejects bad format
- `TestMutationOperation::test_id_accepts_valid_pattern`

---

### Requirement: Referential Integrity Ordering — COVERED

**Implementation:** `MutationApplier._sort_operations` sorts by
`{DEFINE:0, DELETE:1, CREATE:2, UPDATE:3}` and for DELETE uses
`{edge:0, node:1}` sub-priority; for CREATE uses `{node:0, edge:1}`.

**Tests:**
- `TestSortOperationsReferentialIntegrity::test_sort_order_define_delete_create_update`
  Verifies exact 6-op sequence: DEFINE → DELETE edge → DELETE node →
  CREATE node → CREATE edge → UPDATE.
- `test_sort_preserves_all_operations`
- `test_sort_homogeneous_list_unchanged_length`

