### Notable Implementation Decisions (all correct)

- **`knowledge_graph_id` spoof prevention**: `_stamp_knowledge_graph_id()` runs before
  Pydantic validation, so the service overwrites any caller-supplied value and then
  validation enforces presence. Callers cannot inject a different graph ID.
- **Schema learning exclusion of `PLATFORM_STAMPED_PROPERTIES`**: `knowledge_graph_id`
  is correctly excluded from schema learning so it does not appear in `optional_properties`.
- **Idempotent merge via jsonb `||`**: The `_build_update_existing_query` fix correctly
  uses `(t.properties::text)::jsonb || (s.properties::text)::jsonb` so existing
  properties survive a second CREATE on the same entity.
- **No `AsyncMock` for domain/application collaborators**: `FakeAuthorizationProvider`
  is used in presentation tests. `MagicMock` appears only in infrastructure sorting
  tests where only `_sort_operations` (pure logic) is exercised — not a collaborator concern.
- **DOO observability**: All observability goes through domain probes; no direct
  `logger.*` or `print()` calls introduced.

