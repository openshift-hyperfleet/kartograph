## Implementation Summary

All requirements from the spec are implemented and verified with tests. The implementation
follows strict TDD, DDD layering, and the Domain-Oriented Observability pattern.

### Architecture

The implementation spans all DDD layers in the Management bounded context:

- **Domain:** `KnowledgeGraph` aggregate with `create()`, `update()`, `mark_for_deletion()`,
  `collect_events()`. Value objects: `KnowledgeGraphId` (ULID-based). Domain probes protocol.
- **Ports:** `IKnowledgeGraphRepository`, `DuplicateKnowledgeGraphNameError`, `UnauthorizedError`.
- **Application:** `KnowledgeGraphService` with authorization checks via `AuthorizationProvider`.
- **Infrastructure:** `KnowledgeGraphRepository` (SQLAlchemy async), `ManagementEventTranslator`
  (SpiceDB outbox ops), `ManagementEventSerializer`.
- **Presentation:** FastAPI routes mounted at `/management/workspaces/{ws_id}/knowledge-graphs`
  and `/management/knowledge-graphs/{kg_id}` per API conventions.

