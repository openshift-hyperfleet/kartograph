## Graph Mutations Implementation — task-003 (fresh attempt)

### Summary

Full implementation of the Graph bounded context mutation system per
`specs/graph/mutations.spec.md`. All 10 SHALL requirements and 18 scenarios
are implemented and verified with 217 unit tests (all pass).

### Implementation Overview

**Domain Layer** (`graph/domain/value_objects.py`):
- `MutationOperation` value object with validation for all operation types
- `TypeDefinition`, `NodeRecord`, `EdgeRecord` value objects
- `EntityType`, `MutationOperationType` enums
- System property constants: `COMMON_SYSTEM_PROPERTIES`, `NODE_SYSTEM_PROPERTIES`,
  `EDGE_SYSTEM_PROPERTIES`, `PLATFORM_STAMPED_PROPERTIES`
- `ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` for deterministic ID enforcement

**Application Layer** (`graph/application/services/graph_mutation_service.py`):
- `apply_mutations()`: Validates, DEFINE storage, schema learning
- `apply_mutations_from_jsonl()`: JSONL parsing with line-number error reporting
- `_stamp_knowledge_graph_id()`: Anti-spoofing stamping before validation
- `_discover_optional_properties()`: Schema learning for CREATE/UPDATE ops

**Infrastructure Layer**:
- `MutationApplier._sort_operations()`: DEFINE→DELETE(edge,node)→CREATE(node,edge)→UPDATE
- `AgeBulkLoadingStrategy`: PostgreSQL-based bulk mutation application with jsonb merge
- `AgeQueryBuilder`: DELETE with cascading detach, edge-only DELETE

**Presentation Layer** (`graph/presentation/routes.py`):
- `POST /graph/knowledge-graphs/{knowledge_graph_id}/mutations`: SpiceDB `edit`
  permission check, 403 on denial, knowledge_graph_id stamping, tenant routing

**Dependencies** (`graph/dependencies.py`):
- `get_tenant_graph_name()` → `tenant_{tenant_id}` for per-tenant AGE graph isolation

