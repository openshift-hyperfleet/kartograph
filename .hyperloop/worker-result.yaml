### REQ-6: Event Fan-Out — COVERED

**Implementation:**
`infrastructure/outbox/composite.py` — `CompositeEventHandler`:
- `register()` (lines 38-60): maps each event type to a list of handlers; duplicate
  registration is idempotent (line 54 guard).
- `handle()` (lines 66-91): iterates the full handler list for the event type (fan-out);
  raises `UnknownEventTypeError` (not `ValueError`) for unregistered types.

`shared_kernel/outbox/exceptions.py` — `UnknownEventTypeError(Exception)`:
typed separately so the worker can distinguish it from transient `Exception`s
via `isinstance` at lines 227-231 of `worker.py`.

**Scenario: Multiple handlers registered** — COVERED
- Test: `TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers`
  — registers two handlers for `"SharedEvent"` and asserts both `.handle()` calls made.

**Scenario: Unknown event type → immediate DLQ** — COVERED
- Tests:
  - `TestCompositeEventHandler::test_handle_raises_for_unknown_event_type`
    — asserts `UnknownEventTypeError` raised with correct `event_type` and
    `registered_types` attributes.
  - `TestCompositeEventHandler::test_unknown_event_type_error_is_not_value_error`
    — asserts `not isinstance(exc_info.value, ValueError)`, ensuring worker
    routing logic works correctly.
  - `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`
    — confirms `event_moved_to_dlq` probe called, `event_processing_failed` not called.
  - `test_unknown_event_type_dlq_even_at_zero_retries` — same check at `retry_count=0`.
  - `test_retry_not_called_for_unknown_event_type` — patches `_increment_retry` and
    asserts it is never invoked.

