#### Requirement: UPDATE Operation — COVERED

- **Scenario: Set properties:**
  - Implementation: `_execute_updates()` calls `update_properties()` which merges via jsonb
    `||`; unlisted properties are preserved.
  - Tests (integration):
    - `test_update_node_adds_properties` — UPDATE adds `email`; `name` still "Alice".
    - `test_update_node_modifies_existing_properties` — UPDATE changes `age` from 25 to 26.

- **Scenario: Remove properties:**
  - Implementation: `_execute_updates()` calls `remove_properties()` when
    `op.remove_properties` is set.
  - Test (integration): `test_update_node_removes_properties` — `temp_field` and
    `another_temp` are null after removal; `name` preserved.

- **Scenario: Schema learning on update:**
  - Implementation: `_discover_optional_properties()` processes both CREATE and UPDATE ops.
  - Test: `test_update_discovers_optional_properties` — UPDATE with `phone` and `title`
    causes both to be added to `optional_properties`.

