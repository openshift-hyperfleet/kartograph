### Observations

**Authorization relationships on creation**: The spec requires workspace and tenant links
to be established on creation. These are written to SpiceDB via the outbox translator
(`ManagementEventTranslator._translate_knowledge_graph_created`), triggered by the
`KnowledgeGraphCreated` domain event recorded in the outbox. This is the correct
outbox/transactional-messaging pattern — the relationships are guaranteed to be applied
via the reliable outbox processor, not inline.

**Atomic deletion**: The DB-level transaction (`async with session.begin()`) atomically
covers DS deletions + KG deletion. SpiceDB relationship cleanup is eventual via the
outbox but reliable. This is a standard and correct DDD/outbox design.

**DOO pattern**: `logger.*` usage is confined to probe implementations only
(`knowledge_graph_probe.py`, `knowledge_graph_service_probe.py`). Domain and application
layers call probe methods — no direct logger calls.

**Test fakes vs mocks**: Repositories and authz provider use `AsyncMock` (port fakes);
session context managers use `MagicMock`; domain aggregates are real instances via
`_make_kg()`/`_make_ds()` helpers — correct NFR pattern.

All 7 SHALL requirements and 12 Scenarios are implemented and covered by tests.

