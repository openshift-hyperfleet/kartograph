### REQ-1: API Key Creation — COVERED

**Scenario 1.1 — Successful creation**
- `iam/application/security.py`: `generate_api_key_secret()` produces `karto_` prefix;
  `hash_api_key_secret()` bcrypt work-factor 12; `extract_prefix()` returns 12-char prefix.
- `iam/application/services/api_key_service.py`: `create_api_key()` returns `(APIKey, plaintext_secret)`;
  plaintext never persisted.
- `iam/presentation/api_keys/routes.py`: returns `secret` in 201 body;
  `APIKeyResponse` model excludes `key_hash` and `secret` from all other responses.
- Tests: `test_api_key_aggregate.py`, `test_api_key_service.py` (hash/prefix), `test_api_key_routes.py` (201 + secret).

**Scenario 1.2 — Duplicate name per user**
- `iam/infrastructure/api_key_repository.py`: raises `DuplicateAPIKeyNameError` on (name, user, tenant) collision.
- `iam/presentation/api_keys/routes.py`: catches → 409.
- Tests: `test_api_key_service.py`, `test_api_key_routes.py::test_returns_409_on_duplicate_name`.

**Scenario 1.3 — Expiration bounds (1–3650 days, default 30)**
- `iam/presentation/api_keys/models.py`: `expires_in_days: int = Field(default=30, ge=1, le=3650)`.
- Tests: `test_api_key_routes.py` — 0 → 422, 3651 → 422, omitted → default 30.

