## Task-008: Knowledge Graphs — Spec Alignment Review

Branch: `hyperloop/task-008`
Spec: `specs/management/knowledge-graphs.spec.md`

All 361 unit tests pass. All SHALL/MUST requirements are implemented and tested.

---

### Requirement-by-Requirement Findings

---

#### Requirement: Knowledge Graph Creation — COVERED

**Scenario: Successful creation**

- GIVEN a user with `edit` permission on a workspace:
  `KnowledgeGraphService.create()` calls `_check_permission(…, Permission.EDIT)` on the workspace before any write.
  Test: `test_create_checks_edit_permission_on_workspace` ✓

- THEN the KG is created with a generated ULID identifier:
  `KnowledgeGraph.create()` calls `KnowledgeGraphId.generate()` → `str(ULID())`.
  Test: `test_create_generates_unique_id` ✓

- AND associated with workspace and tenant:
  `KnowledgeGraph.create(tenant_id=…, workspace_id=…)` sets both fields.
  Test: `test_create_saves_aggregate_via_repo` asserts `result.tenant_id` and `result.workspace_id` ✓

- AND authorization relationships established:
  `KnowledgeGraphCreated` event → transactional outbox → `ManagementEventTranslator._translate_knowledge_graph_created()` produces two `WriteRelationship` ops (`knowledge_graph:<id>#workspace@workspace:<ws>` and `knowledge_graph:<id>#tenant@tenant:<tenant>`).
  Test: `test_translates_to_workspace_and_tenant_relationships` in `test_translator.py` ✓

**Scenario: Duplicate name within tenant**

- `IntegrityError` on the unique constraint `uq_knowledge_graphs_tenant_name` is caught and re-raised as `DuplicateKnowledgeGraphNameError`; route returns 409.
  Tests: `test_create_raises_duplicate_on_integrity_error` (service), `test_create_knowledge_graph_returns_409_for_duplicate_name` (route) ✓

---

#### Requirement: Knowledge Graph Name Validation — COVERED

**Scenario: Valid name (1–100 chars)**

- `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`; Pydantic models also enforce `min_length=1, max_length=100`.
  Tests: `test_create_accepts_name_exactly_100_chars`, `test_create_accepts_single_char_name` ✓

**Scenario: Empty or oversized name**

- Domain raises `InvalidKnowledgeGraphNameError`; Pydantic raises 422 before the service is reached.
  Tests: `test_create_rejects_empty_name`, `test_create_rejects_name_over_100_chars` (domain); `test_create_knowledge_graph_returns_422_for_empty_name`, `test_create_knowledge_graph_returns_422_for_oversized_name` (route) ✓
  Same pattern validated for update: `test_update_knowledge_graph_returns_422_for_empty_name`, `test_update_knowledge_graph_returns_422_for_oversized_name` ✓

