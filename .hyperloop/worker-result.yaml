## Task 017: Outbox Pattern — Independent Spec-Alignment Review (2026-04-23)

Branch: `hyperloop/task-017`
Spec: `specs/shared-kernel/outbox.spec.md`
Reviewer: independent spec-alignment pass

---

### Requirement: Transactional Event Storage

#### Scenario: Successful write
- Status: COVERED
- Code: `src/api/infrastructure/outbox/repository.py:76` — `OutboxRepository.append()` calls `session.add()` only; never calls `session.commit()`. The session is shared with the aggregate repository, so both writes commit or roll back together.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit` — asserts `session.commit` is never called by the repository.
- Test (integration): `src/api/tests/integration/iam/test_outbox_consistency.py::TestAtomicityGuarantees::test_outbox_entry_created_in_same_transaction_as_group` — verifies both group and outbox row are visible after a single `async_session.begin()` commit.
- Notes: The design is correct — the repository is context-agnostic, accepts pre-serialized payloads, and leaves transaction ownership entirely to the caller.

#### Scenario: Transaction rollback
- Status: COVERED
- Code: Same session-sharing design — if the caller rolls back, session.add() is undone automatically.
- Test (integration): `src/api/tests/integration/iam/test_outbox_consistency.py::TestAtomicityGuarantees::test_rollback_removes_both_group_and_outbox_entry` — forces rollback via exception inside `async_session.begin()` and verifies neither the group nor outbox entry persists.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries` — validates that the repository never commits independently.

