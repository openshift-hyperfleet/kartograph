### Requirement: Event Fan-Out — COVERED

**Scenario: Multiple handlers registered**
- Implementation: `CompositeEventHandler.register()` appends each handler to a
  `dict[str, list[EventHandler]]`; `handle()` iterates all registered handlers for the
  event type in order.
- Unit test: `test_handle_fans_out_to_multiple_handlers` — two handlers registered for
  `"SharedEvent"`; both `handle` mocks asserted called exactly once.

**Scenario: Unknown event type**
- Implementation: `CompositeEventHandler.handle()` raises `UnknownEventTypeError` (not
  `ValueError`) when no handler is registered. `OutboxWorker._process_entries()` catches
  `UnknownEventTypeError` *before* the generic `except Exception` block and immediately
  calls `_move_to_dlq()` without incrementing `retry_count`.
- Unit tests:
  - `test_handle_raises_for_unknown_event_type` — asserts `UnknownEventTypeError` raised with
    correct `event_type` attribute.
  - `test_unknown_event_type_error_is_not_value_error` — asserts it is not a `ValueError`
    (so the worker can distinguish permanent from transient).
  - `test_unknown_event_type_immediately_moves_to_dlq` — `max_retries=5`, `retry_count=0`;
    asserts `event_moved_to_dlq` called, `event_processing_failed` not called.
  - `test_unknown_event_type_dlq_even_at_zero_retries` — same check with retry_count=0.
  - `test_retry_not_called_for_unknown_event_type` — patches `_increment_retry` and asserts
    it is never awaited.

