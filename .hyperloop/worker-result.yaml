## Items Required to Pass

1. **Req 1B – Add a test asserting raw query is absent from log output.**
   The probe method must be tested to confirm the raw `query` argument is
   never emitted to the underlying logger. Suggested approach: spy on the
   `DefaultQueryServiceProbe.cypher_query_rejected` call and assert the raw
   query string does not appear in any `logger.*` invocation within that method.

2. **Req 2B / Req 4B – Tighten integration test assertion for timeout
   error type.** Change:
   ```python
   assert result.error_type in ["timeout", "execution_error"]
   ```
   to:
   ```python
   assert result.error_type == "timeout"
   ```
   in `test_execute_cypher_query_timeout_error`.
