  - `test_update_rejects_empty_name`, `test_update_rejects_name_over_100_chars` (domain update path)
  - `test_post_init_rejects_empty_name`, `test_post_init_rejects_name_over_100_chars` (validation)
  - `test_create_knowledge_graph_returns_422_for_empty_name`,
    `test_create_knowledge_graph_returns_422_for_oversized_name` (route)
  - `test_update_knowledge_graph_returns_422_for_empty_name`,
    `test_update_knowledge_graph_returns_422_for_oversized_name` (route)

#### Requirement: Knowledge Graph Retrieval

**Scenario: Authorized retrieval**
- Code: `KnowledgeGraphService.get()` fetches by ID, checks tenant, checks `Permission.VIEW`.
  Returns aggregate if all checks pass.
- Tests:
