  ### Requirement 1: Per-Tenant Graph Isolation — COVERED

  Implementation:
  - `/src/api/graph/dependencies.py`: `get_tenant_graph_name()` derives
    `"tenant_{tenant_id}"` from `current_user.tenant_id.value` and passes it
    as `graph_name` to `AgeGraphClient.__init__()`.
  - `AgeGraphClient` uses `self._graph_name` for all Cypher and SQL operations,
    so all mutations execute against the tenant-specific AGE graph exclusively.

  Tests:
  - `tests/unit/graph/presentation/test_routes.py::TestTenantGraphRouting`
    — two tests verify `get_tenant_graph_name()` returns `"tenant_t1"` and
    `"tenant_my-org-tenant-123"` for the respective tenant IDs.

  ### Requirement 2: KnowledgeGraph Scoping — COVERED

  Implementation:
  - `routes.py::apply_kg_mutations()` calls `authz.check_permission()` for
    `Permission.EDIT` on `ResourceType.KNOWLEDGE_GRAPH` before any mutation
    executes. Returns 403 if denied.
  - `graph_mutation_service.py::_stamp_knowledge_graph_id()` overwrites any
    caller-supplied `knowledge_graph_id` in `set_properties` on CREATE and
    UPDATE ops before validation or execution. DEFINE and DELETE ops are
    unaffected (they have no `set_properties`).

  Tests:
  - `test_routes.py::TestKnowledgeGraphScopedMutationsRoute` — 5 tests cover:
    200 with permission, 403 without, correct resource/permission args to SpiceDB,
    `knowledge_graph_id` forwarded to service, 403 detail shape.
  - `test_mutation_service.py::TestKnowledgeGraphIdStamping` — 6 tests cover:
    stamping on CREATE, overwriting spoofed value, stamping on UPDATE, no stamp
    on DELETE, no stamp when param omitted, stamp propagated through JSONL path.

