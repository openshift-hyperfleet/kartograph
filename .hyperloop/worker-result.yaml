#### Requirement: Mandatory System Properties — COVERED

- **Scenario: Node system properties:**
  - Implementation: `MutationOperation.validate_operation()` checks `data_source_id`,
    `source_path`, `slug`, and `knowledge_graph_id` in `set_properties` for CREATE nodes.
  - Tests: `test_create_requires_data_source_id`, `test_create_requires_source_path`,
    `test_create_node_requires_slug`, `test_create_node_requires_knowledge_graph_id`.

- **Scenario: Edge system properties:**
  - Implementation: `validate_operation()` checks `data_source_id`, `source_path`,
    `knowledge_graph_id` for CREATE edges; does NOT require `slug`.
  - Tests: `test_create_edge_requires_knowledge_graph_id`,
    `test_edge_does_not_require_slug` (in `test_create_define_same_batch_validation.py`).

---

#### Requirement: Deterministic Entity IDs — COVERED

- **Scenario: ID format:**
  - Implementation: `ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` enforced on
    `MutationOperation.id` by Pydantic field pattern. The spec note about determinism
    ("same entity always produces the same ID") is a concern of the Extraction context;
    the Graph context validates incoming IDs match this pattern.
  - Tests: `test_id_pattern_validation` — ValidationError raised on `invalid_id_format`.
    `test_id_accepts_valid_pattern` — `person:abc123def456789a` accepted.
    `TestStableAdvisoryLocks` in `test_bulk_loading.py` verifies SHA-256-based hashing
    is stable (used for advisory lock keys).

---

#### Requirement: Referential Integrity Ordering — COVERED

- **Scenario: Operation ordering:**
  - Implementation: `MutationApplier._sort_operations()` applies sort key:
    DEFINE=0, DELETE=1 (EDGE=0 before NODE=1), CREATE=2 (NODE=0 before EDGE=1), UPDATE=3.
  - Test: `test_mutation_applier_sort.py::TestSortOperationsReferentialIntegrity::
    test_sort_order_define_delete_create_update` — 6-op mixed batch asserts exact positions:
    pos0=DEFINE, pos1=DELETE-edge, pos2=DELETE-node, pos3=CREATE-node, pos4=CREATE-edge,
    pos5=UPDATE.

