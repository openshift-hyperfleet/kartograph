## Task-008: Knowledge Graphs — Implementation Complete

All requirements from `specs/management/knowledge-graphs.spec.md` are implemented
and verified. Unit test suite: **2060 passed, 0 failed**.

---

### Requirements Coverage

**1. Knowledge Graph Creation**
- `KnowledgeGraph.create()` factory generates ULID, sets tenant+workspace, emits
  `KnowledgeGraphCreated` event with all required fields.
- `KnowledgeGraphService.create()` checks EDIT permission on workspace before
  creating; catches `IntegrityError` → `DuplicateKnowledgeGraphNameError` (409).
- Authorization relationships (workspace + tenant) written via outbox translator
  on `KnowledgeGraphCreated` event.

**2. Name Validation**
- `_validate_name()` enforces 1–100 characters; raises
  `InvalidKnowledgeGraphNameError` for violations.
- Pydantic models enforce same constraint at HTTP layer (422).

**3. Retrieval**
- `get()` returns `None` for both missing and unauthorized KGs (no existence
  leakage). Returns 404 in both cases from the route.

**4. Listing**
- `list_for_workspace()` checks VIEW on workspace, reads SpiceDB relationships
  to discover KG IDs, filters by tenant.
- `list_all()` returns only KGs the user can VIEW in the tenant.

**5. Update**
- `update()` checks EDIT permission on the KG; validates name; saves via repo.
- `AggregateDeletedError` raised when updating a deleted KG.

**6. Deletion (Atomic Cascade)**
- `delete()` checks MANAGE permission. Within a single `session.begin()`
  transaction: deletes encrypted credentials, cascade-deletes all data sources,
  marks KG for deletion, deletes KG record.
- `KnowledgeGraphDeleted` event includes `workspace_id` for full SpiceDB cleanup
  (workspace relation + tenant relation + all direct grants via filter deletes).
- Rollback test verifies KG is NOT deleted if a data source deletion fails.

**7. Permission Inheritance**
- SpiceDB schema: `view = admin + editor + viewer + workspace->view`,
  `edit = admin + editor + workspace->edit`, `manage = admin + workspace->manage`.
- Direct admin grant satisfies all three permissions regardless of workspace role.

