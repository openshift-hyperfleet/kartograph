### Spec Coverage

#### 1. Per-Tenant Graph Isolation — COVERED
`graph/dependencies.py` — `get_tenant_graph_name()` returns `f"tenant_{current_user.tenant_id.value}"`.
`get_age_graph_client()` passes this into `AgeGraphClient(graph_name=graph_name)`.
Tests: `TestTenantGraphRouting` verifies `tenant_t1` format and full tenant ID usage.

#### 2. KnowledgeGraph Scoping (auth + ID stamping) — COVERED
`graph/presentation/routes.py` — `apply_kg_mutations()` calls `check_permission(EDIT)`,
returns HTTP 403 if denied. `graph/application/services/graph_mutation_service.py` —
`_stamp_knowledge_graph_id()` overwrites any caller-supplied value on CREATE/UPDATE ops.
`PLATFORM_STAMPED_PROPERTIES` excludes `knowledge_graph_id` from schema learning.
Tests: `TestKnowledgeGraphScopedMutationsRoute`, `TestKnowledgeGraphIdStamping` (7 tests).

#### 3. Mutation Log Format (JSONL) — COVERED
`apply_mutations_from_jsonl()` parses line-by-line, skips blank/whitespace lines, reports
errors with line number and content preview.
Tests: `TestGraphMutationServiceApplyFromJSONL` — valid JSONL, empty, whitespace, invalid JSON.

#### 4. DEFINE Operation — COVERED
System properties auto-added per entity type: nodes get `{data_source_id, source_path, slug}`;
edges get `{data_source_id, source_path}`. Empty optional_properties default.
Tests: `test_apply_mutations_stores_define_operations`, `test_apply_define_edge_type_adds_edge_system_properties`.

#### 5. CREATE Operation (all 6 scenarios) — COVERED
- Idempotent merge via JSONB `||` operator (infrastructure)
- Type definition lookup (batch + repository)
- Required property validation
- Edge start_id/end_id requirement
- Schema learning for extra properties
- `knowledge_graph_id` stamped by service, not caller
Tests: 9 CREATE-specific tests across mutation_service, create_define, and infrastructure tests.

#### 6. UPDATE Operation — COVERED
`set_properties` (merge) and `remove_properties` (removal) both supported.
Schema learning triggers on UPDATE. Unlisted properties preserved.
Tests: `test_update_discovers_optional_properties`, domain value object UPDATE tests.

#### 7. DELETE Operation — COVERED
`delete_node_with_detach()` — cascading DETACH DELETE for nodes.
`delete_edge()` — edge-only removal.
Ordering ensures edges deleted before nodes.
Tests: query builder delete tests, mutation applier sort tests.

#### 8. Mandatory System Properties — COVERED
`MutationOperation.validate_operation()` enforces `data_source_id`, `source_path`,
`knowledge_graph_id` for all CREATE; additionally `slug` for node CREATE.
Tests: 5 dedicated system property validation tests in domain value objects.

#### 9. Deterministic Entity IDs — COVERED
`ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` — enforced via Pydantic field pattern.
Tests: `test_id_pattern_validation()`, `test_id_accepts_valid_pattern()`.
`GraphExtractionReadOnlyRepository.generate_id()` produces stable IDs from slug + type.

#### 10. Referential Integrity Ordering — COVERED
`MutationApplier._sort_operations()`: DEFINE=0 → DELETE(edge=0, node=1) → CREATE(node=0, edge=1) → UPDATE=3.
Tests: `TestSortOperationsReferentialIntegrity` with exact position assertions.

