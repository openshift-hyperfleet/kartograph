### Requirement: Idempotent Event Handlers

#### Scenario: Duplicate delivery
- Status: COVERED
- Code: SpiceDB handler at `src/api/infrastructure/outbox/spicedb_handler.py:44` delegates to `authz.write_relationship()` which has upsert semantics (write same tuple twice = same state). The fetch query filters `processed_at IS NULL`, so once processed, the entry is invisible to the polling loop.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerIdempotency::test_already_processed_entry_excluded_from_fetch` — inspects compiled SQL to assert `processed_at IS NULL` filter is present.
- Test (integration): `src/api/tests/integration/iam/test_outbox_consistency.py::TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state` — explicitly simulates crash-before-mark-processed by calling `spicedb_event_handler.handle()` directly, then running `_process_batch()` again. Asserts `processed_at` is set and SpiceDB relationship exists exactly once (idempotent upsert).

