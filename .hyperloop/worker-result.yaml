### Requirement 3: Idempotent Event Handlers — COVERED

**Implementation:**
- `infrastructure/outbox/repository.py` `fetch_unprocessed()` — WHERE clause
  filters `processed_at IS NULL` (line 93–94); processed entries are never
  re-fetched (infrastructure-level guard).
- `infrastructure/outbox/spicedb_handler.py` — SpiceDB relationship writes are
  set-based (upsert semantics); writing the same tuple twice is idempotent.

**Scenarios:**

| Scenario | Test | File |
|---|---|---|
