### 3. Idempotent Event Handlers — COVERED

**Implementation:**
- `src/api/infrastructure/outbox/spicedb_handler.py` — `SpiceDBEventHandler` delegates to
  SpiceDB's upsert (`write_relationship`) semantics. Writing the same tuple twice is a no-op.
- Repository `fetch_unprocessed` filters `processed_at IS NULL`, so a successfully-processed
  entry cannot be re-fetched by the worker.

**Scenario: Duplicate delivery** — COVERED
- Unit: `test_spicedb_handler.py::TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state`
  — uses `FakeAuthorizationProvider` with set-based storage (not `MagicMock`). Invokes
  handler twice; asserts relationship set is identical after both invocations.
- Integration: `test_outbox_consistency.py::TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state`
  — calls handler directly first (simulating crash before `mark_processed`), then runs
  `_process_batch()`; verifies `processed_at` is set and SpiceDB state is unchanged.
- Unit: `test_worker.py::TestOutboxWorkerIdempotency::test_already_processed_entry_excluded_from_fetch`
  — verifies SQL query contains `processed_at IS NULL`.

---

### 4. Concurrent Worker Safety — COVERED

**Implementation:**
- `repository.py::fetch_unprocessed` — `select(...).with_for_update(skip_locked=True)`
- `worker.py::_process_batch` — same `with_for_update(skip_locked=True)` in the batch query
- `worker.py::_process_single` (NOTIFY path) — same lock applied before processing

**Scenario: Concurrent workers** — COVERED
- Unit: `test_worker.py::TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  — compiles the SQLAlchemy query with the PostgreSQL dialect and asserts `SKIP LOCKED`
  appears in the rendered SQL.
- Unit: `test_worker.py::TestOutboxWorkerIdempotency::test_failed_entries_excluded_from_fetch`
  — verifies `failed_at IS NULL` filter (DLQ entries not re-fetched).

