### What was implemented

This branch adds test coverage to close three spec gaps identified in the prior
spec-alignment review:

**FAIL-1 (REQ-1 expiration):** `test_uses_default_expires_in_days_of_30` in
`test_api_key_routes.py` — asserts that omitting `expires_in_days` from the
creation request body results in the service being called with `expires_in_days=30`.

**FAIL-2 (REQ-2 expired key):** `test_returns_401_for_expired_api_key` in
`test_api_key_auth.py` (integration) — uses a DB-insertion fixture to bypass
the 1-day route minimum and create a truly expired key, then asserts the
authentication path rejects it with 401 + `WWW-Authenticate: Bearer, API-Key`.

**FAIL-3 (REQ-4 revoked key remains visible):** `test_revoked_key_remains_visible_in_listing`
in `test_api_key_auth.py` (integration) — chains create → process-outbox → revoke
→ list and asserts the revoked key is still present with `is_revoked=True`.

**REQ-5 (cascade deletion):** 6 unit tests in `TestDeleteTenant`:
- `test_deletes_api_keys_on_tenant_deletion`
- `test_deletes_multiple_api_keys_on_tenant_deletion`
- `test_api_key_mark_for_deletion_emits_deleted_event`
- `test_api_key_repo_queried_by_tenant_on_deletion`
- `test_cascade_deletion_probe_reports_api_key_count`
- `test_api_keys_deleted_before_tenant_on_cascade`

All spec requirements from `specs/iam/api-keys.spec.md` are covered.
