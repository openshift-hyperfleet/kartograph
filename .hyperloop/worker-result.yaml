### Requirement 2: Event Processing ‚Äî COVERED

**Implementation:**
- `src/api/infrastructure/outbox/worker.py` ‚Äî `OutboxWorker` with `_process_batch()`,
  `_process_single()`, `_handle_processing_failure()`, `_increment_retry()`, `_move_to_dlq()`.
- Retry count incremented on transient failure; `failed_at` set on permanent failure.
- `UnknownEventTypeError` is treated as a permanent (non-retryable) failure.

**Tests:**
