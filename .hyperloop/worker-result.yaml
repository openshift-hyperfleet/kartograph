## Spec Requirement Coverage (Cascade Deletion)

**Scenario: Tenant deletion**
- GIVEN a tenant with active API keys → ✅ `test_deletes_api_keys_on_tenant_deletion`
- WHEN the tenant is deleted → ✅ (all tests call `delete_tenant`)
- THEN all API keys in the tenant are deleted → ✅ `test_deletes_multiple_api_keys_on_tenant_deletion`
- AND authorization relationships are cleaned up → ✅ `test_api_key_mark_for_deletion_emits_deleted_event`
  (verifies `APIKeyDeleted` event is on the key passed to `repo.delete()`, which drives
  SpiceDB cleanup via the outbox)

Additional coverage: tenant scoping (`test_api_key_repo_queried_by_tenant_on_deletion`),
DOO probe fires with correct count (`test_cascade_deletion_probe_reports_api_key_count`),
ordering enforced (`test_api_keys_deleted_before_tenant_on_cascade`).
