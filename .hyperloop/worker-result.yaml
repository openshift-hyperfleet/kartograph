  ### auth-status-codes Check Note

  The `.hyperloop/checks/check-auth-status-codes.sh` exits 1 because it finds
  403 assertions in IAM integration tests for workspace and group operations.
  These are LEGITIMATE 403s: the tests verify that a user who HAS VIEW access
  to a resource (editor or member role) but LACKS MANAGE permission correctly
  receives 403 on update/delete operations — not 404, because the resource IS
  visible to them. This is consistent with the workspace unit tests and the
  IAM authorization spec. The "no distinction between unauthorized and missing"
  pattern (404) applies specifically to resource retrieval, not to
  permission-denied on known resources.

