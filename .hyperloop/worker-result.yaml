## Task 017: Outbox Pattern — Spec Alignment Review (2026-04-23)

Branch: `hyperloop/task-017`
Spec: `specs/shared-kernel/outbox.spec.md`
Reviewer: spec-alignment-reviewer (independent, read-only)

---

## Requirement Coverage

### 1. Transactional Event Storage — COVERED

**Implementation:**
- `src/api/infrastructure/outbox/repository.py` — `OutboxRepository.append()` calls
  `session.add()` only; never calls `session.commit()`. The docstring explicitly states
  "The calling service owns the transaction boundary."
- The `OutboxRepository` is constructed with a shared `AsyncSession`, ensuring outbox
  writes join the same transaction as the aggregate change.

**Scenario: Successful write** — COVERED
- Unit: `test_worker.py::TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`
  — asserts `session.commit` is NOT called and `session.add` IS called once.
- Integration: `test_outbox_consistency.py::TestAtomicityGuarantees::test_outbox_entry_created_in_same_transaction_as_group`
  — verifies both group row and outbox entry exist after a single committed transaction.

**Scenario: Transaction rollback** — COVERED
- Integration: `test_outbox_consistency.py::TestAtomicityGuarantees::test_rollback_removes_both_group_and_outbox_entry`
  — forces a rollback; asserts neither group nor outbox entry survives.

---

### 2. Event Processing — COVERED

**Implementation:**
- `src/api/infrastructure/outbox/worker.py` — `OutboxWorker._process_batch()` fetches
  with `FOR UPDATE SKIP LOCKED`, delegates to `_process_entries()`, then commits.
- `_mark_processed()` sets `processed_at` on success.
- `_increment_retry()` increments `retry_count` and records `last_error` on transient failure.
- `_move_to_dlq()` sets `failed_at` when `new_retry_count >= self._max_retries`.
- `src/api/infrastructure/migrations/versions/a1b2c3d4e5f6_add_outbox_retry_columns.py`
  — adds `retry_count`, `last_error`, and `failed_at` columns.

**Scenario: Normal processing** — COVERED
- Unit: `test_worker.py::TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries`
- Unit: `test_worker.py::TestOutboxWorkerProcessBatch::test_marks_entry_as_processed`
- Integration: `test_outbox_consistency.py::TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb`
  — verifies `processed_at IS NOT NULL` and SpiceDB relationship written.

**Scenario: Transient failure** — COVERED
- Unit: `test_worker.py::TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count`
  — `RuntimeError("SpiceDB unreachable")` → `probe.event_processing_failed` called,
    `probe.event_moved_to_dlq` NOT called.
- Unit: `test_worker.py::TestOutboxWorkerProbeIntegration::test_calls_event_processing_failed_on_error`

**Scenario: Permanent failure (dead letter)** — COVERED
- Unit: `test_worker.py::TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq`
  — entry with `retry_count=2` and `max_retries=3` goes to DLQ on next failure.
  `probe.event_moved_to_dlq` called; `probe.event_processing_failed` NOT called.

