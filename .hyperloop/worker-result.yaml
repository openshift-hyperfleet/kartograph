  ### Requirement 7: DELETE Operation — COVERED

  Implementation:
  - Node DELETE: `AgeQueryBuilder.delete_node_with_detach()` executes two SQL
    queries — first deletes connected edges (matching `start_id` or `end_id`),
    then deletes the node. Cascading detach delete.
  - Edge DELETE: `AgeQueryBuilder.delete_edge()` deletes only the specified edge.
  - `AgeBulkLoadingStrategy.apply_batch()` executes delete_edges before delete_nodes
    (independent of `_sort_operations()` in MutationApplier).

  Tests:
  - `test_age_query_builder_deletes.py::TestDeleteNodeWithDetach` — 8 tests:
    scalar subquery (not ANY), two queries, edge/node params, start_id/end_id
    referenced, correct graph name, rowcount return.
  - `test_age_query_builder_deletes.py::TestDeleteEdge` — 6 tests: single query,
    scalar subquery, rowcount, graph name.
  - `test_mutation_applier_sort.py` — edge delete before node delete ordering.

