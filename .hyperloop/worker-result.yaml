## Minor Observations (non-blocking)

1. `list_all` route (`GET /management/knowledge-graphs`) is an addition beyond the spec
   requirements (spec only mentions listing within a workspace). It is a frontend
   convenience endpoint and does not contradict the spec.

2. `list_all()` service method calls
   `self._probe.knowledge_graphs_listed(workspace_id=self._scope_to_tenant, ...)` —
   semantically passes tenant_id as workspace_id parameter. Not a bug; the probe
   parameter name is inherited from the workspace-scoped listing signature.

3. `list_all_knowledge_graphs` route uses bare `except Exception:` without first
   re-raising `HTTPException`. Functionally correct (service doesn't raise
   HTTPException; deps run outside the try block), but inconsistent with other
   routes in the file that explicitly re-raise HTTPException first.

None of the above warrants a FAIL. All numbered verification checks pass.
