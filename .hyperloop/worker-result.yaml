#### REQ-5 — Dual Delivery Mechanism

**Implementation:**
`OutboxWorker.start()` always creates a `_poll_loop()` asyncio task (default interval 30 s) and
optionally starts the injected `event_source` as a second task. The poll loop calls
`_process_batch()`. `PostgresNotifyEventSource` uses `asyncpg-listen` to receive NOTIFY payloads
and invokes `_process_single(entry_id)`.

**Scenario: Real-time notification** — COVERED
- Unit: `TestPostgresNotifyEventSourceNotify` suite — 3 tests verify NOTIFY payloads trigger the
  callback with the correct `UUID`; `test_timeout_notification_is_ignored` confirms `Timeout`
  objects are silently skipped.
- Integration: `TestOutboxWorkerNotifyProcessing.test_worker_processes_via_notify_not_polling` —
  starts a real `PostgresNotifyEventSource` with `poll_interval_seconds=999`; creates a group
  (triggers INSERT → NOTIFY); after 500 ms asserts `processed_at is not None` and SpiceDB
  relationship exists, proving sub-second processing via NOTIFY.

**Scenario: Polling fallback** — COVERED
- Code: `_poll_loop()` calls `_process_batch()` every `poll_interval_seconds` (default 30 s,
  validated positive).
- Integration: `test_worker_processes_group_created_and_writes_to_spicedb` and
  `test_worker_processes_member_added_and_writes_to_spicedb` directly exercise `_process_batch()`
  (the exact mechanism the polling loop calls), confirming missed entries are discovered and
  processed.

