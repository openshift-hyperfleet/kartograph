### Requirement: Knowledge Graph Creation — COVERED

**Implementation:**
- `KnowledgeGraphService.create()` in `management/application/services/knowledge_graph_service.py`
- Checks `EDIT` permission on the workspace via `authz.check_permission()`
- Calls `KnowledgeGraph.create()` which generates a ULID via `KnowledgeGraphId.generate()`
- Associates the KG with the specified workspace and tenant
- Authorization relationships (workspace link + tenant link) established via the transactional
  outbox pattern: `KnowledgeGraphCreated` event → `ManagementEventTranslator._translate_knowledge_graph_created()` → two `WriteRelationship` SpiceDB operations

