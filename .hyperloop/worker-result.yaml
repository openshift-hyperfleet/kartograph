## Implementation Summary

The transactional outbox pattern is fully implemented and all 2187 unit tests pass.

### Architecture

The implementation follows DDD principles with clean layer separation:

- **`shared_kernel/outbox/`** — Protocol interfaces, value objects, operations, exceptions, observability probes (no infrastructure imports)
- **`infrastructure/outbox/`** — Concrete implementations: `OutboxModel`, `OutboxRepository`, `OutboxWorker`, `CompositeEventHandler`, `SpiceDBEventHandler`, `PostgresNotifyEventSource`
- **`iam/infrastructure/outbox/`** — IAM-specific `IAMEventSerializer` and `IAMEventTranslator`
- **`management/infrastructure/outbox/`** — Management-specific serializer and translator

All architecture boundary tests pass (40/40).

