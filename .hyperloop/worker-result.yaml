### Requirement: Knowledge Graph Update — COVERED

- `KnowledgeGraphService.update()` checks EDIT permission on the KG resource (not workspace),
  calls `kg.update()`, saves via repo. `IntegrityError` → `DuplicateKnowledgeGraphNameError`.

**Scenario: Update name and description — COVERED**
- Tests: `test_update_checks_edit_permission_on_kg`, `test_update_calls_aggregate_update_and_saves`,
  `test_update_changes_name_and_description`, `test_update_knowledge_graph_returns_200`.

