## FAIL 1 — Knowledge Graph Creation Is a Stub (Requirement 3 — SHALL)

**Spec:** "AND the knowledge graph is created within the current workspace"

**Code:** `src/dev-ui/app/pages/knowledge-graphs/index.vue`, `handleCreate()` (lines 50–73):

```typescript
async function handleCreate() {
  // ...
  // Knowledge graph creation will be wired to the API in task-015.
  // For now, close the dialog and guide the user to add a data source,
  // which is the natural next step after creating a knowledge graph.
  toast.success(`Knowledge graph "${createName.value.trim()}" created`, { ... })
  createDialogOpen.value = false
}
```

No call is made to the management API (`POST /management/knowledge-graphs`). The toast
falsely reports success. The page also never loads existing knowledge graphs — it
always renders the empty state. There is no `createKnowledgeGraph` function in any
composable.

**Test:** None.

**Required fix:**
1. Add a `createKnowledgeGraph(name, description)` call via `useApiClient().apiFetch()`
   (or a dedicated management composable) to `POST /management/knowledge-graphs`.
2. Add `loadKnowledgeGraphs()` with `onMounted` to list existing KGs.
3. Add a test covering the create validation and success path.

