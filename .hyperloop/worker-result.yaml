Addressed both FAIL items identified in the spec alignment review.

## Fix 1 — Req 1B: Automated test asserting raw query is absent from log output

Added `TestDefaultQueryServiceProbe` class to `tests/unit/query/test_application_services.py`
with three tests:

- `test_cypher_query_rejected_does_not_log_raw_query`: Injects a mock logger
  into `DefaultQueryServiceProbe`, calls `cypher_query_rejected` with a known
  raw query string, then asserts the raw query does NOT appear in any positional
  or keyword argument passed to `logger.warning`. Enforces the redaction contract
  as an automated assertion rather than by code convention only.
- `test_cypher_query_rejected_logs_correlation_id`: Confirms correlation_id IS
  present in the log call (operators can cross-reference errors).
- `test_cypher_query_rejected_logs_reason`: Confirms reason IS present in the
  log call.

## Fix 2 — Req 2B / Req 4B: Strict timeout error type assertion

Changed the loose assertion in `test_execute_cypher_query_timeout_error` from:

    assert result.error_type in ["timeout", "execution_error"]

to the strict form required by the spec:

    assert result.error_type == "timeout"

This ensures a regression where the repository misclassifies a PostgreSQL
`statement_timeout` cancellation as `QueryExecutionError` instead of
`QueryTimeoutError` would be caught immediately.

