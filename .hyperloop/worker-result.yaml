### Implementation Summary

All work was previously committed to this branch. This is a fresh verification
confirming correctness after the branch was reset due to prior merge conflicts.

**REQ-1: API Key Creation** ‚Äî COVERED
- `security.py`: `generate_api_key_secret()` ‚Üí `karto_`-prefixed secret, `extract_prefix()` ‚Üí 12-char prefix, `hash_api_key_secret()` ‚Üí bcrypt
- `api_key_service.py::create_api_key()`: checks CREATE_API_KEY permission, generates secret, hashes it, stores prefix
- `CreateAPIKeyRequest`: `name` (min_length=1, max_length=255), `expires_in_days` (ge=1, le=3650, default=30)
- `APIKeyCreatedResponse` returns secret once; `APIKeyResponse` never includes it

**REQ-2: API Key Authentication** ‚Äî COVERED
- `iam/dependencies/user.py::_authenticate()`: JWT first (Bearer header), then X-API-Key
- `api_key_service.py::validate_and_get_key()`: prefix lookup ‚Üí bcrypt verification ‚Üí `is_valid()` check ‚Üí `record_usage()`
- Prefix collision: `DefaultAPIKeyRepositoryProbe.api_key_prefix_collision` calls `logger.error()`

**REQ-3: API Key Listing** ‚Äî COVERED
- `list_api_keys()`: SpiceDB `lookup_resources(VIEW)` scopes results; optional `created_by_user_id` filter
- `APIKeyResponse`: name, prefix, created_at, expires_at, last_used_at, is_revoked ‚Äî no secret or hash

**REQ-4: API Key Revocation** ‚Äî COVERED
- `revoke_api_key()`: loads tenant-scoped key, checks SpiceDB REVOKE permission, calls `api_key.revoke()`
- SpiceDB: `api_key#revoke = owner + tenant->administrate`
- `api_key.revoke()`: sets `is_revoked = True`; raises `APIKeyAlreadyRevokedError` if already revoked

**REQ-5: Cascade Deletion** ‚Äî COVERED
- `tenant_service.py::delete_tenant()`: lists all API keys ‚Üí `mark_for_deletion()` + `delete()` each
- `APIKeyDeleted` event ‚Üí outbox ‚Üí SpiceDB cleanup (owner + tenant relationships)

**REQ-6: Name Validation** ‚Äî COVERED
- Pydantic `min_length=1, max_length=255` on `CreateAPIKeyRequest.name`

