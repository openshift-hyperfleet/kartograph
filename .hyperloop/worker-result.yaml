## Requirement Coverage

### REQ-1: Knowledge Graph Creation (SHALL)

#### Scenario A: Successful creation
- COVERED
- Implementation: `management/domain/aggregates/knowledge_graph.py::KnowledgeGraph.create()` generates ULID via `KnowledgeGraphId.generate()`, sets `tenant_id` and `workspace_id`. `management/application/services/knowledge_graph_service.py::create()` checks EDIT permission on workspace before creating, saves via repository. `management/infrastructure/outbox/translator.py::_translate_knowledge_graph_created()` writes `workspace` and `tenant` SpiceDB relationships.
- Tests: `tests/unit/management/test_knowledge_graph.py::TestKnowledgeGraphCreate::test_create_generates_unique_id`, `test_create_sets_all_fields`, `test_create_emits_knowledge_graph_created_event`; `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceCreate::test_create_checks_edit_permission_on_workspace`, `test_create_saves_aggregate_via_repo`; `tests/unit/management/presentation/test_knowledge_graph_routes.py::TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_201`

#### Scenario B: Duplicate name within tenant
- COVERED
- Implementation: `management/infrastructure/models/knowledge_graph.py` has `UniqueConstraint(tenant_id, name)` (`uq_knowledge_graphs_tenant_name`). Repository's `save()` catches `IntegrityError` on that constraint and raises `DuplicateKnowledgeGraphNameError`. Routes return 409.
- Tests: `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceCreate::test_create_raises_duplicate_on_integrity_error`; `tests/integration/management/test_knowledge_graph_repository.py::TestKnowledgeGraphUniqueness::test_duplicate_name_in_same_tenant_raises_error`; `tests/unit/management/presentation/test_knowledge_graph_routes.py::TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_409_for_duplicate_name`

