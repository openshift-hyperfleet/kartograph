### Requirement: Event Processing — COVERED

**Code:**
- `infrastructure/outbox/worker.py` — `_process_entries()` calls `handler.handle()`, marks
  processed on success; `_handle_processing_failure()` increments retry or moves to DLQ;
  `_move_to_dlq()` sets `failed_at`. `_poll_loop()` runs polling fallback.

