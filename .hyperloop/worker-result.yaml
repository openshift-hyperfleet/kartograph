  ### Requirement 5: CREATE Operation — COVERED

  Implementation:
  - Idempotent merge: `AgeBulkLoadingStrategy._execute_creates()` uses
    `AgeQueryBuilder.execute_label_upsert()` which performs INSERT … ON CONFLICT
    UPDATE (merge semantics preserving existing properties).
  - Type definition validation: `apply_mutations()` checks defines-in-batch set
    and `type_definition_repository.get()`; rejects with error if neither found.
  - Required property validation: checks `set(type_def.required_properties)` vs
    `set(op.set_properties.keys())`; rejects with error listing missing properties.
  - Schema learning: `_discover_optional_properties()` called after successful apply.
  - Edge CREATE requires `start_id` and `end_id` (enforced by `validate_operation()`).

  Tests:
  - `test_mutation_service.py`: `test_rejects_create_without_define_in_batch`,
    `test_accepts_create_with_define_in_batch`,
    `test_accepts_create_with_define_in_repository`,
    `test_rejects_create_missing_required_properties`,
    `test_accepts_create_with_all_required_properties`.
  - `test_schema_learning.py`: schema learning for CREATE.
  - `test_create_define_same_batch_validation.py`: system property validation
    against same-batch DEFINE.
  - `test_domain_value_objects.py`: `test_create_node_valid`,
    `test_create_edge_valid`, `test_create_edge_requires_start_and_end_id`.

