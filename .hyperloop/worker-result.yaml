- **Creation**: ULID identity, workspace EDIT check, duplicate name error, SpiceDB relationships
- **Name Validation**: 1–100 char constraint in domain + Pydantic request models
- **Retrieval**: VIEW permission check, returns None for unauthorized/missing (no leakage)
- **Listing**: workspace-scoped list with SpiceDB-filtered results; `list_all` for tenant-wide
- **Update**: EDIT permission check, `AggregateDeletedError` guard, duplicate name check
- **Deletion**: MANAGE permission check, atomic cascade (data sources + credentials + KG
  record + SpiceDB relationships), rollback-on-failure verified by dedicated test
- **Permission Inheritance**: SpiceDB schema defines workspace→view/edit/manage arrows

