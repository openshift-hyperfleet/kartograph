### Requirement: Transactional Event Storage â€” COVERED

**Scenario: Successful write**
- Code: `infrastructure/outbox/repository.py` â€” `OutboxRepository.append()` calls
  `session.add(model)` without ever calling `session.commit()`. The repository
  is constructed with the caller's session, sharing the same transaction.
- Unit test: `test_repository_append_does_not_commit` â€” asserts `session.add` is
  called once and `session.commit` is never called.
- Integration test: `test_outbox_entry_created_in_same_transaction_as_group` in
  `tests/integration/iam/test_outbox_consistency.py` â€” creates a group, commits,
  then asserts both the `GroupModel` row and the outbox entry exist in the DB.

**Scenario: Transaction rollback**
- Code: No `commit()` in repository; a session rollback discards the uncommitted
  `session.add()`.
- Unit test: `test_failed_service_call_leaves_no_outbox_entries` â€” asserts
  `session.commit` is never called by the repository.
- Integration test: `test_rollback_removes_both_group_and_outbox_entry` â€” raises
  inside `async with session.begin()`, then asserts neither the group row nor the
  outbox entry is present afterwards.

