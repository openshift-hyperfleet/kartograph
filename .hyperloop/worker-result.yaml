### Requirement: Event Fan-Out â€” COVERED

**Scenario: Multiple handlers registered**
- Code: `CompositeEventHandler.handle()` iterates `self._handlers_by_type[event_type]`
  (a list), calling `await handler.handle(event_type, payload)` for each.
- Unit test: `test_handle_fans_out_to_multiple_handlers` â€” registers two `MockHandler`
  instances for the same event type, calls `composite.handle()`, asserts both
  `handler_a.handle` and `handler_b.handle` were each called once.

**Scenario: Unknown event type**
- Code: `CompositeEventHandler.handle()` raises `UnknownEventTypeError` (not `ValueError`)
  when no handler is registered. `OutboxWorker._process_entries()` catches
  `UnknownEventTypeError` in a dedicated `except` block (before the generic
  `except Exception`) and immediately calls `_move_to_dlq()` without incrementing
  the retry count.
- Unit tests:
  - `test_handle_raises_for_unknown_event_type` â€” asserts `UnknownEventTypeError`
    raised with correct `event_type` and `registered_types` attributes.
  - `test_unknown_event_type_error_is_not_value_error` â€” asserts the exception is
    not a `ValueError` (so retry logic cannot confuse it with a transient error).
  - `test_unknown_event_type_immediately_moves_to_dlq` â€” entry at retry_count=0 with
    max_retries=5; asserts `probe.event_moved_to_dlq` called and
    `probe.event_processing_failed` NOT called.
  - `test_unknown_event_type_dlq_even_at_zero_retries` â€” same for a fresh entry.
  - `test_retry_not_called_for_unknown_event_type` â€” patches `_increment_retry` and
    asserts it is never called.

