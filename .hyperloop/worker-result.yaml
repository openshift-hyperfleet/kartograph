### 2. Requirement: API Key Authentication — COVERED

**Scenario: Valid key** — COVERED
- Code: `_authenticate()` dependency checks `X-API-Key` header, calls `api_key_service.validate_and_get_key()`, which calls `record_usage()` and commits.
- Tests: Unit: `test_returns_auth_result_with_valid_api_key`, `test_updates_last_used_at`. Integration: `test_authenticates_with_valid_api_key`, `test_updates_last_used_at_on_success`.

**Scenario: Expired key** — COVERED
- Code: `APIKey.is_valid()` returns `False` when `datetime.now(UTC) >= self.expires_at`. `validate_and_get_key` returns `None`, causing `_authenticate` to raise HTTP 401.
- Tests: Unit: `test_expired_key_returns_false` (aggregate), `test_returns_none_for_expired_key` (service). Integration: `test_returns_401_for_expired_api_key` (uses direct DB insert with past `expires_at` to bypass the route's 1-day minimum).

**Scenario: Revoked key** — COVERED
- Code: `APIKey.is_valid()` returns `False` when `self.is_revoked is True`.
- Tests: Unit: `test_revoked_key_returns_false`, `test_returns_none_for_revoked_key`. Integration: `test_returns_401_for_revoked_api_key`.

**Scenario: JWT takes precedence** — COVERED
- Code: `_authenticate()` processes JWT (`if token:`) before checking `X-API-Key`. When JWT is present, `validate_and_get_key` is never called.
- Tests: Unit: `test_jwt_takes_priority_over_api_key` (asserts `validate_and_get_key.assert_not_awaited()`). Integration: `test_prefers_jwt_when_both_provided`.

**Scenario: Prefix collision** — COVERED
- Code: `APIKeyRepository.get_verified_key()` fetches all keys matching the 12-char prefix; if `len(models) > 1`, calls `probe.api_key_prefix_collision(prefix, count)`. The `DefaultAPIKeyRepositoryProbe.api_key_prefix_collision()` logs at `error` level (`self._logger.error(...)`).
- Tests: `test_logs_error_on_prefix_collision` verifies `probe.api_key_prefix_collision` is called with the correct prefix and count (2).

---

### 3. Requirement: API Key Listing — COVERED

**Scenario: List keys** — COVERED
- Code: `GET /api-keys` calls `list_api_keys()` service, which uses SpiceDB `lookup_resources` to find viewable key IDs, then fetches from PostgreSQL scoped to tenant. Returns `list[APIKeyResponse]`.
- `APIKeyResponse` includes: name, prefix, created_at, expires_at, last_used_at, is_revoked. Does NOT include `secret` or `key_hash`.
- Tests: `test_lists_api_keys_for_user` (returns correct metadata), `test_never_returns_secret_or_hash` (no secret/hash fields), `test_lists_api_keys_using_authz` (SpiceDB lookup verified).

**Scenario: Filter by creator** — COVERED
- Code: Route accepts optional `?user_id=` query param, parses it into `UserId`, passes as `created_by_user_id` to service, which forwards it to repository `list()`.
- Tests: `test_filters_by_created_by_user_id` (service unit) verifies the filter propagates to the repository call. `test_returns_400_for_empty_user_id` (route unit) covers invalid filter. No dedicated route-level test exercises a valid `?user_id=<uuid>`, but the service-layer test provides the core behavioral coverage.

---

### 4. Requirement: API Key Revocation — COVERED

**Scenario: Owner revokes own key** — COVERED
- Code: SpiceDB schema grants `revoke` permission via the `owner` relation. `revoke_api_key()` checks `Permission.REVOKE` via SpiceDB before calling `api_key.revoke()`.
- Tests: Integration: `test_owner_can_revoke_own_key`.

**Scenario: Tenant admin revokes any key** — COVERED
- Code: SpiceDB schema grants `revoke` via `tenant->administrate` (i.e., tenant admin). `alice_admin_tenant_auth_headers` fixture grants Alice the `admin` relation.
- Tests: Integration: `test_tenant_admin_can_revoke_other_users_key`.

**Scenario: Already revoked** — COVERED
- Code: `APIKey.revoke()` raises `APIKeyAlreadyRevokedError` when `is_revoked is True`. Service re-raises; route maps to HTTP 409.
- Tests: Unit: `test_revoke_already_revoked_raises_error` (aggregate), `test_raises_when_already_revoked` (service), `test_returns_409_when_already_revoked` (route).

**Scenario: Unauthorized revocation** — COVERED
- Code: `revoke_api_key()` raises `UnauthorizedError` when SpiceDB denies `REVOKE` permission. Route maps to HTTP 403.
- Tests: Unit: `test_revoke_raises_unauthorized_when_denied` (service), `test_revoke_api_key_returns_403_when_unauthorized` (route). Integration: `test_non_admin_cannot_revoke_other_users_key`.

**Scenario: Revoked key remains visible** — COVERED
- Code: Revocation is a soft-delete (`is_revoked=True`); the DB row is not deleted. The key continues to be returned by `list_api_keys` (SpiceDB `owner` relation persists after revocation).
- Tests: Integration: `test_revoked_key_remains_visible_in_listing` (creates key, processes outbox, revokes, then lists and asserts `is_revoked=True` is present).

---

### 5. Requirement: API Key Cascade Deletion — COVERED

**Scenario: Tenant deletion** — COVERED
- Code: `TenantService.delete_tenant()` explicitly fetches all API keys for the tenant via `api_key_repository.list(tenant_id=tenant_id)`, calls `api_key.mark_for_deletion()` on each (records `APIKeyDeleted` domain event), then calls `api_key_repository.delete(api_key)`. The outbox pattern ensures SpiceDB relationships are cleaned up via the `APIKeyDeleted` event.
- Tests: `test_deletes_api_keys_on_tenant_deletion` (single key), `test_deletes_multiple_api_keys_on_tenant_deletion` (3 keys, `call_count == 3`), `test_api_key_mark_for_deletion_emits_deleted_event` (confirms `APIKeyDeleted` event is pending on the key passed to `delete()`).

---

### 6. Requirement: API Key Name Validation — COVERED

**Scenario: Valid name** — COVERED
- Code: `CreateAPIKeyRequest.name = Field(..., min_length=1, max_length=255)`. Pydantic enforces the constraint.
- Tests: All route creation tests with valid names (1–255 chars) pass through successfully.

**Scenario: Empty name** — COVERED
- Code: `min_length=1` causes Pydantic to reject empty strings with a validation error.
- Tests: `test_validates_name_min_length` asserts HTTP 422 for `name=""`.

