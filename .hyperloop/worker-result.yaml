### Requirement: Concurrency Safety — PASS
`queries.py:acquire_advisory_lock` calls `pg_advisory_xact_lock(%s)`
(transaction-scoped). Labels are sorted alphabetically (`sorted_labels = sorted(all_labels)`)
before lock acquisition. On any exception, `client.raw_connection.rollback()`
releases all held locks before retry. Bounded retry loop runs up to
`_max_retries + 1` times.

