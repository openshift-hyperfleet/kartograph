## Spec Alignment Review — API Keys (task-021)

Independent review against `specs/iam/api-keys.spec.md`.

---

### Requirement: API Key Creation — COVERED

**Scenario: Successful creation** — COVERED
- `karto_` prefix: `test_secret_has_karto_prefix` (service unit), `test_creates_api_key_returns_201` (route unit)
- Plaintext returned once: `test_returns_secret_in_response` (route unit), `test_returns_plaintext_secret_only_at_creation` (service unit)
- Stored as bcrypt hash: `test_creates_api_key_with_hashed_secret` (service unit) — key_hash ≠ plaintext
- 12-character prefix stored: `test_stores_prefix_from_secret` (service unit) — asserts `prefix == plaintext_secret[:12]`; `extract_prefix()` in `security.py` returns `secret[:12]`

**Scenario: Duplicate name per user** — COVERED
- `test_raises_on_duplicate_name` (service unit) — raises `DuplicateAPIKeyNameError`
- `test_returns_409_on_duplicate_name` (route unit) — maps to HTTP 409

**Scenario: Expiration bounds** — COVERED
- `test_validates_expires_in_days_minimum` (route unit) — 0 days → 422
- `test_validates_expires_in_days_maximum` (route unit) — 3651 days → 422
- `test_creates_with_expiration` (service unit) — 30-day expiration math verified
- `test_uses_default_expires_in_days_of_30` (route unit) — omitting `expires_in_days` results in service called with `expires_in_days=30`

---

### Requirement: API Key Authentication — COVERED

**Scenario: Valid key** — COVERED
- `test_authenticates_with_valid_api_key` (integration) — 200 OK with `X-API-Key`
- `test_updates_last_used_at_on_success` (integration) — `last_used_at` updates after auth
- `test_updates_last_used_at` (service unit) — `save` called with non-None `last_used_at`

**Scenario: Expired key** — COVERED
- `test_returns_401_for_expired_api_key` (integration) — inserts an expired key directly to DB (bypassing route minimum), then asserts 401 + `WWW-Authenticate: Bearer, API-Key`
- `test_returns_none_for_expired_key` (service unit) — service returns None for expired key

**Scenario: Revoked key** — COVERED
- `test_returns_401_for_revoked_api_key` (integration) — revokes via API, then asserts 401
- `test_returns_none_for_revoked_key` (service unit)

**Scenario: JWT takes precedence** — COVERED
- `test_prefers_jwt_when_both_provided` (integration) — both headers → 200 OK using JWT path
- `test_invalid_jwt_with_valid_api_key_uses_api_key` (integration) — invalid JWT + valid API key → 401 (JWT tried first, not bypassed)

**Scenario: Prefix collision** — COVERED
- `test_logs_error_on_prefix_collision` (repository unit) — two models with same prefix, mock query returns both; asserts `api_key_prefix_collision` probe called with prefix and count=2
- Implementation: `api_key_repository_probe.py` emits `self._logger.error(...)` for `api_key_prefix_collision`

---

### Requirement: API Key Listing — COVERED

**Scenario: List keys** — COVERED
- `test_lists_api_keys_for_user` (route unit) — 200 OK, keys returned with `id` and `name`
- `test_never_returns_secret_or_hash` (route unit) — `secret`, `key_hash`, `hash` absent from response
- `APIKeyResponse` model defines all required fields (`name`, `prefix`, `created_at`, `expires_at`, `last_used_at`, `is_revoked`) as required (or Optional for `last_used_at`)
- Note: the route unit test does not explicitly assert `created_at`, `expires_at`, or `last_used_at` field values in the list response. The model guarantees their serialization; this is a minor documentation gap but not a behavioral failure.

**Scenario: Filter by creator** — COVERED
- `test_filters_by_created_by_user_id` (service unit) — `list_api_keys(created_by_user_id=filter_user_id)` → repository called with `created_by_user_id=filter_user_id`
- `test_returns_400_for_empty_user_id` (route unit) — blank `user_id` query param → 400
- Note: no route-level positive test for `GET /iam/api-keys?user_id=<valid-id>` returning filtered results. Coverage is at the service layer only. This is a minor gap; the behavior is correctly tested at the service boundary.

