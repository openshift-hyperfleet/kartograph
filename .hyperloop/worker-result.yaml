  ### Requirement 9: Deterministic Entity IDs — COVERED

  Implementation:
  - `MutationOperation.id` field has Pydantic pattern
    `r"^[0-9a-z_]+:[0-9a-f]{16}$"` (defined as `ID_REGEX` in `value_objects.py`).
  - Same regex applied to `start_id` and `end_id` fields.
  - Pydantic raises `ValidationError` at construction time if pattern not matched.

  Tests:
  - `test_domain_value_objects.py`: `test_id_pattern_validation` (invalid format
    raises ValidationError), `test_id_accepts_valid_pattern` (16 hex chars accepted).

  ### Requirement 10: Referential Integrity Ordering — COVERED

  Implementation:
  - `MutationApplier._sort_operations()` uses a two-level sort key:
    - Level 1: `{"DEFINE": 0, "DELETE": 1, "CREATE": 2, "UPDATE": 3}`
    - Level 2 for DELETE: edge=0, node=1 (edges before nodes)
    - Level 2 for CREATE/UPDATE: node=0, edge=1 (nodes before edges)
  - This produces: DEFINE → DELETE edge → DELETE node → CREATE node → CREATE edge → UPDATE.
  - `AgeBulkLoadingStrategy.apply_batch()` also enforces the same order
    independently in its partition-and-execute logic.

  Tests:
  - `test_mutation_applier_sort.py::TestSortOperationsReferentialIntegrity`:
    - `test_sort_order_define_delete_create_update` — exhaustive position-by-position
      assertion for all 6 operation sub-types in deliberately wrong input order.
    - `test_sort_preserves_all_operations` — no drops or duplicates.
    - `test_sort_homogeneous_list_unchanged_length` — single-type list preserved.

