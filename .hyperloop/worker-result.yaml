### REQ-3: Idempotent Event Handlers — COVERED

**Spec scenario:** Duplicate delivery.

**Implementation:**
- SpiceDB `WriteRelationship` uses upsert semantics — writing the same tuple
  twice is a no-op.
- `fetch_unprocessed` filters `processed_at IS NULL`, so a successfully processed
  entry is never returned again.

**Tests:**
- Integration `TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state`
  — explicitly exercises the spec scenario: handler called once (SpiceDB written),
  `mark_processed` skipped to simulate crash, then `_process_batch()` called again.
  Asserts `processed_at` is now set and SpiceDB relationship is unchanged (no
  duplicate, no deletion).

