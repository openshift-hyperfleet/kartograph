   (`TestIdempotentEventHandlers`) in `tests/integration/iam/test_outbox_consistency.py`.

3. **`1f5515e1`** `fix(checks)`: ERE pattern corrections and task-scope awareness in
   `.hyperloop/checks/` scripts.

New/modified source files:
- `shared_kernel/outbox/exceptions.py` — `UnknownEventTypeError` (permanent-failure
  sentinel, not a `ValueError` subclass).
- `infrastructure/outbox/composite.py` — raises `UnknownEventTypeError` instead of
  `ValueError` for unregistered event types.
- `infrastructure/outbox/worker.py` — catches `UnknownEventTypeError` *before* the
  generic `Exception` handler and immediately moves the entry to DLQ (no retry
  increment), satisfying the spec's "unknown types are permanent failures" requirement.
- `tests/unit/shared_kernel/outbox/test_exceptions.py` — 6 unit tests for
  `UnknownEventTypeError`.

