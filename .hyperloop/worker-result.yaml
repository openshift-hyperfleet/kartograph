### Requirement: Event Fan-Out — COVERED

**Scenario: Multiple handlers registered** — COVERED
- **Code:** `CompositeEventHandler.handle()` (composite.py:83-91) retrieves all handlers
  in `_handlers_by_type[event_type]` and iterates over all of them.
- **Unit test:** `TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers`
  — registers two `MockHandler` instances for `SharedEvent`, calls `handle()`,
  asserts both `handler_a.handle` and `handler_b.handle` each called exactly once.

**Scenario: Unknown event type** — COVERED
- **Code:** `CompositeEventHandler.handle()` raises `UnknownEventTypeError` when
  `_handlers_by_type.get(event_type)` returns `None`. `OutboxWorker._process_entries()`
  catches `UnknownEventTypeError` *before* the generic `Exception` handler and
  calls `_move_to_dlq()` directly — no `_increment_retry()`.
- **Unit tests:**
  - `TestCompositeEventHandler::test_handle_raises_for_unknown_event_type` — asserts
    `UnknownEventTypeError` raised with `.event_type` and `.registered_types` attributes.
  - `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`
    — asserts `probe.event_moved_to_dlq` called at retry_count=0;
    `probe.event_processing_failed` not called.
  - `TestOutboxWorkerRetryBehavior::test_retry_not_called_for_unknown_event_type`
    — patches `_increment_retry` and asserts it is never called.

