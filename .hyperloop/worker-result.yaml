### Requirement: Child Workspace Creation — PARTIAL (causes CI failure)

**Scenario: Successful creation**
- Code: `workspace_service.py::create_workspace()` creates child, grants admin via `add_member()`.
- Unit test: `test_workspace_service.py::TestCreateWorkspace::test_create_workspace_grants_creator_admin_access`
- Integration test: `test_workspace_api.py::TestWorkspaceCreation::test_creates_child_workspace`

**Scenario: Duplicate name within tenant**
- Code: `workspace_service.py::create_workspace()` pre-checks via `get_by_name()` + handles `IntegrityError`.
- Unit test: `test_workspace_service.py::TestCreateWorkspace::test_create_workspace_enforces_unique_name`

**Scenario: Unauthorized creation — PARTIAL (integration test wrong)**

The spec says:
> THEN a not-found response is returned
> AND no distinction is made between "unauthorized" and "missing parent"

- Code in `routes.py`: `except UnauthorizedError: raise HTTPException(status_code=HTTP_404_NOT_FOUND, ...)` ✓ (correct per spec)
- Unit test in `test_workspaces_routes.py::TestCreateWorkspace::test_create_workspace_returns_404_when_unauthorized`: asserts `response.status_code == HTTP_404_NOT_FOUND` ✓ (correct per spec)
- **FAILING integration test** in `test_workspace_authorization.py::TestWorkspaceCreationAuthorization::test_tenant_member_cannot_create_workspace_under_child_via_api`:
  asserts `resp.status_code == 403` ✗ (WRONG — spec requires 404, implementation returns 404)

**Fix needed:** Change line `assert resp.status_code == 403` to `assert resp.status_code == 404`
in `tests/integration/iam/test_workspace_authorization.py::TestWorkspaceCreationAuthorization::test_tenant_member_cannot_create_workspace_under_child_via_api`.

