#### REQ-4: API Key Revocation — COVERED

**Code:** `iam/application/services/api_key_service.py::revoke_api_key()`,
`iam/domain/aggregates/api_key.py::APIKey.revoke()`

**Scenario: Owner revokes own key** — COVERED
- `test_owner_can_revoke_own_key` (integration): alice creates key, processes outbox, revokes → 204

**Scenario: Tenant admin revokes any key** — COVERED
- `test_tenant_admin_can_revoke_other_users_key` (integration): bob creates key; alice (admin)
  revokes → 204

**Scenario: Already revoked** — COVERED
- `test_raises_when_already_revoked` (service unit): `APIKeyAlreadyRevokedError` raised
- `test_returns_409_when_already_revoked` (route unit): HTTP 409 returned

**Scenario: Unauthorized revocation** — COVERED
- `test_non_admin_cannot_revoke_other_users_key` (integration): bob cannot revoke alice's key → 403
- `test_revoke_api_key_returns_403_when_unauthorized` (route unit): `UnauthorizedError` → HTTP 403

*Additional note:* `test_revoked_key_remains_visible_in_listing` (integration) covers the
"AND key remains visible with `is_revoked=true`" clause of the owner-revokes scenario.

