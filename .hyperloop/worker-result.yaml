#### REQ 4: DEFINE Operation (SHALL)

**Implementation:** `apply_mutations()` intercepts DEFINE ops, calls
`get_system_properties_for_entity()` to auto-add system props, saves updated `TypeDefinition`
to repository. Node types get `data_source_id + source_path + slug`; edge types get only
`data_source_id + source_path`.

**Scenario: Define a node type**
- Tests: `test_apply_mutations_stores_define_operations()` — verifies label, description,
  and that `data_source_id`, `source_path`, `slug` are present in `required_properties`;
  `optional_properties` defaults to empty
- **Status: COVERED**

**Scenario: Define an edge type**
- Tests: `test_apply_define_edge_type_adds_edge_system_properties()` — verifies
  `data_source_id`/`source_path` added, `slug` is explicitly absent
- **Status: COVERED**

