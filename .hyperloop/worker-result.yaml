Added in commit `7cf228fd`, 6 unit tests in `test_tenant_service.py`:

- **Scenario: Tenant deletion cascades** — COVERED
  - `test_deletes_api_keys_on_tenant_deletion` (line 1448) — single key deleted
  - `test_deletes_multiple_api_keys_on_tenant_deletion` (line 1495) — all 3 keys deleted
