### Spec Requirements Coverage

**Creation**: `service.create()` checks EDIT on workspace, generates ULID,
stores tenant/workspace associations, raises DuplicateKnowledgeGraphNameError
on IntegrityError → 409.

**Name validation**: Domain `_validate_name()` (1–100 chars) + Pydantic
`min_length=1, max_length=100` → 422 at presentation layer.

**Retrieval**: `service.get()` returns None for not-found, wrong-tenant, or
lack of VIEW — all surface as 404. No existence leakage.

**Listing**: `list_for_workspace()` checks VIEW on workspace, discovers KG IDs
via SpiceDB read_relationships, filters by tenant.

**Update**: `service.update()` checks EDIT on KG, calls `kg.update()` which
enforces name validation and AggregateDeletedError guard.

**Deletion**: `service.delete()` checks MANAGE, then single
`async with self._session.begin()` transaction cascade-deletes: encrypted
credentials (FernetSecretStore), data sources, then KG. `KnowledgeGraphDeleted`
event via transactional outbox cleans workspace + tenant relationships and
all admin/editor/viewer direct grants. Rollback test verifies atomicity.

**Mutation after deletion**: `AggregateDeletedError` raised by domain aggregate.

**Permission Inheritance**: SpiceDB schema correctly models
`knowledge_graph.view = admin + editor + viewer + workspace->view`,
`edit = admin + editor + workspace->edit`, `manage = admin + workspace->manage`.
Integration tests in `test_knowledge_graph_authorization.py` verify both
workspace-inherited and direct-grant scenarios.
