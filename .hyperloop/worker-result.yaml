### Requirement: Permission Inheritance — COVERED

**SpiceDB Schema** (`schema.zed` lines 107–131):
```
permission view   = admin + editor + viewer + workspace->view
permission edit   = admin + editor + workspace->edit
permission manage = admin + workspace->manage
```

**Scenario: Workspace-inherited access**
- Integration tests (`test_knowledge_graph_authorization.py`): `test_workspace_editor_can_view_knowledge_graph`, `test_workspace_editor_can_edit_knowledge_graph`, `test_workspace_admin_can_manage_knowledge_graph`. Tests write real SpiceDB relationships and assert permissions.

**Scenario: Direct grant (admin has manage/edit/view)**
- Integration tests: `test_direct_kg_admin_has_manage_permission`, `test_direct_kg_admin_has_edit_permission`, `test_direct_kg_admin_has_view_permission`.

