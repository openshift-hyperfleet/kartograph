## FAIL 2 — Ontology Change After Extraction: No Edit Path + No User Confirmation (Requirement 5 — SHALL)

**Spec:** "GIVEN a knowledge graph with completed extraction, WHEN the user modifies the
ontology, THEN the system warns that this will trigger a full re-extraction, AND the user
must confirm before the change is applied."

**Code:** A re-extraction warning banner exists in the creation wizard (Step 4, lines
911–918 of `data-sources/index.vue`). However:

- The wizard is used only for **creating a new** data source — there is no way to edit
  an existing data source's ontology after the fact.
- The warning is an informational alert; it does not gate any confirmation step. No
  `confirm()` dialog, no "I understand — proceed" button, no separate confirmation flow
  exists.

The scenario specifically targets the **post-extraction editing** path, which is
entirely absent from the implementation.

**Test:** None.

**Required fix:**
1. Add an "Edit Ontology" action to existing data source cards (or a detail page).
2. When a data source has at least one completed sync run, gate ontology changes behind
   an explicit confirmation dialog ("This will trigger a full re-extraction. Continue?").
3. Add a test for the confirmation gate logic.

