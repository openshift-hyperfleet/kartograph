### Requirement: Knowledge Graph Deletion â€” COVERED

**Code:** `KnowledgeGraphService.delete()` checks MANAGE permission on the KG. Within a single `async with self._session.begin()` block:
1. Fetches all data sources via `IDataSourceRepository.find_by_knowledge_graph()`
2. For each DS with `credentials_path`, calls `ISecretStoreRepository.delete()`
3. Calls `ds.mark_for_deletion()` + `IDataSourceRepository.delete()` for each DS
4. Calls `kg.mark_for_deletion()` + `IKnowledgeGraphRepository.delete()`

SpiceDB cleanup happens asynchronously via outbox: `_translate_knowledge_graph_deleted()` produces 5 operations (delete workspace rel, delete tenant rel, filter-delete admin/editor/viewer grants).

**Scenario: Successful deletion â€” COVERED**
- Service tests: `test_delete_checks_manage_permission_on_kg`, `test_delete_cascades_data_sources`, `test_delete_cascades_encrypted_credentials`, `test_delete_probes_success`
- Translator tests: `TestManagementEventTranslatorKnowledgeGraphDeleted` â€” verifies all 5 SpiceDB operations
- Integration tests: `TestKnowledgeGraphDeletion::test_deletes_knowledge_graph`, `TestOutboxConsistency::test_delete_records_outbox_event`
- Route test: `test_delete_knowledge_graph_returns_204`

**Atomicity / rollback â€” COVERED**
- Service test: `test_delete_rolls_back_on_ds_deletion_failure` â€” verifies `kg_repo.delete` is never called when DS deletion raises mid-cascade

**Scenario: Mutation after deletion â€” COVERED**
- Domain test: `test_update_raises_after_deletion` â€” `KnowledgeGraph.update()` raises `AggregateDeletedError` when `_deleted=True`
- Domain test: `test_mark_for_deletion_is_idempotent` â€” double deletion is a no-op

