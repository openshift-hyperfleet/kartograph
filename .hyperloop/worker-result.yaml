### Requirements Coverage

**Creation:** `KnowledgeGraphService.create()` checks EDIT on workspace via SpiceDB,
generates ULID, scopes to tenant/workspace, persists. Duplicate name → HTTP 409.

**Name Validation:** Domain `_validate_name()` (1–100 chars) + Pydantic Field constraints
at HTTP layer. Both create and update paths enforced.

**Retrieval:** `service.get()` returns None for not-found, wrong-tenant, or unauthorized
→ route returns 404 in all cases (no existence leakage).

**Listing:** `list_for_workspace()` checks VIEW on workspace; `list_all()` checks VIEW
per KG. Both filter via SpiceDB.

**Update:** EDIT permission checked on KG. `AggregateDeletedError` raised for
mutation-after-deletion at domain level.

**Deletion (atomic cascade):** `async with self._session.begin()` deletes encrypted
credentials via `FernetSecretStore`, all data sources, then the KG. Outbox events
clean up SpiceDB relationships. Rollback on any failure verified by unit test.

**Permission Inheritance:** SpiceDB schema wires `workspace->view/edit` into KG
permissions. Integration tests cover workspace-inherited and direct-grant scenarios.
