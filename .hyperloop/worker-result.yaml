### Code Review

**Domain probes**: All observability goes through typed probe protocols
(`APIKeyServiceProbe`, `APIKeyRepositoryProbe`). No `logger.*` or `print()` in
domain or application layers. ✅

**Prefix collision**: `DefaultAPIKeyRepositoryProbe.api_key_prefix_collision()` calls
`self._logger.error(...)` — correct error-level event as required by spec. ✅

**Plaintext secret**: `APIKeyCreatedResponse` extends `APIKeyResponse` with the
`secret` field. All list/revoke responses use `APIKeyResponse` which excludes
`key_hash` and `secret`. The plaintext is only ever returned from the service
as a tuple, never stored. ✅

**JWT precedence**: `iam/dependencies/user.py` checks `token is not None` before
`x_api_key is not None`. Integration test confirms invalid JWT with valid API key
returns 401 (JWT failure takes precedence, no fallthrough). ✅

**Cascade deletion**: Implemented at application layer in `TenantService.delete_tenant()`.
DB FK uses RESTRICT (not CASCADE) to enforce application-layer handling. Events emitted
via `mark_for_deletion()` trigger SpiceDB relationship cleanup through the outbox. ✅

**Soft revocation**: `APIKey.revoke()` sets `is_revoked = True`; key remains in DB
and visible in listings. Integration test (`test_revoked_key_remains_visible_in_listing`)
chains create → process-outbox → revoke → list to confirm. ✅

**Commit trailers**: Both implementation commits carry correct trailers:
- `Spec-Ref: specs/iam/api-keys.spec.md@2a791cdb79f8acd5cdf5654fa7efed1075ecf1de`
- `Task-Ref: task-021`

**Mocking**: `IAPIKeyRepository` and `AuthorizationProvider` mocked with
`create_autospec` (not plain `AsyncMock`), which enforces the interface contract.
`AsyncSession` is infrastructure and acceptable to mock directly. ✅

