- `test_returns_409_on_duplicate_name` (route unit) тАФ maps to HTTP 409

**Scenario: Expiration bounds** тАФ COVERED
- `test_validates_expires_in_days_minimum` (route unit) тАФ 0 days тЖТ 422
- `test_validates_expires_in_days_maximum` (route unit) тАФ 3651 days тЖТ 422
- `test_creates_with_expiration` (service unit) тАФ 30-day expiration math verified
- `test_uses_default_expires_in_days_of_30` (route unit) тАФ omitting `expires_in_days` results in service called with `expires_in_days=30`

