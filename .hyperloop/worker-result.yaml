### Key Implementation Notes

- **Idempotent merge**: Fixed `_build_update_existing_query` to use `jsonb ||` operator instead of simple assignment, correctly preserving existing properties.
- **knowledge_graph_id stamping**: `_stamp_knowledge_graph_id()` runs before validation in `apply_mutations()`, guaranteeing callers cannot spoof the graph ID.
- **Platform-stamped properties excluded from schema learning**: `PLATFORM_STAMPED_PROPERTIES` frozenset prevents `knowledge_graph_id` from polluting type definition optional properties.
- **Authorization**: New route `/graph/knowledge-graphs/{knowledge_graph_id}/mutations` checks SpiceDB `edit` permission before processing; returns 403 on denial without calling the service.
- **Tenant isolation**: `get_tenant_graph_name()` wires `AgeGraphClient` to `tenant_{tenant_id}` graph at dependency injection time.

