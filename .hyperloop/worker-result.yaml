## Requirement Coverage

### Requirement: Transactional Event Storage — COVERED

**Scenario: Successful write**
- Code: `infrastructure/outbox/repository.py` — `OutboxRepository.append()` calls
  `session.add()` only. Never calls `session.commit()`. The session is injected by the
  calling service, ensuring shared transaction boundary.
- Unit test: `test_repository_append_does_not_commit` (`test_worker.py`) — verifies
  `commit` is never called, `add` is called once.
- Integration test: `TestAtomicityGuarantees.test_outbox_entry_created_in_same_transaction_as_group`
  (`test_outbox_consistency.py`) — confirms group and outbox entry both committed atomically.

**Scenario: Transaction rollback**
- Code: Repository never commits; if the outer transaction rolls back, the session
  discards all pending `add()` calls including outbox entries.
- Unit test: `test_failed_service_call_leaves_no_outbox_entries` (`test_worker.py`).
- Integration test: `TestAtomicityGuarantees.test_rollback_removes_both_group_and_outbox_entry`
  — asserts neither group nor outbox entry survive a forced rollback.

---

### Requirement: Event Processing — COVERED

**Scenario: Normal processing**
- Code: `OutboxWorker._process_entries()` calls `handler.handle()` then
  `_mark_processed()` (sets `processed_at`). Entries with `processed_at IS NOT NULL`
  are excluded from subsequent polls.
- Unit tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`,
  `test_calls_event_processed_on_success` (`test_worker.py`).
- Integration tests: `TestOutboxWorkerProcessing.test_worker_processes_group_created_and_writes_to_spicedb`
  — confirms `processed_at` is set and SpiceDB relationship written after `_process_batch()`.

**Scenario: Transient failure**
- Code: Generic `except Exception` in `_process_entries()` dispatches to
  `_handle_processing_failure()`, which calls `_increment_retry()` (increments
  `retry_count`, stores `last_error`).
- Unit tests: `test_transient_failure_increments_retry_count`,
  `test_transient_failure_does_not_dlq_immediately` (`test_worker.py`).

**Scenario: Permanent failure (dead letter)**
- Code: `_handle_processing_failure()` calls `_move_to_dlq()` (sets `failed_at`,
  `retry_count`, `last_error`) when `new_retry_count >= max_retries`. Entries with
  `failed_at IS NOT NULL` are excluded from all subsequent polls.
- Unit test: `test_max_retries_moves_entry_to_dlq` (`test_worker.py`).
- DB: `a1b2c3d4e5f6_add_outbox_retry_columns.py` migration adds `retry_count`,
  `last_error`, `failed_at` columns with partial index `idx_outbox_failed`.

