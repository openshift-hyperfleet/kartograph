### Requirement 8: Mandatory System Properties — COVERED

**Code:** `MutationOperation.validate_operation()` enforces for all CREATE:
`data_source_id`, `source_path`, `knowledge_graph_id`; and additionally `slug` for
nodes; `start_id` + `end_id` for edges.

**Scenario: Node system properties** — COVERED
- `test_create_requires_data_source_id` — rejects missing `data_source_id`
- `test_create_requires_source_path` — rejects missing `source_path`
- `test_create_node_requires_slug` — rejects missing `slug`
- `test_create_node_requires_knowledge_graph_id` — rejects missing `knowledge_graph_id`

**Scenario: Edge system properties** — COVERED
- `test_create_edge_valid` — passes with `data_source_id`, `source_path`, `knowledge_graph_id` (no `slug`)
- `test_create_edge_requires_knowledge_graph_id` — rejects missing `knowledge_graph_id`
- `test_create_edge_requires_start_and_end_id` — rejects missing start/end refs
- `data_source_id`/`source_path` validation is shared code (same `validate_operation` branch for all CREATEs)

---

### Requirement 9: Deterministic Entity IDs — COVERED

**Code:** `ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` enforced via Pydantic `pattern=`
on `MutationOperation.id`. `EntityIdGenerator` in `shared_kernel` generates deterministic
SHA-256-based 16-hex-char IDs.

**Scenario: ID format** — COVERED
- `test_id_pattern_validation` — rejects invalid format via Pydantic ValidationError
- `test_id_accepts_valid_pattern` — accepts `person:abc123def456789a`
- `test_hash_portion_length` — hash is exactly 16 chars
- `test_hash_portion_is_hex` — hash contains only `[0-9a-f]`
- `test_is_deterministic` — same inputs always produce same ID
- `test_includes_type_prefix` — prefix matches entity type

---

### Requirement 10: Referential Integrity Ordering — COVERED

**Code:** `MutationApplier._sort_operations()` sorts with priority:
DEFINE(0) → DELETE-edge(1,0) → DELETE-node(1,1) → CREATE-node(2,0) → CREATE-edge(2,1) → UPDATE(3).

**Scenario: Operation ordering** — COVERED
- `TestSortOperationsReferentialIntegrity::test_sort_order_define_delete_create_update`
  submits all 6 op types in a deliberately wrong order and asserts the exact sorted sequence
  at positions 0–5: DEFINE → DELETE-edge → DELETE-node → CREATE-node → CREATE-edge → UPDATE.
- `test_sort_preserves_all_operations` — no ops dropped or duplicated.

