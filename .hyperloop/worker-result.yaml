## Requirement Coverage

### REQ-1: Knowledge Graph Creation

**Scenario A: Successful creation**
- `KnowledgeGraph.create()` generates ULID via `KnowledgeGraphId.generate()`, sets `tenant_id` and `workspace_id`
- `KnowledgeGraphService.create()` checks EDIT permission on workspace before creating, saves via repository
- `outbox/translator.py` writes `workspace` and `tenant` SpiceDB relationships on `KnowledgeGraphCreated` event
- Tests: `test_knowledge_graph.py::TestKnowledgeGraphCreate`, `test_knowledge_graph_service.py::TestKnowledgeGraphServiceCreate`

**Scenario B: Duplicate name within tenant**
- DB UniqueConstraint `uq_knowledge_graphs_tenant_name` on `(tenant_id, name)`
- Repository catches `IntegrityError` and raises `DuplicateKnowledgeGraphNameError`; routes return 409
- Tests: `test_knowledge_graph_service.py::test_create_raises_duplicate_on_integrity_error`, integration `test_knowledge_graph_repository.py::TestKnowledgeGraphUniqueness`

### REQ-2: Name Validation

- `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`
- Pydantic request model uses `Field(min_length=1, max_length=100)`
- Tests: `test_knowledge_graph.py` – empty name, name over 100 chars, valid 1-char, valid 100-char

### REQ-3: Knowledge Graph Retrieval

- `KnowledgeGraphService.get()` collapses not-found / wrong-tenant / permission-denied into `None` (404), no existence leakage
- Tests: `test_knowledge_graph_service.py::TestKnowledgeGraphServiceGet` – all three None paths

### REQ-4: Knowledge Graph Listing

- `list_for_workspace()` checks VIEW on workspace, then uses `read_relationships()` to discover KG IDs, fetches each from repo, filters by tenant
- Tests: `test_knowledge_graph_service.py::TestKnowledgeGraphServiceListForWorkspace`

### REQ-5: Knowledge Graph Update

- `KnowledgeGraphService.update()` checks EDIT on KG, calls `kg.update()` (validates name + checks `_deleted`), saves
- Tests: `test_knowledge_graph_service.py::TestKnowledgeGraphServiceUpdate`, integration `TestKnowledgeGraphUpdate`

### REQ-6: Knowledge Graph Deletion

- `KnowledgeGraphService.delete()` checks MANAGE permission, wraps entire cascade in single `async with self._session.begin()`
- Within transaction: find all data sources → delete encrypted credentials → mark/delete each DS → mark/delete KG
- `KnowledgeGraphDeleted` outbox event triggers SpiceDB cleanup of workspace link, tenant link, and all direct role grants
- `kg.update()` raises `AggregateDeletedError` after `mark_for_deletion()` (mutation after deletion rejected)
- Tests: `test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete`, `test_knowledge_graph.py::test_update_raises_after_deletion`

### REQ-7: Permission Inheritance

- SpiceDB schema: `permission edit = admin + editor + workspace->edit`; `permission view = admin + editor + viewer + workspace->view`; `permission manage = admin + workspace->manage`
- Workspace roles cascade to KG permissions; direct `admin` grant satisfies all three
- Integration tests: `test_knowledge_graph_authorization.py` – workspace-inherited access and direct grant scenarios

