### REQ-2: API Key Authentication — COVERED

**Implementation:**
- `iam/dependencies/user.py::_authenticate()`: tries JWT first (if Bearer header present),
  then tries `X-API-Key`; returns `_AuthResult` with user identity.
- `api_key_service.py::validate_and_get_key()`: delegates prefix extraction and bcrypt
  verification to the repository, calls `api_key.is_valid()`, updates `last_used_at`.
- `api_key.is_valid()`: returns False if `is_revoked` or `datetime.now(UTC) >= expires_at`.

**Scenario: Valid key → authenticated + last_used_at updated** — COVERED
- `test_authenticate_dependency.py::test_fires_probe_on_successful_api_key_auth`
- `test_api_key_service.py::test_updates_last_used_at` — `last_used_at` set after validation
- `test_api_key_auth.py::test_authenticates_with_valid_api_key` — integration: 200 response
- `test_api_key_auth.py::test_updates_last_used_at_on_success` — integration: field updated

**Scenario: Expired key → 401** — COVERED
- `test_api_key_service.py::test_returns_none_for_expired_key` — unit: returns None
- `test_api_key_auth.py::test_returns_401_for_expired_api_key` — integration: 401 response
  (uses `expired_api_key_secret` fixture that inserts a past-dated key directly into DB)

**Scenario: Revoked key → 401** — COVERED
- `test_api_key_service.py::test_returns_none_for_revoked_key`
- `test_api_key_auth.py::test_returns_401_for_revoked_api_key`

**Scenario: JWT takes precedence** — COVERED
- `test_authenticate_dependency.py::test_jwt_takes_priority_over_api_key` — unit: JWT used,
  `validate_and_get_key` not called
- `test_api_key_auth.py::test_prefers_jwt_when_both_provided` — integration: both headers sent

**Scenario: Prefix collision → each candidate checked via bcrypt + error-level event** — COVERED
- `test_api_key_repository.py::test_logs_error_on_prefix_collision` — 2 models with same prefix;
  verifies `api_key_prefix_collision` probe called with prefix and count=2
- `api_key_repository_probe.py::DefaultAPIKeyRepositoryProbe.api_key_prefix_collision` calls
  `self._logger.error(...)` — error-level as spec requires
- `test_api_key_repository.py::test_returns_key_with_correct_secret` — verifies bcrypt
  verification loop works correctly (full hash verification per candidate)

