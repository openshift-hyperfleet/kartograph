### Notes

- The `TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries`
  unit test is conceptual (proves commit is never called; does not exercise an actual
  `session.rollback()`). The integration test `test_rollback_removes_both_group_and_outbox_entry`
  provides the real rollback coverage, so the combined unit+integration picture is complete.
- Handler-level tests in `TestOutboxWorkerProcessBatch` and `TestOutboxWorkerProbeIntegration`
  use `AsyncMock` for the handler — a pre-existing pattern in this codebase. The
  idempotency scenario correctly uses a proper `FakeAuthorizationProvider`. This is
  acceptable per the existing NFR note in the previous result; no new mock usage
  was introduced for scenarios requiring behavioral fakes.
- All 6 SHA requirements and all 10 scenarios are implemented and test-covered.
