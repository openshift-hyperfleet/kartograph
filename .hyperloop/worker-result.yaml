### Requirement: Knowledge Graph Deletion — COVERED

**Code:**
- `KnowledgeGraphService.delete()` (`service:362-421`) checks MANAGE permission on the KG.
- Within `async with self._session.begin():` (single DB transaction):
  1. `ds_repo.find_by_knowledge_graph()` lists all data sources.
  2. For each DS with `credentials_path`, `secret_store.delete()` removes encrypted credentials.
  3. `ds.mark_for_deletion()` + `ds_repo.delete()` removes each data source record.
  4. `kg.mark_for_deletion()` + `kg_repo.delete()` removes the KG record.
  5. The `KnowledgeGraphDeleted` event is written to the outbox atomically.
- The `ManagementEventTranslator._translate_knowledge_graph_deleted()` produces 5 SpiceDB
  operations: delete workspace relationship, delete tenant relationship, filter-delete admin grants,
  filter-delete editor grants, filter-delete viewer grants.

**Scenario: Successful deletion — COVERED**
- Tests: `TestKnowledgeGraphServiceDelete::test_delete_checks_manage_permission_on_kg`,
  `test_delete_cascades_data_sources`, `test_delete_cascades_encrypted_credentials`,
  `TestManagementEventTranslatorKnowledgeGraphDeleted` (5 separate tests for each cleanup op),
  `TestDeleteKnowledgeGraph::test_delete_knowledge_graph_returns_204`.

**Scenario: Rollback on partial failure — COVERED**
- `test_delete_rolls_back_on_ds_deletion_failure` verifies: when a DS delete raises
  `RuntimeError("DB failure")` mid-cascade, `kg_repo.delete` is never called, confirming
  the transaction-level ordering that makes DB rollback meaningful.

**Scenario: Mutation after deletion — COVERED**
- `KnowledgeGraph.update()` checks `self._deleted` and raises `AggregateDeletedError`.
- Test: `TestKnowledgeGraphUpdate::test_update_raises_after_deletion`.

