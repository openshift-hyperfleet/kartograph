### Requirement 6: Event Fan-Out ‚Äî COVERED

**Code:** `infrastructure/outbox/composite.py`
- `CompositeEventHandler.handle()` looks up all handlers for the event type and calls each in turn
- Returns `UnknownEventTypeError` (from `shared_kernel/outbox/exceptions.py`) when no handler is registered
- `OutboxWorker._process_entries()` catches `UnknownEventTypeError` and immediately calls `_move_to_dlq()` (bypassing `_handle_processing_failure()` / retry logic)

**Tests (Multiple handlers):**
- Unit: `test_handle_fans_out_to_multiple_handlers` ‚Äî two `MockHandler`s registered for `"SharedEvent"`, both `handle` called

**Tests (Unknown event type ‚Üí immediate DLQ):**
- Unit: `test_handle_raises_for_unknown_event_type` ‚Äî `CompositeEventHandler` with one known type raises `UnknownEventTypeError` for an unknown type
- Unit: `test_unknown_event_type_immediately_moves_to_dlq` ‚Äî worker with `max_retries=5`, handler raises `UnknownEventTypeError`: `probe.event_moved_to_dlq` called, `probe.event_processing_failed` NOT called
- Unit: `test_unknown_event_type_dlq_even_at_zero_retries` ‚Äî same at `retry_count=0`
- Unit: `test_retry_not_called_for_unknown_event_type` ‚Äî patches `_increment_retry`, asserts it is never called
- Unit: `test_unknown_event_type_error_is_not_value_error` ‚Äî confirms `UnknownEventTypeError` is not a subclass of `ValueError` (so generic-exception retry path cannot swallow it)

