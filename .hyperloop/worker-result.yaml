  task-017 Outbox Pattern — spec alignment re-review PASS (round 8).

  All 6 SHALL requirements covered. All CodeRabbit feedback rounds 1-5
  verified addressed. Fresh test run: 81/81 passed.

  ## Root Cause of Persistent Loop (Now Fixed)

  Previous rounds (5-7) incorrectly concluded that `check-frontend-tests-exist.sh`
  was already fixed. The actual bug was:

  - `task_ui_changes` in check-frontend-tests-exist.sh used `grep -E '\.(vue|ts|js)$'`
    (included .js) BUT `ui_source_count` only counted `*.vue` and `*.ts` (excluded .js).
  - This file-type inconsistency meant .js-only UI edits could bypass enforcement.
  - Additionally, the git diff was still using the old `2>/dev/null || true` pattern
    that silently masked git errors, unlike check-frontend-test-infrastructure.sh
    which was already fixed with the `git_diff_output` separation pattern.

  Both issues have now been fixed in check-frontend-tests-exist.sh (this commit).
  These are real bugs that CodeRabbit correctly identified — they just attributed
  them to the wrong file (check-frontend-test-infrastructure.sh) in later rounds,
  because that file had already been fixed and the equivalent issues in
  check-frontend-tests-exist.sh remained.

  ## Test Suite Results (fresh run)

  Unit tests (outbox only): 81 passed, 0 failures.
  All 81 tests pass with `uv run pytest tests/unit/infrastructure/outbox/ -v`.

  ## Spec Requirements Coverage

  1. Transactional Event Storage: COVERED
     - test_repository_append_does_not_commit verifies session.add() called,
       session.commit() never called by repository.
     - test_failed_service_call_leaves_no_outbox_entries verifies rollback
       discards outbox entries (caller owns transaction).
     - Integration: test_outbox_entry_created_in_same_transaction_as_group,
       test_rollback_removes_both_group_and_outbox_entry.

  2. Event Processing: COVERED
     - Normal path: test_processes_unprocessed_entries,
       test_marks_entry_as_processed, test_calls_event_processed_on_success.
     - Transient failure: test_transient_failure_increments_retry_count,
       test_transient_failure_does_not_dlq_immediately.
     - Permanent failure (dead letter): test_max_retries_moves_entry_to_dlq.
       Spec: "failed_at timestamp set" — implemented as failed_at column (no
       dlq_at column exists; spec uses "DLQ" as concept, code uses failed_at
       as the column name, which is the single canonical field).

  3. Idempotent Event Handlers: COVERED
     - test_already_processed_entry_excluded_from_fetch verifies
       processed_at IS NULL filter in compiled SQL.
     - test_failed_entries_excluded_from_fetch verifies failed_at IS NULL
       filter in compiled SQL.
     - EventHandler protocol documented as idempotent contract.
     - Integration: test_handler_invoked_twice_produces_same_spicedb_state.

  4. Concurrent Worker Safety: COVERED
     - test_fetch_unprocessed_uses_for_update_skip_locked compiles SQL with
       PostgreSQL dialect and asserts "SKIP LOCKED" in rendered query.
     - _process_batch and _process_single both use with_for_update(skip_locked=True).

  5. Dual Delivery Mechanism: COVERED
     - NOTIFY: PostgresNotifyEventSource in event_sources/postgres_notify.py;
       tested in test_postgres_notify_event_source.py (16 unit tests).
     - Polling: _poll_loop in worker.py; always runs as fallback regardless
       of event_source presence; tested via TestOutboxWorkerLifecycle.
     - Integration: test_worker_processes_via_notify_not_polling.

  6. Event Fan-Out: COVERED
     - Multiple handlers: test_handle_fans_out_to_multiple_handlers
       (test_composite.py).
     - Unknown event type causes immediate DLQ (no retry):
       test_unknown_event_type_immediately_moves_to_dlq,
       test_unknown_event_type_dlq_even_at_zero_retries,
       test_retry_not_called_for_unknown_event_type (test_worker.py).

