### NFR Compliance

**Observability (Domain-Oriented)**: All application/domain code uses probe
protocols exclusively. `GraphMutationService` → `GraphServiceProbe.mutations_applied()`.
`MutationApplier` → `MutationProbe.apply_batch_completed()` and `batch_applied()`.
`AgeBulkLoadingStrategy` → `AgeBulkLoadingProbe`. No direct `logger.*` or
`print()` calls in domain/application layers.

**Architecture Boundaries**: `test_architecture.py` uses `pytest-archon` to
enforce that graph domain/application/infrastructure/presentation layers do
not import from `iam`, `management`, `extraction`, `ingestion`, or `querying`
bounded contexts. All 15 architecture tests pass.

**TDD**: Every spec scenario maps to at least one unit test. Tests were written
to reflect domain behavior, not implementation details.

