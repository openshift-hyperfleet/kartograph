### Requirement: Concurrent Worker Safety — COVERED

**Scenario: Concurrent workers**
- Code: Both `OutboxRepository.fetch_unprocessed()` and `OutboxWorker._process_batch()`
  construct the SELECT query with `.with_for_update(skip_locked=True)` — rows claimed
  by one worker session are skipped by concurrent sessions, preventing double processing.
- Unit test: `TestOutboxWorkerConcurrentSafety.test_fetch_unprocessed_uses_for_update_skip_locked`
  (`test_worker.py`) — compiles the query with PostgreSQL dialect and asserts `SKIP LOCKED`
  appears in the SQL string.

