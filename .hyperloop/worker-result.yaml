### Requirement: API Key Revocation — COVERED

**Scenario: Owner revokes own key** — COVERED
- `test_owner_can_revoke_own_key` (integration) — alice creates key, processes outbox, revokes via API → 204
- `test_revokes_existing_key` (service unit) — save called with `is_revoked=True`

**Scenario: Key remains visible with is_revoked=True** — COVERED
- `test_revoked_key_remains_visible_in_listing` (integration) — create → outbox → revoke → list; asserts `is_revoked=True` and key still present

**Scenario: Tenant admin revokes any key** — COVERED
- `test_tenant_admin_can_revoke_other_users_key` (integration) — bob creates key, alice (admin) revokes → 204

**Scenario: Already revoked** — COVERED
- `test_raises_when_already_revoked` (service unit) — `APIKeyAlreadyRevokedError` raised
- `test_returns_409_when_already_revoked` (route unit) — 409 Conflict returned
- `test_revoke_already_revoked_raises_error` (domain unit) — aggregate enforces invariant

**Scenario: Unauthorized revocation** — COVERED
- `test_non_admin_cannot_revoke_other_users_key` (integration) — bob attempts to revoke alice's key → 403
- `test_revoke_api_key_returns_403_when_unauthorized` (route unit)
- `test_revoke_raises_unauthorized_when_denied` (service unit)

