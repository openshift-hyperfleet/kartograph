## Requirement-by-Requirement Findings

### 1. API Key Creation — COVERED

**Scenarios:**

**Successful creation (karto_ prefix, bcrypt hash, 12-char prefix, plaintext returned once)**
- Implementation:
  - `src/api/iam/application/security.py` — `generate_api_key_secret()` produces
    `karto_`-prefixed secrets via `secrets.token_urlsafe(32)`.
  - `src/api/iam/application/security.py` — `extract_prefix()` extracts first 12 chars.
  - `src/api/iam/application/security.py` — `hash_api_key_secret()` uses bcrypt work factor 12.
  - `src/api/iam/application/services/api_key_service.py:129` — plaintext returned as
    part of a tuple exactly once; never stored.
- Tests:
  - `tests/unit/iam/application/test_api_key_service.py`:
    `test_secret_has_karto_prefix`, `test_returns_plaintext_secret_only_at_creation`,
    `test_stores_prefix_from_secret`

**Duplicate name per user → conflict**
- Implementation: `src/api/iam/infrastructure/api_key_repository.py:79–92` — duplicate
  name detected via unique constraint `uq_api_keys_tenant_user_name` on
  `(tenant_id, created_by_user_id, name)`; raises `DuplicateAPIKeyNameError`.
- Tests:
  - `tests/unit/iam/application/test_api_key_service.py`: `test_raises_on_duplicate_name`
  - `tests/unit/iam/presentation/test_api_key_routes.py`: `test_returns_409_on_duplicate_name`

**Expiration bounds (1–3650 days, default 30)**
- Implementation: `src/api/iam/presentation/api_keys/models.py:25–30` —
  `expires_in_days: int = Field(default=30, ge=1, le=3650)`
- Tests:
  - `tests/unit/iam/presentation/test_api_key_routes.py`:
    `test_accepts_optional_expires_in_days`, `test_uses_default_expires_in_days_of_30`,
    `test_validates_expires_in_days_minimum`, `test_validates_expires_in_days_maximum`

