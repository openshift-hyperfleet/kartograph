### 3. Group Retrieval (SHALL) — COVERED

**Authorized retrieval scenario**
- Code: `GroupService.get_group()` fetches from DB, verifies tenant, checks VIEW permission via SpiceDB, returns group.
- Tests: `test_returns_group_when_found_and_user_has_view_permission`.

**Unauthorized or non-existent scenario**
- Code: Returns `None` (route maps to 404) for not-found, wrong tenant, or no VIEW permission.
- Tests: `test_returns_none_when_group_not_found`, `test_returns_none_when_tenant_mismatch`, `test_returns_none_when_user_lacks_view_permission`.

