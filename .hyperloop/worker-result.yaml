#### REQ-2 — Event Processing

**Implementation:**
`infrastructure/outbox/worker.py` — `OutboxWorker._process_entries()` calls `handler.handle()`,
then `_mark_processed()` on success. `_handle_processing_failure()` increments the retry count (via
`_increment_retry`) or moves to DLQ (via `_move_to_dlq`, which sets `failed_at`) once
`retry_count >= max_retries`.

**Scenario: Normal processing** — COVERED
- Unit: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`,
  `test_calls_event_processed_on_success` — verify handler is called and `_mark_processed` writes
  to the session.
- Integration: `TestOutboxWorkerProcessing.test_worker_processes_group_created_and_writes_to_spicedb`
  — calls `_process_batch()`, then asserts `processed_at is not None` and verifies the SpiceDB
  relationship exists.

**Scenario: Transient failure** — COVERED
- Unit: `test_transient_failure_increments_retry_count` — handler raises `RuntimeError`, verifies
  `probe.event_processing_failed` is called and `probe.event_moved_to_dlq` is NOT called.
- Unit: `test_transient_failure_does_not_dlq_immediately` — `ConnectionError` on retry_count=0
  with max_retries=5 → retry, not DLQ.
- Unit: `test_calls_event_processing_failed_on_error` — verifies error message propagation to probe.

**Scenario: Permanent failure (dead letter)** — COVERED
- Unit: `test_max_retries_moves_entry_to_dlq` — entry at `retry_count=2` with `max_retries=3`
  triggers DLQ on next failure; `probe.event_moved_to_dlq` called, `probe.event_processing_failed`
  not called.
- Code: `_move_to_dlq` sets `failed_at=datetime.now(UTC)`; filtered from future polls via
  `WHERE failed_at IS NULL` in `fetch_unprocessed`.

