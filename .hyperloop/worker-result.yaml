## API Keys — task-021 (Fresh Worker Run)

All 6 SHALL requirements and all 17 scenarios from `specs/iam/api-keys.spec.md` are
implemented and covered by tests. 2031 unit tests pass with 0 failures.

### Implementation Summary

**Domain Layer** (`iam/domain/aggregates/api_key.py`):
- `APIKey` aggregate with `create()` factory, `revoke()`, `record_usage()`,
  `is_valid()`, `mark_for_deletion()`, `collect_events()`.
- `APIKeyCreated`, `APIKeyRevoked`, `APIKeyDeleted` domain events.
- Business rule: revoked keys raise `APIKeyAlreadyRevokedError` on double-revoke.
- Business rule: `is_valid()` returns False when revoked OR expired.

**Application Layer** (`iam/application/services/api_key_service.py`):
- `create_api_key()`: checks `CREATE_API_KEY` SpiceDB permission, generates
  `karto_`-prefixed secret, bcrypt-hashes it, stores 12-char prefix.
- `list_api_keys()`: lookups viewable keys via SpiceDB, optional user filter.
- `revoke_api_key()`: checks `REVOKE` SpiceDB permission, marks key revoked.
- `validate_and_get_key()`: prefix-based lookup, bcrypt verify, updates `last_used_at`.
- Default expiration: 30 days; bounds enforced 1–3650 days by Pydantic.

**Security** (`iam/application/security.py`):
- `generate_api_key_secret()`: `karto_` + 32 bytes cryptographic random, URL-safe.
- `extract_prefix()`: first 12 characters for fast lookup.
- `hash_api_key_secret()`: bcrypt work factor 12.
- `verify_api_key_secret()`: constant-time bcrypt check.

**Infrastructure** (`iam/infrastructure/api_key_repository.py`):
- Upsert pattern: saves or updates API key in PostgreSQL.
- `get_by_id()`: tenant-scoped, optional user-scoped lookup.
- `get_verified_key()`: prefix → candidate list → bcrypt verify each; logs
  `ERROR`-level probe event on prefix collision (>1 candidate).
- `list()`: tenant-scoped, optional `api_key_ids` and `user_id` filters.

**SpiceDB Schema** (`shared_kernel/authorization/spicedb/schema.zed`):
- `api_key` resource with `owner` and `tenant` relations.
- `view` permission: `owner + tenant->administrate`.
- `revoke` permission: `owner + tenant->administrate`.
- `tenant` resource: `create_api_key = admin + member`.

**Outbox Translator** (`iam/infrastructure/outbox/translator.py`):
- `APIKeyCreated` → writes `owner` and `tenant` relationships.
- `APIKeyRevoked` → no-op (keep SpiceDB for audit trail; is_revoked flag controls auth).
- `APIKeyDeleted` → deletes `owner` and `tenant` relationships (cascade cleanup).

**Authentication** (`iam/dependencies/user.py`):
- `_authenticate()`: JWT Bearer checked first, then `X-API-Key` header.
- JWT always takes precedence; API key is ignored when Bearer token present.
- Invalid/expired/revoked API keys return 401.

**Cascade Deletion** (`iam/application/services/tenant_service.py`):
- `delete_tenant()` loads all API keys in tenant, calls `mark_for_deletion()` on each
  (emits `APIKeyDeleted` for SpiceDB cleanup), then `repository.delete()`.

**Presentation** (`iam/presentation/api_keys/`):
- `POST /iam/api-keys` — 201 with secret (only time it's returned); 409 duplicate; 403 unauthorized.
- `GET /iam/api-keys` — lists metadata (no secret, no hash); `?user_id=` filter.
- `DELETE /iam/api-keys/{id}` — 204; 404 not found; 409 already revoked; 403 unauthorized.

