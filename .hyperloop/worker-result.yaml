## Spec Coverage (all 6 SHALL requirements, all 15 scenarios)

### 1. API Key Creation — COVERED
- `karto_` prefix: `iam/application/security.py::generate_api_key_secret()`
- Bcrypt hash (work factor 12): `hash_api_key_secret()`
- 12-char prefix stored: `extract_prefix()`
- Plaintext returned once: service returns `(APIKey, plaintext)` tuple
- Duplicate name → 409: unique constraint `(tenant_id, created_by_user_id, name)`
- Expiration 1–3650 days, **default 30**: `Field(30, ge=1, le=3650)` in `models.py`
- **New test:** `test_uses_default_expires_in_days_of_30` verifies default propagates to service

### 2. API Key Authentication — COVERED
- Valid key → authenticated + `last_used_at` updated: `validate_and_get_key()` in service
- **New integration test:** expired key → 401 via direct DB insert (bypasses route minimum)
- Revoked key → 401: `APIKey.is_valid()` checks `is_revoked`
- JWT takes precedence: Bearer checked first in `_authenticate()`
- Prefix collision → error-level log: `api_key_prefix_collision()` DOO probe at error level

### 3. API Key Listing — COVERED
- Metadata returned (name, prefix, created_at, expires_at, last_used_at, is_revoked)
- No secrets in response: `APIKeyResponse` excludes `secret` and `key_hash`
- Filter by `user_id`: optional `created_by_user_id` param passed to repository

### 4. API Key Revocation — COVERED
- Owner revokes own key: SpiceDB `owner` relation → `revoke` permission
- Tenant admin revokes any key: `tenant->administrate` relation
- Already revoked → 409: `APIKeyAlreadyRevokedError` mapped to 409
- Unauthorized → 403: `UnauthorizedError` mapped to 403
- **New integration test:** revoked key visible in listing with `is_revoked=True`
  (chains create → process-outbox → revoke → list)

### 5. API Key Cascade Deletion — COVERED
- Tenant deletion cascades to API keys: `tenant_service.py` lists and deletes all keys
- **6 new cascade tests:** single key, multiple keys, event emission, repo query, probe,
  ordering (keys deleted before tenant)

### 6. API Key Name Validation — COVERED
- Valid name (1–255 chars): `Field(min_length=1, max_length=255)`
- Empty name → 422: enforced by Pydantic

