#### Requirement: Permission Inheritance — COVERED

**Scenario: Workspace-inherited access — COVERED**
- Implementation: `shared_kernel/authorization/spicedb/schema.zed` defines for `knowledge_graph`:
  ```
  permission view   = admin + editor + viewer + workspace->view
  permission edit   = admin + editor + workspace->edit
  permission manage = admin + workspace->manage
  ```
  Outbox translator writes the `workspace` relationship on `KnowledgeGraphCreated`.
- Tests (integration, verified against live SpiceDB ReBAC):
  - `tests/integration/management/test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_editor_can_view_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_editor_can_edit_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_editor_cannot_manage_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_admin_can_manage_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_member_can_view_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_workspace_member_cannot_edit_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_authorization.py::TestWorkspaceInheritedKnowledgeGraphAccess::test_user_without_workspace_role_cannot_access_knowledge_graph`

**Scenario: Direct grant — COVERED**
- Implementation: Schema defines `admin`, `editor`, `viewer` direct relations included in all permission rules.
- Tests:
