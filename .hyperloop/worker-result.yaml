**Requirement: Knowledge Graph Deletion** — COVERED

Implementation:
- `KnowledgeGraphService.delete()` checks MANAGE on the KG.
- Single `async with self._session.begin()` block wraps: credential secret deletion,
  data source cascade deletion, KG deletion.
- Exception mid-cascade propagates out of `begin()` block → SQLAlchemy rolls back.
- `KnowledgeGraphDeleted` event → outbox → `_translate_knowledge_graph_deleted()` deletes
  workspace relationship, tenant relationship, and all direct admin/editor/viewer grants
  via `DeleteRelationshipsByFilter`.

Scenario — Successful deletion (atomic cascade): COVERED
- Tests: `test_delete_cascades_data_sources`,
  `test_delete_cascades_encrypted_credentials`,
  `test_delete_knowledge_graph_returns_204`

Scenario — Rollback on failure: COVERED
- Test: `test_delete_rolls_back_on_ds_deletion_failure` — confirms `kg_repo.delete`
  is never called when a DS deletion raises.

Scenario — Mutation after deletion: COVERED
- Test: `test_update_raises_after_deletion` — domain aggregate raises
  `AggregateDeletedError` after `mark_for_deletion()`.

---

**Requirement: Permission Inheritance** — COVERED

Implementation:
- SpiceDB schema (`schema.zed`):
  `view = admin + editor + viewer + workspace->view`
  `edit = admin + editor + workspace->edit`
  `manage = admin + workspace->manage`

Scenario — Workspace-inherited access: COVERED
- Integration tests: `TestWorkspaceInheritedKnowledgeGraphAccess` —
  workspace editor → view+edit on KG;
  workspace admin → manage on KG;
  workspace member → view only (not edit).

Scenario — Direct grant: COVERED
- Integration tests: `TestDirectGrantKnowledgeGraphAccess` —
  direct KG admin → manage + edit + view confirmed via live SpiceDB checks.

