All workspace spec requirements are fully implemented and tested.

## Summary

The workspace feature (specs/iam/workspaces.spec.md) is completely implemented across all DDD layers:

### Domain Layer
- `Workspace` aggregate with root/child hierarchy, name validation (1–512 chars), and event emission.
- `WorkspaceMember` value objects for user and group members.
- Domain events: `WorkspaceCreated`, `WorkspaceRenamed`, `WorkspaceDeleted`, and member events.

### Application Layer
- `WorkspaceService`: create, get, list, rename, delete with all spec scenarios.
- Authorization checks: `create_child`, `view`, `manage` permission guards.
- Last-admin protection: rejects demoting or removing the sole admin.
- Root workspace cannot be deleted (ConflictError).
- Workspaces with children cannot be deleted (ConflictError).
- Duplicate name within tenant is rejected (ConflictError).
- Unauthorized access returns not-found (no information leakage).

### Infrastructure Layer
- `WorkspaceRepository` with SQLAlchemy + PostgreSQL, outbox pattern integration.
- Database migrations: workspaces table, unique constraint on (tenant_id, name).

### Presentation Layer
- FastAPI routes: POST, GET, LIST, DELETE for workspaces; POST, GET, DELETE for members.
- Role update route for changing member roles.

### Authorization (SpiceDB)
- Three-tier role hierarchy in schema.zed: admin → manage + edit + view, editor → edit + view, member → view.
- `creator_tenant` relation grants all tenant members `create_child` permission on root workspace.

### Test Coverage
- 2461 unit tests pass (0 failures).
- Tests cover every spec scenario: root workspace properties, cannot-delete root, child creation,
  duplicate name rejection, unauthorized creation → not-found, name validation, retrieval,
  listing with permission filter, rename, delete leaf/root/with-children, member add/remove/change-role,
  last-admin protection, member listing, and all three-tier role hierarchy cases.

