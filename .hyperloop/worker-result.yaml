### Requirement: Data Source Connection — COVERED

**Implementation:** `pages/data-sources/index.vue` implements a multi-step wizard with adapter type selection, GitHub-specific fields, credential handling, and name inference.

**Tests:** COVERED (`data-sources.test.ts` — "Data Sources Wizard - Step Navigation", "Form Validation", "Token Visibility"). Tests cover: adapter selection requirement, required field validation, name inference from repo URL, token visibility toggle.

**Note:** Credential handling (plaintext not persisted in browser) is implemented via transient state (never written to localStorage), but there is no explicit test asserting credentials are never stored in localStorage/sessionStorage.

