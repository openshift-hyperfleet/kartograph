### Requirement: Timeout Enforcement

#### Scenario A – Query within timeout → results returned normally
**Status: COVERED**

- **Implementation**: `execute_cypher` sets `SET LOCAL statement_timeout = {ms}`
  and returns results on the success path.
- **Unit tests**: `test_returns_empty_list_on_no_results`,
  `test_uses_transaction_context`, `test_sets_statement_timeout`.
- **Integration tests**: `test_executes_simple_query`,
  `test_execute_cypher_query_custom_timeout`.

#### Scenario B – Query exceeds timeout → timeout error with correlation ID
**Status: PARTIAL → FAIL**

- **Implementation**: `execute_cypher` catches exceptions containing `"timeout"`
  or `"canceling statement"` and raises `QueryTimeoutError` with a UUID
  correlation ID.
- **Unit tests**: Thorough — `test_timeout_raises_query_timeout_error`,
  `test_timeout_error_has_correlation_id`,
  `test_timeout_error_includes_correlation_id_in_response`,
  `test_timeout_error_correlation_id_included_in_probe_call`.
- **Integration test gap**: `test_execute_cypher_query_timeout_error` asserts
  `result.error_type in ["timeout", "execution_error"]`. This loose assertion
  means a regression where timeouts are misclassified as `"execution_error"`
  would not be detected. The test must assert `result.error_type == "timeout"`.
- **What is needed**: Tighten the integration test assertion to
  `assert result.error_type == "timeout"`.

