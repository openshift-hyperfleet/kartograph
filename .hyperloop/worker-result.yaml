### Implementation Summary

Full API key lifecycle is implemented across all DDD layers in the IAM bounded
context, covering every spec requirement and scenario.

**Domain Layer** (`iam/domain/aggregates/api_key.py`)
- `APIKey` aggregate with `create()`, `revoke()`, `mark_for_deletion()`,
  `record_usage()`, `is_valid()`, and `collect_events()`.
- Emits `APIKeyCreated`, `APIKeyRevoked`, `APIKeyDeleted` domain events.
- `is_valid()` checks both `is_revoked` and `expires_at`.
- `revoke()` raises `APIKeyAlreadyRevokedError` if already revoked.

**Application Layer** (`iam/application/services/api_key_service.py`)
- `create_api_key`: SpiceDB `CREATE_API_KEY` permission check, secret
  generation with `karto_` prefix, bcrypt hash, 12-char prefix extraction,
  expiration calculation. Returns `(APIKey, plaintext_secret)`.
- `list_api_keys`: SpiceDB `lookup_resources` for `VIEW` permission; optional
  `user_id` filter for creator filtering.
- `revoke_api_key`: 404 check → SpiceDB `REVOKE` permission check → revoke.
- `validate_and_get_key`: prefix-based lookup → bcrypt verify → `is_valid()`
  → `record_usage()` → commit.

**Security** (`iam/application/security.py`)
- `generate_api_key_secret()`: generates secret with `karto_` prefix.
- `hash_api_key_secret()`: bcrypt hash storage.
- `extract_prefix()`: extracts first 12 characters for fast lookup.
- `verify_api_key_secret()`: bcrypt comparison.

**Infrastructure** (`iam/infrastructure/api_key_repository.py`)
- `get_verified_key()`: prefix-based lookup with bcrypt comparison for each
  candidate; error-level log on prefix collision.
- `list()`: filters by `api_key_ids` from SpiceDB, optional tenant/creator.
- `save()`: persists to PostgreSQL and drains domain events to outbox.
- `delete_by_tenant()`: bulk delete for cascade on tenant deletion.

**Presentation** (`iam/presentation/api_keys/routes.py`)
- `POST /iam/api-keys`: validates name (1–255 chars), `expires_in_days`
  (1–3650, default 30). Returns 201 with one-time `secret`. 409 duplicate.
- `GET /iam/api-keys`: metadata list; never includes `secret`/`key_hash`.
- `DELETE /iam/api-keys/{id}`: 204 success. 404 not found. 409 already revoked.

**Authentication** (`iam/dependencies/authenticate.py`)
- JWT Bearer takes precedence over `X-API-Key` header.
- Returns 401 with `WWW-Authenticate: Bearer, API-Key` on failure.

**Cascade Deletion** (`iam/application/services/tenant_service.py`)
- `delete_tenant()` calls `_api_key_repository.delete_by_tenant()` before
  deleting the tenant.

