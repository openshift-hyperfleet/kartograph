### Spec Requirements Coverage

All 6 SHALL requirements and all 11 scenarios are COVERED.

**Transactional Event Storage** — COVERED
- `OutboxRepository.append()` calls `session.add()` only; never commits. Calling
  service owns the transaction boundary. Both success and rollback scenarios verified
  by unit and integration tests.

**Event Processing** — COVERED
- `OutboxWorker._process_entries()` dispatches, marks processed, handles transient
  failures (increment retry), and permanent failures (move to DLQ).

**Idempotent Event Handlers** — COVERED
- SpiceDB handler uses TOUCH semantics. `fetch_unprocessed` filters `processed_at IS NULL`
  and `failed_at IS NULL`. Duplicate delivery test confirms identical final state.

**Concurrent Worker Safety** — COVERED
- `fetch_unprocessed()` and `_process_batch()` use `.with_for_update(skip_locked=True)`.
- `test_fetch_unprocessed_uses_for_update_skip_locked` compiles against PostgreSQL dialect
  and asserts `"SKIP LOCKED"` in output.

**Dual Delivery Mechanism** — COVERED
- `PostgresNotifyEventSource` listens on `outbox_events` channel via asyncpg-listen.
- Polling fallback runs every `poll_interval_seconds` (default 30s) using
  `asyncio.wait_for(_shutdown_event.wait(), timeout=...)` for clean shutdown.

**Event Fan-Out** — COVERED
- `CompositeEventHandler.handle()` dispatches to all registered handlers for the event type.
- `UnknownEventTypeError` raised for unregistered event types; caught before generic
  `Exception` handler in worker; immediately moves to DLQ without retry increment.

