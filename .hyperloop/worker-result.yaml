### Implementation Quality Notes

The task-017 implementation delivers the full Outbox pattern across 4 implementation
commits:

**`feat(shared-kernel)`: UnknownEventTypeError**
New `shared_kernel/outbox/exceptions.py` introduces `UnknownEventTypeError` — a
domain exception (not `ValueError`) for permanent outbox failures when no handler is
registered for an event type. Exposes `.event_type` and `.registered_types` for
diagnostics. 6-test unit suite verifies the contract.

**`fix(management)`: cascade delete credential cleanup**
`KnowledgeGraphService.delete()` now accepts an optional `ISecretStoreRepository` and
calls `secret_store.delete(path, tenant_id)` for each `DataSource` that has a
`credentials_path` before deleting the row. Tests replaced `MagicMock(spec=DataSource)`
with real `DataSource` instances via `_make_ds()` helper, eliminating mock brittleness.

**`fix(process)`: check scripts**
`check-cascade-delete-empty-collection-mocks.sh` and `check-new-checks-pass-on-head.sh`
added to close pre-existing gaps in the process infrastructure.

**Outbox worker — UnknownEventTypeError handling**
`CompositeEventHandler.handle()` now raises `UnknownEventTypeError` (replacing the
former `ValueError`). `OutboxWorker._process_entries()` catches `UnknownEventTypeError`
before the generic `Exception` handler and immediately calls `_move_to_dlq()` — no
retry count increment. Tests verify the complete permanent vs transient failure
distinction including `_increment_retry` not being called.

All 6 spec SHALL requirements and all 11 scenarios are covered.
