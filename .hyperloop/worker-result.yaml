### REQ-5: Cascade Deletion — COVERED

**Scenario 5.1 — Tenant deletion cascades to API keys; auth relationships cleaned up**
- Code: `iam/application/services/tenant_service.py::delete_tenant()` — lists all API keys by `tenant_id`, calls `api_key.mark_for_deletion()` then `api_key_repository.delete(api_key)` for each.
- Code: `iam/domain/aggregates/api_key.py::mark_for_deletion()` — emits `APIKeyDeleted` domain event that drives SpiceDB relationship cleanup via outbox.
- Tests: `test_tenant_service.py::TestDeleteTenant` — six distinct tests covering:
  - `test_deletes_api_keys_on_tenant_deletion` (single key)
  - `test_deletes_multiple_api_keys_on_tenant_deletion` (3 keys, all deleted)
  - `test_api_key_mark_for_deletion_emits_deleted_event` (asserts `APIKeyDeleted` event on the key passed to `delete()`, verifying SpiceDB cleanup path)
  - `test_api_key_repo_queried_by_tenant_on_deletion` (correct `tenant_id` passed to `list()`)
  - `test_cascade_deletion_probe_reports_api_key_count`

