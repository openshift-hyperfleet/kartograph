### Requirement: API Key Listing — COVERED (with minor observations)

**Scenario: List keys**
- Implementation: `GET /iam/api-keys` → `APIKeyResponse.from_domain()` serializes all
  required fields: `name`, `prefix`, `created_at`, `expires_at`, `last_used_at`,
  `is_revoked`. The Pydantic model defines all as required (no Optional except
  `last_used_at`).
- Tests:
  - `test_lists_api_keys_for_user` (route unit) — asserts 200, `id`, `name` present.
  - `test_never_returns_secret_or_hash` (route unit) — confirms `secret`, `key_hash`
    absent.
  - **Note:** No test explicitly asserts all six metadata fields from the spec are
    present in the response (prefix, created_at, expires_at, last_used_at, is_revoked).
    The Pydantic model guarantees this structurally, but no assertion covers it.
    Non-blocking because model definition enforces it.

**Scenario: Filter by creator**
- Implementation: `user_id` query param validated and parsed to `UserId`; passed as
  `created_by_user_id` to `service.list_api_keys()`.
- Tests:
  - `test_filters_by_created_by_user_id` (service unit) — verifies repository receives
    filter `created_by_user_id`.
  - `test_returns_400_for_empty_user_id` (route unit) — validates blank user_id rejected.
  - **Note:** No route-level happy-path test verifies that `GET /iam/api-keys?user_id=<valid>`
    causes the service to be called with the filter. The service test covers the
    behavior; the route code is correct. This is a minor gap in route-layer coverage only.

