### Requirement 4: Concurrent Worker Safety — COVERED

**Implementation:**
- `infrastructure/outbox/repository.py` `fetch_unprocessed()` (line 97):
  `.with_for_update(skip_locked=True)` — PostgreSQL `FOR UPDATE SKIP LOCKED`
  ensures each row is claimed by exactly one worker.
- `infrastructure/outbox/worker.py` `_process_batch()` (line 206) and
  `_process_single()` (line 227): same locking applied in worker layer.

**Scenarios:**

| Scenario | Test | File |
|---|---|---|
| Concurrent workers, FOR UPDATE SKIP LOCKED | `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked` | `tests/unit/infrastructure/outbox/test_worker.py` |

*Test compiles the query with a PostgreSQL dialect and asserts "SKIP LOCKED"
is present in the emitted SQL.*

