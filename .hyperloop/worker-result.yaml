### Spec Coverage

All 6 SHALL requirements from the spec are covered by implementation and tests:

1. **Transactional Event Storage** — `OutboxRepository.append()` shares caller's `AsyncSession`, never commits independently. Tests verify `commit` is not called.
2. **Event Processing** — Worker handles normal path, transient failures (increment retry), and permanent failures (move to DLQ after max_retries). Tests: `test_transient_failure_increments_retry_count`, `test_max_retries_moves_entry_to_dlq`.
3. **Idempotent Event Handlers** — `fetch_unprocessed()` uses `processed_at IS NULL AND failed_at IS NULL`. SpiceDB writes are idempotent upserts. New unit and integration tests verify duplicate invocations produce identical state.
4. **Concurrent Worker Safety** — `FOR UPDATE SKIP LOCKED` confirmed by compiling query with PostgreSQL dialect. Test: `test_fetch_unprocessed_uses_for_update_skip_locked`.
5. **Dual Delivery Mechanism** — Poll loop (`_poll_loop`) + optional `PostgresNotifyEventSource`. Graceful shutdown uses `_shutdown_event` to interrupt sleep without `task.cancel()`.
6. **Event Fan-Out / Unknown Event Type** — `CompositeEventHandler` dispatches to all registered handlers. Unknown types raise `UnknownEventTypeError`, immediately DLQ'd by worker. Tests: `test_unknown_event_type_immediately_moves_to_dlq`, `test_retry_not_called_for_unknown_event_type`.

