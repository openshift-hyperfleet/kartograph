in tests. Not a FAIL.

### Sync Monitoring — COVERED

**Code:** `app/pages/data-sources/index.vue` — sync run display, phase badges, history,
logs sheet, manual trigger.

**Tests:** `sync-monitoring-extended.test.ts` (30+ tests across 5 describe blocks)
- Active sync phase display: `getSyncPhaseLabel()` tested for pending/running/completed/failed
- Badge variants: `getSyncBadgeVariant()` — secondary for active, default for completed,
  destructive for failed
- Sync history: `computeSyncDuration()`, history list with status/timestamp/duration/error
- Manual sync trigger: `triggerSync()` — POST to correct URL, success message, failure fallback
- Tenant switch refresh: dataSources cleared + loadDataSources called on tenantVersion change

Note on phase labels: The spec says "ingesting, extracting, applying" as phase descriptions.
The implementation uses `pending/running/completed/failed` status values. The tests verify
"In Progress" for "running" rather than separate ingesting/extracting/applying labels. The
spec's parenthetical "(ingesting, extracting, applying)" appears to describe conceptual phases
within a running sync, not required UI label strings. Acceptable as-is.

