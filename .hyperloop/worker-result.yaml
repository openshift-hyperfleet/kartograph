### Requirement: Dual Delivery Mechanism — COVERED

**Scenario: Real-time notification**
- Code: Migration `d32ecc44581a_create_outbox_notify_trigger.py` creates a PostgreSQL
  trigger `outbox_after_insert` that calls `pg_notify('outbox_events', NEW.id::text)`
  on every INSERT. `PostgresNotifyEventSource.start()` listens on `outbox_events` via
  `asyncpg-listen` and invokes the `_process_single(entry_id)` callback.
  `OutboxWorker.start()` creates a task for the event source in parallel with the
  poll loop.
- Unit tests: `TestPostgresNotifyEventSourceNotify` (`test_postgres_notify_event_source.py`)
  — verifies callback is invoked with UUID on valid NOTIFY, multiple events invoke
  multiple callbacks, invalid payloads are ignored.
- Integration test: `TestOutboxWorkerNotifyProcessing.test_worker_processes_via_notify_not_polling`
  — starts real worker with `poll_interval_seconds=999`, inserts group (triggers
  `pg_notify`), waits 500 ms, asserts `processed_at` is set via NOTIFY path (not polling).

**Scenario: Polling fallback**
- Code: `OutboxWorker._poll_loop()` always runs as a task in `start()`, calling
  `_process_batch()` every `poll_interval_seconds` (default 30, as set in
  `infrastructure/settings.py` and `worker.py` default parameter). The poll loop
  runs regardless of whether an event source is present.
- Tests: Integration tests (`test_worker_processes_group_created_and_writes_to_spicedb`,
  `test_worker_processes_member_added_and_writes_to_spicedb`) call `_process_batch()`
  directly, which is exactly what the poll loop executes. Unit tests in
  `TestOutboxWorkerProcessBatch` confirm batching behavior. The `test_in_progress_batch_completes_before_shutdown`
  test injects a slow `_process_batch` through the full poll loop path.

