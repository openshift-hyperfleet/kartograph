### Requirement: Idempotent Event Handlers — COVERED

**Scenario: Duplicate delivery**
- Implementation: `SpiceDBEventHandler.handle()` issues `write_relationship` calls, which are
  upserts in SpiceDB — writing the same tuple twice leaves exactly one tuple.
- Unit test: `TestSpiceDBEventHandlerIdempotency.test_duplicate_invocation_produces_identical_final_state`
  uses `FakeAuthorizationProvider` (set-based, not AsyncMock) — two identical handle() calls
  produce the same `frozenset` of relationships.
- Integration test: `TestIdempotentEventHandlers.test_handler_invoked_twice_produces_same_spicedb_state`
  — calls handler once manually (simulating crash before mark_processed), then runs worker
  batch again; verifies `processed_at` is set and SpiceDB state is unchanged.

