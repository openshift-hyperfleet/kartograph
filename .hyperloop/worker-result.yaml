### Requirement: Username Uniqueness (SHALL) — COVERED

**Scenario: Unique username**
- Implementation: `src/api/infrastructure/models/user.py` line 25 — `username: Mapped[str] = mapped_column(String(255), nullable=False, unique=True)`.
- Integration test: `test_user_repository.py::test_saves_and_retrieves_user` — unique username allows creation and retrieval.

**Scenario: Duplicate username**
- Implementation: `src/api/iam/infrastructure/user_repository.py` — `save()` has `await self._session.flush()` at line 77 **inside the `try` block** (lines 56–84), ensuring `IntegrityError` is caught and translated to `ProvisioningConflictError(user.username)`. Message hides DB internals.
- `src/api/iam/dependencies/user.py` — catches `ProvisioningConflictError` and raises `HTTPException(status_code=409)`.
- Unit test (repository): `tests/unit/iam/infrastructure/test_user_repository.py::test_translates_integrity_error_to_provisioning_conflict` — verifies `ProvisioningConflictError` raised (not `IntegrityError`), `exc_info.value.username == "alice"`.
- Integration test: `test_user_repository.py::test_duplicate_username_raises_provisioning_conflict_error` — verifies against live PostgreSQL; asserts `"IntegrityError" not in error_message` and `"duplicate key" not in error_message.lower()`.
- Dependency test: `test_authenticated_user_dependency.py::test_raises_http_409_when_username_conflict_occurs` — asserts `status_code == 409`, no DB internals in `detail`.

