### Implementation Quality Notes

All four spec requirements are fully implemented and well-tested:

**Adapter Port**: `IDatasourceAdapter` Protocol in `ingestion/ports/adapters.py` with
strict domain isolation — no dlt, httpx, or infrastructure imports. `ExtractionResult`
is a frozen dataclass (immutable value object). Architecture tests enforce these rules.

**GitHub Adapter**: `GitHubAdapter` in `ingestion/infrastructure/adapters/github.py`
covers full refresh (Trees API `?recursive=1`), incremental sync (Compare API), content
fetching (Blobs API with base64 decode), credential injection via `credentials["token"]`,
checkpoint carry-forward via HEAD commit SHA. Clean separation from the port layer.

**Pluggable Credential Backend**: `ICredentialReader` Protocol in `shared_kernel/credential_reader.py`
with `retrieve(path, tenant_id) -> dict[str, str]`. Ingestion depends only on the shared
kernel port — not on Management internals. Archon test enforces this.

**dlt Framework Integration**: `DltAdapterRunner` uses `run_in_executor` for non-blocking
async, creates a dedicated event loop per thread for the async adapter, stores checkpoint
state in `dlt.current.resource_state()` (persisted to `dlt_internal` schema in production,
JSON files in tests). Output files (`changeset.jsonl` + `blobs/{hex_digest}`) written
before the dlt load completes, ensuring downstream JobPackager availability. State
round-trip between runner instances is verified by `test_state_survives_runner_object_recreation`.

Branch is rebased on current alpha (merge commit `573c8530`). No conflicts remain.
