## Task 017: Outbox Pattern — Worker Verdict

Spec: `specs/shared-kernel/outbox.spec.md`
Branch: `hyperloop/task-017`
Unit tests: **2187 passed, 0 failed**

All 6 SHALL requirements from the spec are implemented and verified by tests.

### REQ-1: Transactional Event Storage

- `OutboxRepository.append()` calls only `session.add()`, never `session.commit()`.
  The calling service owns the transaction boundary — atomicity is guaranteed.
- Migration `6d11eae0e76d_create_outbox_table.py` creates the table;
  `a1b2c3d4e5f6_add_outbox_retry_columns.py` adds retry/DLQ columns.
- Tests: `tests/unit/infrastructure/outbox/test_repository.py`,
  `TestOutboxWorkerTransactionAtomicity`
- Integration: `tests/integration/iam/test_outbox_consistency.py`
  (rollback scenario verified end-to-end)

### REQ-2: Event Processing (normal, retry, DLQ)

- `OutboxWorker._poll_loop()` drives polling every `poll_interval_seconds`.
- `_handle_processing_failure()`: increments `retry_count`; when
  `retry_count + 1 >= max_retries` → `_move_to_dlq()` sets `failed_at`.
- `UnknownEventTypeError` → immediately dead-lettered, no retry.
- Tests: `TestOutboxWorkerProcessBatch`, `TestOutboxWorkerRetryBehavior`

### REQ-3: Idempotent Event Handlers

- SpiceDB `write_relationship` has upsert semantics; duplicate delivery is safe.
- `fetch_unprocessed()` filters `processed_at IS NULL AND failed_at IS NULL`.
- Tests: `TestSpiceDBEventHandlerIdempotency`

### REQ-4: Concurrent Worker Safety

- All SELECT queries use `.with_for_update(skip_locked=True)` — both
  `_process_batch()` (polling) and `_process_single()` (NOTIFY path).
- Tests: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`
  compiles the SQLAlchemy statement and asserts `"SKIP LOCKED"` in the SQL.

### REQ-5: Dual Delivery Mechanism

- Migration `d32ecc44581a_create_outbox_notify_trigger.py` installs a
  PostgreSQL trigger: `pg_notify('outbox_events', NEW.id::text)` on INSERT.
- `PostgresNotifyEventSource` (using `asyncpg-listen`) handles real-time delivery.
- `OutboxWorker.start()` always launches `_poll_loop()` (30s default fallback)
  AND optionally the NOTIFY event source.
- Tests: `TestPostgresNotifyEventSourceNotify`

### REQ-6: Event Fan-Out

- `CompositeEventHandler.register()` builds `dict[str, list[EventHandler]]`;
  multiple handlers per event type achieve fan-out.
- Unknown event types raise `UnknownEventTypeError` → immediate DLQ.
- Tests: `TestCompositeEventHandler`, `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`
