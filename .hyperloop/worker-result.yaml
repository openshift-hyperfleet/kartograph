### Requirement: Idempotent Event Handlers — COVERED

**Code:**
- `infrastructure/outbox/spicedb_handler.py` — delegates to `authz.write_relationship()` which
  uses SpiceDB upsert (set semantics). Duplicate writes produce identical state.
- `infrastructure/outbox/repository.py::fetch_unprocessed()` — filters `processed_at IS NULL
  AND failed_at IS NULL` to prevent reprocessing.

