## Graph Mutations Implementation — task-003 (fresh attempt)

All 2017 unit tests pass. All 10 spec requirements are fully implemented and tested.

### Implementation Summary

The Graph Mutations feature is implemented across the DDD layers of the `graph`
bounded context:

**Domain** (`graph/domain/value_objects.py`):
- `MutationOperation` — JSONL operation model with `validate_operation()` enforcing
  all system property requirements on CREATE (data_source_id, source_path, slug for
  nodes, knowledge_graph_id).
- `TypeDefinition` — schema model for DEFINE operations.
- `MutationResult` — operation result (success, count, errors).
- System property constants: `COMMON_SYSTEM_PROPERTIES`, `NODE_SYSTEM_PROPERTIES`,
  `PLATFORM_STAMPED_PROPERTIES`.
- `ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` — enforces deterministic ID format.

**Application** (`graph/application/services/graph_mutation_service.py`):
- `GraphMutationService.apply_mutations()` — stamps `knowledge_graph_id` before
  validation (callers cannot spoof it), processes DEFINE ops (auto-adds system
  properties), validates CREATE against type definitions, delegates to applier,
  then runs schema learning.
- `apply_mutations_from_jsonl()` — JSONL parser with line-number error reporting
  and blank-line skipping.
- `_stamp_knowledge_graph_id()` — overwrites any caller-supplied value.
- `_discover_optional_properties()` — schema learning for CREATE and UPDATE ops,
  excluding platform-stamped properties.

**Infrastructure** (`graph/infrastructure/mutation_applier.py`):
- `MutationApplier._sort_operations()` — enforces: DEFINE → DELETE-edge →
  DELETE-node → CREATE-node → CREATE-edge → UPDATE.
- Delegates to `AgeBulkLoadingStrategy` which uses PostgreSQL COPY for bulk
  writes with idempotent UPSERT (jsonb `||` merge preserves existing properties).

**Presentation** (`graph/presentation/routes.py`):
- `POST /graph/knowledge-graphs/{kg_id}/mutations` — enforces SpiceDB `edit`
  permission; passes `knowledge_graph_id` to service for stamping; returns 403
  on permission denial, 422 on validation errors, 500 on database errors.

**Dependencies** (`graph/dependencies.py`):
- `get_tenant_graph_name()` → `tenant_{tenant_id}` for per-tenant AGE graph isolation.

