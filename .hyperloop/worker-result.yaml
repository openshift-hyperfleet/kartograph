### Requirement: Knowledge Graph Deletion — COVERED

**Scenario: Successful deletion (atomic cascade)**
- `KnowledgeGraphService.delete()` checks `Permission.MANAGE`, executes inside
  `async with self._session.begin()` — data sources deleted (with encrypted credential
  cleanup via `secret_store.delete(path, tenant_id)`), then KG deleted, then SpiceDB
  relationships cleaned up (workspace, tenant, and all direct grants via filter-based
  deletion). Single transaction ensures atomicity.
- Route: `DELETE /management/knowledge-graphs/{id}` → 204 No Content.
- Tests:
  - `TestKnowledgeGraphServiceDelete::test_delete_cascades_data_sources`
  - `TestKnowledgeGraphServiceDelete::test_delete_cascades_encrypted_credentials`
  - `TestKnowledgeGraphServiceDelete::test_delete_rolls_back_on_ds_deletion_failure`
  - `TestDeleteKnowledgeGraph::test_delete_knowledge_graph_returns_204`

**Scenario: Mutation after deletion**
- `KnowledgeGraph.update()` raises `AggregateDeletedError` when `_deleted is True`.
- Test: `TestKnowledgeGraphUpdate::test_update_raises_after_deletion`

