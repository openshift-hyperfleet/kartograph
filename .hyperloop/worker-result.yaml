## Task-021: API Keys — Implementation Complete

### Date: 2026-04-23

All 6 SHALL requirements from `specs/iam/api-keys.spec.md` are implemented, tested, and passing.

## Verification

### Unit Tests
- **2031 tests pass** (`cd src/api && uv run pytest tests/unit -v`)
- No regressions detected

### Implementation Summary

#### Requirement 1: API Key Creation
- `iam/application/services/api_key_service.py` — `create_api_key()` checks `CREATE_API_KEY` permission via SpiceDB, generates `karto_`-prefixed secret, stores bcrypt hash, extracts 12-char prefix
- `iam/application/security.py` — `generate_api_key_secret()`, `extract_prefix()`, `hash_api_key_secret()` (bcrypt work factor 12)
- `iam/presentation/api_keys/models.py` — `CreateAPIKeyRequest` enforces `min_length=1`, `max_length=255`, `expires_in_days` default=30, `ge=1`, `le=3650`
- `iam/infrastructure/api_key_repository.py` — duplicate name detection per user+tenant raises `DuplicateAPIKeyNameError`

#### Requirement 2: API Key Authentication
- `iam/dependencies/user.py` — JWT-first precedence in `_authenticate()`, falls through to X-API-Key only when no Bearer token
- `iam/application/services/api_key_service.py` — `validate_and_get_key()` returns None for revoked/expired keys; calls `record_usage()` on valid key
- `iam/infrastructure/api_key_repository.py` — `get_verified_key()` queries by prefix, bcrypt-checks all candidates, logs error on prefix collision

#### Requirement 3: API Key Listing
- `iam/application/services/api_key_service.py` — `list_api_keys()` uses SpiceDB `lookup_resources` for VIEW permission, then filters by tenant + optional `created_by_user_id`
- `iam/presentation/api_keys/models.py` — `APIKeyResponse` has no `secret` or `key_hash` field

#### Requirement 4: API Key Revocation
- `iam/application/services/api_key_service.py` — `revoke_api_key()` loads key, checks REVOKE permission via SpiceDB, calls `api_key.revoke()`
- `iam/domain/aggregates/api_key.py` — `revoke()` raises `APIKeyAlreadyRevokedError` if already revoked; revoked key persists with `is_revoked=True`
- SpiceDB schema: `api_key#revoke = owner + tenant->administrate`

#### Requirement 5: API Key Cascade Deletion
- `iam/application/services/tenant_service.py` — `delete_tenant()` iterates all tenant API keys, calls `mark_for_deletion()` + `delete()` on each
- `APIKeyDeleted` domain event drives SpiceDB relationship cleanup via outbox pattern

#### Requirement 6: API Key Name Validation
- `iam/presentation/api_keys/models.py` — `CreateAPIKeyRequest.name: str = Field(..., min_length=1, max_length=255)`

