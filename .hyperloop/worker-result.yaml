## Summary

Addressed the single PARTIAL finding from the spec-alignment review:
`KnowledgeGraphService.delete()` was not deleting encrypted credentials
from the secret store during the cascade delete of data sources.

## Changes Made

### TDD cycle followed

1. **Tests written first** (`test_knowledge_graph_service.py`):
   - Added `mock_secret_store` fixture (AsyncMock).
   - Updated `service` fixture to pass `secret_store=mock_secret_store`.
   - Set explicit `credentials_path = None` on mock DS objects in the rollback
     test (to avoid MagicMock truthy ambiguity).
   - Added `test_delete_cascades_encrypted_credentials`: verifies
     `secret_store.delete` is called exactly once for the DS with a
     `credentials_path`, and not called for DSes without one.
   - Tests confirmed to **fail** before implementation (28 errors).

2. **Implementation** (`knowledge_graph_service.py`):
   - Imported `ISecretStoreRepository` from `management.ports.secret_store`.
   - Added `secret_store: ISecretStoreRepository | None = None` to `__init__`.
   - In `delete()`, for each DS in the cascade loop, calls
     `await self._secret_store.delete(path=ds.credentials_path, tenant_id=...)`
     before the repository delete — matching `DataSourceService.delete()`.

3. **Dependency wiring** (`management/dependencies/knowledge_graph.py`):
   - Constructed and injected `FernetSecretStore` into `KnowledgeGraphService`
     — consistent with how `DataSourceService` is wired.

### Test results

- All 28 KG service unit tests pass.
- Full unit suite: **2056 passed, 0 failed**.
- Pre-commit hooks (ruff, ruff-format, mypy): **all passed**.

