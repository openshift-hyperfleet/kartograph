## Spec Coverage

All requirements from the knowledge-graphs spec are implemented and tested:

- **Creation with ULID + authz setup** — `create()` checks `edit` on workspace, generates ULID, writes SpiceDB relationships
- **Duplicate name rejection** — `DuplicateKnowledgeGraphNameError` mapped to 409
- **Name validation (1–100 chars)** — `KnowledgeGraphName` value object enforces constraints; Pydantic validates at boundary
- **Retrieval (no unauthorized/missing distinction)** — `get()` returns `None` for both missing and unauthorized; route returns 404
- **Listing by workspace (auth-filtered)** — `list_for_workspace()` checks view on workspace then filters per KG
- **Global listing** — `list_all()` filters entire tenant by per-KG VIEW permission
- **Update (name + description)** — requires `edit` on KG; duplicate name raises 409
- **Deletion cascade (atomic)** — deletes encrypted credentials, data sources, KG record, and SpiceDB relationships in a single transaction; rollback on failure tested
- **Mutation-after-deletion rejection** — `mark_for_deletion()` prevents further mutations
- **Permission inheritance** — inherited via SpiceDB workspace→KG relationship in schema; integration tests cover workspace-level and direct-grant scenarios

