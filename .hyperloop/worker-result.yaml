## Verdict: PASS

All 6 SHALL requirements and all 15 scenarios are implemented in code and covered by tests.

---

## Requirement-by-Requirement Findings

### 1. Requirement: API Key Creation — COVERED

**Scenario: Successful creation** — COVERED
- `karto_` prefix: `iam/application/security.py::generate_api_key_secret()` produces `karto_<url_safe_token>`.
- Tests: `test_has_karto_prefix` (security unit), `test_secret_has_karto_prefix` (service unit).
- Plaintext returned exactly once: service returns `(APIKey, plaintext_secret)` tuple; only `APIKeyCreatedResponse` (POST endpoint) includes `secret`; `APIKeyResponse` (used for list/revoke) omits it.
- Tests: `test_returns_plaintext_secret_only_at_creation`, `test_returns_secret_in_response`, `test_never_returns_secret_or_hash`.
- Stored as bcrypt hash: `hash_api_key_secret()` uses `bcrypt.hashpw` with work factor 12.
- Tests: `test_hashes_secret`, `test_creates_api_key_with_hashed_secret`.
- 12-character prefix stored: `extract_prefix()` returns `secret[:12]`; stored on `APIKey` aggregate and `APIKeyModel`.
- Tests: `test_extracts_first_12_characters`, `test_stores_prefix_from_secret`.

**Scenario: Duplicate name per user** — COVERED
- Code: `APIKeyRepository.save()` calls `_get_by_name()` and raises `DuplicateAPIKeyNameError` when a different key ID has the same (tenant, user, name) combination. Route maps this to HTTP 409.
- Tests: `test_raises_on_duplicate_name` (repository), `test_raises_on_duplicate_name` (service), `test_returns_409_on_duplicate_name` (route).

**Scenario: Expiration bounds** — COVERED
- Code: `CreateAPIKeyRequest.expires_in_days = Field(30, ge=1, le=3650)`. Default of 30 is encoded in the Pydantic field default.
- Tests: `test_validates_expires_in_days_minimum` (rejects 0), `test_validates_expires_in_days_maximum` (rejects 3651), `test_uses_default_expires_in_days_of_30`, `test_creates_with_expiration`.

