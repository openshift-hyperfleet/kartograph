### Requirement 1: API Key Creation — COVERED

**Implementation:**
- `iam/application/security.py`: `API_KEY_PREFIX = "karto_"`, `generate_api_key_secret()`,
  `hash_api_key_secret()` (bcrypt, work factor 12), `extract_prefix()` (first 12 chars)
- `iam/application/services/api_key_service.py`: `create_api_key()` checks
  `CREATE_API_KEY` permission via SpiceDB before creating; returns `(APIKey, plaintext_secret)` tuple
- `iam/presentation/api_keys/models.py`: `CreateAPIKeyRequest` enforces `min_length=1`,
  `max_length=255`, `expires_in_days` range `ge=1, le=3650` with default `30`
- `APIKeyCreatedResponse` adds `secret` field on top of `APIKeyResponse` (which never includes secret)

**Scenario: Successful creation** — COVERED
- Tests: `test_secret_has_karto_prefix`, `test_creates_api_key_with_hashed_secret`,
  `test_returns_plaintext_secret_only_at_creation`, `test_stores_prefix_from_secret`
  (all in `tests/unit/iam/application/test_api_key_service.py`)

**Scenario: Duplicate name per user** — COVERED
- Implementation: Repository `_get_by_name()` checks name/user/tenant uniqueness, raises
  `DuplicateAPIKeyNameError`; route maps to 409 Conflict
- Tests: `test_raises_on_duplicate_name` (service), `test_returns_409_on_duplicate_name` (route)

**Scenario: Expiration bounds** — COVERED
- Implementation: Pydantic `ge=1, le=3650`, default `30`
- Tests: `test_validates_expires_in_days_minimum`, `test_validates_expires_in_days_maximum`,
  `test_uses_default_expires_in_days_of_30`, `test_accepts_optional_expires_in_days` (route tests)

