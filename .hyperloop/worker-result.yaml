### REQ-4: API Key Revocation — COVERED

**Scenario 4.1 — Owner revokes own key; remains visible with is_revoked=true**
- Code: `iam/domain/aggregates/api_key.py::revoke()` — sets `is_revoked = True`; `iam/application/services/api_key_service.py` saves updated aggregate.
- Tests: `test_api_key_auth.py::test_revoked_key_remains_visible_in_listing` (integration — revokes, then lists, asserts `is_revoked=True` in response); `test_api_key_service.py` (unit — saved key has `is_revoked=True`).

**Scenario 4.2 — Tenant admin revokes any key**
- Code: `iam/application/services/api_key_service.py` — SpiceDB `REVOKE` permission check covers both owner and tenant admin relationship.
- Tests: `test_api_key_auth.py` (integration — admin revokes other user's key, 204); `test_api_key_service.py` (unit authorization paths).

**Scenario 4.3 — Already revoked → 409**
- Code: `iam/domain/aggregates/api_key.py::revoke()` — raises `APIKeyAlreadyRevokedError` if `is_revoked` is already True; routes catch → 409.
- Tests: `test_api_key_aggregate.py::test_revoke_raises_when_already_revoked`; `test_api_key_routes.py` (409 response); `test_api_key_service.py`.

**Scenario 4.4 — Unauthorized revocation → 403**
- Code: `iam/application/services/api_key_service.py` — SpiceDB check raises `UnauthorizedError`; routes catch → 403.
- Tests: `test_api_key_auth.py` (integration — non-owner non-admin gets 403); `test_api_key_routes.py::test_revoke_api_key_returns_403_when_unauthorized`.

