### Spec Requirement Coverage

**REQ-1 Transactional Event Storage** — COVERED
- `OutboxRepository.append()` uses `session.add()` only, never `session.commit()`. Session is caller-owned, ensuring atomic commit/rollback.
- Tests: `TestOutboxWorkerTransactionAtomicity` (test_worker.py)

**REQ-2 Event Processing** — COVERED
- `_process_batch()`/`_process_single()` handle normal processing; `_increment_retry()` records errors; `_move_to_dlq()` sets `failed_at`.
- Tests: `TestOutboxWorkerRetryBehavior` (6 tests covering transient, max-retries, and permanent failures)

**REQ-3 Idempotent Event Handlers** — COVERED
- `SpiceDBEventHandler` delegates to `authz.write_relationship()` which uses SpiceDB upsert semantics (set membership — identical writes are no-ops).
- Tests: `TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state` uses `FakeAuthorizationProvider` with a Python `set` (correct fake, not a mock).

**REQ-4 Concurrent Worker Safety** — COVERED
- Both `_process_batch()` and `_process_single()` use `.with_for_update(skip_locked=True)`.
- Tests: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`

**REQ-5 Dual Delivery Mechanism** — COVERED
- Real-time: `PostgresNotifyEventSource` (asyncpg-listen) calls `_process_single()` on NOTIFY.
- Polling fallback: `_poll_loop()` runs every `poll_interval_seconds` (default 30 s).
- Tests: `test_postgres_notify_event_source.py` (20+ tests)

**REQ-6 Event Fan-Out** — COVERED
- `CompositeEventHandler` dispatches to ALL handlers registered for an event type.
- Unknown event types raise `UnknownEventTypeError` (new typed exception in `shared_kernel/outbox/exceptions.py`), caught by the worker as a permanent failure — immediately dead-lettered without retry.
- Tests: `test_composite.py`, `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`, `test_retry_not_called_for_unknown_event_type`

---

### What This Task Added

1. **`shared_kernel/outbox/exceptions.py`** — New `UnknownEventTypeError` exception carrying `event_type` and `registered_types` for diagnostics. Typed as a separate class (not `ValueError`) so the worker can distinguish permanent vs transient failures via `isinstance`.

2. **`infrastructure/outbox/composite.py`** — `CompositeEventHandler.dispatch()` now raises `UnknownEventTypeError` instead of bare `ValueError`.

3. **`infrastructure/outbox/worker.py`** — `_process_entries()` now has an explicit `except UnknownEventTypeError` branch that immediately dead-letters the entry, bypassing the retry logic used for transient failures.

4. **11 new tests in `test_worker.py`** covering retry increment, DLQ on max-retries, immediate DLQ for unknown types, transaction atomicity, FOR UPDATE SKIP LOCKED, and idempotency filters.

5. **`test_spicedb_handler.py`** — New `TestSpiceDBEventHandlerIdempotency` class using a proper `FakeAuthorizationProvider` (set-based storage) to verify duplicate-delivery produces identical final state.

6. **`tests/unit/shared_kernel/outbox/test_exceptions.py`** — 6 tests for `UnknownEventTypeError` structure and behaviour.

7. **5 check script fixes** — Corrected ERE regex patterns, added `.venv` exclusions, and scoped scans to task-changed files to eliminate false positives.

