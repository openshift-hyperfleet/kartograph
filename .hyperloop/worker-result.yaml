### Requirement: Transactional Event Storage

#### Scenario: Successful write ‚Äî COVERED
- `OutboxRepository.append()` calls `session.add()` only; never commits.
- Session is shared with aggregate repositories for atomicity.
- Unit test: `test_repository_append_does_not_commit`

#### Scenario: Transaction rollback ‚Äî COVERED
- Shared session design: caller rollback undoes all pending adds.
- Integration test: `test_rollback_removes_both_group_and_outbox_entry`

