```

**File: `src/api/tests/unit/infrastructure/test_cors_settings.py:113`** (committed by task-030/613ebaf9, not task-008)
```python
assert "wildcard" in error_str.lower() or "credentials" in error_str.lower()
```

**File: `src/api/tests/unit/infrastructure/test_settings.py:39`** (present in alpha baseline, not changed by task-008)
```python
assert "pool_max_connections" in error_str or "greater" in error_str.lower()
```

**Attribution:** None of these violations were introduced by task-008 commits. Verified via `git diff alpha...HEAD` — all four files had zero diff from alpha in task-008's scope, or were introduced by other tasks (task-027, task-030). However, the check script exits 1 regardless of attribution, scanning the full codebase.

**What the implementer must fix:** These violations must be resolved, even though they were not introduced by task-008. Per the check script's contract, each spec-required component needs its own independent `assert` statement. For each of the four lines above, split the OR-chained assertion into two separate `assert` statements — one per component — or document (via inline comment citing exact spec text) why the spec genuinely permits only one component to be present.

