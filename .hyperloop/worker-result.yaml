# Spec Alignment Review: UI/UX Experience Spec

Spec file: `specs/ui/experience.spec.md`
Implementation: `src/dev-ui/` (Nuxt 3 / Vue 3 app)
Tests: `src/dev-ui/app/tests/` (vitest unit tests)

---

## Requirement-by-Requirement Assessment

### Requirement: Navigation Structure — PARTIAL

**Implementation:** COVERED. `app/layouts/default.vue` defines the exact 4-section nav (Explore, Data, Connect, Settings) with all required items. Desktop sidebar with collapse, mobile sheet overlay, active-state highlighting, and tenant selector all exist.

**Tests:**
- Sidebar section structure and content: COVERED (`interaction-principles.test.ts` — "Navigation - sidebar section structure" describes the 4 sections and all items)
- Returning user redirect to Explore: COVERED (`interaction-principles.test.ts` — "Navigation - returning user redirect")
- New user landing / guided setup: PARTIAL. The index.vue shows a "Getting Started" checklist and prompts creation, and `index.test.ts` tests session storage detection. However, there is NO test that asserts: "GIVEN a user with no knowledge graphs, WHEN they open Kartograph, THEN they are guided toward setup." The test only checks session storage detection mechanics, not the full new-user guidance scenario.

**Gap:** Missing test for new-user guidance scenario (no-KG empty state leading to setup prompt).

---

### Requirement: Tenant and Workspace Context — PARTIAL

**Implementation:** COVERED. `default.vue` has multi-tenant dropdown, tenant switching via `useTenant`, workspace guidance toast on first tenant entry.

**Tests:**
- Workspace guidance (new user, no workspace): COVERED (`interaction-principles.test.ts` — "Navigation - workspace guidance for new users")
- Tenant selector with multiple tenants: NO dedicated test. The sidebar tenant selector logic (DropdownMenu, switching) has no corresponding unit test. The `useTenant` composable is used but not tested independently in the test suite.
- "Switching tenants refreshes all data in the UI": No test verifies that `tenantVersion` watch triggers data reload on the index/layout level.

**Gap:** No test for tenant selector switch behavior (tenantVersion-driven data refresh at layout level). MISSING test for the spec scenario "switching tenants refreshes all data in the UI."

