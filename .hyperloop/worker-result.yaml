### Test Summary

- **268 outbox-specific unit tests** pass (shared_kernel, infrastructure, iam, management layers).
- **2187 total unit tests** pass — zero regressions.
- Integration tests in `tests/integration/iam/test_outbox_consistency.py` cover:
  - Atomicity: both aggregate and outbox entry commit or roll back together.
  - Worker processing: `_process_batch()` marks entries processed and writes SpiceDB relationships.
  - Idempotency: double-invocation of `handle()` produces identical final state.
  - NOTIFY-driven processing: sub-second pickup via `asyncpg-listen`.

### Architecture

- Shared-kernel ports in `shared_kernel/outbox/` — no framework imports.
- Infrastructure in `infrastructure/outbox/` — implements ports, may import domain.
- Bounded-context translators in `iam/infrastructure/outbox/` and `management/infrastructure/outbox/`.
- Architecture boundaries enforced by `pytest-archon` tests in `test_architecture.py`.

### Observability

Domain-Oriented Observability implemented: `DefaultOutboxWorkerProbe` and
`DefaultEventSourceProbe` use structlog internally; business logic calls only probe
methods — no `logger.*` or `print()` in non-probe code.

### Working Tree

Clean — no `.hyperloop/state/` files tracked. No uncommitted changes.
