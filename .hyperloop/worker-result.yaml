### REQ-6: Knowledge Graph Deletion (SHALL)

#### Scenario A: Successful deletion with atomic cascade
- COVERED
- Implementation: `knowledge_graph_service.py::delete()` checks MANAGE permission, then wraps the entire cascade in `async with self._session.begin()`. Within the transaction: finds all data sources, deletes encrypted credentials via `ISecretStoreRepository`, marks/deletes each data source, then marks/deletes the KG. The `KnowledgeGraphDeleted` domain event (written to outbox) is translated by `outbox/translator.py::_translate_knowledge_graph_deleted()` to SpiceDB operations that remove the workspace link, tenant link, and all admin/editor/viewer direct grants via filter-based deletion — satisfying the "workspace, tenant, and all direct grants" clause of the spec.
- Tests: `tests/unit/management/application/test_knowledge_graph_service.py::TestKnowledgeGraphServiceDelete::test_delete_cascades_data_sources`, `test_delete_cascades_encrypted_credentials`, `test_delete_rolls_back_on_ds_deletion_failure`; `tests/integration/management/test_knowledge_graph_repository.py::TestKnowledgeGraphDeletion::test_deletes_knowledge_graph`, `TestOutboxConsistency::test_delete_records_outbox_event`; `tests/unit/management/presentation/test_knowledge_graph_routes.py::TestDeleteKnowledgeGraph::test_delete_knowledge_graph_returns_204`

#### Scenario B: Mutation after deletion rejected
- COVERED
- Implementation: `knowledge_graph.py::update()` checks `if self._deleted: raise AggregateDeletedError`.
- Tests: `tests/unit/management/test_knowledge_graph.py::TestKnowledgeGraphUpdate::test_update_raises_after_deletion`

