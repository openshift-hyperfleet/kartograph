## API Keys — Spec Alignment Review (task-021)

Fresh independent review. All 6 requirements and 12 scenarios verified against
implementation code and corresponding tests.

---

### REQ-1: API Key Creation — COVERED

**Scenario 1.1 — Successful creation**
- Code: `iam/application/security.py` — `generate_api_key_secret()` produces `karto_` prefix; `hash_api_key_secret()` bcrypt work-factor 12; `extract_prefix()` returns 12-char prefix.
- Code: `iam/application/services/api_key_service.py` — `create_api_key()` returns `(APIKey, plaintext_secret)` tuple; plaintext never persisted.
- Code: `iam/presentation/api_keys/routes.py` — returns `secret` in 201 body; `APIKeyResponse` model excludes `key_hash` and `secret` from every other response.
- Tests: `test_api_key_aggregate.py` (creation fields), `test_api_key_service.py` lines 129-175 (hash/prefix), `test_api_key_routes.py` (201 + secret in body).

**Scenario 1.2 — Duplicate name per user**
- Code: `iam/infrastructure/api_key_repository.py` — raises `DuplicateAPIKeyNameError` on (name, user, tenant) collision.
- Code: `iam/presentation/api_keys/routes.py` — catches → 409.
- Tests: `test_api_key_service.py` (raises error), `test_api_key_routes.py::test_returns_409_on_duplicate_name`.

**Scenario 1.3 — Expiration bounds (1–3650, default 30)**
- Code: `iam/presentation/api_keys/models.py` — `expires_in_days: int = Field(default=30, ge=1, le=3650)`.
- Tests: `test_api_key_routes.py` — validates 0 → 422, 3651 → 422, default 30.

