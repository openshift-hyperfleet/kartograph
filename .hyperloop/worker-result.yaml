  ### CodeRabbit Finding 2 — check-frontend-tests-exist.sh (UI dir scope + find bug)

  STATUS: FIXED in this pass

  Two issues identified and resolved:
  1. git diff already correctly restricts to `-- "$UI_SOURCE_DIR"` (was already fixed)
  2. GENUINE BUG: The `find` command for ui_source_count was missing parentheses around
     the `-o` expression. Without `\( -name "*.vue" -o -name "*.ts" \)`, GNU find's
     implicit -print action only applies to *.ts files — *.vue files were silently
     excluded from the count. Fixed by adding escaped parentheses to match the pattern
     used correctly in check-frontend-test-infrastructure.sh.

  Before:  find "$UI_SOURCE_DIR" -name "*.vue" -o -name "*.ts" 2>/dev/null
  After:   find "$UI_SOURCE_DIR" \( -name "*.vue" -o -name "*.ts" \) 2>/dev/null

  Both check scripts now exit 0 correctly for this branch (no UI files changed).

