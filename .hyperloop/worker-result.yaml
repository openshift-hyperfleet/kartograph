## Summary

All six SHALL requirements from `specs/management/knowledge-graphs.spec.md` are implemented and tested. Every scenario has one or more tests exercising the exact Given/When/Then conditions. Authorization relationship cleanup (workspace, tenant, all direct grants) is handled via the transactional outbox pattern — the outbox entry is committed atomically with the DB deletion, ensuring no orphan SpiceDB state on rollback. 330 unit tests pass; integration tests cover permission inheritance end-to-end against SpiceDB.
