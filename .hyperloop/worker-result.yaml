### Implementation Quality

**`UnknownEventTypeError`** — clean domain exception in shared_kernel (not ValueError), carries `event_type` and `registered_types` attributes for diagnostics. Placed in `shared_kernel/outbox/exceptions.py` correctly within DDD layer.

**Worker exception handling** — `UnknownEventTypeError` is caught *before* the general `Exception` handler and routes directly to `_move_to_dlq()` (bypassing `_handle_processing_failure()`), correctly implementing "permanent failure — never retried" semantics.

**CompositeEventHandler** — raises `UnknownEventTypeError` (not `ValueError`) enabling the worker's isinstance-based routing to distinguish permanent vs transient failures.

**Idempotency tests** — use a `FakeAuthorizationProvider` (set-based, no MagicMock) that mirrors SpiceDB's upsert / set-membership semantics. Two handler invocations with the same payload produce the identical relationship set. Integration test confirms end-to-end: handler runs once → SpiceDB written → entry still unprocessed → worker processes again → `processed_at` set → SpiceDB relationship unchanged.

