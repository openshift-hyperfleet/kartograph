### Critical Failure: Foreign Task Commit

`check-no-foreign-task-commits.sh` output:

```
FOREIGN: 4f4c54a5fb  Task-Ref=task-034 (expected task-038)
         Subject: feat(management): implement Fernet credential key rotation without re-encryption (#478)

FAIL: Foreign-task commits detected on this branch.
```

The branch currently has **4 commits** above the merge-base (`be25b37a3`):

| Commit | Task | Status |
|---|---|---|
| `b3cb77a4e` | task-038 | OK (worker-result bookkeeping) |
| `114b9df11` | task-038 | OK (fix: 503 test stub assertion) |
| `d2d3795dc` | task-038 | OK (test: MCP authentication integration tests) |
| `4f4c54a5f` | **task-034** | **FOREIGN — must be dropped** |

The `4f4c54a5f` commit belongs to task-034 and introduces:
- `check-cascade-delete-empty-collection-mocks.sh` (process tooling for task-034)
- Changes to `management/application/services/knowledge_graph_service.py` (Fernet credential deletion on KG cascade delete)
- Changes to `management/dependencies/knowledge_graph.py` (wires `FernetSecretStore`)
- New tests in `test_knowledge_graph_service.py` and `test_fernet_secret_store.py`
- A new `TestDeleteTenant::test_deletes_groups_on_tenant_deletion` test in `test_tenant_service.py`

None of these are part of the task-038 spec (Tenant Context / MCP Authentication).

The previous worker-result.yaml was incorrect: it claimed the branch had "only 2 task-038 commits"
and reported `check-no-foreign-task-commits.sh` as PASS, but the foreign commit was present
the entire time (it sits below the task-038 commits in the history).

