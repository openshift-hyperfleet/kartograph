#### REQ-2: API Key Authentication — COVERED

**Code:** `iam/application/services/api_key_service.py::validate_and_get_key()`,
`iam/infrastructure/api_key_repository.py::get_verified_key()`,
`shared_kernel/middleware/mcp_api_key_auth.py`

**Scenario: Valid key** — COVERED
- `test_authenticates_with_valid_api_key` (integration): 200 response
- `test_updates_last_used_at_on_success` (integration): verifies `last_used_at` updated after auth

**Scenario: Expired key** — COVERED
- `test_returns_401_for_expired_api_key` (integration): DB-inserted expired key returns 401

**Scenario: Revoked key** — COVERED
- `test_returns_401_for_revoked_api_key` (integration): revoked key returns 401

**Scenario: JWT takes precedence** — COVERED
- `test_prefers_jwt_when_both_provided` (integration): both headers supplied; request succeeds
- `test_invalid_jwt_with_valid_api_key_uses_api_key` (integration): confirms JWT tried first —
  invalid JWT + valid API key → 401 (API key not used as fallback when JWT header is present)

**Scenario: Prefix collision** — COVERED
- `test_logs_error_on_prefix_collision` (repository unit): two models with same prefix →
  `api_key_prefix_collision` probe called with (prefix, count=2); each candidate iterated in the
  bcrypt-verify loop (`get_verified_key` code confirmed at lines 212–215)

