#### REQ-6 — Event Fan-Out

**Implementation:**
`infrastructure/outbox/composite.py` — `CompositeEventHandler` stores handlers in
`_handlers_by_type: dict[str, list[EventHandler]]`. Multiple handlers can be registered for the
same event type. `handle()` iterates the full list, calling each handler in order. When no handler
is found, it raises `UnknownEventTypeError` (not `ValueError`). The worker catches
`UnknownEventTypeError` before the generic `Exception` handler and immediately calls `_move_to_dlq`
without incrementing the retry count.

**Scenario: Multiple handlers registered** — COVERED
- Unit: `TestCompositeEventHandler.test_handle_fans_out_to_multiple_handlers` — registers two
  `MockHandler` instances for `"SharedEvent"`; calls `handle("SharedEvent", ...)`; asserts both
  `handler_a.handle` and `handler_b.handle` are called once each.

**Scenario: Unknown event type → immediate DLQ, not retried** — COVERED
- Unit (composite layer): `test_handle_raises_for_unknown_event_type` — asserts
  `UnknownEventTypeError` is raised with correct `event_type` and `registered_types` attributes.
- Unit (composite layer): `test_unknown_event_type_error_is_not_value_error` — asserts
  `not isinstance(err, ValueError)`.
- Unit (exception type): 6 tests in `test_exceptions.py` verify attributes, string representation,
  raise/catch, and `not isinstance ValueError`.
- Unit (worker layer): `test_unknown_event_type_immediately_moves_to_dlq` — handler raises
  `UnknownEventTypeError`; asserts `event_moved_to_dlq` called once, `event_processing_failed` and
  `event_processed` not called.
- Unit (worker layer): `test_unknown_event_type_dlq_even_at_zero_retries` — same result at
  `retry_count=0` with `max_retries=10`.
- Unit (worker layer): `test_retry_not_called_for_unknown_event_type` — patches `_increment_retry`
  and asserts it is never called.

