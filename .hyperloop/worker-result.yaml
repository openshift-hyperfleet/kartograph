### Minor Notes (not failures)

1. **Filter by creator — route-level test missing**: No route unit test exercises
   `GET /iam/api-keys?user_id=<valid_uuid>`. Service-level test
   (`test_filters_by_created_by_user_id`) covers the logic. Not a FAIL — behavior is tested.

2. **List metadata fields — assertion breadth**: Route unit list test (`test_lists_api_keys_for_user`)
   only asserts `id` and `name`. The `APIKeyResponse` model is the authoritative contract and
   guarantees all spec-required fields are serialized. Not a FAIL — model is explicitly defined.

3. **255-char name boundary**: No unit test explicitly sends a 255-character name and asserts
   acceptance. Pydantic `max_length=255` constraint enforces this automatically. Not a FAIL.

