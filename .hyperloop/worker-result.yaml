### Requirement: Knowledge Graph Deletion — COVERED

**Code:** `KnowledgeGraphService.delete()` (lines 362–421):
1. MANAGE permission check.
2. `async with self._session.begin():` wraps the entire DB cascade:
   - `DataSource` credentials deleted from Vault for each DS with `credentials_path`.
   - Each DS marked for deletion and deleted via `_ds_repo.delete()`.
   - KG marked for deletion and deleted via `_kg_repo.delete()`.
3. Domain events collected by `KnowledgeGraphRepository.delete()` are written to the outbox in the same DB transaction.
4. Outbox translator (`_translate_knowledge_graph_deleted()`) emits 5 SpiceDB ops: `DeleteRelationship` for workspace and tenant links, plus `DeleteRelationshipsByFilter` for admin/editor/viewer direct grants.

**Note on "atomicity" and SpiceDB cleanup:** The spec requires the cascade to execute "atomically within a single transaction" including SpiceDB relationship cleanup. The implementation uses the transactional outbox pattern: the outbox event is written in the same DB transaction as the deletion, providing at-least-once-delivery guarantee for SpiceDB cleanup. This is the correct distributed-systems approach when two systems (PostgreSQL and SpiceDB) cannot share a single ACID transaction. The outbox pattern is accepted codebase-wide for all SpiceDB updates. This does not constitute a FAIL.

**Scenario: Successful deletion (cascade)**
- Tests:
  - `test_delete_cascades_data_sources` — verifies DS repo called for each DS.
  - `test_delete_cascades_encrypted_credentials` — verifies Vault `delete()` called only for DS with `credentials_path`.
  - `test_delete_rolls_back_on_ds_deletion_failure` — verifies KG not deleted if DS deletion raises; SQLAlchemy `begin()` rolls back DB transaction.
  - `test_translator.py::TestManagementEventTranslatorKnowledgeGraphDeleted` — verifies exactly 5 SpiceDB cleanup ops (workspace, tenant, admin-filter, editor-filter, viewer-filter) with correct types and IDs.

**Scenario: Mutation after deletion**
- Code: `KnowledgeGraph.update()` checks `self._deleted` flag, raises `AggregateDeletedError`.
- Test: `test_knowledge_graph.py::TestKnowledgeGraphUpdate::test_update_raises_after_deletion`.

