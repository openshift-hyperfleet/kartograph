### REQ-1: Transactional Event Storage — COVERED

**Implementation:**
`infrastructure/outbox/repository.py` — `OutboxRepository.append()` calls
`self._session.add(model)` (line 76) and **never** calls `session.commit()`.
The class docstring explicitly states the session is caller-owned. This
guarantees the outbox append and aggregate change commit (or roll back) together.

**Scenario: Successful write** — COVERED
- Code: `OutboxRepository.append()` — uses `session.add()` only.
- Unit test: `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`
  asserts `mock_session.commit.assert_not_called()` and
  `mock_session.add.assert_called_once()`.

**Scenario: Transaction rollback** — COVERED
- Code: Shared-session design means an upstream rollback discards the pending
  `add()` with no commit path in the repository.
- Unit test: `TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries`
  demonstrates the invariant (commit never called; pending add is discarded on rollback).
- Integration test: `TestAtomicityGuarantees::test_rollback_removes_both_group_and_outbox_entry`
  (`tests/integration/iam/test_outbox_consistency.py`) exercises the actual rollback end-to-end.

