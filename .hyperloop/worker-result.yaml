### Requirements Coverage Summary

All 6 SHALL requirements fully implemented and tested:

1. **Knowledge Graph Creation** — `KnowledgeGraphService.create()` enforces EDIT on workspace,
   generates ULID, establishes SpiceDB relationships via outbox. Duplicate name → 409.

2. **Knowledge Graph Name Validation** — Domain-level `_validate_name()` + Pydantic at
   presentation layer. Empty/oversized rejected at both layers.

3. **Knowledge Graph Retrieval** — `get()` returns None for missing, wrong-tenant, or
   unauthorized. Route returns 404 in all cases (no leakage).

4. **Knowledge Graph Listing** — `list_for_workspace()` checks VIEW on workspace, discovers
   KG IDs via SpiceDB, filters by tenant.

5. **Knowledge Graph Update** — `update()` checks EDIT on KG, enforces name validation and
   `AggregateDeletedError` guard.

6. **Knowledge Graph Deletion** — Atomic cascade (DS credentials → DS records → KG record)
   in single transaction. SpiceDB cleanup (5 ops) via transactional outbox.
   Rollback on failure tested. Mutation after deletion raises `AggregateDeletedError`.

7. **Permission Inheritance** — SpiceDB schema wires `workspace->view/edit/manage` into KG
   permissions. Direct admin grant tested. Integration tests cover both scenarios.

All 11 spec scenarios have corresponding unit + integration test coverage.
