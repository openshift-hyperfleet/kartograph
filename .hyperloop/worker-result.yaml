### Requirement: Event Processing â€” COVERED

**Scenario: Normal processing**
- Code: `OutboxWorker._process_entries()` calls `handler.handle()`, then
  `_mark_processed()` which issues `UPDATE outbox SET processed_at = NOW()`.
- Unit tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`,
  `test_calls_event_processed_on_success`, `test_handles_multiple_entries_in_batch`.
- Integration test: `test_worker_processes_group_created_and_writes_to_spicedb` â€”
  calls `worker._process_batch()` against a real DB/SpiceDB, asserts `processed_at`
  is set and the SpiceDB relationship exists.

**Scenario: Transient failure**
- Code: `_handle_processing_failure()` computes `new_retry_count = entry.retry_count + 1`;
  if below `max_retries`, calls `_increment_retry()` which sets `retry_count` and
  `last_error` via UPDATE.
- Unit tests: `test_transient_failure_increments_retry_count` (verifies
  `probe.event_processing_failed` called, `probe.event_moved_to_dlq` NOT called),
  `test_transient_failure_does_not_dlq_immediately`.

**Scenario: Permanent failure (dead letter)**
- Code: `_handle_processing_failure()` calls `_move_to_dlq()` when
  `new_retry_count >= max_retries`, setting `failed_at = NOW()`. DLQ entries are
  excluded from `fetch_unprocessed` via `failed_at IS NULL` filter.
- Unit test: `test_max_retries_moves_entry_to_dlq` â€” entry with `retry_count=2` and
  `max_retries=3` goes to DLQ on the next failure; `probe.event_moved_to_dlq` called,
  `probe.event_processing_failed` NOT called.

