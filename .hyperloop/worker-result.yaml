### 2. API Key Authentication — COVERED

**Valid key → authenticated + last_used_at updated**
- Implementation:
  - `src/api/iam/dependencies/user.py:_authenticate()` — tries API key when X-API-Key
    header is present and JWT is absent.
  - `src/api/iam/application/services/api_key_service.py:243–277` —
    `validate_and_get_key()` looks up by prefix, verifies bcrypt hash, calls
    `record_usage()`, and saves.
  - `src/api/iam/domain/aggregates/api_key.py:132–138` — `record_usage()` updates
    `last_used_at`.
- Tests:
  - `tests/integration/test_api_key_auth.py`:
    `test_authenticates_with_valid_api_key`, `test_updates_last_used_at_on_success`
  - `tests/unit/iam/application/test_api_key_service.py`:
    `test_validates_correct_secret`, `test_updates_last_used_at`

**Expired key → 401**
- Implementation: `src/api/iam/domain/aggregates/api_key.py:139–156` — `is_valid()`
  checks expiration; service returns `None` → middleware returns 401.
- Tests:
  - `tests/integration/test_api_key_auth.py`: `test_returns_401_for_expired_api_key`
  - `tests/unit/iam/application/test_api_key_service.py`:
    `test_returns_none_for_expired_key`

**Revoked key → 401**
- Implementation: `src/api/iam/domain/aggregates/api_key.py:149–150` — `is_valid()`
  checks `is_revoked`; service returns `None` → 401.
- Tests:
  - `tests/integration/test_api_key_auth.py`: `test_returns_401_for_revoked_api_key`
  - `tests/unit/iam/application/test_api_key_service.py`:
    `test_returns_none_for_revoked_key`

**JWT takes precedence over X-API-Key**
- Implementation: `src/api/iam/dependencies/user.py:98–120` — `_authenticate()`
  checks `if token is not None` first and returns immediately on either success or
  failure (never falls through to API Key when Bearer is present).
- Tests:
  - `tests/unit/iam/test_authenticate_dependency.py`:
    `test_jwt_takes_priority_over_api_key` — asserts `is_api_key is False` and
    `validate_and_get_key.assert_not_awaited()` when both headers present.
  - `tests/integration/test_api_key_auth.py`:
    `test_prefers_jwt_when_both_provided`,
    `test_invalid_jwt_with_valid_api_key_uses_api_key` (invalid JWT + valid key → 401,
    confirming JWT error takes precedence).

**Prefix collision → error-level event logged**
- Implementation:
  - `src/api/iam/infrastructure/api_key_repository.py:207–209` — if `len(models) > 1`,
    calls `self._probe.api_key_prefix_collision(prefix, len(models))`.
  - `src/api/iam/infrastructure/observability/api_key_repository_probe.py:137` —
    `DefaultAPIKeyRepositoryProbe.api_key_prefix_collision()` calls
    `self._logger.error(...)` (error level).
- Tests:
  - `tests/unit/iam/infrastructure/test_api_key_repository.py`:
    `test_logs_error_on_prefix_collision`

