### 5. Dual Delivery Mechanism — COVERED

**Implementation:**
- `src/api/infrastructure/outbox/event_sources/postgres_notify.py` —
  `PostgresNotifyEventSource` uses `asyncpg-listen` to subscribe to the `outbox_events`
  channel, parses the UUID payload, and invokes `_process_single` callback.
- `src/api/infrastructure/migrations/versions/d32ecc44581a_create_outbox_notify_trigger.py`
  — DB trigger `outbox_after_insert` calls `pg_notify('outbox_events', NEW.id::text)` on
  every INSERT.
- `worker.py::start()` — always starts `_poll_loop` task; optionally starts event source
  task when `event_source` is provided.
- `_poll_loop` runs every `poll_interval_seconds` (default 30) calling `_process_batch()`.

**Scenario: Real-time notification** — COVERED
- Unit: `test_postgres_notify_event_source.py::TestPostgresNotifyEventSourceNotify::test_notify_triggers_callback_with_uuid`
  — simulates a NOTIFY with a real UUID; verifies callback invoked with correct `UUID` type.
- Integration: `test_outbox_consistency.py::TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling`
  — uses `poll_interval_seconds=999` so only NOTIFY path can fire within 500ms window;
  asserts `processed_at IS NOT NULL` and SpiceDB relationship exists.

**Scenario: Polling fallback** — COVERED
- The `_poll_loop` method runs unconditionally in `start()` and calls `_process_batch()`.
- Integration: `test_outbox_consistency.py::TestOutboxWorkerProcessing::test_worker_processes_group_created_and_writes_to_spicedb`
  — calls `_process_batch()` directly (the exact operation the poll loop performs) and
  asserts the entry is processed and SpiceDB is updated.
- Constructor validation tests (`test_rejects_zero_poll_interval`,
  `test_rejects_negative_poll_interval`) confirm the 30s default is enforced structurally.
- Note: There is no unit test that explicitly mocks a "missed NOTIFY, poll fires after 30s"
  sequence, but the functional path (poll loop → `_process_batch`) is exercised end-to-end
  in the integration tests. This is sufficient for COVERED status.

