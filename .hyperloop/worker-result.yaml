### 5. API Key Cascade Deletion — COVERED

**Tenant deletion → all keys deleted + SpiceDB cleanup**
- Implementation:
  - `src/api/iam/application/services/tenant_service.py:606–659` — lists all tenant
    API keys, calls `mark_for_deletion()` on each, persists via repository.
  - `src/api/iam/domain/aggregates/api_key.py:117–131` — `mark_for_deletion()` records
    `APIKeyDeleted` event.
  - `src/api/iam/infrastructure/outbox/translator.py:760–788` — translates
    `APIKeyDeleted` into SpiceDB `DeleteRelationship` operations for both `owner` and
    `tenant` relations.
  - RESTRICT FK on `api_keys.tenant_id` ensures cascade is application-driven so
    `APIKeyDeleted` events are emitted.
- Tests:
  - `tests/unit/iam/application/test_tenant_service.py`:
    `test_deletes_api_keys_on_tenant_deletion`,
    `test_deletes_multiple_api_keys_on_tenant_deletion`,
    `test_api_key_mark_for_deletion_emits_deleted_event`,
    `test_api_key_repo_queried_by_tenant_on_deletion`,
    `test_cascade_deletion_probe_reports_api_key_count`,
    `test_api_keys_deleted_before_tenant_on_cascade`

