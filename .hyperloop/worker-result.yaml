### Requirement 4: DEFINE Operation — PARTIAL

**Code:** In `apply_mutations()`, for every DEFINE op the service calls
`get_system_properties_for_entity(op.type)` and merges system props into
`required_properties` before saving the TypeDefinition.

**Scenario: Define a node type** — COVERED
- `test_apply_mutations_stores_define_operations` explicitly asserts that the saved
  TypeDefinition contains `data_source_id`, `source_path`, `slug` in
  `required_properties` for a node type DEFINE.

**Scenario: Define an edge type** — PARTIAL
- **Code exists and is correct:** The same code path runs for edge types, and
  `get_system_properties_for_entity(EntityType.EDGE)` returns
  `{data_source_id, source_path}` (verified in `test_returns_edge_system_properties`).
- **No test explicitly verifies** that a DEFINE edge operation results in a saved
  TypeDefinition with `data_source_id` and `source_path` in `required_properties`.
  `test_edge_does_not_require_slug` provides indirect coverage (CREATE edge succeeds
  when those props are present) but does not assert on `mock_type_def_repo.save.call_args`.
- **To fix:** Add a test analogous to `test_apply_mutations_stores_define_operations`
  for entity type `EntityType.EDGE`, asserting that `data_source_id` and `source_path`
  appear in `saved_type_def.required_properties` and `slug` does NOT.

