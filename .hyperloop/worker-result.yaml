**Requirement: Knowledge Graph Name Validation** — COVERED

Implementation:
- `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`,
  raises `InvalidKnowledgeGraphNameError` on violation.
- Pydantic model in presentation layer also validates at HTTP boundary → HTTP 422.

Scenario — Valid name: COVERED
- Tests: `test_create_accepts_name_exactly_100_chars`, `test_create_accepts_single_char_name`

Scenario — Empty or oversized name: COVERED
- Tests: `test_create_rejects_empty_name`, `test_create_rejects_name_over_100_chars`,
  `test_create_knowledge_graph_returns_422_for_empty_name`,
  `test_create_knowledge_graph_returns_422_for_oversized_name`,
  `test_update_knowledge_graph_returns_422_for_empty_name`,
  `test_update_knowledge_graph_returns_422_for_oversized_name`

