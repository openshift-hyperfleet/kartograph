## Spec Alignment Review — Graph Mutations (fresh attempt)

### Changes made in this run

The previous round-7 review identified a single FAIL:

> **CREATE — idempotent merge**: `_build_update_existing_query` replaced the
> entire properties object instead of merging it, and no test exercised a
> cross-batch merge with differing `set_properties`.

Both gaps are now closed:

#### 1. Code fix — `graph/infrastructure/age_bulk_loading/queries.py`

`_build_update_existing_query` changed from:
```sql
SET properties = (s.properties::text)::ag_catalog.agtype
```
to:
```sql
SET properties = (
    (t.properties::text)::jsonb || (s.properties::text)::jsonb
)::text::ag_catalog.agtype
```
This is identical to the pattern already used by `update_properties()`,
ensuring both UPDATE and CREATE-on-existing paths use proper merge semantics.

#### 2. Unit tests — `tests/unit/graph/infrastructure/test_age_query_builder_update_merge.py`

Five tests (all in `TestUpdateExistingQueryMergeSemantics`) verify the SQL
template of `_build_update_existing_query` using only public psycopg2 APIs
(`Composed.seq`, `SQL.string`, `Identifier.strings`):
- `test_uses_jsonb_merge_operator_not_simple_assignment` — asserts `||` present
- `test_does_not_overwrite_with_staging_properties_alone` — asserts `t.properties` in SET clause
- `test_references_both_tables_in_set_clause` — asserts both `t.properties` and `s.properties`
- `test_uses_correct_graph_and_label_identifiers` — spot-checks identifier injection
- `test_merge_consistent_with_update_properties_method` — asserts `jsonb` cast present

All five failed before the fix and pass after.

#### 3. Integration test — `tests/integration/test_bulk_loading.py`

`TestBulkLoadingIdempotency::test_create_merges_properties_on_existing_node`
exercises the full AGE stack end-to-end:
1. First CREATE: node `person:eeee111122223333` with `{slug, name, age=30, ...}`
2. Second CREATE: same ID, `{slug, name, email="alice@example.com", ...}` (no `age`)
3. Asserts merged node has `name`, `age == 30` (preserved), and `email` (added)

The previous `test_repeated_batch_is_idempotent` ran identical `set_properties`
both times, so replacement and merging were indistinguishable. The new test uses
intentionally different properties to expose the replace-vs-merge distinction.

