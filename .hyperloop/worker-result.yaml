## Spec Alignment Review — Graph Mutations (task-003, fresh re-review)

### Methodology
Read every spec requirement and scenario. For each, located the implementing
code and at least one test exercising the exact Given/When/Then conditions.

---

### Requirement-by-Requirement Findings

#### R1 — Per-Tenant Graph Isolation
**SHALL**: Mutations execute against `tenant_{tenant_id}` AGE graph.

- **Code**: `graph/dependencies.py::get_tenant_graph_name()` →
  `f"tenant_{current_user.tenant_id.value}"`, wired into `get_age_graph_client`
  which passes the derived name to `AgeGraphClient` (so all mutations land in the
  correct tenant-scoped graph).
- **Tests**:
  - `test_routes.py::TestTenantGraphRouting::test_graph_client_uses_tenant_specific_graph_name`
    — asserts `get_tenant_graph_name(user)` == `"tenant_t1"` for tenant `"t1"`.
  - `test_graph_name_uses_full_tenant_id` — verifies longer tenant IDs work.
- **Status**: COVERED

---

#### R2 — KnowledgeGraph Scoping: mutation authorization
**SHALL**: User must have `edit` permission on the KnowledgeGraph; 403 on denial.

- **Code**: `routes.py::apply_kg_mutations()` checks SpiceDB `edit` permission
  via `authz.check_permission(resource, Permission.EDIT, subject)` before
  invoking the service.
- **Tests** (`TestKnowledgeGraphScopedMutationsRoute`):
  - `test_kg_mutations_route_accessible_with_edit_permission` — 200 OK.
  - `test_kg_mutations_route_forbidden_without_edit_permission` — 403, service never called.
  - `test_kg_mutations_route_checks_correct_resource` — authz called with correct KG resource string.
  - `test_kg_mutations_route_forbidden_returns_correct_status` — response body has `detail`.
- **Status**: COVERED

#### R2 — KnowledgeGraph ID Stamping
**SHALL**: `knowledge_graph_id` stamped on all CREATE/UPDATE; caller value rejected/ignored.

- **Code**: `GraphMutationService._stamp_knowledge_graph_id()` overwrites any
  caller-supplied `knowledge_graph_id` on CREATE/UPDATE ops before validation.
  `MutationOperation.validate_operation()` requires `knowledge_graph_id` in CREATE `set_properties`.
- **Tests** (`TestKnowledgeGraphIdStamping`):
  - `test_stamps_knowledge_graph_id_on_create_operation` — stamped on CREATE.
  - `test_overwrites_caller_provided_knowledge_graph_id` — spoofed value overwritten with authoritative KG ID.
  - `test_stamps_knowledge_graph_id_on_update_operation` — stamped on UPDATE with set_properties.
  - `test_does_not_stamp_on_delete_operation` — DELETE left untouched (no set_properties).
  - `test_stamps_knowledge_graph_id_in_jsonl_parse` — stamping works end-to-end via JSONL path.
  - `test_kg_mutations_route_passes_knowledge_graph_id_to_service` — route extracts KG ID from path and passes to service.
- **Status**: COVERED

---

#### R3 — Mutation Log Format (JSONL)
**SHALL**: Accept JSONL; report parse errors with line number + content preview; skip blank lines.

- **Code**: `apply_mutations_from_jsonl()` splits on `\n`, strips/skips empty lines,
  on `JSONDecodeError` returns errors list with `f"JSON parse error on line {line_num}"` plus
  `f"Line content: {line_preview}"`.
- **Tests** (`TestGraphMutationServiceApplyFromJSONL`):
  - `test_parses_jsonl_and_applies_mutations` — 2-line JSONL parsed and 2 ops applied in order.
  - `test_returns_error_on_invalid_json` — error[0] contains "JSON"/"parse" + "1" (line number);
    error[1] contains "line content" preview.
  - `test_handles_whitespace_only_lines` — blank lines silently skipped, only 1 op parsed.
- **Status**: COVERED

