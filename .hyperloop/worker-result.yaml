## Task-008 Knowledge Graphs — Implementation Complete

All requirements from `specs/management/knowledge-graphs.spec.md` are implemented
and verified. 330 management unit tests pass (2060 total unit tests pass).

### Requirements Coverage

**Knowledge Graph Creation:** `KnowledgeGraphService.create()` checks EDIT permission
on workspace via SpiceDB, creates KG with ULID, scopes to tenant and workspace,
persists via repository. `KnowledgeGraphCreated` event → outbox translator writes
two SpiceDB relationships (workspace and tenant). Duplicate name raises
`DuplicateKnowledgeGraphNameError` → HTTP 409.

**Name Validation:** Domain enforces 1–100 char constraint in `_validate_name()`.
Pydantic models enforce the same at HTTP layer. Both create and update paths covered.

**Retrieval:** `KnowledgeGraphService.get()` returns None for not-found, wrong-tenant,
or permission-denied — route returns 404 in all cases (no existence leakage).

**Listing:** `list_for_workspace()` checks VIEW on workspace, uses SpiceDB
`read_relationships()` to discover KG IDs, fetches and filters by tenant.

**Update:** `KnowledgeGraphService.update()` checks EDIT on KG (not workspace),
fetches, delegates to `KnowledgeGraph.update()`, persists. Mutation-after-deletion
raises `AggregateDeletedError` at domain level.

**Deletion (atomic cascade):** Single `async with self._session.begin()` block deletes
all data sources (including encrypted credentials), then the KG. Rollback verified by
test `test_delete_rolls_back_on_ds_deletion_failure`. `KnowledgeGraphDeleted` event →
outbox translator removes workspace rel, tenant rel, and filter-deletes all direct
admin/editor/viewer grants.

**Permission Inheritance:** SpiceDB schema defines `view = admin + editor + viewer +
workspace->view` and `edit = admin + editor + workspace->edit`. Integration tests
(authorization) verify workspace-inherited and direct-grant scenarios against real
SpiceDB.
