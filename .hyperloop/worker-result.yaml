### Implementation Summary

The task adds a typed `UnknownEventTypeError` exception (in `shared_kernel/outbox/exceptions.py`)
to distinguish permanent failures (unknown event type) from transient failures (e.g. SpiceDB
unreachable). The outbox worker now catches `UnknownEventTypeError` before the generic
`Exception` handler and immediately calls `_move_to_dlq()` — bypassing retry count
increment entirely.

**Changed files:**
- `shared_kernel/outbox/exceptions.py` — new `UnknownEventTypeError(Exception)` with
  `event_type` and `registered_types` attributes
- `infrastructure/outbox/composite.py` — raises `UnknownEventTypeError` instead of `ValueError`
- `infrastructure/outbox/worker.py` — catches `UnknownEventTypeError` before generic `Exception`
  and immediately DLQs (no retry increment)

**New tests:**
- `tests/unit/shared_kernel/outbox/test_exceptions.py` — 6 unit tests for the new exception
- `tests/unit/infrastructure/outbox/test_composite.py` — updated to assert `UnknownEventTypeError`
  (not `ValueError`), checks `event_type` attribute and `isinstance(err, ValueError) is False`
- `tests/unit/infrastructure/outbox/test_worker.py` — 7 new tests covering: transient failure
  increments retry, max-retries DLQ, unknown event type immediately DLQ at any retry_count,
  `_increment_retry` never called for unknown types, FOR UPDATE SKIP LOCKED query, and filtering
  of processed/failed entries
- `tests/unit/infrastructure/outbox/test_spicedb_handler.py` — idempotency test using a proper
  `FakeAuthorizationProvider` (Python `set` backing store, mirroring SpiceDB upsert semantics)
- `tests/integration/iam/test_outbox_consistency.py` — integration test for the full duplicate-
  delivery scenario: handler invoked, SpiceDB written, process "crashes" (no mark_processed),
  worker retries, final state identical

