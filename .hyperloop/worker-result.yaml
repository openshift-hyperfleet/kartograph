### 4. API Key Revocation — COVERED

**Implementation:**
- `APIKeyService.revoke_api_key()` loads key by ID + tenant, checks `Permission.REVOKE` via SpiceDB, calls `api_key.revoke()` (raises `APIKeyAlreadyRevokedError` if already revoked), then saves.
- SpiceDB schema: `api_key#revoke = owner + tenant->administrate`, enabling owner self-service and tenant admin cross-user revocation.

**Scenario: Owner revokes own key**
- `test_owner_can_revoke_own_key` — integration; alice (non-admin member) creates and revokes her own key ✓

**Scenario: Tenant admin revokes any key**
- `test_tenant_admin_can_revoke_other_users_key` — integration; bob creates key, alice (tenant admin) revokes it ✓

**Scenario: Already revoked**
- `test_raises_when_already_revoked` — unit, `test_api_key_service.py` ✓
- `test_returns_409_when_already_revoked` — unit, `test_api_key_routes.py` ✓

**Scenario: Owner revokes → key remains visible**
- `test_revoked_key_remains_visible_in_listing` — integration; creates key, revokes it, lists keys and asserts entry present with `is_revoked=true` ✓

**Scenario: Unauthorized revocation**
- `test_non_admin_cannot_revoke_other_users_key` — integration; bob (non-admin) cannot revoke alice's key → 403 ✓
- `test_revoke_raises_unauthorized_when_denied` — unit, `test_api_key_service.py` ✓
- `test_revoke_api_key_returns_403_when_unauthorized` — unit, `test_api_key_routes.py` ✓

