## Requirement Coverage

### 1. API Key Creation — COVERED

**Implementation:**
- `iam/application/services/api_key_service.py` → `create_api_key()` checks `Permission.CREATE_API_KEY` via SpiceDB before proceeding.
- `iam/application/security.py` → `generate_api_key_secret()` generates `karto_`-prefixed secret; `hash_api_key_secret()` uses bcrypt (work factor 12); `extract_prefix()` returns first 12 chars.
- `iam/domain/aggregates/api_key.py` → `APIKey.create()` stores `key_hash` and `prefix`.
- `iam/presentation/api_keys/models.py` → `CreateAPIKeyRequest` has `expires_in_days` defaulting to 30, `ge=1`, `le=3650`; `APIKeyCreatedResponse` includes `secret` (only at creation); `APIKeyResponse` omits it.
- `iam/infrastructure/api_key_repository.py` → `save()` checks for duplicate name per user/tenant and raises `DuplicateAPIKeyNameError`.

**Scenario: Successful creation**
- `test_secret_has_karto_prefix` — unit, `test_api_key_service.py` ✓
- `test_creates_api_key_with_hashed_secret` — unit, verifies hash ≠ plaintext ✓
- `test_stores_prefix_from_secret` — unit, verifies `prefix == plaintext_secret[:12]` ✓
- `test_returns_secret_in_response` — unit, route test verifies `secret` field in 201 response ✓

**Scenario: Duplicate name per user**
- `test_raises_on_duplicate_name` — unit, `test_api_key_service.py` ✓
- `test_returns_409_on_duplicate_name` — unit, `test_api_key_routes.py` ✓
- `test_raises_on_duplicate_name` — unit, `test_api_key_repository.py` ✓

**Scenario: Expiration bounds**
- `test_validates_expires_in_days_minimum` — unit, route returns 422 for `expires_in_days=0` ✓
- `test_validates_expires_in_days_maximum` — unit, route returns 422 for `expires_in_days=3651` ✓
- `test_uses_default_expires_in_days_of_30` — unit, route calls service with `expires_in_days=30` when not specified ✓

