## Requirement: Tenant Isolation — COVERED

### Scenario: Same path, different tenants
**Implementation:** `fernet_secret_store.py:80-83` — WHERE clause filters on both
`path` AND `tenant_id`. `EncryptedCredentialModel` uses composite PK `(path, tenant_id)`
for DB-level enforcement.

**Tests:**
- Unit: `TestTenantIsolation::test_same_path_different_tenant_raises_key_error` — stores
  credentials for tenant A, attempts retrieval as tenant B, asserts `KeyError`.
- Integration: `TestTenantIsolation::test_tenant_a_cannot_read_tenant_b`

