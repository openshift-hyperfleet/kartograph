### Spec Coverage

All 18 spec scenarios are covered by unit and/or integration tests:

| Scenario | Test |
|---|---|
| Successful creation (prefix, hash, one-time secret) | `test_api_key_aggregate`, `test_api_key_service`, `test_api_key_routes` |
| Duplicate name conflict | `test_api_key_service`, `test_api_key_routes::test_returns_409_on_duplicate_name` |
| Expiration bounds (1–3650, default 30) | `test_api_key_routes::test_validates_expires_in_days_*`, `test_uses_default_expires_in_days_of_30` |
| Valid key authentication + last_used_at | `test_api_key_service::TestValidateAndGetKey` |
| Expired key → 401 | `test_api_key_auth::test_returns_401_for_expired_api_key` |
| Revoked key → 401 | `test_api_key_service::test_returns_none_for_revoked_key` |
| JWT takes precedence | `test_authenticate_dependency::test_jwt_takes_precedence_over_api_key` |
| Prefix collision → error log | `test_api_key_repository::TestPrefixCollision` |
| List keys (no secrets) | `test_api_key_routes::test_never_returns_secret_or_hash` |
| Filter by creator | `test_api_key_service::test_filters_by_user_id` |
| Owner revokes own key | `test_api_key_service::TestRevokeAPIKey` |
| Tenant admin revokes any key | `test_api_key_service::test_tenant_admin_can_revoke` |
| Already revoked → 409 | `test_api_key_aggregate::test_revoke_raises_when_already_revoked` |
| Unauthorized revocation → 403 | `test_api_key_routes::test_revoke_api_key_returns_403_when_unauthorized` |
| Tenant deletion cascade | `test_tenant_service::TestDeleteTenant` (6 tests) |
| Revoked key visible in listing | `test_api_key_auth::test_revoked_key_remains_visible_in_listing` |
| Valid name (1–255 chars) | `test_api_key_aggregate` |
| Empty name rejected | `test_api_key_routes::test_validates_name_min_length` |
