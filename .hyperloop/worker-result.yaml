## Requirement Coverage

### REQ-1: API Key Creation — PASS
- `karto_` prefix: `generate_api_key_secret()` in `security.py`
- Plaintext returned once: tuple return from service, never stored in DB
- bcrypt hash in `key_hash` field (work factor 12)
- 12-char prefix stored for fast lookup
- Duplicate name → `DuplicateAPIKeyNameError` → HTTP 409
- Default expiration: `expires_in_days: int = Field(30, ge=1, le=3650)` (verified by new unit test)

### REQ-2: API Key Authentication — PASS
- `X-API-Key` header handled by `_authenticate()` dependency
- JWT takes precedence (tries JWT first at line 99 of `user.py`)
- Valid key: authenticates, updates `last_used_at`
- Expired key: `is_valid()` checks `datetime.now(UTC) >= self.expires_at` → 401
  (new integration test `test_returns_401_for_expired_api_key` covers this path)
- Revoked key: `is_valid()` checks `self.is_revoked` → 401
- Prefix collision: `probe.api_key_prefix_collision()` (error-level in `DefaultAPIKeyRepositoryProbe`)

### REQ-3: API Key Listing — PASS
- SpiceDB `lookup_resources` scopes visible keys
- `APIKeyResponse` has no `secret` field (only `APIKeyCreatedResponse` does)
- `user_id` query param filters by creator

### REQ-4: API Key Revocation — PASS
- REVOKE permission checked via SpiceDB
- Already revoked → `APIKeyAlreadyRevokedError` → HTTP 409
- Unauthorized → `UnauthorizedError` → HTTP 403
- Revoked key stays visible with `is_revoked=True`
  (new integration test `test_revoked_key_remains_visible_in_listing`)

### REQ-5: API Key Cascade Deletion — PASS
6 unit tests in `test_tenant_service.py::TestDeleteTenant`:
- `test_deletes_api_keys_on_tenant_deletion`
- `test_deletes_multiple_api_keys_on_tenant_deletion`
- `test_api_key_mark_for_deletion_emits_deleted_event` (verifies `APIKeyDeleted` event for SpiceDB cleanup)
- `test_api_key_repo_queried_by_tenant_on_deletion`
