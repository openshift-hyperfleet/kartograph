### Requirement: Knowledge Graph Retrieval — COVERED

**Code:** `service.get()` fetches from repo, gates on tenant_id match, then checks VIEW permission via SpiceDB. Returns `None` for both not-found and unauthorized — no existence leakage.

**Tests:**
- Scenario "Authorized retrieval": `test_get_returns_aggregate_on_success` (service unit); `test_get_knowledge_graph_returns_200` (route unit).
- Scenario "Unauthorized or non-existent": `test_get_returns_none_when_not_found`, `test_get_returns_none_when_permission_denied`, `test_get_returns_none_for_different_tenant` (service unit); `test_get_knowledge_graph_returns_404_when_not_found`, `test_get_knowledge_graph_returns_404_when_unauthorized` (route unit — both return 404, no distinction).

