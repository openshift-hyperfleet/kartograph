**Scenario: Authorized retrieval**
- Service: `KnowledgeGraphService.get()` fetches by ID, checks tenant, checks `Permission.VIEW`,
  returns aggregate.
- Route: Returns 200 with `KnowledgeGraphResponse`
- Unit tests:
  - `TestKnowledgeGraphServiceGet::test_get_returns_aggregate_on_success`
  - `TestGetKnowledgeGraph::test_get_knowledge_graph_returns_200`

**Scenario: Unauthorized or non-existent (no distinction)**
- Service: Returns `None` in both cases (permission denied or not found)
- Route: Returns 404 in both cases
- Unit tests:
