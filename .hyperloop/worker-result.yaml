### Requirement: Knowledge Graph Name Validation â€” COVERED

**Code:** `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`, called from both `__post_init__` and `create()` and `update()`. Pydantic `CreateKnowledgeGraphRequest` / `UpdateKnowledgeGraphRequest` also enforce `min_length=1, max_length=100` at the API layer.

**Scenario: Valid name â€” COVERED**
- Tests: `test_create_accepts_name_exactly_100_chars`, `test_create_accepts_single_char_name`

**Scenario: Empty or oversized name â€” COVERED**
- Domain tests: `test_create_rejects_empty_name`, `test_create_rejects_name_over_100_chars`, `test_update_rejects_empty_name`, `test_update_rejects_name_over_100_chars`
- Route tests: `test_create_knowledge_graph_returns_422_for_empty_name`, `test_create_knowledge_graph_returns_422_for_oversized_name`, `test_update_knowledge_graph_returns_422_for_empty_name`, `test_update_knowledge_graph_returns_422_for_oversized_name`

