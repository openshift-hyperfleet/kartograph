### 5. Tenant Deletion — COVERED

**Code**: `TenantService.delete_tenant()` — depth-first cascade (children→parents via
`compute_depth()`), then groups, then API keys, then tenant.

**Scenarios**:
- Cascade workspaces before parents: `test_deletes_child_workspaces_before_parent_on_cascade`
  (grandchild→child→root ordering verified with 3-level hierarchy).
- Cascade groups: `test_deletes_groups_on_tenant_deletion` (uses real `Group.create()`).
- Cascade API keys: `test_deletes_api_keys_on_tenant_deletion`,
  `test_deletes_multiple_api_keys_on_tenant_deletion`.
- Member snapshot for auth cleanup: `test_mark_for_deletion_captures_member_snapshot`
  (domain level); service calls `list_tenant_members_from_authorization` then
  `tenant.mark_for_deletion(members=members)`.
- Unauthorized deletion → 403: `test_delete_tenant_raises_unauthorized_if_no_permission`
