### Spec Coverage

All scenarios in `specs/graph/mutations.spec.md` are implemented and tested:
- Per-tenant graph isolation (`tenant_{tenant_id}` AGE graph naming via `get_tenant_graph_name`)
- KnowledgeGraph scoping with SpiceDB `edit` permission enforcement at the route
- `knowledge_graph_id` stamping (overwrites any caller-supplied value via `_stamp_knowledge_graph_id`)
- JSONL parsing with line-number error reporting and empty-line skipping
- DEFINE with system property injection (`data_source_id`, `source_path`, `slug` for nodes)
- CREATE idempotent merge with required-property validation and type-definition gating
- UPDATE set/remove properties with schema learning
- DELETE with DETACH DELETE cascade for nodes, edge-only delete for edges
- Referential integrity ordering: DEFINE → DELETE(edge/node) → CREATE(node/edge) → UPDATE
- `MutationResult.error_kind` distinguishes validation (422) from server (500) errors

### CodeRabbit Findings — Analysis

CodeRabbit posted 3 actionable comments. None are spec violations; all pass as
technical debt items:

**1. `except Exception` in JSONL parsing (Major)**
In `apply_mutations_from_jsonl`, the inner `except Exception` around
`MutationOperation(**operation_dict)` mis-labels any non-Pydantic exception as
`error_kind="validation"`. In practice only `pydantic.ValidationError` is raised
here, so practical risk is very low. The fix (narrow to `except ValidationError`)
is one line and should be applied in a follow-up.

**2. `apply_mutations()` accepts `knowledge_graph_id=None` for CREATE/UPDATE (Major)**
When `knowledge_graph_id=None` and a caller provides their own value in
`set_properties`, it passes through unstamped. All legitimate API callers go
through the HTTP route which always provides the path parameter, so this cannot
be exploited via the API. It is a defense-in-depth gap for direct service
callers. Not a spec violation per se — the spec scenario ("GIVEN a mutation
targeting KnowledgeGraph 'kg-123'") implies the KG is always specified.

**3. Server error leakage in `_build_mutation_error_response` (Nitpick)**
`result.errors` are returned verbatim in 500 responses. Could expose
infrastructure details. Recommend logging errors and returning a generic 500
body in a follow-up.

