## Requirement Coverage

### Requirement: Transactional Event Storage — PASS

**Scenario: Successful write**
- `OutboxRepository.append()` calls `session.add(model)` and never calls `session.commit()`
- The outbox entry and aggregate change are atomic within the caller's transaction
- Test: `TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`

**Scenario: Transaction rollback**
- Because the repository never commits, a rollback by the caller discards both the aggregate change and the outbox entry atomically
- Test: `TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries`

### Requirement: Event Processing — PASS

**Scenario: Normal processing**
- `OutboxWorker._process_entries()` delegates to handler, marks entry processed with `processed_at` timestamp
- Tests: `TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries`, `test_marks_entry_as_processed`

**Scenario: Transient failure**
- On `Exception`, `_handle_processing_failure()` increments `retry_count` and records `last_error`
- Test: `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count`

**Scenario: Permanent failure (dead letter)**
- When `retry_count + 1 >= max_retries`, entry is moved to DLQ (`failed_at` set)
- Test: `TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq`

### Requirement: Idempotent Event Handlers — PASS

**Scenario: Duplicate delivery**
- `fetch_unprocessed` filters `processed_at IS NULL AND failed_at IS NULL`
- Already-processed entries are never re-fetched
- Tests: `TestOutboxWorkerIdempotency::test_already_processed_entry_excluded_from_fetch`, `test_failed_entries_excluded_from_fetch`

### Requirement: Concurrent Worker Safety — PASS

**Scenario: Concurrent workers**
- `fetch_unprocessed()` uses `WITH FOR UPDATE SKIP LOCKED` — PostgreSQL row-level locking prevents two workers from claiming the same entry
- `_process_single()` (NOTIFY path) also uses `WITH FOR UPDATE SKIP LOCKED`
- Test: `TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked`

### Requirement: Dual Delivery Mechanism — PASS

**Scenario: Real-time notification**
- `PostgresNotifyEventSource` uses `asyncpg-listen` to subscribe to `outbox_events` PostgreSQL NOTIFY channel
- On NOTIFY with UUID payload, calls `_process_single(uuid)` immediately (sub-second)
- Tests: `TestPostgresNotifyEventSourceNotify`

**Scenario: Polling fallback**
- `OutboxWorker._poll_loop()` runs every `poll_interval_seconds` (default 30) as a background `asyncio.Task`
- Catches missed NOTIFY events after restarts
- Test: `TestOutboxWorkerLifecycle`

### Requirement: Event Fan-Out — PASS

**Scenario: Multiple handlers registered**
- `CompositeEventHandler.register()` builds a `dict[str, list[EventHandler]]`
- `handle()` iterates all handlers for the event type (fan-out)
- Test: `TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers`

**Scenario: Unknown event type**
- `CompositeEventHandler` raises `UnknownEventTypeError` (not `ValueError`) for unregistered event types
- `OutboxWorker` catches `UnknownEventTypeError` and immediately moves entry to DLQ (bypasses retry logic)
- Tests: `TestCompositeEventHandler::test_handle_raises_for_unknown_event_type`, `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`

