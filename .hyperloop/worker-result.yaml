### 2. API Key Authentication — COVERED

**Implementation:**
- `APIKeyService.validate_and_get_key()` delegates to `IAPIKeyRepository.get_verified_key()`, checks `api_key.is_valid()`, and calls `api_key.record_usage()` → `save()` on success.
- Authentication middleware/dependency reads `X-API-Key` header; JWT Bearer takes priority; returns 401 with `WWW-Authenticate: Bearer, API-Key` on failure.

**Scenario: Valid key**
- `test_authenticates_with_valid_api_key` — integration ✓
- `test_updates_last_used_at_on_success` — integration, queries listing before/after to confirm `last_used_at` is set ✓
- `test_updates_last_used_at` — unit, `test_api_key_service.py` ✓

**Scenario: Expired key**
- `test_returns_401_for_expired_api_key` — integration; `expired_api_key_secret` fixture inserts a DB row with `expires_at` in the past, bypassing the 1-day API minimum ✓
- `test_returns_none_for_expired_key` — unit, `test_api_key_service.py` ✓

**Scenario: Revoked key**
- `test_returns_401_for_revoked_api_key` — integration, uses `revoked_api_key_secret` fixture ✓
- `test_returns_none_for_revoked_key` — unit, `test_api_key_service.py` ✓

**Scenario: JWT takes precedence**
- `test_prefers_jwt_when_both_provided` — integration, sends both `Authorization: Bearer ...` and `X-API-Key`; asserts 200 (JWT used) ✓

**Scenario: Prefix collision**
- `test_logs_error_on_prefix_collision` — unit, `test_api_key_repository.py`; sets up two `APIKeyModel`s with same prefix, verifies `probe.api_key_prefix_collision` called with prefix and count=2 ✓
- `DefaultAPIKeyRepositoryProbe.api_key_prefix_collision()` calls `self._logger.error(...)` — error-level as required ✓
- Repository iterates all candidates via bcrypt comparison in `get_verified_key()` ✓

