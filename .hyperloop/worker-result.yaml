## Requirement: API Key Cascade Deletion

### Scenario: Tenant deletion
**Status: COVERED**

- Implementation: `src/api/iam/application/services/tenant_service.py` — `delete_tenant()` lists all API keys by tenant, calls `api_key.mark_for_deletion()` then `api_key_repository.delete(api_key)` for each.
- Domain: `src/api/iam/domain/aggregates/api_key.py` — `mark_for_deletion()` records `APIKeyDeleted` event for SpiceDB relationship cleanup via outbox.
- DB: `APIKeyModel.tenant_id` has `ForeignKey("tenants.id", ondelete="RESTRICT")` to enforce application-layer cascade.
- Tests:
  - `tests/unit/iam/application/test_tenant_service.py::TestTenantCascadeDeletion::test_deletes_api_keys_on_tenant_deletion`
  - `tests/unit/iam/application/test_tenant_service.py::TestTenantCascadeDeletion::test_deletes_multiple_api_keys_on_tenant_deletion`
  - `tests/unit/iam/application/test_tenant_service.py::TestTenantCascadeDeletion::test_api_key_mark_for_deletion_emits_deleted_event` — verifies auth relationships cleaned up via `APIKeyDeleted` event.
  - `tests/unit/iam/application/test_tenant_service.py::TestTenantCascadeDeletion::test_api_key_repo_queried_by_tenant_on_deletion`

