### Workspace Access Inheritance
- SHALL propagate group membership to workspace permissions when group assigned to workspace
  - **COVERED**: SpiceDB schema has `workspace.editor: user | group#member` enabling the chain;
    `TestGroupWorkspaceInheritance` in `test_group_workspace_inheritance.py` (integration).
- Scenario: Group added to workspace — all members get editor-level permissions
  - **COVERED**: `test_group_member_gets_workspace_access_via_group` (integration); verifies
    bob receives EDIT but not MANAGE after group assigned as editor.
- Scenario: Member added to group with workspace assignments — new user immediately gets editor permissions
  - **COVERED** (KEY SCENARIO): `test_member_added_after_group_assigned_to_workspace_gets_access`
    (integration). Follows the EXACT GIVEN→WHEN→THEN sequence: (1) group assigned to workspace,
    (2) bob then added to group, (3) bob's EDIT permission verified. SpiceDB evaluates lazily so
    order of tuple insertion does not matter — both orderings work.
- Scenario: Member removed from group — user loses inherited workspace permissions
  - **COVERED**: `test_removing_user_from_group_revokes_workspace_access` (integration);
    verifies EDIT permission is revoked after group membership removed.

### Group Roles
- SHALL support two roles for group membership
  - **COVERED**: `GroupRole` value object with `ADMIN` and `MEMBER` values; SpiceDB schema
    `group.manage = admin`, `group.view = admin + member_relation + tenant->view`,
    `group.member = admin + member_relation`.
- Scenario: Admin role — has manage+view permissions AND included in workspace inheritance
  - **COVERED**: `test_group_admin_gets_workspace_access_via_group_member_permission` (integration);
    admin is part of `group.member = admin + member_relation` so inherits workspace access.
    `test_group_admin_can_delete_group`, `test_group_admin_can_rename_group` confirm manage access.
- Scenario: Member role — has view permission AND included in workspace inheritance
  - **COVERED**: `test_admin_can_add_member_to_group` verifies member has VIEW but not MANAGE;
    `test_group_member_gets_workspace_access_via_group` confirms member inherits workspace EDIT.

## Key Finding: "Member Added After Group Assigned" Scenario

The prior review flagged this as PARTIAL because all existing tests added the member
BEFORE adding the group to the workspace. Commit `23c6dc6f` (on this branch) adds:

  `test_member_added_after_group_assigned_to_workspace_gets_access`
  in `src/api/tests/integration/iam/test_group_workspace_inheritance.py`

This test:
1. Creates workspace
2. Creates empty group and assigns it to workspace AS EDITOR (before any member other than alice)
3. Verifies alice (group admin) already has EDIT on workspace
4. Then adds bob to the group as "member"
5. Waits for bob's VIEW on group (outbox processed)
6. Verifies bob now has EDIT on workspace and does NOT have MANAGE

The sequence is now correct and the scenario is FULLY COVERED.

## Verdict

All 20 spec scenarios are COVERED by appropriate unit and/or integration tests.
No scenarios are PARTIAL or MISSING. The implementation correctly follows DDD
boundaries (verified by architecture tests), and the SpiceDB schema correctly
models all group permission semantics.
