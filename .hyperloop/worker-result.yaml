### Spec Requirements Coverage

All 7 requirements and all 11 scenarios implemented and verified:

1. **KG Creation** — `KnowledgeGraph.create()` generates ULID, checks EDIT on workspace,
   enforces `uq_knowledge_graphs_tenant_name` uniqueness → 409 on duplicate.

2. **Name Validation** — 1–100 chars enforced at domain (`_validate_name()`) and
   Pydantic presentation layer → 422 from FastAPI automatically.

3. **Retrieval** — `service.get()` returns `None` for unauthorized or missing;
   route maps `None` → 404. No existence leakage.

4. **Listing** — `service.list_for_workspace()` filters by SpiceDB VIEW relationships.

5. **Update** — `service.update()` checks EDIT on the KG, validates tenant boundary,
   calls `kg.update()` within transaction.

6. **Deletion (cascaded, atomic)** — Inside a single `async with session.begin()`:
   credentials deleted from secret store → DS records deleted → KG record deleted.
   SpiceDB cleanup via outbox events. Rollback on any failure.

7. **Permission Inheritance** — SpiceDB schema:
   ```
   permission view   = admin + editor + viewer + workspace->view
   permission edit   = admin + editor + workspace->edit
   permission manage = admin + workspace->manage
   ```
   Correctly inherits from workspace and supports direct grants.

