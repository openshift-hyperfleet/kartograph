### Requirement: Timeout Enforcement

#### Scenario A – Query within timeout → results returned normally
**Status: COVERED**

- Implementation: `SET LOCAL statement_timeout` issued per-query; results
  returned on the success path.
- Tests: `test_sets_statement_timeout` (unit), `test_execute_cypher_query_custom_timeout`
  and `test_execute_cypher_query_tracks_time` (integration).

#### Scenario B – Query exceeds timeout → timeout error with correlation ID
**Status: COVERED**

- Implementation: Exception handler detects `"timeout"` / `"canceling statement"`
  in DB error message and raises `QueryTimeoutError` with a UUID correlation_id.
- Unit tests: `test_timeout_raises_query_timeout_error`,
  `test_timeout_error_has_correlation_id`,
  `test_timeout_error_includes_correlation_id_in_response`,
  `test_timeout_error_correlation_id_included_in_probe_call`.
- Integration test: `test_execute_cypher_query_timeout_error` (tightened in
  commit 5c0fb1f0) asserts `result.error_type == "timeout"` (strict equality,
  no longer the loose `in ["timeout", "execution_error"]` from the prior round).

---

### Requirement: Result Limiting

#### Scenario A – No LIMIT → LIMIT 1000 appended
**Status: COVERED**

- Implementation: `_ensure_limit()` appends `LIMIT {max_rows}` when no LIMIT
  clause is found; default `max_rows = 1000`.
- Tests: `test_adds_limit_when_missing` (unit), `test_auto_adds_limit`
  (integration).

#### Scenario B – Explicit LIMIT ≤ 10000 → respected
**Status: COVERED**

- Implementation: `_ensure_limit()` returns the query unchanged when the
  detected LIMIT ≤ `MAX_LIMIT` (10000).
- Tests: `test_preserves_existing_limit`, `test_case_insensitive_limit_detection`,
  `test_respects_limit_at_absolute_maximum`, `test_respects_limit_within_absolute_maximum`
  (unit); `test_respects_explicit_limit` (integration).

#### Scenario C – Explicit LIMIT > 10000 → capped to 10000
**Status: COVERED**

- Implementation: `MAX_LIMIT = 10000`; regex substitution replaces any LIMIT
  exceeding that with 10000.
- Tests: `test_caps_limit_above_absolute_maximum` (15000 → 10000),
  `test_caps_limit_well_above_absolute_maximum` (999999 → 10000) (unit).

---

### Requirement: Error Categorization

#### Scenario A – Forbidden → error_type == "forbidden"
**Status: COVERED**

- Implementation: `MCPQueryService` catches `QueryForbiddenError` →
  `QueryError(error_type="forbidden")`.
- Tests: `test_categorizes_forbidden_error` (unit, strict equality);
  `test_execute_cypher_query_forbidden_error` (integration).

#### Scenario B – Timeout → error_type == "timeout"
**Status: COVERED**

- Implementation: Catches `QueryTimeoutError` → `QueryError(error_type="timeout")`.
- Tests: `test_categorizes_timeout_error` (unit, strict equality);
  `test_execute_cypher_query_timeout_error` (integration, strict equality after
  commit 5c0fb1f0).

#### Scenario C – Execution error → error_type == "execution_error"
**Status: COVERED**

- Implementation: Catches `QueryExecutionError` →
  `QueryError(error_type="execution_error")`.
- Test: `test_categorizes_execution_error` (unit, strict equality).

#### Scenario D – Unexpected failure → error_type == "unknown_error"
**Status: COVERED**

- Implementation: Bare `except Exception` → `QueryError(error_type="unknown_error")`.
- Test: `test_categorizes_unknown_error` (unit, raises `ValueError`, asserts
  strict equality).

