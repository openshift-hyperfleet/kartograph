### Spec Scenario Coverage

All 6 SHALL requirements and 11 scenarios from the spec are covered:

- **Transactional Event Storage / Successful write**: `OutboxRepository.append()` adds to session, never commits. Caller owns the transaction boundary. Unit: `test_repository_append_does_not_commit`. âś“
- **Transactional Event Storage / Transaction rollback**: Shared-session design ensures aggregate + outbox entries roll back atomically. Unit: `test_failed_service_call_leaves_no_outbox_entries`. âś“
- **Event Processing / Normal processing**: `_process_batch()` â†’ `handler.handle()` â†’ `_mark_processed()` â†’ `session.commit()`. âś“
- **Event Processing / Transient failure**: `_handle_processing_failure()` increments `retry_count`, records `last_error`. Unit: `test_transient_failure_increments_retry_count`, `test_transient_failure_does_not_dlq_immediately`. âś“
- **Event Processing / Permanent failure (DLQ)**: `_move_to_dlq()` sets `failed_at`; entries excluded from future fetches via `failed_at IS NULL` filter. Unit: `test_max_retries_moves_entry_to_dlq`, `test_failed_entries_excluded_from_fetch`. âś“
- **Idempotent Event Handlers / Duplicate delivery**: `SpiceDBEventHandler` is idempotent by design (SpiceDB relationship writes are upserts). Proven by `FakeAuthorizationProvider` (Python set-based, not a mock). Unit: `test_duplicate_invocation_produces_identical_final_state`. âś“
- **Concurrent Worker Safety / Concurrent workers**: `FOR UPDATE SKIP LOCKED` in both `_process_batch()` and `_process_single()`. Verified by compiling query with PostgreSQL dialect. Unit: `test_fetch_unprocessed_uses_for_update_skip_locked`. âś“
- **Dual Delivery / Real-time notification**: `PostgresNotifyEventSource` subscribes to pg channel, invokes `_process_single` callback. Unit: 27 tests in `test_postgres_notify_event_source.py`. âś“
- **Dual Delivery / Polling fallback**: `_poll_loop()` runs every `poll_interval_seconds` (default 30s). âś“
- **Event Fan-Out / Multiple handlers**: `CompositeEventHandler.handle()` dispatches to all handlers for an event type in order. Unit: `test_handle_fans_out_to_multiple_handlers`. âś“
- **Event Fan-Out / Unknown event type**: `UnknownEventTypeError` â†’ immediate DLQ (not retried). Distinct from `ValueError` so worker can distinguish permanent vs transient. Unit: `test_unknown_event_type_immediately_moves_to_dlq`, `test_retry_not_called_for_unknown_event_type`. âś“

