### Evidence Summary

**Per-Tenant Graph Isolation**
- `graph/dependencies.py` → `get_tenant_graph_name()` returns `f"tenant_{current_user.tenant_id.value}"`
- Tests: `tests/unit/graph/presentation/test_routes.py::TestTenantGraphRouting::test_graph_client_uses_tenant_specific_graph_name` and `test_graph_name_uses_full_tenant_id`

**KnowledgeGraph Scoping — Authorization**
- `graph/presentation/routes.py` → `authz.check_permission(resource, Permission.EDIT, subject)`, raises `HTTPException(403)` on deny
- Tests: `test_routes.py::TestKnowledgeGraphScopedMutationsRoute::test_kg_mutations_route_forbidden_without_edit_permission`, `test_kg_mutations_route_accessible_with_edit_permission`

**KnowledgeGraph Scoping — kg_id stamping**
- `graph/application/graph_mutation_service.py::_stamp_knowledge_graph_id()` overwrites caller value before Pydantic validation
- Tests: `test_mutation_service.py::TestKnowledgeGraphIdStamping::test_overwrites_caller_provided_knowledge_graph_id`

**Mutation Log Format**
- `graph_mutation_service.py::apply_mutations_from_jsonl()` splits lines, parses JSON, skips blanks, reports parse errors with line number
- Tests: `test_mutation_service.py::TestGraphMutationServiceApplyFromJSONL::test_parses_jsonl_and_applies_mutations`, `test_returns_error_on_invalid_json`, `test_handles_whitespace_only_lines`

**DEFINE Operation**
- `graph_mutation_service.py` calls `get_system_properties_for_entity(op.type)` and merges into `required_properties`
- Tests: `test_mutation_service.py::test_apply_mutations_stores_define_operations` (node slug), `test_apply_define_edge_type_adds_edge_system_properties` (edge, no slug)

**CREATE Operation — idempotent merge**
- `queries.py::_build_update_existing_query` uses `jsonb ||` merge operator
- Tests: `tests/integration/graph/test_bulk_loading.py::TestBulkLoadingIdempotency::test_create_merges_properties_on_existing_node`

**DELETE Operation — cascading detach**
- `queries.py::delete_node_with_detach` deletes from `_ag_label_edge` (start_id/end_id match) then deletes node
- Tests: `tests/integration/graph/test_bulk_loading.py::TestDeleteOperations::test_delete_node_detaches_edges`

**Schema Learning**
- `graph_mutation_service.py::_discover_optional_properties()` runs for CREATE and UPDATE, excludes system + platform-stamped props
- Tests: `test_schema_learning.py::TestSchemaLearning::test_extra_properties_added_to_optional`, `test_update_discovers_optional_properties`, `test_system_properties_excluded_from_optional`

**Mandatory System Properties**
- `graph/domain/value_objects.py::validate_operation()` enforces `data_source_id`, `source_path`, `slug` (node), `knowledge_graph_id`
- Tests: `test_domain_value_objects.py::TestMutationOperation::test_create_node_requires_slug`, `test_create_edge_requires_knowledge_graph_id`, etc.

**Deterministic Entity IDs**
- `graph/domain/entity_id_generator.py::EntityIdGenerator.generate()` → `sha256[:16]` hex, Pydantic regex `^[0-9a-z_]+:[0-9a-f]{16}$`
- Tests: `test_entity_id_generator.py::TestEntityIdGenerator::test_is_deterministic`, `test_hash_portion_is_hex`, `test_hash_portion_length`

**Referential Integrity Ordering**
- `graph/infrastructure/mutation_applier.py::_sort_operations()` — DEFINE=0, DELETE=1 (edge<node), CREATE=2 (node<edge), UPDATE=3
- Tests: `test_mutation_applier_sort.py::TestSortOperationsReferentialIntegrity::test_sort_order_define_delete_create_update`

### Verdict: PASS

All 10 SHALL requirements and 23 scenarios from `specs/graph/mutations.spec.md` are implemented and covered by tests. The implementation correctly follows TDD, DDD bounded contexts, and Domain-Oriented Observability patterns.
