Implementation:
- SpiceDB schema establishes `knowledge_graph.view = workspace->view`, `knowledge_graph.edit = workspace->edit`, `knowledge_graph.manage = workspace->manage`
- `_translate_knowledge_graph_created` writes the `workspace` relation link to SpiceDB via outbox

