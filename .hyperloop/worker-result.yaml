#### Requirement: Knowledge Graph Name Validation — COVERED

**Scenario: Valid name (1-100 chars)**
- Domain: `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`
- Pydantic: `CreateKnowledgeGraphRequest.name` has `min_length=1, max_length=100`
- Unit tests:
  - `TestKnowledgeGraphCreate::test_create_accepts_name_exactly_100_chars`
  - `TestKnowledgeGraphCreate::test_create_accepts_single_char_name`

**Scenario: Empty or oversized name**
- Domain raises `InvalidKnowledgeGraphNameError`; Pydantic raises 422 at route layer
- Unit tests:
  - `TestKnowledgeGraphCreate::test_create_rejects_empty_name`
  - `TestKnowledgeGraphCreate::test_create_rejects_name_over_100_chars`
  - `TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_422_for_empty_name`
  - `TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_422_for_oversized_name`
  - `TestUpdateKnowledgeGraph::test_update_knowledge_graph_returns_422_for_empty_name`
  - `TestUpdateKnowledgeGraph::test_update_knowledge_graph_returns_422_for_oversized_name`

