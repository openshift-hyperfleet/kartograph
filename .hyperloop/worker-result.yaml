### REQ-2: Event Processing — COVERED

**Implementation:**
`infrastructure/outbox/worker.py`
- `_process_entries()` (lines 212-234): dispatches to handler, marks processed on
  success, catches `UnknownEventTypeError` for immediate DLQ, routes other
  exceptions to `_handle_processing_failure()`.
- `_handle_processing_failure()` (lines 245-268): increments retry or DLQs when
  `new_retry_count >= self._max_retries`.
- `_increment_retry()` (lines 299-324): sets `retry_count` and `last_error`.
- `_move_to_dlq()` (lines 270-297): sets `failed_at` timestamp.

**Scenario: Normal processing** — COVERED
- Tests: `TestOutboxWorkerProcessBatch::test_processes_unprocessed_entries`,
  `test_marks_entry_as_processed`.

**Scenario: Transient failure** — COVERED
- Test: `TestOutboxWorkerRetryBehavior::test_transient_failure_increments_retry_count`
  — confirms `probe.event_processing_failed` called, `event_moved_to_dlq` not called.
- Test: `test_transient_failure_does_not_dlq_immediately`.

**Scenario: Permanent failure (dead letter)** — COVERED
- Test: `TestOutboxWorkerRetryBehavior::test_max_retries_moves_entry_to_dlq`
  — entry at `retry_count=2` with `max_retries=3` triggers DLQ path, confirms
  `probe.event_moved_to_dlq` called, `probe.event_processing_failed` not called.

