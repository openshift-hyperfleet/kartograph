## Spec Alignment Review — Entity ID Generation

All four SHALL requirements and every scenario from `specs/shared-kernel/entity-id-generation.spec.md`
are fully implemented and tested. All 53 unit tests pass (0 failures).

---

### Requirement: Deterministic Node IDs — COVERED

**Implementation:** `EntityIdGenerator.generate()` in
`src/api/shared_kernel/graph_primitives/entity_id_generator.py`.
SHA256 over `{tenant_id}:{entity_type}:{entity_slug}` with the first 16 hex chars
used as the hash suffix. Returns `{normalized_type}:{hash}`.

**Scenarios:**

- **Consistent ID generation** — `TestEntityIdGenerator::test_is_deterministic` and
  `test_consistency_across_calls` (100 calls, all identical). COVERED.
- **ID format (`{type}:{16_hex_chars}`, lowercase type)** —
  `test_includes_type_prefix`, `test_hash_portion_length`, `test_hash_portion_is_hex`,
  `test_normalizes_entity_type_to_lowercase`. COVERED.
- **Tenant isolation** — `test_tenant_id_affects_hash` (tenant-a vs tenant-b produce
  distinct IDs); also `TestCanonicalHashInput::test_node_tenant_is_required_component_of_hash`.
  COVERED.
- **Different inputs produce different IDs** — `test_different_for_different_slugs`.
  COVERED.

---

### Requirement: Deterministic Edge IDs — COVERED

**Implementation:** `EntityIdGenerator.generate_edge_id()` in the same module.
SHA256 over `{tenant_id}:{start_id}:{edge_type}:{end_id}`, first 16 hex chars.
Returns `{normalized_label}:{hash}`.

**Scenarios:**

- **Edge ID from endpoints (deterministic, `{type}:{16_hex_chars}` format)** —
  `TestEntityIdGeneratorEdges::test_generates_edge_id_deterministically`,
  `test_edge_id_includes_type_prefix`, `test_edge_id_hash_is_16_chars_hex`. COVERED.

---

### Requirement: Canonical Hash Input — COVERED

**Implementation:** Node canonical: `f"{tenant_id_str}:{normalized_type}:{entity_slug_stripped}"`.
Edge canonical: `f"{tenant_id_str}:{start_id_stripped}:{normalized_label}:{end_id_stripped}"`.

**Scenarios:**

- **Node hash input `{tenant_id}:{entity_type}:{entity_slug}`** —
  `TestCanonicalHashInput::test_node_canonical_input_is_tenant_type_slug` computes
  the SHA256 externally using this exact format and asserts the output IDs match.
  COVERED.
- **Edge hash input `{tenant_id}:{start_id}:{edge_type}:{end_id}`** —
  `TestCanonicalHashInput::test_edge_canonical_input_is_tenant_start_type_end`
  does the same for edges. COVERED.

---

### Requirement: SHA256-Based Hashing — COVERED

**Implementation:** `hashlib.sha256(input_string.encode()).hexdigest()[:16]` in
`EntityIdGenerator._generate_hash()`.

**Scenarios:**

- **Hash derivation (first 16 chars of SHA256 hex digest)** —
  `TestSHA256HashDerivation::test_node_id_suffix_is_first_16_chars_of_sha256_digest`
  and `test_edge_id_suffix_is_first_16_chars_of_sha256_digest` both compute the full
  SHA256 digest externally, slice `[:16]`, and assert the actual suffix matches —
  and also assert the suffix is NOT the full 64-char digest. COVERED.

---

### NFR Compliance

- **No mocks/fakes**: all tests operate directly on `EntityIdGenerator` with real
  `hashlib` computation — no `MagicMock` or `AsyncMock`. ✓
- **No logger/print**: pure computation, no observability instrumentation needed. ✓
- **DDD boundary**: `shared_kernel.graph_primitives` imports only `hashlib` (stdlib);
  zero intra-bounded-context imports. ✓
