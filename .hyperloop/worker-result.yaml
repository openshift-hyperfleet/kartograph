## Task-021: API Keys — Spec Alignment Review

### Date: 2026-04-23

All 6 SHALL requirements from `specs/iam/api-keys.spec.md` are implemented
and tested. Every scenario has corresponding test coverage verified by
direct file inspection.

## Requirement Coverage

### Requirement 1: API Key Creation — COVERED

**Code:** `src/api/iam/application/services/api_key_service.py`,
`src/api/iam/application/security.py`, `src/api/iam/domain/aggregates/api_key.py`

- **Scenario: Successful creation** — COVERED
  - `karto_` prefix: `test_secret_has_karto_prefix` (test_api_key_service.py:177)
  - Plaintext returned once: `test_returns_plaintext_secret_only_at_creation` (test_api_key_service.py:155)
  - bcrypt hash stored: `test_creates_api_key_with_hashed_secret` (test_api_key_service.py:129)
  - 12-char prefix stored: `test_stores_prefix_from_secret` (test_api_key_service.py:269) — asserts `api_key.prefix == plaintext_secret[:12]`

- **Scenario: Duplicate name per user** — COVERED
  - `test_raises_on_duplicate_name` (test_api_key_service.py), `test_returns_409_on_duplicate_name` (test_api_key_routes.py:173)

- **Scenario: Expiration bounds** — COVERED
  - `test_creates_with_expiration` (test_api_key_service.py:246), `test_uses_default_expires_in_days_of_30` (test_api_key_routes.py:222)
  - `test_validates_expires_in_days_minimum` (test_api_key_routes.py:255), `test_validates_expires_in_days_maximum` (test_api_key_routes.py:268)
  - Pydantic model: `expires_in_days: int = Field(30, ge=1, le=3650)`

