### Application Service
- PASS: `create()` checks EDIT on workspace before creating
- PASS: `IntegrityError` mapped to `DuplicateKnowledgeGraphNameError` (409)
- PASS: `get()` returns `None` for both unauthorized and non-existent (no existence leakage)
