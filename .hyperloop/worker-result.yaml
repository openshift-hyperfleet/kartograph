## Spec Alignment Review — task-008 (Knowledge Graphs, Management Context)

Branch: `hyperloop/task-008`
Spec: `specs/management/knowledge-graphs.spec.md`

---

### Requirement: Knowledge Graph Creation — COVERED

**SHALL allow users with `edit` permission on a workspace to create knowledge graphs.**

**Scenario: Successful creation**
- Code: `KnowledgeGraph.create()` generates a ULID via `KnowledgeGraphId.generate()` (backed by `ulid.ULID`). `KnowledgeGraphService.create()` checks `Permission.EDIT` on the workspace before proceeding. The KG is saved with `tenant_id` and `workspace_id` fields set correctly.
- Authorization relationships: Established asynchronously via outbox. `KnowledgeGraphCreated` event → `ManagementEventTranslator._translate_knowledge_graph_created()` → two `WriteRelationship` ops (workspace link + tenant link). Transactional outbox ensures the event is durably stored in the same DB transaction as the KG record.
- Tests:
  - `TestKnowledgeGraphCreate.test_create_generates_unique_id` (unit, aggregate)
  - `TestKnowledgeGraphCreate.test_create_emits_knowledge_graph_created_event` (unit, aggregate)
  - `TestKnowledgeGraphServiceCreate.test_create_checks_edit_permission_on_workspace` (unit, service)
  - `TestKnowledgeGraphServiceCreate.test_create_saves_aggregate_via_repo` (unit, service)
  - `TestManagementEventTranslatorKnowledgeGraphCreated.test_first_operation_is_workspace_relationship` (unit, translator)
  - `TestManagementEventTranslatorKnowledgeGraphCreated.test_second_operation_is_tenant_relationship` (unit, translator)
  - `TestOutboxConsistency.test_save_records_outbox_event` (integration, repository)
  - `TestCreateKnowledgeGraph.test_create_knowledge_graph_returns_201` (unit, route)

**Scenario: Duplicate name within tenant**
- Code: DB constraint `uq_knowledge_graphs_tenant_name` enforced at persistence layer. Repository catches `IntegrityError` and raises `DuplicateKnowledgeGraphNameError`. Service propagates this; route returns 409.
- Tests:
  - `TestKnowledgeGraphUniqueness.test_duplicate_name_in_same_tenant_raises_error` (integration, repository)
  - `TestKnowledgeGraphServiceCreate.test_create_raises_duplicate_on_integrity_error` (unit, service)
  - `TestCreateKnowledgeGraph.test_create_knowledge_graph_returns_409_for_duplicate_name` (unit, route)

