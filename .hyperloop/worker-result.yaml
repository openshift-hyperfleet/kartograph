### NFR Compliance

**Observability (DOO):** Business logic (`worker.py`, `composite.py`, `postgres_notify.py`) calls
only probe methods; no `logger.*` or `print()` in non-probe code. `DefaultOutboxWorkerProbe` and
`DefaultEventSourceProbe` use structlog internally (correct — logging is their job).

**Architecture (DDD):** Shared-kernel ports in `shared_kernel/outbox/`; infrastructure in
`infrastructure/outbox/`; bounded-context translators in `iam/infrastructure/outbox/` and
`management/infrastructure/outbox/`. No cross-boundary imports detected.

**Testing (fakes over mocks):** Idempotency test uses `FakeAuthorizationProvider` (a real fake
with set-backed storage). Infrastructure collaborators (session, probe) appropriately use
`MagicMock`/`AsyncMock` (these are not domain collaborators).

