## Knowledge Graphs — Spec Alignment Review (task-008, fresh re-verification)

### Test Suite
- 334 unit tests in `tests/unit/management/` — all pass
- Integration tests exist for authorization, repository, and route layers

### Requirement-by-Requirement Findings

---

**Requirement: Knowledge Graph Creation** — COVERED

Implementation:
- `KnowledgeGraph.create()` in `management/domain/aggregates/knowledge_graph.py`
  calls `KnowledgeGraphId.generate()` which invokes `str(ULID())` — ULID confirmed.
- `KnowledgeGraphService.create()` checks `EDIT` permission on the workspace via SpiceDB
  before creating the aggregate.
- Authorization relationships (workspace, tenant links) established via `KnowledgeGraphCreated`
  event → outbox → `ManagementEventTranslator._translate_knowledge_graph_created()` → SpiceDB
  `WriteRelationship` operations.
- `IntegrityError` from DB is caught and re-raised as `DuplicateKnowledgeGraphNameError` → HTTP 409.

Scenario — Successful creation: COVERED
- Tests: `test_create_sets_all_fields`, `test_create_generates_unique_id`,
  `test_create_emits_knowledge_graph_created_event`, `test_create_saves_aggregate_via_repo`,
  `test_create_checks_edit_permission_on_workspace`, `test_create_probes_success`

Scenario — Duplicate name within tenant: COVERED
- Test: `test_create_raises_duplicate_on_integrity_error`,
  `test_create_knowledge_graph_returns_409_for_duplicate_name`

