### Implementation Summary

**Domain** (`management/domain/aggregates/knowledge_graph.py`):
- `KnowledgeGraph.create()` generates ULID ID, validates name (1-100 chars),
  emits `KnowledgeGraphCreated` event including `workspace_id` and `tenant_id`
- `KnowledgeGraph.update()` validates name, raises `AggregateDeletedError` if deleted
- `KnowledgeGraph.mark_for_deletion()` idempotent; emits `KnowledgeGraphDeleted`
  with `workspace_id` for SpiceDB cleanup
- Domain probe (DOO) wired throughout all mutating operations

**Application** (`management/application/services/knowledge_graph_service.py`):
- `create()`: EDIT check on workspace → `KnowledgeGraph.create()` → `repo.save()`
  in `session.begin()` → maps `IntegrityError` to `DuplicateKnowledgeGraphNameError`
- `get()`: fetches → tenant-checks → VIEW permission check → returns `None` for both
  unauthorized and not-found (no existence leakage per spec)
- `list_for_workspace()`: VIEW check on workspace → SpiceDB `read_relationships`
  to discover KG IDs → fetch each → filter by tenant
- `update()`: EDIT check on KG → fetch → `kg.update()` → save in transaction
- `delete()`: MANAGE check → cascade DSs (+ secret store) + KG in one `session.begin()`

**Authorization** (`shared_kernel/authorization/spicedb/schema.zed`):
- `view = admin + editor + viewer + workspace->view`
- `edit = admin + editor + workspace->edit`
- `manage = admin + workspace->manage`
- Outbox translator writes workspace+tenant relationships on Create,
  and cleans up all 5 relation types on Delete

**Presentation** (`management/presentation/knowledge_graphs/routes.py`):
- `POST /management/workspaces/{ws_id}/knowledge-graphs` → 201/403/409/422/401
- `GET /management/knowledge-graphs/{id}` → 200/404/401
- `GET /management/workspaces/{ws_id}/knowledge-graphs` → 200/403/401
- `PATCH /management/knowledge-graphs/{id}` → 200/403/404/409/422/401
- `DELETE /management/knowledge-graphs/{id}` → 204/403/404/401

**Atomicity**: `async with self._session.begin()` wraps all cascade operations;
`test_delete_rolls_back_on_ds_deletion_failure` confirms KG is never deleted when
a DS deletion fails mid-cascade.

All 7 SHALL requirements and 12 scenarios are fully implemented and tested.

