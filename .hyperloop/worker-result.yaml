## What This Task Delivered

Files changed vs `alpha`:
- `src/api/iam/domain/aggregates/group.py` — `Group.create()` now trims whitespace
  and raises `ValueError` for empty/whitespace-only or >255 char names, consistent
  with the existing `Group.rename()` behavior.
- `src/api/iam/presentation/groups/models.py` — Added `field_validator` to both
  `CreateGroupRequest` and `UpdateGroupRequest` to strip whitespace and reject
  whitespace-only names at the API boundary (HTTP 422).
- `src/api/tests/unit/iam/domain/test_group_aggregate.py` — 9 new domain tests
  covering all `Group.create()` name validation scenarios.
- `src/api/tests/unit/iam/presentation/test_group_routes.py` — 16 new presentation
  tests covering POST /groups, GET /groups/{id}, and DELETE /groups/{id} routes
  (previously untested).
- `src/api/tests/integration/iam/test_group_workspace_inheritance.py` — New integration
  test `test_member_added_after_group_assigned_to_workspace_gets_access` covering the
  previously PARTIAL spec scenario (group in workspace first, then member added, then
  permission verified).

