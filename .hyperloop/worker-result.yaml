### Requirement: Dual Delivery Mechanism — COVERED

**Scenario: Real-time notification**
- Implementation: `PostgresNotifyEventSource` (`infrastructure/outbox/event_sources/postgres_notify.py`)
  uses `asyncpg-listen` to subscribe to `outbox_events`; a migration
  (`d32ecc44581a_create_outbox_notify_trigger.py`) creates a AFTER INSERT trigger that
  calls `pg_notify('outbox_events', NEW.id::text)`. Worker wires it via `_process_single`.
- Unit test: `test_notify_triggers_callback_with_uuid` in `test_postgres_notify_event_source.py`
  — simulates a NOTIFY with a UUID payload and asserts the callback is invoked with the
  correct `UUID` object.
- Integration test: `TestOutboxWorkerNotifyProcessing.test_worker_processes_via_notify_not_polling`
  — starts worker with `poll_interval_seconds=999`, creates a group, waits 500 ms, verifies
  entry is `processed_at` set (proving NOTIFY path, not polling).

**Scenario: Polling fallback**
- Implementation: `OutboxWorker.start()` always creates the `_poll_loop` task (`asyncio.create_task`).
  The loop runs `_process_batch()` every `poll_interval_seconds` (default: **30 seconds** per
  constructor signature `poll_interval_seconds: int = 30`).
- Unit tests: `TestOutboxWorkerIdempotency` tests verify `fetch_unprocessed` returns only
  unprocessed (`processed_at IS NULL`, `failed_at IS NULL`) entries — the mechanism the
  poll loop uses to discover missed events.
- Integration test: `test_worker_processes_group_created_and_writes_to_spicedb` calls
  `_process_batch()` directly (the same method the poll loop calls), demonstrating that
  entries not handled by NOTIFY are found and processed.
- Note: There is no unit test that directly calls `worker.start()` and verifies the poll
  task is created, nor a test asserting the default is exactly 30 seconds. However, these
  are trivially verifiable from the source and not a blocking concern given the integration
  coverage.

