### Observations (not failures)

1. **API Key VIEW via SpiceDB integration**: The owner's VIEW permission on api_key resources
   is verified only through schema-text parsing (unit) and by inference from the revoke integration
   test + `test_api_key_view_and_revoke_have_same_grantees`. A future improvement would be a
   direct `check_permission("api_key:x", "view", owner_subject)` integration test.

2. **Single-role enforcement — no read_relationships verification**: The integration test for
   workspace role replacement verifies final permissions but does not call `read_relationships`
   to confirm the old SpiceDB tuple is absent. The domain aggregate test covers this gap by
   asserting `WorkspaceMemberRemoved` is emitted, which drives the SpiceDB tuple deletion.

3. **Secure Enclave "unresolvable KG" case**: No explicit test for a valid-format kg_id string
   that doesn't exist in SpiceDB. The implementation correctly handles this (SpiceDB returns
   False for unknown resource), but an explicit test would strengthen coverage.

These observations are minor and do not constitute failures.
