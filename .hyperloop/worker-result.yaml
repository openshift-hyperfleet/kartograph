### check-auth-status-codes.sh Manual Review

The script flagged two lines — both are pre-existing, unrelated to task-008:

1. `test_api_key_auth.py:527: assert revoke_response.status_code == 403`
   — Tests that a non-admin (Bob) cannot revoke another user's (Alice's) API key.
   A 403 is correct here: this is a mutation by an authenticated-but-not-authorized
   user. The "no distinction" pattern (return 404) applies only to read/retrieval
   scenarios; it does not apply to mutations.

2. `test_auth_enforcement.py:129: assert response.status_code not in [401, 403]`
   — A *negative* assertion for the `/health/db` endpoint (verifying it does NOT
   return 401 or 403). The grep matched due to the literal "403" in the `not in`
   list. This is a correct health-check accessibility assertion.

Neither line is in knowledge-graph test files. Both are legitimate.

