### Fixes Applied in This Round

The previous review (round 1) identified two failing check scripts:
1. `check-partial-error-assertions` — 4 OR-chained assertions in Python test files
2. `check-weak-test-assertions` — 1 weak membership assertion on `error_type`

All violations have been resolved:

#### check-partial-error-assertions fixes

1. **`tests/integration/test_query_mcp.py`** — Split OR-chained assertion on
   `result.message` into two independent assertions:
   - `assert "read-only" in result.message.lower()`
   - `assert "CREATE" in result.message`
   (Both are always present in the `QueryForbiddenError` message.)

2. **`tests/unit/graph/application/test_mutation_service.py`** — Split OR-chained
   assertion on `result.errors[0]` into two independent assertions:
   - `assert "JSON" in result.errors[0]`
   - `assert "parse" in result.errors[0].lower()`
   (The actual error message is `"JSON parse error on line N: ..."`)

3. **`tests/unit/infrastructure/test_cors_settings.py`** — Split OR-chained
   assertion on `error_str` into two independent assertions:
   - `assert "wildcard" in error_str.lower()`
   - `assert "credentials" in error_str.lower()`
   (Both appear in the Pydantic validation error for the wildcard+credentials constraint.)

4. **`tests/unit/infrastructure/test_settings.py`** — Replaced OR-chained assertion
   with two assertions matching the actual error format:
   - `assert "pool_max_connections" in error_str`
   - `assert ">=" in error_str`
   ("greater" was NOT in the error message — the message uses ">=" — so the OR
   was silently masking a broken assertion for 5+ tasks.)

#### check-weak-test-assertions fix

5. **`tests/integration/test_query_mcp.py`** — Replaced `error_type in ["timeout",
   "execution_error"]` with `assert result.error_type == "timeout"`. With a 1ms
   `statement_timeout`, PostgreSQL raises a cancellation that maps to
   `QueryTimeoutError` → `error_type = "timeout"`.

#### check-partial-error-assertions script bug fix

The check script's TS grep pattern `'expect.*toContain.*\|\|.*toContain'` was using
plain grep (BRE mode) where `\|` is alternation (GNU extension). The pattern
`\|\|` created two empty alternations, matching every line in every `.ts` file —
a false-positive that affected all UI component files. Fixed by adding `-E`
(extended regex) to the TS grep call, where `\|\|` correctly means literal `||`.

