### Requirement: Ontology Design — COVERED

**Implementation:** `pages/data-sources/index.vue` has a 4-step wizard: adapter selection → connection config → intent description → ontology review. Proposed ontology review, individual type editing, and re-extraction confirmation gate are implemented.

**Tests:** COVERED (`data-sources.test.ts` — "Data Sources Wizard - Intent Step", "Data Sources Wizard - Approval"; `knowledge-graphs.test.ts` — "Ontology Edit - Post-Extraction Confirmation Gate"). Tests cover: intent validation, ontology step transition, re-extraction warning dialog, confirm/cancel flows.

**Gap (minor):** "Individual type editing" (modifying label, description, required/optional properties, adding/removing relationship types) is implemented in the component but has no dedicated unit test for the edit state transitions.

---

### Requirement: Sync Monitoring — PARTIAL

**Implementation:** `pages/data-sources/index.vue` contains sync run display with status, history, logs sheet, and manual trigger.

**Tests:**
- Sync duration computation: COVERED (`data-sources.test.ts` — "Sync Monitoring")
- Sync logs (view/fetch/close): COVERED (`knowledge-graphs.test.ts` — "Sync Logs - View Logs Toggle", "Sync Logs - Fetching log lines")
- Active sync progress (ingesting/extracting/applying phases with progress indicator): NO test. The spec requires showing "ingesting, extracting, applying" phases with a "progress indicator appropriate to the current phase." No test verifies this phase-based display logic.
- Sync history (completed runs with status, timestamps, duration): The `data-sources.test.ts` test only checks `status: 'idle'` when no runs exist and duration computation. There is no test for the full history list rendering with timestamps.
- Manual sync trigger: NO test. The spec requires "GIVEN a data source the user has manage permission on, WHEN the user triggers a sync, THEN a new sync run begins." No test for this flow.

**Gap:** Missing tests for: (1) active sync progress phase display, (2) sync history list with all required fields, (3) manual sync trigger flow.

