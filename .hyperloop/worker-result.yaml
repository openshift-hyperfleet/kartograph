### Changes Made

**New file: `ingestion/infrastructure/dlt_runner.py`**

`DltAdapterRunner` wraps any `IDatasourceAdapter` in a dlt pipeline that:

1. **Runs in-process** — `dlt.pipeline(...).run(source)` is called as a Python
   library call (no Docker, no subprocess). The pipeline runs in a
   `ThreadPoolExecutor` worker to avoid blocking the async caller.

2. **Persists checkpoint state via dlt resource state** — `dlt.current.resource_state()`
   is used inside the dlt resource to read the previous checkpoint before calling
   `adapter.extract()` and to persist the updated checkpoint after. dlt writes
   this state to the destination on every successful run. For PostgreSQL
   destinations (production), state lands in the `dlt_internal` schema. For
   filesystem destinations (unit tests), state is stored as JSON files.

3. **Writes extracted data to disk** — `_write_output_files()` writes:
   - `{output_dir}/changeset.jsonl` — one JSON object per `ChangesetEntry`.
   - `{output_dir}/blobs/{hex_digest}` — raw bytes for each content blob,
     named by SHA-256 digest (content-addressed storage).
   The files are available as soon as `run()` returns, for the JobPackager.

**New file: `tests/unit/ingestion/infrastructure/test_dlt_runner.py`**

17 new unit tests covering all three scenarios:

- `TestDltInProcessExecution` (4 tests): pipeline runs in-process, adapter is
  called exactly once, `last_extraction_result` is accessible after run.

- `TestExtractedDataOnDisk` (9 tests): output directory exists, content blobs
  are written as individual files keyed by SHA-256 digest, `changeset.jsonl`
  contains one valid JSON line per entry, empty extraction produces empty
  changeset.

- `TestDltStatePersistence` (4 tests): first run passes `checkpoint=None`,
  checkpoint is persisted after run, second run with the same pipeline name and
  destination restores checkpoint from state (state round-trip), state survives
  runner object recreation (simulating Kubernetes pod restart).

Tests use `FakeAdapter` (no mocks) and `dlt.destinations.filesystem` pointing
to `tmp_path`. No infrastructure dependencies required.

