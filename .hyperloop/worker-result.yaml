### Requirement: Error Categorization

#### Scenario A – Forbidden → error type "forbidden"
**Status: COVERED**

- **Implementation**: `MCPQueryService` catches `QueryForbiddenError` →
  `QueryError(error_type="forbidden")`.
- **Unit test**: `test_categorizes_forbidden_error`.
- **Integration test**: `test_execute_cypher_query_forbidden_error` asserts
  `result.error_type == "forbidden"`.

#### Scenario B – Timeout → error type "timeout"
**Status: PARTIAL → FAIL**

- **Implementation**: Catches `QueryTimeoutError` → `QueryError(error_type="timeout")`.
- **Unit test**: `test_categorizes_timeout_error` correctly asserts `== "timeout"`.
- **Integration test gap**: `test_execute_cypher_query_timeout_error` asserts
  `error_type in ["timeout", "execution_error"]`. Strict enforcement required.
- **What is needed**: `assert result.error_type == "timeout"`.

#### Scenario C – Execution error → error type "execution_error"
**Status: PARTIAL**

- **Implementation**: Catches `QueryExecutionError` →
  `QueryError(error_type="execution_error")`.
- **Unit test**: `test_categorizes_execution_error`.
- **Integration test gap**: No integration test exercises a syntax error or
  runtime DB failure to confirm the `"execution_error"` classification
  end-to-end.
- **Note**: Unit test is sufficient per the protocol. This is a note, not a FAIL.

#### Scenario D – Unexpected failure → error type "unknown_error"
**Status: PARTIAL**

- **Implementation**: Bare `except Exception` → `QueryError(error_type="unknown_error")`.
- **Unit test**: `test_categorizes_unknown_error` raises `ValueError` and asserts
  `== "unknown_error"`.
- **Integration test gap**: No integration test. Unit test is sufficient per
  the protocol. This is a note, not a FAIL.

