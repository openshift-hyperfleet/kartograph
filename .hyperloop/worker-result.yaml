#### 7. Permission Inheritance ‚Äî COVERED

**Implementation:** SpiceDB schema `schema.zed` (lines 102‚Äì131):
```
definition knowledge_graph {
  relation workspace: workspace
  relation tenant: tenant
  relation admin: user | group#member
  relation editor: user | group#member
  relation viewer: user | group#member
  permission view = admin + editor + viewer + workspace->view
  permission edit = admin + editor + workspace->edit
  permission manage = admin + workspace->manage
}
```

**Scenario: Workspace-inherited access** ‚Äî COVERED
- Tests: `TestWorkspaceInheritedKnowledgeGraphAccess.*` (7 integration tests against real SpiceDB)
  covers workspace editor ‚Üí VIEW, workspace editor ‚Üí EDIT, workspace editor ‚Üí NO MANAGE,
  workspace admin ‚Üí MANAGE, workspace member ‚Üí VIEW, workspace member ‚Üí NO EDIT,
  user with no role ‚Üí no access

**Scenario: Direct grant** ‚Äî COVERED
- Tests: `TestDirectGrantKnowledgeGraphAccess.*` (5 integration tests)
  covers direct admin ‚Üí MANAGE/EDIT/VIEW, direct editor ‚Üí EDIT+VIEW not MANAGE,
  direct viewer ‚Üí VIEW only

