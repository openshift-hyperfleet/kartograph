### Requirement 5: Dual Delivery Mechanism ‚Äî COVERED

**Implementation:**
- Real-time: PostgreSQL trigger (`d32ecc44581a_create_outbox_notify_trigger.py`) fires
  `pg_notify('outbox_events', NEW.id::text)` on INSERT. `PostgresNotifyEventSource`
  uses `asyncpg-listen` to receive and dispatch.
- Polling fallback: `OutboxWorker._poll_loop()` calls `_process_batch()` every
  `poll_interval_seconds` (default 30).

