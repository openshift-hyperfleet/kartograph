### Per-Requirement Detail

#### Requirement: Knowledge Graph Creation

**Scenario: Successful creation**
- Code: `KnowledgeGraphService.create()` checks `Permission.EDIT` on the workspace via
  `_check_permission`, then calls `KnowledgeGraph.create()` which generates a ULID ID
  (`KnowledgeGraphId.generate()` → `str(ULID())`), saves via repository, and records a
  `KnowledgeGraphCreated` event into the transactional outbox.
- Authorization relationships (workspace + tenant) are written to SpiceDB by the outbox
  worker processing `KnowledgeGraphCreated` via `ManagementEventTranslator._translate_knowledge_graph_created()`.
  This produces two `WriteRelationship` operations: `knowledge_graph#workspace@workspace:<id>`
  and `knowledge_graph#tenant@tenant:<id>`.
- Tests:
  - `test_create_checks_edit_permission_on_workspace` — verifies EDIT check
  - `test_create_saves_aggregate_via_repo` — verifies ULID ID generation and association
  - `test_create_sets_all_fields` — verifies all fields set correctly
  - `test_create_generates_unique_id` — verifies ID uniqueness
  - `test_translates_to_workspace_and_tenant_relationships` (translator test) — verifies authz writes
  - `test_first_operation_is_workspace_relationship`, `test_second_operation_is_tenant_relationship` — verifies exact relationship tuples

**Scenario: Duplicate name within tenant**
- Code: `IntegrityError` (from `uq_knowledge_graphs_tenant_name` constraint) is caught
  in `KnowledgeGraphService.create()` and re-raised as `DuplicateKnowledgeGraphNameError`.
  Route returns 409 Conflict.
- Tests:
  - `test_create_raises_duplicate_on_integrity_error` (service)
  - `test_duplicate_name_in_same_tenant_raises_error` (integration/repository)
  - `test_create_knowledge_graph_returns_409_for_duplicate_name` (route)

#### Requirement: Knowledge Graph Name Validation

**Scenario: Valid name**
- Code: `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`.
- Tests: `test_create_accepts_name_exactly_100_chars`, `test_create_accepts_single_char_name`

**Scenario: Empty or oversized name**
- Code: Same `_validate_name()` raises `InvalidKnowledgeGraphNameError` for empty or >100 char names.
  Pydantic model in the presentation layer also catches this at the HTTP boundary (422).
- Tests:
