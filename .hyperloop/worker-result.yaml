### Spec Scenario Coverage

All three previously-MISSING dlt Framework Integration scenarios are now covered:

1. **In-process execution**: `DltAdapterRunner.run()` calls `loop.run_in_executor()`
   which drives dlt as a Python library inside a ThreadPoolExecutor — no Docker,
   no subprocess. Tests: `TestDltInProcessExecution` (4 tests). ✓

2. **State persistence via database**: `dlt.current.resource_state()` reads/writes
   `adapter_checkpoint` within the dlt resource. For PostgreSQL destinations this maps
   to the `dlt_internal` schema; for filesystem destinations (unit tests) it maps to
   JSON files. Two-run round-trip test and pod-restart simulation test both pass. ✓

3. **Extracted data on disk**: `_write_output_files()` writes `changeset.jsonl` and
   `blobs/{sha256_hex_digest}` files to the pipeline output directory. Tests:
   `TestExtractedDataOnDisk` (8 tests verifying file presence, content, and format). ✓

