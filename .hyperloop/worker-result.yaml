#### REQ-6: API Key Name Validation — COVERED

**Code:** `iam/presentation/api_keys/models.py::CreateAPIKeyRequest` — `min_length=1, max_length=255`

**Scenario: Valid name (1–255 chars)** — COVERED (partially by constraint)
- Pydantic `Field(..., min_length=1, max_length=255)` enforces bounds declaratively.
- `test_creates_api_key_returns_201` (route unit): valid name produces 201.
- No explicit boundary test for the upper bound (255-char name). The constraint is enforced by
  Pydantic at serialization time; a boundary test would be redundant but could add confidence.

**Scenario: Empty name** — COVERED
- `test_validates_name_min_length` (route unit): empty string → HTTP 422
- `test_requires_name_field` (route unit): missing field → HTTP 422

