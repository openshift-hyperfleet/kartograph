## task-003 Graph Mutations — Spec Alignment Review

Reviewed spec: `specs/graph/mutations.spec.md`
Branch: `hyperloop/task-003`

---

### Per-Requirement Findings

#### Requirement: Per-Tenant Graph Isolation — COVERED

- **Implementation:** `get_tenant_graph_name()` in `graph/dependencies.py` returns
  `f"tenant_{current_user.tenant_id.value}"`. `get_age_graph_client()` scopes the AGE
  client to this graph name per request.
- **Scenario: Tenant graph routing:**
  - Code: `dependencies.py::get_tenant_graph_name()` + `get_age_graph_client()` DI wiring.
  - Tests: `test_routes.py::TestTenantGraphRouting::test_graph_client_uses_tenant_specific_graph_name`
    asserts `graph_name == "tenant_t1"`.
    `test_graph_name_uses_full_tenant_id` asserts the full tenant ID is used.
  - The "no data written to another tenant's graph" invariant is architecturally enforced
    by the scoped client; unit tests confirm the name derivation is correct.

---

#### Requirement: KnowledgeGraph Scoping — COVERED

- **Scenario: Mutation authorization:**
  - Implementation: `graph/presentation/routes.py::apply_kg_mutations()` calls
    `authz.check_permission(resource, Permission.EDIT, subject)` before invoking the
    service; returns HTTP 403 on denial.
  - Tests: `test_routes.py::TestKnowledgeGraphScopedMutationsRoute::
    test_kg_mutations_route_forbidden_without_edit_permission` (403 returned, service
    not called); `test_kg_mutations_route_accessible_with_edit_permission` (200 with edit).
    `test_kg_mutations_route_checks_correct_resource` asserts the resource string contains
    the specific `knowledge_graph_id` and resource type.

- **Scenario: KnowledgeGraph ID stamping:**
  - Implementation: `GraphMutationService._stamp_knowledge_graph_id()` overwrites
    caller-supplied `knowledge_graph_id` on every CREATE/UPDATE with `set_properties`.
    Stamping happens before `validate_operation()` is called; callers cannot provide a
    spoofed value that survives into the database.
  - Tests:
    - `test_mutation_service.py::TestKnowledgeGraphIdStamping::
      test_stamps_knowledge_graph_id_on_create_operation` — service stamps correct value.
    - `test_overwrites_caller_provided_knowledge_graph_id` — "SPOOFED-ID" is replaced.
    - `test_stamps_knowledge_graph_id_on_update_operation` — UPDATE ops also stamped.
    - `test_does_not_stamp_on_delete_operation` — DELETE has no set_properties; unaffected.
    - `test_stamps_knowledge_graph_id_in_jsonl_parse` — end-to-end JSONL path stamped.
    - `test_kg_mutations_route_passes_knowledge_graph_id_to_service` — route passes path
      param to service.

