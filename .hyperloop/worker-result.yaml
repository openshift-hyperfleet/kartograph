## Task-008: Knowledge Graphs — Implementation Verified

All 2060 unit tests pass (330 management-specific). Every SHALL requirement has
complete implementation and test coverage.

### Requirement: Knowledge Graph Creation — COVERED
- `KnowledgeGraphService.create()` checks `Permission.EDIT` on workspace
- ULID generated via `KnowledgeGraphId.generate()`
- Tenant/workspace associations stored on aggregate
- SpiceDB relationships established via outbox: `KnowledgeGraphCreated` event →
  `ManagementEventTranslator` writes workspace and tenant relationships
- `IntegrityError` → `DuplicateKnowledgeGraphNameError` (409 Conflict)
- Tests: `TestKnowledgeGraphServiceCreate`, `TestCreateKnowledgeGraph` (routes)

### Requirement: Knowledge Graph Name Validation — COVERED
- `KnowledgeGraph._validate_name()` enforces 1–100 character constraint at domain layer
- `CreateKnowledgeGraphRequest` / `UpdateKnowledgeGraphRequest` Pydantic models
  enforce via `min_length=1, max_length=100` → 422 at presentation layer
- Tests: `TestKnowledgeGraphValidation`, route 422 tests for both create and update

### Requirement: Knowledge Graph Retrieval — COVERED
- `KnowledgeGraphService.get()` returns `None` if not found, wrong tenant, or
  user lacks `Permission.VIEW` — no existence leakage (404 in both cases)
- Tests: `TestKnowledgeGraphServiceGet`, `TestGetKnowledgeGraph` (routes)

### Requirement: Knowledge Graph Listing — COVERED
- `list_for_workspace()` checks `Permission.VIEW` on workspace, reads SpiceDB
  relationships to discover KG IDs linked to the workspace, filters by tenant
- Tests: `TestKnowledgeGraphServiceListForWorkspace`, `TestListKnowledgeGraphs`

### Requirement: Knowledge Graph Update — COVERED
- `KnowledgeGraphService.update()` checks `Permission.EDIT` on the KG
- `kg.update()` enforces name validation and `AggregateDeletedError` guard
- Tests: `TestKnowledgeGraphServiceUpdate`, `TestUpdateKnowledgeGraph` (routes),
  `TestKnowledgeGraphUpdate` (aggregate)

### Requirement: Knowledge Graph Deletion — COVERED
- `KnowledgeGraphService.delete()` checks `Permission.MANAGE`
- Single `async with self._session.begin()` transaction: cascade-deletes data sources
  (including encrypted credentials), then marks KG for deletion and deletes it
- `KnowledgeGraphDeleted` → translator deletes workspace/tenant relationships and
  all direct admin/editor/viewer grants via filter-based deletion
- `AggregateDeletedError` raised on any mutation after deletion
- Tests: `TestKnowledgeGraphServiceDelete` (including rollback and cascade tests),
  `TestDeleteKnowledgeGraph` (routes), `TestKnowledgeGraphMarkForDeletion`

### Requirement: Permission Inheritance — COVERED
- SpiceDB schema: `knowledge_graph.view = admin + editor + viewer + workspace->view`,
  `edit = admin + editor + workspace->edit`, `manage = admin + workspace->manage`
- Integration tests: `test_knowledge_graph_authorization.py` covers workspace-inherited
  access and direct grant scenarios
