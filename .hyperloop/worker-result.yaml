### 3. API Key Listing — COVERED

**Implementation:**
- `APIKeyService.list_api_keys()` calls `authz.lookup_resources()` for viewable key IDs, then `api_key_repository.list()`.
- `GET /iam/api-keys?user_id=...` route with optional filter.
- `APIKeyResponse` exposes: `name`, `prefix`, `created_at`, `expires_at`, `last_used_at`, `is_revoked`. Never exposes `secret` or `key_hash`.

**Scenario: List keys**
- `test_lists_api_keys_for_user` — unit, `test_api_key_routes.py` ✓
- `test_never_returns_secret_or_hash` — unit, asserts `secret`, `key_hash`, `hash` absent from response ✓
- `test_lists_api_keys_using_authz` — unit, `test_api_key_service.py` ✓

**Scenario: Filter by creator**
- `test_filters_by_created_by_user_id` — unit, `test_api_key_service.py` ✓

