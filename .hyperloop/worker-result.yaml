### Requirement: Event Fan-Out — COVERED

**Scenario: Multiple handlers registered**
- Code: `CompositeEventHandler.register()` appends each handler to the list for its event
  types; `handle()` iterates and awaits all handlers for the type.
- Test: `test_handle_fans_out_to_multiple_handlers` — registers two handlers for the same
  event type, calls `handle()`, asserts both are awaited.

**Scenario: Unknown event type**
- Code: `CompositeEventHandler.handle()` raises `UnknownEventTypeError` when no handlers
  are registered. `OutboxWorker._process_entries()` catches `UnknownEventTypeError` and
  calls `_move_to_dlq()` immediately (bypassing `_increment_retry()`).
- Tests:
  - `test_handle_raises_for_unknown_event_type` — verifies `UnknownEventTypeError` raised.
  - `test_unknown_event_type_immediately_moves_to_dlq` — verifies DLQ path, not retry.
  - `test_unknown_event_type_dlq_even_at_zero_retries` — verifies DLQ at retry_count=0.
  - `test_retry_not_called_for_unknown_event_type` — patches `_increment_retry` and asserts
    it is never called.
  - `test_unknown_event_type_error_is_not_value_error` — ensures the exception type is
    distinguishable from generic transient errors.

