### Requirement: Staging-Based Ingestion — COVERED

**Code:** `src/api/graph/infrastructure/age_bulk_loading/staging.py`
- `create_node_staging_table()` (l. 23–36): TEMP table with `ON COMMIT DROP`
- `copy_nodes_to_staging()` (l. 57–97): uses `cursor.copy_from()` — COPY protocol
- `create_edge_staging_table()` (l. 38–55): TEMP table with graphid columns, `ON COMMIT DROP`
- `create_graphid_lookup_table()` (l. 200–247): queries `_ag_label_vertex`, `ON COMMIT DROP`, creates index on logical_id

**Critical spec requirement — same-batch node materialization:**
- `strategy.py` line 152–159: CREATE nodes executes first (upsert to graph)
- `strategy.py` line 161–168: CREATE edges executes second — `create_graphid_lookup_table()` is called at line 294–295 AFTER nodes are inserted
- PostgreSQL transaction visibility ensures same-batch nodes appear in `_ag_label_vertex` at lookup time

