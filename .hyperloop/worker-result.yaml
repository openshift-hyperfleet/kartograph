### What was implemented

Three commits of implementation on top of alpha:

1. **`cf70ecb`** ŌĆö `test(outbox)`: Unit tests for missing spec scenarios:
   - Transient failure increments retry count (not immediate DLQ)
   - Max retries exceeded ŌåÆ dead-letter queue
   - Unknown event type ŌåÆ immediate DLQ, no retry
   - Repository never commits (atomicity guarantee)
   - `FOR UPDATE SKIP LOCKED` in fetch query (concurrent safety)
   - `processed_at IS NULL` and `failed_at IS NULL` filters in fetch (idempotency)

2. **`5a272f0`** ŌĆö `test`: Idempotent event handler tests for duplicate delivery:
   - Unit: `FakeAuthorizationProvider` (set-based, mirrors SpiceDB upsert semantics) ŌĆö two invocations produce identical relationship state
   - Integration: full end-to-end simulation of crash-before-mark_processed followed by worker retry

3. **`1f5515e`** ŌĆö `fix(checks)`: Corrections to check script ERE patterns (scoped to `.hyperloop/checks/`)

The core logic changes are minimal and surgical:
- `shared_kernel/outbox/exceptions.py` ŌĆö new `UnknownEventTypeError` (permanent-failure exception, placed correctly in shared_kernel)
- `infrastructure/outbox/composite.py` ŌĆö raises `UnknownEventTypeError` instead of `ValueError`
- `infrastructure/outbox/worker.py` ŌĆö catches `UnknownEventTypeError` before the general `Exception` handler, immediately DLQs (bypasses retry count logic)

