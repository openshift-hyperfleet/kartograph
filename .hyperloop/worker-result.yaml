### Requirement Status

**1. Per-Tenant Graph Isolation — COVERED**

- Implementation: `src/api/graph/dependencies.py` lines 40-54 (`get_tenant_graph_name`)
  returns `f"tenant_{current_user.tenant_id.value}"` and `get_age_graph_client` uses
  this as the graph name for every request-scoped client.
- Tests: `src/api/tests/unit/graph/presentation/test_routes.py` lines 474-509
  (`TestTenantGraphRouting`) — two unit tests assert the exact `tenant_{tenant_id}` pattern.

**2. KnowledgeGraph Scoping — Authorization — COVERED**

- Implementation: `src/api/graph/presentation/routes.py` lines 124-134 — checks SpiceDB
  `edit` permission via `authz.check_permission(resource, Permission.EDIT, subject)` and
  raises HTTP 403 if denied.
- Tests: `test_routes.py` lines 363-386 (`test_kg_mutations_route_forbidden_without_edit_permission`)
  and lines 448-472 — verifies 403 returned and service not called when permission denied.

**3. KnowledgeGraph Scoping — KG ID Stamping — COVERED**

- Implementation: `src/api/graph/application/services/graph_mutation_service.py` lines
  54-80 (`_stamp_knowledge_graph_id`) — stamps `knowledge_graph_id` on all CREATE/UPDATE
  ops with `set_properties`, overwriting any caller-supplied value.
- Tests: `src/api/tests/unit/graph/application/test_mutation_service.py` lines 637-849
  (`TestKnowledgeGraphIdStamping`) — 6 tests covering: stamping on CREATE, overwriting
  caller-supplied value, stamping on UPDATE, not stamping on DELETE, and JSONL path.

