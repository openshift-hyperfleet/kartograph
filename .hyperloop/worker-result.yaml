spec_coverage:
  per_tenant_graph_isolation:
    status: pass
    note: >
      get_tenant_graph_name() in graph/dependencies.py returns tenant_{tenant_id}.
      get_age_graph_client() wires this to the AgeGraphClient.
      TestTenantGraphRouting tests confirm the graph name format.

  knowledge_graph_scoping:
    status: pass
    note: >
      POST /graph/knowledge-graphs/{knowledge_graph_id}/mutations checks SpiceDB
      edit permission before processing. Service stamps knowledge_graph_id on all
      CREATE/UPDATE ops, overwriting caller-provided values. Route passes
      knowledge_graph_id kwarg to apply_mutations_from_jsonl(). Full test coverage
      in TestKnowledgeGraphScopedMutationsRoute.

  mutation_log_format:
    status: pass
    note: >
      apply_mutations_from_jsonl() handles JSONL parsing, reports errors with line
      number and content preview, skips blank/whitespace lines. Tests in
      TestGraphMutationServiceApplyFromJSONL cover all three scenarios.

  define_operation:
    status: pass
    note: >
      GraphMutationService.apply_mutations() stores DEFINE ops in type_def_repo,
      auto-injects node system properties (data_source_id, source_path, slug) and
      edge system properties (data_source_id, source_path — no slug).
      Tested in test_apply_mutations_stores_define_operations and
      test_apply_define_edge_type_adds_edge_system_properties.

  create_operation:
    status: pass
    note: >
      Idempotent merge via jsonb || operator preserves existing properties.
      Edge CREATE requires start_id and end_id (validated in validate_operation).
      Missing type definition returns validation error. Missing required properties
      returns validation error. Schema learning discovers extra optional properties.
      AGE bulk loading queries.py _build_update_existing_query implements merge.

  update_operation:
    status: pass
    note: >
      AgeQueryBuilder.update_properties() merges new properties (jsonb ||).
      AgeQueryBuilder.remove_properties() deletes keys (jsonb - text[]).
      Schema learning applies to UPDATE set_properties. Tested in
      test_schema_learning.py and test_age_query_builder_update_merge.py.

  delete_operation:
    status: pass
    note: >
      delete_node_with_detach() deletes connected edges then node (two queries).
      delete_edge() deletes only the edge. Both use scalar = %s (not = ANY)
      for query plan safety. Tested in test_age_query_builder_deletes.py.

  mandatory_system_properties:
    status: pass
    note: >
      MutationOperation.validate_operation() enforces data_source_id, source_path,
      slug (node), knowledge_graph_id presence for CREATE. Edge CREATE requires
      data_source_id, source_path, knowledge_graph_id. Tested in
      test_domain_value_objects.py TestMutationOperation.

  deterministic_entity_ids:
    status: pass
    note: >
      ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$" enforced by Pydantic on MutationOperation.id.
      GraphExtractionReadOnlyRepository.generate_id() produces deterministic SHA256-based IDs.
      Tested in test_graph_repository.py TestGenerateId.

  referential_integrity_ordering:
    status: pass
    note: >
      MutationApplier._sort_operations() enforces DEFINE(0) → DELETE-edge(1,0)
      → DELETE-node(1,1) → CREATE-node(2,0) → CREATE-edge(2,1) → UPDATE(3,*).
      Comprehensive test in test_mutation_applier_sort.py
      TestSortOperationsReferentialIntegrity.

