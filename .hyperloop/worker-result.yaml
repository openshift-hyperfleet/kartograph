## Per-Requirement Findings

### Requirement: Knowledge Graph Creation — COVERED

- `KnowledgeGraphService.create()` checks EDIT permission on workspace via SpiceDB before proceeding.
- `KnowledgeGraph.create()` generates a ULID via `KnowledgeGraphId.generate()`, sets `tenant_id`, `workspace_id`.
- On save, the `KnowledgeGraphCreated` domain event is written to outbox in the same DB transaction.
- `ManagementEventTranslator._translate_knowledge_graph_created()` produces two `WriteRelationship`
  operations: `knowledge_graph:#workspace@workspace:<ws_id>` and `knowledge_graph:#tenant@tenant:<tenant_id>`.

**Scenario: Successful creation — COVERED**
- Tests: `test_create_checks_edit_permission_on_workspace`, `test_create_saves_aggregate_via_repo`,
  `test_create_sets_all_fields`, `test_create_generates_unique_id`,
  `test_create_emits_knowledge_graph_created_event`, `test_create_knowledge_graph_returns_201`.

**Scenario: Duplicate name within tenant — COVERED**
- Repository catches `IntegrityError` on `uq_knowledge_graphs_tenant_name` constraint.
- Tests: `test_create_raises_duplicate_on_integrity_error`, `test_create_knowledge_graph_returns_409_for_duplicate_name`.

