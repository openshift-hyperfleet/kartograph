## Required Fix

**File:** `src/api/tests/integration/iam/test_workspace_authorization.py`
**Class:** `TestWorkspaceCreationAuthorization`
**Test:** `test_tenant_member_cannot_create_workspace_under_child_via_api`

Change:
```python
assert resp.status_code == 403, (
    f"Tenant member without workspace role should NOT be able to create "
    f"under child workspace, got {resp.status_code}: {resp.text}"
)
```

To:
```python
assert resp.status_code == 404, (
    f"Tenant member without workspace role should get 404 (not-found) when "
    f"attempting to create under child workspace (per spec: no distinction "
    f"between unauthorized and missing parent), got {resp.status_code}: {resp.text}"
)
```

This is confirmed by:
1. **Spec**: "Unauthorized creation → a not-found response is returned; no distinction between unauthorized and missing parent"
2. **Implementation**: `routes.py` converts `UnauthorizedError` to `HTTP_404_NOT_FOUND`
3. **Unit test**: `test_workspaces_routes.py::test_create_workspace_returns_404_when_unauthorized` correctly asserts 404
4. **CI**: Both Python 3.12 and 3.13 test jobs fail (integration tests run in CI)
