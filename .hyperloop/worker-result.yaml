### Requirement: Permission Inheritance — COVERED

SpiceDB schema (`shared_kernel/authorization/spicedb/schema.zed`):
```
permission view = admin + editor + viewer + workspace->view
permission edit = admin + editor + workspace->edit
permission manage = admin + workspace->manage
```
ConfigMap (`deploy/apps/kartograph/base/spicedb-schema-configmap.yaml`) is in sync.

**Scenario: Workspace-inherited access — COVERED**
- Integration tests (`TestWorkspaceInheritedKnowledgeGraphAccess`): 7 tests covering
  editor/admin/member/no-role access patterns.

**Scenario: Direct grant — COVERED**
- Integration tests (`TestDirectGrantKnowledgeGraphAccess`): 5 tests covering
  admin/editor/viewer direct grant permission boundaries.

