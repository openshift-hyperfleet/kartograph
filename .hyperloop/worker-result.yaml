## Requirement Coverage

### Requirement: API Key Creation ‚Äî COVERED

**Scenario: Successful creation**
- `karto_` prefix generated: `generate_api_key_secret()` in `application/security.py`
  ‚Üí tested: `test_secret_has_karto_prefix` (`test_api_key_service.py`)
- Plaintext returned exactly once: `create_api_key()` returns `(api_key, plaintext_secret)` tuple
  ‚Üí tested: `test_returns_plaintext_secret_only_at_creation`
- Stored as bcrypt hash: `hash_api_key_secret()` called before persistence
  ‚Üí tested: `test_creates_api_key_with_hashed_secret`
- 12-char prefix stored: `extract_prefix(plaintext_secret)` = `plaintext_secret[:12]`
  ‚Üí tested: `test_stores_prefix_from_secret` (asserts `api_key.prefix == plaintext_secret[:12]`)

**Scenario: Duplicate name per user**
- `DuplicateAPIKeyNameError` raised by repo duplicate-name check in `save()`
  ‚Üí tested: `test_raises_on_duplicate_name` (service), `test_returns_409_on_duplicate_name` (route)

**Scenario: Expiration bounds**
- `CreateAPIKeyRequest.expires_in_days = Field(30, ge=1, le=3650)`
  ‚Üí min bound tested: `test_validates_expires_in_days_minimum` (route returns 422 for 0)
  ‚Üí max bound tested: `test_validates_expires_in_days_maximum` (route returns 422 for 3651)
  ‚Üí default 30 days: Pydantic Field default; `test_creates_api_key_returns_201` omits the
    field (uses default) and the call succeeds. No explicit assertion that the service
    receives `expires_in_days=30` when omitted ‚Äî minor gap, not a fail (model enforces it).

### Requirement: API Key Authentication ‚Äî COVERED

**Scenario: Valid key**
- `validate_and_get_key()` ‚Üí `get_verified_key()` (prefix lookup + bcrypt verify) ‚Üí `record_usage()`
  ‚Üí tested: `test_validates_correct_secret`, `test_updates_last_used_at` (service)
  ‚Üí integration: `test_authenticates_with_valid_api_key`, `test_updates_last_used_at_on_success`

**Scenario: Expired key**
- `APIKey.is_valid()` checks `datetime.now(UTC) >= self.expires_at`; returns `None` if invalid
  ‚Üí tested: `test_returns_none_for_expired_key` (service), `test_expired_key_returns_false` (domain)

**Scenario: Revoked key**
- `APIKey.is_valid()` checks `self.is_revoked`; returns `None` if revoked
  ‚Üí tested: `test_returns_none_for_revoked_key` (service), `test_returns_401_for_revoked_api_key` (integration)

**Scenario: JWT takes precedence**
- `_authenticate()` in `dependencies/user.py`: tries JWT first; API key branch only reached if
  `token is None`
  ‚Üí tested: `test_jwt_takes_priority_over_api_key` (authenticate dependency test);
    `mock_api_key_service.validate_and_get_key.assert_not_awaited()` confirms key ignored
  ‚Üí integration: `test_prefers_jwt_when_both_provided`

**Scenario: Prefix collision**
- `get_verified_key()`: if `len(models) > 1`, calls `self._probe.api_key_prefix_collision()`
- `DefaultAPIKeyRepositoryProbe.api_key_prefix_collision()` uses `self._logger.error(...)` ‚Äî error level ‚úì
  ‚Üí tested: `test_logs_error_on_prefix_collision` (repository); verifies probe called with
    prefix and count=2

### Requirement: API Key Listing ‚Äî COVERED

**Scenario: List keys (metadata, no secrets)**
- `APIKeyResponse` exposes: `id, name, prefix, created_by_user_id, created_at, expires_at,
  last_used_at, is_revoked` ‚Äî no `secret` or `key_hash` fields
  ‚Üí tested: `test_lists_api_keys_for_user` (route), `test_never_returns_secret_or_hash` (route)

**Scenario: Filter by creator**
- Route parses `?user_id=` ‚Üí `UserId.from_string()` ‚Üí passes as `created_by_user_id` to service
- Service passes filter to repo `list()` which adds `created_by_user_id` WHERE clause
  ‚Üí tested: `test_filters_by_created_by_user_id` (service) ‚Äî exercises the full GIVEN/WHEN/THEN
  ‚Üí PARTIAL NOTE: No route-level test passes a *valid* `?user_id=xyz` and asserts the service
    receives it. There IS `test_returns_400_for_empty_user_id`. The service-level test covers
    the logic; the route code is straightforward. Not a fail.

### Requirement: API Key Revocation ‚Äî COVERED

**Scenario: Owner revokes own key**
- `revoke_api_key()` ‚Üí SpiceDB `REVOKE` check ‚Üí `api_key.revoke()` ‚Üí repo save
  ‚Üí tested: `test_revokes_existing_key` (service), `test_owner_can_revoke_own_key` (integration)
- Key remains visible with `is_revoked=true`: `list()` query has no `is_revoked` filter (code verified);
  `APIKeyResponse.is_revoked` field included in response
  ‚Üí PARTIAL NOTE: No test explicitly verifies a revoked key (is_revoked=True) still appears in
    the listing. Implementation is correct ‚Äî no filter excludes revoked keys. Not a fail.

**Scenario: Tenant admin revokes any key**
- SpiceDB schema: `permission revoke = owner + tenant->administrate`
  ‚Üí tested: `test_tenant_admin_can_revoke_other_users_key` (integration) ‚Äî admin revokes
    a different user's key successfully

**Scenario: Already revoked**
- `APIKey.revoke()` raises `APIKeyAlreadyRevokedError` if `self.is_revoked`; route returns 409
  ‚Üí tested: `test_raises_when_already_revoked` (service), `test_returns_409_when_already_revoked` (route)

**Scenario: Unauthorized revocation**
- SpiceDB `check_permission(REVOKE)` returns False ‚Üí `UnauthorizedError` ‚Üí route returns 403
  ‚Üí tested: `test_revoke_raises_unauthorized_when_denied` (service),
    `test_revoke_api_key_returns_403_when_unauthorized` (route),
    `test_non_admin_cannot_revoke_other_users_key` (integration)

