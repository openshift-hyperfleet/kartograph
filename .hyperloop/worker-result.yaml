### Requirement: Transactional Event Storage — COVERED

**Code:**
- `infrastructure/outbox/repository.py` — `OutboxRepository.append()` calls `session.add()` only,
  never `session.commit()`. Shared-session design guarantees atomicity with the aggregate change.
- `infrastructure/migrations/versions/6d11eae0e76d_create_outbox_table.py` — outbox table.
- `infrastructure/migrations/versions/a1b2c3d4e5f6_add_outbox_retry_columns.py` — retry/DLQ columns.

**Scenario: Successful write**
- Unit: `test_worker.py::TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`
- Integration: `test_outbox_consistency.py::TestAtomicityGuarantees::test_outbox_entry_created_in_same_transaction_as_group`

**Scenario: Transaction rollback**
- Unit: `test_worker.py::TestOutboxWorkerTransactionAtomicity::test_failed_service_call_leaves_no_outbox_entries`
- Integration: `test_outbox_consistency.py::TestAtomicityGuarantees::test_rollback_removes_both_group_and_outbox_entry`

