### Requirement: Event Fan-Out — COVERED

**Code:** `infrastructure/outbox/composite.py` — `CompositeEventHandler.register()` maps each event type to a list of handlers; `handle()` dispatches to all registered handlers or raises `UnknownEventTypeError`. `worker.py::_process_entries()` catches `UnknownEventTypeError` before the generic `Exception` handler and calls `_move_to_dlq()` immediately.

**Scenario: Multiple handlers registered**
- Unit: `TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers` — two handlers registered for "SharedEvent"; both `handle()` methods awaited.

**Scenario: Unknown event type**
- Unit: `TestCompositeEventHandler::test_handle_raises_for_unknown_event_type` — `UnknownEventTypeError` raised with correct `event_type` and `registered_types` attributes.
- Unit: `TestCompositeEventHandler::test_unknown_event_type_error_is_not_value_error` — confirms the exception is NOT a ValueError (enables worker to distinguish permanent vs transient).
- Unit: `TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq` — `UnknownEventTypeError` causes immediate DLQ even when `max_retries=5`.
- Unit: `TestOutboxWorkerRetryBehavior::test_unknown_event_type_dlq_even_at_zero_retries` — same check at `retry_count=0`.
- Unit: `TestOutboxWorkerRetryBehavior::test_retry_not_called_for_unknown_event_type` — `patch.object(_increment_retry)` asserts it is never called.

