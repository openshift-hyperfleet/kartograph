  ### Requirement Coverage

  #### Requirement: Per-Tenant Graph Isolation — COVERED
  - Code: `get_tenant_graph_name()` in `dependencies.py` derives `tenant_{tenant_id}`;
    `get_age_graph_client()` creates `AgeGraphClient` with this graph name.
  - Test: `TestTenantGraphRouting` in `test_routes.py` — verifies
    `tenant_t1` for tenant `t1`, and full tenant IDs are used verbatim.

  #### Requirement: KnowledgeGraph Scoping — COVERED
  **Scenario: Mutation authorization**
  - Code: `apply_kg_mutations()` in `routes.py` calls SpiceDB `check_permission`
    for `edit` on the target KnowledgeGraph; raises HTTP 403 on denial.
  - Tests: `test_kg_mutations_route_accessible_with_edit_permission`,
    `test_kg_mutations_route_forbidden_without_edit_permission`,
    `test_kg_mutations_route_checks_correct_resource` in `test_routes.py`.

  **Scenario: KnowledgeGraph ID stamping**
  - Code: `_stamp_knowledge_graph_id()` in `graph_mutation_service.py` overwrites any
    caller-provided value. `apply_mutations()` rejects batches with CREATE/UPDATE when
    `knowledge_graph_id` is `None`. `PLATFORM_STAMPED_PROPERTIES.issubset()` check in
    `value_objects.py` line 267 enforces this at validation time.
  - Tests: `TestKnowledgeGraphIdStamping` class (5 tests covering create, update,
    overwrite, rejection, and JSONL path).

  #### Requirement: Mutation Log Format — COVERED
  - Code: `apply_mutations_from_jsonl()` splits on newlines, parses each JSON line,
    skips empty/whitespace-only lines, catches `json.JSONDecodeError` with line number
    and 100-char preview.
  - Tests: `test_parses_jsonl_and_applies_mutations`, `test_returns_error_on_invalid_json`,
    `test_handles_whitespace_only_lines`, `test_handles_empty_jsonl`.

  #### Requirement: DEFINE Operation — COVERED
  - Code: `apply_mutations()` calls `get_system_properties_for_entity(EntityType.NODE/EDGE)`
    and merges system props into `required_properties` before storing to the type repo.
  - Tests: `test_apply_mutations_stores_define_operations` (node),
    `test_apply_define_edge_type_adds_edge_system_properties` (edge).

  #### Requirement: CREATE Operation — COVERED
  - All six scenarios (new node, idempotent merge, edge, missing type, missing props,
    schema learning) are implemented and tested.
  - JSONB `||` merge operator ensures idempotent CREATE preserves existing properties.

  #### Requirement: UPDATE Operation — COVERED
  - Set properties, remove properties, and schema learning on update all implemented
    and tested.

  #### Requirement: DELETE Operation — COVERED
  - Node: `delete_node_with_detach()` executes two queries (edges first, then node).
  - Edge: `delete_edge()` executes a single query.

  #### Requirement: Mandatory System Properties — COVERED
  - `validate_operation()` checks `data_source_id`, `source_path`, `slug` (node only),
    and `PLATFORM_STAMPED_PROPERTIES` (knowledge_graph_id) for all CREATE operations.

  #### Requirement: Deterministic Entity IDs — COVERED
  - `ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` enforced by Pydantic `Field(pattern=...)`.

  #### Requirement: Referential Integrity Ordering — COVERED
  - `MutationApplier._sort_operations()`: DEFINE → DELETE edge → DELETE node →
    CREATE node → CREATE edge → UPDATE.
  - `TestSortOperationsReferentialIntegrity` exercises all six positions.

