### REQ-5: Dual Delivery Mechanism — COVERED

**Implementation:**
- Real-time: `infrastructure/outbox/event_sources/postgres_notify.py` —
  `PostgresNotifyEventSource` uses `asyncpg-listen`'s `NotificationListener`.
  On NOTIFY, it parses the UUID payload and invokes `_process_single()` (the worker's callback).
- Polling fallback: `OutboxWorker._poll_loop()` (lines 155-168) — runs every
  `poll_interval_seconds` (default 30 s, enforced by constructor validation).

**Scenario: Real-time notification** — COVERED
- Unit tests: `TestPostgresNotifyEventSourceNotify` class
  (`test_postgres_notify_event_source.py`), including
  `test_notify_triggers_callback_with_uuid` and `test_callback_receives_correct_uuid_type`.
- Integration test: `TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling`.

**Scenario: Polling fallback** — COVERED
- Code: `_poll_loop()` always runs regardless of whether an event source is configured.
- Worker default `poll_interval_seconds=30` directly satisfies the spec's "default 30 seconds".
- Tests in `TestOutboxWorkerValidation` verify the interval constraint is enforced.

