## Outbox Pattern Implementation — Task 017

### Fresh Verification Summary

All 2187 unit tests pass (including 130 outbox-specific tests). The outbox
pattern is fully implemented across the shared_kernel and infrastructure layers.
Every SHALL requirement from the spec has corresponding implementation and test coverage.

---

### Requirement: Transactional Event Storage — PASS

**Successful write scenario:**
- `OutboxRepository.append()` calls `session.add()` but never `session.commit()`.
  The caller (repository saving the aggregate) owns the transaction boundary.
- Test: `test_repository_append_does_not_commit` — verifies `commit` is never called.
- Test: `test_append_creates_outbox_model` — verifies model fields are set correctly.

**Transaction rollback scenario:**
- Because the outbox repository shares the same session and never commits, a
  rollback of the outer transaction discards both the aggregate change and the
  outbox entry atomically.
- Test: `test_failed_service_call_leaves_no_outbox_entries` — proves commit is absent.

---

### Requirement: Event Processing — PASS

**Normal processing scenario:**
- `OutboxWorker._process_entries()` calls `handler.handle()`, then
  `_mark_processed()` which sets `processed_at = datetime.now(UTC)`.
- Tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`,
  `test_calls_event_processed_on_success`.

**Transient failure scenario:**
- `_handle_processing_failure()` increments `retry_count` and stores `last_error`.
  Entry remains eligible for retry (not moved to DLQ).
- Test: `test_transient_failure_increments_retry_count` — verifies
  `event_processing_failed` probe called, `event_moved_to_dlq` NOT called.
- Test: `test_transient_failure_does_not_dlq_immediately` — confirms at retry_count=0
  a transient error schedules a retry.

**Permanent failure (dead letter) scenario:**
- When `new_retry_count >= max_retries`, `_move_to_dlq()` sets `failed_at`.
  Subsequent polls exclude entries where `failed_at IS NOT NULL`.
- Test: `test_max_retries_moves_entry_to_dlq` — verifies DLQ probe called,
  processing-failed probe NOT called.
- Test: `test_failed_entries_excluded_from_fetch` — verifies SQL query contains
  `failed_at IS NULL`.

