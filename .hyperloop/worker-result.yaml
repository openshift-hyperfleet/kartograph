### Implementation Overview

The outbox pattern is fully implemented across the shared_kernel and infrastructure layers:

**Domain layer** (`shared_kernel/outbox/`):
- `value_objects.py` — `OutboxEntry` immutable dataclass
- `ports.py` — `IOutboxRepository`, `EventHandler`, `EventTranslator`, `EventSerializer`, `OutboxEventSource` protocols
- `operations.py` — `WriteRelationship`, `DeleteRelationship`, `DeleteRelationshipsByFilter` value objects
- `exceptions.py` — `UnknownEventTypeError` (permanent failure, bypasses retry)
- `observability.py` — `OutboxWorkerProbe` + `EventSourceProbe` protocols with `Default*` implementations

**Infrastructure layer** (`infrastructure/outbox/`):
- `models.py` — `OutboxModel` SQLAlchemy ORM with `retry_count`, `last_error`, `failed_at` columns
- `repository.py` — `OutboxRepository` (session-sharing, never commits, uses `FOR UPDATE SKIP LOCKED`)
- `worker.py` — `OutboxWorker` (poll loop + optional event source, retry/DLQ logic)
- `composite.py` — `CompositeEventHandler` (fan-out, raises `UnknownEventTypeError` for unregistered types)
- `spicedb_handler.py` — `SpiceDBEventHandler` (translator to SpiceDB operations, idempotent)
- `event_sources/postgres_notify.py` — `PostgresNotifyEventSource` (asyncpg-listen, sub-second delivery)

**Migrations**:
- `6d11eae0e76d` — Creates `outbox` table
- `a1b2c3d4e5f6` — Adds `retry_count`, `last_error`, `failed_at` columns
- `d32ecc44581a` — Installs `pg_notify('outbox_events', NEW.id::text)` trigger

