### Requirement: Permission Inheritance — COVERED

**Code:** SpiceDB schema defines:
- `knowledge_graph.view = admin + editor + viewer + workspace->view`
- `knowledge_graph.edit = admin + editor + workspace->edit`
- `knowledge_graph.manage = admin + workspace->manage`

Relationships are written at creation time via the outbox translator.

**Tests (integration — `test_knowledge_graph_authorization.py` — require live SpiceDB):**
- Scenario "Workspace-inherited access": `test_workspace_editor_can_view_knowledge_graph`, `test_workspace_editor_can_edit_knowledge_graph`, `test_workspace_admin_can_manage_knowledge_graph`, `test_workspace_member_can_view_knowledge_graph`, `test_workspace_member_cannot_edit_knowledge_graph`, `test_workspace_editor_cannot_manage_knowledge_graph`, `test_user_without_workspace_role_cannot_access_knowledge_graph`.
- Scenario "Direct grant": `test_direct_kg_admin_has_manage_permission`, `test_direct_kg_admin_has_edit_permission`, `test_direct_kg_admin_has_view_permission`, `test_direct_kg_editor_has_edit_and_view_but_not_manage`, `test_direct_kg_viewer_has_view_only`.

