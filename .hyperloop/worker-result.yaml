### Requirement: dlt Framework Integration — COVERED

All three previously-MISSING/PARTIAL scenarios are now fully implemented and tested.

**Scenario: In-process execution** — COVERED
- `DltAdapterRunner.run()` calls `loop.run_in_executor()` which drives dlt as a
  Python library in a ThreadPoolExecutor. No Docker, no subprocess.
- `_run_pipeline_in_thread()` creates a fresh event loop, constructs a `dlt.pipeline()`
  and calls `pipeline.run(...)` in-process.
- Tests: `TestDltInProcessExecution` (4 tests):
  - `test_dlt_pipeline_runs_in_process_and_returns_path` — PASS
  - `test_adapter_extract_is_called_during_pipeline_run` — PASS
  - `test_last_extraction_result_is_none_before_first_run` — PASS
  - `test_last_extraction_result_available_after_run` — PASS

**Scenario: State persistence via database** — COVERED
- `dlt.current.resource_state()` reads/writes `adapter_checkpoint` key within
  the dlt resource. For PostgreSQL (production) this maps to the `dlt_internal`
  schema; for filesystem destination (unit tests) it maps to JSON state files.
- `DltAdapterRunner` documented to use `dlt.destinations.postgres(...)` in
  production and `dlt.destinations.filesystem(...)` for development/tests.
- Tests: `TestDltStatePersistence` (4 tests):
  - `test_first_run_passes_none_checkpoint_to_adapter` — PASS
  - `test_checkpoint_is_persisted_after_first_run` — PASS
  - `test_second_run_restores_checkpoint_from_dlt_state` — PASS (state round-trip)
  - `test_state_survives_runner_object_recreation` — PASS (pod-restart simulation)

**Scenario: Extracted data on disk** — COVERED
- `_write_output_files()` writes `changeset.jsonl` and `blobs/{sha256_hex_digest}`
  to the pipeline output directory after every successful extraction.
- `DltAdapterRunner.output_dir` property exposes the path for the JobPackager.
- Tests: `TestExtractedDataOnDisk` (9 tests):
  - `test_output_directory_exists_after_run` — PASS
  - `test_content_blobs_written_to_blobs_subdirectory` — PASS
  - `test_blob_file_content_matches_extracted_bytes` — PASS
  - `test_blob_filename_is_sha256_hex_digest` — PASS
  - `test_changeset_jsonl_written_to_output_directory` — PASS
  - `test_changeset_jsonl_contains_one_line_per_entry` — PASS
  - `test_changeset_jsonl_entries_are_valid_json` — PASS
  - `test_changeset_jsonl_paths_match_entries` — PASS
  - `test_empty_extraction_produces_empty_changeset` — PASS

