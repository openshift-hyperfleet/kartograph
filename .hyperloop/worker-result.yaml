  ### CodeRabbit Round-3 Finding — check-frontend-test-infrastructure.sh error masking

  STATUS: FIXED in this pass

  The remaining finding was that `git diff ... 2>/dev/null | ... || true` masked
  real git errors: if git diff failed for any reason other than a missing base
  ref, the script would silently treat it as "no UI changes" and skip enforcement.

  Fix applied: separated the git diff invocation into its own variable with an
  explicit `|| { echo ...; exit 1; }` error handler so unexpected git failures
  are surfaced. The `|| true` is retained only on the grep/filter pipeline where
  grep returning exit-1 for no matches is expected and not an error.

  Before:
    task_ui_changes=$(git diff "${BASE_BRANCH}...HEAD" --name-only -- "$UI_DIR"
      2>/dev/null | grep ... | head -1 || true)

  After:
    git_diff_output=$(git diff "${BASE_BRANCH}...HEAD" --name-only -- "$UI_DIR")
      || { echo "ERROR: git diff failed unexpectedly." >&2; exit 1; }
    task_ui_changes=$(echo "$git_diff_output" | grep ... | head -1 || true)

