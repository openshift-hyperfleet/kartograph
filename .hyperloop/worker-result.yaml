## Spec Alignment Review — task-021 (API Keys spec coverage gaps)

This review verifies that all three FAIL items from the prior spec alignment
review have been addressed by commit `f04e633a` ("test(iam): close three spec
coverage gaps in API key tests").

---

### FAIL-1 (REQ-1, Expiration Bounds) — COVERED

**Requirement:** A test must verify the default expiration of 30 days when
`expires_in_days` is omitted from the creation request.

**Test found:**
- File: `src/api/tests/unit/iam/presentation/test_api_key_routes.py`
- Test: `TestCreateAPIKeyRoute::test_uses_default_expires_in_days_of_30`

The test sends `POST /iam/api-keys` with only `{"name": "my-api-key"}` (no
`expires_in_days` field) and asserts that `create_api_key` was called with
`expires_in_days=30`. This directly exercises the `Field(30, ...)` Pydantic
default on the route's request schema.

---

### FAIL-2 (REQ-2, Expired Key → 401) — COVERED

**Requirement:** An end-to-end integration test must send a request with an
expired API key to a protected REST endpoint and assert a 401 response.

**Tests found:**
- File: `src/api/tests/integration/test_api_key_auth.py`
- Fixture: `expired_api_key_secret` — inserts an already-expired key (
  `expires_at = now() - 1 day`) directly via raw SQL to bypass the route's
  1-day minimum; uses bcrypt work factor 4 for test speed; includes cleanup
  teardown.
- Test: `TestAPIKeyAuthentication::test_returns_401_for_expired_api_key` —
  sends `GET /iam/tenants` with `X-API-Key: <expired_secret>` and asserts
  `status_code == 401` and `WWW-Authenticate == "Bearer, API-Key"`.

This is a full end-to-end path: HTTP layer → `validate_and_get_key` →
`is_valid()` expiry check → 401.

---

### FAIL-3 (REQ-4, Owner Revocation Visibility) — COVERED

**Requirement:** A test must verify that after revoking a key, the key remains
visible in listings with `is_revoked=True`.

**Test found:**
- File: `src/api/tests/integration/test_api_key_auth.py`
- Test: `TestAPIKeyAuthorizationEnforcement::test_revoked_key_remains_visible_in_listing`

The test chains: (1) create key, (2) `process_outbox()` to sync SpiceDB
owner/tenant relationships, (3) revoke key via `DELETE /iam/api-keys/{id}`,
(4) list keys via `GET /iam/api-keys` and assert the entry is present with
`is_revoked is True`.

---

### Overall Verdict: PASS

All three previously failing spec items now have corresponding test coverage.
The tests were introduced in commit `f04e633a` with correct `Spec-Ref` and
`Task-Ref` trailers. No code quality or DDD boundary issues were observed in
the new test code.
