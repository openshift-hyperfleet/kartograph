### Requirement: Information Hiding on Authorization Failure — COVERED

**Scenario: Unauthorized access → 404 not 403**

The implementation uses a consistent pattern:
1. Service layer: returns `None` when user lacks VIEW permission (treating unauthorized like not-found)
   - `test_get_workspace_returns_none_without_view_permission` (workspace service) ✓
   - `test_returns_none_when_user_lacks_view_permission` (group service, tenant service) ✓
2. Route layer: converts `None` → 404
   - `test_get_workspace_returns_404_when_not_found` ✓
   - `test_get_workspace_returns_404_for_different_tenant` — explicitly verifies cross-tenant access returns 404 (not 403), "don't leak existence" ✓
   - Integration: `test_returns_404_for_nonexistent_group` (GET) ✓

**Observation (non-blocking):** `TestDeleteGroup.test_returns_403_for_nonexistent_group` asserts 403 for DELETE on a nonexistent group. The spec's GIVEN says "without permission to VIEW a resource" — the DELETE scenario is a management operation (MANAGE permission), not a view operation. The spec's scenario specifically targets read/view access. The delete path consistently returns 403 regardless of whether the group exists, so existence is not leaked. This is distinct from the spec's stated VIEW scenario and does not constitute a FAIL.

