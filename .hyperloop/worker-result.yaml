## task-003 Graph Mutations — Fresh Worker Verification (2026-04-23)

Spec: `specs/graph/mutations.spec.md`
Branch: `hyperloop/task-003`
Reviewer: spec-alignment-reviewer

### Requirement Status

#### REQ 1: Per-Tenant Graph Isolation — COVERED
Implementation: `graph/dependencies.py::get_tenant_graph_name()` returns
`f"tenant_{current_user.tenant_id.value}"`; `get_age_graph_client()` passes this
name to `AgeGraphClient(graph_name=graph_name)`. Mutation route depends on
`get_graph_mutation_service` which transitively uses the tenant-scoped client.

Tests: `TestTenantGraphRouting::test_graph_client_uses_tenant_specific_graph_name`
(verifies format `"tenant_t1"`), `test_graph_name_uses_full_tenant_id`.

Note: No integration test verifying cross-tenant mutation prevention at the
physical `tenant_` graph level; unit tests confirm naming logic is correct.

#### REQ 2: KnowledgeGraph Scoping — COVERED
Scenario (auth): `graph/presentation/routes.py::apply_kg_mutations()` checks
`authz.check_permission(resource, Permission.EDIT, subject)` and returns HTTP 403
if denied; service is never called.

Scenario (ID stamping): `graph/application/services/graph_mutation_service.py::
_stamp_knowledge_graph_id()` overwrites any caller-provided `knowledge_graph_id`
on all CREATE and UPDATE operations. `PLATFORM_STAMPED_PROPERTIES` excludes it from
schema learning so callers cannot inject it via optional property discovery.

Tests: `test_routes.py::TestKnowledgeGraphScopedMutationsRoute` (4 tests: 200 with
permission, 403 without, correct resource passed to SpiceDB, kg_id forwarded to service).
`test_mutation_service.py::TestKnowledgeGraphIdStamping` (5 tests: CREATE stamped,
caller value overwritten, UPDATE stamped, DELETE not stamped, JSONL path stamped).
`test_schema_learning.py::test_knowledge_graph_id_excluded_from_schema_learning`.

#### REQ 3: Mutation Log Format (JSONL) — COVERED
Implementation: `graph_mutation_service.py::apply_mutations_from_jsonl()` splits on
`\n`, skips blank/whitespace-only lines, parses each with `json.loads`, reports error
with line number and content preview on parse failure.

Tests: `TestGraphMutationServiceApplyFromJSONL::test_parses_jsonl_and_applies_mutations`
(valid JSONL), `test_handles_empty_jsonl`, `test_handles_whitespace_only_lines`,
`test_returns_error_on_invalid_json` (line number + content preview asserted),
`test_returns_error_on_invalid_mutation_operation`.

#### REQ 4: DEFINE Operation — COVERED
Implementation: `graph/domain/value_objects.py::MutationOperation.validate_operation()`
validates DEFINE requires `label`, `description`, `required_properties`. `graph_mutation_service.py`
calls `get_system_properties_for_entity(op.type)` which returns
`{data_source_id, source_path, slug}` for NODE and `{data_source_id, source_path}` for EDGE.

Tests: `test_apply_mutations_stores_define_operations` (node system properties added),
`test_apply_define_edge_type_adds_edge_system_properties` (slug absent for edge),
`test_domain_value_objects.py::test_define_node_valid`, `test_define_requires_label`,
`test_define_requires_description`, `test_define_cannot_have_set_properties`,
`test_system_properties.py` unit tests.

#### REQ 5: CREATE Operation (6 scenarios) — COVERED
Implementation:
- New node / idempotent merge: `age_bulk_loading/strategy.py` uses MERGE semantics
- Edge creation: edge-specific strategy path with `start_id`/`end_id`
- Missing type def: service returns error if label not in repo or current batch
- Missing required props: service validates against stored type definition
- Schema learning: `_discover_optional_properties()` adds extra props to `optional_properties`

Tests: `test_rejects_create_without_define_in_batch`, `test_rejects_create_missing_required_properties`,
`test_accepts_create_with_all_required_properties`, `test_accepts_create_with_define_in_batch`,
`test_accepts_create_with_define_in_repository`, `test_bulk_loading.py::
TestBulkLoadingIdempotency::test_repeated_batch_is_idempotent`,
`test_create_merges_properties_on_existing_node` (old properties preserved, new properties added),
`test_schema_learning.py::TestSchemaLearning::test_extra_properties_added_to_optional`,
`test_optional_properties_accumulate`, `test_create_define_same_batch_validation.py`.

#### REQ 6: UPDATE Operation — COVERED
Implementation: `age_bulk_loading/strategy.py` — UPDATE uses Cypher SET for
`set_properties` and property removal for `remove_properties`; unlisted properties
preserved. Schema learning runs on UPDATE.

Tests: `TestUpdateOperations::test_update_node_adds_properties`,
`test_update_node_modifies_existing_properties`, `test_update_node_removes_properties`,
`test_update_edge_properties`, `test_schema_learning.py::test_update_discovers_optional_properties`,
`test_update_without_label_skips_schema_learning`, domain value object UPDATE tests.

#### REQ 7: DELETE Operation — COVERED
Implementation: `age_bulk_loading/queries.py::delete_node_with_detach()` — DETACH DELETE
(removes node + all connected edges). `delete_edge()` — removes only the edge. Ordering
sort ensures edges deleted before nodes within DELETE phase.

Tests: `TestDeleteOperations::test_delete_node`, `test_delete_node_detaches_edges`
(connected edges deleted), `test_delete_edge` (only edge removed; both nodes survive),
`test_age_strategy_deletes.py::TestExecuteDeletesIteratesPerID`.

#### REQ 8: Mandatory System Properties — COVERED
Implementation: `value_objects.py::MutationOperation.validate_operation()` enforces
presence of `data_source_id`, `source_path`, `knowledge_graph_id` for all CREATE; also
`slug` for NODE CREATE only.

Tests: `test_create_node_valid`, `test_create_edge_valid`, `test_create_node_requires_knowledge_graph_id`,
`test_create_edge_requires_knowledge_graph_id`, `test_create_requires_data_source_id`,
`test_create_requires_source_path`, `test_create_node_requires_slug`,
`test_create_define_same_batch_validation.py::test_rejects_create_missing_system_properties`.

#### REQ 9: Deterministic Entity IDs — COVERED
Implementation: `shared_kernel/graph_primitives/entity_id_generator.py::EntityIdGenerator.generate()`
produces `{normalized_type}:{sha256[:16]}`, deterministic from input tuple.
`value_objects.py::ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"` enforced via Pydantic pattern
on `id`, `start_id`, `end_id` fields.

Tests: `test_entity_id_generator.py::TestEntityIdGenerator` (determinism, type prefix,
16-char hex, lowercase normalization, tenant scope, unicode), `TestEntityIdGeneratorEdges`,
`test_domain_value_objects.py::test_id_pattern_validation`, `test_id_accepts_valid_pattern`,
`test_graph_repository.py::TestGenerateId` (unit + integration).

Note: Default implementation passes empty `tenant_id` string; same-entity IDs across tenants
would collide at the ID level. Physical isolation via per-tenant AGE graph namespacing still
applies. A TODO comment acknowledges this.

#### REQ 10: Referential Integrity Ordering — COVERED
Implementation: `graph/infrastructure/mutation_applier.py::MutationApplier._sort_operations()`
sort keys: DEFINE=0, DELETE edge=1.0, DELETE node=1.1, CREATE node=2.0, CREATE edge=2.1,
UPDATE=3. `apply_batch()` calls `_sort_operations()` before delegating.

Tests: `test_mutation_applier_sort.py::TestSortOperationsReferentialIntegrity::
test_sort_order_define_delete_create_update` (mixed input with exact position assertions),
`test_sort_preserves_all_operations`, `test_sort_homogeneous_list_unchanged_length`.

