### Spec Requirement Coverage

**1. Knowledge Graph Creation — PASS**
`KnowledgeGraph.create()` generates ULID, associates tenant + workspace. `KnowledgeGraphService.create()`
enforces EDIT permission on workspace before persisting. `KnowledgeGraphCreated` event triggers
SpiceDB workspace + tenant relationship writes via outbox translator.

**2. Name Validation — PASS**
Domain-level `_validate_name()` rejects empty or >100-char names with `InvalidKnowledgeGraphNameError`.
Pydantic models enforce same constraint at HTTP layer → 422.

**3. Duplicate Name Rejection — PASS**
`IntegrityError` on `uq_knowledge_graphs_tenant_name` unique constraint → `DuplicateKnowledgeGraphNameError` → 409.

**4. Retrieval — PASS**
`service.get()` returns `None` for both missing records and unauthorized access. Route returns 404 in both
cases — no existence leakage.

**5. Listing — PASS**
`list_for_workspace()` checks VIEW permission on workspace, then reads SpiceDB relationships to discover
KG IDs, fetches them, and filters by tenant. AuthZ-gated results.

**6. Update — PASS**
EDIT permission checked on the KG resource. `kg.update()` raises `AggregateDeletedError` if aggregate
was previously marked for deletion, satisfying "mutation after deletion is rejected".

**7. Deletion (Atomic Cascade) — PASS**
`service.delete()` requires MANAGE permission. Within a single `session.begin()` transaction block:
encrypted credentials are deleted, each data source is marked and deleted, then the KG itself is deleted.
If any step raises, the transaction rolls back (verified by `test_delete_rolls_back_on_ds_deletion_failure`).
`KnowledgeGraphDeleted` event schedules SpiceDB cleanup of workspace relation, tenant relation, and
all direct admin/editor/viewer grants via the transactional outbox.

**8. Permission Inheritance — PASS**
SpiceDB schema defines `view = admin + editor + viewer + workspace->view`,
`edit = admin + editor + workspace->edit`, `manage = admin + workspace->manage`.
Workspace-inherited access and direct grants both covered.

