## Task 017: Outbox Pattern — Spec Alignment Review (2026-04-23, fresh pass)

Branch: `hyperloop/task-017`
Spec: `specs/shared-kernel/outbox.spec.md`
Reviewer: spec-alignment-reviewer

All 130 outbox-specific unit tests pass (confirmed by running
`uv run pytest tests/unit/infrastructure/outbox/ tests/unit/shared_kernel/outbox/ -v`).

---

### Requirement Coverage

#### REQ-1: Transactional Event Storage — COVERED

**Implementation:** `infrastructure/outbox/repository.py::OutboxRepository.append()`
calls `session.add()` only — never `session.commit()`. Session shared with caller so
aggregate change and outbox entry commit/rollback atomically.

**Scenario: Successful write — COVERED**
- Code: `OutboxRepository.append()` → `session.add(OutboxModel(...))`
- Unit test: `test_worker.py::TestOutboxWorkerTransactionAtomicity::test_repository_append_does_not_commit`
  asserts `session.add` called and `session.commit` NOT called.
- Integration test: `test_outbox_consistency.py::TestAtomicityGuarantees::test_outbox_entry_created_in_same_transaction_as_group`
  verifies both group row and outbox entry exist after a single commit.

**Scenario: Transaction rollback — COVERED**
- Code: shared-session design — if caller raises, SQLAlchemy rolls back both.
- Unit test: `test_worker.py::test_failed_service_call_leaves_no_outbox_entries`
- Integration test: `test_outbox_consistency.py::test_rollback_removes_both_group_and_outbox_entry`
  forces rollback and asserts neither group row nor outbox entry persist.

---

#### REQ-2: Event Processing — COVERED

**Implementation:** `OutboxWorker._process_batch()` / `_process_entries()` /
`_mark_processed()` / `_handle_processing_failure()` / `_move_to_dlq()` / `_increment_retry()`.

**Scenario: Normal processing — COVERED**
- Code: `_process_entries` calls `handler.handle(event_type, payload)` then
  `_mark_processed(entry.id, session)` which sets `processed_at = datetime.now(UTC)`.
- Unit tests: `test_processes_unprocessed_entries`, `test_marks_entry_as_processed`,
  `test_calls_event_processed_on_success`.
- Integration test: `test_worker_processes_group_created_and_writes_to_spicedb` verifies
  `processed_at` is set AND SpiceDB relationship written after `_process_batch()`.

**Scenario: Transient failure — COVERED**
- Code: `_handle_processing_failure` increments `retry_count` + records `last_error`
  via `_increment_retry()` when below max_retries.
- Unit tests: `test_transient_failure_increments_retry_count`,
  `test_transient_failure_does_not_dlq_immediately`.

**Scenario: Permanent failure (dead letter) — COVERED**
- Code: when `new_retry_count >= max_retries`, calls `_move_to_dlq()` setting `failed_at`.
  `fetch_unprocessed` WHERE clause filters `failed_at IS NULL` — entry never re-fetched.
- Unit tests: `test_max_retries_moves_entry_to_dlq`,
  `test_failed_entries_excluded_from_fetch` (failed_at IS NULL verified in compiled SQL).

---

#### REQ-3: Idempotent Event Handlers — COVERED

**Implementation:** `SpiceDBEventHandler.handle()` delegates to `authz.write_relationship()`
which is SpiceDB upsert (same tuple twice = no-op). `fetch_unprocessed` excludes
already-processed entries (`processed_at IS NULL`).

**Scenario: Duplicate delivery — COVERED**
- Code: `SpiceDBEventHandler` calls `write_relationship` with SpiceDB's upsert semantics.
- Unit test: `test_spicedb_handler.py::TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state`
  uses a hand-rolled `FakeAuthorizationProvider` (Python set semantics). Calls
  `handler.handle(...)` twice; asserts `frozenset(relationships)` is identical after both
  calls and contains exactly one entry — no duplicate side effects.
- Integration test: `test_outbox_consistency.py::TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state`
  manually invokes handler once (leaving entry unprocessed), then runs `_process_batch()`
  (second invocation), asserts `processed_at` set and SpiceDB relationship still correct.

