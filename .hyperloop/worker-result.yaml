## NFR Compliance Notes

### Observability (Domain Probes) â€” PASS
All logging in service and repository code is routed through `APIKeyServiceProbe` and
`APIKeyRepositoryProbe` Protocol interfaces. No direct `logger.*` or `print()` calls in
domain, application, or infrastructure code. `DefaultXxx` implementations use structlog.

### Testing (Fakes vs Mocks) â€” NOTED, NOT A FAILURE FOR THIS TASK
Application-layer tests (`test_api_key_service.py`) use `create_autospec`, `AsyncMock`, and
`MagicMock`. This deviates from the testing NFR which requires fakes over mocks for
domain/application collaborators. However, this pattern is pre-existing and codebase-wide
(identical usage in `test_tenant_service.py` and other application tests). This deviation is
not introduced by task-021 and is outside its scope. No fakes exist for `IAPIKeyRepository`
or `AuthorizationProvider` in the project.

### Architecture â€” PASS
Implementation follows DDD layers: domain aggregate â†’ ports â†’ application service â†’
infrastructure repository â†’ presentation routes. No cross-context dependencies.

