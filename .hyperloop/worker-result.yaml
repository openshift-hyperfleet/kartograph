### Requirement: API Key Authentication — COVERED

**Scenario: Valid key**
- Implementation: `_authenticate()` dependency in `iam/dependencies/user.py` validates
  via `api_key_service.validate_and_get_key()`; `validate_and_get_key()` calls
  `record_usage()` and persists.
- Tests:
  - `test_authenticates_with_valid_api_key` (integration)
  - `test_updates_last_used_at_on_success` (integration)

**Scenario: Expired key**
- Implementation: `APIKey.is_valid()` returns False when `datetime.now(UTC) >= expires_at`.
- Tests:
  - `test_expired_key_returns_false` (domain unit)
  - `test_returns_none_for_expired_key` (service unit)
  - `test_returns_401_for_expired_api_key` (integration)

**Scenario: Revoked key**
- Implementation: `APIKey.is_valid()` returns False when `is_revoked == True`.
- Tests:
  - `test_revoked_key_returns_false` (domain unit)
  - `test_returns_none_for_revoked_key` (service unit)
  - `test_returns_401_for_revoked_api_key` (integration)

**Scenario: JWT takes precedence**
- Implementation: `_authenticate()` checks `if token is not None` first; if JWT present
  (valid or invalid) the API key branch is never reached. An invalid JWT raises 401
  without falling through.
- Tests:
  - `test_jwt_takes_priority_over_api_key` (`tests/unit/iam/test_authenticate_dependency.py`)
    — provides both token and x_api_key; asserts `is_api_key is False`,
    `user_id` matches JWT user, and `validate_and_get_key` is never awaited.
  - `test_prefers_jwt_when_both_provided` (integration) — valid JWT + valid API key → 200
  - `test_invalid_jwt_with_valid_api_key_uses_api_key` (integration) — invalid JWT +
    valid API key → 401 (JWT tried first, API key not used as fallback)

**Scenario: Prefix collision**
- Implementation: `APIKeyRepository.get_verified_key()` detects `len(models) > 1` and
  calls `self._probe.api_key_prefix_collision(prefix, len(models))`; the
  `DefaultAPIKeyRepositoryProbe` implementation calls `self._logger.error(...)`.
- Tests:
  - `test_logs_error_on_prefix_collision` (repo unit) — asserts
    `mock_probe.api_key_prefix_collision.assert_called_once()` with collision count == 2.
  - Real `DefaultAPIKeyRepositoryProbe.api_key_prefix_collision` uses `logger.error`
    (line 137 of `api_key_repository_probe.py`), satisfying "error-level event".

