## Requirement Coverage

### Knowledge Graph Creation — COVERED
- `KnowledgeGraph.create()` generates ULID via `KnowledgeGraphId.generate()`, sets `tenant_id`/`workspace_id`.
- `KnowledgeGraphService.create()` checks EDIT on workspace before creating.
- `KnowledgeGraphCreated` event is appended to outbox; `ManagementEventTranslator` produces workspace + tenant SpiceDB relationship writes.
- Duplicate name → `IntegrityError` on `uq_knowledge_graphs_tenant_name` → `DuplicateKnowledgeGraphNameError` → HTTP 409.

### Knowledge Graph Name Validation — COVERED
- `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`, raises `InvalidKnowledgeGraphNameError`.
- Pydantic models also enforce constraints at the HTTP boundary (HTTP 422).
- Validated on both `create()` and `update()`.

### Knowledge Graph Retrieval — COVERED
- `KnowledgeGraphService.get()` checks tenant match then VIEW permission.
- Returns `None` for missing, wrong-tenant, or permission-denied → HTTP 404 (no existence leakage).

### Knowledge Graph Listing — COVERED
- `KnowledgeGraphService.list_for_workspace()` checks VIEW on workspace, reads SpiceDB relationships to discover KG IDs, fetches and filters by tenant.
- `GET /management/workspaces/{id}/knowledge-graphs` route returns filtered list.

### Knowledge Graph Update — COVERED
- `KnowledgeGraphService.update()` checks EDIT on KG, fetches, calls `aggregate.update()`, saves via repo.
- `PATCH /management/knowledge-graphs/{id}` route returns updated aggregate.

### Knowledge Graph Deletion — COVERED
- `KnowledgeGraphService.delete()` checks MANAGE, then within `session.begin()`: deletes encrypted credentials, cascade-deletes data sources, marks KG for deletion, deletes KG.
- `KnowledgeGraphDeleted` event produces 5 SpiceDB operations (delete workspace rel, delete tenant rel, filter-delete admin/editor/viewer grants).
- Rollback tested: exception during DS deletion prevents KG deletion.
- Mutation after deletion: `KnowledgeGraph.update()` raises `AggregateDeletedError`.

### Permission Inheritance — COVERED
- SpiceDB schema (`schema.zed`):
  - `view = admin + editor + viewer + workspace->view`
  - `edit = admin + editor + workspace->edit`
  - `manage = admin + workspace->manage`
- Integration tests in `test_knowledge_graph_authorization.py` cover workspace-inherited access (editor→view/edit, admin→manage) and direct grants (admin confers manage+edit+view).

