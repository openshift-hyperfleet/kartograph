### 6. Event Fan-Out — COVERED

**Implementation:**
- `src/api/infrastructure/outbox/composite.py` — `CompositeEventHandler` stores handlers
  per event type in a `dict[str, list[EventHandler]]`; dispatches to ALL registered handlers
  for a given event type.
- `src/api/shared_kernel/outbox/exceptions.py` — `UnknownEventTypeError` (distinct from
  `ValueError`) is raised when no handler is registered.
- `worker.py::_process_entries` — catches `UnknownEventTypeError` before generic `Exception`;
  immediately calls `_move_to_dlq` without incrementing retry count.

**Scenario: Multiple handlers registered** — COVERED
- Unit: `test_composite.py::TestCompositeEventHandler::test_handle_fans_out_to_multiple_handlers`
  — two handlers registered for `"SharedEvent"`; both `.handle` methods asserted called once.

**Scenario: Unknown event type → dead letter** — COVERED
- Unit: `test_composite.py::TestCompositeEventHandler::test_handle_raises_for_unknown_event_type`
  — asserts `UnknownEventTypeError` raised with correct `event_type` and `registered_types`.
- Unit: `test_composite.py::TestCompositeEventHandler::test_unknown_event_type_error_is_not_value_error`
  — asserts error is NOT a `ValueError` (required for worker to distinguish permanent vs
  transient failures).
- Unit: `test_worker.py::TestOutboxWorkerRetryBehavior::test_unknown_event_type_immediately_moves_to_dlq`
  — handler raises `UnknownEventTypeError`; asserts `probe.event_moved_to_dlq` called and
  `probe.event_processing_failed` NOT called (bypasses retry logic).
- Unit: `test_worker.py::TestOutboxWorkerRetryBehavior::test_unknown_event_type_dlq_even_at_zero_retries`
  — confirms immediate DLQ even at `retry_count=0`, regardless of `max_retries=10`.
- Unit: `test_worker.py::TestOutboxWorkerRetryBehavior::test_retry_not_called_for_unknown_event_type`
  — patches `_increment_retry` and asserts it is never called.

