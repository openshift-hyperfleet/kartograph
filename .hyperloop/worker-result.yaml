### Requirements Coverage

#### Requirement: Knowledge Graph Creation — COVERED

**Scenario: Successful creation**
- `KnowledgeGraph.create()` generates ULID, sets tenant_id and workspace_id,
  emits KnowledgeGraphCreated event
- Service checks EDIT permission on workspace before creating
- Tests: `test_knowledge_graph_service.py::TestKnowledgeGraphServiceCreate::*`
  and `test_knowledge_graph.py::TestKnowledgeGraphCreate::*`

**Scenario: Duplicate name within tenant**
- Unique constraint `uq_knowledge_graphs_tenant_name` on (tenant_id, name)
- Service catches IntegrityError → DuplicateKnowledgeGraphNameError
- Route returns 409 Conflict
- Tests: `test_create_raises_duplicate_on_integrity_error`,
  `test_create_knowledge_graph_returns_409_for_duplicate_name`

#### Requirement: Knowledge Graph Name Validation — COVERED

**Scenario: Valid name (1-100 chars)**
- `_validate_name()` enforces length in `__post_init__` and `update()`
- Tests: `test_create_accepts_single_char_name`,
  `test_create_accepts_name_exactly_100_chars`

**Scenario: Empty or oversized name**
- Raises `InvalidKnowledgeGraphNameError`; Pydantic validation returns 422
- Tests: `test_create_rejects_empty_name`, `test_create_rejects_name_over_100_chars`,
  `test_create_knowledge_graph_returns_422_for_empty_name`,
  `test_create_knowledge_graph_returns_422_for_oversized_name`

#### Requirement: Knowledge Graph Retrieval — COVERED

**Scenario: Authorized retrieval**
- `KnowledgeGraphService.get()` checks VIEW permission and returns aggregate
- Tests: `test_get_checks_view_permission`, `test_get_returns_aggregate_on_success`,
  `test_get_knowledge_graph_returns_200`

**Scenario: Unauthorized or non-existent (no distinction)**
- Service returns None for both missing and unauthorized; route returns 404
- Tests: `test_get_returns_none_when_not_found`,
  `test_get_returns_none_when_permission_denied`,
  `test_get_knowledge_graph_returns_404_when_unauthorized`

#### Requirement: Knowledge Graph Listing — COVERED

**Scenario: List for workspace**
- Checks VIEW on workspace, reads relationships from SpiceDB to discover KG IDs,
  fetches each KG and filters by tenant
- Tests: `test_list_checks_view_permission_on_workspace`,
  `test_list_uses_read_relationships_to_discover_kgs`,
  `test_list_filters_by_tenant`

#### Requirement: Knowledge Graph Update — COVERED

**Scenario: Update name and description**
- Service checks EDIT permission on KG, calls `kg.update()` within transaction
- Domain aggregate validates name and emits KnowledgeGraphUpdated event
- Tests: `test_update_checks_edit_permission_on_kg`,
  `test_update_calls_aggregate_update_and_saves`

#### Requirement: Knowledge Graph Deletion — COVERED

**Scenario: Successful deletion (atomic cascade)**
- Service checks MANAGE permission, deletes all data sources (with encrypted
  credentials via secret_store), marks KG for deletion, all within single
  `async with session.begin()` transaction
- Outbox translator cleans up workspace, tenant, and all direct grants on
  KnowledgeGraphDeleted event
- Tests: `test_delete_cascades_data_sources`,
  `test_delete_cascades_encrypted_credentials`,
  `test_delete_rolls_back_on_ds_deletion_failure`

**Scenario: Mutation after deletion**
- `kg.update()` checks `_deleted` flag and raises `AggregateDeletedError`
- `mark_for_deletion()` is idempotent
- Tests: `test_update_raises_after_deletion`,
  `test_mark_for_deletion_is_idempotent`

#### Requirement: Permission Inheritance — COVERED

**Scenario: Workspace-inherited access**
- SpiceDB schema: `permission view = admin + editor + viewer + workspace->view`
- `permission edit = admin + editor + workspace->edit`
- `permission manage = admin + workspace->manage`
- Outbox translator writes workspace relation on KnowledgeGraphCreated

**Scenario: Direct grant**
- Schema defines admin, editor, viewer direct relations in all permission rules
- Integration tests verify via live SpiceDB:
  `test_knowledge_graph_authorization.py::TestDirectGrantKnowledgeGraphAccess::*`

