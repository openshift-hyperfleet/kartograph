### Requirement 4: Concurrent Worker Safety — COVERED

**Implementation:**
- Both `OutboxRepository.fetch_unprocessed()` and `OutboxWorker._process_batch()`
  use `.with_for_update(skip_locked=True)` on their SELECT statements.

**Scenario: Concurrent workers**
- Unit test: `test_fetch_unprocessed_uses_for_update_skip_locked` (test_worker.py:645) —
  compiles query with PostgreSQL dialect; asserts `SKIP LOCKED` appears in rendered SQL.
- Same SKIP LOCKED logic present in `OutboxWorker._process_batch()` (worker.py:177)
  and `OutboxWorker._process_single()` (worker.py:201).

---

### Requirement 5: Dual Delivery Mechanism — COVERED

**Implementation:**
- Real-time: PostgreSQL trigger `notify_outbox_insert` (migration
  `d32ecc44581a_create_outbox_notify_trigger.py`) sends `pg_notify('outbox_events',
  NEW.id::text)` on every INSERT. `PostgresNotifyEventSource` uses `asyncpg-listen`
  `NotificationListener` to receive these events and invoke `_process_single()`.
- Polling fallback: `OutboxWorker._poll_loop()` calls `_process_batch()` every
  `poll_interval_seconds` (default 30). The poll loop runs unconditionally as a
  background task; the event source is optional.

**Scenario: Real-time notification**
- Unit tests: `test_postgres_notify_event_source.py` — extensive coverage of the
  `PostgresNotifyEventSource` (notification → UUID callback, invalid payloads ignored,
  Timeout objects ignored, probe calls, start/stop lifecycle).
- Integration test: `test_worker_processes_via_notify_not_polling`
  (test_outbox_consistency.py:463) — configures `poll_interval_seconds=999` to
  rule out polling, verifies entry processed within 500 ms of NOTIFY.

**Scenario: Polling fallback**
- Integration tests `test_worker_processes_group_created_and_writes_to_spicedb` and
  `test_handler_invoked_twice_produces_same_spicedb_state` create a group (NOTIFY
  fires but no listener is active), then call `worker._process_batch()` directly,
  which simulates the poll interval elapsing and discovering the missed entry.
  Both verify the entry is processed and SpiceDB is updated.
- NOTE: No test explicitly labels itself as the "polling fallback" scenario, and no
  test verifies the 30-second default. However, the mechanism (`_process_batch()`)
  is fully exercised by the integration tests. This is noted but does not constitute
  a failure.

