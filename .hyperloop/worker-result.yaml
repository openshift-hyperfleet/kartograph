### Spec Coverage

| Requirement | Scenario | Implementation | Tests |
|---|---|---|---|
| Transactional Event Storage | Successful write | `OutboxRepository.append()` never commits; caller owns transaction | `test_repository_append_does_not_commit` |
| Transactional Event Storage | Transaction rollback | Shared-session design: caller's rollback discards `session.add()` | `test_failed_service_call_leaves_no_outbox_entries` |
| Event Processing | Normal processing | `_process_batch()` → `handler.handle()` → `_mark_processed()` | Pre-existing |
| Event Processing | Transient failure | `_handle_processing_failure()` increments `retry_count`, records `last_error` | `test_transient_failure_increments_retry_count` (NEW) |
| Event Processing | Permanent failure (DLQ) | `retry_count >= max_retries` → `_move_to_dlq()` sets `failed_at` | `test_max_retries_moves_entry_to_dlq` (NEW) |
| Idempotent Event Handlers | Duplicate delivery | SpiceDB has upsert semantics; handler called twice → identical final state | `test_duplicate_invocation_produces_identical_final_state` using FakeAuthz (NEW) + integration test (NEW) |
| Concurrent Worker Safety | Concurrent workers | `fetch_unprocessed()` uses `.with_for_update(skip_locked=True)` | `test_fetch_unprocessed_uses_for_update_skip_locked` (NEW) |
| Dual Delivery | Real-time NOTIFY | Pre-existing `PostgresNotifyEventSource` | Pre-existing 27 tests |
| Dual Delivery | Polling fallback | Pre-existing `_poll_loop()` with 30s interval | Pre-existing |
| Event Fan-Out | Multiple handlers | `CompositeEventHandler` iterates all handlers for event type | Pre-existing |
| Event Fan-Out | Unknown event type | `CompositeEventHandler` raises `UnknownEventTypeError`; worker catches it → immediate DLQ (bypasses retry) | `test_unknown_event_type_immediately_moves_to_dlq`, `test_unknown_event_type_dlq_even_at_zero_retries`, `test_retry_not_called_for_unknown_event_type` (all NEW) |

