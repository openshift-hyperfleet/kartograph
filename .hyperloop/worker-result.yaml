### Requirement: Concurrent Worker Safety

#### Scenario: Concurrent workers
- Status: COVERED
- Code: `src/api/infrastructure/outbox/repository.py:91-103` — `fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`. Worker's `_process_batch()` at line 179 uses the same pattern internally. `_process_single()` at line 200 also applies `with_for_update(skip_locked=True)` for NOTIFY-triggered processing.
- Test (unit): `src/api/tests/unit/infrastructure/outbox/test_worker.py::TestOutboxWorkerConcurrentSafety::test_fetch_unprocessed_uses_for_update_skip_locked` — compiles the SQLAlchemy query with the PostgreSQL dialect and asserts `SKIP LOCKED` appears in the rendered SQL.

