### Requirement 6: Knowledge Graph Deletion — COVERED

**Scenario 6.1: Successful deletion (atomic cascade)**

- Implementation: Service checks MANAGE, wraps entire sequence in `async with self._session.begin()`: deletes encrypted credentials via secret store, deletes all data sources, marks KG for deletion, deletes KG. SpiceDB cleanup via domain event (`KnowledgeGraphDeleted`) in outbox. Route returns 204.
- Tests (atomicity specifically):
  - `tests/unit/management/application/test_knowledge_graph_service.py::test_delete_checks_manage_permission_on_kg`
  - `tests/unit/management/application/test_knowledge_graph_service.py::test_delete_cascades_data_sources`
  - `tests/unit/management/application/test_knowledge_graph_service.py::test_delete_rolls_back_on_ds_deletion_failure` — verifies full rollback on cascade failure
  - `tests/unit/management/application/test_knowledge_graph_service.py::test_delete_cascades_encrypted_credentials`
  - `tests/unit/management/presentation/test_knowledge_graph_routes.py::test_delete_knowledge_graph_returns_204`
  - `tests/integration/management/test_knowledge_graph_repository.py::test_deletes_knowledge_graph`
  - `tests/integration/management/test_knowledge_graph_repository.py::test_delete_records_outbox_event`

**Scenario 6.2: Mutation after deletion**

- Implementation: Domain `_deleted` flag set by `mark_for_deletion()`; `update()` checks flag and raises `AggregateDeletedError`
- Tests:
  - `tests/unit/management/test_knowledge_graph.py::test_update_raises_after_deletion`

