### Requirement 5: Dual Delivery Mechanism — COVERED

**Implementation:**
- `infrastructure/outbox/event_sources/postgres_notify.py` —
  `PostgresNotifyEventSource`: subscribes to channel `outbox_events`, invokes
  callback with entry UUID on NOTIFY.
- Migration `d32ecc44581a_create_outbox_notify_trigger.py` — PostgreSQL trigger
  executes `pg_notify('outbox_events', NEW.id::text)` after every INSERT.
- `infrastructure/outbox/worker.py` `_poll_loop()` — polls every
  `poll_interval_seconds` (default 30 s). Both mechanisms run concurrently
  via `worker.start()`.

**Scenarios:**

| Scenario | Test | File |
|---|---|---|
| Real-time notification (sub-second) | `TestPostgresNotifyEventSourceNotify::test_notify_triggers_callback_with_uuid` | `tests/unit/infrastructure/outbox/test_postgres_notify_event_source.py` |
| | `TestOutboxWorkerNotifyProcessing::test_worker_processes_via_notify_not_polling` | `tests/integration/iam/test_outbox_consistency.py` |
| Polling fallback (default 30 s) | `TestOutboxWorkerLifecycle::test_in_progress_batch_completes_before_shutdown` | `tests/unit/infrastructure/outbox/test_worker.py` |

*Integration test sets `poll_interval=999s` to force NOTIFY path; sub-second
latency verified with a 0.5 s deadline.*

