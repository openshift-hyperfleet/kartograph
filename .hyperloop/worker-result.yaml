### Implementation Summary

The Knowledge Graphs feature is fully implemented across all DDD layers of the
Management bounded context:

**Domain Layer** (`management/domain/`):
- `aggregates/knowledge_graph.py` — KnowledgeGraph aggregate with factory method
  `create()`, `update()`, `mark_for_deletion()`, event collection, and domain
  validation (1–100 char names, non-empty tenant_id and workspace_id)
- `domain/events/` — KnowledgeGraphCreated, KnowledgeGraphUpdated, KnowledgeGraphDeleted
- `domain/value_objects.py` — KnowledgeGraphId (ULID-based)
- `domain/exceptions.py` — InvalidKnowledgeGraphNameError, AggregateDeletedError, InvalidIdentifierError
- `domain/observability.py` — KnowledgeGraphProbe protocol + DefaultKnowledgeGraphProbe

**Ports** (`management/ports/`):
- `repositories.py` — IKnowledgeGraphRepository protocol with save, get_by_id,
  find_by_tenant, delete methods
- `exceptions.py` — DuplicateKnowledgeGraphNameError, UnauthorizedError

**Application Layer** (`management/application/`):
- `services/knowledge_graph_service.py` — KnowledgeGraphService with create,
  get, list_for_workspace, list_all, update, delete methods. Authorization
  checks via SpiceDB before each mutation. Cascade delete for data sources
  and encrypted credentials within a single atomic transaction.
- `application/observability/` — KnowledgeGraphServiceProbe protocol + default

**Infrastructure Layer** (`management/infrastructure/`):
- `repositories/knowledge_graph_repository.py` — PostgreSQL repo using
  transactional outbox pattern; events appended in same transaction as upsert
- `models/knowledge_graph.py` — SQLAlchemy ORM model with unique constraint
  on (tenant_id, name)
- `outbox/translator.py` — ManagementEventTranslator mapping KnowledgeGraphCreated
  → SpiceDB workspace+tenant relationships; KnowledgeGraphDeleted → cleanup of
  workspace, tenant, and all direct admin/editor/viewer grants
- `outbox/serializer.py` — JSON serialization/deserialization for domain events

**Presentation Layer** (`management/presentation/knowledge_graphs/`):
- `routes.py` — FastAPI routes for all 6 endpoints
- `models.py` — Pydantic request/response models with field validation

**SpiceDB Schema** (`shared_kernel/authorization/spicedb/schema.zed`):
- `knowledge_graph` definition with workspace, tenant, admin, editor, viewer
  relations; view/edit/manage permissions including workspace→permission
  inheritance

