## Requirement-by-Requirement Findings

### Requirement: Knowledge Graph Creation — COVERED

**Scenario: Successful creation**
- Code: `KnowledgeGraphService.create()` checks EDIT permission on workspace via SpiceDB.
  `KnowledgeGraph.create()` generates a ULID via `KnowledgeGraphId.generate()`, sets
  `tenant_id` and `workspace_id`, emits `KnowledgeGraphCreated` event. The outbox
  translator (`ManagementEventTranslator._translate_knowledge_graph_created`) converts
  that event to two `WriteRelationship` SpiceDB operations:
  `knowledge_graph:<id>#workspace@workspace:<ws_id>` and
  `knowledge_graph:<id>#tenant@tenant:<tenant_id>`.
- Tests:
  - `TestKnowledgeGraphServiceCreate::test_create_checks_edit_permission_on_workspace`
  - `TestKnowledgeGraphServiceCreate::test_create_saves_aggregate_via_repo` (verifies
    ULID, workspace, tenant association)
  - `TestManagementEventTranslatorKnowledgeGraphCreated` — 3 tests verifying both
    workspace and tenant SpiceDB relationship writes
  - `TestKnowledgeGraphCreate::test_create_emits_knowledge_graph_created_event`

**Scenario: Duplicate name within tenant**
- Code: `IntegrityError` from DB unique constraint caught, re-raised as
  `DuplicateKnowledgeGraphNameError`. Route maps to HTTP 409.
- Tests:
  - `TestKnowledgeGraphServiceCreate::test_create_raises_duplicate_on_integrity_error`
  - `TestKnowledgeGraphUniqueness::test_duplicate_name_in_same_tenant_raises_error`
    (integration against real PostgreSQL)
  - `TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_409_for_duplicate_name`

### Requirement: Knowledge Graph Name Validation — COVERED

**Scenario: Valid name (1–100 characters)**
- Code: `KnowledgeGraph._validate_name()` enforces `1 <= len(name) <= 100`.
  Pydantic `CreateKnowledgeGraphRequest` / `UpdateKnowledgeGraphRequest` enforce same
  at HTTP layer via `Field(min_length=1, max_length=100)`.
- Tests:
  - `TestKnowledgeGraphCreate::test_create_accepts_name_exactly_100_chars`
  - `TestKnowledgeGraphCreate::test_create_accepts_single_char_name`

**Scenario: Empty or oversized name**
- Code: `InvalidKnowledgeGraphNameError` raised for empty or >100 char names. Pydantic
  validation at HTTP layer returns 422 before service is called.
- Tests:
  - `TestKnowledgeGraphCreate::test_create_rejects_empty_name`
  - `TestKnowledgeGraphCreate::test_create_rejects_name_over_100_chars`
  - `TestKnowledgeGraphUpdate::test_update_rejects_empty_name`
  - `TestKnowledgeGraphUpdate::test_update_rejects_name_over_100_chars`
  - `TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_422_for_empty_name`
  - `TestCreateKnowledgeGraph::test_create_knowledge_graph_returns_422_for_oversized_name`
  - `TestUpdateKnowledgeGraph::test_update_knowledge_graph_returns_422_for_empty_name`
  - `TestUpdateKnowledgeGraph::test_update_knowledge_graph_returns_422_for_oversized_name`

### Requirement: Knowledge Graph Retrieval — COVERED

**Scenario: Authorized retrieval**
- Code: `KnowledgeGraphService.get()` fetches KG, verifies tenant, checks VIEW
