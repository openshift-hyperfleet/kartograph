#### Requirement: DEFINE Operation — COVERED

- **Scenario: Define a node type:**
  - Implementation: `apply_mutations()` calls `get_system_properties_for_entity(EntityType.NODE)`
    → `{data_source_id, source_path, slug}` added to `required_properties` before saving.
  - Test: `test_apply_mutations_stores_define_operations` asserts `label`, `entity_type`,
    `description` are stored and that `data_source_id`, `source_path`, `slug` are all in
    `required_properties`.

- **Scenario: Define an edge type:**
  - Implementation: `get_system_properties_for_entity(EntityType.EDGE)` returns
    `COMMON_SYSTEM_PROPERTIES` only (`data_source_id`, `source_path`) — `slug` is
    node-specific.
  - Test: `test_apply_define_edge_type_adds_edge_system_properties` asserts
    `data_source_id` and `source_path` present; asserts `slug` NOT in `required_properties`.

