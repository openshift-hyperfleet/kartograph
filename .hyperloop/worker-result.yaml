## Task 017: Outbox Pattern — Fresh Attempt Verification

Fresh end-to-end verification of all spec requirements from
`specs/shared-kernel/outbox.spec.md`. All 2187 unit tests pass (130 outbox-specific).

---

### Requirement 1: Transactional Event Storage — PASS

**Scenario: Successful write**
- `OutboxRepository.append()` calls `session.add(model)` only — never commits.
- Test: `test_repository_append_does_not_commit` asserts `session.commit` not called.

**Scenario: Transaction rollback**
- Shared-session design: caller's rollback discards the pending `session.add()`.
- Test: `test_failed_service_call_leaves_no_outbox_entries`.

---

### Requirement 2: Event Processing — PASS

**Scenario: Normal processing**
- `OutboxWorker._process_batch()` → `_process_entries()` → `handler.handle()` → `_mark_processed()`.
- Tests: `test_marks_entry_as_processed`, `test_calls_event_processed_on_success`.

**Scenario: Transient failure**
- `_handle_processing_failure()` increments retry_count and records last_error.
- Tests: `test_transient_failure_increments_retry_count`, `test_transient_failure_does_not_dlq_immediately`.

**Scenario: Permanent failure (dead letter)**
- When `retry_count >= max_retries`, `_move_to_dlq()` sets `failed_at`.
- `fetch_unprocessed()` filters `failed_at IS NULL` (confirmed by SQL compilation test).
- Tests: `test_max_retries_moves_entry_to_dlq`, `test_failed_entries_excluded_from_fetch`.

---

### Requirement 3: Idempotent Event Handlers — PASS

**Scenario: Duplicate delivery**
- SpiceDB `write_relationship` has upsert semantics (set membership, no duplicate writes).
- `SpiceDBEventHandler.handle()` called twice with same payload → identical final state.
- Tests: `test_duplicate_invocation_produces_identical_final_state` (FakeAuthorizationProvider
  uses Python `set` to mirror SpiceDB's upsert semantics).

---

### Requirement 4: Concurrent Worker Safety — PASS

**Scenario: Concurrent workers**
- `fetch_unprocessed()` uses `.with_for_update(skip_locked=True)`.
- Test: `test_fetch_unprocessed_uses_for_update_skip_locked` compiles query with
  PostgreSQL dialect and asserts `"SKIP LOCKED"` present.

---

### Requirement 5: Dual Delivery Mechanism — PASS

**Scenario: Real-time notification**
- PostgreSQL trigger calls `pg_notify('outbox_events', NEW.id::text)` on INSERT.
- `PostgresNotifyEventSource` (asyncpg-listen) invokes `_process_single()` callback.
- Tests: 27 tests in `test_postgres_notify_event_source.py`.

**Scenario: Polling fallback**
- `poll_interval_seconds: int = 30` (default); `_poll_loop()` always runs regardless
  of whether event source is configured.
- Tests: `test_processes_unprocessed_entries`, `test_handles_multiple_entries_in_batch`.

---

### Requirement 6: Event Fan-Out — PASS

**Scenario: Multiple handlers registered**
- `CompositeEventHandler.handle()` iterates all handlers for the event type.
- Test: `test_handle_fans_out_to_multiple_handlers` (two handlers both invoked).

**Scenario: Unknown event type**
- `CompositeEventHandler` raises `UnknownEventTypeError` (not `ValueError`).
- `OutboxWorker._process_entries()` catches `UnknownEventTypeError` → immediate DLQ.
- Tests: `test_unknown_event_type_immediately_moves_to_dlq`,
  `test_unknown_event_type_dlq_even_at_zero_retries`,
  `test_retry_not_called_for_unknown_event_type`.

