#### REQ-5: CREATE Operation — COVERED
- **Code (idempotent merge):** AGE bulk-loading infrastructure uses `||` jsonb merge operator (staging tables);
  preserves existing properties, adds new ones.
- **Code (validation):** `graph_mutation_service.py` rejects CREATE with no prior DEFINE (batch or repository),
  rejects missing required properties.
- **Code (schema learning):** `_discover_optional_properties()` adds extra `set_properties` keys to
  `optional_properties` on the type definition.
- **Tests:** `test_mutation_service.py` —
  `test_rejects_create_without_define_in_batch()`, `test_accepts_create_with_define_in_batch()`,
  `test_rejects_create_missing_required_properties()`;
  `tests/unit/graph/application/test_schema_learning.py` —
  `test_extra_properties_added_to_optional()`, `test_optional_properties_accumulate()`;
  `tests/unit/graph/infrastructure/test_age_query_builder_update_merge.py` — merge semantics tests

