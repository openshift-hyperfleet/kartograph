### Architecture

- `shared_kernel/outbox/`: Pure protocols and value objects (no infrastructure imports)
- `infrastructure/outbox/`: PostgreSQL implementations (repository, worker, composite, SpiceDB handler)
- `iam/infrastructure/outbox/`: IAM-specific serializer and translator (18 event types)
- `management/infrastructure/outbox/`: Management-specific serializer and translator
- Bounded context purity enforced by `pytest-archon` architecture tests

### Key Design Properties

- **Atomicity**: Repository shares caller's session; no independent commits.
- **Idempotency**: SpiceDB write operations are upserts; `processed_at IS NULL` filter prevents reprocessing.
- **Concurrency safety**: `FOR UPDATE SKIP LOCKED` ensures exclusive row-level locking.
- **Graceful shutdown**: `stop()` uses `_shutdown_event` + task awaiting (no cancel) so in-progress batches complete.
- **Observability**: `OutboxWorkerProbe` and `EventSourceProbe` follow Domain-Oriented Observability pattern.

