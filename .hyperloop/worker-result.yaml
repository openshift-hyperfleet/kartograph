### Implementation Review

**Per-Tenant Graph Isolation**
- `get_tenant_graph_name` derives `tenant_{tenant_id}` from authenticated user's `tenant_id`. Passed into `AgeGraphClient` via new `graph_name` override parameter on `get_age_graph_client`. Clean DI wiring.

**KnowledgeGraph Scoping / Authorization**
- `POST /graph/knowledge-graphs/{id}/mutations` checks SpiceDB `edit` permission before calling the service. Returns 403 immediately on denial — service is never invoked.
- The old `/graph/mutations` endpoint is correctly removed; the KG-scoped route is the sole write path.

**knowledge_graph_id Stamping / Anti-Spoofing**
- `_stamp_knowledge_graph_id()` runs first in `apply_mutations()`, before any validation. Uses `model_copy(update=...)` on the frozen Pydantic model — correct Pydantic v2 approach.
- `PLATFORM_STAMPED_PROPERTIES` constant excludes `knowledge_graph_id` from schema learning, preventing pollution of type definition optional_properties.
- `validate_operation()` asserts `knowledge_graph_id` is present in CREATE `set_properties` (called later, inside `mutation_applier.apply_batch`, after stamping — ordering is correct).

**Idempotent CREATE Merge**
- `_build_update_existing_query` now uses `(t.properties::text)::jsonb || (s.properties::text)::jsonb` operator. Properties absent from a subsequent CREATE batch are preserved. Regression-guarded by unit test (SQL structure check) and integration test (actual AGE round-trip with differing property sets).

**Operation Ordering**
- `_sort_operations` applies DEFINE→DELETE(edge, node)→CREATE(node, edge)→UPDATE priority. Tested explicitly by `test_sort_order_define_delete_create_update`.

**DEFINE System Properties**
- Node types get `data_source_id`, `source_path`, `slug` auto-added. Edge types get `data_source_id`, `source_path` but NOT `slug`. Explicitly tested.

**All spec scenarios covered:** JSONL parsing (valid, parse-error with line number + content preview, empty lines), DEFINE node/edge, CREATE new/idempotent-merge/edge/missing-type/missing-required-props/schema-learning, UPDATE set/remove/schema-learning, DELETE node cascading/edge-only, mandatory system props, deterministic IDs, referential integrity ordering.

