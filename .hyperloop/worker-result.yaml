## Fix Applied

Added `buildQueryGraphArgs` as an exported pure function to
`src/dev-ui/app/composables/api/useQueryApi.ts`. The function builds the
`arguments` record for the MCP `query_graph` tool call, conditionally
including `knowledge_graph_id` when a knowledge graph ID is provided.
Refactored the internal `queryGraph()` to delegate to `buildQueryGraphArgs()`.

