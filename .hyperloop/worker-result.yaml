## FAIL 3 — Sync Logs Scenario Not Implemented (Requirement 6 — SHALL)

**Spec:** "GIVEN a sync run (in progress or completed), WHEN the user requests logs,
THEN detailed logs for that run are displayed."

**Code:** The `SyncRun` interface (`data-sources/index.vue` lines 45–52) has no `logs`
field — only `id`, `status`, `started_at`, `completed_at`, `error` (a single error
string). The sync history card displays status badges, timestamps, duration, and the
error string inline. There is no "View Logs" button, no expandable log panel, and no
API call to fetch log detail.

**Test:** None.

**Required fix:**
1. Extend `SyncRun` to include a `logs` field (or add a log-fetch endpoint).
2. Add a "View Logs" button per sync-run row; on click, fetch and display detailed logs
   in a sheet or dialog.
3. Add a test for the log-viewing toggle/fetch logic.

