| Transient failure | `_handle_processing_failure()` increments `retry_count`, records `last_error` | `TestOutboxWorkerRetryBehavior.test_transient_failure_increments_retry_count` |
| Dead letter (permanent failure) | `_move_to_dlq()` sets `failed_at` when `retry_count >= max_retries` | `TestOutboxWorkerRetryBehavior.test_max_retries_moves_entry_to_dlq` |
| Idempotent Event Handlers | SpiceDB upsert semantics; `processed_at IS NULL` filter prevents reprocessing | `TestOutboxWorkerIdempotency`, `TestIdempotentEventHandlers` |
| Concurrent Worker Safety | `FOR UPDATE SKIP LOCKED` in `fetch_unprocessed()` | `TestOutboxWorkerConcurrentSafety` |
| Dual Delivery — real-time NOTIFY | `PostgresNotifyEventSource` via asyncpg-listen | `TestPostgresNotifyEventSource` |
| Dual Delivery — polling fallback | `_poll_loop()` runs every 30s regardless of NOTIFY | `TestOutboxWorkerLifecycle` |
| Event Fan-Out (multiple handlers) | `CompositeEventHandler.register()` + `handle()` dispatches to all handlers | `TestCompositeEventHandler` |
| Unknown event type → immediate DLQ | `UnknownEventTypeError` caught before general `Exception`; bypasses retry count | `TestOutboxWorkerRetryBehavior.test_unknown_event_type_immediately_moves_to_dlq` |

