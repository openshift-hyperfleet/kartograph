### Requirement: Idempotent Event Handlers — COVERED

**Scenario: Duplicate delivery** — COVERED
- **Code (primary guard):** `fetch_unprocessed()` filters `processed_at IS NULL` and
  `failed_at IS NULL` — entries that committed successfully are never re-fetched.
- **Code (handler idempotency):** SpiceDB client uses `OPERATION_TOUCH` (upsert semantics)
  confirmed at `shared_kernel/authorization/spicedb/client.py:310`. Calling
  `write_relationship` twice with the same tuple produces the same final state.
- **Unit tests:**
  - `TestOutboxWorkerIdempotency::test_already_processed_entry_excluded_from_fetch`
    — compiles query and asserts `"processed_at IS NULL"` present.
  - `TestOutboxWorkerIdempotency::test_failed_entries_excluded_from_fetch`
    — asserts `"failed_at IS NULL"` present.
  - `TestSpiceDBEventHandler` + `test_write_relationship_is_idempotent` in
    `test_in_memory_provider.py` — verifies TOUCH semantics prevent duplicate SpiceDB entries.

**Note:** The previous findings cited a non-existent integration test class
`TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state`.
No such class exists in `test_outbox_consistency.py`. The idempotency contract is
adequately covered by the three unit tests above (fetch filter + SpiceDB TOUCH).
This is not a FAIL — the spec scenario is satisfied by composition of separately-tested
mechanisms, which is acceptable under the SHALL requirement.

