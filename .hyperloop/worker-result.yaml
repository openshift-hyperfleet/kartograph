#### R9 — Deterministic Entity IDs
**SHALL**: ID format `{type}:{16_hex_chars}`; same entity always produces same ID.

- **Code**: `MutationOperation.id` validated by `ID_REGEX = r"^[0-9a-z_]+:[0-9a-f]{16}$"`;
  `EntityIdGenerator` generates deterministic IDs via truncated SHA-256.
- **Tests**:
  - `test_id_pattern_validation` — invalid format triggers `ValidationError`.
  - `test_id_accepts_valid_pattern` — `"person:abc123def456789a"` accepted.
  - `TestEntityIdGenerator::test_is_deterministic` — same inputs → same ID across calls.
  - `test_hash_portion_length` — exactly 16 chars.
  - `test_hash_portion_is_hex` — only `[0-9a-f]` chars.
- **Status**: COVERED

---

#### R10 — Referential Integrity Ordering
**SHALL**: DEFINE first → DELETE (edges before nodes) → CREATE (nodes before edges) → UPDATE last.

- **Code**: `MutationApplier._sort_operations()` uses a two-key tuple:
  op priority `{DEFINE:0, DELETE:1, CREATE:2, UPDATE:3}` + entity-type sub-priority
  (edges-first for DELETE; nodes-first for CREATE).
- **Tests** (`TestSortOperationsReferentialIntegrity`):
  - `test_sort_order_define_delete_create_update` — asserts exact index positions of all
    6 operation types in a maximally-mixed input list: position 0 is DEFINE, 1 is DELETE-edge,
    2 is DELETE-node, 3 is CREATE-node, 4 is CREATE-edge, 5 is UPDATE.
  - `test_sort_preserves_all_operations` — no ops dropped or duplicated.
- **Status**: COVERED

