#### Requirement: Knowledge Graph Deletion

**Scenario: Successful deletion (atomic cascade)**
- Code: `KnowledgeGraphService.delete()` checks `Permission.MANAGE` on the KG, then within
  `async with self._session.begin()` (single DB transaction): fetches and deletes all data
  sources (including secret store cleanup for each DS with credentials), marks KG for
  deletion, deletes KG. The `KnowledgeGraphDeleted` outbox event triggers SpiceDB cleanup:
  workspace, tenant, admin, editor, viewer relationships (5 operations via filter and direct
  deletes in `ManagementEventTranslator._translate_knowledge_graph_deleted()`).
- Tests:
  - `test_delete_cascades_data_sources` — verifies DS cascade
  - `test_delete_cascades_encrypted_credentials` — verifies secret store cleanup
  - `test_delete_rolls_back_on_ds_deletion_failure` — verifies DB atomicity (KG not deleted
    when DS deletion raises, session.begin() rolls back entire transaction)
  - `test_produces_five_operations`, `test_first_operation_deletes_workspace_relationship`,
    `test_third_operation_filters_admin_grants`, etc. (translator tests) — verifies SpiceDB cleanup
  - `test_delete_knowledge_graph_returns_204` (route)

**Scenario: Mutation after deletion**
- Code: `KnowledgeGraph.update()` raises `AggregateDeletedError` if `self._deleted` is `True`.
  `mark_for_deletion()` sets `_deleted = True`.
- Tests:
  - `test_update_raises_after_deletion` (domain)

#### Requirement: Permission Inheritance

**Scenario: Workspace-inherited access**
- Code: SpiceDB schema defines:
  `knowledge_graph.view = admin + editor + viewer + workspace->view`
  `knowledge_graph.edit = admin + editor + workspace->edit`
  `knowledge_graph.manage = admin + workspace->manage`
  Workspace-to-KG link written via outbox on KG creation.
- Tests (integration, SpiceDB live):
  - `test_workspace_editor_can_view_knowledge_graph`
  - `test_workspace_editor_can_edit_knowledge_graph`
  - `test_workspace_editor_cannot_manage_knowledge_graph`
  - `test_workspace_admin_can_manage_knowledge_graph`
  - `test_workspace_member_can_view_knowledge_graph`
  - `test_workspace_member_cannot_edit_knowledge_graph`
  - `test_user_without_workspace_role_cannot_access_knowledge_graph`

**Scenario: Direct grant**
- Code: SpiceDB schema `admin` relation directly on `knowledge_graph` satisfies
  `manage`, `edit`, and `view` permissions.
- Tests (integration, SpiceDB live):
  - `test_direct_kg_admin_has_manage_permission`
  - `test_direct_kg_admin_has_edit_permission`
  - `test_direct_kg_admin_has_view_permission`
  - `test_direct_kg_editor_has_edit_and_view_but_not_manage`
  - `test_direct_kg_viewer_has_view_only`

