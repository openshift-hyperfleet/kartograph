### Requirement 2: API Key Authentication — COVERED

**Implementation:**
- `iam/dependencies/user.py` `_authenticate()`: checks JWT (`token is not None`) first,
  then X-API-Key (`x_api_key is not None`); JWT errors raise immediately, no fallthrough
- `iam/application/services/api_key_service.py` `validate_and_get_key()`: calls
  `get_verified_key()`, checks `is_valid()`, calls `record_usage()`, saves
- `iam/domain/aggregates/api_key.py` `is_valid()`: returns False if revoked or expired
- `iam/infrastructure/api_key_repository.py` `get_verified_key()`: prefix lookup, bcrypt
  verification per candidate, logs ERROR probe on collision

**Scenario: Valid key** — COVERED
- Tests: `test_authenticates_with_valid_api_key` (integration),
  `test_updates_last_used_at` (service unit)

**Scenario: Expired key** — COVERED
- Tests: `test_returns_401_for_expired_api_key` (integration — uses direct DB insertion to
  create past-expired key), `test_returns_none_for_expired_key` (service unit)

**Scenario: Revoked key** — COVERED
- Tests: `test_returns_401_for_revoked_api_key` (integration), `test_returns_none_for_revoked_key`
  (service unit)

**Scenario: JWT takes precedence** — COVERED
- Implementation: `if token is not None:` branch runs and raises 401 on invalid JWT before
  API key is ever checked
- Tests: `test_prefers_jwt_when_both_provided` (integration — both auth methods, JWT wins),
  `test_invalid_jwt_with_valid_api_key_uses_api_key` (integration — confirms JWT error
  takes precedence, returns 401 rather than falling through to API key)

**Scenario: Prefix collision** — COVERED
- Implementation: `get_verified_key()` logs `api_key_prefix_collision()` at ERROR level when
  `len(models) > 1`; iterates all candidates with bcrypt verification
- Tests: `test_logs_error_on_prefix_collision` (repository unit test — verifies probe called
  with prefix and count of 2)

