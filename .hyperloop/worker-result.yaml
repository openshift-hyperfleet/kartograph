| | `TestOutboxWorkerIdempotency::test_failed_entries_excluded_from_fetch` | same |
| Duplicate delivery (handler) | `TestSpiceDBEventHandlerIdempotency::test_duplicate_invocation_produces_identical_final_state` | `tests/unit/infrastructure/outbox/test_spicedb_handler.py` |
| | `TestIdempotentEventHandlers::test_handler_invoked_twice_produces_same_spicedb_state` | `tests/integration/iam/test_outbox_consistency.py` |

