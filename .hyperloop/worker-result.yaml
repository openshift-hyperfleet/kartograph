## FAIL Resolution Summary

### FAIL 1 — KG Creation (Requirement 3) — RESOLVED
`handleCreate()` calls `POST /management/knowledge-graphs` via `apiFetch()`.
`loadKnowledgeGraphs()` populates the list on mount and on tenant switch.
Empty state only rendered when the list is truly empty.

### FAIL 2 — Ontology Edit Gate (Requirement 5) — RESOLVED
`requestOntologyEdit(ds)` gates on `sync_runs.some(r => r.status === 'completed')`.
When a completed run exists, a destructive confirmation dialog must be confirmed before
proceeding. `confirmReExtraction()` / `cancelReExtraction()` implement the flow.

### FAIL 3 — Sync Logs (Requirement 6) — RESOLVED
"View Logs" button per sync-run row calls
`GET /management/data-sources/{dsId}/sync-runs/{runId}/logs` and displays results in a
Sheet panel with loading/error/empty states.

### FAIL 4 — Query Console KG Selector (Requirement 8) — RESOLVED
`loadKnowledgeGraphs()` calls `GET /management/knowledge-graphs` on mount and on
tenant switch. Selected KG ID is passed as a query parameter during execution.
