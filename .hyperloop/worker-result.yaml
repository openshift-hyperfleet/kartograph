### Requirement: Permission Inheritance — COVERED

**Knowledge graph permissions SHALL be inheritable from the parent workspace.**

**Scenario: Workspace-inherited access**
- Code: SpiceDB schema defines:
  - `permission view = admin + editor + viewer + workspace->view`
  - `permission edit = admin + editor + workspace->edit`
  - `permission manage = admin + workspace->manage`
  A user with workspace `edit` permission thus inherits `edit` (and `view`) on all KGs in that workspace.
- Tests:
  - `TestKnowledgeGraphSchemaDesign.test_knowledge_graph_view_includes_workspace_view` (unit, schema)
  - `TestKnowledgeGraphSchemaDesign.test_knowledge_graph_edit_includes_workspace_edit` (unit, schema)
  - `TestKnowledgeGraphSchemaDesign.test_knowledge_graph_manage_includes_workspace_manage` (unit, schema)

**Scenario: Direct grant (admin → manage + edit + view)**
- Code: SpiceDB schema includes `admin` in all three permission expressions (`view`, `edit`, `manage`). A direct admin grant confers all permissions regardless of workspace role.
- Tests:
  - `TestKnowledgeGraphSchemaDesign.test_knowledge_graph_view_includes_direct_roles` (verifies admin, editor, viewer in view expression)
  - `TestKnowledgeGraphSchemaDesign.test_knowledge_graph_edit_includes_direct_roles` (verifies admin, editor in edit expression)
  - `TestKnowledgeGraphSchemaDesign.test_knowledge_graph_manage_is_admin_based` (verifies admin in manage, editor/viewer excluded)

