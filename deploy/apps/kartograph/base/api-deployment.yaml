apiVersion: apps/v1
kind: Deployment
metadata:
  name: kartograph-api
  labels:
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: kartograph-api
      initContainers:
        # Wait for database migrations to complete
        - name: wait-for-db-migrate
          image: bitnami/kubectl@sha256:b349e60a6ae2969af84a778c0b976b050a0cc77f4fb6a4ad44307cd0a06e9d8f
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for db-migrate job to complete..."
              kubectl wait --for=condition=complete --timeout=300s job/kartograph-db-migrate
              echo "Database migration complete!"
        # Wait for SpiceDB schema to be loaded
        - name: wait-for-spicedb-schema
          image: bitnami/kubectl@sha256:b349e60a6ae2969af84a778c0b976b050a0cc77f4fb6a4ad44307cd0a06e9d8f
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for spicedb-schema job to complete..."
              kubectl wait --for=condition=complete --timeout=300s job/kartograph-spicedb-schema
              echo "SpiceDB schema loaded!"
      containers:
        - name: api
          image: quay.io/redhat-user-workloads/kartograph-tenant/kartograph-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            # Database config
            - name: KARTOGRAPH_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_DB_HOST
            - name: KARTOGRAPH_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_DB_PORT
            - name: KARTOGRAPH_DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_DB_DATABASE
            - name: KARTOGRAPH_DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_DB_USERNAME
            - name: KARTOGRAPH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kartograph-db-credentials
                  key: password
            - name: KARTOGRAPH_DB_GRAPH_NAME
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_DB_GRAPH_NAME
            # SpiceDB config
            - name: SPICEDB_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: SPICEDB_ENDPOINT
            - name: SPICEDB_PRESHARED_KEY
              valueFrom:
                secretKeyRef:
                  name: kartograph-spicedb-credentials
                  key: SPICEDB_PRESHARED_KEY
            - name: SPICEDB_USE_TLS
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: SPICEDB_USE_TLS
            - name: SPICEDB_CERT_PATH
              value: /etc/spicedb-ca/service-ca.crt
            # Management config (data source credential encryption)
            - name: KARTOGRAPH_MGMT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: kartograph-management
                  key: KARTOGRAPH_MGMT_ENCRYPTION_KEY
            # IAM config
            - name: KARTOGRAPH_IAM_SINGLE_TENANT_MODE
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_IAM_SINGLE_TENANT_MODE
                  optional: true
            # CORS config
            - name: KARTOGRAPH_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_CORS_ORIGINS
                  optional: true
            # Outbox worker config
            - name: KARTOGRAPH_OUTBOX_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_OUTBOX_ENABLED
            - name: KARTOGRAPH_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: kartograph-sso-client-api
                  key: client_id
            - name: KARTOGRAPH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kartograph-sso-client-api
                  key: client_secret
            - name: KARTOGRAPH_OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: kartograph-sso-client-api
                  key: issuer
            - name: KARTOGRAPH_OIDC_SWAGGER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: kartograph-sso-client-swagger-docs
                  key: client_id
            # Extraction workload runtime (non-secret config from ConfigMap)
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_BACKEND
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_JOB_RUNNER
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_JOB_RUNNER
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_API_BASE_URL
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_API_BASE_URL
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_CONTAINER_HARDENING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_CONTAINER_HARDENING_ENABLED
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_POLICY_DIR
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_POLICY_DIR
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_POLICY_ENFORCEMENT
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_POLICY_ENFORCEMENT
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_RUNTIME_HOST
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_RUNTIME_HOST
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_GATEWAY_NAME
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_GATEWAY_NAME
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_GATEWAY_URL
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_XDG_CONFIG_HOME
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_XDG_CONFIG_HOME
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_JOB_PACKAGE_WORK_DIR
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_JOB_PACKAGE_WORK_DIR
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_EXTRACTION_JOB_WORK_DIR
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_EXTRACTION_JOB_WORK_DIR
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_STICKY_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_STICKY_IMAGE
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_EXTRACTION_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_EXTRACTION_IMAGE
                  optional: true
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_AGENTIC_CI_HARNESS
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_AGENTIC_CI_HARNESS
                  optional: true
            - name: CLAUDE_CODE_USE_VERTEX
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: CLAUDE_CODE_USE_VERTEX
                  optional: true
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: ANTHROPIC_VERTEX_PROJECT_ID
                  optional: true
            - name: CLOUD_ML_REGION
              valueFrom:
                configMapKeyRef:
                  name: kartograph-config
                  key: CLOUD_ML_REGION
                  optional: true
            # Extraction workload secrets (Vault via ExternalSecrets in hp-fleet-gitops)
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_WORKLOAD_TOKEN_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: kartograph-extraction-runtime
                  key: KARTOGRAPH_EXTRACTION_RUNTIME_WORKLOAD_TOKEN_SIGNING_KEY
                  optional: true
            - name: KARTOGRAPH_GCLOUD_CONFIG_MOUNT
              value: /var/secrets/gcloud

          volumeMounts:
            - name: spicedb-ca
              mountPath: /etc/spicedb-ca
              readOnly: true
            - name: openshell-policies
              mountPath: /etc/openshell/policies
              readOnly: true
            - name: gcloud-adc
              mountPath: /var/secrets/gcloud
              readOnly: true
            - name: extraction-work
              mountPath: /var/kartograph
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 3Gi
      volumes:
        - name: spicedb-ca
          configMap:
            name: kartograph-spicedb-ca
            items:
              - key: service-ca.crt
                path: service-ca.crt
        - name: openshell-policies
          configMap:
            name: kartograph-openshell-policies
        - name: gcloud-adc
          secret:
            secretName: kartograph-extraction-runtime
            optional: true
            items:
              - key: application_default_credentials.json
                path: application_default_credentials.json
        - name: extraction-work
          emptyDir: {}
