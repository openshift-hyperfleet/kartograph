apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kartograph-db-credentials-eso
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    description: "Syncs kartograph DB credentials from Vault via ESO."
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: kartograph-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: kartograph/stage/postgres
