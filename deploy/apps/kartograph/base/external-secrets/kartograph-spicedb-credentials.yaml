apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kartograph-spicedb-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: kartograph-spicedb-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: kartograph/stage/spicedb
