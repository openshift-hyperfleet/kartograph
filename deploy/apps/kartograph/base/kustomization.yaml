apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # API
  - api-deployment.yaml
  - api-service.yaml
  - api-serviceaccount.yaml
  # Database
  - postgres-deployment.yaml
  - postgres-service.yaml
  - postgres-pvc.yaml
  # Authorization
  - spicedb-deployment.yaml
  - spicedb-service.yaml
  # RBAC
  - init-waiter-rbac.yaml
  # Jobs
  - job-db-init.yaml
  - job-spicedb-migrate.yaml
  - job-db-migrate.yaml
  - job-spicedb-schema.yaml
  # Dev UI
  - dev-ui-deployment.yaml
  - dev-ui-service.yaml
  - dev-ui-serviceaccount.yaml
  # Config
  - configmap.yaml
  - spicedb-schema-configmap.yaml
  - spicedb-ca-configmap.yaml
  - networkpolicy-sticky-runtime.yaml
  - openshell-policies-configmap.yaml
  - openshell-gateway-configmap.yaml
  - openshell-rbac.yaml
  # External Secrets (SecretStore managed by app-interface in hp-fleet-gitops)
  - external-secrets/kartograph-db-credentials.yaml
  - external-secrets/kartograph-spicedb-credentials.yaml
  - external-secrets/kartograph-sso-client-api.yaml
  - external-secrets/kartograph-sso-client-swagger-docs.yaml
  - external-secrets/kartograph-sso-client-ui.yaml
  - external-secrets/kartograph-management.yaml
  - external-secrets/kartograph-extraction-runtime.yaml

commonLabels:
  app.kubernetes.io/name: kartograph
  app.kubernetes.io/part-of: kartograph
