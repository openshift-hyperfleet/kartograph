apiVersion: v1
kind: ConfigMap
metadata:
  name: kartograph-openshell-gateway
  labels:
    app.kubernetes.io/component: openshell
data:
  gateway.toml: |
    [openshell]
    version = 1

    [openshell.gateway]
    # Loopback-only inside the kartograph-api pod (sidecar shares network namespace).
    bind_address = "127.0.0.1:17670"
    compute_drivers = ["kubernetes"]
    default_image = "quay.io/aipcc/agentic-ci/claude-sandbox:latest"
    supervisor_image = "ghcr.io/nvidia/openshell/supervisor:latest"

    [openshell.drivers.kubernetes]
    # Sandboxes run as pods in the release namespace (kartograph-stage overlay).
    namespace = ""
