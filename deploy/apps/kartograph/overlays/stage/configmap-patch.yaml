apiVersion: v1
kind: ConfigMap
metadata:
  name: kartograph-config
data:
  # Stage-specific overrides (merged with base)
  # FQDN required for TLS cert SAN matching (service cert issued for kartograph-spicedb.kartograph-stage.svc)
  SPICEDB_ENDPOINT: "kartograph-spicedb.kartograph-stage.svc:50051"
  KARTOGRAPH_CORS_ORIGINS: '["https://kartograph-dev-ui-kartograph-stage.apps.rosa.appsres09ue1.24ep.p3.openshiftapps.com"]'
  # Dev UI
  DEV_UI_API_BASE_URL: "https://kartograph-api-kartograph-stage.apps.rosa.appsres09ue1.24ep.p3.openshiftapps.com"
  DEV_UI_MCP_ENDPOINT_URL: "https://kartograph-api-kartograph-stage.apps.rosa.appsres09ue1.24ep.p3.openshiftapps.com/query/mcp"
  DEV_UI_KEYCLOAK_URL: "https://auth.stage.redhat.com/auth"
  DEV_UI_KEYCLOAK_REALM: "EmployeeIDP"
  DEV_UI_KEYCLOAK_CLIENT_ID: "e84a630e-cd5c-4bb9-bec6-7609d795fd2f"
  # IAM
  KARTOGRAPH_IAM_SINGLE_TENANT_MODE: "false"
  # OpenShell extraction runtime (GMA, extraction jobs, maintenance jobs)
  KARTOGRAPH_EXTRACTION_RUNTIME_BACKEND: "openshell"
  KARTOGRAPH_EXTRACTION_RUNTIME_JOB_RUNNER: "openshell"
  KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_API_BASE_URL: "http://kartograph-api:8000"
  ANTHROPIC_VERTEX_PROJECT_ID: "itpc-gcp-hcm-pe-eng-claude"
  CLOUD_ML_REGION: "us-east5"
  # Must match kustomization images.kartograph-agent-runtime.newTag (Konflux commit SHA).
  KARTOGRAPH_EXTRACTION_RUNTIME_STICKY_IMAGE: "quay.io/redhat-user-workloads/kartograph-tenant/kartograph-agent-runtime:3d5624a892fb092de341a5f2f2a25ccf45063b72"
  # Immutable digest — do not use :latest.
  KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_EXTRACTION_IMAGE: "quay.io/aipcc/agentic-ci/claude-sandbox@sha256:fcd75c27da6c3ce875a07546bcc310498173531bf57db40f401839d672074801"
