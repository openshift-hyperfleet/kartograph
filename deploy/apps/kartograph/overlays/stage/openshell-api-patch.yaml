apiVersion: apps/v1
kind: Deployment
metadata:
  name: kartograph-api
spec:
  template:
    spec:
      initContainers:
        - name: openshell-bootstrap
          image: quay.io/redhat-user-workloads/kartograph-tenant/kartograph-openshell-gateway:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: XDG_CONFIG_HOME
              value: /var/openshell/xdg
            - name: XDG_STATE_HOME
              value: /var/openshell/state
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              mkdir -p "${XDG_CONFIG_HOME}/openshell/gateways/openshell/mtls"
              mkdir -p "${XDG_STATE_HOME}/openshell/tls"
              cp /etc/openshell-gateway/gateway.toml "${XDG_CONFIG_HOME}/openshell/gateway.toml"
              if [ ! -f "${XDG_STATE_HOME}/openshell/tls/ca.crt" ]; then
                openshell-gateway generate-certs \
                  --output-dir "${XDG_STATE_HOME}/openshell/tls" \
                  --server-san host.openshell.internal
              fi
              cp "${XDG_STATE_HOME}/openshell/tls/ca.crt" \
                "${XDG_CONFIG_HOME}/openshell/gateways/openshell/mtls/ca.crt"
              cp "${XDG_STATE_HOME}/openshell/tls/client/tls.crt" \
                "${XDG_CONFIG_HOME}/openshell/gateways/openshell/mtls/tls.crt"
              cp "${XDG_STATE_HOME}/openshell/tls/client/tls.key" \
                "${XDG_CONFIG_HOME}/openshell/gateways/openshell/mtls/tls.key"
          volumeMounts:
            - name: openshell-gateway-config
              mountPath: /etc/openshell-gateway
              readOnly: true
            - name: openshell-xdg
              mountPath: /var/openshell/xdg
            - name: openshell-state
              mountPath: /var/openshell/state
      containers:
        - name: openshell-gateway
          image: quay.io/redhat-user-workloads/kartograph-tenant/kartograph-openshell-gateway:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: OPENSHELL_GATEWAY_CONFIG
              value: /etc/openshell-gateway/gateway.toml
            - name: OPENSHELL_LOCAL_TLS_DIR
              value: /var/openshell/state/openshell/tls
            - name: XDG_CONFIG_HOME
              value: /var/openshell/xdg
            - name: XDG_STATE_HOME
              value: /var/openshell/state
          volumeMounts:
            - name: openshell-gateway-config
              mountPath: /etc/openshell-gateway
              readOnly: true
            - name: openshell-xdg
              mountPath: /var/openshell/xdg
            - name: openshell-state
              mountPath: /var/openshell/state
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
        - name: api
          env:
            - name: KARTOGRAPH_EXTRACTION_RUNTIME_OPENSHELL_XDG_STATE_HOME
              value: /var/openshell/state
          volumeMounts:
            - name: openshell-xdg
              mountPath: /var/openshell/xdg
            - name: openshell-state
              mountPath: /var/openshell/state
      volumes:
        - name: openshell-gateway-config
          configMap:
            name: kartograph-openshell-gateway
        - name: openshell-xdg
          emptyDir: {}
        - name: openshell-state
          emptyDir: {}
