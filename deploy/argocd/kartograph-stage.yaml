# Reference Application spec — live kartograph-stage is managed by app-interface /
# hp-gitops-tenants (label: managed-by=hp-gitops-tenants), not applied from this repo.
#
# ArgoCD reads GitLab fleet-apps (canonical tenant GitOps), not kartograph.git/deploy/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kartograph-stage
  namespace: argocd
  labels:
    app.kubernetes.io/name: kartograph-stage
    managed-by: hp-gitops-tenants
    tenant: hp-fleet
spec:
  project: tenants-hcm-ai-catalyst
  source:
    repoURL: https://gitlab.cee.redhat.com/hybrid-platforms-gitops/tenant-apps/fleet-apps.git
    targetRevision: main
    path: apps/kartograph/overlays/stage
  destination:
    server: https://kubernetes.default.svc
    namespace: kartograph-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
