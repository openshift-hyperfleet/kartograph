### Requirement: Staging-Based Ingestion
**Status: COVERED**

**Scenario: Node bulk create**
`staging.py:create_node_staging_table` uses `CREATE TEMP TABLE ... ON COMMIT DROP`;
`copy_nodes_to_staging` uses `cursor.copy_from()` (COPY protocol); upsert uses
direct SQL INSERT. `test_staging_table_manager.py`:
`TestNodeStagingTableCreation::test_node_staging_table_uses_on_commit_drop` and
`test_node_staging_table_is_temp`.

**Scenario: Edge bulk create with ID resolution**
Nodes are always created before edges in `apply_batch`. `create_graphid_lookup_table`
queries `_ag_label_vertex` (includes same-transaction inserts via PostgreSQL
read-your-own-writes). `test_staging_table_manager.py`:
`TestGraphidLookupTableCreation::test_lookup_table_queries_ag_label_vertex`,
`test_lookup_table_uses_on_commit_drop`,
`test_lookup_table_creates_index_on_logical_id`. Integration:
`TestCartesianJoinFix::test_edge_resolution_with_many_nodes_succeeds`.

