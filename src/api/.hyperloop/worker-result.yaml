### Requirement: Concurrency Safety
**Status: COVERED**

**Scenario: Concurrent batches**
`queries.py:acquire_advisory_lock` calls `pg_advisory_xact_lock(%s)`
(transaction-scoped). Locks are acquired in `apply_batch` before any data operations.
Tests: `TestAdvisoryLockOrdering::test_advisory_locks_acquired_for_create_nodes/edges`.

**Scenario: Deterministic lock ordering (including failure/retry sub-clause)**

*Implementation:*
- `strategy.py` line 115: `sorted_labels = sorted(all_labels)` — alphabetical sort
  before any lock call.
- Lines 119-213: bounded retry loop `for _attempt in range(self._max_retries + 1)`.
  On any exception (including lock failure), `client.raw_connection.rollback()` is
  called (lines 193-196), which releases all `pg_advisory_xact_lock` locks held by
  that transaction. The loop then retries from scratch (re-acquiring locks in sorted
  order). After `_max_retries` unsuccessful retries, returns
  `MutationResult(success=False, errors=[...])`.

*Tests (all PASS — `TestAdvisoryLockRetry` class):*
- `test_retries_on_lock_acquisition_failure_and_succeeds` — flaky lock fails once,
  succeeds on retry; verifies `result.success is True` and `call_count == 2`.
- `test_rollback_called_on_lock_failure_before_retry` — verifies
  `mock_client.raw_connection.rollback.assert_called_once()` after one failure.
- `test_returns_failure_after_all_retries_exhausted` — persistent failure; verifies
  `result.success is False` and error message propagates.
- `test_retry_attempts_are_bounded_by_max_retries` — verifies total lock call count
  equals `max_retries + 1`.
- `test_second_lock_failure_triggers_rollback_of_all_held_locks` — second of two
  sorted labels fails; verifies rollback is called (releasing the first lock).

