# Spec Alignment Review — Task 007: Bulk Loading (Round 2)

Spec reviewed: `specs/graph/bulk-loading.spec.md`
Branch: `hyperloop/task-007`
Reviewed commit: `ad81fccb` (test: add TestAdvisoryLockRetry covering lock failure retry path)

## Summary

The previous review returned FAIL due to a single gap: the Concurrency Safety /
Deterministic lock ordering scenario required that "if any lock acquisition fails,
all previously acquired locks are released before retry," but neither the retry logic
nor a test for the failure path existed.

Commit `ad81fccb` resolves both gaps. All 18 unit tests in
`test_age_bulk_loading_strategy_partitioning.py` pass (verified by running
`uv run pytest tests/unit/graph/infrastructure/test_age_bulk_loading_strategy_partitioning.py -v`).

